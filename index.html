                        <td style="padding:3px;text-align:right"><button class="main-sp-del-partial" data-no="${t.no}" data-idx="${i}" style="background:none;border:none;color:var(--danger);cursor:pointer">✕</button></td>
                      </tr>
                    `}).join('')}</tbody>
                  </table>
                </div>
              ` : ''}
            </div>
          `;
        }).join('')}
        </div>
      </div>
    `;
  }

  // ── Build SP table HTML (simpler than renderPayments — no filter/search) ──
  let spTableHtml = '';
  if (pays.length > 0) {
    const totalSp = pays.reduce((s, p) => s + (Number(p.total) || 0), 0);
    const totalChildBills = pays.reduce((s, p) => s + (p.bills?.length || 0), 0);
    spTableHtml = `
      <div class="card-flat">
        <div class="flex justify-between items-center" style="padding:8px 14px;border-bottom:1px solid var(--border);background:var(--surface2)">
          <div>
            <span style="font-weight:700;color:var(--primary)">Payments (SP) ของวัน ${dateLabel}</span>
            <span class="text-xs text-dim" style="margin-left:8px">${pays.length} รายการ · รวม ฿${fmtNum(totalSp)} · ${totalChildBills} บิล</span>
          </div>
          <span class="text-xs text-muted">คลิกแถวเพื่อ expand</span>
        </div>
        <div class="table-wrap" style="max-height:400px;overflow-y:auto">
          <table>
            <thead><tr>
              <th style="width:30px"></th>
              <th>SP Number</th>
              <th>ลูกค้า</th>
              <th style="text-align:right">ยอด</th>
              <th style="text-align:center">บิล</th>
              <th>สถานะ</th>
            </tr></thead>
            <tbody>${pays.map(p => {
              const isOpen = expandedSpSet.has(p.sp_no);
              const statusCls = p.match_status === 'matched' ? 'badge-success' : 'badge-warn';
              const statusLabel = p.match_status === 'matched' ? '✓ Matched' : '⏳ รอ';
              const isTemp = /^SP-TEMP-/.test(p.sp_no);
              return `
                <tr class="main-sp-row" data-sp="${p.sp_no}" style="cursor:pointer;${isOpen ? 'background:var(--surface2)' : ''}${isTemp ? ';border-left:3px solid var(--warn)' : ''}">
                  <td style="text-align:center">${isOpen ? '▼' : '▶'}</td>
                  <td style="font-weight:700;color:${isTemp ? 'var(--warn)' : 'var(--primary)'};font-family:monospace;font-size:.82rem">
                    ${p.sp_no}${isTemp ? '<span class="badge badge-warn" style="margin-left:4px;font-size:.65rem">ชั่วคราว</span>' : ''}
                  </td>
                  <td><div class="text-sm">${p.cust_name || '-'}</div><div class="text-xs text-muted">${p.cust_id || ''}</div></td>
                  <td style="text-align:right;font-weight:700;color:var(--success)">฿${fmtNum(p.total || 0)}</td>
                  <td style="text-align:center">${p.bills?.length || 0}</td>
                  <td><span class="badge ${statusCls}" style="font-size:.7rem">${statusLabel}</span></td>
                </tr>
                ${isOpen && p.bills?.length ? `
                  <tr><td colspan="6" style="padding:0">
                    <div style="padding:8px 16px;background:var(--surface2);border-top:2px solid var(--primary)">
                      <div class="text-xs text-dim mb-2">📎 บิลที่ตัด:</div>
                      <table style="width:100%;font-size:.8rem">
                        <thead><tr style="color:var(--text2)">
                          <th style="text-align:left">Bill No</th>
                          <th style="text-align:left">วันที่</th>
                          <th style="text-align:left">ครบกำหนด</th>
                          <th style="text-align:right">ยอด</th>
                        </tr></thead>
                        <tbody>${p.bills.map(b => `
                          <tr>
                            <td style="font-weight:600">${b.bill_no}</td>
                            <td class="text-xs">${fmtDate(b.bill_date)}</td>
                            <td class="text-xs">${fmtDate(b.due_date)}</td>
                            <td style="text-align:right;font-weight:600;color:${Number(b.amount) < 0 ? 'var(--danger)' : 'var(--text)'}">฿${fmtNum(b.amount)}</td>
                          </tr>
                        `).join('')}</tbody>
                      </table>
                    </div>
                  </td></tr>
                ` : ''}
              `;
            }).join('')}</tbody>
          </table>
        </div>
      </div>
    `;
  }

  // ── Fallback: ถ้าทั้ง 2 ส่วนว่าง แสดงปุ่ม "สร้าง SP-TEMP" อย่างเดียว ──
  let emptyStateHtml = '';
  if (!spTempBoxHtml && !spTableHtml) {
    emptyStateHtml = `
      <div class="card-flat" style="padding:16px;text-align:center;color:var(--text3)">
        <div class="text-sm" style="margin-bottom:8px">ยังไม่มี SP หรือ SP-TEMP สำหรับวัน ${dateLabel}</div>
        <button class="btn btn-warn btn-sm" id="main-sp-add-temp" style="padding:4px 10px;font-size:.8rem">
          ${ICONS.plus} สร้าง SP ชั่วคราว
        </button>
      </div>
    `;
  }

  // ── Mount ──
  container.innerHTML = spTempBoxHtml + spTableHtml + emptyStateHtml;

  // ── Attach handlers ──
  // Create SP-TEMP button (มีได้ 2 ที่ — บน SP-TEMP box หรือใน empty state)
  container.querySelectorAll('#main-sp-add-temp').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (customerList.length === 0) {
        try {
          const res = await api('getCustomers', {});
          if (res.success && Array.isArray(res.data)) customerList = res.data;
        } catch (e) { console.warn('getCustomers failed', e); }
      }
      openSpTempModal();
      // Note: openSpTempModal doesn't auto-call onChange; user needs to refresh manually
      // หรือถ้า openSpTempModal มี callback ก็ใช้ที่นั่น — สำหรับ Main render() จะ trigger ผ่าน persistMainState hook
    });
  });

  // SP-TEMP: toggle expand
  container.querySelectorAll('.main-sp-toggle-temp').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const no = btn.dataset.no;
      if (expandedTempSet.has(no)) expandedTempSet.delete(no);
      else expandedTempSet.add(no);
      if (onChange) onChange();
    });
  });

  // SP-TEMP: add partial
  container.querySelectorAll('.main-sp-add-partial').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      openPartialModal(btn.dataset.no);
    });
  });

  // SP-TEMP: graduate
  container.querySelectorAll('.main-sp-graduate').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const t = spTempList.find(x => x.no === btn.dataset.no);
      if (t) openGraduateTempModal(t);
    });
  });

  // SP-TEMP: delete whole temp
  container.querySelectorAll('.main-sp-del-temp').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const no = btn.dataset.no;
      if (!confirm(`ลบ ${no} ทั้งหมด?`)) return;
      spTempList = spTempList.filter(x => x.no !== no);
      markDirtySpTemps();
      if (onChange) onChange();
    });
  });

  // SP-TEMP: delete partial
  container.querySelectorAll('.main-sp-del-partial').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const no = btn.dataset.no;
      const idx = Number(btn.dataset.idx);
      const t = spTempList.find(x => x.no === no);
      if (!t) return;
      if (!confirm(`ลบ partial #${idx + 1} ของ ${no}?`)) return;
      t.partials.splice(idx, 1);
      t.updated_at = new Date().toISOString();
      recomputeSpTempStatus(t);
      markDirtySpTemps();
      if (onChange) onChange();
    });
  });
  
  // ⭐ SP-TEMP: edit header (expected/customer)
  container.querySelectorAll('.main-sp-edit-temp').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const no = btn.dataset.no;
      openSpTempEditModal(no, onChange);
    });
  });
  
  // ⭐ SP-TEMP: click partial row → edit partial
  container.querySelectorAll('.main-sp-partial-row').forEach(row => {
    row.addEventListener('click', (e) => {
      if (e.target.closest('.main-sp-del-partial')) return;
      const no = row.dataset.no;
      const idx = Number(row.dataset.idx);
      openSpTempPartialEditModal(no, idx, onChange);
    });
  });

  // SP table: toggle expand
  container.querySelectorAll('.main-sp-row').forEach(row => {
    row.addEventListener('click', () => {
      const spNo = row.dataset.sp;
      if (expandedSpSet.has(spNo)) expandedSpSet.delete(spNo);
      else expandedSpSet.add(spNo);
      if (onChange) onChange();
    });
  });
}

async function renderPayments(el) {

  let expandedTemp = new Set(); // SP-TEMP ที่เปิดแสดง partials

  function render() {
    let data = paymentList;
    if (filterStatus !== 'ALL') data = data.filter(p => p.match_status === filterStatus);
    if (searchText) {
      const s = searchText.toLowerCase();
      data = data.filter(p => 
        (p.sp_no||'').toLowerCase().includes(s) ||
        (p.cust_name||'').toLowerCase().includes(s) ||
        (p.cust_id||'').toLowerCase().includes(s)
      );
    }
    
    // Sort by date (default ASC, toggle-able)
    const _spOrder = getSortOrder('payment');
    data = [...data].sort((a, b) => {
      const da = parseThaiDate(a.date) || 0;

    });

    const _t = truncateForRender(data);
    const visibleData = _t.visible;

    const totalAmt = paymentList.reduce((s,p) => s + (Number(p.total)||0), 0);
    const totalChildBills = paymentList.reduce((s,p) => s + (p.bills?.length||0), 0);

    el.innerHTML = `

      ${(() => {

    el.querySelectorAll('.btn-del-partial').forEach(btn => {

        if (!sp) return;

            <div class="input-group">
              <label>เลข SP จริง</label>
              <input class="input" id="rename-sp-new" placeholder="เช่น SP00126-001032" autofocus>
            </div>
            <div class="flex gap-2 mt-2">
              <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
              <button class="btn btn-primary btn-sm flex-1" id="rename-sp-confirm">${ICONS.check} อัปเดตเลข SP</button>
            </div>
          </div>
        `);
        document.getElementById('rename-sp-confirm')?.addEventListener('click', () => {
          const newSp = document.getElementById('rename-sp-new').value.trim();
          if (!newSp) { toast('กรอกเลข SP ใหม่', 'error'); return; }
          if (paymentList.find(p => p.sp_no === newSp)) { toast('เลข SP นี้มีอยู่แล้ว', 'error'); return; }
          
          // เปลี่ยนใน paymentList
          sp.sp_no = newSp;
          sp.is_temp = false;
          
          // อัปเดต billList ที่ผูก paid_by_sp = oldSp → newSp
          let linked = 0;
          billList.forEach(b => {
            if (b.paid_by_sp === oldSp) { b.paid_by_sp = newSp; linked++; }
          });
          
          persistMainState();
          closeModal();
          toast(`อัปเดต ${oldSp} → ${newSp}${linked?` (อัปเดต ${linked} บิลที่ผูกไว้)`:''}`, 'success');
          render();
        });
      });
    });
    
    document.getElementById('btn-clear-pay')?.addEventListener('click', () => {
      if (confirm('ล้างข้อมูล SP ทั้งหมด?')) { paymentList = []; persistMainState(); render(); }
    });
    document.getElementById('btn-save-pay')?.addEventListener('click', async () => {
      toast('กำลังบันทึก...', 'info');

      if (res.success) toast(`บันทึกสำเร็จ ${paymentList.length} SP`, 'success');

    });
    el.querySelectorAll('.sort-toggle').forEach(btn => {

        render();
      });
    });
    el.querySelectorAll('.sp-row').forEach(row => {
      row.addEventListener('click', (e) => {

        if (e.target.closest('.btn-rename-sp')) return;
        const sp = row.dataset.sp;
        if (expandedSP.has(sp)) expandedSP.delete(sp);
        else expandedSP.add(sp);
        render();
      });
    });
  }

  render();
}

// ══════════════════════════════════════════════════════════════
// Business Rules (บจก. จงกลณีฯ) — 4 บัญชี
//   VAT:   KTB (รับลูกหนี้ VAT)
//          KBANK (จ่ายเจ้าหนี้ VAT)
//          BBL (บริษัท 266-4-448384 — VAT)
//   NOVAT: BBL NW (รับ-จ่าย NOVAT)
// ══════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════
// BANK_ACCOUNTS — Business Rules ของ 4 บัญชี
// 
// flow:
//   'receive'     = รับโอนจากลูกค้า
//   'pay'         = จ่ายโอนให้ supplier
//   'cheque_out'  = เช็คขึ้นเงิน (withdraw)
//
// รับเงินจากลูกค้า:
//   VAT (SS/SR)  → KTB, KBANK, BBL   (ทุกบัญชี VAT)
//   NOVAT (OS/OR) → BBL NW           (เฉพาะ NOVAT)
//
// จ่ายเจ้าหนี้:
//   VAT          → KBANK (หลัก)     + เช็คผ่าน KTB
//   NOVAT        → BBL NW
// ══════════════════════════════════════════════════════════════
const BANK_ACCOUNTS = {
  KTB:      { label:'KTB · รับโอน VAT · จ่ายเช็ค',        vat:'VAT',   flow:['receive','cheque_out'],    allowed_docs:['SS','SR','SP'] },
  KBANK:    { label:'KBANK · รับ-จ่าย VAT',               vat:'VAT',   flow:['receive','pay'],           allowed_docs:['SS','SR','SP'] },
  BBL:      { label:'BBL · บัญชีบริษัท VAT',              vat:'VAT',   flow:['receive','pay'],           allowed_docs:['SS','SR','SP'] },
  'BBL NW': { label:'BBL NW · รับ-จ่าย NOVAT',            vat:'NOVAT', flow:['receive','pay'],           allowed_docs:['OS','OR','SP'] },
};

function getAllowedBanks(vat, direction) {
  return Object.keys(BANK_ACCOUNTS).filter(k => {
    const b = BANK_ACCOUNTS[k];
    if (vat && b.vat !== vat) return false;
    if (direction && !b.flow.includes(direction)) return false;
    return true;
  });
}

// ══════════════════════════════════════════════════════════════
// ตรวจว่าเป็นกรณี "ลูกค้าโอนผิดธนาคาร" หรือไม่
// - SS/SR โอนเข้า BBL NW → wrong (VAT → NOVAT bank)
// - OS/OR โอนเข้า KTB/KBANK/BBL → wrong (NOVAT → VAT bank)
// - ระบบไม่บล็อก แต่จะ flag ให้ผู้ใช้เห็น
// ══════════════════════════════════════════════════════════════
function detectMisroutedPayment(billNo, bank) {
  if (!billNo || !bank) return null;
  const prefix = String(billNo).substring(0, 2).toUpperCase();
  const bankDef = BANK_ACCOUNTS[bank];
  if (!bankDef) return null;
  
  // VAT docs (SS, SR) — should go to VAT banks
  if (['SS', 'SR'].includes(prefix) && bankDef.vat !== 'VAT') {
    return { type:'vat_to_novat', msg:`บิล ${prefix} (VAT) โอนเข้า ${bank} (NOVAT) — ผิดบัญชี` };
  }
  // NOVAT docs (OS, OR) — should go to BBL NW
  if (['OS', 'OR'].includes(prefix) && bankDef.vat !== 'NOVAT') {
    return { type:'novat_to_vat', msg:`บิล ${prefix} (NOVAT) โอนเข้า ${bank} (VAT) — ผิดบัญชี` };
  }
  return null; // ok
}

    let data = [...cashflowList];

    if (filterDateFrom || filterDateTo) {
      data = data.filter(c => {
        const d = toISODate(c.date);

        if (filterDateFrom && d < filterDateFrom) return false;
        if (filterDateTo && d > filterDateTo) return false;
        return true;
      });

    // Sort by date (default ASC, toggle-able)

      const da = parseThaiDate(a.date) || 0;
      const db = parseThaiDate(b.date) || 0;
      return _cfOrder === 'asc' ? da - db : db - da;

    // PERF: truncate
    const _t = truncateForRender(data);
    const visibleData = _t.visible;

      deposit: cashflowList.filter(c=>c.type==='deposit').reduce((s,c)=>s+Number(c.amount||0),0),
      supplier: cashflowList.filter(c=>c.type==='supplier').reduce((s,c)=>s+Number(c.amount||0),0),
      transfer: cashflowList.filter(c=>c.type==='transfer').reduce((s,c)=>s+Number(c.amount||0),0),
      misc: cashflowList.filter(c=>c.type==='misc').reduce((s,c)=>s+Number(c.amount||0),0),

        e.stopPropagation();
        const idx = Number(btn.dataset.idx);
        openCashflowModal(cashflowList[idx].type, idx);
      });
    });
    el.querySelectorAll('.btn-cf-delete').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = Number(btn.dataset.idx);
        const c = cashflowList[idx];
        if (!confirm(`ลบรายการนี้?\n${c.type} · ฿${fmtNum(c.amount)} · ${fmtDate(c.date)}`)) return;
        cashflowList.splice(idx, 1);
        persistMainState();
        toast('ลบแล้ว', 'success');
        render();
      });
    });
  }

  function openCashflowModal(type, editIdx) {
    const existing = editIdx !== undefined ? cashflowList[editIdx] : null;
    const isEdit = !!existing;
    
    // VAT/NOVAT ที่เลือก (ถ้าแก้ไขเอาของเดิม, ถ้าใหม่ default VAT)
    let selectedVat = existing?.vat || (type === 'deposit' ? 'VAT' : 'VAT');
    
    const typeConfig = {
      deposit:  { title:'🏦 นำเงินฝากธนาคาร', color:'var(--success)', 
        desc:'บันทึกเงินสดที่เอาไปฝากเข้าบัญชีธนาคาร',
        showFrom:true, fromLabel:'เงินสดจาก Station', fromPlaceholder:'Front1, Front2, รวมทุกโต๊ะ',
        showTo:true, toLabel:'ฝากเข้าบัญชี', 
        showCounterparty:false, bankDirection:'receive' },
      supplier: { title:'🏭 จ่ายเจ้าหนี้ (Supplier)', color:'var(--danger)',
        desc:'โอนจ่าย Supplier · VAT: จาก KBANK | NOVAT: จาก BBL NW',
        showFrom:true, fromLabel:'โอนจากบัญชี (บริษัท)', fromPlaceholder:'',
        showTo:true, toLabel:'บัญชี Supplier ปลายทาง', toPlaceholder:'เลขบัญชี Supplier',
        showCounterparty:true, counterpartyLabel:'ชื่อ Supplier / เจ้าหนี้', bankDirection:'pay' },
      transfer: { title:'🔄 โอนระหว่างบัญชี (บริษัท)', color:'var(--info)',
        desc:'โอนเงินระหว่างบัญชีบริษัท · กรณี VAT ปกติ: KTB → KBANK เมื่อเงินไม่พอ',
        showFrom:true, fromLabel:'จากบัญชี', fromPlaceholder:'',
        showTo:true, toLabel:'ไปบัญชี', toPlaceholder:'',
        showCounterparty:false, bankDirection:null },
      misc:     { title:'💫 รายการอื่นๆ', color:'var(--warn)',
        desc:'ดอกเบี้ยรับ · ค่าธรรมเนียม · มัดจำลูกค้า · อื่นๆ',
        showFrom:true, fromLabel:'จาก', fromPlaceholder:'-',
        showTo:true, toLabel:'ไป', toPlaceholder:'-',
        showCounterparty:true, counterpartyLabel:'คู่กรณี', bankDirection:null },
    }[type];

    function renderBankOptions(vat, dir) {
      const allowed = getAllowedBanks(vat, dir);
      const options = [{val:'', label:'— เลือกบัญชี —'}].concat(
        allowed.map(k => ({ val:k, label:BANK_ACCOUNTS[k].label }))
      );
      return options.map(o => 
        `<option value="${o.val}" ${existing?.bank===o.val?'selected':''}>${o.label}</option>`
      ).join('');
    }
    
    // คำแนะนำ Business Rules
    function getRuleHint(vat, type) {
      if (type === 'supplier') {
        return vat === 'VAT' 
          ? '💡 จ่ายเจ้าหนี้ VAT → โอนจาก <strong>KBANK</strong> เท่านั้น'
          : '💡 จ่ายเจ้าหนี้ NOVAT → โอนจาก <strong>BBL NW</strong> เท่านั้น';
      }
      if (type === 'deposit') {
        return vat === 'VAT'
          ? '💡 ฝาก VAT → บัญชี <strong>KTB</strong> (รับลูกหนี้ VAT)'
          : '💡 ฝาก NOVAT → บัญชี <strong>BBL NW</strong> (รับลูกหนี้ NOVAT)';
      }
      if (type === 'transfer' && vat === 'VAT') {
        return '💡 โอนภายใน VAT ปกติ: <strong>KTB → KBANK</strong> (เมื่อ KBANK เงินไม่พอจ่าย Supplier)';
      }
      return '';
    }

    openModal(typeConfig.title, `
      <div class="flex-col gap-3">
        <p class="text-sm text-dim" style="padding:8px 12px;background:${typeConfig.color}15;border-radius:6px">${typeConfig.desc}</p>
        
        <!-- VAT / NOVAT Selector -->
        <div class="input-group">
          <label>ประเภทการโอน *</label>
          <div class="flex gap-2">
            <button type="button" class="btn ${selectedVat==='VAT'?'btn-primary':'btn-outline'} btn-sm flex-1 cf-vat-btn" data-vat="VAT" style="${selectedVat==='VAT'?'background:#4f9cf9;color:#fff':''}">
              🔵 VAT <span class="text-xs" style="opacity:.7">(KTB / KBANK)</span>
            </button>
            <button type="button" class="btn ${selectedVat==='NOVAT'?'btn-primary':'btn-outline'} btn-sm flex-1 cf-vat-btn" data-vat="NOVAT" style="${selectedVat==='NOVAT'?'background:#8e44ad;color:#fff':''}">
              🟣 NOVAT <span class="text-xs" style="opacity:.7">(BBL NW)</span>
            </button>
          </div>
          <div id="cf-rule-hint" class="text-xs" style="margin-top:6px;color:var(--info);padding:6px 10px;background:rgba(79,156,249,.08);border-radius:6px"></div>
        </div>
        
        <div class="flex gap-2">
          <div class="input-group flex-1">
            <label>วันที่</label>
            <input type="date" class="input" id="cf-date" value="${existing?toISODate(existing.date):todayISO()}">
          </div>
          <div class="input-group flex-1">
            <label>ยอดเงิน *</label>
            <input type="number" class="input" id="cf-amount" value="${existing?.amount||''}" placeholder="0.00" step="0.01" autofocus>
          </div>
        </div>

        ${typeConfig.showFrom || typeConfig.showTo ? `
          <div class="flex gap-2">
            ${typeConfig.showFrom ? `
              <div class="input-group flex-1">
                <label>${typeConfig.fromLabel}</label>
                <input class="input" id="cf-from" value="${existing?.from_account||''}" placeholder="${typeConfig.fromPlaceholder}">
              </div>
            ` : ''}
            ${typeConfig.showTo ? `
              <div class="input-group flex-1">
                <label>${typeConfig.toLabel}</label>
                <input class="input" id="cf-to" value="${existing?.to_account||''}" placeholder="${typeConfig.toPlaceholder||''}">
              </div>
            ` : ''}
          </div>
        ` : ''}

        ${typeConfig.showCounterparty ? `
          <div class="input-group">
            <label>${typeConfig.counterpartyLabel}</label>
            <input class="input" id="cf-counterparty" value="${existing?.counterparty||''}" placeholder="ชื่อ / บริษัท">
          </div>
        ` : ''}

        <div class="flex gap-2">
          <div class="input-group flex-1">
            <label>บัญชีบริษัท *</label>
            <select class="select" id="cf-bank">
              ${renderBankOptions(selectedVat, typeConfig.bankDirection)}
            </select>
          </div>
          <div class="input-group flex-1">
            <label>เลขที่อ้างอิง / Slip</label>
            <input class="input" id="cf-ref" value="${existing?.reference||''}" placeholder="เลข slip / ref">
          </div>
        </div>

        <div class="input-group">
          <label>หมายเหตุ</label>
          <input class="input" id="cf-note" value="${existing?.note||''}" placeholder="รายละเอียดเพิ่มเติม">
        </div>

        <div class="flex gap-2 mt-2">
          <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
          <button class="btn btn-primary btn-sm flex-1" id="cf-save" style="background:${typeConfig.color};color:#fff">
            ${ICONS.check} ${isEdit?'อัปเดต':'บันทึก'}
          </button>
        </div>
      </div>
    `);
    
    // VAT/NOVAT button toggle → update bank dropdown
    function updateModalState() {
      document.querySelectorAll('.cf-vat-btn').forEach(btn => {
        const isActive = btn.dataset.vat === selectedVat;
        btn.classList.toggle('btn-primary', isActive);
        btn.classList.toggle('btn-outline', !isActive);
        if (isActive) {
          btn.style.background = selectedVat === 'VAT' ? '#4f9cf9' : '#8e44ad';
          btn.style.color = '#fff';
        } else {
          btn.style.background = '';
          btn.style.color = '';
        }
      });
      const bankSelect = document.getElementById('cf-bank');
      if (bankSelect) bankSelect.innerHTML = renderBankOptions(selectedVat, typeConfig.bankDirection);
      const hint = document.getElementById('cf-rule-hint');
      if (hint) hint.innerHTML = getRuleHint(selectedVat, type);
    }
    updateModalState();
    
    document.querySelectorAll('.cf-vat-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedVat = btn.dataset.vat;
        updateModalState();
      });
    });
    
    document.getElementById('cf-save')?.addEventListener('click', () => {
      const amount = Number(document.getElementById('cf-amount').value);
      if (!amount || amount <= 0) { toast('กรอกยอดเงิน', 'error'); return; }
      const bank = document.getElementById('cf-bank').value;
      if (!bank) { toast('เลือกบัญชีบริษัท', 'error'); return; }
      
      // Validate rules
      const bankDef = BANK_ACCOUNTS[bank];
      if (bankDef && bankDef.vat !== 'MIXED' && bankDef.vat !== selectedVat) {
        if (!confirm(`⚠️ บัญชี ${bank} เป็นประเภท ${bankDef.vat} แต่คุณเลือก ${selectedVat}\nยืนยันว่าต้องการบันทึกแบบนี้?`)) return;
      }
      
      const record = {
        id: existing?.id || ('CF-' + Date.now()),
        date: document.getElementById('cf-date').value || todayISO(),
        type: type,
        vat: selectedVat, // VAT | NOVAT
        amount: amount,
        from_account: document.getElementById('cf-from')?.value || '',
        to_account: document.getElementById('cf-to')?.value || '',
        counterparty: typeConfig.showCounterparty ? document.getElementById('cf-counterparty')?.value || '' : '',
        bank: bank,
        reference: document.getElementById('cf-ref').value,
        note: document.getElementById('cf-note').value,
        match_status: existing?.match_status || 'pending',
        match_stmt_ref: existing?.match_stmt_ref || '',
        created_by: currentUser?.display_name || 'Admin',
        created_at: existing?.created_at || new Date().toISOString(),
      };
      
      if (isEdit) {
        cashflowList[editIdx] = record;
      } else {
        cashflowList.push(record);
      }
      persistMainState();
      closeModal();
      toast(isEdit?'อัปเดตสำเร็จ':'บันทึกสำเร็จ', 'success');
      render();
    });
  }

  render();
}


// ══════════════════════════════════════════════════════════════
// Render Supplier Payment Page (จ่ายเจ้าหนี้ - PP)
// Workflow: 
//   1. Master Supplier (ชื่อ + เลขบัญชี + ธนาคาร + VAT/NOVAT)
//   2. บันทึกรายการที่จะโอน (pending)
//   3. โอนแล้ว → ใส่เลข PP → สถานะ paid
//   4. Match กับ Statement ของธนาคารที่โอน
// ══════════════════════════════════════════════════════════════
async function renderSupplier(el) {
  let tab = 'payments'; // payments | suppliers
  let filterStatus = 'ALL';
  let filterVat = 'ALL';
  let filterDateFrom = '';
  let filterDateTo = '';
  let searchText = '';

  function render() {
    if (tab === 'suppliers') {
      renderSupplierMaster();
      return;
    }
    
    // Filter
    let data = [...supplierPayments];
    if (filterStatus !== 'ALL') data = data.filter(p => p.status === filterStatus);
    if (filterVat !== 'ALL') data = data.filter(p => p.vat === filterVat);
    if (filterDateFrom || filterDateTo) {
      data = data.filter(p => {
        const d = toISODate(p.transfer_date || p.created_date);
        if (!d) return true;
        if (filterDateFrom && d < filterDateFrom) return false;
        if (filterDateTo && d > filterDateTo) return false;
        return true;
      });
    }
    if (searchText) {
      const s = searchText.toLowerCase();
      data = data.filter(p => 
        (p.supplier_name||'').toLowerCase().includes(s) ||
        (p.pp_no||'').toLowerCase().includes(s) ||
        (p.reference||'').toLowerCase().includes(s)
      );
    }
    // Sort: pending ก่อน, วันใหม่ก่อน
    data.sort((a,b) => {
      if (a.status !== b.status) {
        const order = { pending:0, scheduled:1, paid:2, cancelled:3 };
        return (order[a.status]||99) - (order[b.status]||99);
      }
      return (toISODate(b.transfer_date||b.created_date)||'').localeCompare(toISODate(a.transfer_date||a.created_date)||'');
    });
    
    // PERF: truncate
    const _t = truncateForRender(data);
    const visibleData = _t.visible;
    
    // Summary
    const statusCounts = {
      pending: supplierPayments.filter(p => p.status === 'pending').length,
      scheduled: supplierPayments.filter(p => p.status === 'scheduled').length,
      paid: supplierPayments.filter(p => p.status === 'paid').length,
      matched: supplierPayments.filter(p => p.match_status === 'matched').length,
    };
    const totalPending = supplierPayments.filter(p => p.status === 'pending' || p.status === 'scheduled').reduce((s,p)=>s+Number(p.amount||0),0);
    const totalPaid = supplierPayments.filter(p => p.status === 'paid').reduce((s,p)=>s+Number(p.amount||0),0);
    const vatPaid = supplierPayments.filter(p => p.status === 'paid' && p.vat === 'VAT').reduce((s,p)=>s+Number(p.amount||0),0);
    const novatPaid = supplierPayments.filter(p => p.status === 'paid' && p.vat === 'NOVAT').reduce((s,p)=>s+Number(p.amount||0),0);

    el.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div>
          <div class="page-title">🏭 จ่ายเจ้าหนี้ (Supplier Payment / PP)</div>
          <p class="text-sm text-dim" style="margin-top:2px">บันทึกรายการที่ต้องโอนให้ Supplier → เมื่อโอนแล้วใส่เลข PP</p>
        </div>
        <div class="flex gap-2">
          <button class="btn btn-primary btn-sm" id="btn-add-payment">${ICONS.plus} รายการโอนใหม่</button>
          <button class="btn btn-success btn-sm" id="btn-save-sup-pay">${ICONS.check} บันทึก</button>
        </div>
      </div>
      
      <!-- Tabs -->
      <div class="flex gap-2 mb-3">
        <button class="pill ${tab==='payments'?'active':''}" data-tab="payments">💰 รายการโอน (${supplierPayments.length})</button>
        <button class="pill ${tab==='suppliers'?'active':''}" data-tab="suppliers">📋 รายชื่อ Supplier (${supplierList.length})</button>
      </div>

      <!-- Summary -->
      <div class="flex gap-3 flex-wrap mb-3 stagger">
        ${statCard('รอโอน', '฿'+fmtNum(totalPending), statusCounts.pending+' รายการ', 'var(--warn)', ICONS.alert)}
        ${statCard('โอนแล้ว', '฿'+fmtNum(totalPaid), statusCounts.paid+' รายการ', 'var(--success)', ICONS.check)}
        ${statCard('VAT (KBANK/BBL)', '฿'+fmtNum(vatPaid), '', '#4f9cf9', ICONS.dollar)}
        ${statCard('NOVAT (BBL NW)', '฿'+fmtNum(novatPaid), '', '#8e44ad', ICONS.dollar)}
      </div>

      <!-- Filters -->
      <div class="flex gap-2 mb-2 flex-wrap items-center">
        <input class="input" id="sp-search" placeholder="ค้นหา ชื่อ / PP / Ref" value="${searchText}" style="width:240px">
        <span class="text-xs text-dim">สถานะ:</span>
        <button class="pill ${filterStatus==='ALL'?'active':''}" data-fs="ALL">ทั้งหมด</button>
        <button class="pill ${filterStatus==='pending'?'active':''}" data-fs="pending" style="--pill-color:var(--warn)">⏳ รอโอน</button>
        <button class="pill ${filterStatus==='scheduled'?'active':''}" data-fs="scheduled" style="--pill-color:var(--info)">📅 นัดโอน</button>
        <button class="pill ${filterStatus==='paid'?'active':''}" data-fs="paid" style="--pill-color:var(--success)">✓ โอนแล้ว</button>
        <button class="pill ${filterStatus==='cancelled'?'active':''}" data-fs="cancelled" style="--pill-color:var(--text3)">❌ ยกเลิก</button>
      </div>
      <div class="flex gap-2 mb-3 flex-wrap items-center">
        <span class="text-xs text-dim">VAT:</span>
        <button class="pill ${filterVat==='ALL'?'active':''}" data-fv="ALL">ทั้งหมด</button>
        <button class="pill ${filterVat==='VAT'?'active':''}" data-fv="VAT" style="--pill-color:#4f9cf9">VAT</button>
        <button class="pill ${filterVat==='NOVAT'?'active':''}" data-fv="NOVAT" style="--pill-color:#8e44ad">NOVAT</button>
        <span style="flex:1"></span>
        <input type="date" class="input" id="sp-from" value="${filterDateFrom}" style="width:140px;font-size:.8rem">
        <input type="date" class="input" id="sp-to" value="${filterDateTo}" style="width:140px;font-size:.8rem">
      </div>

      <!-- Table -->
      <div class="card-flat">
        <div class="table-wrap" style="max-height:520px;overflow-y:auto">
          <table>
            <thead>
              <tr>
                <th style="width:40px">#</th>
                <th>สถานะ</th>
                <th>PP / Ref</th>
                <th>Supplier</th>
                <th style="text-align:center">VAT</th>
                <th style="text-align:right">ยอด</th>
                <th>บัญชีโอน (บริษัท)</th>
                <th>บัญชี Supplier</th>
                <th>วันที่โอน</th>
                <th>Match</th>
                <th style="text-align:center">จัดการ</th>
              </tr>
            </thead>
            <tbody>
              ${data.length === 0 ? 
                `<tr><td colspan="11" style="text-align:center;padding:40px;color:var(--text3)">
                  ยังไม่มีรายการ — กด <strong>+ รายการโอนใหม่</strong><br>
                  <span class="text-xs">1) บันทึกรายการที่จะโอน 2) เมื่อโอนแล้วใส่เลข PP</span>
                </td></tr>` :
                (() => {
                  const spIndexMap = new Map();
                  supplierPayments.forEach((p, i) => spIndexMap.set(p, i));
                  return visibleData.map((p, idx) => {
                  const statusMap = {
                    pending: { label:'⏳ รอโอน', color:'var(--warn)' },
                    scheduled: { label:'📅 นัดโอน', color:'var(--info)' },
                    paid: { label:'✓ โอนแล้ว', color:'var(--success)' },
                    cancelled: { label:'❌ ยกเลิก', color:'var(--text3)' },
                  };
                  const st = statusMap[p.status] || statusMap.pending;
                  const realIdx = spIndexMap.get(p) ?? idx;
                  const vatColor = p.vat === 'VAT' ? '#4f9cf9' : '#8e44ad';
                  const isMatched = p.match_status === 'matched';
                  const rowStyle = p.status === 'cancelled' ? 'opacity:.5;text-decoration:line-through' : 
                    isMatched ? 'background:rgba(45,212,160,.06)' : '';
                  
                  return `<tr data-idx="${realIdx}" style="${rowStyle}">
                    <td class="text-xs text-muted">${idx+1}</td>
                    <td><span class="badge" style="background:${st.color}22;color:${st.color}">${st.label}</span></td>
                    <td>
                      ${p.pp_no ? `<div class="font-semi" style="font-family:var(--mono);color:var(--text);font-size:.82rem">${p.pp_no}</div>` : ''}
                      ${p.reference ? `<div class="text-xs text-muted" style="font-family:var(--mono)">${p.reference}</div>` : ''}
                      ${!p.pp_no && !p.reference ? '<span class="text-xs text-muted">-</span>' : ''}
                    </td>
                    <td>
                      <div class="font-semi" style="color:var(--text)">${p.supplier_name||'(ไม่ระบุ)'}</div>
                      ${p.invoice_no ? `<div class="text-xs text-muted">INV: ${p.invoice_no}</div>` : ''}
                    </td>
                    <td style="text-align:center"><span class="badge" style="background:${vatColor}22;color:${vatColor};font-size:.75rem;font-weight:700">${p.vat||'-'}</span></td>
                    <td style="text-align:right;font-weight:700;color:${p.status==='paid'?'var(--success)':'var(--warn)'}">฿${fmtNum(p.amount||0)}</td>
                    <td>${p.bank?`<span class="badge" style="background:${(bankColors[p.bank]||'#555')}22;color:${bankColors[p.bank]||'#aaa'}">${p.bank}</span>`:'-'}</td>
                    <td class="text-xs">
                      ${p.supplier_account ? `<div style="font-family:var(--mono)">${p.supplier_account}</div>` : ''}
                      ${p.supplier_bank ? `<div class="text-muted">${p.supplier_bank}</div>` : ''}
                    </td>
                    <td class="text-xs">${p.transfer_date?fmtDate(p.transfer_date):'-'}</td>
                    <td>${isMatched?'<span class="badge badge-success">✓</span>':'<span class="text-xs text-muted">-</span>'}</td>
                    <td style="text-align:center;white-space:nowrap">
                      ${p.status !== 'paid' && p.status !== 'cancelled' ? 
                        `<button class="btn btn-primary btn-sm btn-mark-paid" data-idx="${realIdx}" title="ใส่เลข PP + โอนแล้ว" style="font-size:.7rem;padding:3px 8px">💰 โอนแล้ว</button>` : ''}
                      <button class="btn btn-ghost btn-sm btn-sp-edit" data-idx="${realIdx}" title="แก้ไข">${ICONS.edit}</button>
                      <button class="btn btn-ghost btn-sm btn-sp-delete" data-idx="${realIdx}" title="ลบ" style="color:var(--danger)">🗑️</button>
                    </td>
                  </tr>`;
                }).join('');
                })()
              }
            </tbody>
          </table>
        </div>
        <div class="flex justify-between items-center" style="padding:10px 14px;border-top:1px solid var(--border)">
          <span class="text-sm text-dim">
            ${visibleData.length} / ${data.length} (จาก ${supplierPayments.length})
            ${truncationFooter(data.length)}
          </span>
          <span class="font-bold">รวม: ฿${fmtNum(data.reduce((s,p)=>s+Number(p.amount||0),0))}</span>
        </div>
      </div>
    `;

    // Event handlers

        (s.name||'').toLowerCase().includes(q) || (s.code||'').toLowerCase().includes(q)

      setTimeout(() => openSupplierMasterModal(), 200);

        reference: existing?.reference || '',

// ══════════════════════════════════════════════════════════════
// PP Report Page — รวม 3 ไฟล์ Smart ที่ import → Main sheet → Export
// Files:
//   1. การชำระเงิน.xls (Payment) → payments[]
//   2. การชำระเงิน_ประเภทชำระ.xls (Payment Type) → paymentTypes[]
//   3. ภาษีซื้อ.xls (Buy Bills) → buyBills[]
//
// VAT Logic: เลข doc prefix
//   MR, MS, BR → N (NOVAT)
//   PR, PS     → V (VAT)
// ══════════════════════════════════════════════════════════════

// Helper: แยก VAT type จากเลขเอกสาร
//   PR, PS, PC → V (VAT)
//   MR, MS, BR → N (NOVAT)
//   PX → ขึ้นอยู่กับบิลที่อยู่คู่ (pair) ถ้าคู่กับ PR/PS/PC = V, คู่กับ MR/MS/BR = N
function classifyVat(docNo) {
  const s = String(docNo || '').trim().toUpperCase();
  if (/^(PR|PS|PC)/i.test(s)) return 'V';
  if (/^(MR|MS|BR)/i.test(s)) return 'N';
  if (/^PX/i.test(s)) return 'PX'; // ต้อง resolve ภายหลังจาก siblings
  return ''; // unknown
}

// Resolve PX ตาม sibling bills: ถ้า siblings เป็น V ก็ V, ถ้าเป็น N ก็ N
function resolvePxVat(bills) {
  if (!bills || bills.length === 0) return '';
  const nonPx = bills.map(b => classifyVat(b.bill_no || b.doc_no || ''))
                     .filter(v => v && v !== 'PX');
  if (nonPx.length === 0) return ''; // all PX, can't determine
  // ถ้ามีทั้ง V และ N → MIX
  if (nonPx.includes('V') && nonPx.includes('N')) return 'MIX';
  return nonPx[0];
}

// Parser 1: การชำระเงิน (Payment)
// Format:
//   PP row: col1=PP number, col2=date, col3=(AP-XXX) name, col4=amount, col5=discount, col6=net
//   Child row: col1=MR/PR number, col3=date, col4=due, col5='(ใบรับของ/ใบซื้อ)', col6=amount
function parsePaymentFile(result) {
  const sheet = result.sheets[result.sheetNames[0]] || [];
  const records = [];
  let currentPP = null;
  let period = '';
  
  for (let i = 0; i < sheet.length; i++) {
    const r = sheet[i] || [];
    const c1 = String(r[0] || '').trim();
    
    // Extract period from header
    if (i < 5) {
      const rowText = r.join(' ');
      const periodMatch = rowText.match(/จากวันที่\s*:\s*(\d{2}\/\d{2}\/\d{4})\s*ถึงวันที่\s*:\s*(\d{2}\/\d{2}\/\d{4})/);
      if (periodMatch) period = `${periodMatch[1]} - ${periodMatch[2]}`;
    }
    
    // PP parent
    if (/^PP\d+-\d+$/i.test(c1)) {
      const supplierRaw = String(r[2] || '').trim();
      const apMatch = supplierRaw.match(/^\(([^)]+)\)\s*(.*)/);
      currentPP = {
        pp_no: c1,
        date: fmtDate(r[1]) || '',
        supplier_code: apMatch ? apMatch[1] : '',
        supplier_name: apMatch ? apMatch[2] : supplierRaw,
        amount: Number(r[3]) || 0,
        discount: Number(r[4]) || 0,
        net: Number(r[5]) || 0,
        bills: [],  // child bills
      };
      records.push(currentPP);
      continue;
    }
    
    // Child row (MR/PR/MS/PS/BR/PC/PX)
    if (/^(MR|MS|PR|PS|BR|PC|PX)\d+-\d+$/i.test(c1) && currentPP) {
      currentPP.bills.push({
        bill_no: c1,
        vat: classifyVat(c1),
        bill_date: fmtDate(r[2]) || '',
        due_date: fmtDate(r[3]) || '',
        note: String(r[4] || ''),
        amount: Number(r[5]) || 0,
        discount: Number(r[6]) || 0,
        other: Number(r[7]) || 0,
        net: Number(r[8]) || 0,
      });
    }
  }
  
  return { records, period };
}

// Parser 2: การชำระเงิน ประเภทชำระ (Payment Type)
// Format groups by (AP-XXX), then PP, then payment type rows (เงินสด / โอนเงิน / เช็ค)
function parsePaymentTypeFile(result) {
  const sheet = result.sheets[result.sheetNames[0]] || [];
  const records = []; // { pp_no, date, supplier_code, supplier_name, methods: [{type, date, bank, amount}] }
  let currentSupplier = null;
  let currentPP = null;
  
  for (let i = 0; i < sheet.length; i++) {
    const r = sheet[i] || [];
    const c1 = String(r[0] || '').trim();
    
    // Supplier header row: (AP-XXX) name | amount | 0 | amount
    const apMatch = c1.match(/^\(([^)]+)\)\s*(.+)/);
    if (apMatch && !/^PP/i.test(c1) && !/^(เงินสด|โอนเงิน|เช็ค)/.test(c1)) {
      currentSupplier = { code: apMatch[1], name: apMatch[2] };
      continue;
    }
    
    // PP row
    if (/^PP\d+-\d+$/i.test(c1)) {
      currentPP = {
        pp_no: c1,
        date: fmtDate(r[1]) || '',
        supplier_code: currentSupplier?.code || '',
        supplier_name: currentSupplier?.name || '',
        amount: Number(r[2]) || 0,
        discount: Number(r[3]) || 0,
        net: Number(r[4]) || 0,
        methods: [],
      };
      records.push(currentPP);
      continue;
    }
    
    // Payment method row: เงินสด / โอนเงิน / เช็ค
    if (/^(เงินสด|โอนเงิน|เช็ค)$/.test(c1) && currentPP) {
      const method = c1;
      // เงินสด: col3=date, col6=amount
      // โอนเงิน: col3=date, col4=bank, col6=amount
      // เช็ค: col3=date, col4=bank/chqNo, col6=amount
      currentPP.methods.push({
        method: method,
        date: fmtDate(r[2]) || '',
        bank: String(r[3] || ''),
        amount: Number(r[5]) || 0,
        discount: Number(r[6]) || 0,
        net: Number(r[7]) || 0,
      });
    }
  }
  
  return records;
}

// Parser 3: ภาษีซื้อ (Buy Bills)
// Format: No | Date | INV | - | DocNo (PR/MR) | (AP-XXX) name | taxID | branch | amount | vat | other | total
function parseBuyBillsFile(result) {
  const sheet = result.sheets[result.sheetNames[0]] || [];
  const records = [];
  
  // หา header row (ตั้งแต่ "No." หรือ 1)
  let startRow = 0;
  for (let i = 0; i < Math.min(15, sheet.length); i++) {
    const r = sheet[i] || [];
    if (Number(r[0]) === 1 && r[2]) { startRow = i; break; }
  }
  
  for (let i = startRow; i < sheet.length; i++) {
    const r = sheet[i] || [];
    const no = r[0];
    if (!no || isNaN(Number(no))) continue;
    
    const docNo = String(r[4] || '').trim();
    if (!docNo) continue;
    
    const supplierRaw = String(r[5] || '').trim();
    const apMatch = supplierRaw.match(/^\(([^)]+)\)\s*(.*)/);
    
    records.push({
      no: Number(no),
      bill_date: fmtDate(r[1]) || '',
      inv_no: String(r[2] || '').trim(),
      doc_no: docNo,
      vat: classifyVat(docNo), // V / N
      supplier_code: apMatch ? apMatch[1] : '',
      supplier_name: apMatch ? apMatch[2] : supplierRaw,
      tax_id: String(r[6] || '').trim(),
      branch: String(r[7] || '').trim(),
      amount: Number(r[8]) || 0,      // ยอดก่อน VAT
      vat_amount: Number(r[9]) || 0,  // ภาษี
      other: Number(r[10]) || 0,
      total: Number(r[11]) || 0,      // รวม
    });
  }
  
  return records;
}

// Main Page: renderPPReport
// ══════════════════════════════════════════════════════════════
async function renderPPReport(el) {
  let filterVat = 'ALL';
  let filterMethod = 'ALL';
  let searchText = '';
  
  // สร้าง Merged Main จาก 3 datasets
  function rebuildMerged() {
    // key: pp_no → รวมข้อมูลจาก 3 sources
    const ppMap = {};
    
    // Seed ด้วย payments (มี bills)
    ppReport.payments.forEach(pp => {
      ppMap[pp.pp_no] = {
        pp_no: pp.pp_no,
        date: pp.date,
        supplier_code: pp.supplier_code,
        supplier_name: pp.supplier_name,
        amount: pp.amount,
        discount: pp.discount,
        net: pp.net,
        vat: '', // จะ derive จาก children
        bills: pp.bills || [],
        methods: [],
      };
    });
    
    // Merge paymentTypes (เพิ่ม methods)
    ppReport.paymentTypes.forEach(pt => {
      if (!ppMap[pt.pp_no]) {
        ppMap[pt.pp_no] = {
          pp_no: pt.pp_no,
          date: pt.date,
          supplier_code: pt.supplier_code,
          supplier_name: pt.supplier_name,
          amount: pt.amount,
          discount: pt.discount,
          net: pt.net,
          vat: '',
          bills: [],
          methods: [],
        };
      }
      ppMap[pt.pp_no].methods = pt.methods || [];
    });
    
    // Derive VAT type จาก children bills (หรือ buyBills)
    const buyMap = {};
    ppReport.buyBills.forEach(b => {
      buyMap[b.doc_no] = b;
    });
    
    Object.values(ppMap).forEach(pp => {
      // ดูว่า children bills เป็น V หรือ N
      const vatTypes = new Set();
      const resolvedBills = [];
      
      // Step 1: Classify non-PX first
      pp.bills.forEach(b => {
        const v = classifyVat(b.bill_no);
        b.vat_raw = v;
        if (v === 'V' || v === 'N') {
          vatTypes.add(v);
        }
      });
      
      // Step 2: Resolve PX based on majority of non-PX siblings
      let pxResolved = '';
      if (vatTypes.size === 1) pxResolved = Array.from(vatTypes)[0];
      else if (vatTypes.size > 1) pxResolved = 'MIX';
      
      pp.bills.forEach(b => {
        if (b.vat_raw === 'PX') {
          // ถ้าไม่มี sibling ชัดเจน ลองหาจาก buyBills
          if (pxResolved === 'V' || pxResolved === 'N') {
            b.vat = pxResolved;
          } else if (buyMap[b.bill_no]) {
            // จาก buyBills: ถ้ามี vat_amount > 0 = V, else = N
            b.vat = Number(buyMap[b.bill_no].vat_amount) > 0 ? 'V' : 'N';
          } else {
            b.vat = 'PX'; // ยังหาไม่ได้
          }
        } else {
          b.vat = b.vat_raw;
        }
        // Enrich from buyBills
        if (buyMap[b.bill_no]) {
          b.inv_no = buyMap[b.bill_no].inv_no;
          b.tax_id = buyMap[b.bill_no].tax_id;
          b.vat_amount = buyMap[b.bill_no].vat_amount;
        }
      });
      
      // Recalc vatTypes after resolving PX
      vatTypes.clear();
      pp.bills.forEach(b => { if (b.vat === 'V' || b.vat === 'N') vatTypes.add(b.vat); });
      
      if (vatTypes.size === 1) {
        pp.vat = Array.from(vatTypes)[0];
      } else if (vatTypes.size > 1) {
        pp.vat = 'MIX';
      } else {
        pp.vat = '';
      }
      
      // รวม method ออกมาเป็น summary columns
      pp.cash_date = '';
      pp.cash_amount = 0;
      pp.transfer_date = '';
      pp.transfer_bank = '';
      pp.transfer_amount = 0;
      pp.cheque_date = '';
      pp.cheque_bank = '';
      pp.cheque_amount = 0;
      pp.methods.forEach(m => {
        if (m.method === 'เงินสด') {
          pp.cash_date = m.date; pp.cash_amount = m.amount;
        } else if (m.method === 'โอนเงิน') {
          pp.transfer_date = m.date; pp.transfer_bank = m.bank; pp.transfer_amount = m.amount;
        } else if (m.method === 'เช็ค') {
          pp.cheque_date = m.date; pp.cheque_bank = m.bank; pp.cheque_amount = m.amount;
        }
      });
      
      // ── Auto-link กับ supplierPayments ที่มีเลข PP เดียวกัน ──
      const linkedSP = (supplierPayments||[]).find(sp => sp.pp_no && sp.pp_no === pp.pp_no);
      if (linkedSP) {
        pp.linked_sp = linkedSP.id;
        pp.sp_status = linkedSP.status;
        pp.sp_match_status = linkedSP.match_status;
        // Update SP เพื่อให้รู้ว่ามี PP Report เรียบร้อย
        if (linkedSP.status === 'paid') {
          linkedSP.pp_report_confirmed = true;
        }
      }
      
      // ── Auto-link กับ Transfer Log (JKN) ──
      const allTransfers = [...(transferLog.vatTransfers||[]), ...(transferLog.novatTransfers||[])];
      const linkedTransfer = allTransfers.find(t => t.pp_no === pp.pp_no);
      if (linkedTransfer) {
        pp.linked_transfer = linkedTransfer.id;
        pp.transfer_from_bank = linkedTransfer.from_bank;
        pp.transfer_nickname = linkedTransfer.nickname;
      }
    });
    
    ppReport.merged = Object.values(ppMap).sort((a, b) => (a.pp_no||'').localeCompare(b.pp_no||''));
  }

  function render() {
    // Filter
    let data = [...(ppReport.merged || [])];
    if (filterVat !== 'ALL') data = data.filter(p => p.vat === filterVat);
    if (filterMethod !== 'ALL') {
      data = data.filter(p => p.methods.some(m => m.method === filterMethod));
    }
    if (searchText) {
      const s = searchText.toLowerCase();
      data = data.filter(p => 
        (p.pp_no||'').toLowerCase().includes(s) ||
        (p.supplier_name||'').toLowerCase().includes(s) ||
        (p.supplier_code||'').toLowerCase().includes(s)
      );
    }
    
    // PERF: truncate
    const _t = truncateForRender(data);
    const visibleData = _t.visible;
    
    const totalAmount = data.reduce((s,p) => s + Number(p.net||0), 0);
    const vatCount = ppReport.merged.filter(p => p.vat === 'V').length;
    const novatCount = ppReport.merged.filter(p => p.vat === 'N').length;
    const mixCount = ppReport.merged.filter(p => p.vat === 'MIX').length;
    const pxCount = ppReport.merged.filter(p => p.vat === 'PX').length;
    const cashTotal = ppReport.merged.reduce((s,p)=>s+Number(p.cash_amount||0),0);
    const transferTotal = ppReport.merged.reduce((s,p)=>s+Number(p.transfer_amount||0),0);
    const chequeTotal = ppReport.merged.reduce((s,p)=>s+Number(p.cheque_amount||0),0);

    el.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div>
          <div class="page-title">📑 PP Report — รายงานจ่ายเจ้าหนี้</div>
          <p class="text-sm text-dim" style="margin-top:2px">${ppReport.period || 'ยังไม่ได้ import ข้อมูล'} · Import 3 ไฟล์ Smart → รวมใน Main → Export</p>
        </div>
        <div class="flex gap-2 flex-wrap">
          <button class="btn btn-primary btn-sm" id="btn-import-all">${ICONS.download} Import 3 ไฟล์ (รวด)</button>
          <button class="btn btn-success btn-sm" id="btn-save-pprpt">${ICONS.check} บันทึกเข้า Sheet</button>
          <button class="btn btn-outline btn-sm" id="btn-export-pprpt">📊 Export CSV (5 sections)</button>
          <button class="btn btn-ghost btn-sm" id="btn-clear-pprpt" style="color:var(--danger)">🗑️ ล้าง</button>
        </div>
      </div>
      
      <!-- Import buttons (รายไฟล์) -->
      <div class="card mb-3" style="padding:12px">
        <div class="text-sm font-semi mb-2">📂 Import รายไฟล์ (ถ้าต้องการ)</div>
        <div class="flex gap-2 flex-wrap">
          <button class="btn btn-outline btn-sm" id="btn-imp-pay">📄 1. การชำระเงิน.xls ${ppReport.payments.length?'<span class="badge badge-success" style="margin-left:4px">'+ppReport.payments.length+'</span>':''}</button>

          <span style="flex:1"></span>

      </div>

        ${statCard('💵 เงินสด', '฿'+fmtNum(cashTotal), '', 'var(--success)', ICONS.dollar)}
        ${statCard('🏦 โอนเงิน', '฿'+fmtNum(transferTotal), '', 'var(--info)', ICONS.card)}
        ${statCard('📝 เช็ค', '฿'+fmtNum(chequeTotal), '', 'var(--warn)', ICONS.file)}
        ${statCard('รวมทั้งหมด', '฿'+fmtNum(cashTotal+transferTotal+chequeTotal), '', 'var(--primary)', ICONS.pulse)}
      </div>
      
      ${ppReport.merged.length > 0 ? (() => {
        const linkedSp = ppReport.merged.filter(p => p.linked_sp).length;
        const unlinkedSp = ppReport.merged.filter(p => !p.linked_sp).length;
        const linkedTl = ppReport.merged.filter(p => p.linked_transfer).length;
        const unlinkedTl = ppReport.merged.filter(p => !p.linked_transfer).length;
        const pxCount = ppReport.merged.filter(p => p.vat === 'PX').length;
        
        const warnings = [];
        if (unlinkedSp > 0) warnings.push(`<strong>⚠️ ${unlinkedSp} PP</strong> ยังไม่มีใน "จ่ายเจ้าหนี้"`);
        if (unlinkedTl > 0) warnings.push(`<strong>📋 ${unlinkedTl} PP</strong> ยังไม่มีใน Transfer Log`);
        if (pxCount > 0) warnings.push(`<strong>🔶 ${pxCount} PP</strong> มี PX ที่ระบุ VAT ไม่ได้`);
        
        return warnings.length > 0 ? `
          <div class="card mb-3" style="border-left:4px solid var(--warn);padding:12px">
            <div class="flex justify-between items-center flex-wrap gap-2">
              <div style="flex:1;min-width:250px">
                <div class="font-semi">ต้องดำเนินการ:</div>
                <div class="text-xs text-muted mt-1" style="line-height:1.8">
                  ${warnings.join('<br>')}
                </div>
                <div class="text-xs" style="margin-top:6px;color:var(--success)">
                  ✓ SP Linked: ${linkedSp} · 📋 TL Linked: ${linkedTl} / ${ppReport.merged.length} PP
                </div>
              </div>
              <div class="flex gap-2 flex-wrap">
                ${unlinkedSp > 0 ? `<button class="btn btn-primary btn-sm" id="btn-bulk-create-sp">${ICONS.plus} สร้างใน "จ่ายเจ้าหนี้"</button>` : ''}
                ${unlinkedTl > 0 && transferLog.vatTransfers.length + transferLog.novatTransfers.length > 0 ? `<button class="btn btn-outline btn-sm" id="btn-relink-tl">🔄 Re-link TL</button>` : ''}
              </div>
            </div>
          </div>
        ` : `
          <div class="card mb-3" style="border-left:4px solid var(--success);padding:10px 14px">
            <div class="text-sm" style="color:var(--success)">✅ ทุกอย่างเชื่อมครบ — SP: ${linkedSp}/${ppReport.merged.length} · TL: ${linkedTl}/${ppReport.merged.length}</div>
          </div>
        `;
      })() : ''}
      
      <!-- Filters -->
      <div class="flex gap-2 mb-2 flex-wrap items-center">
        <input class="input" id="pp-search" placeholder="ค้นหา PP / Supplier" value="${searchText}" style="width:240px">
        <span class="text-xs text-dim">VAT:</span>
        <button class="pill ${filterVat==='ALL'?'active':''}" data-fv="ALL">ทั้งหมด</button>
        <button class="pill ${filterVat==='V'?'active':''}" data-fv="V" style="--pill-color:#4f9cf9">🔵 V (VAT)</button>
        <button class="pill ${filterVat==='N'?'active':''}" data-fv="N" style="--pill-color:#8e44ad">🟣 N (NOVAT)</button>
        ${mixCount > 0 ? `<button class="pill ${filterVat==='MIX'?'active':''}" data-fv="MIX" style="--pill-color:var(--warn)">⚠️ MIX</button>` : ''}
        <span class="text-xs text-dim">วิธีชำระ:</span>
        <button class="pill ${filterMethod==='ALL'?'active':''}" data-fm="ALL">ทั้งหมด</button>
        <button class="pill ${filterMethod==='เงินสด'?'active':''}" data-fm="เงินสด">💵 เงินสด</button>
        <button class="pill ${filterMethod==='โอนเงิน'?'active':''}" data-fm="โอนเงิน">🏦 โอน</button>
        <button class="pill ${filterMethod==='เช็ค'?'active':''}" data-fm="เช็ค">📝 เช็ค</button>
      </div>

      <!-- Main Table (หน้า Main) -->
      <div class="card-flat">
        <div style="padding:10px 16px;border-bottom:1px solid var(--border)" class="flex justify-between items-center">
          <span class="font-semi text-sm">📋 Main — รวม 3 ไฟล์ (${data.length} / ${ppReport.merged.length} PP)</span>
          <span class="text-xs text-muted">Export ได้ที่ด้านบน</span>
        </div>
        <div class="table-wrap" style="max-height:540px;overflow-y:auto;overflow-x:auto">
          <table style="min-width:1500px">
            <thead>
              <tr>
                <th style="width:40px">#</th>
                <th style="text-align:center;width:60px">VAT</th>
                <th>เลข PP</th>
                <th>วันที่</th>
                <th>ลูกค้า (Supplier)</th>
                <th style="text-align:right">ยอด</th>
                <th style="text-align:right">ส่วนลด</th>
                <th style="text-align:right">รวมชำระ</th>
                <th>💵 เงินสด</th>
                <th>🏦 โอนเงิน</th>
                <th>📝 เช็ค</th>
                <th style="text-align:center">บิลที่ตัด</th>
                <th style="text-align:center" title="SP = จ่ายเจ้าหนี้ในระบบ / TL = Transfer Log JKN">🔗 ระบบ</th>
              </tr>
            </thead>
            <tbody>
              ${data.length === 0 ? 
                `<tr><td colspan="13" style="text-align:center;padding:40px;color:var(--text3)">
                  ${ppReport.merged.length === 0 ? 
                    'ยังไม่มีข้อมูล — กด <strong>"📥 Import 3 ไฟล์ (รวด)"</strong> ด้านบน' :
                    'ไม่พบข้อมูลในเงื่อนไขที่กรอง'}
                </td></tr>` :
                visibleData.map((p, idx) => {
                  const vatColor = p.vat === 'V' ? '#4f9cf9' : p.vat === 'N' ? '#8e44ad' : p.vat === 'MIX' ? 'var(--warn)' : p.vat === 'PX' ? 'var(--warn)' : 'var(--text3)';
                  // 3-way status: Supplier Payment (ระบบ) + Transfer Log (JKN file) + Statement Match
                  const spIcon = p.linked_sp 
                    ? (p.sp_match_status === 'matched' ? '<span class="badge" style="background:var(--success-bg);color:var(--success);font-size:.65rem;padding:2px 5px" title="Matched กับ Statement">✓ SP</span>' 
                      : '<span class="badge" style="background:var(--info-bg);color:var(--info);font-size:.65rem;padding:2px 5px" title="มีในจ่ายเจ้าหนี้">🔗 SP</span>') 
                    : '<span class="badge" style="background:rgba(244,180,26,.15);color:var(--warn);font-size:.65rem;padding:2px 5px" title="ยังไม่อยู่ในจ่ายเจ้าหนี้">⚠ SP</span>';
                  const tlIcon = p.linked_transfer 
                    ? '<span class="badge" style="background:rgba(138,92,246,.15);color:#8a5cf6;font-size:.65rem;padding:2px 5px" title="มีใน Transfer Log JKN">📋 TL</span>' 
                    : '<span class="badge badge-muted" style="font-size:.65rem;padding:2px 5px" title="ยังไม่อยู่ใน Transfer Log">— TL</span>';
                  return `<tr>
                    <td class="text-xs text-muted">${idx+1}</td>
                    <td style="text-align:center"><span class="badge" style="background:${vatColor}22;color:${vatColor};font-size:.75rem;font-weight:700">${p.vat||'-'}</span></td>
                    <td style="font-family:var(--mono);font-weight:600;color:var(--text)">${p.pp_no}</td>
                    <td class="text-xs">${fmtDate(p.date)}</td>
                    <td>
                      <div class="font-semi text-sm">${p.supplier_name}</div>
                      <div class="text-xs text-muted">${p.supplier_code}</div>
                    </td>
                    <td style="text-align:right">฿${fmtNum(p.amount)}</td>
                    <td style="text-align:right;color:${p.discount>0?'var(--danger)':'var(--text3)'}">${p.discount>0?'-':''}฿${fmtNum(p.discount)}</td>
                    <td style="text-align:right;font-weight:700;color:var(--success)">฿${fmtNum(p.net)}</td>
                    <td class="text-xs">${p.cash_amount>0?`<div>${fmtDate(p.cash_date)}</div><div style="color:var(--text);font-weight:600">฿${fmtNum(p.cash_amount)}</div>`:'-'}</td>
                    <td class="text-xs">${p.transfer_amount>0?`<div>${fmtDate(p.transfer_date)}</div><div style="color:var(--text2)">${p.transfer_bank||''}</div><div style="color:var(--text);font-weight:600">฿${fmtNum(p.transfer_amount)}</div>`:'-'}</td>
                    <td class="text-xs">${p.cheque_amount>0?`<div>${fmtDate(p.cheque_date)}</div><div style="color:var(--text2)">${p.cheque_bank||''}</div><div style="color:var(--text);font-weight:600">฿${fmtNum(p.cheque_amount)}</div>`:'-'}</td>
                    <td style="text-align:center">
                      <button class="btn btn-ghost btn-sm btn-pp-expand" data-pp="${p.pp_no}" title="ดูบิลที่ตัด">
                        <span class="badge badge-muted">${p.bills.length}</span>
                      </button>
                    </td>
                    <td style="text-align:center">
                      <div style="display:flex;flex-direction:column;gap:2px;align-items:center">
                        ${spIcon}
                        ${tlIcon}
                      </div>
                    </td>
                  </tr>`;
                }).join('')
              }
            </tbody>
          </table>
        </div>
        <div class="flex justify-between items-center" style="padding:10px 14px;border-top:1px solid var(--border)">
          <span class="text-sm text-dim">
            ${visibleData.length} / ${data.length} (จาก ${ppReport.merged.length})
            ${truncationFooter(data.length)}
          </span>
          <span class="font-bold">รวม: ฿${fmtNum(totalAmount)}</span>
        </div>
      </div>
    `;

    // Handlers
    document.getElementById('pp-search')?.addEventListener('input', debounce(e => { searchText = e.target.value; render(); }, 300));
    el.querySelectorAll('.pill[data-fv]').forEach(btn => {
      btn.addEventListener('click', () => { filterVat = btn.dataset.fv; render(); });
    });
    el.querySelectorAll('.pill[data-fm]').forEach(btn => {
      btn.addEventListener('click', () => { filterMethod = btn.dataset.fm; render(); });
    });
    
    // Import buttons
    document.getElementById('btn-imp-pay')?.addEventListener('click', () => {
      triggerFileUpload('file-sales', async (result, name) => {
        const { records, period } = parsePaymentFile(result);
        ppReport.payments = records;
        if (period) ppReport.period = period;
        rebuildMerged();
        persistMainState();
        toast(`นำเข้า "การชำระเงิน" สำเร็จ — ${records.length} PP`, 'success');
        render();
      });
    });
    document.getElementById('btn-imp-paytype')?.addEventListener('click', () => {
      triggerFileUpload('file-sales', async (result, name) => {
        const records = parsePaymentTypeFile(result);
        ppReport.paymentTypes = records;
        rebuildMerged();
        persistMainState();
        toast(`นำเข้า "ประเภทชำระ" สำเร็จ — ${records.length} PP`, 'success');
        render();
      });
    });
    document.getElementById('btn-imp-buybills')?.addEventListener('click', () => {
      triggerFileUpload('file-sales', async (result, name) => {
        const records = parseBuyBillsFile(result);
        ppReport.buyBills = records;
        rebuildMerged();
        persistMainState();
        toast(`นำเข้า "ภาษีซื้อ" สำเร็จ — ${records.length} บิล`, 'success');
        render();
      });
    });
    
    // Import All (3 ไฟล์รวด)
    document.getElementById('btn-import-all')?.addEventListener('click', () => {
      openImportAllModal();
    });
    
    // Clear
    document.getElementById('btn-clear-pprpt')?.addEventListener('click', () => {
      if (!confirm('ล้างข้อมูล PP Report ทั้งหมด?')) return;
      ppReport = { period:'', payments:[], paymentTypes:[], buyBills:[], merged:[] };
      persistMainState();
      toast('ล้างแล้ว', 'success');
      render();
    });
    
    // Export
    document.getElementById('btn-export-pprpt')?.addEventListener('click', () => {
      exportPPReport();
    });
    
    // Save to backend (Google Sheets)
    document.getElementById('btn-save-pprpt')?.addEventListener('click', async () => {
      if (ppReport.merged.length === 0) { toast('ยังไม่มีข้อมูล', 'error'); return; }
      toast('กำลังบันทึกเข้า Google Sheets...', 'info');
      const res = await api('savePPReport', { data: ppReport });
      if (res.success) {
        toast(`บันทึกสำเร็จ — Main ${res.data?.merged||0} PP · Payment ${res.data?.payments||0} · Type ${res.data?.paymentTypes||0} · BuyBills ${res.data?.buyBills||0}`, 'success');
      } else {
        toast(res.error || 'บันทึกไม่สำเร็จ', 'error');
      }
    });
    
    // Expand PP to show bills
    el.querySelectorAll('.btn-pp-expand').forEach(btn => {
      btn.addEventListener('click', () => {
        const pp = ppReport.merged.find(x => x.pp_no === btn.dataset.pp);
        if (!pp) return;
        showPPDetailModal(pp);
      });
    });
    
    // ── Re-link with Transfer Log ──
    document.getElementById('btn-relink-tl')?.addEventListener('click', () => {
      rebuildMerged();
      persistMainState();
      toast('เชื่อม Transfer Log ใหม่เรียบร้อย', 'success');
      render();
    });
    
    // ── Bulk create supplier payments from PP Report ──
    document.getElementById('btn-bulk-create-sp')?.addEventListener('click', () => {
      const unlinked = ppReport.merged.filter(p => !p.linked_sp);
      if (unlinked.length === 0) { toast('ทุก PP link แล้ว', 'info'); return; }
      
      openModal(`➕ สร้างรายการจ่ายเจ้าหนี้ — ${unlinked.length} รายการ`, `
        <div class="flex-col gap-3">
          <p class="text-sm text-dim">ระบบจะสร้างรายการในหน้า "จ่ายเจ้าหนี้" อัตโนมัติ สำหรับ PP ${unlinked.length} รายการที่ยังไม่มีในระบบ (status: paid)</p>
          
          <div style="padding:10px;background:rgba(79,156,249,.08);border-radius:8px">
            <div class="text-sm"><strong>จะสร้าง:</strong></div>
            <div class="text-xs text-muted" style="margin-top:4px">
              • VAT (KBANK/BBL): ${unlinked.filter(p=>p.vat==='V').length} รายการ<br>
              • NOVAT (BBL NW): ${unlinked.filter(p=>p.vat==='N').length} รายการ<br>
              • MIX/Unknown: ${unlinked.filter(p=>p.vat==='MIX'||!p.vat).length} รายการ
            </div>
          </div>
          
          <div class="input-group">
            <label>ระบุบัญชีบริษัทเริ่มต้น</label>
            <div class="flex gap-2">
              <select class="select flex-1" id="bc-vat-bank">
                <option value="KBANK">VAT → KBANK</option>
                <option value="BBL">VAT → BBL</option>
              </select>
              <select class="select flex-1" id="bc-novat-bank" disabled>
                <option value="BBL NW" selected>NOVAT → BBL NW</option>
              </select>
            </div>
            <div class="text-xs text-muted mt-1">บัญชีจะถูกใช้ในรายการที่สร้าง (แก้ไขรายตัวได้ภายหลัง)</div>
          </div>
          
          <div class="flex gap-2 mt-2">
            <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
            <button class="btn btn-primary btn-sm flex-1" id="bc-confirm">${ICONS.check} สร้าง ${unlinked.length} รายการ</button>
          </div>
        </div>
      `);
      
      document.getElementById('bc-confirm')?.addEventListener('click', () => {
        const vatBank = document.getElementById('bc-vat-bank').value;
        let created = 0;
        
        unlinked.forEach(pp => {
          // Determine VAT: ถ้า MIX/unknown → default VAT
          const vat = pp.vat === 'N' ? 'NOVAT' : 'VAT';
          const bank = vat === 'NOVAT' ? 'BBL NW' : vatBank;
          
          // หา supplier ใน master (ถ้ามี)
          const sup = supplierList.find(s => s.code === pp.supplier_code);
          
          // Determine method จาก PP Report
          let method = 'โอนเงิน';
          let transfer_date = pp.transfer_date;
          let reference = '';
          if (pp.cash_amount > 0 && pp.transfer_amount === 0 && pp.cheque_amount === 0) {
            method = 'เงินสด';
            transfer_date = pp.cash_date;
          } else if (pp.cheque_amount > 0 && pp.transfer_amount === 0 && pp.cash_amount === 0) {
            method = 'เช็ค';
            transfer_date = pp.cheque_date;
            reference = pp.cheque_bank || '';
          }
          
          supplierPayments.push({
            id: 'PP-' + pp.pp_no,
            supplier_id: sup?.id || '',
            supplier_name: pp.supplier_name,
            supplier_account: sup?.account_no || '',
            supplier_bank: sup?.bank || pp.transfer_bank || pp.cheque_bank || '',
            vat: vat,
            amount: Number(pp.net) || 0,
            invoice_no: (pp.bills && pp.bills[0]?.inv_no) || '',
            bank: bank,
            scheduled_date: '',
            status: 'paid', // import มาแล้วคือโอนเสร็จแล้ว
            pp_no: pp.pp_no,
            reference: reference,
            transfer_date: transfer_date,
            note: `นำเข้าจาก PP Report (${pp.bills.length} บิล)${pp.vat==='MIX'?' · ⚠️ MIX VAT':''}`,
            match_status: 'pending',
            match_stmt_ref: '',
            created_by: currentUser?.display_name || 'Admin',
            created_at: new Date().toISOString(),
            created_date: todayISO(),
            paid_by: currentUser?.display_name || 'Admin',
            paid_at: new Date().toISOString(),
            imported_from_pp_report: true,
          });
          created++;
        });
        
        rebuildMerged();
        persistMainState();
        closeModal();
        toast(`สร้าง ${created} รายการใน "จ่ายเจ้าหนี้" สำเร็จ — รอ Match กับ Statement`, 'success');
        render();
      });
    });
  }
  
  // Modal: Import 3 ไฟล์รวด
  function openImportAllModal() {
    let filePayment = null, filePaymentType = null, fileBuyBills = null;
    
    openModal('📥 Import 3 ไฟล์ Smart รวด', `
      <div class="flex-col gap-3">
        <p class="text-sm text-dim">เลือกทั้ง 3 ไฟล์ (หรือจะ import ทีละไฟล์ภายหลังก็ได้)</p>
        
        <div class="input-group">
          <label>1. การชำระเงิน.xls (Payment) *</label>
          <input type="file" class="input" id="fa-pay" accept=".xls,.xlsx,.xlsm">
          <div class="text-xs text-muted" style="margin-top:2px">มี PP header + MR/PR children</div>
        </div>
        
        <div class="input-group">
          <label>2. การชำระเงิน_ประเภทชำระ.xls (Payment Type) *</label>
          <input type="file" class="input" id="fa-paytype" accept=".xls,.xlsx,.xlsm">
          <div class="text-xs text-muted" style="margin-top:2px">มีวิธีการชำระ (เงินสด/โอน/เช็ค + ธนาคาร)</div>
        </div>
        
        <div class="input-group">
          <label>3. ภาษีซื้อ.xls (Buy Bills) <span class="text-muted" style="font-weight:normal">(optional)</span></label>
          <input type="file" class="input" id="fa-buybills" accept=".xls,.xlsx,.xlsm">
          <div class="text-xs text-muted" style="margin-top:2px">ละเอียดใบเสร็จ + tax id + VAT amount</div>
        </div>
        
        <div class="flex gap-2 mt-2">
          <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
          <button class="btn btn-primary btn-sm flex-1" id="fa-import">${ICONS.check} Import ทั้งหมด</button>
        </div>
      </div>
    `);
    
    document.getElementById('fa-import')?.addEventListener('click', async () => {
      const f1 = document.getElementById('fa-pay').files[0];
      const f2 = document.getElementById('fa-paytype').files[0];
      const f3 = document.getElementById('fa-buybills').files[0];
      
      if (!f1 && !f2 && !f3) { toast('เลือกอย่างน้อย 1 ไฟล์', 'error'); return; }
      
      toast('กำลังอ่านไฟล์...', 'info');
      
      try {
        if (f1) {
          const r = await parseExcelFile(f1);
          const { records, period } = parsePaymentFile(r);
          ppReport.payments = records;
          if (period) ppReport.period = period;
        }
        if (f2) {
          const r = await parseExcelFile(f2);
          ppReport.paymentTypes = parsePaymentTypeFile(r);
        }
        if (f3) {
          const r = await parseExcelFile(f3);
          ppReport.buyBills = parseBuyBillsFile(r);
        }
        
        rebuildMerged();
        persistMainState();
        closeModal();
        
        const msgs = [];
        if (ppReport.payments.length) msgs.push(`Payment: ${ppReport.payments.length} PP`);
        if (ppReport.paymentTypes.length) msgs.push(`Type: ${ppReport.paymentTypes.length} PP`);
        if (ppReport.buyBills.length) msgs.push(`BuyBills: ${ppReport.buyBills.length} บิล`);
        toast(`Import สำเร็จ — ${msgs.join(' · ')} → รวม Main: ${ppReport.merged.length} PP`, 'success');
        render();
      } catch (err) {
        toast('อ่านไฟล์ไม่สำเร็จ: ' + err.message, 'error');
      }
    });
  }
  
  // Modal: ดู PP detail
  function showPPDetailModal(pp) {
    const vatColor = pp.vat === 'V' ? '#4f9cf9' : pp.vat === 'N' ? '#8e44ad' : 'var(--warn)';
    openModal(`📄 ${pp.pp_no} — ${pp.supplier_name}`, `
      <div class="flex-col gap-3">
        <div style="padding:10px;background:rgba(79,156,249,.05);border-radius:8px">
          <div class="flex justify-between items-center">
            <div>

  // Export: สร้าง CSV หลาย section (เหมือน xlsm ต้นฉบับ)
  function exportPPReport() {
    if (ppReport.merged.length === 0) { toast('ยังไม่มีข้อมูลให้ export', 'error'); return; }
    
    const lines = [];
    const esc = v => { v = v == null ? '' : String(v); return v.includes(',') || v.includes('"') || v.includes('\n') ? `"${v.replace(/"/g,'""')}"` : v; };
    
    lines.push('รายงาน - การชำระเงิน (PP Report)');
    lines.push(`ช่วง: ${ppReport.period || '-'}`);
    lines.push(`Export: ${new Date().toLocaleString('th-TH')}`);
    lines.push('');
    
    // Main sheet
    lines.push('=== Main (รวม) ===');
    lines.push(['#','VAT','เลข PP','วันที่','รหัส','ชื่อ Supplier','ยอด','ส่วนลด','รวมชำระ','เงินสด วันที่','เงินสด ยอด','โอนเงิน วันที่','โอนเงิน ธนาคาร','โอนเงิน ยอด','เช็ค วันที่','เช็ค ธนาคาร','เช็ค ยอด'].map(esc).join(','));
    ppReport.merged.forEach((p, i) => {
      lines.push([
        i+1, p.vat, p.pp_no, fmtDate(p.date), p.supplier_code, p.supplier_name,
        p.amount, p.discount, p.net,
        fmtDate(p.cash_date), p.cash_amount || 0,
        fmtDate(p.transfer_date), p.transfer_bank, p.transfer_amount || 0,
        fmtDate(p.cheque_date), p.cheque_bank, p.cheque_amount || 0
      ].map(esc).join(','));
    });
    lines.push('');
    
    // 1. Payment (PP + children)
    lines.push('=== 1. Payment ===');
    lines.push(['เลขเอกสาร','วันที่','เอกสารอ้างอิง วันครบกำหนด','หมายเหตุ','จำนวนเงิน','ส่วนลด','อื่นๆ','สุทธิ'].map(esc).join(','));
    ppReport.payments.forEach(pp => {
      lines.push([pp.pp_no, fmtDate(pp.date), '', pp.supplier_name, pp.amount, pp.discount, '', pp.net].map(esc).join(','));
      (pp.bills || []).forEach(b => {
        lines.push([b.bill_no, fmtDate(b.bill_date), fmtDate(b.due_date), b.note, b.amount, b.discount, b.other, b.net].map(esc).join(','));
      });
    });
    lines.push('');
    
    // 2. Payment Type
    lines.push('=== 2. Payment Type ===');
    lines.push(['เลข PP','วันที่','รหัส','ชื่อ','วิธีชำระ','วันที่','ธนาคาร','ยอด'].map(esc).join(','));
    ppReport.paymentTypes.forEach(pp => {
      (pp.methods || []).forEach(m => {
        lines.push([pp.pp_no, fmtDate(pp.date), pp.supplier_code, pp.supplier_name, m.method, fmtDate(m.date), m.bank, m.amount].map(esc).join(','));
      });
    });
    lines.push('');
    
    // 3. Buy Bills
    if (ppReport.buyBills.length > 0) {
      lines.push('=== 3. Buy Bills (ภาษีซื้อ) ===');
      lines.push(['No.','วันที่','INV','เลขเอกสาร','VAT','รหัส','ชื่อ Supplier','เลขภาษี','สาขา','ก่อน VAT','VAT','อื่นๆ','รวม'].map(esc).join(','));
      ppReport.buyBills.forEach(b => {
        lines.push([b.no, fmtDate(b.bill_date), b.inv_no, b.doc_no, b.vat, b.supplier_code, b.supplier_name, b.tax_id, b.branch, b.amount, b.vat_amount, b.other, b.total].map(esc).join(','));
      });
    }
    
    const blob = new Blob(['\uFEFF' + lines.join('\n')], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `PPReport_${ppReport.period.replace(/\//g,'-').replace(/\s/g,'_') || todayISO()}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    toast('Export PP Report สำเร็จ', 'success');
  }
  
  // Build merged on load if needed
  if (ppReport.merged.length === 0 && (ppReport.payments.length > 0 || ppReport.paymentTypes.length > 0)) {
    rebuildMerged();
  }
  
  render();
}
