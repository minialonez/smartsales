  // ── Helper: สร้าง row ที่กรอกเอง (cashIn, cashOut, returns) ──
  function buildSumRow(key, label, color, editable) {
    const vals = SUMMARY_STATIONS.map(s => Number(mainSummary[key+'_'+s]) || 0);
    const allSum = vals.reduce((a,b)=>a+b,0);
    return `<tr>
      <td style="text-align:right;font-weight:700">${allSum?fmtNum(allSum):'-'}</td>
      <td style="font-weight:600;color:${color}">${label}</td>
      ${SUMMARY_STATIONS.map((s,i)=>{
        // cashIn: Front1-4 + Invoice, cashOut: Front1 + Invoice, returns: Front1-3 + Invoice
        const allowedStations = {
          cashIn: ['Front1','Front2','Front3','Front4','Invoice'],
          cashOut: ['Front1','Invoice'],
          returns: ['Front1','Front2','Front3','Front4','Invoice'],
        };
        const allowed = (allowedStations[key] || []).includes(s);
        if (!allowed) return `<td></td>`;
        return `<td><input class="input sum-cell" data-k="${key}_${s}" type="number" value="${mainSummary[key+'_'+s]||''}" step="0.01" placeholder="0" style="width:95%;padding:3px 6px;font-size:.78rem;text-align:right;border-color:${color}"></td>`;
      }).join('')}
    </tr>`;
  }

  // ── Helper: Cash Drawer row (คำนวณอัตโนมัติจากบิล Type=Cash) ──
  function buildCashDrawerRow() {
    const vals = SUMMARY_STATIONS.map(s => calcCashFromBills(s));
    const allSum = vals.reduce((a,b)=>a+b,0);
    return `<tr>
      <td style="text-align:right;font-weight:700">${allSum?fmtNum(allSum):'-'}</td>
      <td style="font-weight:600;color:var(--purple)">🗃️ Cash Drawer</td>
      ${SUMMARY_STATIONS.map((s,i)=>{
        if (['Invoice Credit', 'Order Credit'].includes(s)) return `<td></td>`;
        return `<td style="text-align:right;color:${vals[i]?'var(--purple)':'var(--text3)'};font-weight:${vals[i]?'600':'400'}">${vals[i]?fmtNum(vals[i]):'-'}</td>`;
      }).join('')}
    </tr>`;
  }

  // ── Helper: Auto row (Transfer/Card/Cheque/Refund) ──
  function buildAutoRow(type, label, color) {
    const vals = SUMMARY_STATIONS.map(s => calcAutoValue(type, s));
    const allSum = vals.reduce((a,b)=>a+b,0);
    return `<tr>
      <td style="text-align:right;font-weight:700">${allSum?fmtNum(allSum):'-'}</td>
      <td style="font-weight:600;color:${color}">${label}</td>
      ${SUMMARY_STATIONS.map((s,i)=>{
        if (['Invoice Credit', 'Order Credit'].includes(s)) return `<td></td>`;
        return `<td style="text-align:right;color:${vals[i]?color:'var(--text3)'};font-weight:${vals[i]?'600':'400'}">${vals[i]?fmtNum(vals[i]):'-'}</td>`;
      }).join('')}
    </tr>`;
  }

  // ── Bind events ──
  function bindMainEvents() {
    // Buttons
    document.getElementById('btn-gen-smart')?.addEventListener('click', () => {
      triggerFileUpload('file-sales', generateBillList);
    });
    document.getElementById('btn-import-pos')?.addEventListener('click', () => {
      triggerFileUpload('file-sales', parseFrontPosReport);
    });
    document.getElementById('btn-toggle-change')?.addEventListener('click', () => {
      showChange = !showChange; render();
    });
    document.getElementById('btn-clear-bl')?.addEventListener('click', () => {
      if (confirm('ล้างข้อมูล Bill List ทั้งหมด?')) { billList = []; persistMainState(); render(); }
    });

    // Date range filter handlers
    document.getElementById('filter-date-from')?.addEventListener('change', e => { filterDateFrom = e.target.value; render(); });
    document.getElementById('filter-date-to')?.addEventListener('change', e => { filterDateTo = e.target.value; render(); });
    document.getElementById('btn-clear-date')?.addEventListener('click', () => { filterDateFrom = ''; filterDateTo = ''; render(); });
    document.getElementById('btn-hide-paid')?.addEventListener('click', () => { hidePaid = !hidePaid; render(); });

    // ── เพิ่มบิลเอง ──
    document.getElementById('btn-add-bill')?.addEventListener('click', () => {
      openModal('➕ เพิ่มบิลด้วยตัวเอง', `
        <div class="flex-col gap-3">
          <div class="flex gap-2">
            <div class="input-group flex-1">
              <label>Bill Number</label>
              <input class="input" id="ab-bill" placeholder="เช่น SS00126-xxx หรือ MANUAL-001">
            </div>
            <div class="input-group flex-1">
              <label>Bill Date</label>
              <input type="date" class="input" id="ab-date" value="${todayISO()}">
            </div>
          </div>
          <div class="flex gap-2">
            <div class="input-group flex-1">
              <label>Station</label>
              <select class="select" id="ab-station">
                ${STATION_OPTIONS.map(o=>`<option value="${o}">${o||'(เลือก)'}</option>`).join('')}
              </select>
            </div>
            <div class="input-group flex-1">
              <label>Type</label>
              <select class="select" id="ab-type">
                ${TYPE_OPTIONS.map(o=>`<option value="${o}">${o||'(เลือก)'}</option>`).join('')}
              </select>
            </div>
            <div class="input-group flex-1">
              <label>Baht</label>
              <input type="number" class="input" id="ab-amount" placeholder="0.00" step="0.01">
            </div>
          </div>
          <div class="flex gap-2">
            <div class="input-group flex-1">
              <label>Bank</label>
              <select class="select" id="ab-bank">
                ${['','KTB','KBANK','BBL','SCB','BAY','TMB','Other'].map(o=>`<option value="${o}">${o||'-'}</option>`).join('')}
              </select>
            </div>
            <div class="input-group flex-1">
              <label>Due Date</label>
              <input type="date" class="input" id="ab-due">
            </div>
          </div>
          <div class="input-group">
            <label>Remarks</label>
            <input class="input" id="ab-remarks" placeholder="หมายเหตุ">
          </div>
          <div class="flex gap-2 mt-2">
            <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
            <button class="btn btn-primary btn-sm flex-1" id="ab-confirm">${ICONS.check} บันทึก</button>
          </div>
        </div>
      `);

      document.getElementById('ab-confirm')?.addEventListener('click', () => {
        const newBill = {
          bill_no: document.getElementById('ab-bill').value.trim() || 'MANUAL-' + Date.now(),
          date: document.getElementById('ab-date').value,
          station: document.getElementById('ab-station').value,
          type: document.getElementById('ab-type').value,
          amount: Number(document.getElementById('ab-amount').value) || 0,
          confirmation: '',
          pay_date: '',
          remarks1: document.getElementById('ab-remarks').value,
          remarks2: '',
          bank: document.getElementById('ab-bank').value,
          due_date: document.getElementById('ab-due').value,
          match_status: 'pending',
          source: 'manual',
        };
        billList.push(newBill);
        persistMainState();
        closeModal();
        toast('เพิ่มบิลสำเร็จ', 'success');
        render();
      });
    });

    // ── Bulk ตั้งวันที่ ──
    document.getElementById('btn-bulk-date')?.addEventListener('click', () => {
      const visible = filterStation === 'ALL' && filterType === 'ALL' ? billList : 
        billList.filter(b => (filterStation === 'ALL' || b.station === filterStation) && (filterType === 'ALL' || b.type === filterType));
      
      openModal('📅 ตั้งวันที่แบบ Bulk', `
        <div class="flex-col gap-3">
          <p class="text-sm text-dim">จะแก้ไข ${visible.length} รายการ (ตาม filter ปัจจุบัน)</p>
          <div class="input-group">
            <label>ช่องที่ต้องการแก้</label>
            <select class="select" id="bulk-field">
              <option value="date">Bill Date</option>
              <option value="pay_date">Pay Date</option>
              <option value="due_date">Due Date</option>
            </select>
          </div>
          <div class="input-group">
            <label>วันที่</label>
            <input type="date" class="input" id="bulk-value" value="${todayISO()}">
          </div>
          <div class="flex gap-2 mt-2">
            <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
            <button class="btn btn-primary btn-sm flex-1" id="bulk-confirm">${ICONS.check} ตั้งค่าทั้งหมด</button>
          </div>
        </div>
      `);

      document.getElementById('bulk-confirm')?.addEventListener('click', () => {
        const field = document.getElementById('bulk-field').value;
        const value = document.getElementById('bulk-value').value;
        if (!value) { toast('กรอกวันที่', 'error'); return; }
        let count = 0;
        billList.forEach(b => {
          if ((filterStation === 'ALL' || b.station === filterStation) && (filterType === 'ALL' || b.type === filterType)) {
            b[field] = value;
            count++;
          }
        });
        persistMainState();
        closeModal();
        toast(`ตั้งค่า ${field} สำเร็จ ${count} รายการ`, 'success');
        render();
      });
    });

    // ── Auto Due Date (วันที่ 20 เดือนถัดไปของ bill_date) ──
    document.getElementById('btn-auto-duedate')?.addEventListener('click', () => {
      let count = 0;
      billList.forEach(b => {
        // เฉพาะบิลเครดิต (Invoice Credit / Order Credit) ที่ยังไม่มี Due Date
        if ((b.station === 'Invoice Credit' || b.station === 'Order Credit') && !b.due_date && b.date) {
          const next = calcNextMonth20(b.date);
          if (next) {
            b.due_date = next;
            count++;
          }
        }
      });
      persistMainState();
      toast(`ตั้ง Due Date อัตโนมัติ ${count} รายการ (วันที่ 20 ของเดือนถัดไป)`, 'success');
      render();
    });
    // ── Check issues button (เปิด modal validation) ──
    document.getElementById('btn-check-issues')?.addEventListener('click', () => {
      const v = validateAll();
      if (v.errors.length === 0 && v.warnings.length === 0) {
        toast('✓ ไม่พบปัญหาใดๆ ข้อมูลสมบูรณ์', 'success');
      } else {
        showValidationModal(v, null);
      }
    });
    document.getElementById('val-status-bar')?.addEventListener('click', () => {
      document.getElementById('btn-check-issues')?.click();
    });
    
    document.getElementById('btn-save-main')?.addEventListener('click', async () => {
      // ── Pre-save validation ──
      const v = validateAll();
      
      if (v.errors.length > 0) {
        showValidationModal(v, null);
        return; // ห้ามบันทึก
      }
      
      if (v.warnings.length > 0) {
        // มีคำเตือน → ถามก่อน
        showValidationModal(v, async () => {
          await actuallySaveMain();
        });
        return;
      }
      
      // ไม่มีปัญหา → save เลย
      await actuallySaveMain();
    });
    
    async function actuallySaveMain() {
      toast('กำลังบันทึก...', 'info');
      const res = await api('saveDailySales', {
        date: formatDateKey(selectedDate),
        rows: billList,
        summary: mainSummary,
        cash_count: cashCount,
        created_by: currentUser?.display_name || 'Admin'
      });
      if (res.success) toast(`บันทึกสำเร็จ — ${billList.length} รายการ`, 'success');
      else toast(res.error || 'บันทึกไม่สำเร็จ', 'error');
    }
    document.getElementById('main-date')?.addEventListener('change', e => { selectedDate = e.target.value; });

    // Filter pills
    el.querySelectorAll('.pill[data-fs]').forEach(btn => {
      btn.addEventListener('click', () => { filterStation = btn.dataset.fs; render(); });
    });
    el.querySelectorAll('.pill[data-ft]').forEach(btn => {
      btn.addEventListener('click', () => { filterType = btn.dataset.ft; render(); });
    });

    // Summary cells (cashIn/cashOut/returns/sales/drawer)
    el.querySelectorAll('.sum-cell').forEach(inp => {
      inp.addEventListener('input', debounce(() => {
        mainSummary[inp.dataset.k] = parseFloat(inp.value) || 0;
        persistMainState();
        updateSumCheckRow();
        updateAllStationColumn();
      }, 200));
    });

    // Cash counting cells
    el.querySelectorAll('.cash-cell').forEach(inp => {
      inp.addEventListener('input', debounce(() => {
        const k = inp.dataset.denom + '_' + inp.dataset.station;
        cashCount[k] = parseInt(inp.value) || 0;
        persistMainState();
        // Update totals
        const denom = Number(inp.dataset.denom);
        const rowTotal = ['Front1','Front2','Front3','Front4','Invoice']
          .reduce((s, st) => s + denom * (Number(cashCount[denom+'_'+st]) || 0), 0);
        const totalEl = el.querySelector(`[data-denom-total="${denom}"]`);
        if (totalEl) totalEl.textContent = fmtNum(rowTotal);
        
        const stationTotal = calcCashDrawer(inp.dataset.station);
        const stEl = el.querySelector(`[data-station-total="${inp.dataset.station}"]`);
        if (stEl) stEl.textContent = '฿' + fmtNum(stationTotal);
        
        const grand = ['Front1','Front2','Front3','Front4','Invoice'].reduce((s,st)=>s+calcCashDrawer(st),0);
        const gEl = document.getElementById('grand-total');
        if (gEl) gEl.textContent = '฿' + fmtNum(grand);
      }, 200));
    });

    // Bill list cells — in-place edit
    el.querySelectorAll('.bl-cell').forEach(inp => {
      inp.addEventListener('change', () => {
        const tr = inp.closest('tr');
        const idx = Number(tr.dataset.idx);
        const field = inp.dataset.field;
        billList[idx][field] = inp.value;
        persistMainState();
        // ถ้าแก้ station/type → re-render เพื่ออัปเดต summary
        if (field === 'station' || field === 'type') render();
      });
    });

    // ── Copy-Down buttons ──
    el.querySelectorAll('.btn-copy-down').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = Number(btn.dataset.idx);
        const field = btn.dataset.field;
        const value = billList[idx][field];
        if (!value && value !== 0) { toast('ช่องนี้ว่าง ไม่มีอะไรให้คัดลอก', 'info'); return; }
        
        // คัดลอกลงทุกแถวที่อยู่ด้านล่าง (หลัง idx นี้) + อยู่ใน filter ปัจจุบัน
        let count = 0;
        billList.forEach((b, i) => {
          if (i <= idx) return;
          // ต้องอยู่ใน filter
          if (filterStation !== 'ALL' && b.station !== filterStation) return;
          if (filterType !== 'ALL' && b.type !== filterType) return;
          b[field] = value;
          count++;
        });
        persistMainState();
        toast(`คัดลอกลง ${count} แถว`, 'success');
        render();
      });
    });
    
    // ── Cheque bounce button ──
    el.querySelectorAll('.btn-bounce-cheque').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = Number(btn.dataset.idx);
        const b = billList[idx];
        if (!b) return;
        if (!confirm(`บันทึกว่าเช็ค ${b.bill_no||'บิลนี้'} เด้ง?\nยอด: ฿${fmtNum(b.amount)}`)) return;
        b.match_status = 'bounced';
        b.bounced_at = new Date().toISOString();
        persistMainState();
        toast('บันทึกเช็คเด้งแล้ว', 'error');
        render();
      });
    });
  }

  function updateSumCheckRow() {
    const sumRow = el.querySelectorAll('tbody tr').item(9); // row 10 (0-indexed = 9)
    if (!sumRow) return;
    const cells = sumRow.querySelectorAll('td');
    SUMMARY_STATIONS.forEach((s, i) => {
      if (!['Front1','Front2','Front3','Front4','Invoice','Invoice Credit','Order Credit'].includes(s)) return;
      const { diff, isOk } = calcSumCheck(s);
      if (cells[i + 2]) {
        cells[i + 2].textContent = isOk ? '✓ OK' : fmtNum(diff);
        cells[i + 2].style.color = isOk ? 'var(--success)' : 'var(--danger)';
      }
    });
  }

  function updateAllStationColumn() {
    // อัปเดตคอลัมน์ All Station (col 1) ของทุก row
    // (ไม่ re-render ทั้งหน้าเพื่อ performance)
  }

  render();
}

// alias สำหรับ backward compat
async function renderBillList(el) { return renderMain(el); }

// ══════════════════════════════════════════════════════════════
// Render Payments Page (SP List พร้อม Parent-Child)
// ══════════════════════════════════════════════════════════════
async function renderPayments(el) {
  let filterStatus = 'ALL';
  let searchText = '';
  let expandedSP = new Set(); // SP ที่เปิดแสดง child

  function render() {
    let data = paymentList;
    if (filterStatus !== 'ALL') data = data.filter(p => p.match_status === filterStatus);
    if (searchText) {
      const s = searchText.toLowerCase();
      data = data.filter(p => 
        (p.sp_no||'').toLowerCase().includes(s) ||
        (p.cust_name||'').toLowerCase().includes(s) ||
        (p.cust_id||'').toLowerCase().includes(s)
      );
    }

    const totalAmt = paymentList.reduce((s,p) => s + (Number(p.total)||0), 0);
    const totalChildBills = paymentList.reduce((s,p) => s + (p.bills?.length||0), 0);
    const pendingCount = paymentList.filter(p => p.match_status === 'pending').length;
    const matchedCount = paymentList.filter(p => p.match_status === 'matched').length;

    el.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div class="page-title">Payments (SP) — การชำระเงิน</div>
        <div class="flex gap-2">
          <input class="input" placeholder="ค้นหา SP / ลูกค้า" id="pay-search" value="${searchText}" style="width:240px">
          <button class="btn btn-primary btn-sm" id="btn-import-sp">${ICONS.download} นำเข้า SP</button>
          <button class="btn btn-warn btn-sm" id="btn-add-temp-sp" style="background:var(--warn);color:#fff">${ICONS.plus} SP ชั่วคราว</button>
          <button class="btn btn-outline btn-sm" id="btn-clear-pay">ล้าง</button>
          <button class="btn btn-success btn-sm" id="btn-save-pay">${ICONS.check} บันทึก</button>
        </div>
      </div>

      <p class="text-sm text-dim mb-3">นำเข้าไฟล์ SP Payment Report (.xls) หรือสร้าง SP ชั่วคราว (SP-TEMP-xxx) เมื่อเห็นเงินเข้าแต่ยังไม่มีเลข SP จริง</p>

      <!-- Summary cards -->
      <div class="flex gap-3 flex-wrap mb-3 stagger">
        ${statCard('SP ทั้งหมด', paymentList.length, '', 'var(--primary)', ICONS.file)}
        ${statCard('ยอดรวม', '฿'+fmtNum(totalAmt), '', 'var(--success)', ICONS.dollar)}
        ${statCard('บิลที่ตัด', totalChildBills, 'SS/OS/SR/OR/JR', 'var(--info)', ICONS.check)}
        ${statCard('รอ Match', pendingCount, matchedCount + ' matched', 'var(--warn)', ICONS.bar)}
      </div>

      <!-- Filter pills -->
      <div class="flex gap-2 mb-3">
        <button class="pill ${filterStatus==='ALL'?'active':''}" data-fs="ALL">ทั้งหมด (${paymentList.length})</button>
        <button class="pill ${filterStatus==='pending'?'active':''}" data-fs="pending">รอ Match (${pendingCount})</button>
        <button class="pill ${filterStatus==='matched'?'active':''}" data-fs="matched">Matched (${matchedCount})</button>
      </div>

      <div class="card-flat">
        <div class="table-wrap" style="max-height:600px;overflow-y:auto">
          <table>
            <thead>
              <tr>
                <th style="width:40px"></th>
                <th>SP Number</th>
                <th>วันที่</th>
                <th>ลูกค้า</th>
                <th style="text-align:right">ยอดรวม</th>
                <th style="text-align:center">จำนวนบิล</th>
                <th>สถานะ</th>
              </tr>
            </thead>
            <tbody>
              ${data.length === 0 ? '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text3)">ยังไม่มีข้อมูล SP — กด "นำเข้า SP" เพื่อเริ่มต้น</td></tr>' :
                data.map((p, idx) => {
                  const isOpen = expandedSP.has(p.sp_no);
                  const statusCls = p.match_status === 'matched' ? 'badge-success' : 'badge-warn';
                  const statusLabel = p.match_status === 'matched' ? '✓ Matched' : '⏳ รอ Match';
                  const isTemp = /^SP-TEMP-/.test(p.sp_no);
                  return `
                    <tr class="sp-row" data-sp="${p.sp_no}" style="cursor:pointer;${isOpen?'background:var(--surface2)':''}${isTemp?';border-left:3px solid var(--warn)':''}">
                      <td style="text-align:center">${isOpen ? '▼' : '▶'}</td>
                      <td style="font-weight:700;color:${isTemp?'var(--warn)':'var(--primary)'}">
                        ${p.sp_no}
                        ${isTemp?'<span class="badge badge-warn" style="margin-left:6px;font-size:.7rem">ชั่วคราว</span>':''}
                      </td>
                      <td class="text-xs">${fmtDate(p.date)}</td>
                      <td>
                        <div class="text-sm">${p.cust_name||'-'}</div>
                        <div class="text-xs text-muted">${p.cust_id||''}</div>
                      </td>
                      <td style="text-align:right;font-weight:700;color:var(--success)">฿${fmtNum(p.total||0)}</td>
                      <td style="text-align:center">${p.bills?.length||0} บิล</td>
                      <td>
                        <span class="badge ${statusCls}">${statusLabel}</span>
                        ${isTemp?`<button class="btn btn-primary btn-sm btn-rename-sp" data-sp="${p.sp_no}" style="margin-left:4px;padding:2px 8px;font-size:.75rem" title="แก้ไขเป็นเลข SP จริง">✏️ แก้</button>`:''}
                      </td>
                    </tr>
                    ${isOpen && p.bills?.length ? `
                      <tr><td colspan="7" style="padding:0">
                        <div style="padding:10px 20px;background:var(--surface2);border-top:2px solid var(--primary)">
                          <div class="text-xs text-dim mb-2">📎 บิลที่ SP นี้ไปตัด:</div>
                          <table style="width:100%;font-size:.85rem">
                            <thead>
                              <tr style="color:var(--text2)">
                                <th style="text-align:left">Bill Number</th>
                                <th style="text-align:left">วันที่บิล</th>
                                <th style="text-align:left">ครบกำหนด</th>
                                <th style="text-align:left">ประเภท</th>
                                <th style="text-align:right">ยอด</th>
                                <th style="text-align:center">หมวด</th>
                              </tr>
                            </thead>
                            <tbody>
                              ${p.bills.map(b => {
                                const bType = (b.bill_no||'').substring(0,2).toUpperCase();
                                const catMap = {
                                  SS: {label:'ขายสด', color:'var(--success)'},
                                  OS: {label:'Order สด', color:'var(--success)'},
                                  SR: {label:'ขายเครดิต', color:'var(--warn)'},
                                  OR: {label:'Order เครดิต', color:'var(--warn)'},
                                  JR: {label:'ลดหนี้', color:'var(--danger)'},
                                  SC: {label:'คืนสินค้า', color:'var(--danger)'},
                                  JS: {label:'JS', color:'var(--info)'},
                                };
                                const cat = catMap[bType] || {label:bType, color:'var(--text2)'};
                                return `<tr>
                                  <td style="font-weight:600;color:var(--text)">${b.bill_no}</td>
                                  <td class="text-xs">${fmtDate(b.bill_date)}</td>
                                  <td class="text-xs">${fmtDate(b.due_date)}</td>
                                  <td class="text-xs text-muted">${b.doc_type||'-'}</td>
                                  <td style="text-align:right;font-weight:600;color:${Number(b.amount)<0?'var(--danger)':'var(--text)'}">฿${fmtNum(b.amount)}</td>
                                  <td style="text-align:center"><span class="badge" style="background:${cat.color}22;color:${cat.color};border:1px solid ${cat.color}">${cat.label}</span></td>
                                </tr>`;
                              }).join('')}
                            </tbody>
                          </table>
                        </div>
                      </td></tr>
                    ` : ''}
                  `;
                }).join('')
              }
            </tbody>
          </table>
        </div>
      </div>
    `;

    // Bindings
    document.getElementById('pay-search')?.addEventListener('input', debounce(e => { searchText = e.target.value; render(); }, 300));
    document.getElementById('btn-import-sp')?.addEventListener('click', () => triggerFileUpload('file-sales', parseSPReport));
    
    // ── สร้าง SP ชั่วคราว ──
    document.getElementById('btn-add-temp-sp')?.addEventListener('click', () => {
      const tempNo = 'SP-TEMP-' + String(Date.now()).slice(-6);
      openModal('➕ สร้าง SP ชั่วคราว', `
        <div class="flex-col gap-3">
          <div class="input-group">
            <label>เลข SP ชั่วคราว</label>
            <input class="input" id="tsp-no" value="${tempNo}" placeholder="SP-TEMP-xxx">
            <div class="text-xs text-muted mt-1">ระบบจะสร้างให้อัตโนมัติ (แก้ได้) — เปลี่ยนเป็นเลขจริงภายหลังได้</div>
          </div>
          <div class="flex gap-2">
            <div class="input-group flex-1">
              <label>วันที่</label>
              <input type="date" class="input" id="tsp-date" value="${todayISO()}">
            </div>
            <div class="input-group flex-1">
              <label>ยอดเงิน</label>
              <input type="number" class="input" id="tsp-amount" placeholder="0.00" step="0.01">
            </div>
          </div>
          <div class="flex gap-2">
            <div class="input-group flex-1">
              <label>รหัสลูกค้า (ถ้ามี)</label>
              <input class="input" id="tsp-cust-id" placeholder="เช่น BA-00494">
            </div>
            <div class="input-group flex-1">
              <label>ชื่อลูกค้า</label>
              <input class="input" id="tsp-cust-name" placeholder="ชื่อลูกค้า / บริษัท">
            </div>
          </div>
          <div class="input-group">
            <label>หมายเหตุ</label>
            <input class="input" id="tsp-note" placeholder="เช่น รอเลข SP จาก Smart, โอนมา KTB ยังไม่ทราบจากใคร">
          </div>
          <div class="flex gap-2 mt-2">
            <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
            <button class="btn btn-warn btn-sm flex-1" id="tsp-confirm" style="background:var(--warn);color:#fff">${ICONS.check} สร้าง SP ชั่วคราว</button>
          </div>
        </div>
      `);
      document.getElementById('tsp-confirm')?.addEventListener('click', () => {
        const spNo = document.getElementById('tsp-no').value.trim() || tempNo;
        const amount = Number(document.getElementById('tsp-amount').value) || 0;
        if (!amount) { toast('กรอกยอดเงิน', 'error'); return; }
        paymentList.push({
          sp_no: spNo,
          date: document.getElementById('tsp-date').value,
          cust_id: document.getElementById('tsp-cust-id').value,
          cust_name: document.getElementById('tsp-cust-name').value || '(ยังไม่ทราบ)',
          amount: amount,
          total: amount,
          cash: 0,
          transfer: amount,
          cheque: 0,
          bills: [],
          match_status: 'pending',
          note: document.getElementById('tsp-note').value,
          is_temp: true,
        });
        persistMainState();
        closeModal();
        toast(`สร้าง ${spNo} สำเร็จ — อย่าลืมมาแก้เป็นเลข SP จริงภายหลัง`, 'success');
        render();
      });
    });
    
    // ── Rename SP ชั่วคราว → SP จริง ──
    el.querySelectorAll('.btn-rename-sp').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const oldSp = btn.dataset.sp;
        const sp = paymentList.find(p => p.sp_no === oldSp);
        if (!sp) return;
        
        openModal(`✏️ แก้ไขเลข SP — ${oldSp}`, `
          <div class="flex-col gap-3">
            <p class="text-sm text-dim">ใส่เลข SP จริงที่ได้จากโปรแกรม Smart — ระบบจะอัปเดต Bill List ที่ผูกไว้อัตโนมัติ</p>
            <div class="input-group">
              <label>เลข SP จริง</label>
              <input class="input" id="rename-sp-new" placeholder="เช่น SP00126-001032" autofocus>
            </div>
            <div class="flex gap-2 mt-2">
              <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
              <button class="btn btn-primary btn-sm flex-1" id="rename-sp-confirm">${ICONS.check} อัปเดตเลข SP</button>
            </div>
          </div>
        `);
        document.getElementById('rename-sp-confirm')?.addEventListener('click', () => {
          const newSp = document.getElementById('rename-sp-new').value.trim();
          if (!newSp) { toast('กรอกเลข SP ใหม่', 'error'); return; }
          if (paymentList.find(p => p.sp_no === newSp)) { toast('เลข SP นี้มีอยู่แล้ว', 'error'); return; }
          
          // เปลี่ยนใน paymentList
          sp.sp_no = newSp;
          sp.is_temp = false;
          
          // อัปเดต billList ที่ผูก paid_by_sp = oldSp → newSp
          let linked = 0;
          billList.forEach(b => {
            if (b.paid_by_sp === oldSp) { b.paid_by_sp = newSp; linked++; }
          });
          
          persistMainState();
          closeModal();
          toast(`อัปเดต ${oldSp} → ${newSp}${linked?` (อัปเดต ${linked} บิลที่ผูกไว้)`:''}`, 'success');
          render();
        });
      });
    });
    
    document.getElementById('btn-clear-pay')?.addEventListener('click', () => {
      if (confirm('ล้างข้อมูล SP ทั้งหมด?')) { paymentList = []; persistMainState(); render(); }
    });
    document.getElementById('btn-save-pay')?.addEventListener('click', async () => {
      toast('กำลังบันทึก...', 'info');
      const res = await api('savePayments', { payments: paymentList, created_by: currentUser?.display_name || 'Admin' });
      if (res.success) toast(`บันทึกสำเร็จ ${paymentList.length} SP`, 'success');
      else toast(res.error || 'บันทึกไม่สำเร็จ', 'error');
    });
    el.querySelectorAll('.pill[data-fs]').forEach(btn => {
      btn.addEventListener('click', () => { filterStatus = btn.dataset.fs; render(); });
    });
    el.querySelectorAll('.sp-row').forEach(row => {
      row.addEventListener('click', (e) => {
        // ถ้าคลิกปุ่ม rename → ไม่ toggle
        if (e.target.closest('.btn-rename-sp')) return;
        const sp = row.dataset.sp;
        if (expandedSP.has(sp)) expandedSP.delete(sp);
        else expandedSP.add(sp);
        render();
      });
    });
  }

  render();
}

// ══════════════════════════════════════════════════════════════
// Render Cashflow Page (เงินเข้าออก: Deposit, Withdrawal, Supplier, Transfer)
// ══════════════════════════════════════════════════════════════
async function renderCashflow(el) {
  let filterType = 'ALL';
  let filterDateFrom = '';
  let filterDateTo = '';

  function render() {
    let data = [...cashflowList];
    if (filterType !== 'ALL') data = data.filter(c => c.type === filterType);
    if (filterDateFrom || filterDateTo) {
      data = data.filter(c => {
        const d = toISODate(c.date);
        if (!d) return true;
        if (filterDateFrom && d < filterDateFrom) return false;
        if (filterDateTo && d > filterDateTo) return false;
        return true;
      });
    }
    // Sort: วันใหม่ก่อน
    data.sort((a,b) => (parseThaiDate(b.date)||0) - (parseThaiDate(a.date)||0));

    // Summary
    const totals = {
      deposit: cashflowList.filter(c=>c.type==='deposit').reduce((s,c)=>s+Number(c.amount||0),0),
      supplier: cashflowList.filter(c=>c.type==='supplier').reduce((s,c)=>s+Number(c.amount||0),0),
      transfer: cashflowList.filter(c=>c.type==='transfer').reduce((s,c)=>s+Number(c.amount||0),0),
      misc: cashflowList.filter(c=>c.type==='misc').reduce((s,c)=>s+Number(c.amount||0),0),
    };
    const matchedCount = cashflowList.filter(c=>c.match_status==='matched').length;

    el.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div class="page-title">💸 เงินเข้าออก (Cash Movement)</div>
        <div class="flex gap-2 flex-wrap">
          <button class="btn btn-primary btn-sm" id="btn-add-deposit" title="นำเงินสดไปฝากธนาคาร">
            ${ICONS.plus} 🏦 นำเงินฝากธนาคาร
          </button>
          <button class="btn btn-outline btn-sm" id="btn-add-supplier" style="background:rgba(239,87,87,.12);color:var(--danger);border-color:var(--danger)" title="จ่าย Supplier">
            ${ICONS.plus} 🏭 จ่าย Supplier
          </button>
          <button class="btn btn-outline btn-sm" id="btn-add-transfer" title="โอนระหว่างบัญชี">
            ${ICONS.plus} 🔄 โอนระหว่างบัญชี
          </button>
          <button class="btn btn-outline btn-sm" id="btn-add-misc" title="รายการอื่นๆ">
            ${ICONS.plus} 💫 อื่นๆ
          </button>
          <button class="btn btn-success btn-sm" id="btn-save-cashflow">${ICONS.check} บันทึก</button>
        </div>
      </div>

      <p class="text-sm text-dim mb-3">บันทึกรายการเงินเข้า-ออกที่ไม่ใช่จากการขายปกติ → ใช้ matching กับ Statement ได้</p>

      <!-- Summary Cards -->
      <div class="flex gap-3 flex-wrap mb-3 stagger">
        ${statCard('ฝากธนาคาร', '฿'+fmtNum(totals.deposit), cashflowList.filter(c=>c.type==='deposit').length+' ครั้ง', 'var(--success)', ICONS.dollar)}
        ${statCard('จ่าย Supplier', '฿'+fmtNum(totals.supplier), cashflowList.filter(c=>c.type==='supplier').length+' ครั้ง', 'var(--danger)', ICONS.card)}
        ${statCard('โอนระหว่างบัญชี', '฿'+fmtNum(totals.transfer), cashflowList.filter(c=>c.type==='transfer').length+' ครั้ง', 'var(--info)', ICONS.pulse)}
        ${statCard('อื่นๆ', '฿'+fmtNum(totals.misc), cashflowList.filter(c=>c.type==='misc').length+' ครั้ง', 'var(--warn)', ICONS.file)}
      </div>

      <!-- Filters -->
      <div class="flex gap-2 mb-3 flex-wrap items-center">
        <button class="pill ${filterType==='ALL'?'active':''}" data-ft="ALL">ทั้งหมด (${cashflowList.length})</button>
        <button class="pill ${filterType==='deposit'?'active':''}" data-ft="deposit" style="--pill-color:var(--success)">🏦 ฝาก</button>
        <button class="pill ${filterType==='supplier'?'active':''}" data-ft="supplier" style="--pill-color:var(--danger)">🏭 Supplier</button>
        <button class="pill ${filterType==='transfer'?'active':''}" data-ft="transfer" style="--pill-color:var(--info)">🔄 โอน</button>
        <button class="pill ${filterType==='misc'?'active':''}" data-ft="misc" style="--pill-color:var(--warn)">💫 อื่นๆ</button>
        <span style="flex:1"></span>
        <input type="date" class="input" id="cf-date-from" value="${filterDateFrom}" style="width:140px;font-size:.8rem" placeholder="จาก">
        <input type="date" class="input" id="cf-date-to" value="${filterDateTo}" style="width:140px;font-size:.8rem" placeholder="ถึง">
      </div>

      <!-- Table -->
      <div class="card-flat">
        <div class="table-wrap" style="max-height:520px;overflow-y:auto">
          <table>
            <thead>
              <tr>
                <th style="width:40px">#</th>
                <th>วันที่</th>
                <th>ประเภท</th>
                <th style="text-align:right">ยอดเงิน</th>
                <th>จาก / ไป</th>
                <th>ธนาคาร</th>
                <th>อ้างอิง</th>
                <th>หมายเหตุ</th>
                <th style="text-align:center">สถานะ Match</th>
                <th style="text-align:center">จัดการ</th>
              </tr>
            </thead>
            <tbody>
              ${data.length === 0 ? 
                `<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--text3)">
                  ยังไม่มีรายการ — กดปุ่มด้านบนเพื่อเพิ่ม<br>
                  <span class="text-xs">เช่น "🏦 นำเงินฝากธนาคาร" หลังปิดยอดทุกวัน</span>
                </td></tr>` :
                data.map((c, idx) => {
                  const typeInfo = {
                    deposit:   { label:'🏦 ฝาก', color:'var(--success)', dir:'เงินสด → บัญชี' },
                    supplier:  { label:'🏭 Supplier', color:'var(--danger)', dir:'บัญชี → Supplier' },
                    transfer:  { label:'🔄 โอน', color:'var(--info)', dir:'บัญชี ↔ บัญชี' },
                    misc:      { label:'💫 อื่นๆ', color:'var(--warn)', dir:'-' },
                  }[c.type] || { label:c.type, color:'var(--text2)', dir:'-' };
                  
                  const realIdx = cashflowList.indexOf(c);
                  const isMatched = c.match_status === 'matched';
                  const rowStyle = isMatched ? 'background:rgba(45,212,160,.06)' : '';
                  
                  return `<tr data-cfidx="${realIdx}" style="${rowStyle}">
                    <td class="text-xs text-muted">${idx+1}</td>
                    <td class="text-xs">${fmtDate(c.date)}</td>
                    <td><span class="badge" style="background:${typeInfo.color}22;color:${typeInfo.color}">${typeInfo.label}</span></td>
                    <td style="text-align:right;font-weight:700;color:${typeInfo.color}">
                      ${c.type==='supplier'?'-':''}฿${fmtNum(c.amount||0)}
                    </td>
                    <td class="text-xs">
                      ${c.from_account ? `<div>จาก: ${c.from_account}</div>` : ''}
                      ${c.to_account ? `<div>ไป: ${c.to_account}</div>` : ''}
                      ${c.counterparty ? `<div style="color:var(--text2)">${c.counterparty}</div>` : ''}
                    </td>
                    <td>${c.bank ? `<span class="badge" style="background:${(bankColors[c.bank]||'#555')}22;color:${bankColors[c.bank]||'#aaa'}">${c.bank}</span>` : '-'}</td>
                    <td class="text-xs" style="font-family:var(--mono)">${c.reference||'-'}</td>
                    <td class="text-xs" style="max-width:160px">${c.note||'-'}</td>
                    <td style="text-align:center">${isMatched?'<span class="badge badge-success">✓ Matched</span>':'<span class="badge badge-warn">⏳ รอ Match</span>'}</td>
                    <td style="text-align:center">
                      <button class="btn btn-ghost btn-sm btn-cf-edit" data-idx="${realIdx}" title="แก้ไข">${ICONS.edit}</button>
                      <button class="btn btn-ghost btn-sm btn-cf-delete" data-idx="${realIdx}" title="ลบ" style="color:var(--danger)">🗑️</button>
                    </td>
                  </tr>`;
                }).join('')
              }
            </tbody>
          </table>
        </div>
        <div class="flex justify-between items-center" style="padding:10px 14px;border-top:1px solid var(--border)">
          <span class="text-sm text-dim">${data.length} / ${cashflowList.length} รายการ</span>
          <span class="text-sm"><span style="color:var(--success)">Matched ${matchedCount}</span> · <span style="color:var(--warn)">รอ Match ${cashflowList.length-matchedCount}</span></span>
        </div>
      </div>
    `;

    // Filter handlers
    el.querySelectorAll('.pill[data-ft]').forEach(btn => {
      btn.addEventListener('click', () => { filterType = btn.dataset.ft; render(); });
    });
    document.getElementById('cf-date-from')?.addEventListener('change', e => { filterDateFrom = e.target.value; render(); });
    document.getElementById('cf-date-to')?.addEventListener('change', e => { filterDateTo = e.target.value; render(); });

    // Add buttons
    document.getElementById('btn-add-deposit')?.addEventListener('click', () => openCashflowModal('deposit'));
    document.getElementById('btn-add-supplier')?.addEventListener('click', () => openCashflowModal('supplier'));
    document.getElementById('btn-add-transfer')?.addEventListener('click', () => openCashflowModal('transfer'));
    document.getElementById('btn-add-misc')?.addEventListener('click', () => openCashflowModal('misc'));
    document.getElementById('btn-save-cashflow')?.addEventListener('click', async () => {
      toast('กำลังบันทึก...', 'info');
      const res = await api('saveCashflow', { records: cashflowList, created_by: currentUser?.display_name || 'Admin' });
      if (res.success) toast(`บันทึกสำเร็จ ${cashflowList.length} รายการ`, 'success');
      else toast(res.error || 'บันทึกไม่สำเร็จ', 'error');
    });

    // Edit / Delete
    el.querySelectorAll('.btn-cf-edit').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = Number(btn.dataset.idx);
        openCashflowModal(cashflowList[idx].type, idx);
      });
    });
    el.querySelectorAll('.btn-cf-delete').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = Number(btn.dataset.idx);
        const c = cashflowList[idx];
        if (!confirm(`ลบรายการนี้?\n${c.type} · ฿${fmtNum(c.amount)} · ${fmtDate(c.date)}`)) return;
        cashflowList.splice(idx, 1);
        persistMainState();
        toast('ลบแล้ว', 'success');
        render();
      });
    });
  }

  function openCashflowModal(type, editIdx) {
    const existing = editIdx !== undefined ? cashflowList[editIdx] : null;
    const isEdit = !!existing;
    
    const config = {
      deposit:  { title:'🏦 นำเงินฝากธนาคาร', color:'var(--success)', 
        desc:'บันทึกเงินสดที่เอาไปฝากเข้าบัญชีธนาคาร',
        fromLabel:'เงินสดจาก Station', fromPlaceholder:'เช่น Front1, Front2, รวมทุกโต๊ะ',
        toLabel:'ฝากเข้าบัญชี', toPlaceholder:'เลขบัญชีหรือชื่อบัญชี',
        showCounterparty: false },
      supplier: { title:'🏭 จ่าย Supplier', color:'var(--danger)',
        desc:'บันทึกเงินโอนจ่าย Supplier / ค่าใช้จ่าย',
        fromLabel:'โอนจากบัญชี', fromPlaceholder:'เช่น KTB / KBANK',
        toLabel:'โอนไปบัญชี Supplier', toPlaceholder:'บัญชีผู้รับ (ถ้ามี)',
        showCounterparty: true, counterpartyLabel:'ชื่อ Supplier' },
      transfer: { title:'🔄 โอนระหว่างบัญชี', color:'var(--info)',
        desc:'โอนเงินระหว่างบัญชีของตัวเอง (จะเกิด 2 รายการใน Statement: โอนออก + โอนเข้า)',
        fromLabel:'จากบัญชี', fromPlaceholder:'KTB / KBANK / BBL',
        toLabel:'ไปบัญชี', toPlaceholder:'KTB / KBANK / BBL',
        showCounterparty: false },
      misc:     { title:'💫 รายการอื่นๆ', color:'var(--warn)',
        desc:'เช่น ดอกเบี้ยรับ, ค่าธรรมเนียม, เงินมัดจำลูกค้า, อื่นๆ',
        fromLabel:'จาก', fromPlaceholder:'-',
        toLabel:'ไป', toPlaceholder:'-',
        showCounterparty: true, counterpartyLabel:'คู่กรณี' },
    }[type];

    openModal(config.title, `
      <div class="flex-col gap-3">
        <p class="text-sm text-dim" style="padding:8px 12px;background:${config.color}15;border-radius:6px">${config.desc}</p>
        
        <div class="flex gap-2">
          <div class="input-group flex-1">
            <label>วันที่</label>
            <input type="date" class="input" id="cf-date" value="${existing?toISODate(existing.date):todayISO()}">
          </div>
          <div class="input-group flex-1">
            <label>ยอดเงิน *</label>
            <input type="number" class="input" id="cf-amount" value="${existing?.amount||''}" placeholder="0.00" step="0.01" autofocus>
          </div>
        </div>

        <div class="flex gap-2">
          <div class="input-group flex-1">
            <label>${config.fromLabel}</label>
            <input class="input" id="cf-from" value="${existing?.from_account||''}" placeholder="${config.fromPlaceholder}">
          </div>
          <div class="input-group flex-1">
            <label>${config.toLabel}</label>
            <input class="input" id="cf-to" value="${existing?.to_account||''}" placeholder="${config.toPlaceholder}">
          </div>
        </div>

        ${config.showCounterparty ? `
          <div class="input-group">
            <label>${config.counterpartyLabel}</label>
            <input class="input" id="cf-counterparty" value="${existing?.counterparty||''}" placeholder="ชื่อ / บริษัท">
          </div>
        ` : ''}

        <div class="flex gap-2">
          <div class="input-group flex-1">
            <label>ธนาคาร (ที่เงินเคลื่อน)</label>
            <select class="select" id="cf-bank">
              ${['','KTB','KBANK','BBL','SCB','BAY','TMB','Other'].map(b=>`<option value="${b}" ${existing?.bank===b?'selected':''}>${b||'-'}</option>`).join('')}
            </select>
          </div>
          <div class="input-group flex-1">
            <label>เลขที่อ้างอิง / Slip</label>
            <input class="input" id="cf-ref" value="${existing?.reference||''}" placeholder="เลข slip / ref">
          </div>
        </div>

        <div class="input-group">
          <label>หมายเหตุ</label>
          <input class="input" id="cf-note" value="${existing?.note||''}" placeholder="รายละเอียดเพิ่มเติม">
        </div>

        <div class="flex gap-2 mt-2">
          <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
          <button class="btn btn-primary btn-sm flex-1" id="cf-save" style="background:${config.color};color:#fff">
            ${ICONS.check} ${isEdit?'อัปเดต':'บันทึก'}
          </button>
        </div>
      </div>
    `);

    document.getElementById('cf-save')?.addEventListener('click', () => {
      const amount = Number(document.getElementById('cf-amount').value);
      if (!amount || amount <= 0) { toast('กรอกยอดเงิน', 'error'); return; }
      
      const record = {
        id: existing?.id || ('CF-' + Date.now()),
        date: document.getElementById('cf-date').value || todayISO(),
        type: type,
        amount: amount,
        from_account: document.getElementById('cf-from').value,
        to_account: document.getElementById('cf-to').value,
        counterparty: config.showCounterparty ? document.getElementById('cf-counterparty')?.value || '' : '',
        bank: document.getElementById('cf-bank').value,
        reference: document.getElementById('cf-ref').value,
        note: document.getElementById('cf-note').value,
        match_status: existing?.match_status || 'pending',
        match_stmt_ref: existing?.match_stmt_ref || '',
        created_by: currentUser?.display_name || 'Admin',

function toISODate(d) {
  if (!d && d !== 0) return '';

  // Date object
  if (d instanceof Date && !isNaN(d)) {
    let y = d.getFullYear();
    if (y > 2400) y -= 543;
    return `${y}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  // Excel serial number
  if (typeof d === 'number' && d > 10000 && d < 80000) {
    const excelEpoch = new Date(1899, 11, 30);
    const dt = new Date(excelEpoch.getTime() + d * 86400000);
    return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  }

  const s = String(d).trim();
  if (!s || s === 'null' || s === 'undefined') return '';

  // yyyy-mm-dd already
  const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) {
    let y = Number(iso[1]); if (y > 2400) y -= 543;
    return `${y}-${iso[2]}-${iso[3]}`;
  }

  // dd/mm/yyyy
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) {
    let y = Number(m[3]); if (y > 2400) y -= 543;
    return `${y}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
  }
  return '';
}

function handleSalesUpload(result, fileName) {
  // ลองหา Main sheet หรือ sheet แรก
  const sheetName = result.sheetNames.find(n => n.toLowerCase().includes('main')) || result.sheetNames[0];
  const sheet = result.sheets[sheetName] || [];

  const rows = [];
  // หา header row (Bill Number)
  let headerRow = -1;
  for (let i = 0; i < Math.min(20, sheet.length); i++) {
    if (sheet[i] && sheet[i].some(c => String(c).includes('Bill Number') || String(c).includes('Bill Date'))) {
      headerRow = i; break;
    }
  }
  if (headerRow === -1) headerRow = 13; // default Main R14 (index 13)

  for (let i = headerRow + 1; i < sheet.length; i++) {
    const r = sheet[i];
    if (!r[1] && !r[4]) continue; // skip empty
    rows.push({
      bill_no: String(r[0]||''), date: String(r[1]||''), station: String(r[2]||''),
      pay_method: String(r[3]||''), amount: Number(r[4])||0, confirmation: String(r[5]||''),
      pay_date: String(r[6]||''), customer: String(r[7]||''),
    });
  }

  uploadedSales = rows;
  toast(`อ่านยอดขายสำเร็จ — ${rows.length} รายการ`, 'success');
  if (currentPage === 'sales') navigateTo('sales');
}

const _mem = {};
const safeStorage = {
  get(k) { try { return localStorage.getItem(k); } catch { return _mem[k] || null; } },
  set(k,v) { try { localStorage.setItem(k,v); } catch { _mem[k] = v; } },
  del(k) { try { localStorage.removeItem(k); } catch { delete _mem[k]; } },
};

async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const remember = document.getElementById('login-remember').checked;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  errEl.classList.add('hidden');

  if (!username || !password) {
    errEl.textContent = 'กรุณากรอก username และ password';
    errEl.classList.remove('hidden');
    return;
  }

  // Set loading state
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> กำลังเข้าสู่ระบบ...';

  try {
    const res = await api('login', { username, password });
    if (res.success) {
      currentUser = res.data;
      if (remember) safeStorage.set('sf_user', JSON.stringify(currentUser));
      btn.innerHTML = '<span class="spinner"></span> กำลังโหลดระบบ...';
      showApp();
    } else {
      errEl.textContent = res.error || 'ไม่สามารถเข้าสู่ระบบได้';
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = originalText;
    }
  } catch (err) {
    errEl.textContent = 'เกิดข้อผิดพลาด: ' + err.message;
    errEl.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

function doLogout() {
  currentUser = null;
  safeStorage.del('sf_user');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-page').classList.remove('hidden');
  document.getElementById('login-pass').value = '';
}

}
