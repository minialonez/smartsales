// Storage: แยก SP กับ PP
let spReconData = null; // { payments: [...], types: [...], taxBills: [...], merged: [...] }
let ppReconData = null;

// ── Persist ──
async function saveReconData(kind, data) {
  const key = kind === 'sp' ? 'sf_spRecon' : 'sf_ppRecon';
  try {
    const db = await new Promise((res, rej) => {
      const r = indexedDB.open('SmartFinanceDB', 1);
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
    const tx = db.transaction('data', 'readwrite');
    tx.objectStore('data').put(JSON.stringify(data), key);
  } catch(e) { console.error('Save recon failed:', e); }
}
async function loadReconData(kind) {
  const key = kind === 'sp' ? 'sf_spRecon' : 'sf_ppRecon';
  try {
    const db = await new Promise((res, rej) => {
      const r = indexedDB.open('SmartFinanceDB', 1);
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
    const tx = db.transaction('data', 'readonly');
    const req = tx.objectStore('data').get(key);
    return new Promise(res => {
      req.onsuccess = () => res(req.result ? JSON.parse(req.result) : null);
      req.onerror = () => res(null);
    });
  } catch(e) { return null; }
}

// ── Parser: ตรวจว่าเป็นไฟล์แบบไหน (auto-detect ไม่สนชื่อไฟล์) ──
// Returns: { type: 'payment_main'|'payment_type'|'tax_sales'|'tax_purchase', kind: 'sp'|'pp'|null }
function detectReconFileType(sheet) {
  // สแกนหา indicator ในแถวบน
  const topRows = sheet.slice(0, 10).map(r => (r||[]).map(c => String(c||'')).join('|'));
  const topText = topRows.join('\n');
  
  let type = 'unknown';
  let kind = null;
  
  // ── File type detection ──
  if (topText.includes('ภาษีขาย')) {
    type = 'tax_sales';
    kind = 'sp';
  } else if (topText.includes('ภาษีซื้อ')) {
    type = 'tax_purchase';
    kind = 'pp';
  } else if (topText.includes('ตามประเภท') || topText.includes('ประเภทชำระ')) {
    type = 'payment_type';
  } else if (topText.includes('การชำระเงิน') || topText.includes('การจ่ายเงิน')) {
    type = 'payment_main';
  } else {
    // Fallback: ดูโครงสร้าง
    for (let i = 2; i < Math.min(10, sheet.length); i++) {
      const r = sheet[i];
      if (!r || !r[0]) continue;
      const first = String(r[0]);
      if (/^\(A[A-Z]-|\(B[A-Z]-/.test(first)) { type = 'payment_type'; break; }
      if (/^(SP|PP)\d{5}-/.test(first)) { type = 'payment_main'; break; }
    }
  }
  
  // ── Kind detection (SP vs PP) — หาจาก prefix ของเอกสารใน data ──
  if (!kind && (type === 'payment_main' || type === 'payment_type')) {
    let spCount = 0, ppCount = 0;
    for (let i = 0; i < sheet.length; i++) {
      const r = sheet[i];
      if (!r) continue;
      for (let c = 0; c < Math.min(r.length, 3); c++) {
        const s = String(r[c] || '');
        if (/^SP\d{5}-/.test(s)) spCount++;
        else if (/^PP\d{5}-/.test(s)) ppCount++;
      }
      if (spCount + ppCount > 5) break;
    }
    kind = spCount > ppCount ? 'sp' : (ppCount > 0 ? 'pp' : null);
  }
  
  return { type, kind };
}

// ── Parser File Type 1: การชำระเงิน (SP/PP หลัก + child bills) ──
function parseReconPaymentMain(sheet, kind) {
  // kind: 'sp' (ลูกหนี้) → SP + child: SS/SR/OS/OR/SC/JS/JR
  //       'pp' (เจ้าหนี้) → PP + child: PS/PR/MS/MR/BS/BR/PC/PX
  const HEADER_PREFIX = kind === 'sp' ? 'SP' : 'PP';
  const CHILD_REGEX = kind === 'sp' 
    ? /^(SS|SR|OS|OR|SC|JS|JR)\d{5}-/
    : /^(PS|PR|MS|MR|BS|BR|PC|PX)\d{5}-/;
  const payments = [];
  let current = null;
  
  // ข้ามแถว header (row 0-1)
  for (let i = 2; i < sheet.length; i++) {
    const r = sheet[i];
    if (!r) continue;
    const first = String(r[0] || '').trim();
    if (!first) continue;
    
    // Header row: SP (ลูกหนี้) หรือ PP (เจ้าหนี้)
    if (first.startsWith(HEADER_PREFIX) && /^\w{2}\d{5}-\d+/.test(first)) {
      if (current) payments.push(current);
      current = {
        no: first,
        date: excelDateToISO(r[1]),
        customer: String(r[2] || ''),
        amount_gross: Number(r[3]) || 0,
        amount_deduct: Number(r[4]) || 0,
        amount_net: Number(r[5]) || 0,
        bills: [],
      };
    }
    // Child row: ใช้ regex แยกตาม kind
    else if (current && CHILD_REGEX.test(first)) {
      const prefix = first.substring(0, 2).toUpperCase();
      // Sign logic:
      //   SP: SC/JS/JR = ใบลดหนี้ลูกหนี้ → ยอดติดลบ (คืนเงิน)
      //   PP: BS/BR/PC/PX = ใบลดหนี้/ส่วนลดเจ้าหนี้ → ยอดติดลบ (ได้คืน)
      const isNegative = kind === 'sp' 
        ? ['SC','JS','JR'].includes(prefix)
        : ['BS','BR','PC','PX'].includes(prefix);
      let amount = Number(r[5]) || 0;
      // ถ้า prefix บ่งว่าต้องติดลบ แต่ยอดเป็นบวก → ทำให้ติดลบ
      if (isNegative && amount > 0) amount = -amount;
      
      current.bills.push({
        bill_no: first,
        prefix: prefix,
        ref_no: String(r[1] || ''),
        bill_date: excelDateToISO(r[2]),
        due_date: excelDateToISO(r[3]),
        type_desc: String(r[4] || ''),
        amount: amount,
        wht: Number(r[6]) || 0,
        fee: Number(r[7]) || 0,
        net: Number(r[8]) || 0,
        is_negative: isNegative,
      });
    }
  }
  if (current) payments.push(current);
  return payments;
}

// ── Parser File Type 2: ตามประเภท/ประเภทชำระ ──
function parseReconPaymentType(sheet, kind) {
  const HEADER_PREFIX = kind === 'sp' ? 'SP' : 'PP';
  const result = [];
  let currentCust = null;
  let currentPay = null;
  
  for (let i = 2; i < sheet.length; i++) {
    const r = sheet[i];
    if (!r) continue;
    const first = String(r[0] || '').trim();
    if (!first) continue;
    
    // Customer header: (AP-00001)
    if (/^\(\w{2}-\d+\)/.test(first)) {
      currentCust = first;
    }
    // Payment: SP/PP number
    else if (first.startsWith(HEADER_PREFIX) && /^\w{2}\d{5}-\d+/.test(first)) {
      currentPay = {
        no: first,
        date: excelDateToISO(r[1]),
        amount: Number(r[2]) || 0,
        customer: currentCust,
        methods: [], // [{type: 'เงินสด|โอนเงิน|เช็ค', date, amount, bank}]
      };
      result.push(currentPay);
    }
    // Method row: เงินสด / โอนเงิน / เช็ค
    else if (/^(เงินสด|โอนเงิน|เช็ค|เงินโอน)/.test(first) && currentPay) {
      currentPay.methods.push({
        type: first,
        date: excelDateToISO(r[2]),
        bank: String(r[3] || ''),
        amount: Number(r[5]) || 0,
      });
    }
  }
  return result;
}

// ── Parser File Type 3: ภาษีขาย / ภาษีซื้อ ──
function parseReconTax(sheet) {
  const result = [];
  // Header อยู่ประมาณแถว 7
  for (let i = 7; i < sheet.length; i++) {
    const r = sheet[i];
    if (!r) continue;
    const seq = r[0];
    if (!seq || isNaN(Number(seq))) continue; // ข้าม sub-total row
    
    const isPurchase = (r.length >= 12); // ภาษีซื้อมี col 12 (ref_doc)
    if (isPurchase) {
      result.push({
        seq: Number(seq),
        bill_date: excelDateToISO(r[1]),
        ref_doc: String(r[2] || ''),
        bill_no: String(r[4] || ''),
        supplier: String(r[5] || ''),
        tax_id: String(r[6] || ''),
        branch: String(r[7] || ''),
        amount: Number(r[8]) || 0,
        vat: Number(r[9]) || 0,
        novat: Number(r[10]) || 0,
        total: Number(r[11]) || 0,
      });
    } else {
      result.push({
        seq: Number(seq),
        bill_date: excelDateToISO(r[1]),
        bill_no: String(r[2] || ''),
        customer: String(r[4] || ''),
        tax_id: String(r[5] || ''),
        branch: String(r[6] || ''),
        amount: Number(r[7]) || 0,
        vat: Number(r[8]) || 0,
        novat: Number(r[9]) || 0,
        total: Number(r[10]) || 0,
      });
    }
  }
  return result;
}

// Helper: Excel date → ISO
function excelDateToISO(v) {
  if (!v) return '';
  if (typeof v === 'number' && v > 10000) {
    const epoch = new Date(1899, 11, 30);
    const d = new Date(epoch.getTime() + v * 86400000);
    return d.getFullYear() + '-' + 
           String(d.getMonth()+1).padStart(2,'0') + '-' + 
           String(d.getDate()).padStart(2,'0');
  }
  if (typeof v === 'string' && v.match(/\d{1,2}\/\d{1,2}\/\d{4}/)) {
    const m = v.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    let y = Number(m[3]); if (y > 2400) y -= 543;
    return y + '-' + m[2].padStart(2,'0') + '-' + m[1].padStart(2,'0');
  }
  if (v instanceof Date) {
    return v.getFullYear() + '-' +
           String(v.getMonth()+1).padStart(2,'0') + '-' +
           String(v.getDate()).padStart(2,'0');
  }
  return '';
}

// ── Merge: รวม payment_main + payment_type + tax ──
function mergeReconData(paymentMain, paymentType, taxData, kind) {
  // Key = SP/PP number
  const byNo = {};
  paymentMain.forEach(p => {
    byNo[p.no] = { ...p, methods: [] };
  });
  paymentType.forEach(pt => {
    if (byNo[pt.no]) {
      byNo[pt.no].methods = pt.methods;
      if (!byNo[pt.no].customer && pt.customer) byNo[pt.no].customer = pt.customer;
    } else {
      byNo[pt.no] = { no: pt.no, date: pt.date, customer: pt.customer, amount_net: pt.amount, bills: [], methods: pt.methods };
    }
  });
  
  // Tax bills — map ที่ bill_no ในบิล child
  const taxByBillNo = {};
  taxData.forEach(t => { if (t.bill_no) taxByBillNo[t.bill_no] = t; });
  Object.values(byNo).forEach(p => {
    p.bills.forEach(b => {
      if (taxByBillNo[b.bill_no]) {
        b.is_vat = true;
        b.vat = taxByBillNo[b.bill_no].vat;
        b.novat_amount = taxByBillNo[b.bill_no].amount;
      } else {
        b.is_vat = false;
      }
    });
  });
  
  return Object.values(byNo).sort((a, b) => (a.date||'').localeCompare(b.date||''));
}

// ── Common parser wrapper ──
async function parseReconFiles(files, kind) {
  const parsed = { payment_main: null, payment_type: null, tax: null };
  const issues = [];
  
  for (const file of files) {
    const data = await parseExcelFile(file);
    const sheet = data.sheets ? data.sheets[data.sheetNames[0]] : null;
    if (!sheet) { issues.push(`${file.name}: อ่านไฟล์ไม่ได้`); continue; }
    
    const { type, kind: detectedKind } = detectReconFileType(sheet);
    
    // ตรวจว่าไฟล์ตรงกับหน้า (SP vs PP)
    if (detectedKind && detectedKind !== kind) {
      issues.push(`${file.name}: เป็นไฟล์ ${detectedKind.toUpperCase()} แต่ upload ที่หน้า ${kind.toUpperCase()} — ข้าม`);
      continue;
    }
    
    if (type === 'payment_main') {
      parsed.payment_main = parseReconPaymentMain(sheet, kind);
    } else if (type === 'payment_type') {
      parsed.payment_type = parseReconPaymentType(sheet, kind);
    } else if (type === 'tax_sales' || type === 'tax_purchase') {
      parsed.tax = parseReconTax(sheet);
    } else {
      issues.push(`${file.name}: ไม่รู้จักประเภทไฟล์`);
    }
  }
  
  const merged = mergeReconData(
    parsed.payment_main || [],
    parsed.payment_type || [],
    parsed.tax || [],
    kind
  );
  
  return {
    payments: parsed.payment_main || [],
    types: parsed.payment_type || [],
    taxBills: parsed.tax || [],
    merged: merged,
    issues: issues,
    imported_at: new Date().toISOString(),
  };
}

// ════════════════════════════════════════════════════════════════
// Render: SP Reconciliation (ลูกหนี้)
// ════════════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════════════
// Import Daily xlsm
//   Structure:
//     B2 = date (datetime)
//     Row 3-11: Summary (label in B, values in C-K)
//       3=นำเงินเข้า 4=ยอดขาย 5=นำเงินออก 6=ยอดคืนสินค้า
//       7=Cash Drawer 8=Transfer 9=Card 10=Cheque 11=Refund
//     Col C-K = station: Front1/2/3/4/Invoice/Order/Payment/InvoiceCredit/OrderCredit
//     Row 15+: bills (A=no, B=date, C=station, D=type, E=amount, F=conf*, G=payDate*, H=r1, I=r2, J=bank)
//       * SKIP F and G per user request
//     M2:O11 = change counting (M=denom, N=count, O=total)
// ════════════════════════════════════════════════════════════════

async function importDailyXlsm(file) {
  const parsed = await parseExcelFile(file);
  const sheets = parsed.sheets || {};
  const mainSheet = sheets['Main'] || sheets[Object.keys(sheets)[0]];
  if (!mainSheet) throw new Error('ไม่พบ Sheet "Main"');
  
  // ── 1. อ่านวันที่ — ใช้ filename เป็นหลัก (reliable), B2 เป็น fallback ──
  // Filename format: YYYYMMDD_*.xlsm (เช่น 20260102_Daily_JKN.xlsm)
  const dateFromName = (() => {
    const m = file.name.match(/(\d{4})(\d{2})(\d{2})/);
    if (!m) return '';
    let y = Number(m[1]); if (y > 2400) y -= 543;
    return `${y}-${m[2]}-${m[3]}`;
  })();
  
  const b2 = mainSheet[1]?.[1];
  const dateFromB2 = toISODate(b2);
  
  // ใช้ filename ก่อน → ถ้าไม่เจอใช้ B2
  const dateISO = dateFromName || dateFromB2;
  
  if (!dateISO) {
    throw new Error(`ไม่สามารถ parse วันที่ได้\n  Filename: ${file.name}\n  B2: ${b2} (type: ${typeof b2})`);
  }
  
  if (dateFromName && dateFromB2 && dateFromName !== dateFromB2) {
    console.warn(`⚠️ ${file.name}: filename=${dateFromName} ≠ B2=${dateFromB2} — ใช้ filename`);
  }
  console.log(`[Import ${file.name}] filename=${dateFromName} · B2=${dateFromB2} · using=${dateISO}`);
  
  // ── 2. อ่าน Summary (rows 3-11, cols C-K) ──
  const LABELS = {
    2: 'นำเงินเข้า',    // row 3 (0-indexed: 2)
    3: 'ยอดขาย',        // row 4
    4: 'นำเงินออก',    // row 5
    5: 'ยอดคืนสินค้า',   // row 6
    6: 'Cash Drawer',   // row 7
    7: 'Transfer',      // row 8
    8: 'Card',          // row 9
    9: 'Cheque',        // row 10
    10: 'Refund',       // row 11
  };
  const STATIONS = ['Front1', 'Front2', 'Front3', 'Front4', 'Invoice', 'Order', 'Payment', 'Invoice Credit', 'Order Credit'];
  
  if (!mainSummary.__byDate) mainSummary.__byDate = {};
  mainSummary.__byDate[dateISO] = mainSummary.__byDate[dateISO] || {};
  
  const LABEL_TO_KEY = {
    'นำเงินเข้า': 'cashIn', 'ยอดขาย': 'sales', 'นำเงินออก': 'cashOut',
    'ยอดคืนสินค้า': 'returns', 'Cash Drawer': 'cashDrawer',
    'Transfer': 'transfer', 'Card': 'card', 'Cheque': 'cheque', 'Refund': 'refund',
  };
  
  for (const [rIdx, label] of Object.entries(LABELS)) {
    const row = mainSheet[Number(rIdx)];
    if (!row) continue;
    if (!mainSummary.__byDate[dateISO][label]) mainSummary.__byDate[dateISO][label] = {};
    
    STATIONS.forEach((st, sIdx) => {
      const colIdx = 2 + sIdx; // C=2, D=3, ..., K=10
      const val = Number(row[colIdx]);
      if (val && !isNaN(val)) {
        mainSummary.__byDate[dateISO][label][st] = val;
        // Also write flat key (backwards compat)
        const keyName = LABEL_TO_KEY[label];
        if (keyName) mainSummary[keyName + '_' + st] = val;
      }
    });
  }
  
  // ── 3. อ่าน Cash counting (M2:O11) และปรับ Invoice drawer ให้เป็น RAW ──
  // xlsm เก็บ G7 = O10 - G3 - G5 (adjusted). เราต้องการ raw (= O10) เพื่อใช้สูตรเดียวกันทุก station
  if (!cashCount.__byDate) cashCount.__byDate = {};
  cashCount.__byDate[dateISO] = cashCount.__byDate[dateISO] || {};
  const dayCash = cashCount.__byDate[dateISO];
  
  let invoiceDrawerRaw = 0;
  for (let r = 1; r < 11; r++) {
    const row = mainSheet[r];
    if (!row) continue;
    const denom = Number(row[12]); // M
    const count = Number(row[13]); // N
    if (denom && count) {
      dayCash[denom + '_Invoice'] = count;
      invoiceDrawerRaw += denom * count;
    }
  }
  
  // Fallback: ถ้าไม่มีข้อมูลนับธนบัตร → คำนวณ raw จาก G7 + G3 + G5
  if (!invoiceDrawerRaw) {
    const g7 = Number(mainSheet[6]?.[6]) || 0;
    const g3 = Number(mainSheet[2]?.[6]) || 0;
    const g5 = Number(mainSheet[4]?.[6]) || 0;
    invoiceDrawerRaw = g7 + g3 + g5;
  }
  
  // Override mainSummary Cash Drawer for Invoice (raw value)
  if (invoiceDrawerRaw > 0) {
    mainSummary.cashDrawer_Invoice = invoiceDrawerRaw;
    if (!mainSummary.__byDate[dateISO]['Cash Drawer']) mainSummary.__byDate[dateISO]['Cash Drawer'] = {};
    mainSummary.__byDate[dateISO]['Cash Drawer']['Invoice'] = invoiceDrawerRaw;
    console.log(`[Import] Invoice drawer RAW = ${invoiceDrawerRaw} (xlsm G7 = ${mainSheet[6]?.[6]}, adjusted)`);
  }
  
  // ── 4. ลบบิลเดิมของวันที่นี้ (ป้องกันซ้ำ) ──
  // ⭐ Track uuid สำหรับ sync delete (ก่อน filter ออก)
  const beforeCount = billList.length;
  billList.forEach(b => {
    if (toISODate(b.date) === dateISO && b.bill_uuid && typeof syncManager !== 'undefined' && syncManager.markDeleted) {
      syncManager.markDeleted('bills', b.bill_uuid);
    }
  });
  billList = billList.filter(b => toISODate(b.date) !== dateISO);
  const deleted = beforeCount - billList.length;
  
  // ── 5. อ่านบิล (rows 15+) — ใช้ dateISO (จาก filename) เป็นวันที่ทุกบิลในไฟล์เดียวกัน ──
  let billsImported = 0;
  for (let r = 14; r < mainSheet.length; r++) {
    const row = mainSheet[r];
    if (!row) continue;
    
    const billNo = String(row[0] || '').trim();
    // SKIP col 1 (B = Bill Date ในไฟล์) — ใช้ dateISO เดียวกันทั้งไฟล์ (ไม่ trust Excel date parsing)
    const station = String(row[2] || '').trim();
    const type = String(row[3] || '').trim();
    const amount = Number(row[4]);
    // SKIP col 5 (F = Confirmation) และ col 6 (G = Pay Date)
    const remarks1 = String(row[7] || '').trim();
    const remarks2 = String(row[8] || '').trim();
    const bank = String(row[9] || '').trim();
    
    if (!station && !type && !amount) continue;
    if (isNaN(amount) || amount === 0) continue;
    
    billList.push({
      bill_no: billNo || '',
      date: dateISO,  // ★ ใช้ dateISO ตรงๆ (= วันที่จาก filename)
      station: station,
      type: type,
      amount: amount,
      confirmation: '',
      remarks1: remarks1,
      remarks2: remarks2,
      bank: bank,
      match_status: type === 'Cash' ? 'matched' : 'pending',
      pay_date: type === 'Cash' ? dateISO : undefined,
      _imported_from: file.name,
      _imported_at: new Date().toISOString(),
    });
    billsImported++;
  }
  
  return { dateISO, billsImported, summaryRows: 9, deleted };
}

// ════════════════════════════════════════════════════════════════════
// SP Recon V2 — Upload 3 files → 20-col Main sheet + Report export
// ════════════════════════════════════════════════════════════════════
// Replaces old sp_recon. Features:
//   • Upload: การชำระเงิน.xls + ตามประเภท.xls + ภาษีขาย.xls
//   • Classify VAT:  SS/SR/SC = Y (VAT), OR/OS/JS/JR = N (NOVAT)
//   • SP Number:
//      - N rows → use parent SP from file
//      - Y rows → generate SPYYYYMM-XXXX (counter never resets)
//   • Paid/Unpaid auto (based on payment amounts)
//   • Filter: VAT / NOVAT / Paid / Unpaid
//   • Report view + XLSX download
// ════════════════════════════════════════════════════════════════════

let spV2State = {
  mainRows: [],          // 20-col rows
  nextCounter: 1,        // SP counter (global, no reset)
  filterVat: 'ALL',      // ALL | Y | N
  filterPaid: 'ALL',     // ALL | paid | unpaid
  filterPrefixes: new Set(), // multi-select bill prefixes (SR/SS/SC/OR/OS/JR/JS) — empty = ALL
  view: 'main',          // main | report | sellbills
  groupByCustomer: false, // ← Sell Bills: group by customer
  expandedCustomers: new Set(), // ← which customers are expanded
  rawPayMain: [],        // parsed file 1
  rawPayType: [],        // parsed file 2
  rawTaxSales: [],       // parsed file 3
};

// Load persisted counter
try {
  const saved = JSON.parse(localStorage.getItem('sf_spV2') || '{}');
  if (saved.nextCounter) spV2State.nextCounter = saved.nextCounter;
  if (saved.mainRows) spV2State.mainRows = saved.mainRows;
} catch(e) {}

function persistSpV2() {
  try {
    localStorage.setItem('sf_spV2', JSON.stringify({
      nextCounter: spV2State.nextCounter,
      mainRows: spV2State.mainRows,
    }));
  } catch(e) { console.warn('persistSpV2 failed', e); }
}

// Classify VAT by bill prefix
function spV2ClassifyVat(billNo) {
  const p = String(billNo || '').substring(0, 2).toUpperCase();
  if (['SS','SR','SC'].includes(p)) return 'Y';   // VAT
  if (['OR','OS','JS','JR'].includes(p)) return 'N'; // NOVAT
  return '';
}

// Generate SP number for VAT group — SPYYYYMM-XXXX (counter never resets)
function spV2GenNumber(payDate) {
  const d = payDate ? new Date(payDate) : new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const n = spV2State.nextCounter++;
  persistSpV2();
  return `SP${yyyy}${mm}-${String(n).padStart(4, '0')}`;
}

// Build 20-col rows from 3 parsed files
function spV2BuildRows(payMain, payType, taxSales) {
  // Index for lookups
  const payTypeMap = {};
  payType.forEach(p => { payTypeMap[p.no] = p; });
  const taxMap = {};
  taxSales.forEach(t => { taxMap[t.bill_no] = t; });
  
  const rows = [];
  let seq = 0;
  
  payMain.forEach(sp => {
    const ptEntry = payTypeMap[sp.no] || { methods: [] };
    
    // Separate children by VAT class
    const vatBills = [];
    const novatBills = [];
    sp.bills.forEach(b => {
      const c = spV2ClassifyVat(b.bill_no);
      if (c === 'Y') vatBills.push(b);
      else novatBills.push(b);
    });
    
    // ── Calculate payment method distribution ──
    const methodInfo = { cash: {d:'', a:0}, transfer: {d:'', a:0}, cheque: {d:'', a:0} };
    ptEntry.methods.forEach(m => {
      if (/เงินสด/.test(m.type))              { methodInfo.cash.d = m.date; methodInfo.cash.a += m.amount; }
      else if (/โอนเงิน|เงินโอน/.test(m.type)) { methodInfo.transfer.d = m.date; methodInfo.transfer.a += m.amount; }
      else if (/เช็ค/.test(m.type))            { methodInfo.cheque.d = m.date; methodInfo.cheque.a += m.amount; }
    });
    // Credit notes (JR/SC/JS) — credit_amt คำนวณจาก "residual ของ pay_total หลังหักวิธีจ่าย"
    //   formula: creditAmt = allBillsTotal - cash - transfer - cheque
    //
    // Cases ที่ offset กันพอดี (positive บิล = |negative บิล|, ไม่มี methods) → creditAmt = 0:
    //   • OR + JR ตัดกันพอดี (NOVAT)
    //   • OS + JS ตัดกันพอดี (NOVAT)
    //   • SS + SC ตัดกันพอดี (VAT)
    //   • SR + SC ตัดกันพอดี (VAT)
    // ทุก case ใช้ formula เดียวกัน เพราะ allBillsTotal รวมทั้ง VAT+NOVAT
    // → allBillsTotal = 0 (offset), methods = 0 (ไม่มีจ่าย) → creditAmt = 0 ✓
    // hasCreditActivity ยังเป็น true เพื่อแสดง credit_date
    const hasCreditActivity = sp.bills.some(b => b.amount < 0);
    const allBillsTotal = sp.bills.reduce((s,b) => s + b.amount, 0);
    const creditAmt = allBillsTotal - methodInfo.cash.a - methodInfo.transfer.a - methodInfo.cheque.a;
    
    // ── NOVAT group: use original SP number ──
    if (novatBills.length > 0) {
      seq++;
      const novatTotal = novatBills.reduce((s,b) => s + b.amount, 0);
      // SP header (original)
      const headerRow = {
        seq: seq, vat_flag: 'N',
        bill_no: sp.no, ref_doc: sp.date, sale_date: sp.customer,
        note1: '', amount: null, pay_total: novatTotal,
        cash_date: methodInfo.cash.a > 0 ? methodInfo.cash.d : '', cash_amt: methodInfo.cash.a,
        transfer_date: methodInfo.transfer.a > 0 ? methodInfo.transfer.d : '', transfer_amt: methodInfo.transfer.a,
        cheque_date: methodInfo.cheque.a > 0 ? methodInfo.cheque.d : '', cheque_amt: methodInfo.cheque.a,
        credit_date: hasCreditActivity ? sp.date : '', credit_amt: creditAmt,
        note2: '', sp_number: sp.no, pay_date: sp.date,
        _is_header: true, _group_id: sp.no,
      };
      // If mixed (also has VAT), split the payment between groups? → for now, put all in NOVAT header
      if (vatBills.length === 0) {
        // all NOVAT — full payment here
      } else {
        // mixed — keep payment in NOVAT header (dominant group)
      }
      rows.push(headerRow);
      
      novatBills.forEach(b => {
        seq++;
        rows.push({
          seq: seq, vat_flag: 'N',
          bill_no: b.bill_no, ref_doc: b.ref_no || '', sale_date: b.bill_date || '',
          note1: b.type_desc || '', amount: b.amount, pay_total: 0,
          cash_date: '', cash_amt: 0, transfer_date: '', transfer_amt: 0,
          cheque_date: '', cheque_amt: 0, credit_date: '', credit_amt: 0,
          note2: '', sp_number: sp.no, pay_date: sp.date,
          _is_header: false, _group_id: sp.no,
        });
      });
    }
    
    // ── VAT group: generate new SP number ──
    if (vatBills.length > 0) {
      const vatSp = spV2GenNumber(sp.date);
      const vatTotal = vatBills.reduce((s,b) => s + b.amount, 0);
      seq++;
      // VAT header (generated)
      const vatHeader = {
        seq: seq, vat_flag: 'Y',
        bill_no: vatSp, ref_doc: sp.date, sale_date: sp.customer,
        note1: '', amount: null, pay_total: vatTotal,
        cash_date: '', cash_amt: 0,
        transfer_date: '', transfer_amt: 0,
        cheque_date: '', cheque_amt: 0,
        credit_date: '', credit_amt: 0,
        note2: '', sp_number: vatSp, pay_date: sp.date,
        _is_header: true, _is_generated: true, _group_id: vatSp,
      };
      // If VAT only (no NOVAT) — full payment here
      if (novatBills.length === 0) {
        vatHeader.cash_date = methodInfo.cash.a > 0 ? methodInfo.cash.d : ''; vatHeader.cash_amt = methodInfo.cash.a;
        vatHeader.transfer_date = methodInfo.transfer.a > 0 ? methodInfo.transfer.d : ''; vatHeader.transfer_amt = methodInfo.transfer.a;
        vatHeader.cheque_date = methodInfo.cheque.a > 0 ? methodInfo.cheque.d : ''; vatHeader.cheque_amt = methodInfo.cheque.a;
        vatHeader.credit_date = hasCreditActivity ? sp.date : ''; vatHeader.credit_amt = creditAmt;
      } else if (vatTotal > 0) {
        // Mixed — VAT total as separate transfer payment (เฉพาะเมื่อมียอดจริง)
        vatHeader.transfer_date = sp.date;
        vatHeader.transfer_amt = vatTotal;
      }
      rows.push(vatHeader);
      
      vatBills.forEach(b => {
        seq++;
        rows.push({
          seq: seq, vat_flag: 'Y',
          bill_no: b.bill_no, ref_doc: b.ref_no || '', sale_date: b.bill_date || '',
          note1: b.type_desc || '', amount: b.amount, pay_total: 0,
          cash_date: '', cash_amt: 0, transfer_date: '', transfer_amt: 0,
          cheque_date: '', cheque_amt: 0, credit_date: '', credit_amt: 0,
          note2: '', sp_number: vatSp, pay_date: sp.date,
          _is_header: false, _group_id: vatSp,
        });
      });
    }
  });
  
  return rows;
}

// Paid/Unpaid — only headers have status; children inherit
function spV2IsPaid(row) {
  if (!row._is_header) return null;
  const total = (Number(row.cash_amt)||0) + (Number(row.transfer_amt)||0) + 
                (Number(row.cheque_amt)||0) + (Number(row.credit_amt)||0);
  return total > 0;
}

// Filter rows by current filters
function spV2FilterRows() {
  const { filterVat, filterPaid } = spV2State;
  // First pass: collect group_ids that match
  const groupsMatch = new Set();
  const headerMap = {};
  spV2State.mainRows.forEach(r => {
    if (r._is_header) {
      headerMap[r._group_id] = r;
      let keep = true;
      if (filterVat !== 'ALL' && r.vat_flag !== filterVat) keep = false;
      if (filterPaid !== 'ALL') {
        const paid = spV2IsPaid(r);
        if (filterPaid === 'paid' && !paid) keep = false;
        if (filterPaid === 'unpaid' && paid) keep = false;
      }
      if (keep) groupsMatch.add(r._group_id);
    }
  });
  return spV2State.mainRows.filter(r => groupsMatch.has(r._group_id));
}

        <div class="flex gap-1">
          <button class="pill ${view==='main'?'active':''}" data-view="main">📋 Main</button>
          <button class="pill ${view==='report'?'active':''}" data-view="report">📊 Report</button>
          <button class="pill ${view==='sellbills'?'active':''}" data-view="sellbills">📑 Sell Bills</button>
        </div>
        
        <div style="width:1px;height:24px;background:var(--border)"></div>
        
        <span class="text-xs text-dim">Type:</span>
        <button class="pill ${filterVat==='ALL'?'active':''}" data-fvat="ALL">ALL</button>
        <button class="pill ${filterVat==='Y'?'active':''}" data-fvat="Y">VAT (SS/SR/SC)</button>
        <button class="pill ${filterVat==='N'?'active':''}" data-fvat="N">NV (OR/OS/JR/JS)</button>
        
        <span class="text-xs text-dim" style="margin-left:10px">Status:</span>
        <button class="pill ${filterPaid==='ALL'?'active':''}" data-fpaid="ALL">ALL</button>
        <button class="pill ${filterPaid==='paid'?'active':''}" data-fpaid="paid" style="color:var(--success)">Paid</button>
        <button class="pill ${filterPaid==='unpaid'?'active':''}" data-fpaid="unpaid" style="color:var(--danger)">Unpaid</button>
        
        <div style="flex:1"></div>
        
        ${view === 'report' ? `<button class="btn btn-success btn-sm" id="spv2-btn-download">⬇️ Download Report</button>` : ''}
      </div>
      
      <!-- Prefix filter (multi-select) — only in Sell Bills view -->
      ${view === 'sellbills' ? `
      <div class="flex gap-2 flex-wrap items-center" style="margin-bottom:12px">
        <button class="pill ${spV2State.filterPrefixes.size===0?'active':''}" data-fprefix="ALL" title="แสดงทั้งหมด">ALL</button>
        <div style="width:1px;height:20px;background:var(--border)"></div>
        <span class="text-xs" style="color:var(--info);font-weight:600">VAT:</span>
        ${['SS','SR','SC'].map(p => `
          <button class="pill ${spV2State.filterPrefixes.has(p)?'active':''}" data-fprefix="${p}" 
            style="${spV2State.filterPrefixes.has(p)?'background:var(--info-bg);border-color:var(--info);color:var(--info)':''}">${p}</button>
        `).join('')}
        <div style="width:1px;height:20px;background:var(--border)"></div>
        <span class="text-xs" style="color:var(--warn);font-weight:600">NOVAT:</span>
        ${['OR','OS','JR','JS'].map(p => `
          <button class="pill ${spV2State.filterPrefixes.has(p)?'active':''}" data-fprefix="${p}" 
            style="${spV2State.filterPrefixes.has(p)?'background:rgba(245,158,11,.15);border-color:var(--warn);color:var(--warn)':''}">${p}</button>
        `).join('')}
        ${spV2State.filterPrefixes.size > 0 ? `<span class="text-xs" style="color:var(--info);margin-left:4px">· เลือก ${spV2State.filterPrefixes.size} prefix</span>` : ''}
      </div>
      ` : ''}
      
      <!-- Table -->
      <div class="card" style="padding:0;overflow:auto;max-height:70vh">
        ${view === 'main' ? spV2RenderMainTable(rows) 
        : view === 'report' ? spV2RenderReportView(rows) 
        : spV2RenderSellBillsView()}
      </div>
    ` : `
      <div class="card" style="text-align:center;padding:40px;color:var(--text3)">
        ยังไม่มีข้อมูล — อัปโหลดไฟล์ 3 ตัว แล้วกด "รวม 3 ไฟล์"
      </div>
    `}
  `;
  
  // ── Wire up ──
  document.getElementById('spv2-btn-multi')?.addEventListener('click', () => 
    document.getElementById('spv2-file-multi').click());
  
  document.getElementById('spv2-file-multi')?.addEventListener('change', async e => {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    
    const results = { main: 0, type: 0, tax: 0, unknown: 0, wrong_kind: 0 };
    const issues = [];
    
    toast(`กำลังอ่าน ${files.length} ไฟล์...`, 'info');
    
    for (const file of files) {
      try {
        const r = await parseExcelFile(file);
        const sheet = r.sheets ? r.sheets[r.sheetNames[0]] : null;
        if (!sheet) { issues.push(`${file.name}: อ่านไฟล์ไม่ได้`); continue; }
        
        const { type, kind: detectedKind } = detectReconFileType(sheet);
        
        // ตรวจว่าเป็นไฟล์ PP (เตือนว่าผิดหน้า)
        if (detectedKind === 'pp') {
          issues.push(`${file.name}: เป็นไฟล์ PP (เจ้าหนี้) — ข้าม`);
          results.wrong_kind++;
          continue;
        }
        
        if (type === 'payment_main') {
          spV2State.rawPayMain = parseReconPaymentMain(sheet, 'sp');
          results.main = spV2State.rawPayMain.length;
        } else if (type === 'payment_type') {
          spV2State.rawPayType = parseReconPaymentType(sheet, 'sp');
          results.type = spV2State.rawPayType.length;
        } else if (type === 'tax_sales') {
          spV2State.rawTaxSales = parseReconTax(sheet);
          results.tax = spV2State.rawTaxSales.length;
        } else if (type === 'tax_purchase') {
          issues.push(`${file.name}: ภาษีซื้อ — ข้าม (ใช้กับหน้า PP)`);
          results.wrong_kind++;
        } else {
          issues.push(`${file.name}: ไม่รู้จักประเภท`);
          results.unknown++;
        }
      } catch (err) {
        issues.push(`${file.name}: ${err.message}`);
      }
    }
    
    // Summary
    const summary = [];
    if (results.main > 0) summary.push(`การชำระเงิน ${results.main}`);
    if (results.type > 0) summary.push(`ตามประเภท ${results.type}`);
    if (results.tax > 0) summary.push(`ภาษีขาย ${results.tax}`);
    
    if (summary.length > 0) {
      toast(`อ่านสำเร็จ: ${summary.join(' · ')}${issues.length?` (${issues.length} ไฟล์มีปัญหา)`:''}`, 'success', 4000);
    } else {
      toast('ไม่สามารถอ่านไฟล์ใดๆ ได้', 'error');
    }
    
    if (issues.length > 0) {
      console.warn('[SP V2 upload issues]', issues);
      alert(`พบปัญหากับบางไฟล์:\n\n${issues.join('\n')}`);
    }
    
    e.target.value = ''; // reset input
    renderSpRecon(el);
  });
  
  document.getElementById('spv2-btn-merge')?.addEventListener('click', () => {
    if (!confirm(`รวมข้อมูล 3 ไฟล์?\n\n• การชำระเงิน: ${spV2State.rawPayMain.length} SP\n• ตามประเภท: ${spV2State.rawPayType.length} SP\n• ภาษีขาย: ${spV2State.rawTaxSales.length} records\n\n⚠️ จะ reset counter ไหม?`)) return;
    // Save counter if continuing, else reset
    const resetCounter = confirm('Reset counter SP (เริ่ม 0001 ใหม่)?\n\nYes = Reset\nNo = ต่อจากของเดิม');
    if (resetCounter) spV2State.nextCounter = 1;
    spV2State.mainRows = spV2BuildRows(spV2State.rawPayMain, spV2State.rawPayType, spV2State.rawTaxSales);
    persistSpV2();
    toast(`สร้าง Main — ${spV2State.mainRows.length} rows`, 'success');
    renderSpRecon(el);
  });
  
  document.getElementById('spv2-btn-clear')?.addEventListener('click', () => {
    if (!confirm('ล้างข้อมูล Main ทั้งหมด? (ไฟล์ที่ upload ยังอยู่)')) return;
    spV2State.mainRows = [];
    persistSpV2();
    renderSpRecon(el);
  });
  
  document.getElementById('spv2-btn-download')?.addEventListener('click', () => {
    spV2DownloadXlsx();
  });
  
  document.getElementById('spv2-btn-download-sellbills')?.addEventListener('click', () => {
    spV2DownloadSellBills();
  });
  
  // ── Group by customer toggle ──
  document.getElementById('spv2-btn-group-cust')?.addEventListener('click', () => {
    spV2State.groupByCustomer = !spV2State.groupByCustomer;
    renderSpRecon(el);
  });
  
  // ── Expand/collapse customer group ──
  el.querySelectorAll('.spv2-cust-header').forEach(row => {
    row.addEventListener('click', () => {
      const custName = row.dataset.cust;
      if (spV2State.expandedCustomers.has(custName)) {
        spV2State.expandedCustomers.delete(custName);
      } else {
        spV2State.expandedCustomers.add(custName);
      }
      renderSpRecon(el);
    });
  });
  
  // Wire edit buttons in Report view
  el.querySelectorAll('.spv2-edit-pay').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      spV2OpenEditModal(btn.dataset.gid);
    });
  });
  
  el.querySelectorAll('[data-view]').forEach(b => b.addEventListener('click', () => {
    spV2State.view = b.dataset.view; renderSpRecon(el);
  }));
  el.querySelectorAll('[data-fvat]').forEach(b => b.addEventListener('click', () => {
    spV2State.filterVat = b.dataset.fvat; renderSpRecon(el);
  }));
  el.querySelectorAll('[data-fpaid]').forEach(b => b.addEventListener('click', () => {
    spV2State.filterPaid = b.dataset.fpaid; renderSpRecon(el);
  }));
  el.querySelectorAll('[data-fprefix]').forEach(b => b.addEventListener('click', () => {
    const p = b.dataset.fprefix;
    if (p === 'ALL') {
      spV2State.filterPrefixes.clear();
    } else {
      // toggle
      if (spV2State.filterPrefixes.has(p)) spV2State.filterPrefixes.delete(p);
      else spV2State.filterPrefixes.add(p);
    }
    renderSpRecon(el);
  }));
  
  // Click to toggle Y/N on B column
  el.querySelectorAll('.spv2-vat-cell').forEach(cell => {
    cell.addEventListener('click', () => {
      const idx = Number(cell.dataset.idx);
      const row = spV2State.mainRows[idx];
      if (!row) return;
      row.vat_flag = row.vat_flag === 'Y' ? 'N' : 'Y';
      persistSpV2();
      renderSpRecon(el);
    });
  });
}

// Render Main table (20 cols)
function spV2RenderMainTable(rows) {
  const fmt = v => v == null || v === '' || v === 0 ? '' : (typeof v === 'number' ? fmtNum(v) : String(v));
  const fmtD = v => v ? String(v).substring(0, 10) : '';
  
  // 2-level header — matching Excel layout
  const thead = `
    <thead style="position:sticky;top:0;background:var(--card);z-index:2;border-bottom:2px solid var(--border)">
      <tr style="font-size:.72rem;background:var(--bg2)">
        <th rowspan="2" style="text-align:center;padding:6px;border-right:1px solid var(--border)">#</th>
        <th rowspan="2" style="text-align:center;padding:6px;border-right:1px solid var(--border)">Y/N</th>
        <th rowspan="2" style="text-align:left;padding:6px;border-right:1px solid var(--border)">เลขที่เอกสาร</th>
        <th rowspan="2" style="text-align:left;padding:6px;border-right:1px solid var(--border)">เอกสารอ้างอิง</th>
        <th rowspan="2" style="text-align:left;padding:6px;border-right:1px solid var(--border)">ลูกค้า / วันขาย</th>
        <th rowspan="2" style="text-align:left;padding:6px;border-right:1px solid var(--border)">หมายเหตุ</th>
        <th rowspan="2" style="text-align:right;padding:6px;border-right:1px solid var(--border)">จำนวนเงิน</th>
        <th rowspan="2" style="text-align:right;padding:6px;border-right:2px solid var(--border)">รวมชำระจริง</th>
        <th colspan="2" style="text-align:center;padding:6px;background:rgba(250,200,100,.15);border-right:1px solid var(--border)">💵 เงินสด</th>
        <th colspan="2" style="text-align:center;padding:6px;background:rgba(100,200,150,.15);border-right:1px solid var(--border)">🏦 โอนเงิน</th>
        <th colspan="2" style="text-align:center;padding:6px;background:rgba(150,180,240,.15);border-right:1px solid var(--border)">📋 เช็ค</th>
        <th colspan="2" style="text-align:center;padding:6px;background:rgba(240,150,150,.15);border-right:2px solid var(--border)">💸 ใบลดหนี้</th>
        <th rowspan="2" style="text-align:left;padding:6px;border-right:1px solid var(--border)">SP Number</th>
        <th rowspan="2" style="text-align:center;padding:6px;border-right:1px solid var(--border)">Pay Date</th>
        <th rowspan="2" style="text-align:center;padding:6px">Action</th>
      </tr>
      <tr style="font-size:.68rem;background:var(--bg2);color:var(--text2)">
        <th style="text-align:center;padding:4px">วันที่รับ</th>
        <th style="text-align:right;padding:4px;border-right:1px solid var(--border)">ยอด</th>
        <th style="text-align:center;padding:4px">วันที่รับ</th>
        <th style="text-align:right;padding:4px;border-right:1px solid var(--border)">ยอด</th>
        <th style="text-align:center;padding:4px">วันที่รับ</th>
        <th style="text-align:right;padding:4px;border-right:1px solid var(--border)">ยอด</th>
        <th style="text-align:center;padding:4px">วันที่รับ</th>
        <th style="text-align:right;padding:4px;border-right:2px solid var(--border)">ยอด</th>
      </tr>
    </thead>
  `;
  
  const tbody = rows.map(r => {
    const origIdx = spV2State.mainRows.indexOf(r);
    const isHdr = r._is_header;
    const paid = spV2IsPaid(r);
    const rowBg = isHdr 
      ? (paid === true ? 'background:rgba(63,196,143,.08)' : paid === false ? 'background:rgba(239,87,87,.08)' : '')
      : '';
    const vatColor = r.vat_flag === 'Y' ? 'var(--info)' : 'var(--warn)';
    
    return `
      <tr style="font-size:.75rem;${rowBg};${isHdr?'font-weight:600':''}">
        <td style="text-align:center;padding:4px 6px">${r.seq}</td>
        <td style="text-align:center;padding:4px 6px">
          <span class="spv2-vat-cell" data-idx="${origIdx}" 
                style="cursor:pointer;color:${vatColor};font-weight:700;padding:2px 8px;border:1px solid ${vatColor};border-radius:3px">
            ${r.vat_flag || '-'}
          </span>
        </td>
        <td style="padding:4px 6px;font-family:monospace">${r.bill_no}</td>
        <td style="padding:4px 6px;font-size:.7rem">${fmtD(r.ref_doc)}</td>
        <td style="padding:4px 6px">${String(r.sale_date || '').substring(0, 40)}</td>
        <td style="padding:4px 6px;font-size:.7rem">${r.note1 || ''}</td>
        <td style="text-align:right;padding:4px 6px">${fmt(r.amount)}</td>
        <td style="text-align:right;padding:4px 6px;color:var(--success)">${isHdr?fmtNum(Number(r.pay_total)||0):''}</td>
        
        ${isHdr ? (() => {
          const cashAmt = Number(r.cash_amt) || 0;
          const trfAmt = Number(r.transfer_amt) || 0;
          const chqAmt = Number(r.cheque_amt) || 0;
          const crdAmt = Number(r.credit_amt) || 0;
          // credit_date จะแสดง ถ้ามี credit_date ใน data (แม้ amt=0 เช่น OR+JR offset)
          const showCrdDate = !!r.credit_date;
          // Read-only display: เว้นว่างเมื่อ amt=0 (ยกเว้น credit ที่ดู credit_date)
          const cellStyle = 'padding:4px 6px;font-size:.7rem;text-align:center';
          const amtStyle = 'padding:4px 6px;font-size:.72rem;text-align:right';
          return `
          <td style="${cellStyle}">${cashAmt > 0 ? fmtD(r.cash_date) : ''}</td>
          <td style="${amtStyle}">${cashAmt > 0 ? fmtNum(cashAmt) : ''}</td>
          <td style="${cellStyle}">${trfAmt > 0 ? fmtD(r.transfer_date) : ''}</td>
          <td style="${amtStyle}">${trfAmt > 0 ? fmtNum(trfAmt) : ''}</td>
          <td style="${cellStyle}">${chqAmt > 0 ? fmtD(r.cheque_date) : ''}</td>
          <td style="${amtStyle}">${chqAmt > 0 ? fmtNum(chqAmt) : ''}</td>
          <td style="${cellStyle}">${showCrdDate ? fmtD(r.credit_date) : ''}</td>
          <td style="${amtStyle}">${showCrdDate ? fmtNum(crdAmt) : ''}</td>
          `;
        })() : `
          <td colspan="8"></td>
        `}
        
        <td style="padding:4px 6px;font-family:monospace;color:${r._is_generated?'var(--info)':''}">${r.sp_number}</td>
        <td style="text-align:center;padding:4px 6px;font-size:.7rem">${fmtD(r.pay_date)}</td>
        <td style="text-align:center;padding:2px 4px">${isHdr ? `<button class="spv2-edit-pay" data-gid="${r._group_id}" title="แก้วิธีชำระ" style="background:var(--info-bg);border:1px solid var(--info);color:var(--info);padding:3px 8px;border-radius:4px;cursor:pointer;font-size:.75rem">✏️</button>` : ''}</td>
      </tr>
    `;
  }).join('');
  
  return `<table style="width:100%;border-collapse:collapse;min-width:1700px">${thead}<tbody>${tbody}</tbody></table>`;
}

// Render Report view (grouped, honors filterVat)
function spV2RenderReportView(rows) {
  // Group by sp_number (filter pills already applied via spV2FilterRows)
  const groups = {};
  rows.forEach(r => {
    (groups[r._group_id] = groups[r._group_id] || []).push(r);
  });
  
  if (Object.keys(groups).length === 0) {
    return '<div style="padding:40px;text-align:center;color:var(--text3)">ไม่มีข้อมูลใน filter ปัจจุบัน</div>';
  }
  
  const fmt = v => v == null || v === '' || v === 0 ? '' : (typeof v === 'number' ? fmtNum(v) : String(v));
  const fmtD = v => v ? String(v).substring(0, 10) : '';
  
  let html = `<div style="padding:16px">
    <div style="text-align:center;font-weight:700;margin-bottom:4px">รายงาน - การชำระเงิน</div>
    <div style="text-align:center;font-size:.85rem;color:var(--text2);margin-bottom:16px">บริษัท จงกลณีการไฟฟ้า จำกัด</div>
    
    <table style="width:100%;border-collapse:collapse;font-size:.8rem">
      <thead>
        <tr style="background:var(--bg2);border-bottom:2px solid var(--border)">
          <th colspan="3" style="padding:8px;text-align:left">เลขเอกสารชำระ / ลูกค้า</th>
          <th style="padding:8px;text-align:right">รวมชำระจริง</th>
          <th colspan="2" style="padding:8px;text-align:center">เงินสด</th>
          <th colspan="2" style="padding:8px;text-align:center">โอนเงิน</th>
          <th colspan="2" style="padding:8px;text-align:center">เช็ค</th>
          <th style="padding:8px;text-align:center">Status</th>
        </tr>
        <tr style="background:var(--bg2);border-bottom:1px solid var(--border);font-size:.7rem">
          <th style="padding:4px">เลขเอกสาร</th>
          <th style="padding:4px">วันขาย</th>
          <th style="padding:4px">หมายเหตุ</th>
          <th style="padding:4px;text-align:right">จำนวน</th>
          <th style="padding:4px">วันรับ</th>
          <th style="padding:4px;text-align:right">ยอด</th>
          <th style="padding:4px">วันรับ</th>
          <th style="padding:4px;text-align:right">ยอด</th>
          <th style="padding:4px">วันรับ</th>
          <th style="padding:4px;text-align:right">ยอด</th>
          <th style="padding:4px">-</th>
        </tr>
      </thead>
      <tbody>`;
  
  Object.entries(groups).forEach(([gid, grp]) => {
    const header = grp.find(r => r._is_header);
    const children = grp.filter(r => !r._is_header);
    if (!header) return;
    const paid = spV2IsPaid(header);
    const rowColor = paid ? 'background:rgba(63,196,143,.15)' : 'background:rgba(239,87,87,.15)';
    const statusBadge = paid ? '<span style="color:var(--success);font-weight:700">✓ Paid</span>' : '<span style="color:var(--danger);font-weight:700">✗ Unpaid</span>';
    
    html += `
      <tr style="${rowColor};font-weight:600;border-top:2px solid var(--border)">
        <td style="padding:6px;font-family:monospace">${header.bill_no}</td>
        <td style="padding:6px">${fmtD(header.ref_doc)}</td>
        <td style="padding:6px">${String(header.sale_date||'').substring(0,35)}</td>
        <td style="padding:6px;text-align:right">${fmt(header.pay_total)}</td>
        <td style="padding:6px">${fmtD(header.cash_date)}</td>
        <td style="padding:6px;text-align:right">${fmt(header.cash_amt)}</td>
        <td style="padding:6px">${fmtD(header.transfer_date)}</td>
        <td style="padding:6px;text-align:right">${fmt(header.transfer_amt)}</td>
        <td style="padding:6px">${fmtD(header.cheque_date)}</td>
        <td style="padding:6px;text-align:right">${fmt(header.cheque_amt)}</td>
        <td style="padding:6px;text-align:center">
          ${statusBadge}
          <button class="spv2-edit-pay" data-gid="${header._group_id}" 
                  title="แก้ไขวิธีจ่าย"
                  style="margin-left:4px;background:none;border:none;cursor:pointer;color:var(--info);padding:2px 6px;border-radius:3px">✏️</button>
        </td>
      </tr>`;
    children.forEach(c => {
      html += `
        <tr style="font-size:.75rem;color:var(--text2)">
          <td style="padding:4px 6px;padding-left:18px;font-family:monospace">${c.bill_no}</td>
          <td style="padding:4px 6px">${fmtD(c.sale_date)}</td>
          <td style="padding:4px 6px">${c.note1 || ''}</td>
          <td style="padding:4px 6px;text-align:right">${fmt(c.amount)}</td>
          <td colspan="7"></td>
        </tr>`;
    });
  });
  
  html += `</tbody></table></div>`;
  return html;
}

// XLSX export
function spV2DownloadXlsx() {
  const rows = spV2FilterRows();
  const groupsByGid = {};
  rows.forEach(r => {

// Sell Bills — Generate จาก Main V2 + lookup ภาษีขาย
// ════════════════════════════════════════════════════════════════════

// Lookup: bill_no → Main row (child)
function spV2GetMainBillMap() {
  const map = {};
  spV2State.mainRows.forEach(r => {
    if (!r._is_header && r.bill_no) {
      map[r.bill_no] = r;
    }
  });
  return map;
}

// Lookup: group_id → header row
function spV2GetHeaderMap() {
  const map = {};
  spV2State.mainRows.forEach(r => {
    if (r._is_header) map[r._group_id] = r;
  });
  return map;
}

// Format Thai tax ID: 13 digits → "x xxxx xxxxx xx x"
function spV2FormatTaxId(taxId) {
  const digits = String(taxId || '').replace(/\D/g, '');
  if (digits.length !== 13) return String(taxId || '').trim();
  return `${digits[0]} ${digits.slice(1,5)} ${digits.slice(5,10)} ${digits.slice(10,12)} ${digits[12]}`;
}

// Generate Sell Bills from ภาษีขาย (primary source) + Main lookup for payment status
function spV2GenerateSellBills() {
  const mainBillMap = spV2GetMainBillMap();
  const headerMap = spV2GetHeaderMap();
  const sellBills = [];
  
  // Primary source = ภาษีขาย.xls (one row per tax record)
  const source = spV2State.rawTaxSales || [];
  
  source.forEach((tax, idx) => {
    const prefix = String(tax.bill_no).substring(0, 2).toUpperCase();
    const isVat = ['SS','SR','SC'].includes(prefix);
    const isNv = ['OR','OS','JR','JS'].includes(prefix);
    const vatFlag = isVat ? 'Y' : (isNv ? 'N' : '');
    
    // Lookup payment status from Main
    const mainRow = mainBillMap[tax.bill_no];
    let payStatus = '';
    let payDate = '';
    let note = '';
    
    if (mainRow) {
      const header = headerMap[mainRow._group_id];
      const paid = header ? spV2IsPaid(header) : false;
      
      if (paid) {
        payStatus = mainRow.sp_number || '';  // Main Col.S
        payDate = mainRow.pay_date || '';     // Main Col.T
      }
      note = mainRow.note1 || '';              // Main Col.R (note/type_desc)
    }
    // ยกเลิก (SC/JR/JS — ใบลดหนี้)
    const isVoid = ['SC','JR','JS'].includes(prefix);
    if (isVoid && !payStatus) payStatus = 'ยกเลิก';
    
    sellBills.push({
      seq: idx + 1,
      doc_date: tax.bill_date || '',
      bill_no: tax.bill_no || '',
      ref_doc: tax.ref_doc || '',
      customer: tax.customer || '',
      tax_id: spV2FormatTaxId(tax.tax_id),
      branch: tax.branch || '',
      value: Number(tax.amount) || 0,
      vat: Number(tax.vat) || 0,
      novat: Number(tax.novat) || 0,
      total: Number(tax.total) || 0,
      pay_status: payStatus,
      pay_date: payDate,
      note: note,
      _vat_flag: vatFlag,
      _is_void: isVoid,
    });
  });
  
  return sellBills;
}

  let bills = spV2GenerateSellBills();

  const { filterVat, filterPaid, filterPrefixes, groupByCustomer } = spV2State;
  if (filterVat === 'Y') bills = bills.filter(b => b._vat_flag === 'Y');
  else if (filterVat === 'N') bills = bills.filter(b => b._vat_flag === 'N');
  
  if (filterPaid === 'paid') bills = bills.filter(b => b.pay_status && b.pay_status !== 'ยกเลิก');
  else if (filterPaid === 'unpaid') bills = bills.filter(b => !b.pay_status);
  
  // Prefix filter (multi-select) — empty Set = ALL
  if (filterPrefixes && filterPrefixes.size > 0) {
    bills = bills.filter(b => {
      const p = String(b.bill_no).substring(0,2).toUpperCase();
      return filterPrefixes.has(p);
    });
  }
  
  // ── Sort by custom order: SR → SS → SC → OR → OS → JR → JS, then bill_no ascending (numeric-aware) ──
  const PREFIX_ORDER = ['SR','SS','SC','OR','OS','JR','JS'];
  const getOrder = (billNo) => {
    const p = String(billNo).substring(0,2).toUpperCase();
    const i = PREFIX_ORDER.indexOf(p);
    return i >= 0 ? i : 99;
  };

    const oa = getOrder(a.bill_no);
    const ob = getOrder(b.bill_no);
    if (oa !== ob) return oa - ob;
    // Same prefix → bill_no ascending (numeric-aware, handles embedded numbers correctly)
    return String(a.bill_no).localeCompare(String(b.bill_no), undefined, { numeric: true });

  if (filterVat === 'Y') bills = bills.filter(b => b._vat_flag === 'Y');
  else if (filterVat === 'N') bills = bills.filter(b => b._vat_flag === 'N');
  if (filterPaid === 'paid') bills = bills.filter(b => b.pay_status && b.pay_status !== 'ยกเลิก');
  else if (filterPaid === 'unpaid') bills = bills.filter(b => !b.pay_status);
  
  // Prefix filter (multi-select)
  if (filterPrefixes && filterPrefixes.size > 0) {
    bills = bills.filter(b => filterPrefixes.has(String(b.bill_no).substring(0,2).toUpperCase()));
  }
  
  // Sort by custom order: SR → SS → SC → OR → OS → JR → JS, then bill_no ascending (numeric-aware)
  const PREFIX_ORDER = ['SR','SS','SC','OR','OS','JR','JS'];
  const getOrder = (billNo) => {
    const p = String(billNo).substring(0,2).toUpperCase();
    const i = PREFIX_ORDER.indexOf(p);
    return i >= 0 ? i : 99;
  };
  bills.sort((a, b) => {
    const oa = getOrder(a.bill_no);
    const ob = getOrder(b.bill_no);
    if (oa !== ob) return oa - ob;
    return String(a.bill_no).localeCompare(String(b.bill_no), undefined, { numeric: true });
  });
  bills.forEach((b, i) => b.seq = i + 1);
  
  const fmtD = v => v ? String(v).substring(0, 10) : '';
  
  // Unpaid totals (for row 1 like sample)
  const unpaidBills = bills.filter(b => !b.pay_status);
  const unpaidValue = unpaidBills.reduce((s,b) => s + b.value, 0);
  const unpaidVat = unpaidBills.reduce((s,b) => s + b.vat, 0);
  const unpaidNovat = unpaidBills.reduce((s,b) => s + b.novat, 0);
  const unpaidTotal = unpaidBills.reduce((s,b) => s + b.total, 0);
  
  const aoa = [
    ['', '', '', '', '', '', 'ค้างชำระรวม', unpaidValue, unpaidVat, unpaidNovat, unpaidTotal, '', '', ''],

  ];
  
  bills.forEach(b => {
    const statusText = b.pay_status || '';
    aoa.push([
      b.seq, fmtD(b.doc_date), b.bill_no, b.ref_doc, b.customer,
      b.tax_id, b.branch,
      b.value, b.vat, b.novat, b.total,
      statusText, fmtD(b.pay_date), b.note
    ]);
  });
  
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [
    {wch:6},{wch:14},{wch:18},{wch:18},{wch:30},{wch:18},{wch:18},
    {wch:12},{wch:12},{wch:12},{wch:12},{wch:18},{wch:14},{wch:22}
  ];
  
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sell Bills');
  const fn = `SellBills_${todayISO()}.xlsx`;
  XLSX.writeFile(wb, fn);
  toast(`Download ${fn} — ${bills.length} rows`, 'success');
}

            <input type="number" class="input" id="edit-transfer-amt" value="${Number(headerRow.transfer_amt)||0}" step="0.01" style="width:140px;text-align:right">
          </div>
        </div>
        <div>
          <label class="text-xs text-dim">📋 เช็ค</label>
          <div class="flex gap-2">
            <input type="date" class="input" id="edit-cheque-date" value="${String(headerRow.cheque_date||'').substring(0,10)}" style="flex:1">
            <input type="number" class="input" id="edit-cheque-amt" value="${Number(headerRow.cheque_amt)||0}" step="0.01" style="width:140px;text-align:right">

        </div>
        <div>
          <label class="text-xs text-dim">💸 ใบลดหนี้</label>
          <div class="flex gap-2">
            <input type="date" class="input" id="edit-credit-date" value="${String(headerRow.credit_date||'').substring(0,10)}" style="flex:1">
            <input type="number" class="input" id="edit-credit-amt" value="${Number(headerRow.credit_amt)||0}" step="0.01" style="width:140px;text-align:right">
          </div>
        </div>
      </div>

      </div>
    </div>
  `;

  document.getElementById('edit-save-btn').addEventListener('click', () => {
    // Read amounts first
    const cashAmt = Number(document.getElementById('edit-cash-amt').value) || 0;
    const trfAmt  = Number(document.getElementById('edit-transfer-amt').value) || 0;
    const chqAmt  = Number(document.getElementById('edit-cheque-amt').value) || 0;
    const crdAmt  = Number(document.getElementById('edit-credit-amt').value) || 0;
    const cashDate = document.getElementById('edit-cash-date').value;
    const trfDate  = document.getElementById('edit-transfer-date').value;
    const chqDate  = document.getElementById('edit-cheque-date').value;
    const crdDate  = document.getElementById('edit-credit-date').value;
    
    // Save: clear date if amt=0 (data consistency)
    headerRow.cash_amt = cashAmt;
    headerRow.cash_date = cashAmt > 0 ? cashDate : '';
    headerRow.transfer_amt = trfAmt;
    headerRow.transfer_date = trfAmt > 0 ? trfDate : '';
    headerRow.cheque_amt = chqAmt;
    headerRow.cheque_date = chqAmt > 0 ? chqDate : '';
    headerRow.credit_amt = crdAmt;
    // credit_date: allow even when amt=0 (OR+JR offset case)
    headerRow.credit_date = crdDate;
    
    // Recompute pay_total
    headerRow.pay_total = cashAmt + trfAmt + chqAmt + crdAmt;
    
    persistSpV2();
    closeModal();
    toast('บันทึกแล้ว', 'success');
    const mainEl = document.getElementById('main');
    if (mainEl) renderSpRecon(mainEl);
  });
}

async function renderPpRecon(el) {
  if (!ppReconData) ppReconData = await loadReconData('pp');
  renderReconPage(el, 'pp', ppReconData);
}

function renderReconPage(el, kind, data) {
  const TITLE = kind === 'sp' ? '📥 ตรวจการชำระ SP (ลูกหนี้)' : '📤 ตรวจการจ่าย PP (เจ้าหนี้)';
  const HEADER_PREFIX = kind === 'sp' ? 'SP' : 'PP';
  const PARTY_LABEL = kind === 'sp' ? 'ลูกค้า' : 'เจ้าหนี้';
  
  let filterView = 'report'; // report | main | summary | vat
  let filterMethod = 'ALL';
  
  function render() {
    const hasData = data && data.merged && data.merged.length > 0;
    
    el.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div>
          <div class="page-title">${TITLE}</div>
          ${hasData ? `<div class="text-xs text-dim">Import: ${new Date(data.imported_at).toLocaleString('th-TH')} · ${data.merged.length} รายการ</div>` : ''}
        </div>
        <div class="flex gap-2">
          <label class="btn btn-primary btn-sm" style="cursor:pointer">
            ${ICONS.download} Upload 3 ไฟล์
            <input type="file" id="recon-files" accept=".xls,.xlsx" multiple style="display:none">
          </label>
          ${hasData ? `
            <button class="btn btn-outline btn-sm" id="recon-export">📥 Export VAT Report</button>
            <button class="btn btn-ghost btn-sm" id="recon-clear" style="color:var(--danger)">✕ ล้าง</button>
          ` : ''}
        </div>
      </div>
      
      ${!hasData ? `
        <div class="card" style="padding:40px;text-align:center">
          <div style="font-size:3rem;margin-bottom:12px">📂</div>
          <div class="font-semi" style="color:var(--text);margin-bottom:8px">ยังไม่มีข้อมูล</div>
          <p class="text-sm text-muted mb-3">
            Upload 3 ไฟล์ Excel จาก Smart (เรียงไฟล์ไหนก่อนก็ได้ ระบบจะ detect auto)<br><br>
            <strong>${kind==='sp'?'ลูกหนี้':'เจ้าหนี้'}:</strong><br>
            • การชำระเงิน${kind==='pp'?' (การจ่ายเงิน)':''}.xls (${HEADER_PREFIX} หลัก + child bills)<br>
            • การชำระเงิน-ประเภท${kind==='pp'?' (การจ่าย-ประเภท)':''}.xls (วิธีชำระ: เงินสด/โอน/เช็ค)<br>
            • ภาษี${kind==='sp'?'ขาย':'ซื้อ'}.xls (บิล VAT/NOVAT)
          </p>
        </div>
      ` : `
        ${renderReconTabs(filterView)}
        <div id="recon-body">
          ${renderReconContent(filterView, filterMethod, data, kind)}
        </div>
      `}
    `;
    
    // Events
    document.getElementById('recon-files')?.addEventListener('change', async e => {
      const files = Array.from(e.target.files);
      if (files.length === 0) return;
      toast(`กำลัง parse ${files.length} ไฟล์...`, 'info');
      try {
        const parsed = await parseReconFiles(files, kind);
        if (parsed.issues && parsed.issues.length) {
          console.warn('Recon parse issues:', parsed.issues);
          alert('⚠️ คำเตือน:\n\n' + parsed.issues.join('\n'));
        }
        if (parsed.merged.length === 0) {
          toast('❌ ไม่พบข้อมูล — ตรวจว่า upload ไฟล์ถูกหน้าไหม (SP vs PP)', 'error', 8000);
          return;
        }
        if (kind === 'sp') {
          spReconData = parsed;
          data = spReconData;
        } else {
          ppReconData = parsed;
          data = ppReconData;
        }
        await saveReconData(kind, parsed);
        toast(`✅ Import สำเร็จ — ${parsed.merged.length} ${HEADER_PREFIX}`, 'success');
        render();
      } catch(err) {
        console.error(err);
        toast(`❌ Parse ผิดพลาด: ${err.message}`, 'error');
      }
    });
    
    document.getElementById('recon-clear')?.addEventListener('click', () => {
      if (!confirm('ล้างข้อมูล Reconciliation?')) return;
      if (kind === 'sp') spReconData = null;
      else ppReconData = null;
      saveReconData(kind, null);
      data = null;
      render();
    });
    
    document.getElementById('recon-export')?.addEventListener('click', () => {
      exportReconReport(data, kind);
    });
    
    el.querySelectorAll('.recon-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        filterView = btn.dataset.tab;
        const body = document.getElementById('recon-body');
        if (body) body.innerHTML = renderReconContent(filterView, filterMethod, data, kind);
        el.querySelectorAll('.recon-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === filterView));
      });
    });
  }
  
  render();
}

function renderReconTabs(active) {
  const tabs = [
    {id:'report', label:'📑 Report (เอกสาร)'},
    {id:'main', label:'📋 Main (รวมดิบ)'},
    {id:'summary', label:'📊 หน้ารวม (ต่อคู่ค้า)'},
    {id:'vat', label:'🏛️ VAT (ส่งบัญชี)'},
  ];
  return `
    <div class="flex gap-2 mb-3">
      ${tabs.map(t => `<button class="pill recon-tab ${active===t.id?'active':''}" data-tab="${t.id}">${t.label}</button>`).join('')}
    </div>
  `;
}

function renderReconContent(view, filterMethod, data, kind) {
  if (view === 'report') return renderReconReport(data, kind);
  if (view === 'main') return renderReconMain(data, kind);
  if (view === 'summary') return renderReconSummary(data, kind);
  if (view === 'vat') return renderReconVAT(data, kind);
  return '';
}

// ── View: Summary (หน้ารวมต่อคู่ค้า) ──
function renderReconSummary(data, kind) {
  const PARTY_LABEL = kind === 'sp' ? 'ลูกค้า' : 'เจ้าหนี้';
  const byCust = {};
  data.merged.forEach(p => {
    const k = p.customer || '(ไม่ระบุ)';
    if (!byCust[k]) byCust[k] = { customer: k, paymentCount: 0, total: 0, vat: 0, novat: 0, bills: 0 };
    byCust[k].paymentCount++;
    byCust[k].total += Number(p.amount_net || 0);
    p.bills.forEach(b => {
      byCust[k].bills++;
      if (b.is_vat) {
        byCust[k].vat += Number(b.novat_amount || 0);
      } else {
        byCust[k].novat += Number(b.amount || 0);
      }
    });
  });
  const rows = Object.values(byCust).sort((a,b) => b.total - a.total);
  const grandTotal = rows.reduce((s,r) => s+r.total, 0);
  const grandVat = rows.reduce((s,r) => s+r.vat, 0);
  const grandNovat = rows.reduce((s,r) => s+r.novat, 0);
  
  return `
    <div class="flex gap-3 mb-3">
      ${statCard(`${PARTY_LABEL}ทั้งหมด`, rows.length+' ราย', '', 'var(--primary)', ICONS.users)}
      ${statCard('ยอดรวม', '฿'+fmtNum(grandTotal), rows.reduce((s,r)=>s+r.bills,0)+' บิล', 'var(--success)', ICONS.dollar)}
      ${statCard('VAT', '฿'+fmtNum(grandVat), '', 'var(--info)', ICONS.file)}
      ${statCard('NOVAT', '฿'+fmtNum(grandNovat), '', 'var(--purple)', ICONS.file)}
    </div>
    <div class="card-flat">
      <div class="table-wrap" style="max-height:580px;overflow-y:auto">
        <table>
          <thead style="position:sticky;top:0;background:var(--surface2)">
            <tr>
              <th>${PARTY_LABEL}</th>
              <th style="text-align:right">${kind==='sp'?'SP':'PP'} ครั้ง</th>
              <th style="text-align:right">บิลรวม</th>
              <th style="text-align:right">ยอดรวม</th>
              <th style="text-align:right">VAT</th>
              <th style="text-align:right">NOVAT</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td class="truncate" style="max-width:340px" title="${r.customer}">${r.customer}</td>
                <td style="text-align:right">${r.paymentCount}</td>
                <td style="text-align:right">${r.bills}</td>

            `).join('')}

        </table>
      </div>

  `;
}

// ── Export to XLSX ──
function exportReconReport(data, kind) {
  if (!data || !data.merged) { toast('ไม่มีข้อมูล', 'error'); return; }
  const wb = XLSX.utils.book_new();
  
  // Sheet: VAT
  if (data.taxBills && data.taxBills.length) {
    const vatRows = [];
    vatRows.push(['#','วันที่','เลขที่บิล', kind==='pp'?'ref_doc':'', kind==='sp'?'ลูกค้า':'เจ้าหนี้','เลขภาษี','สาขา','ก่อน VAT','VAT','ยกเว้น','รวม']);
    data.taxBills.forEach(r => {
      vatRows.push([r.seq, r.bill_date, r.bill_no, kind==='pp'?(r.ref_doc||''):'', r.customer||r.supplier||'', r.tax_id, r.branch, r.amount, r.vat, r.novat, r.total]);
    });
    const ws = XLSX.utils.aoa_to_sheet(vatRows);
    XLSX.utils.book_append_sheet(wb, ws, 'VAT');
  }
  
  // Sheet: Main
  const mainRows = [['#','VAT?','เลขเอกสาร','วันที่','คู่ค้า','จำนวนเงิน','หมายเหตุ']];
  let seq = 0;
  data.merged.forEach(p => {
    mainRows.push([++seq, '', p.no, p.date, p.customer||'', p.amount_net, '']);
    p.bills.forEach(b => {
      mainRows.push([++seq, b.is_vat?'Y':'N', b.bill_no, b.bill_date, b.ref_no, b.amount, b.type_desc]);
    });
  });
  const ws2 = XLSX.utils.aoa_to_sheet(mainRows);
  XLSX.utils.book_append_sheet(wb, ws2, 'Main');
  
  const fn = `${kind.toUpperCase()}_Recon_${data.imported_at.substring(0,10)}.xlsx`;
  XLSX.writeFile(wb, fn);
  toast(`✅ Export: ${fn}`, 'success');
}

async function renderUsers(el) {
  const res = await api('getUsers');
  const users = res.data || [];
  
  // Normalize permissions เป็น array เสมอ (backend อาจส่งเป็น string "read,write")
  users.forEach(u => {
    if (typeof u.permissions === 'string') {
      u.permissions = u.permissions.split(',').map(p => p.trim()).filter(Boolean);
    } else if (!Array.isArray(u.permissions)) {
      u.permissions = [];
    }
  });
  
  // Store users in global Map — safer than serializing to data-attribute
  window._usersMap = new Map(users.map(u => [u.user_id, u]));

  el.innerHTML = `
    <div class="flex justify-between items-center mb-4">
      <div class="page-title">จัดการผู้ใช้</div>
      <button class="btn btn-primary btn-sm" id="btn-add-user">${ICONS.plus} เพิ่มผู้ใช้</button>
    </div>
    <div class="card-flat">
      <table>
        <thead><tr><th>Username</th><th>ชื่อ</th><th>บทบาท</th><th>สิทธิ์</th><th>สถานะ</th><th></th></tr></thead>
        <tbody>
          ${users.map(u=>`<tr>
            <td style="font-family:var(--mono);color:var(--text)">${u.username}</td>
            <td class="font-semi" style="color:var(--text)">${u.display_name}</td>
            <td><span class="badge ${u.role==='admin'?'badge-purple':'badge-info'}">${u.role}</span></td>
            <td>${(u.permissions||[]).map(p=>`<span class="badge badge-muted">${p}</span>`).join(' ')}</td>
            <td><span class="badge badge-success">${u.status}</span></td>
            <td><button class="btn btn-ghost btn-icon btn-edit-user" data-uid="${u.user_id}" title="แก้ไข">${ICONS.edit}</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="card mt-3">
      <div class="font-semi text-sm text-dim mb-2">หมายเหตุ</div>
      <p class="text-xs text-muted" style="line-height:1.8">
        • Username ที่ขึ้นต้นด้วย 0 เก็บเป็น Plain Text ป้องกันเลข 0 หาย<br>
        • Admin สามารถจัดการสิทธิ์ได้: read, write, delete, manage_users<br>
        • รหัสผ่านเก็บแบบเข้ารหัส (SHA-256 Hash) ใน Sheet users
      </p>
    </div>
  `;
  
  // ── Helper: เปิด modal เพิ่ม/แก้ไข user ──
  function openUserModal(existingUser) {
    const isEdit = !!existingUser;
    // Default ใหม่: role='staff' + ['read','write'] → match pattern DEMO/ระบบเดิม
    // ถ้าใช้ 'user' + ['read'] อย่างเดียว จะไม่เห็นข้อมูล/บันทึกอะไรไม่ได้
    const u = existingUser || { username: '', display_name: '', role: 'staff', permissions: ['read','write'], status: 'active' };
    const allPerms = ['read', 'write', 'delete', 'manage_users'];
    
    openModal(`${isEdit?'✏️ แก้ไข':ICONS.plus+' เพิ่ม'} ผู้ใช้`, `
      <div class="flex-col gap-3">
        <div class="input-group">
          <label>Username ${isEdit?'<span class="text-xs text-dim">(แก้ไม่ได้)</span>':''}</label>
          <input class="input" id="u-username" value="${u.username||''}" ${isEdit?'readonly style="background:rgba(255,255,255,.02)"':''} placeholder="เช่น jake หรือ 0812345678">
        </div>
        ${isEdit ? '' : `
        <div class="input-group">
          <label>รหัสผ่าน</label>
          <input type="password" class="input" id="u-password" placeholder="กรอกรหัสผ่าน" autocomplete="new-password">
        </div>
        `}
        <div class="input-group">
          <label>ชื่อที่แสดง</label>
          <input class="input" id="u-display-name" value="${u.display_name||''}" placeholder="เช่น Jake Thompson">
        </div>
        <div class="flex gap-2">
          <div class="input-group flex-1">
            <label>บทบาท</label>
            <select class="select" id="u-role">
              <option value="staff" ${u.role==='staff'?'selected':''}>staff</option>
              <option value="admin" ${u.role==='admin'?'selected':''}>admin</option>
              <option value="user" ${u.role==='user'?'selected':''}>user</option>
            </select>
          </div>
          ${isEdit ? `
          <div class="input-group flex-1">
            <label>สถานะ</label>
            <select class="select" id="u-status">
              <option value="active" ${u.status==='active'?'selected':''}>active</option>
              <option value="inactive" ${u.status==='inactive'?'selected':''}>inactive</option>
            </select>
          </div>
          ` : '<div class="flex-1"></div>'}
        </div>
        <div class="input-group">
          <label>สิทธิ์ (เลือกได้หลายอัน)</label>
          <div class="flex gap-2 flex-wrap" id="u-perms">
            ${allPerms.map(p => `
              <label class="flex items-center gap-1 text-sm" style="cursor:pointer;padding:4px 8px;background:rgba(255,255,255,.03);border-radius:5px;border:1px solid var(--border)">
                <input type="checkbox" class="u-perm" value="${p}" ${(u.permissions||[]).includes(p)?'checked':''}>
                ${p}
              </label>
            `).join('')}
          </div>
        </div>
        ${isEdit?'<div class="text-xs text-dim" style="padding:6px 10px;background:rgba(244,180,26,.08);border-radius:5px">💡 รหัสผ่านแก้ไม่ได้จาก UI — หากต้องการ reset ให้ลบ user แล้วสร้างใหม่</div>':''}
        <div class="flex gap-2 mt-2">
          <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
          ${isEdit?'<button class="btn btn-ghost btn-sm" id="u-delete" style="color:var(--danger);border:1px solid var(--danger)">ลบ</button>':''}
          <button class="btn btn-primary btn-sm flex-1" id="u-save">${ICONS.check} ${isEdit?'บันทึก':'เพิ่มผู้ใช้'}</button>
        </div>
      </div>
    `);
    
    document.getElementById('u-save')?.addEventListener('click', async () => {
      const username = document.getElementById('u-username').value.trim();
      const passwordEl = document.getElementById('u-password');
      const password = passwordEl ? passwordEl.value : '';
      const display_name = document.getElementById('u-display-name').value.trim();
      const role = document.getElementById('u-role').value;
      const statusEl = document.getElementById('u-status');
      const status = statusEl ? statusEl.value : 'active';
      const permissions = Array.from(document.querySelectorAll('.u-perm:checked')).map(c => c.value);
      
      if (!username) { toast('กรอก Username', 'error'); return; }
      if (!isEdit && !password) { toast('กรอกรหัสผ่าน', 'error'); return; }
      if (!display_name) { toast('กรอกชื่อที่แสดง', 'error'); return; }
      
      const btn = document.getElementById('u-save');
      btn.disabled = true;
      btn.textContent = 'กำลังบันทึก...';
      
      try {
        let payload, action;
        if (isEdit) {
          // updateUser ใน backend ใช้ user_id เป็น key (ไม่ใช่ username)
          payload = { user_id: u.user_id, display_name, role, status, permissions };
          action = 'updateUser';
        } else {
          // createUser: username + password บังคับ
          payload = { username, password, display_name, role, permissions };
          action = 'createUser';
        }
        const result = await api(action, payload);
        if (result?.success === false || result?.error) {
          throw new Error(result.message || result.error || 'ไม่สำเร็จ');
        }
        closeModal();
        toast(`✓ ${isEdit?'อัปเดต':'เพิ่ม'} ${username} แล้ว`, 'success');
        renderUsers(el); // reload
      } catch(err) {
        toast('ไม่สำเร็จ: ' + (err.message || err), 'error');
        btn.disabled = false;
        btn.textContent = (isEdit?'บันทึก':'เพิ่มผู้ใช้');
      }
    });
    
    // Delete (edit mode only)
    document.getElementById('u-delete')?.addEventListener('click', async () => {
      if (!confirm(`ลบผู้ใช้ "${u.username}"?\nลบแล้วกู้คืนไม่ได้`)) return;
      const btn = document.getElementById('u-delete');
      btn.disabled = true;
      try {
        // deleteUser ใน backend ใช้ user_id เป็น key
        const result = await api('deleteUser', { user_id: u.user_id });
        if (result?.success === false || result?.error) {
          throw new Error(result.message || result.error || 'ไม่สำเร็จ');
        }
        closeModal();
        toast(`ลบ ${u.username} แล้ว`, 'success');
        renderUsers(el);
      } catch(err) {
        toast('ลบไม่สำเร็จ: ' + (err.message || err), 'error');
        btn.disabled = false;
      }
    });
  }
  
  // ── Handlers ──
  document.getElementById('btn-add-user')?.addEventListener('click', () => openUserModal(null));
  el.querySelectorAll('.btn-edit-user').forEach(btn => {
    btn.addEventListener('click', () => {
      const uid = btn.dataset.uid;
      const u = window._usersMap?.get(uid);
      if (!u) { toast('ไม่พบข้อมูลผู้ใช้', 'error'); return; }
      openUserModal(u);
    });
  });
}

// ── Initialize after all declarations are ready ──
(async function() {
  await restoreMainState();
  checkSavedLogin();
})();
</script>
</body>
