      ${statCard('ยอดขายวันนี้', '฿'+fmtNum(sales.total||0), (sales.count||0)+' รายการ', 'var(--success)', ICONS.dollar)}
      ${statCard('Matched', (matching.matched||0)+'/'+(matching.total||0), 'รายการ', 'var(--info)', ICONS.pulse)}
    </div>
    
    ${totalUnmatched > 0 ? `
      <!-- Unmatched Summary (การ์ดเตือน) -->
      <div class="card mb-4" style="border-left:4px solid var(--warn)">
        <div class="flex justify-between items-center mb-3">
          <div class="font-semi">⚠️ รายการที่ต้องติดตาม</div>
          <span class="badge badge-warn">${totalUnmatched} รายการ</span>
        </div>
        <div class="flex gap-3 flex-wrap">
          ${unmatchedBillsTransfer.length > 0 ? `
            <div style="padding:12px;background:rgba(245,166,35,.08);border-radius:8px;min-width:200px;flex:1;cursor:pointer" onclick="navigateTo('main')">
              <div class="text-xs text-dim">บิลโอน/บัตรรอ Match</div>
              <div style="font-size:1.4rem;font-weight:700;color:var(--warn)">${unmatchedBillsTransfer.length}</div>
              <div class="text-xs text-muted">฿${fmtNum(unmatchedBillsTransfer.reduce((s,b)=>s+Number(b.amount||0),0))}</div>
            </div>
          ` : ''}
          ${chequesAwaitingClear.length > 0 ? `
            <div style="padding:12px;background:rgba(245,166,35,.08);border-radius:8px;min-width:200px;flex:1;cursor:pointer" onclick="navigateTo('main')">
              <div class="text-xs text-dim">เช็ครอเคลียร์</div>
              <div style="font-size:1.4rem;font-weight:700;color:var(--warn)">${chequesAwaitingClear.length}</div>
              <div class="text-xs text-muted">
                ฿${fmtNum(chequesAwaitingClear.reduce((s,b)=>s+Number(b.amount||0),0))}
                ${chequesOverdue.length > 0 ? ` · <span style="color:var(--danger)">เลยวัน ${chequesOverdue.length}</span>` : ''}
              </div>
            </div>
          ` : ''}
          ${unmatchedStmts.length > 0 ? `
            <div style="padding:12px;background:rgba(239,87,87,.08);border-radius:8px;min-width:200px;flex:1;cursor:pointer" onclick="navigateTo('matching')">
              <div class="text-xs text-dim">Statement ยังไม่ match</div>
              <div style="font-size:1.4rem;font-weight:700;color:var(--danger)">${unmatchedStmts.length}</div>
              <div class="text-xs text-muted">฿${fmtNum(unmatchedStmts.reduce((s,x)=>s+Number(x.amount||0),0))}</div>
            </div>
          ` : ''}
          ${cashflowPending.length > 0 ? `
            <div style="padding:12px;background:rgba(79,156,249,.08);border-radius:8px;min-width:200px;flex:1;cursor:pointer" onclick="navigateTo('cashflow')">
              <div class="text-xs text-dim">เงินเข้า-ออก รอ Match</div>
              <div style="font-size:1.4rem;font-weight:700;color:var(--info)">${cashflowPending.length}</div>
              <div class="text-xs text-muted">ฝาก/จ่าย Supplier/โอน</div>
            </div>
          ` : ''}
        </div>
        ${chequesOverdue.length > 0 ? `
          <div style="margin-top:12px;padding:10px;background:rgba(239,87,87,.08);border-radius:8px">
            <div class="text-sm" style="color:var(--danger);font-weight:600">🚨 เช็คเลยกำหนดรอเคลียร์ ${chequesOverdue.length} ฉบับ:</div>
            <div class="text-xs text-muted mt-1">
              ${chequesOverdue.slice(0,3).map(b => `${b.bill_no||'(ไม่มีเลข)'} (฿${fmtNum(b.amount)} ${fmtDate(b.expected_clear_date)})`).join(', ')}
              ${chequesOverdue.length>3?` และอีก ${chequesOverdue.length-3} ฉบับ`:''}
            </div>
          </div>
        ` : ''}
      </div>
    ` : ''}
    
    <div class="flex gap-3" style="display:grid;grid-template-columns:1fr 1fr">
      <div class="card">
        <div class="font-semi mb-3">ยอดขายตาม Station วันนี้</div>
        ${Object.entries(stations).map(([st, val]) => `
          <div class="flex items-center gap-3 mb-2">
            <span class="text-xs text-dim" style="width:55px">${st}</span>
            <div class="progress flex-1"><div class="progress-fill" style="width:${(val/maxStation*100)}%;background:linear-gradient(90deg,var(--primary),var(--info))"></div></div>
            <span class="text-sm font-semi" style="width:85px;text-align:right">฿${fmtNum(val)}</span>
          </div>
        `).join('')}
      </div>
      <div class="card">
        <div class="font-semi mb-3">แจ้งเตือนล่าสุด</div>
        ${alerts.map((a,i) => `
          <div class="flex items-center gap-3" style="padding:10px 0;${i<alerts.length-1?'border-bottom:1px solid var(--border)':''}">
            <div style="width:8px;height:8px;border-radius:50%;background:${a.alert_type==='overdue'?'var(--danger)':a.alert_type==='credit_break'?'var(--warn)':'var(--info)'};flex-shrink:0"></div>
            <div class="flex-1">
              <div class="text-sm">${a.cust_name} — ${a.notes||a.alert_type}</div>
            </div>
            <span class="text-xs text-muted">${a.action_at||''}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function statCard(label, value, sub, color, icon) {
  return `<div class="card flex-1" style="min-width:170px">
    <div class="stat">
      <div>
        <div class="stat-label">${label}</div>
        <div class="stat-value" style="color:${color}">${value}</div>
        ${sub ? `<div class="stat-sub">${sub}</div>` : ''}
      </div>
      <div class="stat-icon" style="color:${color}">${icon||''}</div>
    </div>
  </div>`;
}

// ── Debt Tracking ───────────────────────────────────────────
async function renderDebt(el) {
  let filterStatus = 'ALL';
  let searchText = '';

  const statusMap = {
    active: { label:'ปกติ', cls:'badge-success', color:'var(--success)' },
    cash_only: { label:'เงินสด', cls:'badge-info', color:'var(--info)' },
    overdue: { label:'เลยกำหนดชำระ', cls:'badge-danger', color:'var(--danger)' },
    credit_break: { label:'เบรกเครดิต', cls:'badge-warn', color:'var(--warn)' },
  };

  async function loadAndRender() {
    const res = await api('getArLedger');
    let debtors = res.data || [];

    // กรอง — ไม่แสดง cash_only ในหน้านี้
    debtors = debtors.filter(d => d.credit_status !== 'cash_only');

    // Filter status
    if (filterStatus !== 'ALL') {
      debtors = debtors.filter(d => d.credit_status === filterStatus);
    }
    // Search
    if (searchText) {
      const s = searchText.toLowerCase();
      debtors = debtors.filter(d => (d.cust_name||'').toLowerCase().includes(s) || (d.cust_id||'').toLowerCase().includes(s) || (d.phone||'').includes(s));
    }

    const allMonths = [...new Set(debtors.flatMap(d => Object.keys(d.months||{})))].sort();
    const totalDebt = debtors.reduce((s,d) => s + (Number(d.total_outstanding)||0), 0);
    const overdueCount = debtors.filter(d=>d.credit_status==='overdue').length;
    const breakCount = debtors.filter(d=>d.credit_status==='credit_break').length;

    el.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div class="page-title">ติดตามลูกหนี้</div>
        <div class="flex gap-2">
          <input class="input" placeholder="ค้นหา ชื่อ / cust_id / เบอร์" id="debt-search" value="${searchText}" style="width:240px">
          <button class="btn btn-primary btn-sm" id="btn-quick-payment" style="background:var(--success);color:#fff">💰 รับชำระเร็ว</button>
          <button class="btn btn-outline btn-sm" id="btn-check-alerts">${ICONS.pulse} ตรวจสอบสถานะ</button>
        </div>
      </div>

      <!-- Summary cards -->
      <div class="flex gap-3 flex-wrap mb-3 stagger">
        ${statCard('ลูกหนี้ทั้งหมด', debtors.length, '', 'var(--info)', ICONS.card)}
        ${statCard('ยอดค้างรวม', '฿'+fmtNum(totalDebt), '', 'var(--warn)', ICONS.dollar)}
        ${statCard('เลยกำหนด', overdueCount, 'รายที่ต้องติดตาม', 'var(--danger)', ICONS.alert)}
        ${statCard('เบรกเครดิต', breakCount, 'รายที่หยุดขายเครดิต', 'var(--purple)', ICONS.alert)}
      </div>

      <!-- Filter pills -->
      <div class="flex gap-2 mb-3 flex-wrap">
        <button class="pill ${filterStatus==='ALL'?'active':''}" data-fs="ALL">ทั้งหมด</button>
        <button class="pill ${filterStatus==='active'?'active':''}" data-fs="active" style="border-color:var(--success)">ปกติ</button>
        <button class="pill ${filterStatus==='overdue'?'active':''}" data-fs="overdue" style="border-color:var(--danger)">เลยกำหนดชำระ</button>
        <button class="pill ${filterStatus==='credit_break'?'active':''}" data-fs="credit_break" style="border-color:var(--warn)">เบรกเครดิต</button>
      </div>

      <div class="card-flat">
        <div class="table-wrap" style="max-height:540px;overflow-y:auto">
          <table>
            <thead>
              <tr>
                <th>ลูกหนี้</th>
                <th>ผู้ติดต่อ</th>
                <th>เบอร์โทร</th>
                ${allMonths.map(m => {
                  const yr = m.split('-')[0].slice(-2);
                  const mo = m.split('-')[1];
                  return `<th style="text-align:right">${mo}/${yr}</th>`;
                }).join('')}
                <th style="text-align:right">ยอดค้าง</th>
                <th>กำหนดชำระ</th>
                <th>สถานะ</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${debtors.length === 0 ? `<tr><td colspan="99" style="text-align:center;padding:40px;color:var(--text3)">ไม่มีลูกหนี้ในสถานะที่เลือก</td></tr>` :
                debtors.map(d => {
                  const total = Number(d.total_outstanding) || Object.values(d.months||{}).reduce((a,b)=>a+b,0);
                  const st = statusMap[d.credit_status] || statusMap.active;
                  const limit = Number(d.credit_limit) || 0;
                  return `<tr>
                    <td>
                      <div class="font-semi" style="color:var(--text)">${d.cust_name||'-'}</div>
                      <div class="text-xs text-muted">${d.cust_id||''}</div>
                    </td>
                    <td class="text-xs">${d.contact_person||'-'}</td>
                    <td class="text-xs" style="font-family:var(--mono)">${d.phone||'-'}</td>
                    ${allMonths.map(m=>{
                      const amt = (d.months||{})[m];
                      return `<td style="text-align:right;color:${amt?'var(--text)':'var(--text3)'}">${amt?fmtNum(amt):'-'}</td>`;
                    }).join('')}
                    <td style="text-align:right;font-weight:700;color:${total>limit && limit>0?'var(--danger)':'var(--warn)'}">฿${fmtNum(total)}</td>
                    <td class="text-xs">${fmtDate(d.due_date)}</td>
                    <td><span class="badge ${st.cls}">${st.label}</span></td>
                    <td>
                      <button class="btn btn-primary btn-sm" data-pay="${d.cust_id}">${ICONS.dollar} ตัดชำระ</button>
                    </td>
                  </tr>`;
                }).join('')
              }
            </tbody>
          </table>
        </div>
      </div>
    `;

    // Bindings
    document.getElementById('debt-search')?.addEventListener('input', debounce(e => { searchText = e.target.value; loadAndRender(); }, 300));
    el.querySelectorAll('.pill[data-fs]').forEach(btn => {
      btn.addEventListener('click', () => { filterStatus = btn.dataset.fs; loadAndRender(); });
    });
    document.getElementById('btn-check-alerts')?.addEventListener('click', async () => {
      toast('กำลังตรวจสอบสถานะลูกหนี้...', 'info');
      const r = await api('checkAlerts');
      if (r.success) {
        toast(`ตรวจสอบเสร็จ — เปลี่ยนสถานะ ${r.data?.status_changed||0} ราย | แจ้งเตือน ${r.data?.alerts?.length||0} ราย`, 'success');
        loadAndRender();
      } else {
        toast(r.error||'ไม่สำเร็จ', 'error');
      }
    });
    
    // Quick Payment — ลูกค้ามาจ่ายหนี้สดๆ ที่ร้าน
    document.getElementById('btn-quick-payment')?.addEventListener('click', () => openQuickPaymentModal());

    // Payment button
    el.querySelectorAll('button[data-pay]').forEach(btn => {
      btn.addEventListener('click', () => openPaymentModal(btn.dataset.pay));
    });
  }

  loadAndRender();
}

// ══════════════════════════════════════════════════════════════
// Quick Payment Modal — รับชำระจากลูกค้าแบบเร็ว
// Step 1: ค้นหาลูกค้า → Step 2: เลือกบิลที่จะตัด → Step 3: บันทึก
// ══════════════════════════════════════════════════════════════
async function openQuickPaymentModal() {
  let step = 1;
  let selectedCustomer = null;
  let searchResults = [];
  
  function renderStep1() {
    openModal('💰 รับชำระจากลูกค้า — Step 1: เลือกลูกค้า', `
      <div class="flex-col gap-3">
        <p class="text-sm text-dim">พิมพ์ชื่อ / รหัส / เบอร์โทร ของลูกค้า</p>
        <input class="input" id="qp-search" placeholder="ค้นหาลูกค้า..." autofocus style="font-size:1.05rem;padding:10px">
        <div id="qp-results" style="max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:8px">
          <div style="padding:20px;text-align:center;color:var(--text3)">พิมพ์เพื่อค้นหา...</div>
        </div>
      </div>
    `);
    
    const searchInput = document.getElementById('qp-search');
    searchInput?.focus();
    searchInput?.addEventListener('input', debounce(async (e) => {
      const q = e.target.value.trim();
      if (!q) {
        document.getElementById('qp-results').innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3)">พิมพ์เพื่อค้นหา...</div>';
        return;
      }
      
      const res = await api('getArLedger');
      const allDebtors = res.data || [];
      const matches = allDebtors.filter(d => {
        if (Number(d.total_outstanding||0) <= 0) return false;
        const s = q.toLowerCase();
        return (d.cust_name||'').toLowerCase().includes(s) ||
               (d.cust_id||'').toLowerCase().includes(s) ||
               (d.phone||'').includes(q);
      }).slice(0, 10);
      
      searchResults = matches;
      const container = document.getElementById('qp-results');
      if (!container) return;
      
      container.innerHTML = matches.length === 0 
        ? '<div style="padding:20px;text-align:center;color:var(--text3)">ไม่พบลูกค้าที่มีหนี้</div>'
        : matches.map((d, i) => {
          const status = d.credit_status || 'active';
          const statusColor = {active:'var(--success)', overdue:'var(--danger)', credit_break:'var(--warn)'}[status] || 'var(--text2)';
          return `
            <div class="qp-result" data-cust-id="${d.cust_id}" style="padding:12px;border-bottom:1px solid var(--border);cursor:pointer">
              <div class="flex justify-between items-center">
                <div>
                  <div class="font-semi" style="color:var(--text)">${d.cust_name}</div>
                  <div class="text-xs text-muted">${d.cust_id} · ${d.phone||'ไม่มีเบอร์'}</div>
                  <span class="badge" style="background:${statusColor}22;color:${statusColor};font-size:.7rem">${status}</span>
                </div>
                <div style="text-align:right">
                  <div style="font-weight:700;color:var(--warn)">฿${fmtNum(d.total_outstanding)}</div>
                  <div class="text-xs text-muted">${Object.keys(d.months||{}).length} เดือน</div>
                </div>
              </div>
            </div>
          `;
        }).join('');
      
      container.querySelectorAll('.qp-result').forEach(row => {
        row.addEventListener('click', () => {
          const custId = row.dataset.custId;
          selectedCustomer = matches.find(m => m.cust_id === custId);
          renderStep2();
        });
        row.addEventListener('mouseenter', () => row.style.background = 'rgba(79,156,249,.1)');
        row.addEventListener('mouseleave', () => row.style.background = '');
      });
    }, 300));
  }
  
  async function renderStep2() {
    if (!selectedCustomer) return;
    
    // ดึงบิลที่ค้างของลูกค้า
    const res = await api('getArLedger', { cust_id: selectedCustomer.cust_id });
    const cust = (res.data || [])[0] || selectedCustomer;
    const outstandingBills = [];
    
    // หา bills จาก months structure
    Object.entries(cust.months || {}).forEach(([month, data]) => {
      (data.bills || []).forEach(b => {
        if (Number(b.remaining||b.amount||0) > 0) {
          outstandingBills.push({
            ...b,
            month,
            remaining: Number(b.remaining||b.amount||0),
          });
        }
      });
    });
    
    outstandingBills.sort((a,b) => (a.due_date||'').localeCompare(b.due_date||''));
    const totalOutstanding = outstandingBills.reduce((s,b) => s + b.remaining, 0);
    
    openModal(`💰 ${selectedCustomer.cust_name} — Step 2: เลือกบิลที่ตัดชำระ`, `
      <div class="flex-col gap-3">
        <div style="padding:10px;background:rgba(245,166,35,.08);border-radius:8px;display:flex;justify-content:space-between">
          <div>
            <div class="text-xs text-dim">${selectedCustomer.cust_id}</div>
            <div class="font-semi">${selectedCustomer.cust_name}</div>
          </div>
          <div style="text-align:right">
            <div class="text-xs text-dim">ยอดค้างรวม</div>
            <div style="font-weight:700;color:var(--warn);font-size:1.2rem">฿${fmtNum(totalOutstanding)}</div>
          </div>
        </div>
        
        <div class="flex gap-2">
          <div class="input-group flex-1">
            <label>ยอดที่รับชำระ *</label>
            <input type="number" class="input" id="qp-amount" step="0.01" placeholder="0.00" autofocus style="font-size:1.1rem">
          </div>
          <div class="input-group flex-1">
            <label>วันที่รับ</label>
            <input type="date" class="input" id="qp-paydate" value="${todayISO()}">
          </div>
        </div>
        
        <div class="flex gap-2">
          <div class="input-group flex-1">
            <label>วิธีรับ</label>
            <select class="select" id="qp-method">
              <option value="Cash">เงินสด</option>
              <option value="Transfer">โอน</option>
              <option value="Cheque">เช็ค</option>
              <option value="Other">อื่นๆ</option>
            </select>
          </div>
          <div class="input-group flex-1">
            <label>ธนาคาร (ถ้าโอน)</label>
            <select class="select" id="qp-bank">
              ${['','KTB','KBANK','BBL','SCB','BAY','TMB','Other'].map(b=>`<option value="${b}">${b||'-'}</option>`).join('')}
            </select>
          </div>
        </div>
        
        <div class="input-group">
          <label>เลขที่อ้างอิง / Slip</label>
          <input class="input" id="qp-ref" placeholder="เลข slip, เลขเช็ค, หรืออ้างอิงอื่น">
        </div>
        
        <div>
          <label class="text-sm font-semi">บิลที่จะตัดชำระ <span class="text-xs text-muted">(เลือก FIFO อัตโนมัติ หรือคลิกเลือกเอง)</span></label>
          <div style="max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;margin-top:6px">
            ${outstandingBills.length === 0 ? 
              '<div style="padding:20px;text-align:center;color:var(--text3)">ไม่มีบิลค้างชำระ</div>' :
              outstandingBills.map(b => `
                <div style="padding:8px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
                  <label style="display:flex;align-items:center;gap:8px;flex:1;cursor:pointer">
                    <input type="checkbox" class="qp-bill" data-bill="${b.bill_no}" data-amount="${b.remaining}" checked>
                    <div>
                      <div class="text-sm font-semi">${b.bill_no}</div>
                      <div class="text-xs text-muted">${fmtDate(b.bill_date||b.date)} · ${b.month} ${b.due_date?'· Due '+fmtDate(b.due_date):''}</div>
                    </div>
                  </label>
                  <div style="font-weight:600;color:var(--danger)">฿${fmtNum(b.remaining)}</div>
                </div>
              `).join('')
            }
          </div>
        </div>
        
        <div class="input-group">
          <label>หมายเหตุ</label>
          <input class="input" id="qp-note" placeholder="หมายเหตุเพิ่มเติม">
        </div>
        
        <div class="flex gap-2 mt-2">
          <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
          <button class="btn btn-sm flex-1" id="qp-back" style="background:var(--surface2)">← ย้อนกลับ</button>
          <button class="btn btn-success btn-sm flex-1" id="qp-confirm">${ICONS.check} บันทึกรับชำระ</button>
        </div>
      </div>
    `);
    
    // Auto-set amount = total outstanding  
    document.getElementById('qp-amount').value = totalOutstanding.toFixed(2);
    
    // Back button
    document.getElementById('qp-back')?.addEventListener('click', renderStep1);
    
    // Confirm
    document.getElementById('qp-confirm')?.addEventListener('click', async () => {
      const amount = Number(document.getElementById('qp-amount').value);
      if (!amount || amount <= 0) { toast('กรอกยอดที่รับชำระ', 'error'); return; }
      
      const selectedBills = Array.from(document.querySelectorAll('.qp-bill:checked')).map(cb => ({
        bill_no: cb.dataset.bill,
        amount: Number(cb.dataset.amount),
      }));
      
      if (selectedBills.length === 0) {
        if (!confirm('ไม่ได้เลือกบิล — จะบันทึกเป็นยอดทั่วไป (ไม่ตัดบิลเฉพาะ)?')) return;
      }
      
      toast('กำลังบันทึก...', 'info');
      const res = await api('recordPayment', {
        cust_id: selectedCustomer.cust_id,
        amount: amount,
        payment_date: document.getElementById('qp-paydate').value,
        payment_method: document.getElementById('qp-method').value,
        reference: document.getElementById('qp-ref').value,
        bills_cleared: selectedBills,
        note: document.getElementById('qp-note').value,
        action_by: currentUser?.display_name || 'Admin',
      });
      
      if (res.success) {
        // สร้าง SP ชั่วคราวใน paymentList — รอ SP จริงมาแก้ทีหลัง
        const tempSpNo = 'SP-TEMP-' + String(Date.now()).slice(-6);
        paymentList.push({
          sp_no: tempSpNo,
          date: document.getElementById('qp-paydate').value,
          cust_id: selectedCustomer.cust_id,
          cust_name: selectedCustomer.cust_name,
          amount: amount,
          total: amount,
          cash: document.getElementById('qp-method').value === 'Cash' ? amount : 0,
          transfer: document.getElementById('qp-method').value === 'Transfer' ? amount : 0,
          cheque: document.getElementById('qp-method').value === 'Cheque' ? amount : 0,
          bills: selectedBills.map(b => ({ bill_no: b.bill_no, amount: b.amount, doc_type:'(Quick Payment)' })),
          match_status: 'pending',
          note: 'Quick Payment: ' + (document.getElementById('qp-note').value || ''),
          reference: document.getElementById('qp-ref').value,
          is_temp: true,
        });
        persistMainState();
        
        closeModal();
        toast(`รับชำระสำเร็จ ฿${fmtNum(amount)} จาก ${selectedCustomer.cust_name} · สร้าง ${tempSpNo}`, 'success');
        // re-render debt page
        if (currentPage === 'debt') navigateTo('debt');
      } else {
        toast(res.error || 'บันทึกไม่สำเร็จ', 'error');
      }
    });
  }
  
  renderStep1();
}


// ── Payment Modal (legacy - จากหน้า ติดตามหนี้ คลิกแต่ละราย) ──
async function openPaymentModal(custId) {
  const res = await api('getArLedger', { cust_id: custId });
  const debtors = res.data || [];
  const cust = debtors.find(d => d.cust_id === custId) || debtors[0];
  if (!cust) { toast('ไม่พบข้อมูลลูกค้า', 'error'); return; }

  const bills = cust.bills || [];
  const totalDue = Number(cust.total_outstanding) || 0;

  openModal(`ตัดชำระ — ${cust.cust_name}`, `
    <div class="flex-col gap-3">
      <div style="padding:12px;background:var(--surface2);border-radius:8px">
        <div class="text-xs text-dim">ยอดค้างทั้งหมด</div>
        <div class="font-bold" style="color:var(--danger);font-size:1.5rem">฿${fmtNum(totalDue)}</div>
        <div class="text-xs text-muted mt-2">${cust.contact_person||''} ${cust.phone?' · '+cust.phone:''}</div>
      </div>

      <div class="input-group">
        <label>ยอดที่จ่าย</label>
        <input type="number" class="input" id="pay-amount" placeholder="0.00" step="0.01" value="${totalDue}">
      </div>
      <div class="flex gap-2">
        <div class="input-group flex-1">
          <label>วันที่ชำระ</label>
          <input type="date" class="input" id="pay-date" value="${todayISO()}">
        </div>
        <div class="input-group flex-1">
          <label>ช่องทาง</label>
          <select class="select" id="pay-method">
            <option>Cash</option><option>Transfer</option><option>Cheque</option><option>Other</option>
          </select>
        </div>
      </div>
      <div class="input-group">
        <label>เลขอ้างอิง (เช่น SP No.)</label>
        <input class="input" id="pay-ref" placeholder="SP00126-xxxxxx">
      </div>

      <div class="mt-2">
        <div class="font-semi text-sm mb-2">เลือกบิลที่ต้องการตัด:</div>
        <div style="max-height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:8px">
          ${bills.length === 0 ? '<p class="text-sm text-muted" style="padding:12px">ไม่มีบิลค้าง (ข้อมูลอาจยังไม่มีใน AR Ledger)</p>' :
            bills.map(b => `
              <label class="flex items-center gap-3" style="padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer">
                <input type="checkbox" class="bill-check" data-bill="${b.bill_no}" data-amt="${b.outstanding}" ${b.paid?'disabled checked':''} style="accent-color:var(--primary)">
                <div class="flex-1">
                  <div class="text-sm font-semi">${b.bill_no||'-'}</div>
                  <div class="text-xs text-muted">${fmtDate(b.bill_date||b.date)} · กำหนด ${fmtDate(b.due_date)}</div>
                </div>
                <div class="text-right">
                  <div class="font-semi" style="color:${b.paid?'var(--text3)':'var(--danger)'}">฿${fmtNum(b.outstanding)}</div>
                  ${b.paid?'<div class="text-xs" style="color:var(--success)">ชำระแล้ว</div>':''}
                </div>
              </label>
            `).join('')
          }
        </div>
      </div>

      <div class="flex gap-2 mt-3">
        <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
        <button class="btn btn-primary btn-sm flex-1" id="confirm-pay">${ICONS.check} บันทึกการชำระ</button>
      </div>
    </div>
  `);

  document.getElementById('confirm-pay')?.addEventListener('click', async () => {
    const amount = Number(document.getElementById('pay-amount').value) || 0;
    const bills_to_clear = [...document.querySelectorAll('.bill-check:checked:not([disabled])')].map(c => c.dataset.bill);
    if (amount <= 0) { toast('กรอกยอดที่จ่าย', 'error'); return; }
    if (bills_to_clear.length === 0) { toast('เลือกบิลที่ต้องการตัด', 'error'); return; }

    const r = await api('recordPayment', {
      cust_id: custId,
      amount,
      bills_to_clear,
      payment_date: document.getElementById('pay-date').value,
      payment_method: document.getElementById('pay-method').value,
      reference: document.getElementById('pay-ref').value,
      action_by: currentUser?.display_name || 'Admin',
    });
    if (r.success) {
      toast(`ตัดชำระสำเร็จ — ${r.data.bills_cleared} บิล · ยอดคงเหลือ ฿${fmtNum(r.data.new_outstanding)} · สถานะ: ${r.data.new_status}`, 'success');
      closeModal();
      navigateTo('debt');
    } else {
      toast(r.error||'ไม่สำเร็จ', 'error');
    }
  });
}

// ── Sales ───────────────────────────────────────────────────
async function renderSales(el) {
  const stations = ['ALL','FRONT1','FRONT2','FRONT3','FRONT4','SS','SR','OS','OR'];
  let viewMode = 'daily', selectedDate = todayISO(), filterStation = 'ALL';
  let showEntry = false;

  // ค่าที่กรอก (เก็บ per station per date)
  const entryKey = () => `${selectedDate}`;
  const entries = {};
  function getEntry() {
    const k = entryKey();
    if (!entries[k]) entries[k] = {};
    return entries[k];
  }

  async function render() {
    const res = await api('getDailySales', { date: formatDateKey(selectedDate) });
    let data = (res.data?.data || []);

    // รวม uploaded sales (ถ้ามี)
    if (uploadedSales.length > 0) {
      data = [...data, ...uploadedSales];
    }

    if (filterStation !== 'ALL') data = data.filter(s => (s.station||s['Station']) === filterStation);
    const getAmt = s => Number(s.amount || s['Baht'] || 0);
    const totalSales = data.filter(s=>getAmt(s)>0).reduce((a,s)=>a+getAmt(s),0);
    const totalReturns = data.filter(s=>getAmt(s)<0).reduce((a,s)=>a+getAmt(s),0);
    const ent = getEntry();

    const billColor = b => b.startsWith('OS')?'var(--info)':b.startsWith('OR')?'var(--purple)':b.startsWith('SS')?'var(--success)':b.startsWith('SR')?'var(--danger)':'var(--text2)';

    el.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div class="page-title">ยอดขาย</div>
        <div class="flex gap-2 items-center">
          <div class="tab-bar">
            ${['daily','monthly','yearly'].map(m=>`<button class="tab-btn ${viewMode===m?'active':''}" data-view="${m}">${m==='daily'?'รายวัน':m==='monthly'?'รายเดือน':'รายปี'}</button>`).join('')}
          </div>
          <input type="date" class="input" value="${selectedDate}" style="width:155px" id="sales-date">
          <button class="btn ${showEntry?'btn-primary':'btn-outline'} btn-sm" id="toggle-entry">${ICONS.edit} กรอกยอด</button>
          <button class="btn btn-outline btn-sm" id="btn-import-sales">${ICONS.file} นำเข้า Excel</button>
        </div>
      </div>

      <!-- ═══ ช่องกรอกยอด (ตาม format จริง: แถว = ประเภท, คอลัมน์ = Station) ═══ -->
      <div id="entry-panel" class="${showEntry?'':'hidden'}" style="margin-bottom:16px">
        <div class="card" style="border:1px solid var(--primary);border-radius:var(--radius-lg);background:rgba(91,124,250,.03);padding:16px">
          <div class="flex justify-between items-center mb-3">
            <div class="font-semi" style="color:var(--primary)">📝 สรุปยอดรายวัน — ${fmtDate(selectedDate)}</div>
            <button class="btn btn-primary btn-sm" id="save-entry">${ICONS.check} บันทึก</button>
          </div>
          <div class="table-wrap">
            <table style="font-size:.82rem">
              <thead><tr>
                <th style="background:var(--surface3);min-width:120px">รายการ</th>
                <th style="background:var(--surface3);min-width:90px">All Station</th>
                ${['Front1','Front2','Front3','Front4','Invoice','Order','Payment'].map(s=>`<th style="background:var(--surface3);min-width:90px">${s}</th>`).join('')}
              </tr></thead>
              <tbody>
                ${[
                  {key:'cash_in',   label:'💰 นำเงินเข้า',   color:'var(--success)',editable:true},
                  {key:'sales',     label:'🧾 ยอดขาย',       color:'var(--primary)',editable:false},
                  {key:'cash_out',  label:'💸 นำเงินออก',     color:'var(--danger)', editable:true},
                  {key:'returns',   label:'↩️ ยอดคืนสินค้า', color:'var(--warn)',   editable:true},
                  {key:'drawer',    label:'🗃️ Cash Drawer',  color:'var(--purple)', editable:true},
                  {key:'transfer',  label:'🏦 Transfer',      color:'var(--info)',   editable:false},
                  {key:'card',      label:'💳 Card',           color:'var(--text2)',  editable:false},
                  {key:'cheque',    label:'📄 Cheque',         color:'var(--text2)',  editable:false},
                  {key:'refund',    label:'🔄 Refund',         color:'var(--text2)',  editable:false},
                ].map(row => {
                  const stns = ['Front1','Front2','Front3','Front4','Invoice','Order','Payment'];
                  const vals = stns.map(s => ent[row.key+'_'+s] || 0);
                  const allSum = vals.reduce((a,b)=>a+b,0);
                  return `<tr>
                    <td style="font-weight:600;color:${row.color};white-space:nowrap">${row.label}</td>
                    <td style="text-align:right;font-weight:700;color:var(--text)">${allSum?'฿'+fmtNum(allSum):'-'}</td>
                    ${stns.map((s,i) => row.editable
                      ? `<td><input class="input entry-cell" data-key="${row.key}_${s}" type="number" value="${vals[i]||''}" placeholder="0" step="0.01" style="width:85px;padding:4px 6px;font-size:.8rem;text-align:right;border-color:${row.color}40"></td>`
                      : `<td style="text-align:right;color:var(--text2)">${vals[i]?fmtNum(vals[i]):'-'}</td>`
                    ).join('')}
                  </tr>`;
                }).join('')}
                <tr style="border-top:2px solid var(--border)">
                  <td style="font-weight:800;color:var(--text)">📊 Sum (ตรวจสอบ)</td>
                  <td></td>
                  ${['Front1','Front2','Front3','Front4','Invoice','Order','Payment'].map(s => {
                    const inflow = (ent['cash_in_'+s]||0) + (ent['sales_'+s]||0) + (ent['cash_out_'+s]||0) + (ent['returns_'+s]||0);
                    const outflow = (ent['drawer_'+s]||0) + (ent['transfer_'+s]||0) + (ent['card_'+s]||0) + (ent['cheque_'+s]||0) + (ent['refund_'+s]||0);
                    const diff = outflow - inflow;
                    const isOk = Math.abs(diff) < 1;
                    return `<td style="text-align:center;font-weight:800;font-size:.85rem;color:${isOk?'var(--success)':'var(--danger)'}">
                      ${isOk ? '✓ OK' : '฿'+fmtNum(diff)}
                    </td>`;
                  }).join('')}
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="flex gap-2 mb-3 flex-wrap">
        ${stations.map(s=>`<button class="pill ${filterStation===s?'active':''}" data-station="${s}">${s}</button>`).join('')}
      </div>
      <div class="flex gap-3 flex-wrap mb-3 stagger">
        ${statCard('รายการ', data.length, '', 'var(--info)', ICONS.file)}
        ${statCard('ยอดขาย', '฿'+fmtNum(totalSales), '', 'var(--success)', ICONS.dollar)}
        ${statCard('ยอดคืน', '฿'+fmtNum(Math.abs(totalReturns)), '', 'var(--danger)', ICONS.dollar)}
        ${statCard('ยอดสุทธิ', '฿'+fmtNum(totalSales+totalReturns), '', 'var(--primary)', ICONS.bar)}
      </div>
      <div class="card-flat">
        <div class="table-wrap" style="max-height:380px;overflow-y:auto">
          <table>
            <thead><tr><th>Bill Number</th><th>Bill Date</th><th>Station</th><th>Type</th><th style="text-align:right">Baht</th><th>Confirmation</th><th>Pay Date</th><th>Remarks</th></tr></thead>
            <tbody>
              ${data.length ? data.map(s=>`<tr>
                <td style="color:${billColor(s.bill_no||s['Bill Number']||'')};font-weight:600">${s.bill_no||s['Bill Number']||''}</td>
                <td>${fmtDate(s.date||s['Bill Date']||'')}</td>
                <td><span class="badge badge-info">${s.station||s['Station']||''}</span></td>
                <td>${s.pay_method||s['Type']||''}</td>
                <td style="text-align:right;font-weight:600;color:${(s.amount||s['Baht']||0)<0?'var(--danger)':'var(--success)'}">฿${fmtNum(s.amount||s['Baht']||0)}</td>
                <td class="text-xs">${s['Confirmation']||s.sp_no||'-'}</td>
                <td class="text-xs">${s['Pay Date']||'-'}</td>
                <td class="text-xs truncate" style="max-width:150px">${s['Remarks1']||s.customer||''}</td>
              </tr>`).join('') : '<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--text3)">ไม่มีข้อมูลในวันที่เลือก</td></tr>'}
            </tbody>
          </table>
        </div>
        <div class="flex justify-between items-center" style="padding:12px 16px;border-top:1px solid var(--border)">
          <span class="text-sm text-dim">${data.length} รายการ</span>
          <span class="font-bold">รวม: ฿${fmtNum(data.reduce((a,s)=>a+getAmt(s),0))}</span>
        </div>
      </div>
    `;

    // ── Bindings ──
    el.querySelectorAll('.pill[data-station]').forEach(btn => {
      btn.addEventListener('click', () => { filterStation = btn.dataset.station; render(); });
    });
    el.querySelectorAll('.tab-btn[data-view]').forEach(btn => {
      btn.addEventListener('click', () => { viewMode = btn.dataset.view; render(); });
    });
    document.getElementById('sales-date')?.addEventListener('change', e => { selectedDate = e.target.value; render(); });
    document.getElementById('toggle-entry')?.addEventListener('click', () => { showEntry = !showEntry; render(); });

    // ── Live update entry cells (update DOM directly, no re-render) ──
    el.querySelectorAll('.entry-cell').forEach(inp => {
      inp.addEventListener('input', debounce(() => {
        const ent = getEntry();
        ent[inp.dataset.key] = parseFloat(inp.value) || 0;
        // Update All Station column + Sum row directly
        const stns = ['Front1','Front2','Front3','Front4','Invoice','Order','Payment'];
        const sumRow = el.querySelector('tr:last-child');
        if (!sumRow) return;
        const sumCells = sumRow.querySelectorAll('td');
        stns.forEach((s, idx) => {
          const inflow = (ent['cash_in_'+s]||0) + (ent['sales_'+s]||0) + (ent['cash_out_'+s]||0) + (ent['returns_'+s]||0);
          const outflow = (ent['drawer_'+s]||0) + (ent['transfer_'+s]||0) + (ent['card_'+s]||0) + (ent['cheque_'+s]||0) + (ent['refund_'+s]||0);
          const diff = outflow - inflow;
          const isOk = Math.abs(diff) < 1;
          if (sumCells[idx + 2]) {
            sumCells[idx + 2].textContent = isOk ? '✓ OK' : '฿' + fmtNum(diff);
            sumCells[idx + 2].style.color = isOk ? 'var(--success)' : 'var(--danger)';
          }
        });
      }, 150));
    });

    // ── Button bindings ──
    document.getElementById('btn-import-sales')?.addEventListener('click', () => {
      triggerFileUpload('file-sales', handleSalesUpload);
    });

    document.getElementById('save-entry')?.addEventListener('click', () => {
      toast('บันทึกยอดเรียบร้อย — พร้อม Matching กับ Statement', 'success');
    });
  }
  render();
}

// ── Matching ────────────────────────────────────────────────
async function renderMatching(el) {
  let bankFilter = 'ALL', matchDate = todayISO();
  const bankColors = { KTB:'#00a4e4', KBANK:'#138f2d', BBL:'#1e3a7b' };

  async function render() {
    const res = await api('getStatements', { date: formatDateKey(matchDate), bank: bankFilter });
    let data = res.data?.data || [];

    // รวม uploaded statements (ถ้ามี)
    if (uploadedStatements.length > 0) {
      data = [...data, ...uploadedStatements.filter(s => bankFilter === 'ALL' || s.bank === bankFilter)];
    }
    
    // Sort ASC by date (รองรับ descending format จาก BBL)
    data.sort((a, b) => (parseThaiDate(a.date) || 0) - (parseThaiDate(b.date) || 0));

    // Bank counts (แสดงจำนวนแต่ละธนาคารที่นำเข้าแล้ว)
    const bankCounts = {
      KTB: (statementsByBank.KTB || []).length,
      KBANK: (statementsByBank.KBANK || []).length,

        <div class="page-title">Statement Matching</div>
        <div class="flex gap-2 items-center">
          <input type="date" class="input" value="${matchDate}" style="width:155px" id="match-date">

        </div>
      </div>
      <div class="flex justify-between items-center mb-3">
        <div class="flex gap-2 flex-wrap items-center">
          ${['ALL','KTB','KBANK','BBL'].map(b => {
            const count = b === 'ALL' ? (bankCounts.KTB+bankCounts.KBANK+bankCounts.BBL) : bankCounts[b] || 0;
            return `<button class="pill ${bankFilter===b?'active':''}" data-bank="${b}" ${b!=='ALL'?`style="--pill-color:${bankColors[b]}"`:''}>${b}${count?` <span style="opacity:.7">(${count})</span>`:''}</button>`;
          }).join('')}
          ${(bankCounts.KTB+bankCounts.KBANK+bankCounts.BBL) > 0 ? '<button class="btn btn-ghost btn-sm" id="btn-clear-stmts" style="color:var(--danger)">✕ ล้าง Statement</button>' : ''}

        <button class="btn btn-ghost btn-sm">${ICONS.file} ดู Match Log</button>
      </div>
      <div class="flex gap-3 flex-wrap mb-3 stagger">
        ${statCard('Matched', matched, '', 'var(--success)', ICONS.check)}

      </div>
      <div class="card-flat">
        <div class="table-wrap" style="max-height:420px;overflow-y:auto">
          <table>
            <thead><tr><th>ธนาคาร</th><th>วันที่</th><th>เวลา</th><th>Ref.</th><th style="text-align:right">จำนวนเงิน</th><th>รายละเอียด</th><th>Station</th><th>Bill</th><th>สถานะ</th></tr></thead>
            <tbody>
              ${data.length ? data.map((s,i)=>{
                const isMatched = s.match_status === 'matched';

                const rowStyle = isMatched 
                  ? 'background:rgba(45,212,160,.06)' 
                  : 'background:rgba(239,87,87,.06);border-left:3px solid var(--danger)';
                return `
                <tr style="${rowStyle}" data-stmt-idx="${i}">
                  <td><span class="badge" style="background:${(bankColors[s.bank]||'#555')}22;color:${bankColors[s.bank]||'#aaa'}">${s.bank}</span></td>
                  <td>${fmtDate(s.date)}</td>
                  <td>${s.time}</td>
                  <td class="text-xs" style="font-family:var(--mono)">${s.ref_no}</td>

                  <td>${isMatched

                  }</td>
                </tr>
              `}).join('') : '<tr><td colspan="9" style="text-align:center;padding:30px;color:var(--text3)">ไม่มีข้อมูล Statement ในวันที่เลือก</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>
    `;

    el.querySelectorAll('.pill[data-bank]').forEach(btn => {
      btn.addEventListener('click', () => { bankFilter = btn.dataset.bank; render(); });
    });
    document.getElementById('match-date')?.addEventListener('change', e => { matchDate = e.target.value; render(); });
    document.getElementById('btn-stmt-upload')?.addEventListener('click', () => {
      triggerFileUpload('file-stmt', (result, name) => { handleStmtUpload(result, name); render(); });
    });
    document.getElementById('btn-clear-stmts')?.addEventListener('click', () => {
      const target = bankFilter === 'ALL' ? 'ทุกธนาคาร' : bankFilter;
      if (confirm(`ล้าง Statement ${target}?`)) {
        clearStatementsByBank(bankFilter);
        uploadedStatements = getAllStatements();
        try { safeStorage.set('sf_statementsByBank', JSON.stringify(statementsByBank)); } catch(e) {}
        toast(`ล้าง Statement ${target} แล้ว`, 'success');
        render();
      }
    });

    // ── Manual Match: เลือก Statement → เลือก Bill → ผูก ──
    el.querySelectorAll('.btn-manual-match').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const stmtIdx = Number(btn.dataset.stmtIdx);
        const stmt = data[stmtIdx];
        if (!stmt) return;
        
        const stmtDate = toISODate(stmt.date);
        const stmtAmt = Number(stmt.amount) || 0;
        
        // หาบิล candidate: ยอดตรง/ใกล้เคียง + ยังไม่ match
        const cashflowCandidates = (cashflowList||[])
          .filter(c => c.match_status !== 'matched')
          .map(c => ({
            bill_no: c.id,
            amount: c.type === 'supplier' ? -Math.abs(c.amount) : c.amount,
            date: c.date,
            station: 'Cashflow (' + c.type + ')',
            type: c.type === 'deposit' ? 'ฝากเงิน' : c.type === 'supplier' ? 'จ่าย Supplier' : c.type === 'transfer' ? 'โอน' : 'อื่นๆ',
            remarks1: c.counterparty || c.from_account || c.to_account || '',
            _cashflow: c,
          }));
        
        const candidates = [...billList.filter(b => {
          if (b.match_status === 'matched' || b.match_status === 'paid') return false;
          const amtDiff = Math.abs(Number(b.amount) - stmtAmt);
          return amtDiff < 1 || amtDiff < stmtAmt * 0.05;
        }), ...cashflowCandidates.filter(c => {
          const amtDiff = Math.abs(Number(c.amount) - stmtAmt);
          return amtDiff < 1 || amtDiff < stmtAmt * 0.05;
        })];
        // Sort: ยอดตรง + วันที่ใกล้ที่สุด
        candidates.sort((a, b) => {
          const aExact = Math.abs(Number(a.amount) - stmtAmt) < 0.01 ? 0 : 1;
          const bExact = Math.abs(Number(b.amount) - stmtAmt) < 0.01 ? 0 : 1;
          if (aExact !== bExact) return aExact - bExact;
          const aDate = toISODate(a.date), bDate = toISODate(b.date);
          return Math.abs(new Date(aDate) - new Date(stmtDate)) - Math.abs(new Date(bDate) - new Date(stmtDate));
        });
        
        openModal(`🔍 Match Statement → Bill`, `
          <div class="flex-col gap-3">
            <div style="padding:10px;background:var(--surface2);border-radius:8px">
              <div class="flex justify-between items-center">
                <div>
                  <div class="text-sm font-semi">${stmt.bank} · ${fmtDate(stmt.date)} · ${stmt.time||''}</div>
                  <div class="text-xs text-muted">${stmt.description||stmt.ref_no||''}</div>
                </div>
                <div style="font-size:1.2rem;font-weight:700;color:var(--success)">฿${fmtNum(stmtAmt)}</div>
              </div>
            </div>
            
            <div class="input-group">
              <label>ค้นหาบิล</label>
              <input class="input" id="mm-search" placeholder="เลขบิล / ชื่อลูกค้า / ยอดเงิน" autofocus>
            </div>
            
            <div class="text-xs text-dim">
              ${candidates.length?`🎯 เจอบิลที่ยอดใกล้เคียง ${candidates.length} รายการ (แนะนำด้านบน)`:'⚠️ ไม่เจอบิลยอดตรง — ค้นหาด้วยตนเอง'}
            </div>
            
            <div id="mm-bill-list" style="max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:8px"></div>
            
            <div class="input-group">
              <label>หมายเหตุ (ทำไมถึง match ด้วยตัวเอง)</label>
              <input class="input" id="mm-reason" placeholder="เช่น ลูกค้าโอนผิดยอด, รวมยอด 2 บิล">
            </div>
            
            <div class="flex gap-2 mt-2">
              <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
              <button class="btn btn-primary btn-sm flex-1" id="mm-confirm" disabled>${ICONS.check} ยืนยัน Match</button>
            </div>
          </div>
        `);
        
        let selectedBill = null;
        
        function renderBillList(searchText) {
          let list = searchText ? billList.filter(b => {
            const s = searchText.toLowerCase();
            return (b.match_status !== 'matched' && b.match_status !== 'paid') &&
              ((b.bill_no||'').toLowerCase().includes(s) ||
               (b.remarks1||'').toLowerCase().includes(s) ||
               String(b.amount).includes(s));
          }) : candidates.slice(0, 20);
          
          const bc = document.getElementById('mm-bill-list');
          if (!bc) return;
          bc.innerHTML = list.length ? list.map((b, i) => {
            const realIdx = billList.indexOf(b);
            const amtDiff = Math.abs(Number(b.amount) - stmtAmt);
            const isExact = amtDiff < 0.01;
            return `
              <div class="mm-item" data-bill-idx="${realIdx}" style="padding:10px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center">
                <div>
                  <div class="font-semi">${b.bill_no||'(ไม่มีเลข)'}</div>
                  <div class="text-xs text-muted">${fmtDate(b.date)} · ${b.station||''} · ${b.type||''} · ${b.remarks1||''}</div>
                </div>
                <div style="text-align:right">
                  <div style="font-weight:700;color:${isExact?'var(--success)':'var(--warn)'}">฿${fmtNum(b.amount)}</div>
                  ${isExact?'<div class="text-xs" style="color:var(--success)">✓ ตรงเป๊ะ</div>':`<div class="text-xs text-muted">ต่าง ${fmtNum(amtDiff)}</div>`}
                </div>
              </div>
            `;
          }).join('') : '<div style="padding:20px;text-align:center;color:var(--text3)">ไม่พบบิล</div>';
          
          bc.querySelectorAll('.mm-item').forEach(item => {
            item.addEventListener('click', () => {
              bc.querySelectorAll('.mm-item').forEach(i => i.style.background = '');
              item.style.background = 'rgba(79,156,249,.15)';
              selectedBill = Number(item.dataset.billIdx);
              document.getElementById('mm-confirm').disabled = false;
            });
          });
        }
        
        renderBillList('');
        document.getElementById('mm-search')?.addEventListener('input', debounce(e => renderBillList(e.target.value), 200));
        
        document.getElementById('mm-confirm')?.addEventListener('click', () => {
          if (selectedBill === null) return;
          const bill = billList[selectedBill];
          const reason = document.getElementById('mm-reason').value || '';
          
          // อัปเดต Statement
          stmt.match_status = 'matched';
          stmt.match_method = 'manual';
          stmt.match_station = bill.station || '';
          stmt.match_bill = bill.bill_no || '';
          stmt.matched_at = new Date().toISOString();
          stmt.matched_by = currentUser?.display_name || 'Admin';
          stmt.match_reason = reason;
          
          // อัปเดต Bill
          bill.match_status = 'matched';
          bill.matched_stmt_ref = stmt.ref_no || '';
          bill.matched_at = new Date().toISOString();
          
          // Persist
          try { safeStorage.set('sf_statementsByBank', JSON.stringify(statementsByBank)); } catch(e) {}
          persistMainState();
          
          closeModal();
          toast(`Match สำเร็จ: ${stmt.bank} ↔ ${bill.bill_no}`, 'success');
          render();
        });
      });
    });
    
    // ── Unmatch: ยกเลิก match ──
    el.querySelectorAll('.btn-unmatch').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const stmtIdx = Number(btn.dataset.stmtIdx);
        const stmt = data[stmtIdx];
        if (!stmt) return;
        
        if (!confirm(`ยกเลิกการ match กับ ${stmt.match_bill}?`)) return;
        
        // ปลด bill ด้วย (ถ้าเจอ)
        const bill = billList.find(b => b.bill_no === stmt.match_bill);
        if (bill && !bill.paid_by_sp) {
          bill.match_status = 'pending';
          delete bill.matched_stmt_ref;
          delete bill.matched_at;
        }
        
        stmt.match_status = 'unmatched';
        delete stmt.match_bill;
        delete stmt.match_station;
        delete stmt.match_method;
        delete stmt.matched_at;
        delete stmt.matched_by;
        delete stmt.match_reason;
        
        try { safeStorage.set('sf_statementsByBank', JSON.stringify(statementsByBank)); } catch(e) {}
        persistMainState();
        toast('ยกเลิก match แล้ว', 'success');
        render();
      });
    });
    document.getElementById('btn-auto-match')?.addEventListener('click', async () => {
      toast('กำลัง Auto Match...', 'info');

      // ── ลอง Backend ก่อน ──
      const res = await api('autoMatch', { date: formatDateKey(matchDate), action_by: currentUser?.display_name || 'Admin' });

      if (res.success && res.data && res.data.matched > 0) {
        toast(`Auto Match (Server) สำเร็จ — จับคู่ได้ ${res.data.matched} รายการ`, 'success');
        render();
        return;
      }

      // ── Fallback: Client-side match จากข้อมูลที่โหลดมาแล้ว (จับคู่โดย วันที่ + ยอด) ──
      // รวมทั้ง billList (Main), uploadedSales, และ cashflowList (deposit/supplier/transfer)
      const cashflowAsSales = (cashflowList||[]).map(c => ({
        bill_no: c.id,
        amount: c.type === 'supplier' ? -Math.abs(c.amount) : c.amount,
        date: c.date,
        station: 'Cashflow',
        type: 'Transfer',
        _cashflow: c, // reference back
      }));
      const allSales = [...(billList||[]), ...(uploadedSales||[]), ...cashflowAsSales];
      if (data.length > 0 && allSales.length > 0) {
        let clientMatched = 0;
        let skippedAlreadyMatched = 0;
        
        // ── สร้าง Set ของบิลที่ถูก match ไปแล้ว (จาก Statement ที่ matched) ──
        // ป้องกันการหยิบบิลเดียวกันไปใช้ซ้ำ
        const alreadyMatchedBillNos = new Set(
          data.filter(s => s.match_status === 'matched' && s.match_bill)
              .map(s => s.match_bill)
        );
        
        const transferSales = allSales.filter(s => {
          const type = (s.type || s.pay_method || s.Type || '').toLowerCase();
          if (type !== 'transfer') return false;
          // ข้ามบิลที่เคย matched ไปแล้ว
          const billNo = s.bill_no || s['Bill Number'] || '';
          if (billNo && alreadyMatchedBillNos.has(billNo)) return false;
          return true;
        });

        data.forEach(stmt => {
          // ── ไม่แตะรายการที่ matched แล้ว ──
          if (stmt.match_status === 'matched') {
            skippedAlreadyMatched++;
            return;
          }
          const stmtAmt = Number(stmt.amount || 0);
          const stmtDate = toISODate(stmt.date || stmt.trans_date);
          if (!stmtAmt || stmtAmt <= 0) return;

          const match = transferSales.find(sale => {
            if (sale._clientMatched) return false;
            const saleAmt = Number(sale.amount || sale.Baht || 0);
            const saleDate = toISODate(sale.date || sale.source_date);
            // ต้อง: ยอดตรง + วันที่ตรง (หรือต่างกันไม่เกิน 1 วัน)
            if (Math.abs(saleAmt - stmtAmt) > 0.01) return false;
            if (saleDate && stmtDate) {
              const diffMs = Math.abs(new Date(saleDate) - new Date(stmtDate));
              const diffDays = diffMs / (1000 * 60 * 60 * 24);
              if (diffDays > 1) return false;
            }
            return true;
          });

          if (match) {
            match._clientMatched = true;
            stmt.match_status = 'matched';
            stmt.match_station = match.station || match.Station || '';
            stmt.match_bill = match.bill_no || match['Bill Number'] || '';
            stmt.matched_at = new Date().toISOString();
            // ถ้า match กับ cashflow → mark cashflow ด้วย
            if (match._cashflow) {
              match._cashflow.match_status = 'matched';
              match._cashflow.match_stmt_ref = stmt.ref_no || '';
            }
            clientMatched++;
          }
        });

        // Persist updated statements (เก็บสถานะ matched ไว้)
        if (clientMatched > 0) {
          try { safeStorage.set('sf_statementsByBank', JSON.stringify(statementsByBank)); } catch(e) {}
          const skipMsg = skippedAlreadyMatched > 0 ? ` · ข้าม ${skippedAlreadyMatched} ที่ match แล้ว (ไม่ทับ)` : '';
          toast(`Auto Match สำเร็จ — จับคู่เพิ่ม ${clientMatched} รายการ${skipMsg}`, 'success');
          render();
          return;
        } else if (skippedAlreadyMatched > 0) {
          toast(`ไม่มีรายการใหม่ให้ match — มีอยู่แล้ว ${skippedAlreadyMatched} รายการ`, 'info');
          return;
        }
      }

      // ── ไม่เจอเลย ──
      const errMsg = res.error || 'ไม่พบรายการที่จับคู่ได้';
      toast(errMsg, 'error');

      // แนะนำสิ่งที่ต้องทำ
      openModal('Auto Match ไม่พบคู่', `
        <div class="flex-col gap-3">
          <p class="text-sm">ตรวจสอบว่า:</p>
          <div style="padding:12px;background:var(--surface2);border-radius:8px" class="text-sm">
            <p>1. <strong>นำเข้าข้อมูลยอดขาย</strong> ก่อน (หน้ายอดขาย → "นำเข้า Excel")</p>
            <p class="mt-2">2. <strong>วาง Statement</strong> ของธนาคาร (หน้า Matching → "วาง Statement")</p>
            <p class="mt-2">3. ยอดขายที่ Type = <strong>Transfer</strong> จะถูกจับคู่กับ Statement ที่ยอดตรงกัน</p>
          </div>
          ${res.error ? '<p class="text-xs text-dim mt-2">Server: '+res.error+'</p>' : ''}
        </div>
      `);
    });
  }
  render();
}
