        const MIN_BILLS_THRESHOLD = Math.min(100, Math.floor(beforeBills * 0.1));
        const MIN_STMTS_THRESHOLD = Math.min(50, Math.floor(beforeStmts * 0.1));
        
        if (beforeBills > 0 && tempBills.length < MIN_BILLS_THRESHOLD) {
          throw new Error(`ABORT: Pull ได้ ${tempBills.length} bills (คาดหวัง > ${MIN_BILLS_THRESHOLD})\n` +
            `Local มี ${beforeBills} bills — ไม่ควร rebuild เพราะอาจเสียข้อมูล\n\n` +

            `1. Endpoint getBillsWithUuid ยังไม่ deploy ใน backend\n` +
            `2. Sheet bills_2026 ถูกล้างใน Google Sheets\n` +
            `3. Response format ผิด\n\n` +
            `Local ไม่ถูกแตะต้อง — ข้อมูลเดิมยังอยู่ครบ`);
        }
        
        if (beforeStmts > 0 && totalStmts < MIN_STMTS_THRESHOLD) {
          throw new Error(`ABORT: Pull ได้ ${totalStmts} stmts (คาดหวัง > ${MIN_STMTS_THRESHOLD})\n` +
            `Local มี ${beforeStmts} stmts — ไม่ควร rebuild\n\n` +
            `Local ไม่ถูกแตะต้อง`);
        }
        
        tsLog(`   ✅ Validate ผ่าน — ปลอดภัยที่จะ swap`);
        
        // ── Step 3: SWAP (ปลอดภัยตรงนี้ เพราะ pull + validate ผ่านแล้ว) ──
        tsLog(`\n🔄 [3/3] Swap local ← temp...`);
        billList = tempBills;
        statementsByBank = { KTB: [], KBANK: [], 'BBL NW': [], BBL: [], TTB: [], UNKNOWN: [] };
        Object.keys(tempStmts).forEach(bank => {
          statementsByBank[bank] = tempStmts[bank];
        });
        uploadedStatements = getAllStatements();
        paymentList = tempPayments;
        spTempList = tempSpTemps;
        cashflowList = tempCashflow;
        supplierList = tempSuppliers;
        supplierPayments = tempSupplierPayments;
        
        // ⭐ Swap meta — user input รายวัน: นำเงินเข้า/ขาย/ออก/คืนสินค้า + นับธนบัตร
        //    Policy: merge แบบ "cloud ชนะ" — ถ้าต้องการเก็บ local data ไว้ ต้อง backup JSON ก่อน
        if (Object.keys(tempSummary.__byDate).length > 0) {

            mainSummary.__byDate[d] = v;
          });
        }
        if (Object.keys(tempCashCount.__byDate).length > 0) {
          if (!cashCount.__byDate) cashCount.__byDate = {};
          Object.entries(tempCashCount.__byDate).forEach(([d, v]) => {
            cashCount.__byDate[d] = v;
          });
        }
        
        // Reset fingerprints so next push compares fresh
        if (syncManager._fpCache) syncManager._fpCache = {};
        
        persistMainState();
        safeStorage.set('sf_statementsByBank', JSON.stringify(statementsByBank));
        safeStorage.set('sf_spTempList', JSON.stringify(spTempList));
        safeStorage.set('sf_mainSummary', JSON.stringify(mainSummary));
        safeStorage.set('sf_cashCount', JSON.stringify(cashCount));
        
        statusEl.style.color = 'var(--success)';
        tsLog(`\n🎉 Rebuild สำเร็จ!`);

      } catch (err) {

    document.getElementById('btn-backup-json')?.addEventListener('click', () => {

      // ขยะที่ filter ออก:
      //   1. Summary: label "" หรือ station "" (data corruption gate)
      //   2. CashCount: dict ว่างเปล่า {}
      //   ⭐ Sunday เก็บไว้ตามที่ user input — ไม่กรอง
      
      const cleanMainSummary = { __byDate: {} };
      Object.entries(mainSummary?.__byDate || {}).forEach(([d, dd]) => {
        if (!dd || typeof dd !== 'object') return;
        const cleaned = {};
        Object.entries(dd).forEach(([label, stations]) => {
          if (!label || !String(label).trim()) return;
          if (!stations || typeof stations !== 'object') return;
          const cleanStations = {};
          Object.entries(stations).forEach(([st, v]) => {
            if (!st || !String(st).trim()) return;
            cleanStations[st] = Number(v) || 0;
          });
          if (Object.keys(cleanStations).length > 0) cleaned[label] = cleanStations;
        });
        if (Object.keys(cleaned).length > 0) cleanMainSummary.__byDate[d] = cleaned;
      });
      Object.keys(mainSummary || {}).forEach(k => {
        if (k !== '__byDate') cleanMainSummary[k] = mainSummary[k];
      });
      
      const cleanCashCount = { __byDate: {} };
      Object.entries(cashCount?.__byDate || {}).forEach(([d, dd]) => {
        if (!dd || typeof dd !== 'object') return;
        const cleaned = {};
        Object.entries(dd).forEach(([k, v]) => {
          if (!k || !String(k).trim()) return;
          const num = Number(v);
          if (!isNaN(num)) cleaned[k] = num;
        });
        if (Object.keys(cleaned).length > 0) cleanCashCount.__byDate[d] = cleaned;
      });
      
      // ⭐ Normalize date formats ใน bills + stmts ให้เป็น ISO ก่อน export
      // กัน 2 format ปนกัน (dd/mm/yyyy + yyyy-mm-dd) ที่ทำให้ match/sort/dedup พัง
      const cleanBills = billList.map(b => {
        const out = { ...b };
        if (out.date && typeof toISODate === 'function') {
          const iso = toISODate(out.date);
          if (iso) out.date = iso;
        }
        if (out.pay_date && typeof toISODate === 'function') {
          const iso = toISODate(out.pay_date);
          if (iso) out.pay_date = iso;
        }
        if (out.due_date && typeof toISODate === 'function') {
          const iso = toISODate(out.due_date);
          if (iso) out.due_date = iso;
        }
        return out;
      });
      const cleanStmtsByBank = {};

        cleanStmtsByBank[bank] = arr.map(s => {

          if (out.date && typeof toISODate === 'function') {
            const iso = toISODate(out.date);
            if (iso) out.date = iso;
          }
          if (out.trans_date && typeof toISODate === 'function') {
            const iso = toISODate(out.trans_date);
            if (iso) out.trans_date = iso;
          }
          return out;
        });
      });
      
      const junkSummaryCount = Object.keys(mainSummary?.__byDate||{}).length - Object.keys(cleanMainSummary.__byDate).length;
      const junkCashCount = Object.keys(cashCount?.__byDate||{}).length - Object.keys(cleanCashCount.__byDate).length;
      
      const backup = {
        version: 'SmartFinance-v2',
        exported_at: new Date().toISOString(),

        billList: cleanBills,
        paymentList: paymentList,
        spTempList: spTempList,

        statementsByBank: cleanStmtsByBank,

          cashflow: cashflowList.length,
          suppliers: (supplierList||[]).length,
          supplierPayments: (supplierPayments||[]).length,
          metaSummary: Object.keys(cleanMainSummary.__byDate).length,
          metaCashCount: Object.keys(cleanCashCount.__byDate).length,
          _filtered: { summaryJunk: junkSummaryCount, cashCountEmpty: junkCashCount },
        },
      };
      const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `SmartFinance_Backup_${todayISO()}_${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
      const filteredMsg = (junkSummaryCount + junkCashCount > 0)

        : '';
      toast(`Backup สำเร็จ — ${backup._counts.bills} bills · ${backup._counts.stmts} stmts · ${backup._counts.metaSummary} meta dates${filteredMsg}`, 'success', 5000);

      const inp = document.createElement('input');
      inp.type = 'file';
      inp.accept = '.json';
      inp.onchange = async () => {
        if (!inp.files[0]) return;
        try {
          const text = await inp.files[0].text();
          const backup = JSON.parse(text);
          if (!backup.version || !backup.version.startsWith('SmartFinance')) {
            toast('ไฟล์นี้ไม่ใช่ backup ของ Smart Finance', 'error');
            return;
          }
          
          // ⭐ Compute stats from backup (handle both v1 and v2)
          const bkBills = (backup.billList || []).length;
          const bkStmts = Object.values(backup.statementsByBank || {}).reduce((s,arr) => s + (Array.isArray(arr)?arr.length:0), 0);
          const bkPayments = (backup.paymentList || []).length;
          const bkCashflow = (backup.cashflowList || []).length;
          const bkSuppliers = (backup.supplierList || []).length;
          const bkSupplierPayments = (backup.supplierPayments || []).length;
          const bkMetaSummary = Object.keys(backup.mainSummary?.__byDate || {}).length;
          const bkMetaCash = Object.keys(backup.cashCount?.__byDate || {}).length;
          
          if (!confirm(
            `⚠️ การ Restore จะทับข้อมูล local ทั้งหมด!\n\n` +
            `Backup:\n` +
            `• Version: ${backup.version}\n` +
            `• Export: ${new Date(backup.exported_at).toLocaleString('th-TH')}\n` +
            `• โดย: ${backup.exported_by || 'ไม่ระบุ'}\n\n` +
            `ข้อมูลใน backup:\n` +
            `• Bills: ${bkBills}\n` +
            `• Statements: ${bkStmts}\n` +
            `• SP: ${bkPayments}\n` +
            `• Cashflow: ${bkCashflow}\n` +
            `• Suppliers: ${bkSuppliers}\n` +
            `• SupplierPayments: ${bkSupplierPayments}\n` +
            `• Meta summary: ${bkMetaSummary} วัน\n` +
            `• Meta cashCount: ${bkMetaCash} วัน\n\n` +
            `ยืนยัน Restore?`
          )) return;
          
          // ⭐ Suspend sync ก่อน restore (กันไม่ให้ auto-push ระหว่างทำ)
          const wasEnabled = syncManager.enabled;
          syncManager.enabled = false;
          try { syncManager._inPull = true; } catch(_){}  // กัน markDirty
          if (syncManager.pushTimer) { clearTimeout(syncManager.pushTimer); syncManager.pushTimer = null; }
          
          // ── Restore core collections ──
          if (backup.billList) billList = backup.billList;
          if (backup.paymentList) paymentList = backup.paymentList;
          if (backup.spTempList) spTempList = backup.spTempList;
          if (backup.cashflowList) cashflowList = backup.cashflowList;
          if (backup.statementsByBank) statementsByBank = backup.statementsByBank;
          if (backup.mainSummary) mainSummary = backup.mainSummary;
          if (backup.cashCount) cashCount = backup.cashCount;
          // ⭐ v2 extended collections
          if (backup.supplierList) supplierList = backup.supplierList;
          if (backup.supplierPayments) supplierPayments = backup.supplierPayments;
          if (backup.ppReport) ppReport = backup.ppReport;
          if (backup.transferLog) transferLog = backup.transferLog;
          if (backup.customerList) customerList = backup.customerList;
          
          // ⭐ Clear sync artifacts
          syncManager.deletedBillUuids.clear();
          syncManager.deletedStmtUuids.clear();
          try { 
            localStorage.removeItem('sf_deleted_bill_uuids');
            localStorage.removeItem('sf_deleted_stmt_uuids');
          } catch(_){}
          syncManager.dirty.clear();
          
          // Persist + update storage
          persistMainState();
          safeStorage.set('sf_statementsByBank', JSON.stringify(statementsByBank));
          if (typeof invalidateBillsCache === 'function') invalidateBillsCache();
          
          // ⭐ Recompute fp cache ตรงกับ state ใหม่ (ไม่ push เบื้องต้น)
          syncManager._recomputeFpCache?.();
          
          // Re-enable sync but keep _inPull for a bit to avoid immediate push
          syncManager.enabled = wasEnabled;
          setTimeout(() => { syncManager._inPull = false; }, 2000);
          
          // ⭐ ถามว่าจะทำอะไรต่อ
          const action = confirm(
            `✅ Restore สำเร็จ!\n\n` +
            `• Bills: ${bkBills}\n` +
            `• Statements: ${bkStmts}\n` +
            `• Meta: ${bkMetaSummary} วัน\n\n` +
            `ต่อไปทำอะไรดี?\n` +
            `  [OK] = Push ไป cloud เลย (ทับ cloud ด้วย backup)\n` +
            `  [Cancel] = ดูข้อมูลก่อน (sync ตัดสินใจเอง)\n\n` +
            `⚠️ Push จะทับข้อมูลบน cloud ที่ใหม่กว่า!`
          );
          
          if (action && wasEnabled) {
            // Force push ทุกอย่าง
            ['bills','stmts','meta','payments','sp_temps','cashflow','suppliers'].forEach(t => syncManager.dirty.add(t));
            // Reset fp cache → force push ทุก type
            syncManager._fpCache = {};
            await syncManager._flushPush();
            toast('✅ Restore + Push cloud สำเร็จ', 'success', 5000);
          } else {
            toast(`Restore สำเร็จ — Bills ${bkBills} · Stmts ${bkStmts}`, 'success', 5000);
          }
          
          render();
        } catch (err) {
          syncManager._inPull = false;
          toast('อ่านไฟล์ไม่สำเร็จ: ' + err.message, 'error');
        }
      };
      inp.click();
    });
    
    // ── Export helpers ──
    function downloadCSV(rows, filename) {
      if (!rows || rows.length === 0) { toast('ไม่มีข้อมูลให้ export', 'info'); return; }
      const headers = Object.keys(rows[0]);
      const csvRows = [headers.join(',')].concat(
        rows.map(r => headers.map(h => {
          const val = r[h] == null ? '' : String(r[h]);
          return val.includes(',') || val.includes('"') || val.includes('\n') ? `"${val.replace(/"/g,'""')}"` : val;
        }).join(','))
      );
      // Add BOM for Excel Thai
      const blob = new Blob(['\uFEFF' + csvRows.join('\n')], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

      const from = document.getElementById('exp-from')?.value;

        const d = toISODate(item[dateField]);
        if (!d) return true;
        if (from && d < from) return false;
        if (to && d > to) return false;
        return true;
      });
    }

    // ══════════════════════════════════════════════════════
    // UUID MIGRATION (v1.0) — one-time migrate to UUID sync
    // ══════════════════════════════════════════════════════
    
    // Generate UUID v4 (works on all browsers)
    function genUuid() {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
      // Fallback
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }
    
    // Append line to progress log
    function uuidLog(msg) {
      const el = document.getElementById('uuid-progress');
      if (!el) return;
      el.style.display = 'block';
      const ts = new Date().toLocaleTimeString('th-TH');
      el.textContent += `[${ts}] ${msg}\n`;
      el.scrollTop = el.scrollHeight;
    }
    function uuidClearLog() {
      const el = document.getElementById('uuid-progress');
      if (el) el.textContent = '';
    }
    
    // Group bills/stmts by year (for per-year sheets)
    function groupByYear(items, dateField) {
      const byYear = {};
      items.forEach(item => {
        const d = String(item[dateField] || item.date || '').trim();
        // Extract year from dd/mm/yyyy or yyyy-mm-dd or ISO
        let year = null;
        let m = d.match(/^\d{1,2}\/\d{1,2}\/(\d{4})/);
        if (m) year = m[1];
        else if ((m = d.match(/^(\d{4})-\d{2}-\d{2}/))) year = m[1];
        else if (d instanceof Date) year = String(d.getFullYear());
        // พ.ศ. → ค.ศ.
        if (year && Number(year) > 2400) year = String(Number(year) - 543);
        if (!year) year = String(new Date().getFullYear()); // fallback current year
        if (!byYear[year]) byYear[year] = [];
        byYear[year].push(item);
      });
      return byYear;
    }
    
    // ── Build COMPACT meta rows (1 row = 1 meta_type per day) ──
    // จาก mainSummary.__byDate + cashCount.__byDate → array ของ rows พร้อม push
    function buildCompactMetaRows() {
      const LABEL_TO_KEY = {
        'นำเงินเข้า': 'cashIn', 'ยอดขาย': 'sales', 'นำเงินออก': 'cashOut',
        'ยอดคืนสินค้า': 'returns', 'Cash Drawer': 'cashDrawer',
        'Transfer': 'transfer', 'Card': 'card', 'Cheque': 'cheque', 'Refund': 'refund',
      };
      const nowStr = (typeof nowDisplay === 'function') ? nowDisplay() : new Date().toLocaleString('th-TH');
      const user = (window.currentUser && window.currentUser.display_name) || 'Admin';
      const rows = [];
      
      // Summary: 1 row ต่อวัน (รวมทุก station + meta key ใน data_json)
      if (mainSummary && mainSummary.__byDate) {
        Object.keys(mainSummary.__byDate).forEach(function(dateISO) {
          const dayLabels = mainSummary.__byDate[dateISO] || {};
          const flat = {};
          Object.keys(dayLabels).forEach(function(label) {
            const prefix = LABEL_TO_KEY[label] || label;
            const stations = dayLabels[label] || {};
            Object.keys(stations).forEach(function(station) {
              const v = Number(stations[station]);
              if (!isNaN(v) && v !== 0) {
                flat[prefix + '_' + station] = v;
              }
            });
          });
          if (Object.keys(flat).length > 0) {
            const dateDisplay = typeof fmtDate === 'function' ? fmtDate(dateISO) : dateISO;
            rows.push({
              meta_uuid: dateISO + '|summary',
              date: dateDisplay,
              meta_type: 'summary',
              data_json: JSON.stringify(flat),
              updated_at: nowStr,
              updated_by: user,
            });
          }
        });
      }
      
      // Cash Count: 1 row ต่อวัน
      if (cashCount && cashCount.__byDate) {
        Object.keys(cashCount.__byDate).forEach(function(dateISO) {
          const dayCash = cashCount.__byDate[dateISO] || {};
          const filtered = {};
          Object.keys(dayCash).forEach(function(k) {
            const v = Number(dayCash[k]);
            if (!isNaN(v) && v !== 0) filtered[k] = v;
          });
          if (Object.keys(filtered).length > 0) {
            const dateDisplay = typeof fmtDate === 'function' ? fmtDate(dateISO) : dateISO;
            rows.push({
              meta_uuid: dateISO + '|cash_count',
              date: dateDisplay,
              meta_type: 'cash_count',
              data_json: JSON.stringify(filtered),
              updated_at: nowStr,
              updated_by: user,
            });
          }
        });
      }
      
      return rows;
    }
    
    // Parse compact meta rows → merge into mainSummary/cashCount
    function parseCompactMetaRows(rows) {
      const KEY_TO_LABEL = {
        'cashIn': 'นำเงินเข้า', 'sales': 'ยอดขาย', 'cashOut': 'นำเงินออก',
        'returns': 'ยอดคืนสินค้า', 'cashDrawer': 'Cash Drawer',
        'transfer': 'Transfer', 'card': 'Card', 'cheque': 'Cheque', 'refund': 'Refund',
      };
      const VALID_META_TYPES = ['summary', 'cash_count'];
      const summary = { __byDate: {} };
      const cash = { __byDate: {} };
      let skippedJunk = 0;
      
      rows.forEach(function(r) {
        // ⭐ Safety filter: reject junk rows from old shifted-column data
        //    - meta_type must be 'summary' or 'cash_count'
        //    - data_json must exist and be parseable
        //    Old sheet had rows where meta_type='Front1'/'Invoice' (shifted columns)
        //    → parseCompactMetaRows will now skip them silently
        if (!VALID_META_TYPES.includes(r.meta_type)) {
          skippedJunk++;
          return;
        }
        
        // date: dd/mm/yyyy → dateISO yyyy-mm-dd
        let dateISO = r.date;
        if (/^\d{1,2}\/\d{1,2}\/\d{4}/.test(String(r.date))) {
          const parts = String(r.date).split('/');
          let y = Number(parts[2]); if (y > 2400) y -= 543;
          dateISO = y + '-' + String(parts[1]).padStart(2,'0') + '-' + String(parts[0]).padStart(2,'0');
        }
        // Also handle ISO with time: "2026-02-01 00:00:00" → "2026-02-01"
        if (/^\d{4}-\d{2}-\d{2}/.test(String(dateISO))) {
          dateISO = String(dateISO).substring(0, 10);
        }
        
        let data;
        try {
          data = typeof r.data_json === 'string' ? JSON.parse(r.data_json) : (r.data_json || {});
          // Extra safety: ต้องเป็น object ไม่ใช่ primitive (กันกรณี data_json = "cashIn" แบบ shifted)
          if (!data || typeof data !== 'object' || Array.isArray(data)) {
            skippedJunk++;
            return;
          }
        } catch (e) {
          skippedJunk++;
          return;
        }
        
        if (r.meta_type === 'summary') {
          if (!summary.__byDate[dateISO]) summary.__byDate[dateISO] = {};
          Object.keys(data).forEach(function(key) {
            // key = "cashIn_Front1" → prefix=cashIn, station=Front1
            const idx = key.indexOf('_');
            if (idx < 0) return;
            const prefix = key.substring(0, idx);
            const station = key.substring(idx + 1);
            const label = KEY_TO_LABEL[prefix] || prefix;
            if (!summary.__byDate[dateISO][label]) summary.__byDate[dateISO][label] = {};
            summary.__byDate[dateISO][label][station] = Number(data[key]) || 0;
          });
        } else if (r.meta_type === 'cash_count') {
          cash.__byDate[dateISO] = data;
        }
      });
      
      if (skippedJunk > 0) {
        console.warn(`[parseMeta] Skipped ${skippedJunk} junk rows (shifted-column legacy data)`);
      }
      
      return { summary: summary, cashCount: cash };
    }
    
    // Expose to window scope so syncManager (global) + other code can access
    window.buildCompactMetaRows = buildCompactMetaRows;
    window.parseCompactMetaRows = parseCompactMetaRows;
    window.groupByYear = groupByYear;

      btn.disabled = false;
    });
    
    // ── Migrate: Generate UUIDs → Clear Sheets → Push all ──
    document.getElementById('btn-uuid-migrate')?.addEventListener('click', async () => {
      const btn = document.getElementById('btn-uuid-migrate');
      
      // 🔒 Lock: ป้องกัน migrate วิ่งพร้อมกัน (double-click, 2 tabs, F5 mid-migrate)
      const LOCK_KEY = 'sf_migrating';
      const LOCK_TTL = 10 * 60 * 1000; // 10 นาที expiry
      try {
        const lockStr = localStorage.getItem(LOCK_KEY);
        if (lockStr) {
          const lockTs = Number(lockStr);
          if (Date.now() - lockTs < LOCK_TTL) {
            if (!confirm(`⚠️ มี migrate กำลังวิ่งอยู่ (เริ่มเมื่อ ${new Date(lockTs).toLocaleTimeString('th-TH')})\n\nอาจเป็นเพราะ:\n• เปิด app อีก tab แล้วกด migrate ที่นั่น\n• ปิด browser ระหว่าง migrate\n\nกดตกลง = ลบ lock แล้วรัน migrate ใหม่\nกดยกเลิก = หยุด`)) return;
          }
        }
        localStorage.setItem(LOCK_KEY, String(Date.now()));
      } catch (e) {}
      
      // Multiple confirmations
      if (!confirm(
        `🚀 Migrate ข้อมูลเก่าสู่ UUID\n\n` +
        `จะทำ 5 ขั้นตอน:\n` +
        `1. Generate UUID + Build Meta (${billList.length} บิล, ${getAllStatements().length} stmts)\n` +
        `2. Prepare Sheet — เพิ่ม column uuid (bills/stmts/meta)\n` +
        `3. Clear Sheet — ล้าง bills_YYYY / stmts_YYYY / meta_YYYY\n` +
        `4. Push ทั้งหมดด้วย UUID\n` +
        `5. Verify row count\n\n` +
        `⚠️ จะใช้เวลาประมาณ 1-2 นาที\n` +
        `⚠️ Backup JSON แล้วหรือยัง?\n\nยืนยัน?`
      )) return;
      
      if (!confirm(`⚠️⚠️ ยืนยันครั้งสุดท้าย — Sheet ข้อมูลทั้งหมดจะถูก clear แล้ว push ใหม่\n\nข้อมูล local จะไม่หาย แต่ถ้า push fail จะต้อง migrate ใหม่\n\nทำต่อ?`)) return;
      
      btn.disabled = true;
      uuidClearLog();
      document.getElementById('uuid-result').textContent = '⏳ กำลัง migrate...';
      document.getElementById('uuid-result').style.color = 'var(--info)';
      
      // ⏸ Pause sync เพื่อกัน auto-push ระหว่าง migrate
      const wasEnabled = syncManager.enabled;
      if (wasEnabled) {
        syncManager.setEnabled(false);
        uuidLog('⏸ หยุด auto-sync ชั่วคราว');
      }
      
      const startTime = Date.now();
      let success = true;
      
      try {
        // ── Step 1: Generate UUIDs for all bills/stmts + build meta rows ──
        uuidLog('\n━━━ [1/5] Generate UUIDs + Build Meta ━━━');
        let billsGenerated = 0;
        billList.forEach(b => {
          if (!b.bill_uuid) {
            b.bill_uuid = genUuid();
            billsGenerated++;
          }
        });
        let stmtsGenerated = 0;
        Object.keys(statementsByBank).forEach(bank => {
          (statementsByBank[bank] || []).forEach(s => {
            if (!s.stmt_uuid) {
              s.stmt_uuid = genUuid();
              stmtsGenerated++;
            }
          });
        });
        uuidLog(`   ✓ Generated ${billsGenerated} bill uuids, ${stmtsGenerated} stmt uuids`);
        
        // Build compact meta rows (meta_uuid = composite key → stable)
        const metaRows = buildCompactMetaRows();
        uuidLog(`   ✓ Built ${metaRows.length} meta rows (compact format)`);
        
        // Save to localStorage ทันที (กันกรณีพลาดไม่ได้สูญข้อมูล uuid)
        persistMainState();
        if (typeof flushPersistState === 'function') flushPersistState();
        uuidLog('   ✓ บันทึก UUIDs ใน localStorage แล้ว');
        
        // ── Step 2: Group by year + Prepare sheets ──
        uuidLog('\n━━━ [2/5] Prepare Sheets ━━━');
        const billsByYear = groupByYear(billList, 'date');
        const stmtsByYear = groupByYear(getAllStatements(), 'date');
        const metaByYear = groupByYear(metaRows, 'date');
        const allYears = [...new Set([
          ...Object.keys(billsByYear),
          ...Object.keys(stmtsByYear),
          ...Object.keys(metaByYear),
        ])].sort();
        
        uuidLog(`   ปีที่พบ: ${allYears.join(', ')}`);
        
        for (const year of allYears) {
          const r1 = await api('prepareSheet', { kind: 'bills', year });
          if (r1?.success) {
            uuidLog(`   ✓ bills_${year}: ${r1.data.added ? 'added column' : 'already has uuid'}`);
          } else {
            uuidLog(`   ❌ bills_${year}: ${r1?.error || 'error'}`);
            throw new Error(`prepareSheet bills_${year} failed`);
          }
          const r2 = await api('prepareSheet', { kind: 'stmts', year });
          if (r2?.success) {
            uuidLog(`   ✓ stmts_${year}: ${r2.data.added ? 'added column' : 'already has uuid'}`);
          } else {
            uuidLog(`   ❌ stmts_${year}: ${r2?.error || 'error'}`);
            throw new Error(`prepareSheet stmts_${year} failed`);
          }
          const r3 = await api('prepareSheet', { kind: 'meta', year });
          if (r3?.success) {
            uuidLog(`   ✓ meta_${year}: ${r3.data.added ? 'added column' : 'already has uuid'}`);
          } else {
            uuidLog(`   ❌ meta_${year}: ${r3?.error || 'error'}`);
            throw new Error(`prepareSheet meta_${year} failed`);
          }
        }
        
        // ── Step 3: Clear sheets ──
        uuidLog('\n━━━ [3/5] Clear Sheets ━━━');
        let clearFailed = false;
        for (const year of allYears) {
          if (billsByYear[year]?.length > 0) {
            const r = await api('clearSheetData', { sheet: `bills_${year}` });
            if (r?.success) uuidLog(`   ✓ bills_${year}: cleared ${r.data.cleared} rows`);
            else { uuidLog(`   ❌ bills_${year}: ${r?.error || 'error'}`); clearFailed = true; }
          }
          if (stmtsByYear[year]?.length > 0) {
            const r = await api('clearSheetData', { sheet: `stmts_${year}` });
            if (r?.success) uuidLog(`   ✓ stmts_${year}: cleared ${r.data.cleared} rows`);
            else { uuidLog(`   ❌ stmts_${year}: ${r?.error || 'error'}`); clearFailed = true; }
          }
          if (metaByYear[year]?.length > 0) {
            const r = await api('clearSheetData', { sheet: `meta_${year}` });
            if (r?.success) uuidLog(`   ✓ meta_${year}: cleared ${r.data.cleared} rows`);
            else { uuidLog(`   ❌ meta_${year}: ${r?.error || 'error'}`); clearFailed = true; }
          }
        }
        
        // 🛑 Abort migration ถ้า clear fail — ไม่งั้น push จะ append บน data เก่า → บวม
        if (clearFailed) {
          throw new Error('Clear Sheet fail — หยุด migration เพื่อกัน sheet บวม กรุณา redeploy backend (code.gs uuid_sync มี fix แล้ว) แล้วรัน migrate ใหม่');
        }
        
        // ── Step 4: Push in chunks ──
        uuidLog('\n━━━ [4/5] Push ด้วย UUID ━━━');
        const CHUNK_SIZE = 500;
        let totalBillsPushed = 0;
        let totalStmtsPushed = 0;
        let totalMetaPushed = 0;
        
        for (const year of allYears) {
          // Bills for this year
          const yearBills = billsByYear[year] || [];
          if (yearBills.length > 0) {
            uuidLog(`   📤 bills_${year}: ${yearBills.length} rows → chunk ${CHUNK_SIZE}`);
            for (let i = 0; i < yearBills.length; i += CHUNK_SIZE) {
              const chunk = yearBills.slice(i, i + CHUNK_SIZE);
              // Normalize date to ISO for consistency
              const normalized = chunk.map(b => {
                const isoDate = typeof toISODate === 'function' ? toISODate(b.date) : b.date;
                return { ...b, date: isoDate || b.date };
              });
              const r = await api('upsertBills', {
                year,
                records: normalized,
                deletes: [],
              });
              if (r?.success) {
                totalBillsPushed += r.data.inserted + r.data.updated;
                uuidLog(`      chunk ${Math.floor(i/CHUNK_SIZE)+1}: inserted=${r.data.inserted} updated=${r.data.updated}`);
              } else {
                uuidLog(`      ❌ chunk ${Math.floor(i/CHUNK_SIZE)+1}: ${r?.error || 'error'}`);
                throw new Error(`upsertBills failed at chunk ${Math.floor(i/CHUNK_SIZE)+1}`);
              }
            }
          }
          
          // Stmts for this year
          const yearStmts = stmtsByYear[year] || [];
          if (yearStmts.length > 0) {
            uuidLog(`   📤 stmts_${year}: ${yearStmts.length} rows → chunk ${CHUNK_SIZE}`);
            for (let i = 0; i < yearStmts.length; i += CHUNK_SIZE) {
              const chunk = yearStmts.slice(i, i + CHUNK_SIZE);
              const normalized = chunk.map(s => {
                const isoDate = typeof toISODate === 'function' ? toISODate(s.date || s.trans_date) : s.date;
                return { ...s, date: isoDate || s.date };
              });
              const r = await api('upsertStatements', {
                year,
                records: normalized,
                deletes: [],
              });
              if (r?.success) {
                totalStmtsPushed += r.data.inserted + r.data.updated;
                uuidLog(`      chunk ${Math.floor(i/CHUNK_SIZE)+1}: inserted=${r.data.inserted} updated=${r.data.updated}`);
              } else {
                uuidLog(`      ❌ chunk ${Math.floor(i/CHUNK_SIZE)+1}: ${r?.error || 'error'}`);
                throw new Error(`upsertStatements failed at chunk ${Math.floor(i/CHUNK_SIZE)+1}`);
              }
            }
          }
          
          // Meta for this year (compact format: ~3 rows/day)
          const yearMeta = metaByYear[year] || [];
          if (yearMeta.length > 0) {
            uuidLog(`   📤 meta_${year}: ${yearMeta.length} rows → chunk ${CHUNK_SIZE}`);
            for (let i = 0; i < yearMeta.length; i += CHUNK_SIZE) {
              const chunk = yearMeta.slice(i, i + CHUNK_SIZE);
              const r = await api('upsertMeta', {
                year,
                records: chunk,
                deletes: [],
              });
              if (r?.success) {
                totalMetaPushed += r.data.inserted + r.data.updated;
                uuidLog(`      chunk ${Math.floor(i/CHUNK_SIZE)+1}: inserted=${r.data.inserted} updated=${r.data.updated}`);
              } else {
                uuidLog(`      ❌ chunk ${Math.floor(i/CHUNK_SIZE)+1}: ${r?.error || 'error'}`);
                throw new Error(`upsertMeta failed at chunk ${Math.floor(i/CHUNK_SIZE)+1}`);
              }
            }
          }
        }
        
        uuidLog(`\n   ✓ Total pushed: ${totalBillsPushed} bills, ${totalStmtsPushed} stmts, ${totalMetaPushed} meta`);
        
        // ── Step 5: Verify ──
        uuidLog('\n━━━ [5/5] Verify ━━━');
        let allMatch = true;
        for (const year of allYears) {
          const r = await api('verifySheetCount', { year });
          if (r?.success) {
            const localBills = (billsByYear[year] || []).length;
            const localStmts = (stmtsByYear[year] || []).length;
            const localMeta = (metaByYear[year] || []).length;
            const cloudBills = r.data.counts[`bills_${year}`] || 0;
            const cloudStmts = r.data.counts[`stmts_${year}`] || 0;
            const cloudMeta = r.data.counts[`meta_${year}`] || 0;
            const billMatch = localBills === cloudBills;
            const stmtMatch = localStmts === cloudStmts;
            const metaMatch = localMeta === cloudMeta;
            uuidLog(`   ${billMatch?'✓':'⚠️'} bills_${year}: local=${localBills} cloud=${cloudBills} ${billMatch?'MATCH':'MISMATCH'}`);
            uuidLog(`   ${stmtMatch?'✓':'⚠️'} stmts_${year}: local=${localStmts} cloud=${cloudStmts} ${stmtMatch?'MATCH':'MISMATCH'}`);
            uuidLog(`   ${metaMatch?'✓':'⚠️'} meta_${year}: local=${localMeta} cloud=${cloudMeta} ${metaMatch?'MATCH':'MISMATCH'}`);
            if (!billMatch || !stmtMatch || !metaMatch) allMatch = false;
          }
        }
        
        const duration = Math.round((Date.now() - startTime) / 1000);
        if (allMatch) {
          uuidLog(`\n🎉 Migration สำเร็จ! (${duration}s)`);
          uuidLog('   ข้อมูลใน Sheet ตรงกับ local ทุกปี');
          uuidLog('   ตอนนี้ระบบพร้อมใช้ UUID-based sync แล้ว');
          document.getElementById('uuid-result').textContent = `✅ สำเร็จ (${duration}s) — ${totalBillsPushed} bills · ${totalStmtsPushed} stmts · ${totalMetaPushed} meta`;
          document.getElementById('uuid-result').style.color = 'var(--success)';
          toast(`Migration สำเร็จ! (${duration}s)`, 'success', 5000);
        } else {
          uuidLog(`\n⚠️ Migration เสร็จแต่ count ไม่ตรง — ตรวจ log ด้านบน`);
          document.getElementById('uuid-result').textContent = `⚠️ count mismatch`;
          document.getElementById('uuid-result').style.color = 'var(--warn)';
        }
        
      } catch (err) {
        success = false;
        uuidLog(`\n❌ Migration Failed: ${err.message}`);
        document.getElementById('uuid-result').textContent = `❌ ${err.message}`;
        document.getElementById('uuid-result').style.color = 'var(--danger)';
        toast('Migration ล้มเหลว — ดู log', 'error', 4000);
      }
      
      // Resume sync if was enabled
      if (wasEnabled) {
        syncManager.setEnabled(true);
        uuidLog('\n▶ เปิด auto-sync กลับ');
      }
      
      // 🔓 Release lock
      try { localStorage.removeItem('sf_migrating'); } catch (e) {}
      
      btn.disabled = false;
    });
    
    
  }
  
  render();
}

// ── Alerts ──────────────────────────────────────────────────
async function renderAlerts(el) {
  const res = await api('getAlerts');
  const backendAlerts = res.data || [];
  const today = todayISO();
  
  // ── รวบรวม alerts จากทั้งระบบ ──
  const alerts = [];
  
  // 1. Backend alerts (จาก ar_ledger)
  backendAlerts.forEach(a => {
    alerts.push({
      category: 'debt',
      priority: a.alert_type === 'overdue' ? 1 : a.alert_type === 'credit_break' ? 2 : 3,
      title: a.cust_name,
      detail: `ยอดค้าง ฿${fmtNum(a.amount_due||0)} · กำหนด ${fmtDate(a.due_date)}`,
      meta: a.phone ? `📞 ${a.phone}` : '',
      type: a.alert_type,
      action: 'debt',
      data: a,
    });
  });
  
  // 2. เช็คเลยวันคาด
  billList.filter(b => 
    b.match_status !== 'void' && b.type === 'Cheque' && 
    b.expected_clear_date && toISODate(b.expected_clear_date) < today &&
    b.match_status !== 'matched' && b.match_status !== 'bounced'
  ).forEach(b => {
    const daysOver = Math.floor((new Date(today) - new Date(toISODate(b.expected_clear_date))) / 86400000);
    alerts.push({
      category: 'cheque',
      priority: 1,
      title: `เช็ค ${b.bill_no||'(ไม่มีเลข)'} เลยวันคาด ${daysOver} วัน`,
      detail: `฿${fmtNum(b.amount)} · วันที่คาด ${fmtDate(b.expected_clear_date)}`,
      meta: b.remarks1 || '',
      type: 'cheque_overdue',
      action: 'main',
      data: b,
    });
  });
  
  // 3. เช็คเด้ง
  billList.filter(b => b.match_status === 'bounced').forEach(b => {
    alerts.push({
      category: 'cheque_bounce',
      priority: 1,
      title: `🚫 เช็คเด้ง ${b.bill_no||'(ไม่มีเลข)'}`,
      detail: `฿${fmtNum(b.amount)} · ${b.remarks1||''}`,
      meta: fmtDate(b.bounced_at),
      type: 'cheque_bounced',
      action: 'main',
      data: b,
    });
  });
  
  // 4. SP-TEMP ที่ยังไม่แก้
  paymentList.filter(p => p.is_temp || /^SP-TEMP-/.test(p.sp_no)).forEach(sp => {
    alerts.push({
      category: 'sp_temp',
      priority: 3,
      title: `SP ชั่วคราว ${sp.sp_no}`,
      detail: `${sp.cust_name} · ฿${fmtNum(sp.total)} · ${fmtDate(sp.date)}`,
      meta: 'รอ SP จริงจากโปรแกรม Smart',
      type: 'sp_temp',
      action: 'payments',
      data: sp,
    });
  });
  
  // 5. Statement unmatched > 3 วัน
  const old3days = new Date(Date.now() - 3*86400000).toISOString().substring(0,10);
  getAllStatements().filter(s => 
    s.match_status !== 'matched' && toISODate(s.date) < old3days
  ).forEach(s => {
    alerts.push({
      category: 'stmt_unmatched',
      priority: 2,
      title: `Statement ${s.bank} ยังไม่ match`,
      detail: `฿${fmtNum(s.amount)} · ${fmtDate(s.date)} · ${s.description||''}`,
      meta: s.ref_no || '',
      type: 'stmt_unmatched',
      action: 'matching',
      data: s,
    });
  });
  
  // 6. Business rule violations (Cashflow)
  cashflowList.forEach(c => {
    if (!c.bank || !c.vat) return;
    const bankDef = BANK_ACCOUNTS[c.bank];
    if (!bankDef) return;
    if (bankDef.vat !== c.vat) {
      alerts.push({
        category: 'rule_violation',
        priority: 1,
        title: `🚨 กฎโดนละเมิด: ${c.type} ${c.vat}`,
        detail: `ใช้ ${c.bank} (${bankDef.vat}) · ฿${fmtNum(c.amount)}`,
        meta: c.counterparty || '',
        type: 'rule_violation',
        action: 'cashflow',
        data: c,
      });
    }
  });
  
  // 7. Supplier Payments — รอโอน / โอนแล้วยังไม่ match
  (supplierPayments||[]).filter(p => p.status === 'pending' || p.status === 'scheduled').forEach(p => {
    const isOverdue = p.scheduled_date && toISODate(p.scheduled_date) < today;
    alerts.push({
      category: 'supplier_pending',
      priority: isOverdue ? 1 : 3,
      title: `${isOverdue?'🚨 เลยวันนัด':'⏳ รอโอน'} ${p.supplier_name}`,
      detail: `฿${fmtNum(p.amount)} · ${p.vat} · โอนจาก ${p.bank}${p.scheduled_date?' · นัด '+fmtDate(p.scheduled_date):''}`,
      meta: p.invoice_no ? 'INV: '+p.invoice_no : '',
      type: 'supplier_pending',
      action: 'supplier',
      data: p,
    });
  });
  
  (supplierPayments||[]).filter(p => p.status === 'paid' && p.match_status !== 'matched').forEach(p => {
    alerts.push({
      category: 'supplier_unmatched',
      priority: 2,
      title: `PP ${p.pp_no||'(ไม่มีเลข)'} ยังไม่ match`,
      detail: `${p.supplier_name} · ฿${fmtNum(p.amount)} · โอนเมื่อ ${fmtDate(p.transfer_date)}`,
      meta: p.reference || '',
      type: 'supplier_unmatched',
      action: 'matching',
      data: p,
    });
  });
  
  // 8. Supplier cheques — ค้างขึ้นเงิน > 30 วัน
  (supplierPayments||[]).filter(p => 
    p.status === 'paid' && 
    p.payment_method === 'เช็ค' && 
    !p.cheque_cleared_date
  ).forEach(p => {
    const chqDate = toISODate(p.cheque_date || p.transfer_date);
    if (!chqDate) return;
    const daysOut = Math.floor((new Date(today) - new Date(chqDate)) / 86400000);
    if (daysOut < 30) return; // ยังไม่ 30 วัน — ข้าม
    alerts.push({
      category: 'supplier_cheque_stale',
      priority: daysOut > 60 ? 1 : 2,
      title: `📝 เช็ค ${p.cheque_no||'(ไม่มีเลข)'} ค้างขึ้นเงิน ${daysOut} วัน`,
      detail: `${p.supplier_name} · ฿${fmtNum(p.amount)} · เขียนเช็ค ${fmtDate(chqDate)}${p.pp_no?' · PP: '+p.pp_no:''}`,
      meta: daysOut > 60 ? '🚨 ควรติดตาม Supplier' : `เช็คจ่ายออกจาก ${p.cheque_issued_bank||'KTB'}`,
      type: 'supplier_cheque_stale',
      action: 'supplier',
      data: p,
    });
  });
  
  // 9. Misrouted Payments — ลูกค้าโอนผิดธนาคาร
  // SS/SR (VAT) → โอนเข้า BBL NW = ผิด
  // OS/OR (NOVAT) → โอนเข้า KTB/KBANK/BBL = ผิด
  billList.filter(b => b.match_status === 'matched' && b.bill_no && b.bank).forEach(b => {
    const misroute = detectMisroutedPayment(b.bill_no, b.bank);
    if (!misroute) return;
    alerts.push({
      category: 'misrouted_payment',
      priority: 2,
      title: `⚠️ บิล ${b.bill_no} โอนผิดธนาคาร`,
      detail: `${misroute.msg} · ฿${fmtNum(b.amount)}`,
      meta: `${b.remarks1||b.station||''}${b.date?' · '+fmtDate(b.date):''}`,
      type: 'misrouted_payment',
      action: 'main',
      data: b,
    });
  });
  
  // Sort by priority
  alerts.sort((a, b) => a.priority - b.priority);
  
  // Category counts
  const categories = {
    all: alerts.length,
    debt: alerts.filter(a => a.category === 'debt').length,
    cheque: alerts.filter(a => a.category === 'cheque' || a.category === 'cheque_bounce').length,
    sp_temp: alerts.filter(a => a.category === 'sp_temp').length,
    stmt_unmatched: alerts.filter(a => a.category === 'stmt_unmatched').length,
    rule_violation: alerts.filter(a => a.category === 'rule_violation').length,
    supplier_pending: alerts.filter(a => a.category === 'supplier_pending').length,
    supplier_unmatched: alerts.filter(a => a.category === 'supplier_unmatched').length,
    supplier_cheque_stale: alerts.filter(a => a.category === 'supplier_cheque_stale').length,
    misrouted_payment: alerts.filter(a => a.category === 'misrouted_payment').length,
  };
  
  let filterCat = 'all';
  
  function renderList() {
    const filtered = filterCat === 'all' ? alerts : alerts.filter(a => 
      a.category === filterCat || (filterCat === 'cheque' && a.category === 'cheque_bounce')
    );
    
    el.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div class="page-title">🔔 แจ้งเตือนทั้งหมด</div>
        <div class="text-xs text-muted">${alerts.length} รายการ</div>
      </div>
      
      <!-- Filter pills -->
      <div class="flex gap-2 mb-3 flex-wrap">
        <button class="pill ${filterCat==='all'?'active':''}" data-cat="all">ทั้งหมด (${categories.all})</button>
        ${categories.rule_violation > 0 ? `<button class="pill ${filterCat==='rule_violation'?'active':''}" data-cat="rule_violation" style="--pill-color:var(--danger)">🚨 Rule Violation (${categories.rule_violation})</button>` : ''}
        ${categories.supplier_pending > 0 ? `<button class="pill ${filterCat==='supplier_pending'?'active':''}" data-cat="supplier_pending" style="--pill-color:var(--danger)">🏭 Supplier รอโอน (${categories.supplier_pending})</button>` : ''}
        ${categories.supplier_unmatched > 0 ? `<button class="pill ${filterCat==='supplier_unmatched'?'active':''}" data-cat="supplier_unmatched" style="--pill-color:var(--warn)">💰 PP รอ Match (${categories.supplier_unmatched})</button>` : ''}
        ${categories.debt > 0 ? `<button class="pill ${filterCat==='debt'?'active':''}" data-cat="debt" style="--pill-color:var(--warn)">📋 หนี้ค้าง (${categories.debt})</button>` : ''}
        ${categories.cheque > 0 ? `<button class="pill ${filterCat==='cheque'?'active':''}" data-cat="cheque" style="--pill-color:var(--danger)">🟡 เช็ค (${categories.cheque})</button>` : ''}
        ${categories.sp_temp > 0 ? `<button class="pill ${filterCat==='sp_temp'?'active':''}" data-cat="sp_temp" style="--pill-color:var(--info)">🔷 SP ชั่วคราว (${categories.sp_temp})</button>` : ''}
        ${categories.stmt_unmatched > 0 ? `<button class="pill ${filterCat==='stmt_unmatched'?'active':''}" data-cat="stmt_unmatched" style="--pill-color:var(--info)">🏦 Statement ค้าง (${categories.stmt_unmatched})</button>` : ''}
        ${categories.supplier_cheque_stale > 0 ? `<button class="pill ${filterCat==='supplier_cheque_stale'?'active':''}" data-cat="supplier_cheque_stale" style="--pill-color:var(--warn)">📝 เช็คค้างขึ้นเงิน (${categories.supplier_cheque_stale})</button>` : ''}
        ${categories.misrouted_payment > 0 ? `<button class="pill ${filterCat==='misrouted_payment'?'active':''}" data-cat="misrouted_payment" style="--pill-color:var(--warn)">🔀 โอนผิดธนาคาร (${categories.misrouted_payment})</button>` : ''}
      </div>
      
      <div class="flex-col gap-3">
        ${filtered.length === 0 ? 
          '<div class="card text-dim text-sm" style="text-align:center;padding:40px">✅ ไม่มีแจ้งเตือนในหมวดนี้</div>' :
          (() => {
            const _t = truncateForRender(filtered);
            return _t.visible.map(a => {
            const color = a.priority === 1 ? 'var(--danger)' : a.priority === 2 ? 'var(--warn)' : 'var(--info)';
            return `<div class="card" style="border-left:4px solid ${color}">
              <div class="flex justify-between items-center flex-wrap gap-3">
                <div style="flex:1;min-width:0">
                  <div class="flex items-center gap-2 mb-1">
                    <span class="font-semi" style="color:var(--text)">${a.title}</span>
                  </div>
                  <div class="text-sm" style="color:var(--text2)">${a.detail}</div>
                  ${a.meta ? `<div class="text-xs text-muted" style="margin-top:3px">${a.meta}</div>` : ''}
                </div>
                <div class="flex gap-2">
                  <button class="btn btn-outline btn-sm" onclick="navigateTo('${a.action}')">ไปจัดการ →</button>
                </div>
              </div>
            </div>`;
          }).join('') + (_t.truncated ? `<div class="card text-sm text-muted" style="text-align:center;padding:12px">${truncationFooter(_t.total)}</div>` : '');
          })()
        }
      </div>
    `;
    
    el.querySelectorAll('.pill[data-cat]').forEach(btn => {
      btn.addEventListener('click', () => { filterCat = btn.dataset.cat; renderList(); });
    });
  }
  
  renderList();
}

// ── Reports ─────────────────────────────────────────────────
function renderReports(el) {
  let dateFrom = todayISO().substring(0,7) + '-01';
  let dateTo = todayISO();
  let bankFilter = 'ALL';
  let stationFilter = 'ALL';
  let vatFilter = 'ALL';
  
  function render() {
    // Filter matched bills/cashflow in date range
    const inRange = (dateStr) => {
      const d = toISODate(dateStr);
      if (!d) return false;
      if (dateFrom && d < dateFrom) return false;
      if (dateTo && d > dateTo) return false;
      return true;
    };
    
    // Aggregate data for report
    // 1. Bills จ่ายแล้ว (matched หรือ paid)
    let bills = billList.filter(b => 
      inRange(b.date) && 
      b.match_status !== 'void' &&
      (b.match_status === 'paid' || b.match_status === 'matched')
    );
    if (stationFilter !== 'ALL') bills = bills.filter(b => b.station === stationFilter);
    
    // 2. Cashflow (fully matched)
    let cashflow = cashflowList.filter(c => inRange(c.date));
    if (vatFilter !== 'ALL') cashflow = cashflow.filter(c => c.vat === vatFilter);
    if (bankFilter !== 'ALL') cashflow = cashflow.filter(c => c.bank === bankFilter);
    
    // 3. Statement (ทั้งหมดในช่วง)
    let stmts = getAllStatements().filter(s => inRange(s.date));
    if (bankFilter !== 'ALL') stmts = stmts.filter(s => s.bank === bankFilter);
    
    // Summary
    const totalSales = bills.reduce((s,b) => s + Number(b.amount||0), 0);
    const totalDeposit = cashflow.filter(c => c.type === 'deposit').reduce((s,c) => s + Number(c.amount||0), 0);
    const totalSupplier = cashflow.filter(c => c.type === 'supplier').reduce((s,c) => s + Number(c.amount||0), 0);
    const stmtsMatched = stmts.filter(s => s.match_status === 'matched').length;
    
    // กลุ่มตามวัน
    const byDate = {};
    bills.forEach(b => {
      const d = toISODate(b.date);
      if (!byDate[d]) byDate[d] = { sales: 0, count: 0 };
      byDate[d].sales += Number(b.amount||0);
      byDate[d].count++;
    });
    const dateKeys = Object.keys(byDate).sort();
    
    el.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div class="page-title">📑 รายงานนำส่งสำนักงานบัญชี</div>
        <div class="flex gap-2">
          <button class="btn btn-outline btn-sm" id="btn-rep-csv">📄 Export CSV</button>
          <button class="btn btn-primary btn-sm" id="btn-rep-excel">📊 Export Excel (Multi-sheet)</button>
          <button class="btn btn-outline btn-sm" id="btn-rep-print">🖨️ Print</button>
        </div>
      </div>
      
      <!-- Filters -->
      <div class="card mb-3">
        <div class="flex gap-3 items-end flex-wrap">
          <div class="input-group">
            <label>ตั้งแต่</label>
            <input type="date" class="input" id="rep-from" value="${dateFrom}" style="width:150px">
          </div>
          <div class="input-group">
            <label>ถึง</label>
            <input type="date" class="input" id="rep-to" value="${dateTo}" style="width:150px">
          </div>
          <div class="input-group">
            <label>ธนาคาร</label>
            <select class="select" id="rep-bank">
              <option value="ALL" ${bankFilter==='ALL'?'selected':''}>ทุกธนาคาร</option>
              <option value="KTB" ${bankFilter==='KTB'?'selected':''}>KTB</option>
              <option value="KBANK" ${bankFilter==='KBANK'?'selected':''}>KBANK</option>
              <option value="BBL NW" ${bankFilter==='BBL NW'?'selected':''}>BBL NW</option>
              <option value="BBL" ${bankFilter==='BBL'?'selected':''}>BBL</option>
            </select>
          </div>
          <div class="input-group">
            <label>Station</label>
            <select class="select" id="rep-station">
              <option value="ALL" ${stationFilter==='ALL'?'selected':''}>ทุก Station</option>
              ${['FRONT1','FRONT2','FRONT3','FRONT4','Invoice Credit','Order Credit','Front'].map(s => 
                `<option value="${s}" ${stationFilter===s?'selected':''}>${s}</option>`).join('')}
            </select>
          </div>
          <div class="input-group">
            <label>VAT</label>
            <select class="select" id="rep-vat">
              <option value="ALL" ${vatFilter==='ALL'?'selected':''}>ทั้งหมด</option>
              <option value="VAT" ${vatFilter==='VAT'?'selected':''}>VAT</option>
              <option value="NOVAT" ${vatFilter==='NOVAT'?'selected':''}>NOVAT</option>
            </select>
          </div>
          <button class="btn btn-primary btn-sm" id="rep-apply">🔍 ดูรายงาน</button>
        </div>
      </div>
      
      <!-- Summary Stats -->
      <div class="flex gap-3 flex-wrap mb-3 stagger">
        ${statCard('ยอดขาย (จ่ายแล้ว)', '฿'+fmtNum(totalSales), bills.length+' บิล', 'var(--success)', ICONS.dollar)}
        ${statCard('นำฝากธนาคาร', '฿'+fmtNum(totalDeposit), '', 'var(--info)', ICONS.card)}
        ${statCard('จ่าย Supplier', '฿'+fmtNum(totalSupplier), '', 'var(--danger)', ICONS.card)}
        ${statCard('Statement Matched', stmtsMatched+'/'+stmts.length, '', 'var(--warn)', ICONS.pulse)}
      </div>
      
      <!-- รายงานแยกวัน -->
      <div class="card-flat mb-3">
        <div style="padding:10px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between">
          <span class="font-semi text-sm">📅 สรุปยอดขายแยกวัน</span>
          <span class="text-xs text-muted">${dateKeys.length} วัน</span>
        </div>
        <div class="table-wrap" style="max-height:250px;overflow-y:auto">
          <table>
            <thead><tr><th>วันที่</th><th style="text-align:right">จำนวนบิล</th><th style="text-align:right">ยอดขาย</th></tr></thead>
            <tbody>
              ${dateKeys.length === 0 ? '<tr><td colspan="3" style="text-align:center;padding:30px;color:var(--text3)">ไม่มีข้อมูลในช่วงนี้</td></tr>' :
                dateKeys.map(d => `
                  <tr>
                    <td>${fmtDate(d)}</td>
                    <td style="text-align:right">${byDate[d].count}</td>
                    <td style="text-align:right;font-weight:600;color:var(--success)">฿${fmtNum(byDate[d].sales)}</td>
                  </tr>
                `).join('') +
                `<tr style="background:var(--surface2);font-weight:700"><td>รวม</td><td style="text-align:right">${bills.length}</td><td style="text-align:right;color:var(--success)">฿${fmtNum(totalSales)}</td></tr>`
              }
            </tbody>
          </table>
        </div>
      </div>
      
      <!-- รายการบิลจ่ายแล้ว -->
      <div class="card-flat mb-3">
        <div style="padding:10px 16px;border-bottom:1px solid var(--border)">
          <span class="font-semi text-sm">📋 รายการบิลที่จ่ายแล้ว (${bills.length})</span>
        </div>
        <div class="table-wrap" style="max-height:400px;overflow-y:auto">
          <table>
            <thead>
              <tr>
                <th>วันที่</th>
                <th>เลขบิล</th>
                <th>Station</th>
                <th>ประเภท</th>
                <th style="text-align:right">ยอด</th>
                <th>SP No.</th>
                <th>ธนาคาร</th>
                <th>Ref</th>
              </tr>
            </thead>
            <tbody>
              ${bills.length === 0 ? '<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--text3)">ไม่มีข้อมูล</td></tr>' :
                bills.slice(0, 200).map(b => `
                  <tr>
                    <td class="text-xs">${fmtDate(b.date)}</td>
                    <td class="text-xs" style="font-family:var(--mono)">${b.bill_no||'-'}</td>
                    <td><span class="badge badge-info" style="font-size:.7rem">${b.station||'-'}</span></td>
                    <td class="text-xs">${b.type||'-'}</td>
                    <td style="text-align:right;font-weight:600;color:var(--success)">฿${fmtNum(b.amount)}</td>
                    <td class="text-xs" style="font-family:var(--mono);color:var(--text2)">${b.paid_by_sp||'-'}</td>
                    <td class="text-xs">${b.bank||'-'}</td>
                    <td class="text-xs">${b.matched_stmt_ref||b.confirmation||'-'}</td>
                  </tr>
                `).join('')
              }
            </tbody>
          </table>
          ${bills.length > 200 ? `<div style="padding:10px;text-align:center;color:var(--text3);font-size:.8rem">แสดง 200 แถวแรก — Export เพื่อดูครบ</div>` : ''}
        </div>
      </div>
      
      <!-- Cashflow -->
      <div class="card-flat mb-3">
        <div style="padding:10px 16px;border-bottom:1px solid var(--border)">
          <span class="font-semi text-sm">💸 รายการเงินเข้า-ออก (${cashflow.length})</span>
        </div>
        <div class="table-wrap" style="max-height:250px;overflow-y:auto">
          <table>
            <thead><tr><th>วันที่</th><th>ประเภท</th><th>VAT</th><th style="text-align:right">ยอด</th><th>บัญชี</th><th>คู่ค้า</th><th>อ้างอิง</th></tr></thead>
            <tbody>
              ${cashflow.length === 0 ? '<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text3)">ไม่มีข้อมูล</td></tr>' :
                cashflow.map(c => `
                  <tr>
                    <td class="text-xs">${fmtDate(c.date)}</td>
                    <td class="text-xs">${c.type}</td>
                    <td><span class="badge" style="font-size:.7rem;background:${c.vat==='VAT'?'#4f9cf933':'#8e44ad33'};color:${c.vat==='VAT'?'#4f9cf9':'#8e44ad'}">${c.vat||'-'}</span></td>
                    <td style="text-align:right;font-weight:600;color:${c.type==='supplier'?'var(--danger)':'var(--success)'}">฿${fmtNum(c.amount)}</td>
                    <td class="text-xs">${c.bank||'-'}</td>
                    <td class="text-xs">${c.counterparty||'-'}</td>
                    <td class="text-xs" style="font-family:var(--mono)">${c.reference||'-'}</td>

    document.getElementById('rep-station')?.addEventListener('change', e => stationFilter = e.target.value);
    document.getElementById('rep-vat')?.addEventListener('change', e => vatFilter = e.target.value);
    document.getElementById('rep-apply')?.addEventListener('click', render);
    
    // Export handlers

        date: fmtDate(b.date),
        bill_no: b.bill_no || '',
        station: b.station || '',
        type: b.type || '',
        amount: Number(b.amount) || 0,
        sp_no: b.paid_by_sp || '',
        bank: b.bank || '',
        ref: b.matched_stmt_ref || b.confirmation || '',
        customer: b.remarks1 || '',
      }));
      if (!rows.length) { toast('ไม่มีข้อมูลให้ export', 'info'); return; }
      const headers = Object.keys(rows[0]);
      const csv = [headers.join(',')].concat(rows.map(r => headers.map(h => {
        const v = r[h] == null ? '' : String(r[h]);
        return v.includes(',')||v.includes('"')||v.includes('\n') ? `"${v.replace(/"/g,'""')}"` : v;
      }).join(','))).join('\n');
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `Report_${dateFrom}_to_${dateTo}.csv`;
      a.click();
      toast('Export CSV สำเร็จ', 'success');
    });
    
    document.getElementById('btn-rep-excel')?.addEventListener('click', () => {
      if (typeof XLSX === 'undefined') { toast('SheetJS ไม่ได้โหลด', 'error'); return; }
      const wb = XLSX.utils.book_new();
      
      // Sheet 1: สรุป
      const summary = [
        ['รายงานนำส่งสำนักงานบัญชี'],
        ['ช่วงวันที่', fmtDate(dateFrom)+' ถึง '+fmtDate(dateTo)],
        ['Filter:', `ธนาคาร: ${bankFilter}, Station: ${stationFilter}, VAT: ${vatFilter}`],
        [''],
        ['สรุป', 'จำนวน', 'ยอดรวม'],
        ['ยอดขาย (บิลจ่ายแล้ว)', bills.length, totalSales],
        ['นำฝากธนาคาร', cashflow.filter(c=>c.type==='deposit').length, totalDeposit],
        ['จ่าย Supplier', cashflow.filter(c=>c.type==='supplier').length, totalSupplier],
        ['Statement Matched', stmtsMatched, '-'],
        ['Statement Unmatched', stmts.length-stmtsMatched, '-'],
      ];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summary), 'สรุป');
      
      // Sheet 2: Sales by Day
      const salesByDay = [['วันที่','จำนวนบิล','ยอดขาย']];
      dateKeys.forEach(d => salesByDay.push([fmtDate(d), byDate[d].count, byDate[d].sales]));
      salesByDay.push(['รวม', bills.length, totalSales]);
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(salesByDay), 'ขายแยกวัน');
      
      // Sheet 3: Bills detail
      const billsData = bills.map(b => ({
        วันที่: fmtDate(b.date),
        เลขบิล: b.bill_no || '',
        Station: b.station || '',
        ประเภท: b.type || '',
        ยอด: Number(b.amount) || 0,
        SP: b.paid_by_sp || '',
        ธนาคาร: b.bank || '',
        Ref: b.matched_stmt_ref || b.confirmation || '',
        ลูกค้า: b.remarks1 || '',
      }));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(billsData), 'บิลจ่ายแล้ว');
      
      // Sheet 4: Cashflow
      const cfData = cashflow.map(c => ({
        วันที่: fmtDate(c.date),
        ประเภท: c.type,
        VAT: c.vat || '',
        ยอด: c.amount || 0,
        บัญชี: c.bank || '',
        คู่ค้า: c.counterparty || '',
        อ้างอิง: c.reference || '',
        หมายเหตุ: c.note || '',
      }));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(cfData), 'เงินเข้า-ออก');
      
      // Sheet 5: Statement
      const stmtData = stmts.map(s => ({
        ธนาคาร: s.bank,
        วันที่: fmtDate(s.date),
        เวลา: s.time || '',
        Ref: s.ref_no || '',
        รายละเอียด: s.description || '',
        ยอด: s.amount || 0,
        Match: s.match_status || '',
        บิล: s.match_bill || '',
      }));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(stmtData), 'Statement');
      
      XLSX.writeFile(wb, `Report_Accounting_${dateFrom}_to_${dateTo}.xlsx`);
      toast('Export Excel สำเร็จ — พร้อมส่งสำนักงานบัญชี', 'success');
    });
    
    document.getElementById('btn-rep-print')?.addEventListener('click', () => {
      window.print();
    });
  }
  
  render();
}

// Tax Export — สำหรับยื่นสรรพากร (PP ฝั่งเจ้าหนี้ + SP ฝั่งลูกหนี้)
// ══════════════════════════════════════════════════════════════
async function renderTaxExport(el) {
  // Default: เดือนปัจจุบัน
  var now = new Date();
  var defaultMonth = String(now.getFullYear()) + String(now.getMonth() + 1).padStart(2, '0');
  var state = {
    mode: 'PP',          // PP หรือ SP
    month: defaultMonth, // YYYYMM
    data: null,          // ข้อมูลที่ดึงมา
    expanded: {},        // expand state ต่อ row
    loading: false,
  };
  
  async function fetchData() {
    state.loading = true;
    renderInner();
    var action = state.mode === 'PP' ? 'exportPPReportForTax' : 'exportSPReportForTax';
    var res = await api(action, { month: state.month });
    state.loading = false;
    if (res && res.success) {
      state.data = res.data;
    } else {
      toast('ดึงข้อมูลไม่สำเร็จ: ' + (res && res.error || 'unknown'), 'error');
      state.data = null;
    }
    renderInner();
  }
  
  function fmtTH(iso) {
    // YYYY-MM-DD → dd/mm/yyyy (ค.ศ.)
    if (!iso) return '';
    var s = String(iso);
    var m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m) return m[3] + '/' + m[2] + '/' + m[1];
    return s;
  }
  
  function exportCSV() {
    if (!state.data || !state.data.rows || !state.data.rows.length) {
      toast('ไม่มีข้อมูลให้ export', 'warn');
      return;
    }
    var rows = state.data.rows;
    var lines = [];
    // Header
    if (state.mode === 'PP') {
      lines.push(['PP No.', 'วันที่บิลผู้จำหน่าย', 'เลขบิล/ใบกำกับภาษี', 'ชื่อผู้จำหน่าย', 'ยอดเงินรวม', 'PP เดิม'].join(','));
      rows.forEach(function(r) {
        // Parent line
        lines.push([r.pp_no, fmtTH(r.supplier_bill_date), r.supplier_invoice_no, '"'+r.supplier_name+'"', r.amount, r.pp_no_original].join(','));
        // Child bills
        (r.bills || []).forEach(function(b) {
          lines.push(['  →', fmtTH(b.bill_date), b.bill_no + ' ('+b.bill_type+')', '"'+r.supplier_name+'"', b.amount, ''].join(','));
        });
      });
    } else {
