        toast('✓ ไม่พบปัญหาใดๆ ข้อมูลสมบูรณ์', 'success');
      } else {
        showValidationModal(v, null);
      }
    });
    document.getElementById('val-status-bar')?.addEventListener('click', () => {
      document.getElementById('btn-check-issues')?.click();
    });
    
    document.getElementById('btn-save-main')?.addEventListener('click', async () => {
      // ── Pre-save validation ──
      const v = validateAll();
      
      if (v.errors.length > 0) {
        showValidationModal(v, null);
        return; // ห้ามบันทึก
      }
      
      if (v.warnings.length > 0) {
        // มีคำเตือน → ถามก่อน
        showValidationModal(v, async () => {
          await actuallySaveMain();
        });
        return;
      }
      
      // ไม่มีปัญหา → save เลย
      await actuallySaveMain();
    });
    
    async function actuallySaveMain() {
      const CHUNK_SIZE = 500; // รายการต่อ chunk (ลด URL/body size + หลีกเลี่ยง 6-min timeout)
      
      // Flush pending localStorage writes ก่อน save (กันกรณี debounce ยังไม่ถึงเวลา)
      if (typeof flushPersistState === 'function') flushPersistState();
      
      // ── 1. บันทึก Bills — group ตามปี (backend ใช้ bills_YYYY, 1 sheet ต่อปี) ──
      const bills = Array.isArray(billList) ? billList : [];
      const totalBills = bills.length;
      
      if (totalBills === 0) {
        toast('ไม่มีบิลให้บันทึก', 'warn');
        return;
      }
      
      // Helper: ดึง YYYY จากวันที่รูปแบบต่างๆ
      function yearFromDate(val) {
        if (!val) return '';
        var str = String(val).trim();
        var m1 = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
        if (m1) { var y = Number(m1[3]); if (y > 2400) y -= 543; return String(y); }
        var m2 = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (m2) { var y2 = Number(m2[1]); if (y2 > 2400) y2 -= 543; return String(y2); }
        if (/^\d{8}$/.test(str)) { var y3 = Number(str.substring(0,4)); if (y3 > 2400) y3 -= 543; return String(y3); }
        return '';
      }
      
      // Group bills by year
      var billsByYear = {};
      var billsNoDate = [];
      bills.forEach(function(b) {
        var year = yearFromDate(b.date);
        if (!year) { billsNoDate.push(b); return; }
        if (!billsByYear[year]) billsByYear[year] = [];
        billsByYear[year].push(b);
      });
      
      // บิลไม่มีวันที่ → ใส่ในปีของวันที่เลือก (fallback)
      if (billsNoDate.length > 0) {
        var fallbackYear = yearFromDate(selectedDate) || String(new Date().getFullYear());
        if (!billsByYear[fallbackYear]) billsByYear[fallbackYear] = [];
        billsByYear[fallbackYear] = billsByYear[fallbackYear].concat(billsNoDate);
      }
      
      var yearKeys = Object.keys(billsByYear).sort();
      toast('กำลังบันทึก ' + totalBills + ' บิล (' + yearKeys.length + ' ปี)...', 'info');
      
      var savedBills = 0;
      try {
        for (var yi = 0; yi < yearKeys.length; yi++) {
          var year = yearKeys[yi];
          var billsOfYear = billsByYear[year];
          // ส่งวันแรกของปีเป็น pivot — backend จะใช้เฉพาะ year ในการหา sheet name
          var pivotDate = year + '0101';
          for (var ci = 0; ci < billsOfYear.length; ci += CHUNK_SIZE) {
            var chunk = billsOfYear.slice(ci, ci + CHUNK_SIZE);
            var res = await api('saveDailySales', {
              date: pivotDate,
              rows: chunk,
              created_by: currentUser?.display_name || 'Admin',
            });
            if (!res || !res.success) {
              toast('บันทึกบิลล้มเหลวปี ' + year + ': ' + (res?.error||''), 'error');
              return;
            }
            savedBills += chunk.length;
            if (totalBills > CHUNK_SIZE) {
              toast('กำลังบันทึก... ' + savedBills + '/' + totalBills + ' บิล', 'info');
            }
          }
        }
        
        // ── 1b. บันทึก Meta (summary + cash_count + change) แยกต่อปี ──
        // รวม dates ทั้งหมดที่ต้องเก็บ meta แล้ว group ตามปี
        var metaYears = new Set();
        if (mainSummary && mainSummary.__byDate) {
          Object.keys(mainSummary.__byDate).forEach(function(d) {
            var y = yearFromDate(d);
            if (y) metaYears.add(y);
          });
        }
        // flat keys (จาก render วันปัจจุบัน) → ผูกกับ selectedDate's year
        var hasFlatSummary = Object.keys(mainSummary).some(function(k) { return k !== '__byDate' && k.includes('_'); });
        if (hasFlatSummary) {
          var y = yearFromDate(selectedDate);
          if (y) metaYears.add(y);
        }
        if (cashCount && cashCount.__byDate) {
          Object.keys(cashCount.__byDate).forEach(function(d) {
            var y = yearFromDate(d);
            if (y) metaYears.add(y);
          });
        }
        
        for (var my of metaYears) {
          // filter __byDate ให้เหลือแค่ปีนี้
          var subSummary = { __byDate: {} };
          if (mainSummary.__byDate) {
            Object.keys(mainSummary.__byDate).forEach(function(d) {
              if (yearFromDate(d) === my) subSummary.__byDate[d] = mainSummary.__byDate[d];
            });
          }
          // flat keys (แนบให้ปีของ selectedDate)
          if (my === yearFromDate(selectedDate) && hasFlatSummary) {
            Object.keys(mainSummary).forEach(function(k) {
              if (k !== '__byDate' && k.includes('_')) subSummary[k] = mainSummary[k];
            });
          }
          
          var subCash = { __byDate: {} };
          if (cashCount.__byDate) {
            Object.keys(cashCount.__byDate).forEach(function(d) {
              if (yearFromDate(d) === my) subCash.__byDate[d] = cashCount.__byDate[d];
            });
          }
          
          // Skip ถ้าไม่มีข้อมูล meta ในปีนี้
          var hasMeta = Object.keys(subSummary.__byDate).length > 0 
                     || Object.keys(subSummary).filter(k => k !== '__byDate').length > 0 
                     || Object.keys(subCash.__byDate).length > 0;
          if (!hasMeta) continue;
          
          var metaRes = await api('saveDailyMeta', {
            date: my + '0101',
            summary: subSummary,
            cash_count: subCash,
            updated_by: currentUser?.display_name || 'Admin',
          });
          if (!metaRes || !metaRes.success) {
            toast('บันทึก Meta ปี ' + my + ' ล้มเหลว (ไม่ critical)', 'warn');
          }
        }
        
        // ── 2. บันทึก Statements (group ตามปีเหมือนกัน) ──
        var allStmts = typeof getAllStatements === 'function' ? getAllStatements() : [];
        if (allStmts.length > 0) {
          var byYearStmt = {};
          allStmts.forEach(function(s) {
            var y = yearFromDate(s.date);
            if (!y) return;
            if (!byYearStmt[y]) byYearStmt[y] = [];
            byYearStmt[y].push(s);
          });
          
          var stmtYearKeys = Object.keys(byYearStmt).sort();
          var savedStmts = 0;
          var totalStmts = allStmts.length;
          toast('กำลังบันทึก Statement ' + totalStmts + ' รายการ (' + stmtYearKeys.length + ' ปี)...', 'info');
          
          for (var si = 0; si < stmtYearKeys.length; si++) {
            var sYear = stmtYearKeys[si];
            var stmtsOfYear = byYearStmt[sYear];
            var sPivot = sYear + '0101';
            for (var i = 0; i < stmtsOfYear.length; i += CHUNK_SIZE) {
              var sChunk = stmtsOfYear.slice(i, i + CHUNK_SIZE);
              var sRes = await api('saveStatements', {
                date: sPivot,
                rows: sChunk,
              });
              if (!sRes || !sRes.success) {
                toast('บันทึก Statement ปี ' + sYear + ' ล้มเหลว: ' + (sRes?.error||''), 'error');
                return;
              }
              savedStmts += sChunk.length;
              if (totalStmts > CHUNK_SIZE) {
                toast('กำลังบันทึก Statement... ' + savedStmts + '/' + totalStmts, 'info');
              }
            }
          }
          
          toast('✅ บันทึกสำเร็จ — ' + savedBills + ' บิล + ' + savedStmts + ' statements (' + yearKeys.length + ' ปี)', 'success', 5000);
        } else {
          toast('✅ บันทึกสำเร็จ — ' + savedBills + ' บิล (' + yearKeys.length + ' ปี)', 'success');
        }
      } catch (err) {
        console.error('Save error:', err);
        toast('บันทึกล้มเหลว: ' + err.message, 'error');
      }
    }
    // ── Helper: เปลี่ยนวันที่ + reload summary + render ──
    // ใช้ทั้งจาก date input change และปุ่ม ◀ ▶
    function _changeDateTo(newISO) {
      if (!newISO || newISO === selectedDate) return;
      selectedDate = newISO;
      invalidateBillsCache();
      
      // Clear flat summary keys (ค่าจากวันก่อนจะค้างถ้าไม่ล้าง)
      Object.keys(mainSummary).forEach(k => {
        if (k === '__byDate') return;
        if (k.includes('_')) delete mainSummary[k];
      });
      
      // Load summary for this date if available
      if (mainSummary.__byDate && mainSummary.__byDate[selectedDate]) {
        const LABEL_MAP = {
          'นำเงินเข้า': 'cashIn', 'ยอดขาย': 'sales', 'นำเงินออก': 'cashOut',
          'ยอดคืนสินค้า': 'returns', 'Cash Drawer': 'cashDrawer',
          'Transfer': 'transfer', 'Card': 'card', 'Cheque': 'cheque', 'Refund': 'refund',
        };
        const sum = mainSummary.__byDate[selectedDate];
        Object.entries(sum).forEach(([thLabel, stations]) => {
          const prefix = LABEL_MAP[thLabel];
          if (!prefix) return;
          ['Front1', 'Front2', 'Front3', 'Front4', 'Invoice', 'Order', 'Payment', 'Invoice Credit', 'Order Credit'].forEach(st => {
            const val = stations[st];
            if (val != null && val !== 0) mainSummary[prefix + '_' + st] = val;
          });
        });
      }
      render();
    }
    
    // Shift selectedDate by ±N days
    function _shiftDate(days) {
      const d = new Date(selectedDate + 'T00:00:00');
      if (isNaN(d)) return;
      d.setDate(d.getDate() + days);
      const iso = d.getFullYear() + '-'
                + String(d.getMonth()+1).padStart(2,'0') + '-'
                + String(d.getDate()).padStart(2,'0');
      _changeDateTo(iso);
    }
    
    document.getElementById('main-date')?.addEventListener('change', e => { 
      _changeDateTo(e.target.value);
    });
    document.getElementById('main-date-prev')?.addEventListener('click', () => _shiftDate(-1));
    document.getElementById('main-date-next')?.addEventListener('click', () => _shiftDate(+1));

    // Filter pills
    el.querySelectorAll('.pill[data-fs]').forEach(btn => {
      btn.addEventListener('click', () => { filterStation = btn.dataset.fs; render(); });
    });
    el.querySelectorAll('.pill[data-ft]').forEach(btn => {
      btn.addEventListener('click', () => { filterType = btn.dataset.ft; render(); });
    });
    el.querySelectorAll('.pill[data-fm]').forEach(btn => {
      btn.addEventListener('click', () => { filterMatch = btn.dataset.fm; render(); });
    });
    
    // Sort toggle button
    el.querySelectorAll('.sort-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        toggleSortOrder(btn.dataset.pageKey);
        render();
      });
    });
    
    // ── ปุ่มแก้ไขบิล (✏️) — เปิด modal ──
    el.querySelectorAll('.btn-edit-bill').forEach(btn => {
      btn.addEventListener('click', (e) => {

                  ${TYPE_OPTIONS.map(o=>`<option value="${o}" ${b.type===o?'selected':''}>${o||'(ว่าง)'}</option>`).join('')}
                </select>
              </div>
              <div class="input-group flex-1">
                <label>Baht (ยอดเต็ม)</label>
                <input type="number" class="input" id="eb-amount" value="${b.amount||0}" step="0.01">
              </div>
            </div>
            
            <!-- Fee section: เหมือน Add Bill — Transfer/Cheque → WHT+ค่าโอน, Card → ค่าธรรมเนียมบัตร -->
            <div id="eb-fee-box" style="background:rgba(79,156,249,.05);border:1px solid rgba(79,156,249,.2);border-radius:6px;padding:10px;display:none">
              <div style="font-size:.85rem;color:var(--info);font-weight:600;margin-bottom:8px">⚡ การหัก / ค่าธรรมเนียม <span style="color:var(--text3);font-weight:400">— WHT คำนวณอัตโนมัติจากยอด (แก้ไขได้)</span></div>
              <div class="flex gap-2" id="eb-fee-transfer" style="display:none">
                <div class="input-group flex-1">
                  <label>ฐานก่อน VAT</label>
                  <input type="number" class="input" id="eb-base" readonly style="background:rgba(255,255,255,.02)">

                <div id="eb-sum-tf-row" style="display:none;justify-content:space-between;padding:3px 0;color:var(--warn)"><span>− ค่าโอน / ค่าธรรมเนียม</span><span id="eb-sum-tf">฿0.00</span></div>
                <div id="eb-sum-cf-row" style="display:none;justify-content:space-between;padding:3px 0;color:var(--warn)"><span>− ค่าธรรมเนียมบัตร</span><span id="eb-sum-cf">฿0.00</span></div>
                <div style="display:flex;justify-content:space-between;padding:8px 0 0;border-top:1px solid var(--border);margin-top:4px;font-weight:600;color:var(--success);font-size:1.05rem"><span>สุทธิ (ยอดโอนจริงที่คาดหวัง)</span><span id="eb-sum-net">฿0.00</span></div>
              </div>
            </div>
            
            <div class="flex gap-2">
              <div class="input-group flex-1">
                <label>Confirmation (ธนาคาร/Cash)</label>
                <input class="input" id="eb-confirmation" value="${b.confirmation||''}" placeholder="KTB / KBANK / BBL / BBL NW / Cash">
              </div>
              <div class="input-group flex-1">
                <label>Pay Date</label>
                <input type="date" class="input" id="eb-pay-date" value="${toISODate(b.pay_date)}">
              </div>
            </div>
            <div class="flex gap-2">
              <div class="input-group flex-1">
                <label>Bank (user manual)</label>
                <input class="input" id="eb-bank" value="${b.bank||''}">
              </div>
              <div class="input-group flex-1">
                <label>Due Date</label>
                <input type="date" class="input" id="eb-due-date" value="${toISODate(b.due_date)}">
              </div>
            </div>
            <div class="input-group">
              <label>Remarks 1</label>
              <input class="input" id="eb-remarks1" value="${b.remarks1||''}">
            </div>
            <div class="input-group">
              <label>Remarks 2</label>
              <input class="input" id="eb-remarks2" value="${b.remarks2||''}">
            </div>

              <label>Match Status</label>
              <select class="select" id="eb-status">
                ${['pending','matched','paid','void','awaiting_clear','bounced'].map(s=>`<option value="${s}" ${b.match_status===s?'selected':''}>${s}</option>`).join('')}
              </select>
            </div>
            <div class="flex gap-2 mt-3">
              <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
              <button class="btn btn-sm" id="eb-delete" style="background:var(--danger);color:#fff;padding:6px 14px">🗑 ลบ</button>
              <button class="btn btn-primary btn-sm flex-1" id="eb-save">✓ บันทึก</button>
            </div>
          </div>
        `);
        
        // ── Fee UI: show/hide + live net + auto-WHT on amount change ──
        // เหมือน Add Bill: Transfer/Cheque → WHT+ค่าโอน, Card → ค่าธรรมเนียมบัตร
        const $ebType = document.getElementById('eb-type');
        const $ebAmount = document.getElementById('eb-amount');
        const $ebBase = document.getElementById('eb-base');
        const $ebWht = document.getElementById('eb-wht');
        const $ebTf = document.getElementById('eb-transfer-fee');
        const $ebCf = document.getElementById('eb-card-fee');
        const $ebFeeBox = document.getElementById('eb-fee-box');
        const $ebFeeTransfer = document.getElementById('eb-fee-transfer');
        const $ebFeeCard = document.getElementById('eb-fee-card');
        const $ebSummary = document.getElementById('eb-summary');
        
        // Track ว่า user แก้ WHT เองหรือยัง (ถ้าแก้แล้ว → ไม่ overwrite อัตโนมัติ)
        let ebWhtManuallyEdited = false;
        $ebWht?.addEventListener('input', () => { ebWhtManuallyEdited = true; });
        
        function ebCalcWHT(amount) {
          if (!amount || amount <= 0) return 0;
          return Math.round((amount / 1.07) * 0.01 * 100) / 100;
        }
        function ebCalcBase(amount) {
          if (!amount || amount <= 0) return 0;
          return Math.round((amount / 1.07) * 100) / 100;
        }
        function ebFeeApplies() {
          const t = $ebType.value || '';
          return t === 'Transfer' || t === 'Cheque' || t === 'Card';
        }
        
        function ebUpdateFeeUI() {
          const t = $ebType.value || '';
          const applies = ebFeeApplies();
          if (!applies) {
            $ebFeeBox.style.display = 'none';
            return;
          }
          $ebFeeBox.style.display = 'block';
          if (t === 'Card') {
            $ebFeeTransfer.style.display = 'none';
            $ebFeeCard.style.display = 'flex';
          } else {
            // Transfer หรือ Cheque
            $ebFeeTransfer.style.display = 'flex';
            $ebFeeCard.style.display = 'none';
          }
          ebUpdateSummary();
        }
        
        function ebUpdateSummary() {
          const amount = Number($ebAmount.value) || 0;
          const t = $ebType.value || '';
          const applies = ebFeeApplies();
          let wht = 0, tf = 0, cf = 0;
          
          if (applies && (t === 'Transfer' || t === 'Cheque')) {
            $ebBase.value = ebCalcBase(amount).toFixed(2);
            wht = Number($ebWht.value) || 0;
            tf = Number($ebTf.value) || 0;
          } else if (applies && t === 'Card') {
            cf = Number($ebCf.value) || 0;
          }
          
          const net = Math.round((amount - wht - tf - cf) * 100) / 100;
          
          if (applies) {
            document.getElementById('eb-sum-full').textContent = '฿' + amount.toFixed(2);
            document.getElementById('eb-sum-wht-row').style.display = wht > 0 ? 'flex' : 'none';
            document.getElementById('eb-sum-wht').textContent = '−฿' + wht.toFixed(2);
            document.getElementById('eb-sum-tf-row').style.display = tf > 0 ? 'flex' : 'none';
            document.getElementById('eb-sum-tf').textContent = '−฿' + tf.toFixed(2);
            document.getElementById('eb-sum-cf-row').style.display = cf > 0 ? 'flex' : 'none';
            document.getElementById('eb-sum-cf').textContent = '−฿' + cf.toFixed(2);
            document.getElementById('eb-sum-net').textContent = '฿' + net.toFixed(2);
          }
        }
        
        // เมื่อ amount เปลี่ยน + type=Transfer/Cheque + ยังไม่ได้แก้ WHT เอง → auto-recalc
        function ebOnAmountChange() {
          const t = $ebType.value || '';
          if ((t === 'Transfer' || t === 'Cheque') && !ebWhtManuallyEdited) {
            $ebWht.value = ebCalcWHT(Number($ebAmount.value) || 0).toFixed(2);
          }
          ebUpdateSummary();
        }
        
        // เมื่อเปลี่ยน Type → reset flag (ให้ auto-calc ใหม่ในครั้งถัดไป)
        $ebType?.addEventListener('change', () => {
          ebWhtManuallyEdited = false;
          // ถ้าเพิ่งเปลี่ยนเป็น Transfer/Cheque + WHT ว่าง → auto-fill
          const t = $ebType.value || '';
          if ((t === 'Transfer' || t === 'Cheque') && (!Number($ebWht.value) || $ebWht.value === '0')) {
            $ebWht.value = ebCalcWHT(Number($ebAmount.value) || 0).toFixed(2);
          }
          ebUpdateFeeUI();
        });
        $ebAmount?.addEventListener('input', ebOnAmountChange);
        $ebTf?.addEventListener('input', ebUpdateSummary);
        $ebCf?.addEventListener('input', ebUpdateSummary);
        
        ebUpdateFeeUI(); // init
        
        document.getElementById('eb-save')?.addEventListener('click', () => {
          b.bill_no = document.getElementById('eb-bill').value.trim();
          b.date = document.getElementById('eb-date').value;
          b.station = document.getElementById('eb-station').value;
          b.type = document.getElementById('eb-type').value;
          b.amount = Number(document.getElementById('eb-amount').value) || 0;
          b.confirmation = document.getElementById('eb-confirmation').value.trim();
          b.pay_date = document.getElementById('eb-pay-date').value;
          b.bank = document.getElementById('eb-bank').value.trim();
          b.due_date = document.getElementById('eb-due-date').value;
          b.remarks1 = document.getElementById('eb-remarks1').value;
          b.remarks2 = document.getElementById('eb-remarks2').value;
          b.match_status = document.getElementById('eb-status').value;
          
          // Fee fields: บันทึกเฉพาะ Type = Transfer/Cheque/Card
          // ถ้า Type อื่น → เคลียร์ค่าทิ้ง (ให้ consistency กับ logic แสดงผล)
          if (b.type === 'Transfer' || b.type === 'Cheque' || b.type === 'Card') {
            b.wht_amount = Number(document.getElementById('eb-wht').value) || 0;
            b.transfer_fee = Number(document.getElementById('eb-transfer-fee').value) || 0;
            b.card_fee = Number(document.getElementById('eb-card-fee').value) || 0;
            b.wht_enabled = b.wht_amount > 0;
          } else {
            b.wht_amount = 0;
            b.transfer_fee = 0;
            b.card_fee = 0;
            b.wht_enabled = false;
          }
          
          // Auto-matched rule: Cash type without confirmation → still matched
          if (b.type === 'Cash' && b.match_status === 'pending') {
            b.match_status = 'matched';
            if (!b.pay_date) b.pay_date = b.date;
          }
          
          persistMainState();
          invalidateBillsCache();    // ให้ Sum/Cash Drawer รีคำนวณจาก bills ล่าสุด
          closeModal();
          toast(`✓ บันทึกแล้ว — ${b.bill_no||'(ไม่มีเลข)'}`, 'success');
          renderKeepScroll();
        });
        
        document.getElementById('eb-delete')?.addEventListener('click', () => {
          if (!confirm(`ลบบิล ${b.bill_no||'(ไม่มีเลข)'}?\n${b.type} · ฿${fmtNum(b.amount)} · ${fmtDate(b.date)}\n\nลบแล้วกู้คืนไม่ได้`)) return;
          // ใช้ reference (b) แทน idx — กัน idx shift ถ้ามี mutation อื่น
          const realIdx = billList.indexOf(b);
          if (realIdx < 0) { toast('บิลไม่อยู่ในระบบแล้ว', 'warn'); closeModal(); return; }
          billList.splice(realIdx, 1);
          persistMainState();
          invalidateBillsCache();    // สำคัญ: ล้าง cache ให้ Sum refresh
          closeModal();
          toast('ลบบิลแล้ว', 'success');
          renderKeepScroll();
        });
      });
    });

    // Summary cells (cashIn/cashOut/returns/sales/drawer)
    el.querySelectorAll('.sum-cell').forEach(inp => {
      inp.addEventListener('input', debounce(() => {
        const key = inp.dataset.k;
        const value = parseFloat(inp.value) || 0;
        mainSummary[key] = value;
        
        // Sync to __byDate[selectedDate] ด้วย (ป้องกันข้อมูลหายเมื่อเปลี่ยนวัน)
        const [field, station] = key.split('_').reduce((acc, part, i, arr) => {
          if (i === 0) return [part, ''];
          return [acc[0], acc[1] ? acc[1] + '_' + part : part];
        }, ['', '']);
        if (field && station) {
          const LABEL_MAP = {
            cashIn: 'นำเงินเข้า', sales: 'ยอดขาย', cashOut: 'นำเงินออก',
            returns: 'ยอดคืนสินค้า', cashDrawer: 'Cash Drawer',
            transfer: 'Transfer', card: 'Card', cheque: 'Cheque', refund: 'Refund',
          };
          const thLabel = LABEL_MAP[field];
          if (thLabel) {
            if (!mainSummary.__byDate) mainSummary.__byDate = {};
            if (!mainSummary.__byDate[selectedDate]) mainSummary.__byDate[selectedDate] = {};
            if (!mainSummary.__byDate[selectedDate][thLabel]) mainSummary.__byDate[selectedDate][thLabel] = {};
            mainSummary.__byDate[selectedDate][thLabel][station] = value;
          }
        }
        
        persistMainState();
        updateSumCheckRow();
        updateAllStationColumn();
      }, 200));
    });

    // Cash counting cells — บันทึกลง cashCount ของวันที่เลือก
    el.querySelectorAll('.cash-cell').forEach(inp => {
      inp.addEventListener('input', debounce(() => {
        const dayCash = getCashForDate(selectedDate);
        const k = inp.dataset.denom + '_' + inp.dataset.station;
        dayCash[k] = parseInt(inp.value) || 0;
        persistMainState();
        // Update totals ในตารางธนบัตรด้านล่าง
        const denom = Number(inp.dataset.denom);
        const rowTotal = ['Front1','Front2','Front3','Front4','Invoice']
          .reduce((s, st) => s + denom * (Number(dayCash[denom+'_'+st]) || 0), 0);
        const totalEl = el.querySelector(`[data-denom-total="${denom}"]`);
        if (totalEl) totalEl.textContent = fmtNum(rowTotal);
        
        const stationTotal = calcCashDrawer(inp.dataset.station);
        const stEl = el.querySelector(`[data-station-total="${inp.dataset.station}"]`);
        if (stEl) stEl.textContent = '฿' + fmtNum(stationTotal);
        
        const grand = ['Front1','Front2','Front3','Front4','Invoice'].reduce((s,st)=>s+calcCashDrawer(st),0);
        const gEl = document.getElementById('grand-total');
        if (gEl) gEl.textContent = '฿' + fmtNum(grand);
        
        // ── Update Cash Drawer row ในสรุปด้านบน ──
        // Front1-4: คำนวณแยกต่อ station
        ['Front1','Front2','Front3','Front4'].forEach(s => {
          const v = calcCashFromBills(s);
          const cell = el.querySelector(`[data-drawer-station="${s}"]`);
          if (cell) {
            cell.textContent = v ? fmtNum(v) : '-';
            cell.style.color = v ? 'var(--purple)' : 'var(--text3)';
            cell.style.fontWeight = v ? '600' : '400';
          }
        });
        // Invoice merged = รวม 3 stations
        const mergedInvoice = ['Invoice','Order','Payment']
          .reduce((s,st) => s + calcCashFromBills(st), 0);
        const mergedCell = el.querySelector('[data-drawer-station="Invoice"]');
        if (mergedCell) {
          mergedCell.textContent = mergedInvoice ? fmtNum(mergedInvoice) : '-';
          mergedCell.style.color = mergedInvoice ? 'var(--purple)' : 'var(--text3)';
          mergedCell.style.fontWeight = mergedInvoice ? '700' : '400';
        }
        // Drawer total column (ซ้ายสุด)
        const drawerTotalEl = el.querySelector('[data-drawer-total]');
        if (drawerTotalEl) {
          const frontSum = ['Front1','Front2','Front3','Front4']
            .reduce((s,st) => s + calcCashFromBills(st), 0);
          const total = frontSum + mergedInvoice;
          drawerTotalEl.textContent = total ? fmtNum(total) : '-';
        }
        
        // Recalc Sum row (✓OK / ตัวเลขต่าง)
        updateSumCheckRow();
      }, 200));
    });

    // Bill list cells — in-place edit (NO full render → ไม่มี scroll เด้ง)
    el.querySelectorAll('.bl-cell').forEach(inp => {
      inp.addEventListener('change', () => {
        const tr = inp.closest('tr');
        const idx = Number(tr.dataset.idx);
        const field = inp.dataset.field;
        billList[idx][field] = inp.value;
        
        // ── Surgical update: อัปเดตแค่ pay_date cell + status badge ใน row นี้ ──
        // ไม่ re-render ทั้งหน้า → ไม่มี scroll bounce
        const updateRowStatus = (b) => {
          // อัปเดต pay_date input ในแถวเดียวกัน
          const payDateInp = tr.querySelector('input[data-field="pay_date"]');
          if (payDateInp) payDateInp.value = b.pay_date ? toISODate(b.pay_date) : '';
          
          // อัปเดต confirmation input (เผื่อ code เปลี่ยน)
          const confInp = tr.querySelector('input[data-field="confirmation"]');
          if (confInp && confInp !== inp) confInp.value = b.confirmation || '';
        };
        
        // กฎ matched ใหม่:
        //   Type = Cash                             → auto matched (ไม่ต้องใส่ confirmation)
        //   Type = Transfer/Card/Cheque/Refund     → matched ก็ต่อเมื่อมี confirmation
        //   Type = Unknown / ว่าง                  → pending เสมอ
        const MATCHABLE_TYPES_INLINE = ['Transfer', 'Card', 'Cheque', 'Refund'];
        
        // ── Auto status change เมื่อกรอก confirmation ──
        if (field === 'confirmation') {
          const b = billList[idx];
          const hasConf = b.confirmation && b.confirmation.trim();
          const canMatchByType = MATCHABLE_TYPES_INLINE.includes(b.type || '');
          
          if (hasConf && canMatchByType) {
            // Type = Transfer/Card/Cheque + มี confirmation → matched
            if (b.match_status !== 'matched' && b.match_status !== 'paid' && b.match_status !== 'void') {
              b.match_status = 'matched';
              if (!b.pay_date) b.pay_date = b.date;
              toast(`✓ บันทึกเป็นชำระแล้ว — ${b.bill_no||'(ไม่มีเลข)'}`, 'success');
            }
          } else if (hasConf && !canMatchByType) {
            // มี confirmation แต่ Type ไม่ match → แจ้งเตือน ไม่เปลี่ยนสถานะ
            if (b.type && b.type !== 'Cash') {
              toast(`⚠️ Type = "${b.type}" ไม่ match กับ statement (ใช้ได้เฉพาะ Transfer/Card/Cheque)`, 'warn');
            }
          } else if (!hasConf) {
            // ล้าง confirmation → กลับเป็น pending (ถ้าไม่ใช่ Cash/paid_by_sp/void)
            if (b.match_status === 'matched' && !b.paid_by_sp && b.type !== 'Cash') {
              b.match_status = 'pending';
              delete b.pay_date;
              delete b.matched_stmt_ref;
              delete b.matched_at;
              toast(`↩ ยกเลิก matched — ${b.bill_no||'(ไม่มีเลข)'}`, 'info');
            }
          }
          persistMainState();
          updateRowStatus(b);
          updateSumCheckRow(); // ยอดรวมอาจเปลี่ยน (matched bill affect auto value)
          return;
        }
        
        // ── Auto-match Type=Cash / revert when Type changes ──
        if (field === 'type') {
          const b = billList[idx];
          const hasConf = b.confirmation && b.confirmation.trim();
          
          if (b.type === 'Cash') {
            // Cash → auto matched
            if (b.match_status !== 'matched' && b.match_status !== 'paid' && b.match_status !== 'void') {
              b.match_status = 'matched';
              if (!b.pay_date) b.pay_date = b.date;
              toast(`✓ Cash → auto matched`, 'success');
            }
          } else if (MATCHABLE_TYPES_INLINE.includes(b.type)) {
            // Transfer/Card/Cheque → matched ต่อเมื่อมี confirmation
            if (hasConf && b.match_status !== 'matched' && b.match_status !== 'paid' && b.match_status !== 'void') {
              b.match_status = 'matched';
              if (!b.pay_date) b.pay_date = b.date;
              toast(`✓ มี confirmation อยู่แล้ว → matched`, 'success');
            } else if (!hasConf && b.match_status === 'matched' && !b.paid_by_sp) {
              b.match_status = 'pending';
              delete b.pay_date;
              delete b.matched_stmt_ref;
              toast(`↩ ต้องใส่ confirmation ก่อนจึงจะ matched`, 'info');
            }
          } else {
            // Type = Refund / Unknown / ว่าง → pending (ถ้าไม่ได้ถูก paid_by_sp)
            if (b.match_status === 'matched' && !b.paid_by_sp) {
              b.match_status = 'pending';
              delete b.pay_date;
              delete b.matched_stmt_ref;
              toast(`↩ Type "${b.type||'(ว่าง)'}" ไม่ต้อง match → pending`, 'info');
            }
          }
          persistMainState();
          updateRowStatus(b);
          updateSumCheckRow(); // matched status เปลี่ยน → sum เปลี่ยน
          return;
        }
        
        // ช่องอื่นๆ (date, station, amount, remarks, bank, due_date, pay_date)
        // → แค่ save ไม่ render เลย
        persistMainState();
        // ถ้าเปลี่ยน amount หรือ station → sum อาจเปลี่ยน
        if (field === 'amount' || field === 'station') updateSumCheckRow();
      });
    });

    // ── Copy-Down buttons ──
    el.querySelectorAll('.btn-copy-down').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = Number(btn.dataset.idx);
        const field = btn.dataset.field;
        const value = billList[idx][field];
        if (!value && value !== 0) { toast('ช่องนี้ว่าง ไม่มีอะไรให้คัดลอก', 'info'); return; }
        
        // คัดลอกลงทุกแถวที่อยู่ด้านล่าง (หลัง idx นี้) + อยู่ใน filter ปัจจุบัน
        let count = 0;
        billList.forEach((b, i) => {
          if (i <= idx) return;
          // ต้องอยู่ใน filter
          if (filterStation !== 'ALL' && b.station !== filterStation) return;
          if (filterType !== 'ALL' && b.type !== filterType) return;
          b[field] = value;
          count++;
        });
        persistMainState();
        toast(`คัดลอกลง ${count} แถว`, 'success');
        render();
      });
    });
    
    // ── Cheque bounce button ──
    el.querySelectorAll('.btn-bounce-cheque').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = Number(btn.dataset.idx);
        const b = billList[idx];
        if (!b) return;
        if (!confirm(`บันทึกว่าเช็ค ${b.bill_no||'บิลนี้'} เด้ง?\nยอด: ฿${fmtNum(b.amount)}`)) return;
        b.match_status = 'bounced';
        b.bounced_at = new Date().toISOString();
        persistMainState();
        toast('บันทึกเช็คเด้งแล้ว', 'error');
        render();
      });
    });
    
    // ── Void bill ──
    el.querySelectorAll('.btn-void-bill').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = Number(btn.dataset.idx);
        const b = billList[idx];
        if (!b) return;
        
        openModal(`❌ ยกเลิกบิล ${b.bill_no||'(ไม่มีเลข)'}`, `
          <div class="flex-col gap-3">
            <div style="padding:10px;background:rgba(239,87,87,.08);border-radius:8px">
              <div class="text-sm">${b.bill_no || '(ไม่มีเลข)'} · ฿${fmtNum(b.amount)} · ${fmtDate(b.date)}</div>
              <div class="text-xs text-muted">${b.station||''} · ${b.type||''}</div>
            </div>
            <p class="text-sm">บิลนี้จะถูก mark ว่ายกเลิก — ไม่ถูกคิดในยอดรวม แต่จะเก็บประวัติไว้ กดยกเลิกได้ภายหลัง</p>
            <div class="input-group">
              <label>เหตุผลการยกเลิก *</label>
              <textarea class="input" id="void-reason" rows="3" placeholder="เช่น ลูกค้าขอยกเลิก, ออกใบแจ้งหนี้ผิด, สินค้าคืน, ..." autofocus></textarea>
            </div>
            <div class="flex gap-2 mt-2">
              <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ไม่ยกเลิก</button>
              <button class="btn btn-primary btn-sm flex-1" id="void-confirm" style="background:#777;color:#fff">❌ ยืนยันยกเลิกบิล</button>
            </div>
          </div>
        `);
        
        document.getElementById('void-confirm')?.addEventListener('click', () => {
          const reason = document.getElementById('void-reason').value.trim();
          if (!reason) { toast('ต้องระบุเหตุผล', 'error'); return; }
          b.match_status = 'void';
          b.voided_at = new Date().toISOString();
          b.voided_by = currentUser?.display_name || 'Admin';
          b.void_reason = reason;
          persistMainState();
          closeModal();
          toast(`ยกเลิกบิล ${b.bill_no||''} แล้ว`, 'success');
          render();
        });
      });
    });
    
    // ── Un-void bill (ยกเลิกการยกเลิก) ──
    el.querySelectorAll('.btn-unvoid-bill').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = Number(btn.dataset.idx);
        const b = billList[idx];
        if (!b) return;
        if (!confirm(`คืนบิล ${b.bill_no||''} กลับมาใช้งาน?\n(เหตุผลเดิม: ${b.void_reason||'-'})`)) return;
        b.match_status = 'pending';
        delete b.voided_at;
        delete b.voided_by;
        delete b.void_reason;
        persistMainState();
        toast('คืนบิลแล้ว', 'success');
        render();
      });
    });
  }

  function updateSumCheckRow() {
    // ใช้ data-sum-row attribute แทน index position (กัน shift ถ้ามี row ใหม่เพิ่ม)
    const sumRow = el.querySelector('tr[data-sum-row]');
    if (!sumRow) return;
    SUMMARY_STATIONS.forEach((s) => {
      if (!['Front1','Front2','Front3','Front4','Invoice','Invoice Credit','Order Credit'].includes(s)) return;
      const cell = sumRow.querySelector(`td[data-sum-station="${s}"]`);
      if (!cell) return;
      const { diff, isOk, empty } = calcSumCheck(s);
      if (empty) {
        cell.textContent = '-';
        cell.style.color = 'var(--text3)';
      } else if (isOk) {
        cell.textContent = '✓ OK';
        cell.style.color = 'var(--success)';
      } else {
        cell.textContent = fmtDiff(diff);
        cell.style.color = sumColor(false, diff);
      }
    });
  }

  function updateAllStationColumn() {
    // อัปเดตคอลัมน์ All Station (col 1) ของทุก row
    // (ไม่ re-render ทั้งหน้าเพื่อ performance)
  }

  render();
}

// alias สำหรับ backward compat
async function renderBillList(el) { return renderMain(el); }

// ══════════════════════════════════════════════════════════════
// Render Payments Page (SP List พร้อม Parent-Child)
// ══════════════════════════════════════════════════════════════
async function renderPayments(el) {
  let filterStatus = 'ALL';
  let searchText = '';
  let expandedSP = new Set(); // SP ที่เปิดแสดง child

  function render() {
    let data = paymentList;
    if (filterStatus !== 'ALL') data = data.filter(p => p.match_status === filterStatus);
    if (searchText) {
      const s = searchText.toLowerCase();
      data = data.filter(p => 
        (p.sp_no||'').toLowerCase().includes(s) ||
        (p.cust_name||'').toLowerCase().includes(s) ||
        (p.cust_id||'').toLowerCase().includes(s)
      );
    }
    
    // Sort by date (default ASC, toggle-able)
    const _spOrder = getSortOrder('payment');
    data = [...data].sort((a, b) => {
      const da = parseThaiDate(a.date) || 0;
      const db = parseThaiDate(b.date) || 0;
      return _spOrder === 'asc' ? da - db : db - da;
    });
    
    // PERF: truncate rendering
    const _t = truncateForRender(data);
    const visibleData = _t.visible;

    const totalAmt = paymentList.reduce((s,p) => s + (Number(p.total)||0), 0);
    const totalChildBills = paymentList.reduce((s,p) => s + (p.bills?.length||0), 0);
    const pendingCount = paymentList.filter(p => p.match_status === 'pending').length;
    const matchedCount = paymentList.filter(p => p.match_status === 'matched').length;

    el.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div class="page-title">Payments (SP) — การชำระเงิน</div>
        <div class="flex gap-2">
          <input class="input" placeholder="ค้นหา SP / ลูกค้า" id="pay-search" value="${searchText}" style="width:240px">
          <button class="btn btn-primary btn-sm" id="btn-import-sp">${ICONS.download} นำเข้า SP</button>
          <button class="btn btn-warn btn-sm" id="btn-add-temp-sp" style="background:var(--warn);color:#fff">${ICONS.plus} SP ชั่วคราว</button>
          <button class="btn btn-outline btn-sm" id="btn-clear-pay">ล้าง</button>
          <button class="btn btn-success btn-sm" id="btn-save-pay">${ICONS.check} บันทึก</button>
        </div>
      </div>

      <p class="text-sm text-dim mb-3">นำเข้าไฟล์ SP Payment Report (.xls) หรือสร้าง SP ชั่วคราว (SP-TEMP-xxx) เมื่อเห็นเงินเข้าแต่ยังไม่มีเลข SP จริง</p>

      <!-- Summary cards -->
      <div class="flex gap-3 flex-wrap mb-3 stagger">
        ${statCard('SP ทั้งหมด', paymentList.length, '', 'var(--primary)', ICONS.file)}
        ${statCard('ยอดรวม', '฿'+fmtNum(totalAmt), '', 'var(--success)', ICONS.dollar)}
        ${statCard('บิลที่ตัด', totalChildBills, 'SS/OS/SR/OR/JR', 'var(--info)', ICONS.check)}
        ${statCard('รอ Match', pendingCount, matchedCount + ' matched', 'var(--warn)', ICONS.bar)}
      </div>

      <!-- Filter pills -->
      <div class="flex gap-2 mb-3 items-center">
        <button class="pill ${filterStatus==='ALL'?'active':''}" data-fs="ALL">ทั้งหมด (${paymentList.length})</button>
        <button class="pill ${filterStatus==='pending'?'active':''}" data-fs="pending">รอ Match (${pendingCount})</button>
        <button class="pill ${filterStatus==='matched'?'active':''}" data-fs="matched">Matched (${matchedCount})</button>
        <span style="margin-left:auto"></span>
        ${sortToggleBtn('payment')}
      </div>

      <div class="card-flat">
        <div class="table-wrap" style="max-height:600px;overflow-y:auto">
          <table>
            <thead>
              <tr>

// ══════════════════════════════════════════════════════════════
// Business Rules (บจก. จงกลณีฯ) — 4 บัญชี
//   VAT:   KTB (รับลูกหนี้ VAT)
//          KBANK (จ่ายเจ้าหนี้ VAT)
//          BBL (บริษัท 266-4-448384 — VAT)
//   NOVAT: BBL NW (รับ-จ่าย NOVAT)
// ══════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════
// BANK_ACCOUNTS — Business Rules ของ 4 บัญชี
// 
// flow:
//   'receive'     = รับโอนจากลูกค้า
//   'pay'         = จ่ายโอนให้ supplier
//   'cheque_out'  = เช็คขึ้นเงิน (withdraw)
//
// รับเงินจากลูกค้า:
//   VAT (SS/SR)  → KTB, KBANK, BBL   (ทุกบัญชี VAT)
//   NOVAT (OS/OR) → BBL NW           (เฉพาะ NOVAT)
//
// จ่ายเจ้าหนี้:
//   VAT          → KBANK (หลัก)     + เช็คผ่าน KTB
//   NOVAT        → BBL NW
// ══════════════════════════════════════════════════════════════
const BANK_ACCOUNTS = {
  KTB:      { label:'KTB · รับโอน VAT · จ่ายเช็ค',        vat:'VAT',   flow:['receive','cheque_out'],    allowed_docs:['SS','SR','SP'] },
  KBANK:    { label:'KBANK · รับ-จ่าย VAT',               vat:'VAT',   flow:['receive','pay'],           allowed_docs:['SS','SR','SP'] },
  BBL:      { label:'BBL · บัญชีบริษัท VAT',              vat:'VAT',   flow:['receive','pay'],           allowed_docs:['SS','SR','SP'] },
  'BBL NW': { label:'BBL NW · รับ-จ่าย NOVAT',            vat:'NOVAT', flow:['receive','pay'],           allowed_docs:['OS','OR','SP'] },
};

function getAllowedBanks(vat, direction) {
  return Object.keys(BANK_ACCOUNTS).filter(k => {
    const b = BANK_ACCOUNTS[k];
    if (vat && b.vat !== vat) return false;
    if (direction && !b.flow.includes(direction)) return false;
    return true;
  });
}

// ══════════════════════════════════════════════════════════════
// ตรวจว่าเป็นกรณี "ลูกค้าโอนผิดธนาคาร" หรือไม่
// - SS/SR โอนเข้า BBL NW → wrong (VAT → NOVAT bank)
// - OS/OR โอนเข้า KTB/KBANK/BBL → wrong (NOVAT → VAT bank)
// - ระบบไม่บล็อก แต่จะ flag ให้ผู้ใช้เห็น
// ══════════════════════════════════════════════════════════════
function detectMisroutedPayment(billNo, bank) {
  if (!billNo || !bank) return null;
  const prefix = String(billNo).substring(0, 2).toUpperCase();
  const bankDef = BANK_ACCOUNTS[bank];
  if (!bankDef) return null;
  
  // VAT docs (SS, SR) — should go to VAT banks
  if (['SS', 'SR'].includes(prefix) && bankDef.vat !== 'VAT') {
    return { type:'vat_to_novat', msg:`บิล ${prefix} (VAT) โอนเข้า ${bank} (NOVAT) — ผิดบัญชี` };
  }
  // NOVAT docs (OS, OR) — should go to BBL NW
  if (['OS', 'OR'].includes(prefix) && bankDef.vat !== 'NOVAT') {
    return { type:'novat_to_vat', msg:`บิล ${prefix} (NOVAT) โอนเข้า ${bank} (VAT) — ผิดบัญชี` };
  }
  return null; // ok
}

      data = data.filter(c => {
        const d = toISODate(c.date);

        if (filterDateTo && d > filterDateTo) return false;
        return true;

                  const cfIndexMap = new Map();
                  cashflowList.forEach((c, i) => cfIndexMap.set(c, i));
                  return visibleData.map((c, idx) => {
                  const typeInfo = {
                    deposit:   { label:'🏦 ฝาก', color:'var(--success)' },
                    supplier:  { label:'🏭 Supplier', color:'var(--danger)' },
                    transfer:  { label:'🔄 โอน', color:'var(--info)' },
                    misc:      { label:'💫 อื่นๆ', color:'var(--warn)' },
                  }[c.type] || { label:c.type, color:'var(--text2)' };
                  
                  const vatColor = c.vat === 'VAT' ? '#4f9cf9' : c.vat === 'NOVAT' ? '#8e44ad' : 'var(--text3)';
                  const realIdx = cfIndexMap.get(c) ?? idx;
                  const isMatched = c.match_status === 'matched';
                  const rowStyle = isMatched ? 'background:rgba(45,212,160,.06)' : '';
                  
                  return `<tr data-cfidx="${realIdx}" style="${rowStyle}">
                    <td class="text-xs text-muted">${idx+1}</td>
                    <td class="text-xs">${fmtDate(c.date)}</td>
                    <td><span class="badge" style="background:${typeInfo.color}22;color:${typeInfo.color}">${typeInfo.label}</span></td>
                    <td style="text-align:center"><span class="badge" style="background:${vatColor}22;color:${vatColor};font-size:.75rem;font-weight:700">${c.vat||'-'}</span></td>
                    <td style="text-align:right;font-weight:700;color:${typeInfo.color}">
                      ${c.type==='supplier'?'-':''}฿${fmtNum(c.amount||0)}
                    </td>
                    <td class="text-xs">
                      ${c.from_account ? `<div>จาก: ${c.from_account}</div>` : ''}
                      ${c.to_account ? `<div>ไป: ${c.to_account}</div>` : ''}
                      ${c.counterparty ? `<div style="color:var(--text2)">${c.counterparty}</div>` : ''}
                    </td>
                    <td>${c.bank ? `<span class="badge" style="background:${(bankColors[c.bank]||'#555')}22;color:${bankColors[c.bank]||'#aaa'}">${c.bank}</span>` : '-'}</td>
                    <td class="text-xs" style="font-family:var(--mono)">${c.reference||'-'}</td>
                    <td class="text-xs" style="max-width:160px">${c.note||'-'}</td>
                    <td style="text-align:center">${isMatched?'<span class="badge badge-success">✓ Matched</span>':'<span class="badge badge-warn">⏳ รอ Match</span>'}</td>
                    <td style="text-align:center">
                      <button class="btn btn-ghost btn-sm btn-cf-edit" data-idx="${realIdx}" title="แก้ไข">${ICONS.edit}</button>
                      <button class="btn btn-ghost btn-sm btn-cf-delete" data-idx="${realIdx}" title="ลบ" style="color:var(--danger)">🗑️</button>
                    </td>
                  </tr>`;
                }).join('');
                })()
              }
            </tbody>
          </table>
        </div>
        <div class="flex justify-between items-center" style="padding:10px 14px;border-top:1px solid var(--border)">
          <span class="text-sm text-dim">
            ${visibleData.length} / ${data.length} (กรองจาก ${cashflowList.length})
            ${truncationFooter(data.length)}
          </span>
          <span class="text-sm"><span style="color:var(--success)">Matched ${matchedCount}</span> · <span style="color:var(--warn)">รอ Match ${cashflowList.length-matchedCount}</span></span>
        </div>
      </div>
    `;

    // Filter handlers
    el.querySelectorAll('.pill[data-ft]').forEach(btn => {
      btn.addEventListener('click', () => { filterType = btn.dataset.ft; render(); });
    });
    el.querySelectorAll('.pill[data-fv]').forEach(btn => {
      btn.addEventListener('click', () => { filterVat = btn.dataset.fv; render(); });
    });
    document.getElementById('cf-date-from')?.addEventListener('change', e => { filterDateFrom = e.target.value; render(); });
    document.getElementById('cf-date-to')?.addEventListener('change', e => { filterDateTo = e.target.value; render(); });
    el.querySelectorAll('.sort-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        toggleSortOrder(btn.dataset.pageKey);
        render();
      });
    });

    // Add buttons
    document.getElementById('btn-add-deposit')?.addEventListener('click', () => openCashflowModal('deposit'));
    document.getElementById('btn-add-supplier')?.addEventListener('click', () => openCashflowModal('supplier'));
    document.getElementById('btn-add-transfer')?.addEventListener('click', () => openCashflowModal('transfer'));
    document.getElementById('btn-add-misc')?.addEventListener('click', () => openCashflowModal('misc'));
    document.getElementById('btn-save-cashflow')?.addEventListener('click', async () => {
      toast('กำลังบันทึก...', 'info');
      const res = await api('saveCashflow', { records: cashflowList, created_by: currentUser?.display_name || 'Admin' });
      if (res.success) toast(`บันทึกสำเร็จ ${cashflowList.length} รายการ`, 'success');
      else toast(res.error || 'บันทึกไม่สำเร็จ', 'error');
    });

    // Edit / Delete
    el.querySelectorAll('.btn-cf-edit').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = Number(btn.dataset.idx);
        openCashflowModal(cashflowList[idx].type, idx);
      });
    });
    el.querySelectorAll('.btn-cf-delete').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = Number(btn.dataset.idx);
        const c = cashflowList[idx];
        if (!confirm(`ลบรายการนี้?\n${c.type} · ฿${fmtNum(c.amount)} · ${fmtDate(c.date)}`)) return;
        cashflowList.splice(idx, 1);
        persistMainState();
        toast('ลบแล้ว', 'success');
        render();
      });
    });
  }

  function openCashflowModal(type, editIdx) {
    const existing = editIdx !== undefined ? cashflowList[editIdx] : null;
    const isEdit = !!existing;
    
    // VAT/NOVAT ที่เลือก (ถ้าแก้ไขเอาของเดิม, ถ้าใหม่ default VAT)
    let selectedVat = existing?.vat || (type === 'deposit' ? 'VAT' : 'VAT');
    
    const typeConfig = {
      deposit:  { title:'🏦 นำเงินฝากธนาคาร', color:'var(--success)', 
        desc:'บันทึกเงินสดที่เอาไปฝากเข้าบัญชีธนาคาร',
        showFrom:true, fromLabel:'เงินสดจาก Station', fromPlaceholder:'Front1, Front2, รวมทุกโต๊ะ',
        showTo:true, toLabel:'ฝากเข้าบัญชี', 
        showCounterparty:false, bankDirection:'receive' },
      supplier: { title:'🏭 จ่ายเจ้าหนี้ (Supplier)', color:'var(--danger)',
        desc:'โอนจ่าย Supplier · VAT: จาก KBANK | NOVAT: จาก BBL NW',
        showFrom:true, fromLabel:'โอนจากบัญชี (บริษัท)', fromPlaceholder:'',
        showTo:true, toLabel:'บัญชี Supplier ปลายทาง', toPlaceholder:'เลขบัญชี Supplier',
        showCounterparty:true, counterpartyLabel:'ชื่อ Supplier / เจ้าหนี้', bankDirection:'pay' },
      transfer: { title:'🔄 โอนระหว่างบัญชี (บริษัท)', color:'var(--info)',
        desc:'โอนเงินระหว่างบัญชีบริษัท · กรณี VAT ปกติ: KTB → KBANK เมื่อเงินไม่พอ',
        showFrom:true, fromLabel:'จากบัญชี', fromPlaceholder:'',
        showTo:true, toLabel:'ไปบัญชี', toPlaceholder:'',
        showCounterparty:false, bankDirection:null },
      misc:     { title:'💫 รายการอื่นๆ', color:'var(--warn)',
        desc:'ดอกเบี้ยรับ · ค่าธรรมเนียม · มัดจำลูกค้า · อื่นๆ',
        showFrom:true, fromLabel:'จาก', fromPlaceholder:'-',
        showTo:true, toLabel:'ไป', toPlaceholder:'-',
        showCounterparty:true, counterpartyLabel:'คู่กรณี', bankDirection:null },
    }[type];

    function renderBankOptions(vat, dir) {
      const allowed = getAllowedBanks(vat, dir);
      const options = [{val:'', label:'— เลือกบัญชี —'}].concat(
        allowed.map(k => ({ val:k, label:BANK_ACCOUNTS[k].label }))
      );
      return options.map(o => 
        `<option value="${o.val}" ${existing?.bank===o.val?'selected':''}>${o.label}</option>`
      ).join('');
    }
    
    // คำแนะนำ Business Rules
    function getRuleHint(vat, type) {
      if (type === 'supplier') {
        return vat === 'VAT' 
          ? '💡 จ่ายเจ้าหนี้ VAT → โอนจาก <strong>KBANK</strong> เท่านั้น'
          : '💡 จ่ายเจ้าหนี้ NOVAT → โอนจาก <strong>BBL NW</strong> เท่านั้น';
      }
      if (type === 'deposit') {
        return vat === 'VAT'
          ? '💡 ฝาก VAT → บัญชี <strong>KTB</strong> (รับลูกหนี้ VAT)'
          : '💡 ฝาก NOVAT → บัญชี <strong>BBL NW</strong> (รับลูกหนี้ NOVAT)';
      }
      if (type === 'transfer' && vat === 'VAT') {
        return '💡 โอนภายใน VAT ปกติ: <strong>KTB → KBANK</strong> (เมื่อ KBANK เงินไม่พอจ่าย Supplier)';
      }
      return '';
    }

    openModal(typeConfig.title, `
      <div class="flex-col gap-3">
        <p class="text-sm text-dim" style="padding:8px 12px;background:${typeConfig.color}15;border-radius:6px">${typeConfig.desc}</p>
        
        <!-- VAT / NOVAT Selector -->
        <div class="input-group">
          <label>ประเภทการโอน *</label>
          <div class="flex gap-2">
            <button type="button" class="btn ${selectedVat==='VAT'?'btn-primary':'btn-outline'} btn-sm flex-1 cf-vat-btn" data-vat="VAT" style="${selectedVat==='VAT'?'background:#4f9cf9;color:#fff':''}">
              🔵 VAT <span class="text-xs" style="opacity:.7">(KTB / KBANK)</span>
            </button>
            <button type="button" class="btn ${selectedVat==='NOVAT'?'btn-primary':'btn-outline'} btn-sm flex-1 cf-vat-btn" data-vat="NOVAT" style="${selectedVat==='NOVAT'?'background:#8e44ad;color:#fff':''}">
              🟣 NOVAT <span class="text-xs" style="opacity:.7">(BBL NW)</span>
            </button>
          </div>
          <div id="cf-rule-hint" class="text-xs" style="margin-top:6px;color:var(--info);padding:6px 10px;background:rgba(79,156,249,.08);border-radius:6px"></div>
        </div>
        
        <div class="flex gap-2">
          <div class="input-group flex-1">
            <label>วันที่</label>
            <input type="date" class="input" id="cf-date" value="${existing?toISODate(existing.date):todayISO()}">
          </div>
          <div class="input-group flex-1">
            <label>ยอดเงิน *</label>
            <input type="number" class="input" id="cf-amount" value="${existing?.amount||''}" placeholder="0.00" step="0.01" autofocus>
          </div>
        </div>

        ${typeConfig.showFrom || typeConfig.showTo ? `
          <div class="flex gap-2">
            ${typeConfig.showFrom ? `
              <div class="input-group flex-1">
                <label>${typeConfig.fromLabel}</label>
                <input class="input" id="cf-from" value="${existing?.from_account||''}" placeholder="${typeConfig.fromPlaceholder}">
              </div>
            ` : ''}
            ${typeConfig.showTo ? `
              <div class="input-group flex-1">
                <label>${typeConfig.toLabel}</label>
                <input class="input" id="cf-to" value="${existing?.to_account||''}" placeholder="${typeConfig.toPlaceholder||''}">
              </div>
            ` : ''}
          </div>
        ` : ''}

        ${typeConfig.showCounterparty ? `
          <div class="input-group">
            <label>${typeConfig.counterpartyLabel}</label>
            <input class="input" id="cf-counterparty" value="${existing?.counterparty||''}" placeholder="ชื่อ / บริษัท">
          </div>
        ` : ''}

        <div class="flex gap-2">
          <div class="input-group flex-1">
            <label>บัญชีบริษัท *</label>
            <select class="select" id="cf-bank">
              ${renderBankOptions(selectedVat, typeConfig.bankDirection)}
            </select>
          </div>
          <div class="input-group flex-1">
            <label>เลขที่อ้างอิง / Slip</label>
            <input class="input" id="cf-ref" value="${existing?.reference||''}" placeholder="เลข slip / ref">
          </div>
        </div>

        <div class="input-group">
          <label>หมายเหตุ</label>
          <input class="input" id="cf-note" value="${existing?.note||''}" placeholder="รายละเอียดเพิ่มเติม">
        </div>

        <div class="flex gap-2 mt-2">
          <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
          <button class="btn btn-primary btn-sm flex-1" id="cf-save" style="background:${typeConfig.color};color:#fff">
            ${ICONS.check} ${isEdit?'อัปเดต':'บันทึก'}
          </button>
        </div>
      </div>
    `);
    
    // VAT/NOVAT button toggle → update bank dropdown
    function updateModalState() {
      document.querySelectorAll('.cf-vat-btn').forEach(btn => {
        const isActive = btn.dataset.vat === selectedVat;
        btn.classList.toggle('btn-primary', isActive);
        btn.classList.toggle('btn-outline', !isActive);
        if (isActive) {
          btn.style.background = selectedVat === 'VAT' ? '#4f9cf9' : '#8e44ad';
          btn.style.color = '#fff';
        } else {
          btn.style.background = '';
          btn.style.color = '';
        }
      });
      const bankSelect = document.getElementById('cf-bank');
      if (bankSelect) bankSelect.innerHTML = renderBankOptions(selectedVat, typeConfig.bankDirection);
      const hint = document.getElementById('cf-rule-hint');
      if (hint) hint.innerHTML = getRuleHint(selectedVat, type);
    }
    updateModalState();
    
    document.querySelectorAll('.cf-vat-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedVat = btn.dataset.vat;
        updateModalState();
      });
    });
    
    document.getElementById('cf-save')?.addEventListener('click', () => {
      const amount = Number(document.getElementById('cf-amount').value);
      if (!amount || amount <= 0) { toast('กรอกยอดเงิน', 'error'); return; }
      const bank = document.getElementById('cf-bank').value;
      if (!bank) { toast('เลือกบัญชีบริษัท', 'error'); return; }
      
      // Validate rules
      const bankDef = BANK_ACCOUNTS[bank];
      if (bankDef && bankDef.vat !== 'MIXED' && bankDef.vat !== selectedVat) {
        if (!confirm(`⚠️ บัญชี ${bank} เป็นประเภท ${bankDef.vat} แต่คุณเลือก ${selectedVat}\nยืนยันว่าต้องการบันทึกแบบนี้?`)) return;
      }
      
      const record = {
        id: existing?.id || ('CF-' + Date.now()),
        date: document.getElementById('cf-date').value || todayISO(),
        type: type,
        vat: selectedVat, // VAT | NOVAT
        amount: amount,
        from_account: document.getElementById('cf-from')?.value || '',
        to_account: document.getElementById('cf-to')?.value || '',
        counterparty: typeConfig.showCounterparty ? document.getElementById('cf-counterparty')?.value || '' : '',
        bank: bank,
        reference: document.getElementById('cf-ref').value,
        note: document.getElementById('cf-note').value,
        match_status: existing?.match_status || 'pending',
        match_stmt_ref: existing?.match_stmt_ref || '',
        created_by: currentUser?.display_name || 'Admin',
        created_at: existing?.created_at || new Date().toISOString(),
      };
      
      if (isEdit) {
        cashflowList[editIdx] = record;
      } else {
        cashflowList.push(record);
      }
      persistMainState();
      closeModal();
      toast(isEdit?'อัปเดตสำเร็จ':'บันทึกสำเร็จ', 'success');
      render();
    });
  }

  render();
}


// ══════════════════════════════════════════════════════════════
// Render Supplier Payment Page (จ่ายเจ้าหนี้ - PP)
// Workflow: 
//   1. Master Supplier (ชื่อ + เลขบัญชี + ธนาคาร + VAT/NOVAT)
//   2. บันทึกรายการที่จะโอน (pending)
//   3. โอนแล้ว → ใส่เลข PP → สถานะ paid
//   4. Match กับ Statement ของธนาคารที่โอน
// ══════════════════════════════════════════════════════════════
async function renderSupplier(el) {
  let tab = 'payments'; // payments | suppliers
  let filterStatus = 'ALL';
  let filterVat = 'ALL';
  let filterDateFrom = '';
  let filterDateTo = '';
  let searchText = '';

  function render() {
    if (tab === 'suppliers') {
      renderSupplierMaster();
      return;
    }
    
    // Filter
    let data = [...supplierPayments];
    if (filterStatus !== 'ALL') data = data.filter(p => p.status === filterStatus);
    if (filterVat !== 'ALL') data = data.filter(p => p.vat === filterVat);
    if (filterDateFrom || filterDateTo) {
      data = data.filter(p => {
        const d = toISODate(p.transfer_date || p.created_date);
        if (!d) return true;
        if (filterDateFrom && d < filterDateFrom) return false;
        if (filterDateTo && d > filterDateTo) return false;
        return true;
      });
    }
    if (searchText) {
      const s = searchText.toLowerCase();
      data = data.filter(p => 
        (p.supplier_name||'').toLowerCase().includes(s) ||
        (p.pp_no||'').toLowerCase().includes(s) ||
        (p.reference||'').toLowerCase().includes(s)
      );
    }
    // Sort: pending ก่อน, วันใหม่ก่อน
    data.sort((a,b) => {
      if (a.status !== b.status) {
        const order = { pending:0, scheduled:1, paid:2, cancelled:3 };
        return (order[a.status]||99) - (order[b.status]||99);
      }
      return (toISODate(b.transfer_date||b.created_date)||'').localeCompare(toISODate(a.transfer_date||a.created_date)||'');
    });
    
    // PERF: truncate
    const _t = truncateForRender(data);
    const visibleData = _t.visible;
    
    // Summary
    const statusCounts = {
      pending: supplierPayments.filter(p => p.status === 'pending').length,
      scheduled: supplierPayments.filter(p => p.status === 'scheduled').length,
      paid: supplierPayments.filter(p => p.status === 'paid').length,
      matched: supplierPayments.filter(p => p.match_status === 'matched').length,
    };
    const totalPending = supplierPayments.filter(p => p.status === 'pending' || p.status === 'scheduled').reduce((s,p)=>s+Number(p.amount||0),0);
    const totalPaid = supplierPayments.filter(p => p.status === 'paid').reduce((s,p)=>s+Number(p.amount||0),0);
    const vatPaid = supplierPayments.filter(p => p.status === 'paid' && p.vat === 'VAT').reduce((s,p)=>s+Number(p.amount||0),0);
    const novatPaid = supplierPayments.filter(p => p.status === 'paid' && p.vat === 'NOVAT').reduce((s,p)=>s+Number(p.amount||0),0);

    el.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div>
          <div class="page-title">🏭 จ่ายเจ้าหนี้ (Supplier Payment / PP)</div>
          <p class="text-sm text-dim" style="margin-top:2px">บันทึกรายการที่ต้องโอนให้ Supplier → เมื่อโอนแล้วใส่เลข PP</p>
        </div>
        <div class="flex gap-2">
          <button class="btn btn-primary btn-sm" id="btn-add-payment">${ICONS.plus} รายการโอนใหม่</button>
          <button class="btn btn-success btn-sm" id="btn-save-sup-pay">${ICONS.check} บันทึก</button>
        </div>
      </div>
      
      <!-- Tabs -->
      <div class="flex gap-2 mb-3">
        <button class="pill ${tab==='payments'?'active':''}" data-tab="payments">💰 รายการโอน (${supplierPayments.length})</button>
        <button class="pill ${tab==='suppliers'?'active':''}" data-tab="suppliers">📋 รายชื่อ Supplier (${supplierList.length})</button>
      </div>

      <!-- Summary -->
      <div class="flex gap-3 flex-wrap mb-3 stagger">
        ${statCard('รอโอน', '฿'+fmtNum(totalPending), statusCounts.pending+' รายการ', 'var(--warn)', ICONS.alert)}
        ${statCard('โอนแล้ว', '฿'+fmtNum(totalPaid), statusCounts.paid+' รายการ', 'var(--success)', ICONS.check)}
        ${statCard('VAT (KBANK/BBL)', '฿'+fmtNum(vatPaid), '', '#4f9cf9', ICONS.dollar)}
        ${statCard('NOVAT (BBL NW)', '฿'+fmtNum(novatPaid), '', '#8e44ad', ICONS.dollar)}
      </div>

      <!-- Filters -->
      <div class="flex gap-2 mb-2 flex-wrap items-center">
        <input class="input" id="sp-search" placeholder="ค้นหา ชื่อ / PP / Ref" value="${searchText}" style="width:240px">
        <span class="text-xs text-dim">สถานะ:</span>
        <button class="pill ${filterStatus==='ALL'?'active':''}" data-fs="ALL">ทั้งหมด</button>
        <button class="pill ${filterStatus==='pending'?'active':''}" data-fs="pending" style="--pill-color:var(--warn)">⏳ รอโอน</button>
        <button class="pill ${filterStatus==='scheduled'?'active':''}" data-fs="scheduled" style="--pill-color:var(--info)">📅 นัดโอน</button>
        <button class="pill ${filterStatus==='paid'?'active':''}" data-fs="paid" style="--pill-color:var(--success)">✓ โอนแล้ว</button>
        <button class="pill ${filterStatus==='cancelled'?'active':''}" data-fs="cancelled" style="--pill-color:var(--text3)">❌ ยกเลิก</button>
      </div>
      <div class="flex gap-2 mb-3 flex-wrap items-center">
        <span class="text-xs text-dim">VAT:</span>
        <button class="pill ${filterVat==='ALL'?'active':''}" data-fv="ALL">ทั้งหมด</button>
        <button class="pill ${filterVat==='VAT'?'active':''}" data-fv="VAT" style="--pill-color:#4f9cf9">VAT</button>
        <button class="pill ${filterVat==='NOVAT'?'active':''}" data-fv="NOVAT" style="--pill-color:#8e44ad">NOVAT</button>
        <span style="flex:1"></span>
        <input type="date" class="input" id="sp-from" value="${filterDateFrom}" style="width:140px;font-size:.8rem">
        <input type="date" class="input" id="sp-to" value="${filterDateTo}" style="width:140px;font-size:.8rem">
      </div>

      <!-- Table -->
      <div class="card-flat">
        <div class="table-wrap" style="max-height:520px;overflow-y:auto">
          <table>
            <thead>
              <tr>
                <th style="width:40px">#</th>
                <th>สถานะ</th>
                <th>PP / Ref</th>
                <th>Supplier</th>
                <th style="text-align:center">VAT</th>
                <th style="text-align:right">ยอด</th>

// ══════════════════════════════════════════════════════════════
// PP Report Page — รวม 3 ไฟล์ Smart ที่ import → Main sheet → Export
// Files:
//   1. การชำระเงิน.xls (Payment) → payments[]
//   2. การชำระเงิน_ประเภทชำระ.xls (Payment Type) → paymentTypes[]
//   3. ภาษีซื้อ.xls (Buy Bills) → buyBills[]
//
// VAT Logic: เลข doc prefix
//   MR, MS, BR → N (NOVAT)
//   PR, PS     → V (VAT)
// ══════════════════════════════════════════════════════════════

// Helper: แยก VAT type จากเลขเอกสาร
//   PR, PS, PC → V (VAT)
//   MR, MS, BR → N (NOVAT)
//   PX → ขึ้นอยู่กับบิลที่อยู่คู่ (pair) ถ้าคู่กับ PR/PS/PC = V, คู่กับ MR/MS/BR = N
function classifyVat(docNo) {
  const s = String(docNo || '').trim().toUpperCase();
  if (/^(PR|PS|PC)/i.test(s)) return 'V';
  if (/^(MR|MS|BR)/i.test(s)) return 'N';
  if (/^PX/i.test(s)) return 'PX'; // ต้อง resolve ภายหลังจาก siblings
  return ''; // unknown
}

// Resolve PX ตาม sibling bills: ถ้า siblings เป็น V ก็ V, ถ้าเป็น N ก็ N
function resolvePxVat(bills) {
  if (!bills || bills.length === 0) return '';
  const nonPx = bills.map(b => classifyVat(b.bill_no || b.doc_no || ''))
                     .filter(v => v && v !== 'PX');
  if (nonPx.length === 0) return ''; // all PX, can't determine
  // ถ้ามีทั้ง V และ N → MIX
  if (nonPx.includes('V') && nonPx.includes('N')) return 'MIX';
  return nonPx[0];
}

// Parser 1: การชำระเงิน (Payment)
// Format:
//   PP row: col1=PP number, col2=date, col3=(AP-XXX) name, col4=amount, col5=discount, col6=net
//   Child row: col1=MR/PR number, col3=date, col4=due, col5='(ใบรับของ/ใบซื้อ)', col6=amount
function parsePaymentFile(result) {
  const sheet = result.sheets[result.sheetNames[0]] || [];
  const records = [];
  let currentPP = null;
  let period = '';
  
  for (let i = 0; i < sheet.length; i++) {
    const r = sheet[i] || [];
    const c1 = String(r[0] || '').trim();
    
    // Extract period from header
    if (i < 5) {
      const rowText = r.join(' ');
      const periodMatch = rowText.match(/จากวันที่\s*:\s*(\d{2}\/\d{2}\/\d{4})\s*ถึงวันที่\s*:\s*(\d{2}\/\d{2}\/\d{4})/);
      if (periodMatch) period = `${periodMatch[1]} - ${periodMatch[2]}`;
    }
    
    // PP parent
    if (/^PP\d+-\d+$/i.test(c1)) {
      const supplierRaw = String(r[2] || '').trim();
      const apMatch = supplierRaw.match(/^\(([^)]+)\)\s*(.*)/);
      currentPP = {
        pp_no: c1,
        date: fmtDate(r[1]) || '',
        supplier_code: apMatch ? apMatch[1] : '',
        supplier_name: apMatch ? apMatch[2] : supplierRaw,
        amount: Number(r[3]) || 0,
        discount: Number(r[4]) || 0,
        net: Number(r[5]) || 0,
        bills: [],  // child bills
      };
      records.push(currentPP);
      continue;
    }
    
    // Child row (MR/PR/MS/PS/BR/PC/PX)
    if (/^(MR|MS|PR|PS|BR|PC|PX)\d+-\d+$/i.test(c1) && currentPP) {
      currentPP.bills.push({
        bill_no: c1,
        vat: classifyVat(c1),
        bill_date: fmtDate(r[2]) || '',
        due_date: fmtDate(r[3]) || '',
        note: String(r[4] || ''),
        amount: Number(r[5]) || 0,
        discount: Number(r[6]) || 0,
        other: Number(r[7]) || 0,
        net: Number(r[8]) || 0,
      });
    }
  }
  
  return { records, period };
}

// Parser 2: การชำระเงิน ประเภทชำระ (Payment Type)
// Format groups by (AP-XXX), then PP, then payment type rows (เงินสด / โอนเงิน / เช็ค)
function parsePaymentTypeFile(result) {
  const sheet = result.sheets[result.sheetNames[0]] || [];
  const records = []; // { pp_no, date, supplier_code, supplier_name, methods: [{type, date, bank, amount}] }
  let currentSupplier = null;
  let currentPP = null;
  
  for (let i = 0; i < sheet.length; i++) {
    const r = sheet[i] || [];
    const c1 = String(r[0] || '').trim();
    
    // Supplier header row: (AP-XXX) name | amount | 0 | amount
    const apMatch = c1.match(/^\(([^)]+)\)\s*(.+)/);
    if (apMatch && !/^PP/i.test(c1) && !/^(เงินสด|โอนเงิน|เช็ค)/.test(c1)) {
      currentSupplier = { code: apMatch[1], name: apMatch[2] };
      continue;
    }
    
    // PP row
    if (/^PP\d+-\d+$/i.test(c1)) {
      currentPP = {
        pp_no: c1,
        date: fmtDate(r[1]) || '',
        supplier_code: currentSupplier?.code || '',
        supplier_name: currentSupplier?.name || '',
        amount: Number(r[2]) || 0,
        discount: Number(r[3]) || 0,
        net: Number(r[4]) || 0,
        methods: [],
      };
      records.push(currentPP);
      continue;
    }
    
    // Payment method row: เงินสด / โอนเงิน / เช็ค
    if (/^(เงินสด|โอนเงิน|เช็ค)$/.test(c1) && currentPP) {
      const method = c1;
      // เงินสด: col3=date, col6=amount
      // โอนเงิน: col3=date, col4=bank, col6=amount
      // เช็ค: col3=date, col4=bank/chqNo, col6=amount
      currentPP.methods.push({
        method: method,
        date: fmtDate(r[2]) || '',
        bank: String(r[3] || ''),
        amount: Number(r[5]) || 0,
        discount: Number(r[6]) || 0,
        net: Number(r[7]) || 0,
      });
    }
  }
  
  return records;
}

// Parser 3: ภาษีซื้อ (Buy Bills)
// Format: No | Date | INV | - | DocNo (PR/MR) | (AP-XXX) name | taxID | branch | amount | vat | other | total
function parseBuyBillsFile(result) {
  const sheet = result.sheets[result.sheetNames[0]] || [];
  const records = [];
  
  // หา header row (ตั้งแต่ "No." หรือ 1)
  let startRow = 0;
  for (let i = 0; i < Math.min(15, sheet.length); i++) {
    const r = sheet[i] || [];
    if (Number(r[0]) === 1 && r[2]) { startRow = i; break; }
  }
  
  for (let i = startRow; i < sheet.length; i++) {
    const r = sheet[i] || [];
    const no = r[0];
    if (!no || isNaN(Number(no))) continue;
    
    const docNo = String(r[4] || '').trim();
    if (!docNo) continue;
    
    const supplierRaw = String(r[5] || '').trim();
    const apMatch = supplierRaw.match(/^\(([^)]+)\)\s*(.*)/);
    
    records.push({
      no: Number(no),
      bill_date: fmtDate(r[1]) || '',
      inv_no: String(r[2] || '').trim(),
      doc_no: docNo,
      vat: classifyVat(docNo), // V / N
      supplier_code: apMatch ? apMatch[1] : '',
      supplier_name: apMatch ? apMatch[2] : supplierRaw,
      tax_id: String(r[6] || '').trim(),
      branch: String(r[7] || '').trim(),
      amount: Number(r[8]) || 0,      // ยอดก่อน VAT
      vat_amount: Number(r[9]) || 0,  // ภาษี
      other: Number(r[10]) || 0,
      total: Number(r[11]) || 0,      // รวม
    });
  }
  
  return records;
}

// ══════════════════════════════════════════════════════════════
// Main Page: renderPPReport
// ══════════════════════════════════════════════════════════════
async function renderPPReport(el) {
  let filterVat = 'ALL';
  let filterMethod = 'ALL';
  let searchText = '';
  
  // สร้าง Merged Main จาก 3 datasets
  function rebuildMerged() {
    // key: pp_no → รวมข้อมูลจาก 3 sources
    const ppMap = {};
    
    // Seed ด้วย payments (มี bills)
    ppReport.payments.forEach(pp => {
      ppMap[pp.pp_no] = {
        pp_no: pp.pp_no,
        date: pp.date,
        supplier_code: pp.supplier_code,
        supplier_name: pp.supplier_name,
        amount: pp.amount,
        discount: pp.discount,
        net: pp.net,
        vat: '', // จะ derive จาก children
        bills: pp.bills || [],
        methods: [],
      };
    });
    
    // Merge paymentTypes (เพิ่ม methods)
    ppReport.paymentTypes.forEach(pt => {
      if (!ppMap[pt.pp_no]) {
        ppMap[pt.pp_no] = {
          pp_no: pt.pp_no,
          date: pt.date,
          supplier_code: pt.supplier_code,
          supplier_name: pt.supplier_name,
          amount: pt.amount,
          discount: pt.discount,
          net: pt.net,
          vat: '',
          bills: [],
          methods: [],
        };
      }
      ppMap[pt.pp_no].methods = pt.methods || [];
    });
    
    // Derive VAT type จาก children bills (หรือ buyBills)
    const buyMap = {};
    ppReport.buyBills.forEach(b => {
      buyMap[b.doc_no] = b;
    });
    
    Object.values(ppMap).forEach(pp => {
      // ดูว่า children bills เป็น V หรือ N
      const vatTypes = new Set();
      const resolvedBills = [];
      
      // Step 1: Classify non-PX first
      pp.bills.forEach(b => {
        const v = classifyVat(b.bill_no);
        b.vat_raw = v;
        if (v === 'V' || v === 'N') {
          vatTypes.add(v);
        }
      });
      
      // Step 2: Resolve PX based on majority of non-PX siblings
      let pxResolved = '';
      if (vatTypes.size === 1) pxResolved = Array.from(vatTypes)[0];
      else if (vatTypes.size > 1) pxResolved = 'MIX';
      
      pp.bills.forEach(b => {
        if (b.vat_raw === 'PX') {
          // ถ้าไม่มี sibling ชัดเจน ลองหาจาก buyBills
          if (pxResolved === 'V' || pxResolved === 'N') {
            b.vat = pxResolved;
          } else if (buyMap[b.bill_no]) {
            // จาก buyBills: ถ้ามี vat_amount > 0 = V, else = N
            b.vat = Number(buyMap[b.bill_no].vat_amount) > 0 ? 'V' : 'N';
          } else {
            b.vat = 'PX'; // ยังหาไม่ได้
          }
        } else {
          b.vat = b.vat_raw;
        }
        // Enrich from buyBills
        if (buyMap[b.bill_no]) {
          b.inv_no = buyMap[b.bill_no].inv_no;
          b.tax_id = buyMap[b.bill_no].tax_id;
          b.vat_amount = buyMap[b.bill_no].vat_amount;
        }
      });
      
      // Recalc vatTypes after resolving PX
      vatTypes.clear();
      pp.bills.forEach(b => { if (b.vat === 'V' || b.vat === 'N') vatTypes.add(b.vat); });
      
      if (vatTypes.size === 1) {
        pp.vat = Array.from(vatTypes)[0];
      } else if (vatTypes.size > 1) {
        pp.vat = 'MIX';
      } else {
        pp.vat = '';
      }
      
      // รวม method ออกมาเป็น summary columns
      pp.cash_date = '';
      pp.cash_amount = 0;
      pp.transfer_date = '';
      pp.transfer_bank = '';
      pp.transfer_amount = 0;
      pp.cheque_date = '';
      pp.cheque_bank = '';
      pp.cheque_amount = 0;
      pp.methods.forEach(m => {
        if (m.method === 'เงินสด') {
          pp.cash_date = m.date; pp.cash_amount = m.amount;
        } else if (m.method === 'โอนเงิน') {
          pp.transfer_date = m.date; pp.transfer_bank = m.bank; pp.transfer_amount = m.amount;
        } else if (m.method === 'เช็ค') {
          pp.cheque_date = m.date; pp.cheque_bank = m.bank; pp.cheque_amount = m.amount;
        }
      });
      
      // ── Auto-link กับ supplierPayments ที่มีเลข PP เดียวกัน ──
      const linkedSP = (supplierPayments||[]).find(sp => sp.pp_no && sp.pp_no === pp.pp_no);
      if (linkedSP) {
        pp.linked_sp = linkedSP.id;
        pp.sp_status = linkedSP.status;
        pp.sp_match_status = linkedSP.match_status;
        // Update SP เพื่อให้รู้ว่ามี PP Report เรียบร้อย
        if (linkedSP.status === 'paid') {
          linkedSP.pp_report_confirmed = true;
        }
      }
      
      // ── Auto-link กับ Transfer Log (JKN) ──
      const allTransfers = [...(transferLog.vatTransfers||[]), ...(transferLog.novatTransfers||[])];

        pp.transfer_from_bank = linkedTransfer.from_bank;
        pp.transfer_nickname = linkedTransfer.nickname;
      }
    });
    
    ppReport.merged = Object.values(ppMap).sort((a, b) => (a.pp_no||'').localeCompare(b.pp_no||''));

    // Handlers
