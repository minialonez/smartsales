<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ── Reset & Variables ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0e14;--surface:#141721;--surface2:#1b1f2e;--surface3:#232839;
  --border:#282d40;--border2:#353b52;
  --primary:#5b7cfa;--primary-dim:#3d56c4;--primary-bg:rgba(91,124,250,.1);
  --success:#2dd4a0;--success-bg:rgba(45,212,160,.1);
  --warn:#f5a623;--warn-bg:rgba(245,166,35,.1);
  --danger:#ef5757;--danger-bg:rgba(239,87,87,.1);
  --info:#3db9f5;--info-bg:rgba(61,185,245,.1);
  --purple:#a07cf5;
  --text:#dfe2ec;--text2:#8a90a8;--text3:#5a6080;
  --font:'Sarabun',sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:10px;--radius-sm:6px;--radius-lg:14px;
  --shadow:0 2px 12px rgba(0,0,0,.25);
  --transition:.18s ease;
}
html{font-size:14px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}
input,select,button,textarea{font-family:inherit}
a{color:var(--primary);text-decoration:none}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:9px}

/* ── Utilities ── */
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}
.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.flex-1{flex:1}.flex-wrap{flex-wrap:wrap}.text-right{text-align:right}
.font-bold{font-weight:700}.font-semi{font-weight:600}.text-sm{font-size:.85rem}
.text-xs{font-size:.75rem}.text-dim{color:var(--text2)}.text-muted{color:var(--text3)}
.w-full{width:100%}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.hidden{display:none!important}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Components ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.card-flat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border:none;border-radius:var(--radius);
  font-weight:600;font-size:.85rem;cursor:pointer;transition:var(--transition);white-space:nowrap}
.btn:hover{filter:brightness(1.15)}.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(239,87,87,.25)}
.btn-success{background:var(--success-bg);color:var(--success);border:1px solid rgba(45,212,160,.25)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost{background:transparent;color:var(--text2);border:none;padding:6px 8px}
.btn-sm{padding:5px 10px;font-size:.78rem}
.btn-icon{padding:6px;border-radius:var(--radius-sm)}
.btn[disabled]{opacity:.4;cursor:not-allowed;pointer-events:none}

.input-group{display:flex;flex-direction:column;gap:4px}
.input-group label{font-size:.78rem;color:var(--text2);font-weight:500}
.input,.select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  padding:8px 12px;color:var(--text);font-size:.88rem;outline:none;transition:var(--transition)}
.input:focus,.select:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(91,124,250,.15)}
.input::placeholder{color:var(--text3)}

.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:600;letter-spacing:.3px}
.badge-primary{background:var(--primary-bg);color:var(--primary)}
.badge-success{background:var(--success-bg);color:var(--success)}
.badge-danger{background:var(--danger-bg);color:var(--danger)}
.badge-warn{background:var(--warn-bg);color:var(--warn)}
.badge-info{background:var(--info-bg);color:var(--info)}
.badge-muted{background:rgba(90,96,128,.15);color:var(--text3)}
.badge-purple{background:rgba(160,124,245,.12);color:var(--purple)}

.pill{display:inline-flex;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;
  color:var(--text2);font-size:.8rem;font-weight:500;cursor:pointer;transition:var(--transition)}
.pill:hover{border-color:var(--primary);color:var(--primary)}
.pill.active{background:var(--primary-bg);border-color:var(--primary);color:var(--primary)}

.tab-bar{display:flex;gap:2px;background:var(--surface2);border-radius:var(--radius);padding:3px}
.tab-btn{padding:6px 14px;border-radius:var(--radius-sm);border:none;background:transparent;
  color:var(--text2);font-size:.8rem;font-weight:600;cursor:pointer;transition:var(--transition)}
.tab-btn.active{background:var(--primary);color:#fff}

/* ── Table ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:10px 12px;text-align:left;font-size:.72rem;font-weight:600;color:var(--text2);
  text-transform:uppercase;letter-spacing:.5px;background:var(--surface2);white-space:nowrap;position:sticky;top:0;z-index:1}
td{padding:10px 12px;font-size:.88rem;white-space:nowrap;border-bottom:1px solid var(--border);color:var(--text2)}
tr:hover td{background:rgba(91,124,250,.03)}
tr.row-danger td{background:rgba(239,87,87,.06);border-left:3px solid var(--danger)}

/* ── Stat Card ── */
.stat{display:flex;justify-content:space-between;align-items:flex-start}
.stat-label{font-size:.72rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:1.4rem;font-weight:800;margin-top:2px}
.stat-sub{font-size:.72rem;color:var(--text3);margin-top:4px}
.stat-icon{opacity:.4}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:500px;max-width:90vw;max-height:80vh;overflow:auto;transform:scale(.95);transition:transform .2s}
.modal-overlay.open .modal{transform:scale(1)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:1.05rem;font-weight:700}

/* ── Toast ── */
.toast-container{position:fixed;top:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:var(--radius);font-size:.85rem;font-weight:500;animation:toastIn .3s ease;min-width:280px}
.toast-success{background:#1a3d2e;border:1px solid var(--success);color:var(--success)}
.toast-error{background:#3d1a1a;border:1px solid var(--danger);color:var(--danger)}
.toast-info{background:#1a2d3d;border:1px solid var(--info);color:var(--info)}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

/* ── Login ── */
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,var(--bg) 0%,#10132a 50%,#150f28 100%)}
.login-card{width:380px;padding:40px;background:rgba(20,23,33,.85);backdrop-filter:blur(24px);
  border-radius:20px;border:1px solid var(--border)}
.login-logo{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--primary),var(--purple));margin:0 auto 16px;font-size:22px;font-weight:800;color:#fff}
.login-title{text-align:center;font-size:1.4rem;font-weight:800}
.login-sub{text-align:center;font-size:.88rem;color:var(--text2);margin-top:4px}
.login-error{font-size:.82rem;color:var(--danger);background:var(--danger-bg);padding:8px 12px;border-radius:var(--radius)}

/* ── Layout ── */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s}
#sidebar.collapsed{width:62px}
.sidebar-logo{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-logo-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--primary),var(--purple));font-weight:800;color:#fff;font-size:.9rem;flex-shrink:0}
.sidebar-logo-text{font-size:1rem;font-weight:700;white-space:nowrap;overflow:hidden}
.sidebar-nav{flex:1;padding:10px 6px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--radius);border:none;
  background:transparent;color:var(--text2);font-size:.88rem;cursor:pointer;transition:var(--transition);text-align:left;width:100%;font-weight:400}
.nav-item:hover{color:var(--text);background:rgba(91,124,250,.05)}
.nav-item.active{color:var(--primary);background:var(--primary-bg);font-weight:600}
.nav-item svg{flex-shrink:0}
.nav-item .nav-badge{margin-left:auto}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border)}
.sidebar-user{font-size:.78rem;color:var(--text2);margin-bottom:8px}
.sidebar-logout{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:.8rem;padding:4px 0}
.sidebar-logout:hover{color:var(--danger)}
#main{flex:1;overflow-y:auto;padding:28px;max-height:100vh}
.page-title{font-size:1.3rem;font-weight:800;margin-bottom:4px}

/* ── Progress Bar (for matching) ── */
.progress{height:8px;background:var(--surface2);border-radius:9px;overflow:hidden}
.progress-fill{height:100%;border-radius:9px;transition:width .5s ease}

/* ── Animations ── */
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.stagger > *{opacity:0;animation:fadeIn .35s ease forwards}
.stagger > *:nth-child(1){animation-delay:.05s}
.stagger > *:nth-child(2){animation-delay:.1s}
.stagger > *:nth-child(3){animation-delay:.15s}
.stagger > *:nth-child(4){animation-delay:.2s}
.stagger > *:nth-child(5){animation-delay:.25s}

/* ── Spinner ── */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Responsive ── */
@media(max-width:768px){
  #sidebar{position:fixed;z-index:100;left:-230px;transition:left .2s}
  #sidebar.mobile-open{left:0}
  #main{padding:16px}
}
</style>
</head>
<body>

<!-- Toast Container -->
<div class="toast-container" id="toasts"></div>

<!-- Hidden file inputs -->
<input type="file" id="file-sales" accept=".xlsx,.xlsm,.xls,.csv" style="display:none">
<input type="file" id="file-stmt" accept=".xlsx,.xlsm,.xls,.csv" style="display:none">

<!-- Login Page -->
<div id="login-page">
  <div class="login-card fade-in">
    <div class="login-logo">S</div>

<!-- App Layout -->
<div id="app" class="hidden">

  <aside id="sidebar">

        ออกจากระบบ
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main id="main"></main>
</div>

<!-- Modal Container -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="btn-ghost btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>

</div>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIG & API
// ══════════════════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbxKFt7Dcq1PPyYEy_zEwTuuNS2MkHywy7s3Wz3KTuSrIqBE9k5GUP3b8IOT8oGXkMWR/exec';

let currentUser = null;
let currentPage = 'dashboard';

// ── API Helper (ใช้ GET เสมอ เพราะ Apps Script redirect ทำให้ POST body หาย) ──
async function api(action, params = {}) {
  try {
    if (!API_URL) return demoResponse(action, params);

    // ใช้ GET — ส่ง parameters ผ่าน URL query string
    const qs = new URLSearchParams({ action });
    Object.keys(params).forEach(k => {
      const v = params[k];
      if (v !== undefined && v !== null && v !== '') {
        qs.set(k, typeof v === 'object' ? JSON.stringify(v) : String(v));
      }
    });

    const res = await fetch(API_URL + '?' + qs.toString(), { redirect: 'follow' });
    const text = await res.text();

    try {
      return JSON.parse(text);
    } catch {
      // Apps Script อาจ return HTML (error page)
      console.error('API response not JSON:', text.substring(0, 300));
      return demoResponse(action, params);
    }
  } catch (err) {
    console.error('API Error:', err);
    toast('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ — ใช้ Demo Mode', 'error');
    return demoResponse(action, params);
  }
}

// ── Date Helpers (dd/mm/yyyy เสมอ) ──
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayKey() { return todayISO().replace(/-/g, ''); }

// แปลงทุก input → dd/mm/yyyy (ค.ศ.) ไม่มี timezone shift
function fmtDate(d) {
  if (!d && d !== 0) return '';

  // 1) Date object → ใช้ local getters ตรงๆ (ไม่ผ่าน ISO)
  if (d instanceof Date && !isNaN(d)) {
    let y = d.getFullYear();
    if (y > 2400) y -= 543; // พ.ศ.→ค.ศ.
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${y}`;
  }

  // 2) Excel serial number (เช่น 45748) → แปลงเป็น Date
  if (typeof d === 'number' && d > 10000 && d < 80000) {
    // Excel epoch: 1899-12-30 (มี leap year bug)
    const excelEpoch = new Date(1899, 11, 30);
    const ms = d * 86400000;
    const dt = new Date(excelEpoch.getTime() + ms);
    return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`;
  }

  var str = String(d).trim();
  if (!str || str === 'null' || str === 'undefined') return '';

  // 3) dd/mm/yyyy อยู่แล้ว
  var m1 = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m1) {
    let y = Number(m1[3]); if (y > 2400) y -= 543;
    return `${String(m1[1]).padStart(2,'0')}/${String(m1[2]).padStart(2,'0')}/${y}`;
  }

  // 4) ISO date yyyy-mm-dd (ไม่ใช้ Date constructor เพื่อเลี่ยง timezone shift)
  var m2 = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m2) {
    let y = Number(m2[1]); if (y > 2400) y -= 543;
    return `${m2[3]}/${m2[2]}/${y}`;
  }

  // 5) Fallback: ลอง parse เป็น Date แล้วใช้ local
  var dt = new Date(d);
  if (!isNaN(dt)) {
    let y = dt.getFullYear();
    if (y > 2400) y -= 543;
    return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${y}`;
  }

  return str.split(' ')[0];
}
function fmtNum(n) { return new Intl.NumberFormat('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n); }
function fmtInt(n) { return new Intl.NumberFormat('th-TH').format(n); }

function extractTimeStr(val) {
  if (!val) return '';
  const match = String(val).match(/\d{2}:\d{2}(:\d{2})?/);
  return match ? match[0] : '';
}

// ── Toast ──
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ── Debounce (ลด re-render) ──
function debounce(fn, ms = 300) {
  let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

// ── Excel File Parser ──
function parseExcelFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array', cellDates: true, cellNF: false, cellText: false });
        const result = {};
        workbook.SheetNames.forEach(name => {
          // raw: true → ได้ Date object สำหรับ date cells (ไม่แปลงเป็น string)
          result[name] = XLSX.utils.sheet_to_json(workbook.Sheets[name], { header: 1, defval: '', raw: true });
        });
        resolve({ sheets: result, sheetNames: workbook.SheetNames });
      } catch (err) {
        reject(err);
      }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

function triggerFileUpload(inputId, callback) {
  const inp = document.getElementById(inputId);
  inp.value = '';
  inp.onchange = async () => {
    if (!inp.files[0]) return;
    try {
      toast('กำลังอ่านไฟล์...', 'info');
      const result = await parseExcelFile(inp.files[0]);
      callback(result, inp.files[0].name);
    } catch (err) {
      toast('อ่านไฟล์ไม่สำเร็จ: ' + err.message, 'error');
    }
  };
  inp.click();
}

// ── Statement Upload Handler ──
let uploadedStatements = [];

function handleStmtUpload(result, fileName) {
  const rows = [];
  const nameLC = fileName.toLowerCase();

  // ตรวจว่าเป็น Statement ธนาคารไหน
  let bank = 'UNKNOWN';
  if (nameLC.includes('ktb') || nameLC.includes('กรุงไทย')) bank = 'KTB';
  else if (nameLC.includes('kbank') || nameLC.includes('kasikorn') || nameLC.includes('กสิกร')) bank = 'KBANK';
  else if (nameLC.includes('bbl') || nameLC.includes('กรุงเทพ')) bank = 'BBL';

  // ลอง auto-detect จากเนื้อหา
  const firstSheet = result.sheets[result.sheetNames[0]] || [];
  for (const row of firstSheet.slice(0, 10)) {
    const joined = row.join(' ').toLowerCase();
    if (joined.includes('ktb') || joined.includes('กรุงไทย')) { bank = 'KTB'; break; }
    if (joined.includes('kasikorn') || joined.includes('กสิกร') || joined.includes('k-deposit')) { bank = 'KBANK'; break; }
    if (joined.includes('bbl') || joined.includes('กรุงเทพ') || joined.includes('bangkok bank')) { bank = 'BBL'; break; }
  }

  // Parse ตาม format ธนาคาร
  if (bank === 'KTB') {
    const sheet = firstSheet;
    // หา header row (Date)
    let hRow = 10;
    for (let i = 0; i < Math.min(15, sheet.length); i++) {
      if (sheet[i] && sheet[i].some(c => String(c).includes('Date'))) { hRow = i; break; }
    }
    for (let i = hRow + 1; i < sheet.length; i++) {
      const r = sheet[i];
      if (!r[0] || !r[5]) continue;
      rows.push({ bank, date: fmtDate(r[0]), time: extractTimeStr(r[0]), ref_no: String(r[3]||''), description: String(r[3]||''), amount: Number(r[5])||0, match_status: 'unmatched', match_station: '', match_bill: '' });
    }
  } else if (bank === 'KBANK') {
    const sheet = firstSheet;
    let hRow = 10;
    for (let i = 0; i < Math.min(15, sheet.length); i++) {
      if (sheet[i] && sheet[i].some(c => String(c).includes('วันที่'))) { hRow = i; break; }
    }
    for (let i = hRow + 1; i < sheet.length; i++) {
      const r = sheet[i];
      const dateVal = r[0] || r[1];
      const deposit = Number(r[6]) || Number(r[5]) || 0;
      if (!dateVal || !deposit) continue;
      rows.push({ bank, date: fmtDate(dateVal), time: String(r[1]||r[2]||''), ref_no: String(r[12]||r[11]||''), description: String(r[3]||r[2]||''), amount: deposit, match_status: 'unmatched', match_station: '', match_bill: '' });
    }
  } else if (bank === 'BBL') {
    const sheet = firstSheet;
    let hRow = 3;
    for (let i = 0; i < Math.min(8, sheet.length); i++) {
      if (sheet[i] && sheet[i].some(c => String(c).includes('วันที่') || String(c).includes('รายละเอียด'))) { hRow = i; break; }
    }
    for (let i = hRow + 1; i < sheet.length; i++) {
      const r = sheet[i];
      const dateVal = r[1];
      const credit = Number(r[4]) || 0;
      const debit = Number(r[3]) || 0;
      if (!dateVal || (!credit && !debit)) continue;
      if (String(r[2]||'').includes('ยอดรวม') || String(r[0]||'').includes('หมายเหตุ')) continue;
      rows.push({ bank, date: fmtDate(dateVal), time: extractTimeStr(dateVal), ref_no: String(r[7]||''), description: String(r[2]||''), amount: credit || -debit, match_status: 'unmatched', match_station: '', match_bill: '' });
    }
  } else {
    // Unknown format — ลองอ่าน sheet แรกเป็น generic
    const sheet = firstSheet;
    for (let i = 1; i < sheet.length; i++) {
      const r = sheet[i];
      rows.push({ bank, date: String(r[0]||''), time: String(r[1]||''), ref_no: String(r[2]||''), description: String(r[3]||''), amount: Number(r[4])||0, match_status: 'unmatched', match_station: '', match_bill: '' });
    }
  }

  uploadedStatements = rows;
  toast(`อ่าน Statement ${bank} สำเร็จ — ${rows.length} รายการ`, 'success');

  // Re-render matching page with uploaded data
  if (currentPage === 'matching') navigateTo('matching');
}

// ── Sales Import Handler ──
let uploadedSales = [];
let billList = []; // ศูนย์กลางข้อมูล: Smart bills + POS + Change
let paymentList = []; // SP List พร้อม Parent-Child

// ── Persist state to localStorage — function only, restore happens after mainSummary/cashCount declared ──
function persistMainState() {
  try {
    safeStorage.set('sf_billList', JSON.stringify(billList));
    safeStorage.set('sf_mainSummary', JSON.stringify(mainSummary));
    safeStorage.set('sf_cashCount', JSON.stringify(cashCount));
    safeStorage.set('sf_paymentList', JSON.stringify(paymentList));
  } catch (e) { console.warn('Could not persist:', e); }
}

function restoreMainState() {
  try {
    const savedBills = safeStorage.get('sf_billList');
    if (savedBills) billList = JSON.parse(savedBills);
    const savedSummary = safeStorage.get('sf_mainSummary');
    if (savedSummary) Object.assign(mainSummary, JSON.parse(savedSummary));
    const savedCash = safeStorage.get('sf_cashCount');
    if (savedCash) Object.assign(cashCount, JSON.parse(savedCash));
    const savedPay = safeStorage.get('sf_paymentList');
    if (savedPay) paymentList = JSON.parse(savedPay);
  } catch (e) { console.warn('Could not restore state:', e); }
}

// ══════════════════════════════════════════════════════════════
// Parse Front POS Report (rpt_sql_pssdailybycashierbybill.xls)
// Format: Bill S2604001XXX-YYYYYYY โดย XXX = 001(F1), 002(F2), 003(F3), 004(F4)
//         R = คืนเงิน, S = ขาย
// Col: 1=Bill | 2=Cashier | 3=ยอดบิล | 6=ยอดขายสุทธิ | 7=เงินสด | 8=โอน/บัตร | 9=เช็ค
// ══════════════════════════════════════════════════════════════
function parseFrontPosReport(result, fileName) {
  const newBills = [];
  let count = 0;

  // ใช้ sheet แรก
  const sheetName = result.sheetNames[0];
  const sheet = result.sheets[sheetName] || [];

  // หา header row (แถวที่มีคอลัมน์ "ยอดบิล" หรือ "รับเงินสด")
  let headerRow = -1;
  for (let i = 0; i < Math.min(10, sheet.length); i++) {
    const row = sheet[i] || [];
    const joined = row.map(c => String(c)).join('|');
    if (joined.includes('ยอดบิล') || joined.includes('รับเงินสด') || joined.includes('ยอดขายสุทธิ')) {
      headerRow = i; break;
    }
  }
  if (headerRow === -1) headerRow = 1;

  for (let i = headerRow + 1; i < sheet.length; i++) {
    const r = sheet[i] || [];
    const billNo = String(r[0] || '').trim();
    if (!billNo) continue;

    // หยุดที่บรรทัดสรุปท้ายไฟล์
    if (billNo.includes('ยอดขายสุทธิ') || billNo.includes('คูปอง') || billNo.startsWith('**') || billNo.includes('Page') || billNo.includes('.rpt')) break;

    // ต้องเป็น format S/R ตามด้วยตัวเลข และมี -
    if (!/^[SR]\d{8,}-\d+$/.test(billNo)) continue;

    const prefix = billNo.split('-')[0];
    const stationCode = prefix.slice(-3);
    const stationMap = { '001': 'Front1', '002': 'Front2', '003': 'Front3', '004': 'Front4' };
    const station = stationMap[stationCode] || 'Front1';

    const cashier = String(r[1] || '').trim();
    const netSales = Number(r[5]) || 0;
    const cash = Number(r[6]) || 0;
    const transfer = Number(r[7]) || 0;
    const cheque = Number(r[8]) || 0;

    let type = '';
    if (cash > 0) type = 'Cash';
    else if (transfer > 0) type = 'Transfer';
    else if (cheque > 0) type = 'Cheque';
    else type = 'Cash';

    const isReturn = billNo.startsWith('R');
    const finalAmount = isReturn ? -Math.abs(netSales) : netSales;
    if (isReturn) type = 'Refund';

    newBills.push({
      bill_no: billNo,
      date: todayISO(),
      station: station,
      type: type,
      amount: finalAmount,
      confirmation: '',
      pay_date: '',
      remarks1: cashier,
      remarks2: '',
      bank: '',
      due_date: '',
      match_status: 'pending',
      source: 'pos',
    });
    count++;
  }

  billList = billList.concat(newBills);
  persistMainState();
  toast(`นำเข้า Front POS สำเร็จ — ${count} รายการ`, 'success');
  if (currentPage === 'main') navigateTo('main');
}

// ══════════════════════════════════════════════════════════════
// Parse SP Payment Report (rpt_sql_smspayment.xls)
// Format: Parent-Child structure
//   Parent row: SP number | date | customer | | amount | 0 | amount
//   Child rows: Bill ref | ... | ... | ... | doc_type | amount
// Col: 1=Ref | 2=Original/Date | 3=Date/Customer | 4=DueDate | 5=DocType/Amount | 6=Amt1 | 7=Amt2 | 8=Amt3 | 9=Amt4
// ══════════════════════════════════════════════════════════════
function parseSPReport(result, fileName) {
  const newPayments = [];
  const sheetName = result.sheetNames[0];
  const sheet = result.sheets[sheetName] || [];

  let currentSP = null; // SP ที่กำลังอ่าน
  let count = 0, childCount = 0;

  for (let i = 0; i < sheet.length; i++) {
    const r = sheet[i] || [];
    const c1 = String(r[0] || '').trim();
    if (!c1) continue;

    // หยุดที่ "รวม" หรือ ".rpt" หรือ "Page"
    if (c1 === 'รวม' || c1.includes('.rpt') || c1.includes('Page')) break;

    // ── SP row (Parent) ──
    if (/^SP\d+-\d+$/i.test(c1)) {
      // Customer format: "(AD-00583) ร้าน อุสมานโกตาบารู"
      const custRaw = String(r[2] || '').trim();
      const custMatch = custRaw.match(/^\(([^)]+)\)\s*(.*)/);
      const custId = custMatch ? custMatch[1] : '';
      const custName = custMatch ? custMatch[2] : custRaw;

      currentSP = {
        sp_no: c1,
        date: fmtDate(r[1]) || '',
        cust_id: custId,
        cust_name: custName,
        amount: Number(r[4]) || 0,
        cash: Number(r[4]) || 0,       // col 5 = เงินสด
        transfer: Number(r[5]) || 0,   // col 6 = โอน
        cheque: Number(r[6]) || 0,     // col 7 = เช็ค
        total: Number(r[6]) || 0,      // col 7 rightmost
        bills: [],                      // child bills ที่ตัด
        match_status: 'pending',
      };
      // บาง SP มี total ที่ col 5 แทน col 7
      if (!currentSP.total) currentSP.total = currentSP.amount;
      newPayments.push(currentSP);
      count++;
      continue;
    }

    // ── Child row (บิลที่ตัด) ──
    // Format: SS/OS/SR/OR/JR/SC/JS number in col 1, doc type in col 5, amount in col 6
    if (/^(SS|OS|SR|OR|JR|SC|JS)\d+-\d+$/i.test(c1) && currentSP) {
      const billNo = c1;
      // อาจมี original SO reference ที่ col 2
      const origRef = String(r[1] || '').trim();
      const hasOrigRef = /^(SO|SI)\d+-\d+$/i.test(origRef);

      const billDate = fmtDate(hasOrigRef ? r[2] : r[2]) || '';
      const dueDate = fmtDate(r[3]) || '';
      const docType = String(r[4] || '').trim();
      const amount = Number(r[5]) || 0;

      currentSP.bills.push({
        bill_no: billNo,
        orig_ref: hasOrigRef ? origRef : '',
        bill_date: billDate,
        due_date: dueDate,
        doc_type: docType,
        amount: amount,
      });
      childCount++;
    }
  }

  paymentList = paymentList.concat(newPayments);
  
  // ── Link SP กับ Bill List — mark บิลที่ถูกตัดว่า 'paid' ──
  let linkedCount = 0;
  newPayments.forEach(sp => {
    (sp.bills || []).forEach(childBill => {
      const billIdx = billList.findIndex(b => b.bill_no === childBill.bill_no);
      if (billIdx >= 0) {
        billList[billIdx].match_status = 'paid';
        billList[billIdx].paid_by_sp = sp.sp_no;
        billList[billIdx].pay_date = sp.date;
        linkedCount++;
      }
    });
  });
  
  persistMainState();
  toast(`นำเข้า SP สำเร็จ — ${count} SP, ${childCount} บิลที่ตัด${linkedCount?`, เชื่อมกับ Bill List ${linkedCount} บิล`:''}`, 'success');
  if (currentPage === 'payments') navigateTo('payments');
}

// ── Generate Bill List จาก Smart Excel ──
function generateBillList(result, fileName) {
  const newBills = [];
  let smartCount = 0, posCount = 0, mainCount = 0;

  // ── 1. อ่าน "SS OR SR OR" (Smart bills) ──
  const smartSheetName = result.sheetNames.find(n => /ss|or|sr/i.test(n) && !n.toLowerCase().includes('main')) || 'SS OR SR OR';
  const smartSheet = result.sheets[smartSheetName] || [];

  // หา header row (ที่มีคอลัมน์ Amount/Bill)
  let smartHdr = -1;
  for (let i = 0; i < Math.min(10, smartSheet.length); i++) {
    const row = smartSheet[i] || [];
    if (row.some(c => String(c).toLowerCase().includes('amount')) || row.some(c => String(c).toLowerCase().includes('bill'))) {
      smartHdr = i; break;
    }
  }
  // ถ้าไม่เจอ header — เริ่มจากแถวที่ 1 (index 2 จริง) ตามไฟล์จริง
  const startRow = smartHdr >= 0 ? smartHdr + 1 : 2;

  for (let i = startRow; i < smartSheet.length; i++) {
    const r = smartSheet[i] || [];
    const billNo = String(r[0] || '').trim();
    if (!billNo) continue;

    // Amount Incl VAT (col 8) หรือ col สุดท้าย
    const amount = Number(r[8]) || Number(r[6]) || 0;
    const customer = String(r[2] || '').replace(/^\[[^\]]+\]/, '').trim();
    const date = fmtDate(r[3]) || todayISO();

    const bill = transformBill(billNo, amount, customer, date);
    if (bill) {
      newBills.push(bill);
      smartCount++;
    }
  }

  // ── 2. อ่าน "Main" sheet — POS Front1-4 transactions ──
  const mainSheetName = result.sheetNames.find(n => n.toLowerCase().includes('main')) || 'Main';
  const mainSheet = result.sheets[mainSheetName] || [];

  // หา header row "Bill Number"
  let mainHdr = -1;
  for (let i = 0; i < Math.min(20, mainSheet.length); i++) {
    const row = mainSheet[i] || [];
    if (row.some(c => String(c).includes('Bill Number'))) {
      mainHdr = i; break;
    }
  }
  if (mainHdr >= 0) {
    for (let i = mainHdr + 1; i < mainSheet.length; i++) {
      const r = mainSheet[i] || [];
      const billNo = String(r[0] || '').trim();
      const date = r[1];
      const station = String(r[2] || '').trim();
      const type = String(r[3] || '').trim();
      const amount = Number(r[4]) || 0;
      const remarks1 = String(r[7] || '').trim();
      const remarks2 = String(r[8] || '').trim();

      if (!amount && !billNo) continue;
      if (!station && !billNo) continue;

      // ถ้ามีเลขบิล Smart → transform ตาม rule
      if (billNo && /^(SS|SC|SR|OS|OR|SP)/i.test(billNo)) {
        const bill = transformBill(billNo, amount, remarks1, fmtDate(date));
        if (bill) {
          bill.remarks1 = remarks1;
          bill.remarks2 = remarks2;
          if (type) bill.type = type; // ใช้ type จาก Main ถ้ามี
          bill.source_date = bill.date; // stamp for multi-day matching
          newBills.push(bill);
          posCount++;
        }
      } else {
        // POS transaction (Front1-4) — ไม่มีเลขบิล
        newBills.push({
          bill_no: billNo || '',
          date: fmtDate(date) || todayISO(),
          source_date: fmtDate(date) || todayISO(),
          station: station,
          type: type || '',
          amount: amount,
          confirmation: String(r[5] || ''),
          pay_date: fmtDate(r[6]) || '',
          remarks1: remarks1,
          remarks2: remarks2,
          bank: '',
          due_date: '',
          match_status: 'pending',
          source: 'pos',
        });
        mainCount++;
      }
    }
  }

  // ── 3. (ยกเลิก) ไม่ import summary rows แล้ว — ผู้ใช้จะกรอกเองในตาราง Summary ด้านบน ──

  // รวมกับของเดิม (ไม่ทับ) — รองรับดึงหลายวัน
  const existingKeys = new Set(billList.map(b => b.bill_no).filter(Boolean));
  const uniqueNewBills = newBills.filter(b => !b.bill_no || !existingKeys.has(b.bill_no));
  const duplicateCount = newBills.length - uniqueNewBills.length;
  billList = billList.concat(uniqueNewBills);
  persistMainState();
  toast(`Generate สำเร็จ — ${uniqueNewBills.length} รายการใหม่${duplicateCount ? ` (ข้าม ${duplicateCount} ที่ซ้ำ)` : ''}`, 'success');

  if (currentPage === 'main' || currentPage === 'billlist') navigateTo('main');
}

// ── Transform เลขบิล → Station + Type ──
function transformBill(billNo, amount, customer, date) {
  const no = String(billNo).toUpperCase().trim();
  if (!no) return null;

  let station = '', type = '', stationOptions = null;
  let dueDate = '';

  if (no.startsWith('SC')) {
    station = 'Invoice Credit';
    type = 'Refund';
    stationOptions = ['Invoice', 'Invoice Credit']; // SC เลือกได้ 2 อย่าง
  } else if (no.startsWith('SR')) {
    station = 'Invoice Credit';
    type = 'Unknown';
    // Auto Due Date = วันที่ 20 เดือนถัดไป
    dueDate = calcNextMonth20(date);
  } else if (no.startsWith('OR')) {
    station = 'Order Credit';
    type = 'Unknown';
    dueDate = calcNextMonth20(date);
  } else if (no.startsWith('SS')) {
    station = 'Invoice';
    type = ''; // ให้กรอกเอง
  } else if (no.startsWith('OS')) {
    station = 'Order';
    type = '';
  } else if (no.startsWith('SP')) {
    station = 'Payment';
    type = '';
  } else {
    return null;
  }

  return {
    bill_no: billNo,
    date: date || todayISO(),
    source_date: date || todayISO(),
    station: station,
    type: type,
    amount: amount,
    confirmation: '',
    pay_date: '',
    remarks1: customer || '',
    remarks2: '',
    bank: '',
    due_date: dueDate,
    match_status: 'pending',
    source: 'smart',
    station_options: stationOptions, // SC → dropdown
  };
}

// คำนวณวันที่ 20 เดือนถัดไปจาก bill_date (สำหรับ Auto Due Date)
function calcNextMonth20(dateStr) {
  if (!dateStr) return '';
  const iso = toISODate(dateStr);
  if (!iso) return '';
  // Parse yyyy-mm-dd เป็น local date ตรงๆ (ไม่ผ่าน new Date(isoString) เพราะจะโดน UTC shift)
  const parts = iso.split('-');
  if (parts.length !== 3) return '';
  const y = Number(parts[0]);
  const m = Number(parts[1]) - 1;
  // วันที่ 20 เดือนถัดไป
  const next = new Date(y, m + 1, 20);
  if (isNaN(next)) return '';
  return `${next.getFullYear()}-${String(next.getMonth()+1).padStart(2,'0')}-${String(next.getDate()).padStart(2,'0')}`;
}

// ── Main Page State (persistent across renders) ──
let mainSummary = {
  // Summary rows values (กรอกเอง — POS Front1-4)
  // Key format: "row_station" e.g. "cashIn_Front1"
};
let cashCount = {
  // ธนบัตร/เหรียญ ต่อ Station
  // Key format: "denomination_Station" e.g. "1000_Front1"
};
const DENOMINATIONS = [1000, 500, 100, 50, 20, 10, 5, 1];

// ── Render Main Page (Summary + Bill List + Change Counting) ──
async function renderMain(el) {
  let filterStation = 'ALL';
  let filterType = 'ALL';
  let filterDateFrom = '';
  let filterDateTo = '';
  let hidePaid = false;
  let showChange = false;
  let selectedDate = todayISO();

  const TYPE_OPTIONS = ['', 'Cash', 'Transfer', 'Card', 'Cheque', 'Other', 'Unknown', 'Refund'];
  const STATION_OPTIONS = ['', 'Front1', 'Front2', 'Front3', 'Front4', 'Invoice', 'Invoice Credit', 'Order', 'Order Credit', 'Payment'];
  const SUMMARY_STATIONS = ['Front1', 'Front2', 'Front3', 'Front4', 'Invoice', 'Order', 'Payment', 'Invoice Credit', 'Order Credit'];

  // ── คำนวณเงินสดในลิ้นชัก = รวมบิลที่ Type=Cash (จาก SS/OS/SP/SC/JS) ──
  function calcCashFromBills(station) {
    return billList.filter(b => {
      const st = (b.station || '').trim();
      const ty = (b.type || '').trim();
      const no = (b.bill_no || '').toUpperCase();
      // Station ตรงกัน + Type = Cash + บิลประเภท SS/OS/SP/SC/JS
      const isTargetBill = no.startsWith('SS') || no.startsWith('OS') || no.startsWith('SP') || no.startsWith('SC') || no.startsWith('JS');
      return st === station && ty === 'Cash' && (isTargetBill || !no);
    }).reduce((s, b) => s + (Number(b.amount) || 0), 0);
  }
  function calcAutoValue(type, station) {
    return billList.filter(b => {
      const st = (b.station || '').trim();
      const ty = (b.type || '').trim();
      return st === station && ty === type;
    }).reduce((s, b) => s + (Number(b.amount) || 0), 0);
  }

  // คำนวณ ยอดขาย (Sales) row — Invoice/Order/Payment = SUMIFS, Front1-4 = กรอกเอง
  function calcSales(station) {
    // ถ้าเป็น Invoice/Order/Payment → รวมทุกบิลที่ station นั้น
    if (['Invoice', 'Invoice Credit', 'Order', 'Order Credit', 'Payment'].includes(station)) {
      return billList.filter(b => (b.station || '').trim() === station)
        .reduce((s, b) => s + (Number(b.amount) || 0), 0);
    }
    // Front1-4 กรอกเอง
    return Number(mainSummary['sales_' + station]) || 0;
  }

  // คำนวณยอดรวมธนบัตรใน Cash Drawer
  function calcCashDrawer(station) {
    return DENOMINATIONS.reduce((s, d) => s + d * (Number(cashCount[d + '_' + station]) || 0), 0);
  }

  // ── Sum check: เงินเข้า vs เงินออก ──
  function calcSumCheck(station) {
    const cashIn = Number(mainSummary['cashIn_' + station]) || 0;
    const sales = calcSales(station);
    const cashOut = Number(mainSummary['cashOut_' + station]) || 0;
    const returns = Number(mainSummary['returns_' + station]) || 0;
    const drawer = calcCashFromBills(station); // auto
    const transfer = calcAutoValue('Transfer', station);
    const card = calcAutoValue('Card', station);
    const cheque = calcAutoValue('Cheque', station);
    const refund = calcAutoValue('Refund', station);

    // Inflow = cashIn + sales + cashOut + returns (cashOut/returns เป็น negative)
    // Outflow = drawer + transfer + card + cheque + refund
    const inflow = cashIn + sales + cashOut + returns;
    const outflow = drawer + transfer + card + cheque + refund;
    const diff = inflow - outflow;
    return { diff, isOk: Math.abs(diff) < 0.01 };
  }

  function render() {
    // ── Filter bill list ──
    let data = billList;
    if (filterStation !== 'ALL') data = data.filter(b => b.station === filterStation);
    if (filterType !== 'ALL') data = data.filter(b => b.type === filterType);
    if (hidePaid) data = data.filter(b => b.match_status !== 'paid');
    
    // Filter by date range
    if (filterDateFrom || filterDateTo) {
      data = data.filter(b => {
        const bd = toISODate(b.date);
        if (!bd) return true;

  // ── Helper: สร้าง row ที่กรอกเอง (cashIn, cashOut, returns) ──
  function buildSumRow(key, label, color, editable) {
    const vals = SUMMARY_STATIONS.map(s => Number(mainSummary[key+'_'+s]) || 0);
    const allSum = vals.reduce((a,b)=>a+b,0);
    return `<tr>
      <td style="text-align:right;font-weight:700">${allSum?fmtNum(allSum):'-'}</td>
      <td style="font-weight:600;color:${color}">${label}</td>
      ${SUMMARY_STATIONS.map((s,i)=>{
        // cashIn: Front1-4 + Invoice, cashOut: Front1 + Invoice, returns: Front1-3 + Invoice
        const allowedStations = {
          cashIn: ['Front1','Front2','Front3','Front4','Invoice'],
          cashOut: ['Front1','Invoice'],
          returns: ['Front1','Front2','Front3','Front4','Invoice'],
        };
        const allowed = (allowedStations[key] || []).includes(s);
        if (!allowed) return `<td></td>`;
        return `<td><input class="input sum-cell" data-k="${key}_${s}" type="number" value="${mainSummary[key+'_'+s]||''}" step="0.01" placeholder="0" style="width:95%;padding:3px 6px;font-size:.78rem;text-align:right;border-color:${color}"></td>`;
      }).join('')}
    </tr>`;
  }

  // ── Helper: Cash Drawer row (คำนวณอัตโนมัติจากบิล Type=Cash) ──
  function buildCashDrawerRow() {
    const vals = SUMMARY_STATIONS.map(s => calcCashFromBills(s));
    const allSum = vals.reduce((a,b)=>a+b,0);
    return `<tr>
      <td style="text-align:right;font-weight:700">${allSum?fmtNum(allSum):'-'}</td>
      <td style="font-weight:600;color:var(--purple)">🗃️ Cash Drawer</td>
      ${SUMMARY_STATIONS.map((s,i)=>{
        if (['Invoice Credit', 'Order Credit'].includes(s)) return `<td></td>`;
        return `<td style="text-align:right;color:${vals[i]?'var(--purple)':'var(--text3)'};font-weight:${vals[i]?'600':'400'}">${vals[i]?fmtNum(vals[i]):'-'}</td>`;
      }).join('')}
    </tr>`;
  }

  // ── Helper: Auto row (Transfer/Card/Cheque/Refund) ──
  function buildAutoRow(type, label, color) {
    const vals = SUMMARY_STATIONS.map(s => calcAutoValue(type, s));
    const allSum = vals.reduce((a,b)=>a+b,0);
    return `<tr>
      <td style="text-align:right;font-weight:700">${allSum?fmtNum(allSum):'-'}</td>
      <td style="font-weight:600;color:${color}">${label}</td>
      ${SUMMARY_STATIONS.map((s,i)=>{
        if (['Invoice Credit', 'Order Credit'].includes(s)) return `<td></td>`;
        return `<td style="text-align:right;color:${vals[i]?color:'var(--text3)'};font-weight:${vals[i]?'600':'400'}">${vals[i]?fmtNum(vals[i]):'-'}</td>`;
      }).join('')}
    </tr>`;
  }

function toISODate(d) {
  if (!d && d !== 0) return '';

  // Date object
  if (d instanceof Date && !isNaN(d)) {
    let y = d.getFullYear();
    if (y > 2400) y -= 543;
    return `${y}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  // Excel serial number
  if (typeof d === 'number' && d > 10000 && d < 80000) {
    const excelEpoch = new Date(1899, 11, 30);
    const dt = new Date(excelEpoch.getTime() + d * 86400000);
    return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  }

  const s = String(d).trim();
  if (!s || s === 'null' || s === 'undefined') return '';

  // yyyy-mm-dd already
  const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) {
    let y = Number(iso[1]); if (y > 2400) y -= 543;
    return `${y}-${iso[2]}-${iso[3]}`;
  }

  // dd/mm/yyyy
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) {
    let y = Number(m[3]); if (y > 2400) y -= 543;
    return `${y}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
  }
  return '';
}

function handleSalesUpload(result, fileName) {
  // ลองหา Main sheet หรือ sheet แรก
  const sheetName = result.sheetNames.find(n => n.toLowerCase().includes('main')) || result.sheetNames[0];
  const sheet = result.sheets[sheetName] || [];

  const rows = [];
  // หา header row (Bill Number)
  let headerRow = -1;
  for (let i = 0; i < Math.min(20, sheet.length); i++) {
    if (sheet[i] && sheet[i].some(c => String(c).includes('Bill Number') || String(c).includes('Bill Date'))) {
      headerRow = i; break;
    }
  }
  if (headerRow === -1) headerRow = 13; // default Main R14 (index 13)

  for (let i = headerRow + 1; i < sheet.length; i++) {
    const r = sheet[i];
    if (!r[1] && !r[4]) continue; // skip empty
    rows.push({
      bill_no: String(r[0]||''), date: String(r[1]||''), station: String(r[2]||''),
      pay_method: String(r[3]||''), amount: Number(r[4])||0, confirmation: String(r[5]||''),
      pay_date: String(r[6]||''), customer: String(r[7]||''),
    });
  }

  uploadedSales = rows;
  toast(`อ่านยอดขายสำเร็จ — ${rows.length} รายการ`, 'success');
  if (currentPage === 'sales') navigateTo('sales');
}

// ── Safe Storage (fallback เมื่อ localStorage ไม่พร้อมใช้) ──
const _mem = {};
const safeStorage = {
  get(k) { try { return localStorage.getItem(k); } catch { return _mem[k] || null; } },
  set(k,v) { try { localStorage.setItem(k,v); } catch { _mem[k] = v; } },
  del(k) { try { localStorage.removeItem(k); } catch { delete _mem[k]; } },
};

// AUTH
// ══════════════════════════════════════════════════════════════
async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const remember = document.getElementById('login-remember').checked;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  errEl.classList.add('hidden');

  if (!username || !password) {
    errEl.textContent = 'กรุณากรอก username และ password';
    errEl.classList.remove('hidden');
    return;
  }

  // Set loading state
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> กำลังเข้าสู่ระบบ...';

  try {
    const res = await api('login', { username, password });
    if (res.success) {
      currentUser = res.data;
      if (remember) safeStorage.set('sf_user', JSON.stringify(currentUser));
      btn.innerHTML = '<span class="spinner"></span> กำลังโหลดระบบ...';
      showApp();
    } else {
      errEl.textContent = res.error || 'ไม่สามารถเข้าสู่ระบบได้';
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = originalText;
    }
  } catch (err) {
    errEl.textContent = 'เกิดข้อผิดพลาด: ' + err.message;
    errEl.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

function doLogout() {
  currentUser = null;
  safeStorage.del('sf_user');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-page').classList.remove('hidden');
  document.getElementById('login-pass').value = '';
}

    }
  } catch (e) { safeStorage.del('sf_user'); }
}

function renderNav() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = NAV_ITEMS.map(item => `
    <button class="nav-item ${currentPage===item.id?'active':''}" onclick="navigateTo('${item.id}')">

      <span class="nav-label">${item.label}</span>
      ${item.badge ? '<span class="badge badge-danger nav-badge">2</span>' : ''}
    </button>
  `).join('');
}

function navigateTo(page) {
  // Backward compat: billlist → main
  if (page === 'billlist') page = 'main';
  currentPage = page;
  renderNav();
  const main = document.getElementById('main');
  main.scrollTop = 0;
  const renderer = PAGE_RENDERERS[page];
  if (renderer) renderer(main);
  else main.innerHTML = `<div class="card"><p class="text-dim">หน้า "${page}" กำลังพัฒนา</p></div>`;
}

  el.innerHTML = `
    <div class="page-title">แดชบอร์ด</div>
    <p class="text-dim mb-4 text-sm">ภาพรวมระบบ — ${fmtDate(new Date())}</p>

      </div>

function statCard(label, value, sub, color, icon) {
  return `<div class="card flex-1" style="min-width:170px">
    <div class="stat">

        <div class="stat-label">${label}</div>
        <div class="stat-value" style="color:${color}">${value}</div>

      <div class="stat-icon" style="color:${color}">${icon||''}</div>
    </div>

}

// ── Debt Tracking ───────────────────────────────────────────
async function renderDebt(el) {
  let filterStatus = 'ALL';
  let searchText = '';

  const statusMap = {
    active: { label:'ปกติ', cls:'badge-success', color:'var(--success)' },
    cash_only: { label:'เงินสด', cls:'badge-info', color:'var(--info)' },
    overdue: { label:'เลยกำหนดชำระ', cls:'badge-danger', color:'var(--danger)' },
    credit_break: { label:'เบรกเครดิต', cls:'badge-warn', color:'var(--warn)' },
  };

  async function loadAndRender() {
    const res = await api('getArLedger');
    let debtors = res.data || [];

    // กรอง — ไม่แสดง cash_only ในหน้านี้
    debtors = debtors.filter(d => d.credit_status !== 'cash_only');

    // Filter status
    if (filterStatus !== 'ALL') {
      debtors = debtors.filter(d => d.credit_status === filterStatus);
    }
    // Search
    if (searchText) {
      const s = searchText.toLowerCase();
      debtors = debtors.filter(d => (d.cust_name||'').toLowerCase().includes(s) || (d.cust_id||'').toLowerCase().includes(s) || (d.phone||'').includes(s));
    }

    const allMonths = [...new Set(debtors.flatMap(d => Object.keys(d.months||{})))].sort();
    const totalDebt = debtors.reduce((s,d) => s + (Number(d.total_outstanding)||0), 0);
    const overdueCount = debtors.filter(d=>d.credit_status==='overdue').length;
    const breakCount = debtors.filter(d=>d.credit_status==='credit_break').length;

    el.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div class="page-title">ติดตามลูกหนี้</div>
        <div class="flex gap-2">
          <input class="input" placeholder="ค้นหา ชื่อ / cust_id / เบอร์" id="debt-search" value="${searchText}" style="width:240px">
          <button class="btn btn-outline btn-sm" id="btn-check-alerts">${ICONS.pulse} ตรวจสอบสถานะ</button>
        </div>
      </div>

      <!-- Summary cards -->
      <div class="flex gap-3 flex-wrap mb-3 stagger">
        ${statCard('ลูกหนี้ทั้งหมด', debtors.length, '', 'var(--info)', ICONS.card)}
        ${statCard('ยอดค้างรวม', '฿'+fmtNum(totalDebt), '', 'var(--warn)', ICONS.dollar)}
        ${statCard('เลยกำหนด', overdueCount, 'รายที่ต้องติดตาม', 'var(--danger)', ICONS.alert)}
        ${statCard('เบรกเครดิต', breakCount, 'รายที่หยุดขายเครดิต', 'var(--purple)', ICONS.alert)}
      </div>

      <!-- Filter pills -->
      <div class="flex gap-2 mb-3 flex-wrap">
        <button class="pill ${filterStatus==='ALL'?'active':''}" data-fs="ALL">ทั้งหมด</button>
        <button class="pill ${filterStatus==='active'?'active':''}" data-fs="active" style="border-color:var(--success)">ปกติ</button>
        <button class="pill ${filterStatus==='overdue'?'active':''}" data-fs="overdue" style="border-color:var(--danger)">เลยกำหนดชำระ</button>
        <button class="pill ${filterStatus==='credit_break'?'active':''}" data-fs="credit_break" style="border-color:var(--warn)">เบรกเครดิต</button>
      </div>

      <div class="card-flat">
        <div class="table-wrap" style="max-height:540px;overflow-y:auto">
          <table>
            <thead>
              <tr>
                <th>ลูกหนี้</th>
                <th>ผู้ติดต่อ</th>
                <th>เบอร์โทร</th>
                ${allMonths.map(m => {
                  const yr = m.split('-')[0].slice(-2);
                  const mo = m.split('-')[1];
                  return `<th style="text-align:right">${mo}/${yr}</th>`;
                }).join('')}

                <th>สถานะ</th>

                    <td>

                    </td>
                  </tr>`;
                }).join('')
              }
            </tbody>
          </table>
        </div>
      </div>
    `;

    // Bindings
    document.getElementById('debt-search')?.addEventListener('input', debounce(e => { searchText = e.target.value; loadAndRender(); }, 300));
    el.querySelectorAll('.pill[data-fs]').forEach(btn => {
      btn.addEventListener('click', () => { filterStatus = btn.dataset.fs; loadAndRender(); });
    });
    document.getElementById('btn-check-alerts')?.addEventListener('click', async () => {
      toast('กำลังตรวจสอบสถานะลูกหนี้...', 'info');
      const r = await api('checkAlerts');
      if (r.success) {
        toast(`ตรวจสอบเสร็จ — เปลี่ยนสถานะ ${r.data?.status_changed||0} ราย | แจ้งเตือน ${r.data?.alerts?.length||0} ราย`, 'success');
        loadAndRender();
      } else {
        toast(r.error||'ไม่สำเร็จ', 'error');
      }
    });

    // Payment button
    el.querySelectorAll('button[data-pay]').forEach(btn => {
      btn.addEventListener('click', () => openPaymentModal(btn.dataset.pay));
    });
  }

  loadAndRender();
}

// ── Payment Modal ──
async function openPaymentModal(custId) {
  const res = await api('getArLedger', { cust_id: custId });
  const debtors = res.data || [];
  const cust = debtors.find(d => d.cust_id === custId) || debtors[0];
  if (!cust) { toast('ไม่พบข้อมูลลูกค้า', 'error'); return; }

  const bills = cust.bills || [];
  const totalDue = Number(cust.total_outstanding) || 0;

  openModal(`ตัดชำระ — ${cust.cust_name}`, `
    <div class="flex-col gap-3">
      <div style="padding:12px;background:var(--surface2);border-radius:8px">
        <div class="text-xs text-dim">ยอดค้างทั้งหมด</div>
        <div class="font-bold" style="color:var(--danger);font-size:1.5rem">฿${fmtNum(totalDue)}</div>
        <div class="text-xs text-muted mt-2">${cust.contact_person||''} ${cust.phone?' · '+cust.phone:''}</div>
      </div>

      <div class="input-group">
        <label>ยอดที่จ่าย</label>
        <input type="number" class="input" id="pay-amount" placeholder="0.00" step="0.01" value="${totalDue}">
      </div>
      <div class="flex gap-2">
        <div class="input-group flex-1">
          <label>วันที่ชำระ</label>
          <input type="date" class="input" id="pay-date" value="${todayISO()}">
        </div>
        <div class="input-group flex-1">
          <label>ช่องทาง</label>
          <select class="select" id="pay-method">
            <option>Cash</option><option>Transfer</option><option>Cheque</option><option>Other</option>
          </select>
        </div>
      </div>
      <div class="input-group">
        <label>เลขอ้างอิง (เช่น SP No.)</label>
        <input class="input" id="pay-ref" placeholder="SP00126-xxxxxx">
      </div>

      <div class="mt-2">
        <div class="font-semi text-sm mb-2">เลือกบิลที่ต้องการตัด:</div>
        <div style="max-height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:8px">
          ${bills.length === 0 ? '<p class="text-sm text-muted" style="padding:12px">ไม่มีบิลค้าง (ข้อมูลอาจยังไม่มีใน AR Ledger)</p>' :
            bills.map(b => `
              <label class="flex items-center gap-3" style="padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer">
                <input type="checkbox" class="bill-check" data-bill="${b.bill_no}" data-amt="${b.outstanding}" ${b.paid?'disabled checked':''} style="accent-color:var(--primary)">
                <div class="flex-1">
                  <div class="text-sm font-semi">${b.bill_no||'-'}</div>
                  <div class="text-xs text-muted">${fmtDate(b.bill_date||b.date)} · กำหนด ${fmtDate(b.due_date)}</div>
                </div>
                <div class="text-right">
                  <div class="font-semi" style="color:${b.paid?'var(--text3)':'var(--danger)'}">฿${fmtNum(b.outstanding)}</div>
                  ${b.paid?'<div class="text-xs" style="color:var(--success)">ชำระแล้ว</div>':''}
                </div>
              </label>
            `).join('')
          }
        </div>
      </div>

      <div class="flex gap-2 mt-3">
        <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
        <button class="btn btn-primary btn-sm flex-1" id="confirm-pay">${ICONS.check} บันทึกการชำระ</button>
      </div>
    </div>
  `);

  document.getElementById('confirm-pay')?.addEventListener('click', async () => {
    const amount = Number(document.getElementById('pay-amount').value) || 0;
    const bills_to_clear = [...document.querySelectorAll('.bill-check:checked:not([disabled])')].map(c => c.dataset.bill);
    if (amount <= 0) { toast('กรอกยอดที่จ่าย', 'error'); return; }
    if (bills_to_clear.length === 0) { toast('เลือกบิลที่ต้องการตัด', 'error'); return; }

    const r = await api('recordPayment', {
      cust_id: custId,
      amount,
      bills_to_clear,
      payment_date: document.getElementById('pay-date').value,
      payment_method: document.getElementById('pay-method').value,
      reference: document.getElementById('pay-ref').value,
      action_by: currentUser?.display_name || 'Admin',
    });
    if (r.success) {
      toast(`ตัดชำระสำเร็จ — ${r.data.bills_cleared} บิล · ยอดคงเหลือ ฿${fmtNum(r.data.new_outstanding)} · สถานะ: ${r.data.new_status}`, 'success');
      closeModal();
      navigateTo('debt');
    } else {
      toast(r.error||'ไม่สำเร็จ', 'error');
    }
  });
}

// ── Sales ───────────────────────────────────────────────────
async function renderSales(el) {

  const entryKey = () => `${selectedDate}`;
  const entries = {};
  function getEntry() {
    const k = entryKey();
    if (!entries[k]) entries[k] = {};

        </div>

    // ── Bindings ──

          const outflow = (ent['drawer_'+s]||0) + (ent['transfer_'+s]||0) + (ent['card_'+s]||0) + (ent['cheque_'+s]||0) + (ent['refund_'+s]||0);

            sumCells[idx + 2].style.color = isOk ? 'var(--success)' : 'var(--danger)';

    // ── Button bindings ──

    document.getElementById('save-entry')?.addEventListener('click', () => {
      toast('บันทึกยอดเรียบร้อย — พร้อม Matching กับ Statement', 'success');

  render();

// ── Matching ────────────────────────────────────────────────
async function renderMatching(el) {
  let bankFilter = 'ALL', matchDate = todayISO();
  const bankColors = { KTB:'#00a4e4', KBANK:'#138f2d', BBL:'#1e3a7b' };

  async function render() {
    const res = await api('getStatements', { date: formatDateKey(matchDate), bank: bankFilter });
    let data = res.data?.data || [];

    // รวม uploaded statements (ถ้ามี)
    if (uploadedStatements.length > 0) {
      data = [...data, ...uploadedStatements.filter(s => bankFilter === 'ALL' || s.bank === bankFilter)];
    }

    const matched = data.filter(s=>s.match_status==='matched').length;
    const unmatched = data.length - matched;

    el.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div class="page-title">Statement Matching</div>
        <div class="flex gap-2 items-center">
          <input type="date" class="input" value="${matchDate}" style="width:155px" id="match-date">
          <button class="btn btn-outline btn-sm" id="btn-stmt-upload">${ICONS.file} วาง Statement</button>
          <button class="btn btn-primary btn-sm" id="btn-auto-match">${ICONS.pulse} Auto Match</button>
        </div>
      </div>
      <div class="flex justify-between items-center mb-3">
        <div class="flex gap-2">
          ${['ALL','KTB','KBANK','BBL'].map(b=>`<button class="pill ${bankFilter===b?'active':''}" data-bank="${b}" ${b!=='ALL'?`style="--pill-color:${bankColors[b]}"`:''}>${b}</button>`).join('')}
        </div>
        <button class="btn btn-ghost btn-sm">${ICONS.file} ดู Match Log</button>
      </div>
      <div class="flex gap-3 flex-wrap mb-3 stagger">
        ${statCard('Matched', matched, '', 'var(--success)', ICONS.check)}
        ${statCard('ยังไม่ Match', unmatched, '', 'var(--danger)', ICONS.alert)}
      </div>
      <div class="card-flat">
        <div class="table-wrap" style="max-height:420px;overflow-y:auto">
          <table>
            <thead><tr><th>ธนาคาร</th><th>วันที่</th><th>เวลา</th><th>Ref.</th><th style="text-align:right">จำนวนเงิน</th><th>รายละเอียด</th><th>Station</th><th>Bill</th><th>สถานะ</th></tr></thead>
            <tbody>
              ${data.length ? data.map(s=>`
                <tr class="${s.match_status!=='matched'?'row-danger':''}">
                  <td><span class="badge" style="background:${(bankColors[s.bank]||'#555')}22;color:${bankColors[s.bank]||'#aaa'}">${s.bank}</span></td>
                  <td>${fmtDate(s.date)}</td>
                  <td>${s.time}</td>
                  <td class="text-xs" style="font-family:var(--mono)">${s.ref_no}</td>
                  <td style="text-align:right;font-weight:600;color:var(--success)">฿${fmtNum(s.amount)}</td>
                  <td class="truncate" style="max-width:170px;color:var(--text)">${s.description}</td>
                  <td>${s.match_station?`<span class="badge badge-info">${s.match_station}</span>`:'-'}</td>
                  <td class="text-xs">${s.match_bill||'-'}</td>
                  <td>${s.match_status==='matched'
                    ? `<span class="badge badge-success">✓</span> <button class="btn btn-ghost btn-icon" title="Re-match">${ICONS.edit}</button>`
                    : `<span class="badge badge-danger">✗ ไม่พบ</span> <button class="btn btn-outline btn-sm">${ICONS.search} Match</button>`
                  }</td>
                </tr>
              `).join('') : '<tr><td colspan="9" style="text-align:center;padding:30px;color:var(--text3)">ไม่มีข้อมูล Statement ในวันที่เลือก</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>
    `;

    el.querySelectorAll('.pill[data-bank]').forEach(btn => {
      btn.addEventListener('click', () => { bankFilter = btn.dataset.bank; render(); });
    });
    document.getElementById('match-date')?.addEventListener('change', e => { matchDate = e.target.value; render(); });
    document.getElementById('btn-stmt-upload')?.addEventListener('click', () => {
      triggerFileUpload('file-stmt', (result, name) => { handleStmtUpload(result, name); render(); });
    });
    document.getElementById('btn-auto-match')?.addEventListener('click', async () => {
      toast('กำลัง Auto Match...', 'info');

      // ── ลอง Backend ก่อน ──
      const res = await api('autoMatch', { date: formatDateKey(matchDate), action_by: currentUser?.display_name || 'Admin' });

      if (res.success && res.data && res.data.matched > 0) {
        toast(`Auto Match (Server) สำเร็จ — จับคู่ได้ ${res.data.matched} รายการ`, 'success');
        render();
        return;
      }

      // ── Fallback: Client-side match จากข้อมูลที่โหลดมาแล้ว (จับคู่โดย วันที่ + ยอด) ──
      // รวมทั้ง billList (Main) และ uploadedSales
      const allSales = [...(billList||[]), ...(uploadedSales||[])];
      if (data.length > 0 && allSales.length > 0) {
        let clientMatched = 0;
        const transferSales = allSales.filter(s => {
          const type = (s.type || s.pay_method || s.Type || '').toLowerCase();
          return type === 'transfer';
        });

        data.forEach(stmt => {
          if (stmt.match_status === 'matched') return;
          const stmtAmt = Number(stmt.amount || 0);
          const stmtDate = toISODate(stmt.date || stmt.trans_date);
          if (!stmtAmt || stmtAmt <= 0) return;

          const match = transferSales.find(sale => {
            if (sale._clientMatched) return false;
            const saleAmt = Number(sale.amount || sale.Baht || 0);
            const saleDate = toISODate(sale.date || sale.source_date);
            // ต้อง: ยอดตรง + วันที่ตรง (หรือต่างกันไม่เกิน 1 วัน)
            if (Math.abs(saleAmt - stmtAmt) > 0.01) return false;
            if (saleDate && stmtDate) {
              const diffMs = Math.abs(new Date(saleDate) - new Date(stmtDate));
              const diffDays = diffMs / (1000 * 60 * 60 * 24);
              if (diffDays > 1) return false;
            }
            return true;
          });

          if (match) {
            match._clientMatched = true;
            stmt.match_status = 'matched';
            stmt.match_station = match.station || match.Station || '';
            stmt.match_bill = match.bill_no || match['Bill Number'] || '';
            clientMatched++;
          }
        });

        if (clientMatched > 0) {
          toast(`Auto Match (Client) — จับคู่ได้ ${clientMatched} รายการ (ตรงทั้งวันที่ + ยอด)`, 'success');
          render();
          return;
        }
      }

      // ── ไม่เจอเลย ──
      const errMsg = res.error || 'ไม่พบรายการที่จับคู่ได้';
      toast(errMsg, 'error');

      // แนะนำสิ่งที่ต้องทำ
      openModal('Auto Match ไม่พบคู่', `
        <div class="flex-col gap-3">
          <p class="text-sm">ตรวจสอบว่า:</p>
          <div style="padding:12px;background:var(--surface2);border-radius:8px" class="text-sm">
            <p>1. <strong>นำเข้าข้อมูลยอดขาย</strong> ก่อน (หน้ายอดขาย → "นำเข้า Excel")</p>
            <p class="mt-2">2. <strong>วาง Statement</strong> ของธนาคาร (หน้า Matching → "วาง Statement")</p>
            <p class="mt-2">3. ยอดขายที่ Type = <strong>Transfer</strong> จะถูกจับคู่กับ Statement ที่ยอดตรงกัน</p>
          </div>
          ${res.error ? '<p class="text-xs text-dim mt-2">Server: '+res.error+'</p>' : ''}
        </div>
      `);
    });
  }
  render();
}
