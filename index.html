<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Smart Finance — Debug Connection</title>
<style>
body{font-family:'Sarabun',sans-serif;background:#0c0e14;color:#dfe2ec;padding:30px;max-width:800px;margin:0 auto}
h1{color:#5b7cfa}
.card{background:#141721;border:1px solid #282d40;border-radius:12px;padding:20px;margin:16px 0}
.log{background:#0a0c12;border:1px solid #282d40;border-radius:8px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:12px;white-space:pre-wrap;max-height:300px;overflow-y:auto;margin:8px 0}
.ok{color:#2dd4a0} .fail{color:#ef5757} .warn{color:#f5a623} .info{color:#5b7cfa}
button{background:#5b7cfa;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;margin:4px}
button:hover{filter:brightness(1.2)}
button.sec{background:#282d40;color:#dfe2ec}
input{background:#1b1f2e;border:1px solid #282d40;border-radius:8px;padding:8px 12px;color:#dfe2ec;font-size:14px;width:100%}
.step{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #282d40}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.dot.ok{background:#2dd4a0} .dot.fail{background:#ef5757} .dot.wait{background:#f5a623}
</style>
</head>
<body>

<h1>🔧 Smart Finance — Debug Connection</h1>

<div class="card">
  <h3>API URL</h3>
  <input id="api-url" value="https://script.google.com/macros/s/AKfycbxKFt7Dcq1PPyYEy_zEwTuuNS2MkHywy7s3Wz3KTuSrIqBE9k5GUP3b8IOT8oGXkMWR/exec">
  <div style="margin-top:12px">
    <button onclick="runAllTests()">🚀 Run All Tests</button>
    <button class="sec" onclick="clearLog()">Clear Log</button>
  </div>
</div>

<div class="card">
  <h3>ผลทดสอบ</h3>
  <div id="steps"></div>
</div>

<div class="card">
  <h3>Log Detail</h3>
  <div id="log" class="log">รอทดสอบ...\n</div>
</div>

<script>
const logEl = document.getElementById('log');
const stepsEl = document.getElementById('steps');

function log(msg, cls = '') {
  logEl.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

function clearLog() {
  logEl.innerHTML = '';
  stepsEl.innerHTML = '';
}

function addStep(name, status, detail) {
  const colors = { ok:'ok', fail:'fail', wait:'wait' };
  stepsEl.innerHTML += `<div class="step">
    <div class="dot ${colors[status]||'wait'}"></div>
    <div><strong>${name}</strong><br><span style="font-size:12px;color:#8a90a8">${detail}</span></div>
  </div>`;
}

async function runAllTests() {
  clearLog();
  const url = document.getElementById('api-url').value.trim();
  
  if (!url) {
    log('ERROR: ใส่ API URL ก่อน', 'fail');
    return;
  }
  
  log('=== START DEBUG ===', 'info');
  log('API URL: ' + url, 'info');
  log('Origin: ' + window.location.origin, 'info');
  log('');

  // ═══ TEST 1: Simple GET ping ═══
  log('--- TEST 1: GET ping (action=getConfig) ---', 'info');
  try {
    const t1url = url + '?action=getConfig';
    log('  Fetching: ' + t1url);
    const t1 = await fetch(t1url, { redirect: 'follow' });
    log('  Status: ' + t1.status + ' ' + t1.statusText);
    log('  Type: ' + t1.type);
    log('  URL after redirect: ' + t1.url);
    const t1text = await t1.text();
    log('  Response length: ' + t1text.length);
    log('  Response (first 500): ' + t1text.substring(0, 500));
    
    try {
      const t1json = JSON.parse(t1text);
      log('  JSON parse: OK', 'ok');
      log('  success: ' + t1json.success, t1json.success ? 'ok' : 'fail');
      addStep('TEST 1: GET ping', t1json.success ? 'ok' : 'fail', 'getConfig → ' + (t1json.success ? 'สำเร็จ' : t1json.error));
    } catch (e) {
      log('  JSON parse FAILED: ' + e.message, 'fail');
      log('  Response is NOT JSON — อาจเป็น HTML error page', 'fail');
      addStep('TEST 1: GET ping', 'fail', 'Response ไม่ใช่ JSON');
    }
  } catch (e) {
    log('  FETCH ERROR: ' + e.message, 'fail');
    addStep('TEST 1: GET ping', 'fail', e.message);
  }
  
  log('');

  // ═══ TEST 2: GET login ═══
  log('--- TEST 2: GET login ---', 'info');
  try {
    const t2url = url + '?action=login&username=009&password=bxkssnrz';
    log('  Fetching: ' + t2url);
    const t2 = await fetch(t2url, { redirect: 'follow' });
    log('  Status: ' + t2.status);
    const t2text = await t2.text();
    log('  Response length: ' + t2text.length);
    log('  Response (first 500): ' + t2text.substring(0, 500));
    
    try {
      const t2json = JSON.parse(t2text);
      log('  JSON parse: OK', 'ok');
      log('  success: ' + t2json.success, t2json.success ? 'ok' : 'fail');
      if (t2json.success) {
        log('  LOGIN SUCCESS!', 'ok');
        log('  User: ' + JSON.stringify(t2json.data), 'ok');
        addStep('TEST 2: GET login', 'ok', 'Login สำเร็จ! user=' + t2json.data.display_name);
      } else {
        log('  LOGIN FAILED: ' + t2json.error, 'fail');
        addStep('TEST 2: GET login', 'fail', t2json.error);
      }
    } catch (e) {
      log('  JSON parse FAILED: ' + e.message, 'fail');
      addStep('TEST 2: GET login', 'fail', 'Response ไม่ใช่ JSON');
    }
  } catch (e) {
    log('  FETCH ERROR: ' + e.message, 'fail');
    addStep('TEST 2: GET login', 'fail', e.message);
  }
  
  log('');

  // ═══ TEST 3: POST (text/plain) ═══
  log('--- TEST 3: POST (text/plain) ---', 'info');
  try {
    const body = JSON.stringify({ action: 'login', username: '009', password: 'bxkssnrz' });
    log('  Body: ' + body);
    const t3 = await fetch(url, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: body,
    });
    log('  Status: ' + t3.status);
    const t3text = await t3.text();
    log('  Response length: ' + t3text.length);
    log('  Response (first 500): ' + t3text.substring(0, 500));
    
    try {
      const t3json = JSON.parse(t3text);
      log('  success: ' + t3json.success, t3json.success ? 'ok' : 'fail');
      addStep('TEST 3: POST login', t3json.success ? 'ok' : 'fail', t3json.success ? 'สำเร็จ' : (t3json.error || 'ไม่ทราบ'));
    } catch (e) {
      log('  JSON parse FAILED', 'fail');
      addStep('TEST 3: POST login', 'fail', 'Response ไม่ใช่ JSON');
    }
  } catch (e) {
    log('  FETCH ERROR: ' + e.message, 'fail');
    addStep('TEST 3: POST login', 'fail', e.message);
  }
  
  log('');

  // ═══ TEST 4: GET with no-cors mode ═══
  log('--- TEST 4: GET (mode=cors explicit) ---', 'info');
  try {
    const t4url = url + '?action=login&username=009&password=bxkssnrz';
    const t4 = await fetch(t4url, { method: 'GET', redirect: 'follow', mode: 'cors' });
    log('  Status: ' + t4.status);
    const t4text = await t4.text();
    log('  Response (first 300): ' + t4text.substring(0, 300));
    try {
      const t4json = JSON.parse(t4text);
      addStep('TEST 4: GET cors', t4json.success ? 'ok' : 'fail', t4json.success ? 'สำเร็จ' : (t4json.error || ''));
    } catch {
      addStep('TEST 4: GET cors', 'fail', 'Response ไม่ใช่ JSON');
    }
  } catch (e) {
    log('  ERROR: ' + e.message, 'fail');
    addStep('TEST 4: GET cors', 'fail', e.message);
  }

  log('');

  // ═══ TEST 5: JSONP approach ═══
  log('--- TEST 5: JSONP (script tag) ---', 'info');
  try {
    const result = await new Promise((resolve, reject) => {
      const cbName = 'jsonpCb_' + Date.now();
      window[cbName] = function(data) {
        resolve(data);
        delete window[cbName];
        script.remove();
      };
      const script = document.createElement('script');
      script.src = url + '?action=login&username=009&password=bxkssnrz&callback=' + cbName;
      script.onerror = () => reject(new Error('Script load failed'));
      setTimeout(() => reject(new Error('Timeout 10s')), 10000);
      document.body.appendChild(script);
    });
    log('  JSONP Result: ' + JSON.stringify(result).substring(0, 300), 'ok');
    addStep('TEST 5: JSONP', 'ok', 'ได้ response');
  } catch (e) {
    log('  JSONP ERROR: ' + e.message, 'warn');
    addStep('TEST 5: JSONP', 'fail', e.message);
  }

  log('');

  // ═══ TEST 6: Direct browser test ═══
  log('--- TEST 6: เปิด URL ตรงใน tab ใหม่ ---', 'info');
  const directUrl = url + '?action=login&username=009&password=bxkssnrz';
  log('  กด link ด้านล่างเพื่อทดสอบ:', 'warn');
  
  stepsEl.innerHTML += `<div class="step">
    <div class="dot wait"></div>
    <div>
      <strong>TEST 6: เปิดใน Browser ตรง</strong><br>
      <a href="${directUrl}" target="_blank" style="color:#5b7cfa;font-size:12px;word-break:break-all">${directUrl}</a>
      <br><span style="font-size:12px;color:#8a90a8">กดแล้วดูว่าได้ JSON กลับมาไหม</span>
    </div>
  </div>`;
  
  log('');
  log('=== END DEBUG ===', 'info');
  log('', '');
  log('ส่ง Log ทั้งหมดนี้ให้ดูครับ', 'warn');
}
</script>
</body>
</html>
