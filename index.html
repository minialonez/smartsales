    // ══════════════════════════════════════════════════════════
    // Auto Match — ช่วงวันที่ที่ระบุ
    // ══════════════════════════════════════════════════════════
    async function runAutoMatchRange(dateFrom, dateTo) {
      toast(`กำลัง Auto Match: ${fmtDate(dateFrom)} → ${fmtDate(dateTo)}...`, 'info');

      // ── ยอดที่ใช้ match ตามกฎง่ายๆ: ──
      //   ถ้ามียอดสุทธิ (fee ใดๆ > 0) → match สุทธิ = amount − fees
      //   ถ้าไม่มี → match baht = amount
      function billMatchAmount(b) {
        const amt = Math.abs(Number(b.amount) || 0);
        const wht = Number(b.wht_amount) || 0;
        const tf = Number(b.transfer_fee) || 0;
        const cf = Number(b.card_fee) || 0;
        const totalFees = wht + tf + cf;
        return totalFees > 0 ? (amt - totalFees) : amt;
      }
      // Alias เดิมสำหรับ backward-compat (กรณีที่มีโค้ดอื่นเรียก)
      function netAmount(b) { return billMatchAmount(b); }
      
      // ── Key สำหรับ index match — 2 ทศนิยม เพื่อเจอตรงเป๊ะ ──
      const k2 = (n) => Math.round(Math.abs(n) * 100);
      
      // ── กฎ match ใหม่ (ง่ายกว่าเดิม): ── 
      //   Match เฉพาะ Type = Transfer, Card, Cheque (ไม่สนใจ prefix)
      //   เงินเข้า (stmt > 0) → บิลทิศทางรับ (Front* station + prefix SS/OS/SP)
      //   เงินออก (stmt < 0) → บิลทิศทางจ่าย (prefix PP/PS + supplier cashflow)
      //   Type=Cash, Refund, Unknown → ไม่ match
      const MATCHABLE_TYPES = ['Transfer', 'Card', 'Cheque'];
      
      function canMatch(b) {
        if (!MATCHABLE_TYPES.includes(b.type || '')) return false;
        if (b.match_status === 'matched' || b.match_status === 'paid' || b.match_status === 'void') return false;
        return true;
      }
      
      function isIncomeBill(b) {
        if (!canMatch(b)) return false;
        // เงินเข้า:
        //   ลูกหนี้: SS, OS, SP, S2 (ขายสด + ตัดชำระ + Front POS อนาคต)
        //   เจ้าหนี้: BS, PC (supplier คืนเงินสด)
        //   Front station: รับเงินสด/โอน (บิลว่างหรือมี prefix)
        //   ไม่รวม: SR/OR (เชื่อ รอ SP), SC/JS/JR (ใบลดหนี้ = เงินออก)
        const prefix = String(b.bill_no || '').substring(0, 2).toUpperCase();
        const isFrontStation = String(b.station || '').startsWith('Front');
        const isIncomePrefix = ['SS','OS','SP','S2','BS','PC'].includes(prefix);
        return isFrontStation || isIncomePrefix;
      }
      
      function isExpenseBill(b) {
        if (!canMatch(b)) return false;
        // เงินออก:
        //   เจ้าหนี้ (จ่าย supplier): PP, PS, MS, PX
        //   ลูกหนี้ (คืนเงินลูกค้า): SC, JS, JR
        //   ไม่รวม: PR/MR (เชื่อ รอ PP), BR (เชื่อ รอ PP)
        const prefix = String(b.bill_no || '').substring(0, 2).toUpperCase();
        return ['PP','PS','MS','PX','SC','JS','JR'].includes(prefix);
      }
      
      // ══════════════════════════════════════════════════════════
      // SINGLE UNIFIED PASS — กฎ match ง่ายที่สุด
      //   1. บิล Type ∈ [Transfer, Card, Cheque] + ยังไม่ match
      //   2. วันที่ตรงกัน
      //   3. ยอดตรงกัน 2 ทศนิยม (ใช้ billMatchAmount: baht หรือ สุทธิ)
      //   4. ทิศทาง:
      //      - บิลที่ชัดเจน (Front station + prefix income/expense) → ต้องตรงทิศ
      //      - บิล MANUAL/ไม่ชัดเจน → allow ทั้ง 2 ทิศ
      // ══════════════════════════════════════════════════════════
      
      function billDirection(b) {
        const prefix = String(b.bill_no || '').substring(0, 2).toUpperCase();
        const isFront = String(b.station || '').startsWith('Front');
        const incomePrefixes = ['SS','OS','SP','S2','BS','PC'];
        const expensePrefixes = ['PP','PS','MS','PX','SC','JS','JR'];
        if (isFront || incomePrefixes.includes(prefix)) return 'income';
        if (expensePrefixes.includes(prefix)) return 'expense';
        return 'unknown';  // MANUAL, no prefix, Invoice/Order/Payment station ไม่มี prefix ชัด
      }
      function isCompatible(bill, stmt) {
        const stmtAmount = Number(stmt.amount || 0);
        const stmtBank = String(stmt.bank || '').toUpperCase().replace(/\s+/g, ' ').trim();
        const station = String(bill.station || '');
        
        // ── Bank ↔ Station pairing rules ──
        // BBL NW ไม่ match กับบิล Front* (คนละบัญชี/คนละเครื่องรับเงิน)
        if (stmtBank === 'BBL NW' && station.startsWith('Front')) return false;
        
        // ── Direction check ──
        const dir = billDirection(bill);
        if (dir === 'unknown') return true;
        return (dir === 'income' && stmtAmount > 0) || (dir === 'expense' && stmtAmount < 0);
      }
      
      const idx = {};
      const used = new Set();
      let billsInRange = 0, expBillsInRange = 0;
      
      for (let bi = 0; bi < billList.length; bi++) {
        const b = billList[bi];
        if (!canMatch(b)) continue;
        
        const d = toISODate(b.date);
        if (!d || d < dateFrom || d > dateTo) continue;
        
        const mAmt = billMatchAmount(b);
        if (!mAmt) continue;
        
        const k = d + '|' + k2(mAmt);
        if (!idx[k]) idx[k] = [];
        idx[k].push({ bi });
        
        const dir = billDirection(b);
        if (dir === 'expense') expBillsInRange++;
        else billsInRange++; // income + unknown
      }
      
      let matched = 0, matchedExp = 0;
      let skippedNeg = 0, skippedRange = 0, noMatch = 0, stmtsInRange = 0;
      
      uploadedStatements.forEach(stmt => {
        if (stmt.match_status === 'matched') return;
        
        const sd = toISODate(stmt.date || stmt.trans_date);
        if (!sd) return;
        if (sd < dateFrom || sd > dateTo) { skippedRange++; return; }
        
        stmtsInRange++;
        
        const sa = Number(stmt.amount || 0);
        if (!sa) return;
        
        const k = sd + '|' + k2(sa);
        const candidates = idx[k] || [];
        
        let foundIdx = -1;
        for (let c = 0; c < candidates.length; c++) {
          const bi = candidates[c].bi;
          if (used.has(bi)) continue;
          const bill = billList[bi];
          if (!isCompatible(bill, stmt)) continue;
          foundIdx = bi;
          break;
        }
        
        if (foundIdx >= 0) {
          used.add(foundIdx);
          const bill = billList[foundIdx];
          
          bill.match_status = 'matched';
          bill.confirmation = stmt.bank || '';
          bill.pay_date = bill.date;
          bill.matched_stmt_ref = stmt.ref_no || '';
          bill.matched_at = new Date().toISOString();
          
          stmt.match_status = 'matched';
          stmt.match_station = bill.station || '';
          stmt.match_bill = bill.bill_no || `${bill.station}|${bill.type}|฿${bill.amount}`;
          stmt.matched_at = new Date().toISOString();
          stmt.match_method = sa > 0 ? 'auto_sameday' : 'auto_expense';
          
          if (sa > 0) matched++;
          else matchedExp++;
        } else {
          if (sa > 0) noMatch++;
          else skippedNeg++;
        }
      });

      // Save to IndexedDB
      const req = indexedDB.open('SmartFinanceDB', 1);
      req.onsuccess = (e) => {
        const tx = e.target.result.transaction('data', 'readwrite');
        const store = tx.objectStore('data');
        store.put(JSON.stringify(billList), 'sf_billList');
        store.put(JSON.stringify(statementsByBank), 'sf_statementsByBank');
        tx.oncomplete = () => {
          let msg = `✅ Auto Match ${fmtDate(dateFrom)} → ${fmtDate(dateTo)}\n\n`;
          msg += `💰 เงินเข้า match: ${matched}\n`;
          msg += `💸 เงินออก match: ${matchedExp}\n`;
          const totalNoMatch = noMatch + skippedNeg;
          msg += `✗ ไม่เจอคู่: ${totalNoMatch}\n\n`;
          msg += `(Stmt ในช่วง: ${stmtsInRange} · Bills: ${billsInRange} รับ + ${expBillsInRange} จ่าย)`;
          
          // ── Diagnostic: ถ้ามี stmt ไม่ match → แสดง 3 ตัวอย่าง + เหตุผล ──
          if (totalNoMatch > 0) {
            const unmatchedStmts = uploadedStatements.filter(s => {
              if (s.match_status === 'matched') return false;
              const sd = toISODate(s.date || s.trans_date);
              return sd && sd >= dateFrom && sd <= dateTo && Number(s.amount);
            });
            
            if (unmatchedStmts.length > 0) {
              msg += `\n\n━━ ตัวอย่าง Stmt ที่ match ไม่เจอ ━━`;
              const samples = unmatchedStmts.slice(0, 3);
              samples.forEach(stmt => {
                const sd = toISODate(stmt.date || stmt.trans_date);
                const sa = Number(stmt.amount || 0);
                msg += `\n\n📌 ${fmtDate(sd)} · ${sa > 0 ? '+' : ''}${fmtNum(sa)} (${stmt.bank||'?'})`;
                
                // หาเหตุผลที่ไม่ match
                // 1. หา bill วันเดียวกัน + ยอดเดียวกัน (ผ่าน filter หรือไม่)
                const sameAmtSameDate = billList.filter(b => {
                  const bd = toISODate(b.date);
                  return bd === sd && k2(billMatchAmount(b)) === k2(sa);
                });
                
                if (sameAmtSameDate.length > 0) {
                  msg += `\n  เจอบิล ${sameAmtSameDate.length} รายการวันเดียวยอดเดียวกัน แต่:`;
                  sameAmtSameDate.slice(0, 2).forEach(b => {
                    const reasons = [];
                    if (!MATCHABLE_TYPES.includes(b.type || '')) reasons.push(`Type="${b.type}" ไม่อยู่ใน [Transfer/Card/Cheque]`);
                    if (b.match_status === 'matched') reasons.push('match แล้ว');
                    if (b.match_status === 'paid') reasons.push('paid');
                    if (b.match_status === 'void') reasons.push('void');
                    // Bank ↔ station pairing
                    const stmtBankUp = String(stmt.bank||'').toUpperCase().replace(/\s+/g,' ').trim();
                    if (stmtBankUp === 'BBL NW' && String(b.station||'').startsWith('Front')) {
                      reasons.push(`BBL NW ไม่ match กับ Front* (กฎ bank pairing)`);
                    } else if (!isCompatible(b, stmt)) {
                      reasons.push(`ทิศทางไม่ตรง (บิล=${billDirection(b)}, stmt=${sa>0?'เข้า':'ออก'})`);
                    }
                    msg += `\n    • ${b.bill_no||'(no#)'} ${b.station||'?'}/${b.type||'?'}: ${reasons.join(', ') || 'บิลน่าจะ match ได้'}`;
                  });
                } else {
                  // ลองหายอดเดียวกันแต่วันต่าง (ใกล้เคียง)
                  const sameAmtOtherDate = billList.filter(b => k2(billMatchAmount(b)) === k2(sa)).slice(0, 2);
                  if (sameAmtOtherDate.length > 0) {
                    msg += `\n  ไม่เจอบิลวันเดียวกัน · พบยอดเดียวกันวันอื่น:`;
                    sameAmtOtherDate.forEach(b => {
                      msg += `\n    • ${b.bill_no||'(no#)'} วันที่ ${fmtDate(b.date)}`;
                    });
                  } else {
                    msg += `\n  ไม่เจอบิลที่ยอดตรงเลย (ทั้งวันเดียวกันและวันอื่น)`;
                  }
                }
              });
              
              if (unmatchedStmts.length > 3) {
                msg += `\n\n(…อีก ${unmatchedStmts.length - 3} รายการ — ดูในหน้า Statement Matching)`;
              }
            }
          }
          
          alert(msg);
          uploadedStatements = getAllStatements();
          render();
        };
      };
    }
  }
  render();
}

        <div class="font-semi mb-3" style="color:var(--danger)">⚠️ Danger Zone — ล้างข้อมูล</div>
        <p class="text-xs text-muted mb-3">การล้างข้อมูลเหล่านี้ <strong>ไม่สามารถกู้คืนได้</strong> — ต้อง Backup ก่อนล้าง</p>
        <div class="flex gap-2 flex-wrap">

          <button class="btn btn-outline btn-sm" id="btn-clear-sp" style="color:var(--danger);border-color:var(--danger)">ล้าง SP Payments</button>
          <button class="btn btn-outline btn-sm" id="btn-clear-cashflow" style="color:var(--danger);border-color:var(--danger)">ล้าง Cashflow</button>

    document.getElementById('btn-sync-cloud')?.addEventListener('click', async () => {
      const yearsCount = Number(document.getElementById('sync-years').value) || 2;
      const now = new Date();
      const years = [];
      for (let i = 0; i < yearsCount; i++) years.push(String(now.getFullYear() - i));
      
      const btn = document.getElementById('btn-sync-cloud');
      const statusEl = document.getElementById('sync-status');
      btn.disabled = true;
      btn.textContent = '⏳ กำลังดึง...';
      statusEl.style.display = 'block';
      statusEl.style.color = 'var(--info)';
      statusEl.textContent = `กำลังดึงข้อมูล ${yearsCount} ปี (${years.join(', ')})...`;
      
      const stats = { bills: 0, stmts: 0, payments: 0, cashflow: 0, suppliers: 0, meta: 0, errors: [] };
      
      try {
        // 1) Bills (per year)
        const mergedBills = [];
        const seenBillKeys = new Set(billList.map(b => `${b.bill_no||''}|${b.date||''}|${b.amount||0}|${b.station||''}`));
        for (const y of years) {
          try {
            statusEl.textContent = `กำลังดึง Bills ปี ${y}...`;
            const r = await api('getDailySales', { year: y });
            const items = (r?.data?.data) || r?.data || [];
            items.forEach(b => {
              const key = `${b.bill_no||''}|${b.date||''}|${b.amount||0}|${b.station||''}`;
              if (!seenBillKeys.has(key)) {
                mergedBills.push(b);
                seenBillKeys.add(key);
                stats.bills++;
              }
            });
          } catch(err) { stats.errors.push(`Bills ${y}: ${err.message}`); }
        }
        if (mergedBills.length) billList = billList.concat(mergedBills);
        
        // 2) Statements (per year)
        for (const y of years) {
          try {
            statusEl.textContent = `กำลังดึง Statements ปี ${y}...`;
            const r = await api('getStatements', { year: y });
            const items = (r?.data?.data) || r?.data || [];
            const seenStmtKeys = new Set();
            Object.values(statementsByBank).forEach(arr => {
              (arr||[]).forEach(s => seenStmtKeys.add(`${s.bank}|${s.date}|${s.time}|${s.amount}|${s.ref_no||''}`));
            });
            items.forEach(s => {
              const key = `${s.bank}|${s.date}|${s.time}|${s.amount}|${s.ref_no||''}`;
              if (!seenStmtKeys.has(key)) {
                if (!statementsByBank[s.bank]) statementsByBank[s.bank] = [];
                statementsByBank[s.bank].push(s);
                seenStmtKeys.add(key);
                stats.stmts++;
              }
            });
          } catch(err) { stats.errors.push(`Stmts ${y}: ${err.message}`); }
        }
        uploadedStatements = getAllStatements();
        
        // 3) Payments (SP) — ไม่มี year param ดึงทั้งหมด
        try {
          statusEl.textContent = 'กำลังดึง SP Payments...';
          const r = await api('getPayments');
          const items = (r?.data?.data) || r?.data || [];
          const seenSp = new Set(paymentList.map(p => p.sp_no || p.id));
          items.forEach(p => {
            const key = p.sp_no || p.id;
            if (key && !seenSp.has(key)) {
              paymentList.push(p);
              seenSp.add(key);
              stats.payments++;
            }
          });
        } catch(err) { stats.errors.push(`SP: ${err.message}`); }
        
        // 4) Cashflow
        try {
          statusEl.textContent = 'กำลังดึง Cashflow...';
          const r = await api('getCashflow');
          const items = (r?.data?.data) || r?.data || [];
          const seenCf = new Set(cashflowList.map(c => c.id));
          items.forEach(c => {
            if (c.id && !seenCf.has(c.id)) {
              cashflowList.push(c);
              seenCf.add(c.id);
              stats.cashflow++;
            }
          });
        } catch(err) { stats.errors.push(`Cashflow: ${err.message}`); }
        
        // 5) Suppliers
        try {
          statusEl.textContent = 'กำลังดึง Suppliers...';
          const r = await api('getSuppliers');
          const items = (r?.data?.data) || r?.data || [];
          const seenSup = new Set(supplierList.map(s => s.supplier_id || s.id || s.name));
          items.forEach(s => {
            const key = s.supplier_id || s.id || s.name;
            if (key && !seenSup.has(key)) {
              supplierList.push(s);
              seenSup.add(key);
              stats.suppliers++;
            }
          });
        } catch(err) { stats.errors.push(`Suppliers: ${err.message}`); }
        
        // 6) Meta (summary + cashCount) — loadMetaFromBackend existing
        try {
          statusEl.textContent = 'กำลังดึง Daily Summary...';
          for (const y of years) {
            const r = await api('getDailyMeta', { year: y });
            if (r?.data?.summary?.__byDate) {
              if (!mainSummary.__byDate) mainSummary.__byDate = {};
              Object.entries(r.data.summary.__byDate).forEach(([d, v]) => {
                if (!mainSummary.__byDate[d]) { mainSummary.__byDate[d] = v; stats.meta++; }
              });
            }
            if (r?.data?.cash_count?.__byDate) {
              if (!cashCount.__byDate) cashCount.__byDate = {};
              Object.entries(r.data.cash_count.__byDate).forEach(([d, v]) => {
                if (!cashCount.__byDate[d]) cashCount.__byDate[d] = v;
              });
            }
          }
        } catch(err) { stats.errors.push(`Meta: ${err.message}`); }
        
        // Persist + refresh
        persistMainState();
        invalidateBillsCache();
        
        const errMsg = stats.errors.length ? `\n\n⚠️ ข้อผิดพลาด:\n${stats.errors.slice(0,3).join('\n')}` : '';
        const summary = 
          `✅ Sync สำเร็จ\n\n` +
          `  • Bills: +${stats.bills}\n` +
          `  • Statements: +${stats.stmts}\n` +
          `  • SP Payments: +${stats.payments}\n` +
          `  • Cashflow: +${stats.cashflow}\n` +
          `  • Suppliers: +${stats.suppliers}\n` +
          `  • Summary/Meta: +${stats.meta} วัน` + errMsg;
        alert(summary);
        
        statusEl.style.color = stats.errors.length ? 'var(--warn)' : 'var(--success)';
        statusEl.textContent = `✓ เสร็จ — Bills +${stats.bills}, Stmts +${stats.stmts}, SP +${stats.payments}, CF +${stats.cashflow}, Suppliers +${stats.suppliers}`;
        
        render(); // refresh counters
      } catch(err) {
        statusEl.style.color = 'var(--danger)';
        statusEl.textContent = `✗ Sync ล้มเหลว: ${err.message}`;
        toast('Sync ล้มเหลว: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '☁️ ดึงข้อมูล';
      }
    });
    
    // ── Backup JSON ──
    // ── Clear Daily ทั้งหมด ──

      const msg = `🗑 ล้าง Daily ทั้งหมด?\n\n` +

                  `  • Cash count (นับธนบัตร)\n\n` +

                  `  ✅ Statement\n` +
                  `  ✅ Cashflow\n` +

      billList = [];
      mainSummary = {};
      cashCount = {};
      
      try {
        const db = await new Promise((res, rej) => {

          r.onerror = () => rej(r.error);
        });

        tx.objectStore('data').put(JSON.stringify(billList), 'sf_billList');
        tx.objectStore('data').put(JSON.stringify(mainSummary), 'sf_mainSummary');
        tx.objectStore('data').put(JSON.stringify(cashCount), 'sf_cashCount');

          toast('🗑 ล้าง Daily ทั้งหมดเรียบร้อย', 'success');

      } catch(e) { console.error(e); toast('เกิดข้อผิดพลาด: ' + e.message, 'error'); }
    });
    
    // ── Import Daily xlsm (หลายไฟล์) ──
    document.getElementById('file-import-daily')?.addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      if (files.length === 0) return;
      
      if (!confirm(`📥 Import ${files.length} ไฟล์ xlsm?\n\nแต่ละไฟล์จะอ่าน:\n  • วันที่จาก B2\n  • Summary (rows 3-11)\n  • Bill List (rows 15+) — ข้าม Confirmation + Pay Date\n  • Cash count (M2:O11)\n\n*ไม่ลบข้อมูลเดิม → ถ้ามีวันซ้ำจะเขียนทับ`)) {
        e.target.value = '';
        return;
      }
      
      toast(`กำลัง parse ${files.length} ไฟล์...`, 'info');
      
      let totalBills = 0, totalDays = 0, failed = 0;
      const errors = [];
      const dateReport = []; // เก็บรายงานวันที่ต่อไฟล์
      
      for (const file of files) {
        try {
          const result = await importDailyXlsm(file);
          totalBills += result.billsImported;
          totalDays++;
          dateReport.push({ file: file.name, iso: result.dateISO, bills: result.billsImported });
        } catch(err) {
          failed++;
          errors.push(`${file.name}: ${err.message}`);
          console.error(`Import failed for ${file.name}:`, err);
        }
      }
      
      // Save
      try {
        const db = await new Promise((res, rej) => {
          const r = indexedDB.open('SmartFinanceDB', 1);
          r.onsuccess = () => res(r.result);
          r.onerror = () => rej(r.error);
        });
        const tx = db.transaction('data', 'readwrite');
        tx.objectStore('data').put(JSON.stringify(billList), 'sf_billList');
        tx.objectStore('data').put(JSON.stringify(mainSummary), 'sf_mainSummary');
        tx.objectStore('data').put(JSON.stringify(cashCount), 'sf_cashCount');
      } catch(err) { console.error(err); }
      
      e.target.value = '';
      
      // แสดงรายงาน — ทุกไฟล์กับวันที่จริงที่ parse ได้ (ให้ user ตรวจ)
      let resultMsg = `✅ Import สำเร็จ ${totalDays}/${files.length} วัน\n` +
                      `📋 บิลรวม ${totalBills} รายการ\n\n` +
                      `📅 วันที่ที่ parse ได้:\n` +
                      dateReport.slice(0, 10).map(x => 
                        `  ${x.file.replace('.xlsm','')} → ${x.iso} (${x.bills} บิล)`
                      ).join('\n');
      if (dateReport.length > 10) resultMsg += `\n  ... และอีก ${dateReport.length - 10} ไฟล์`;
      if (failed > 0) {
        resultMsg += `\n\n❌ Error ${failed} ไฟล์:\n` + errors.slice(0, 5).join('\n');
      }
      alert(resultMsg);
      render();
    });

    // ── Export helpers ──
    function downloadCSV(rows, filename) {
      if (!rows || rows.length === 0) { toast('ไม่มีข้อมูลให้ export', 'info'); return; }
      const headers = Object.keys(rows[0]);
      const csvRows = [headers.join(',')].concat(
        rows.map(r => headers.map(h => {
          const val = r[h] == null ? '' : String(r[h]);
          return val.includes(',') || val.includes('"') || val.includes('\n') ? `"${val.replace(/"/g,'""')}"` : val;
        }).join(','))
      );
      // Add BOM for Excel Thai
      const blob = new Blob(['\uFEFF' + csvRows.join('\n')], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

        const d = toISODate(item[dateField]);
        if (!d) return true;
        if (from && d < from) return false;
        if (to && d > to) return false;
        return true;
      });
    }

// ── Alerts ──────────────────────────────────────────────────
async function renderAlerts(el) {
  const res = await api('getAlerts');
  const backendAlerts = res.data || [];
  const today = todayISO();
  
  // ── รวบรวม alerts จากทั้งระบบ ──
  const alerts = [];
  
  // 1. Backend alerts (จาก ar_ledger)
  backendAlerts.forEach(a => {
    alerts.push({
      category: 'debt',
      priority: a.alert_type === 'overdue' ? 1 : a.alert_type === 'credit_break' ? 2 : 3,
      title: a.cust_name,
      detail: `ยอดค้าง ฿${fmtNum(a.amount_due||0)} · กำหนด ${fmtDate(a.due_date)}`,
      meta: a.phone ? `📞 ${a.phone}` : '',
      type: a.alert_type,
      action: 'debt',
      data: a,
    });
  });
  
  // 2. เช็คเลยวันคาด
  billList.filter(b => 
    b.match_status !== 'void' && b.type === 'Cheque' && 
    b.expected_clear_date && toISODate(b.expected_clear_date) < today &&
    b.match_status !== 'matched' && b.match_status !== 'bounced'
  ).forEach(b => {
    const daysOver = Math.floor((new Date(today) - new Date(toISODate(b.expected_clear_date))) / 86400000);
    alerts.push({
      category: 'cheque',
      priority: 1,
      title: `เช็ค ${b.bill_no||'(ไม่มีเลข)'} เลยวันคาด ${daysOver} วัน`,
      detail: `฿${fmtNum(b.amount)} · วันที่คาด ${fmtDate(b.expected_clear_date)}`,
      meta: b.remarks1 || '',
      type: 'cheque_overdue',
      action: 'main',
      data: b,
    });
  });
  
  // 3. เช็คเด้ง
  billList.filter(b => b.match_status === 'bounced').forEach(b => {
    alerts.push({
      category: 'cheque_bounce',
      priority: 1,
      title: `🚫 เช็คเด้ง ${b.bill_no||'(ไม่มีเลข)'}`,
      detail: `฿${fmtNum(b.amount)} · ${b.remarks1||''}`,
      meta: fmtDate(b.bounced_at),
      type: 'cheque_bounced',
      action: 'main',
      data: b,
    });
  });
  
  // 4. SP-TEMP ที่ยังไม่แก้
  paymentList.filter(p => p.is_temp || /^SP-TEMP-/.test(p.sp_no)).forEach(sp => {
    alerts.push({
      category: 'sp_temp',
      priority: 3,
      title: `SP ชั่วคราว ${sp.sp_no}`,
      detail: `${sp.cust_name} · ฿${fmtNum(sp.total)} · ${fmtDate(sp.date)}`,
      meta: 'รอ SP จริงจากโปรแกรม Smart',
      type: 'sp_temp',
      action: 'payments',
      data: sp,
    });
  });
  
  // 5. Statement unmatched > 3 วัน
  const old3days = new Date(Date.now() - 3*86400000).toISOString().substring(0,10);
  getAllStatements().filter(s => 
    s.match_status !== 'matched' && toISODate(s.date) < old3days
  ).forEach(s => {
    alerts.push({
      category: 'stmt_unmatched',
      priority: 2,
      title: `Statement ${s.bank} ยังไม่ match`,
      detail: `฿${fmtNum(s.amount)} · ${fmtDate(s.date)} · ${s.description||''}`,
      meta: s.ref_no || '',
      type: 'stmt_unmatched',
      action: 'matching',
      data: s,
    });
  });
  
  // 6. Business rule violations (Cashflow)
  cashflowList.forEach(c => {
    if (!c.bank || !c.vat) return;
    const bankDef = BANK_ACCOUNTS[c.bank];
    if (!bankDef) return;
    if (bankDef.vat !== c.vat) {
      alerts.push({
        category: 'rule_violation',
        priority: 1,
        title: `🚨 กฎโดนละเมิด: ${c.type} ${c.vat}`,
        detail: `ใช้ ${c.bank} (${bankDef.vat}) · ฿${fmtNum(c.amount)}`,
        meta: c.counterparty || '',
        type: 'rule_violation',
        action: 'cashflow',
        data: c,
      });
    }
  });
  
  // 7. Supplier Payments — รอโอน / โอนแล้วยังไม่ match
  (supplierPayments||[]).filter(p => p.status === 'pending' || p.status === 'scheduled').forEach(p => {
    const isOverdue = p.scheduled_date && toISODate(p.scheduled_date) < today;
    alerts.push({
      category: 'supplier_pending',
      priority: isOverdue ? 1 : 3,
      title: `${isOverdue?'🚨 เลยวันนัด':'⏳ รอโอน'} ${p.supplier_name}`,
      detail: `฿${fmtNum(p.amount)} · ${p.vat} · โอนจาก ${p.bank}${p.scheduled_date?' · นัด '+fmtDate(p.scheduled_date):''}`,
      meta: p.invoice_no ? 'INV: '+p.invoice_no : '',
      type: 'supplier_pending',
      action: 'supplier',
      data: p,
    });
  });
  
  (supplierPayments||[]).filter(p => p.status === 'paid' && p.match_status !== 'matched').forEach(p => {
    alerts.push({
      category: 'supplier_unmatched',
      priority: 2,
      title: `PP ${p.pp_no||'(ไม่มีเลข)'} ยังไม่ match`,
      detail: `${p.supplier_name} · ฿${fmtNum(p.amount)} · โอนเมื่อ ${fmtDate(p.transfer_date)}`,
      meta: p.reference || '',
      type: 'supplier_unmatched',
      action: 'matching',
      data: p,
    });
  });
  
  // 8. Supplier cheques — ค้างขึ้นเงิน > 30 วัน
  (supplierPayments||[]).filter(p => 
    p.status === 'paid' && 
    p.payment_method === 'เช็ค' && 
    !p.cheque_cleared_date
  ).forEach(p => {
    const chqDate = toISODate(p.cheque_date || p.transfer_date);
    if (!chqDate) return;
    const daysOut = Math.floor((new Date(today) - new Date(chqDate)) / 86400000);
    if (daysOut < 30) return; // ยังไม่ 30 วัน — ข้าม
    alerts.push({
      category: 'supplier_cheque_stale',
      priority: daysOut > 60 ? 1 : 2,
      title: `📝 เช็ค ${p.cheque_no||'(ไม่มีเลข)'} ค้างขึ้นเงิน ${daysOut} วัน`,
      detail: `${p.supplier_name} · ฿${fmtNum(p.amount)} · เขียนเช็ค ${fmtDate(chqDate)}${p.pp_no?' · PP: '+p.pp_no:''}`,
      meta: daysOut > 60 ? '🚨 ควรติดตาม Supplier' : `เช็คจ่ายออกจาก ${p.cheque_issued_bank||'KTB'}`,
      type: 'supplier_cheque_stale',
      action: 'supplier',
      data: p,
    });
  });
  
  // 9. Misrouted Payments — ลูกค้าโอนผิดธนาคาร
  // SS/SR (VAT) → โอนเข้า BBL NW = ผิด
  // OS/OR (NOVAT) → โอนเข้า KTB/KBANK/BBL = ผิด
  billList.filter(b => b.match_status === 'matched' && b.bill_no && b.bank).forEach(b => {
    const misroute = detectMisroutedPayment(b.bill_no, b.bank);
    if (!misroute) return;
    alerts.push({
      category: 'misrouted_payment',
      priority: 2,
      title: `⚠️ บิล ${b.bill_no} โอนผิดธนาคาร`,
      detail: `${misroute.msg} · ฿${fmtNum(b.amount)}`,
      meta: `${b.remarks1||b.station||''}${b.date?' · '+fmtDate(b.date):''}`,
      type: 'misrouted_payment',
      action: 'main',
      data: b,
    });
  });
  
  // Sort by priority
  alerts.sort((a, b) => a.priority - b.priority);
  
  // Category counts
  const categories = {
    all: alerts.length,
    debt: alerts.filter(a => a.category === 'debt').length,
    cheque: alerts.filter(a => a.category === 'cheque' || a.category === 'cheque_bounce').length,
    sp_temp: alerts.filter(a => a.category === 'sp_temp').length,
    stmt_unmatched: alerts.filter(a => a.category === 'stmt_unmatched').length,
    rule_violation: alerts.filter(a => a.category === 'rule_violation').length,
    supplier_pending: alerts.filter(a => a.category === 'supplier_pending').length,
    supplier_unmatched: alerts.filter(a => a.category === 'supplier_unmatched').length,
    supplier_cheque_stale: alerts.filter(a => a.category === 'supplier_cheque_stale').length,
    misrouted_payment: alerts.filter(a => a.category === 'misrouted_payment').length,
  };
  
  let filterCat = 'all';
  
  function renderList() {
    const filtered = filterCat === 'all' ? alerts : alerts.filter(a => 
      a.category === filterCat || (filterCat === 'cheque' && a.category === 'cheque_bounce')
    );
    
    el.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div class="page-title">🔔 แจ้งเตือนทั้งหมด</div>
        <div class="text-xs text-muted">${alerts.length} รายการ</div>
      </div>
      
      <!-- Filter pills -->
      <div class="flex gap-2 mb-3 flex-wrap">
        <button class="pill ${filterCat==='all'?'active':''}" data-cat="all">ทั้งหมด (${categories.all})</button>
        ${categories.rule_violation > 0 ? `<button class="pill ${filterCat==='rule_violation'?'active':''}" data-cat="rule_violation" style="--pill-color:var(--danger)">🚨 Rule Violation (${categories.rule_violation})</button>` : ''}
        ${categories.supplier_pending > 0 ? `<button class="pill ${filterCat==='supplier_pending'?'active':''}" data-cat="supplier_pending" style="--pill-color:var(--danger)">🏭 Supplier รอโอน (${categories.supplier_pending})</button>` : ''}
        ${categories.supplier_unmatched > 0 ? `<button class="pill ${filterCat==='supplier_unmatched'?'active':''}" data-cat="supplier_unmatched" style="--pill-color:var(--warn)">💰 PP รอ Match (${categories.supplier_unmatched})</button>` : ''}
        ${categories.debt > 0 ? `<button class="pill ${filterCat==='debt'?'active':''}" data-cat="debt" style="--pill-color:var(--warn)">📋 หนี้ค้าง (${categories.debt})</button>` : ''}
        ${categories.cheque > 0 ? `<button class="pill ${filterCat==='cheque'?'active':''}" data-cat="cheque" style="--pill-color:var(--danger)">🟡 เช็ค (${categories.cheque})</button>` : ''}
        ${categories.sp_temp > 0 ? `<button class="pill ${filterCat==='sp_temp'?'active':''}" data-cat="sp_temp" style="--pill-color:var(--info)">🔷 SP ชั่วคราว (${categories.sp_temp})</button>` : ''}
        ${categories.stmt_unmatched > 0 ? `<button class="pill ${filterCat==='stmt_unmatched'?'active':''}" data-cat="stmt_unmatched" style="--pill-color:var(--info)">🏦 Statement ค้าง (${categories.stmt_unmatched})</button>` : ''}
        ${categories.supplier_cheque_stale > 0 ? `<button class="pill ${filterCat==='supplier_cheque_stale'?'active':''}" data-cat="supplier_cheque_stale" style="--pill-color:var(--warn)">📝 เช็คค้างขึ้นเงิน (${categories.supplier_cheque_stale})</button>` : ''}
        ${categories.misrouted_payment > 0 ? `<button class="pill ${filterCat==='misrouted_payment'?'active':''}" data-cat="misrouted_payment" style="--pill-color:var(--warn)">🔀 โอนผิดธนาคาร (${categories.misrouted_payment})</button>` : ''}
      </div>
      
      <div class="flex-col gap-3">
        ${filtered.length === 0 ? 
          '<div class="card text-dim text-sm" style="text-align:center;padding:40px">✅ ไม่มีแจ้งเตือนในหมวดนี้</div>' :
          (() => {
            const _t = truncateForRender(filtered);
            return _t.visible.map(a => {
            const color = a.priority === 1 ? 'var(--danger)' : a.priority === 2 ? 'var(--warn)' : 'var(--info)';
            return `<div class="card" style="border-left:4px solid ${color}">
              <div class="flex justify-between items-center flex-wrap gap-3">
                <div style="flex:1;min-width:0">
                  <div class="flex items-center gap-2 mb-1">
                    <span class="font-semi" style="color:var(--text)">${a.title}</span>
                  </div>
                  <div class="text-sm" style="color:var(--text2)">${a.detail}</div>
                  ${a.meta ? `<div class="text-xs text-muted" style="margin-top:3px">${a.meta}</div>` : ''}
                </div>
                <div class="flex gap-2">
                  <button class="btn btn-outline btn-sm" onclick="navigateTo('${a.action}')">ไปจัดการ →</button>
                </div>
              </div>
            </div>`;
          }).join('') + (_t.truncated ? `<div class="card text-sm text-muted" style="text-align:center;padding:12px">${truncationFooter(_t.total)}</div>` : '');
          })()
        }
      </div>
    `;
    
    el.querySelectorAll('.pill[data-cat]').forEach(btn => {
      btn.addEventListener('click', () => { filterCat = btn.dataset.cat; renderList(); });
    });
  }
  
  renderList();
}

// ── Reports ─────────────────────────────────────────────────
function renderReports(el) {
  let dateFrom = todayISO().substring(0,7) + '-01';
  let dateTo = todayISO();
  let bankFilter = 'ALL';
  let stationFilter = 'ALL';
  let vatFilter = 'ALL';
  
  function render() {
    // Filter matched bills/cashflow in date range
    const inRange = (dateStr) => {
      const d = toISODate(dateStr);
      if (!d) return false;
      if (dateFrom && d < dateFrom) return false;
      if (dateTo && d > dateTo) return false;
      return true;
    };
    
    // Aggregate data for report
    // 1. Bills จ่ายแล้ว (matched หรือ paid)
    let bills = billList.filter(b => 
      inRange(b.date) && 
      b.match_status !== 'void' &&
      (b.match_status === 'paid' || b.match_status === 'matched')
    );
    if (stationFilter !== 'ALL') bills = bills.filter(b => b.station === stationFilter);
    
    // 2. Cashflow (fully matched)
    let cashflow = cashflowList.filter(c => inRange(c.date));
    if (vatFilter !== 'ALL') cashflow = cashflow.filter(c => c.vat === vatFilter);
    if (bankFilter !== 'ALL') cashflow = cashflow.filter(c => c.bank === bankFilter);
    
    // 3. Statement (ทั้งหมดในช่วง)
    let stmts = getAllStatements().filter(s => inRange(s.date));
    if (bankFilter !== 'ALL') stmts = stmts.filter(s => s.bank === bankFilter);
    
    // Summary
    const totalSales = bills.reduce((s,b) => s + Number(b.amount||0), 0);
    const totalDeposit = cashflow.filter(c => c.type === 'deposit').reduce((s,c) => s + Number(c.amount||0), 0);
    const totalSupplier = cashflow.filter(c => c.type === 'supplier').reduce((s,c) => s + Number(c.amount||0), 0);
    const stmtsMatched = stmts.filter(s => s.match_status === 'matched').length;
    
    // กลุ่มตามวัน
    const byDate = {};
    bills.forEach(b => {
      const d = toISODate(b.date);
      if (!byDate[d]) byDate[d] = { sales: 0, count: 0 };
      byDate[d].sales += Number(b.amount||0);
      byDate[d].count++;
    });
    const dateKeys = Object.keys(byDate).sort();
    
    el.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div class="page-title">📑 รายงานนำส่งสำนักงานบัญชี</div>
        <div class="flex gap-2">
          <button class="btn btn-outline btn-sm" id="btn-rep-csv">📄 Export CSV</button>
          <button class="btn btn-primary btn-sm" id="btn-rep-excel">📊 Export Excel (Multi-sheet)</button>
          <button class="btn btn-outline btn-sm" id="btn-rep-print">🖨️ Print</button>
        </div>
      </div>
      
      <!-- Filters -->
      <div class="card mb-3">
        <div class="flex gap-3 items-end flex-wrap">
          <div class="input-group">
            <label>ตั้งแต่</label>
            <input type="date" class="input" id="rep-from" value="${dateFrom}" style="width:150px">
          </div>
          <div class="input-group">
            <label>ถึง</label>
            <input type="date" class="input" id="rep-to" value="${dateTo}" style="width:150px">
          </div>
          <div class="input-group">
            <label>ธนาคาร</label>
            <select class="select" id="rep-bank">
              <option value="ALL" ${bankFilter==='ALL'?'selected':''}>ทุกธนาคาร</option>
              <option value="KTB" ${bankFilter==='KTB'?'selected':''}>KTB</option>
              <option value="KBANK" ${bankFilter==='KBANK'?'selected':''}>KBANK</option>
              <option value="BBL NW" ${bankFilter==='BBL NW'?'selected':''}>BBL NW</option>
              <option value="BBL" ${bankFilter==='BBL'?'selected':''}>BBL</option>
            </select>
          </div>
          <div class="input-group">
            <label>Station</label>
            <select class="select" id="rep-station">
              <option value="ALL" ${stationFilter==='ALL'?'selected':''}>ทุก Station</option>
              ${['FRONT1','FRONT2','FRONT3','FRONT4','Invoice Credit','Order Credit','Front'].map(s => 
                `<option value="${s}" ${stationFilter===s?'selected':''}>${s}</option>`).join('')}
            </select>
          </div>
          <div class="input-group">
            <label>VAT</label>
            <select class="select" id="rep-vat">
              <option value="ALL" ${vatFilter==='ALL'?'selected':''}>ทั้งหมด</option>
              <option value="VAT" ${vatFilter==='VAT'?'selected':''}>VAT</option>
              <option value="NOVAT" ${vatFilter==='NOVAT'?'selected':''}>NOVAT</option>
            </select>
          </div>
          <button class="btn btn-primary btn-sm" id="rep-apply">🔍 ดูรายงาน</button>
        </div>
      </div>
      
      <!-- Summary Stats -->
      <div class="flex gap-3 flex-wrap mb-3 stagger">
        ${statCard('ยอดขาย (จ่ายแล้ว)', '฿'+fmtNum(totalSales), bills.length+' บิล', 'var(--success)', ICONS.dollar)}
        ${statCard('นำฝากธนาคาร', '฿'+fmtNum(totalDeposit), '', 'var(--info)', ICONS.card)}
        ${statCard('จ่าย Supplier', '฿'+fmtNum(totalSupplier), '', 'var(--danger)', ICONS.card)}
        ${statCard('Statement Matched', stmtsMatched+'/'+stmts.length, '', 'var(--warn)', ICONS.pulse)}
      </div>
      
      <!-- รายงานแยกวัน -->
      <div class="card-flat mb-3">
        <div style="padding:10px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between">
          <span class="font-semi text-sm">📅 สรุปยอดขายแยกวัน</span>
          <span class="text-xs text-muted">${dateKeys.length} วัน</span>
        </div>
        <div class="table-wrap" style="max-height:250px;overflow-y:auto">
          <table>
            <thead><tr><th>วันที่</th><th style="text-align:right">จำนวนบิล</th><th style="text-align:right">ยอดขาย</th></tr></thead>
            <tbody>
              ${dateKeys.length === 0 ? '<tr><td colspan="3" style="text-align:center;padding:30px;color:var(--text3)">ไม่มีข้อมูลในช่วงนี้</td></tr>' :
                dateKeys.map(d => `
                  <tr>
                    <td>${fmtDate(d)}</td>
                    <td style="text-align:right">${byDate[d].count}</td>
                    <td style="text-align:right;font-weight:600;color:var(--success)">฿${fmtNum(byDate[d].sales)}</td>
                  </tr>
                `).join('') +
                `<tr style="background:var(--surface2);font-weight:700"><td>รวม</td><td style="text-align:right">${bills.length}</td><td style="text-align:right;color:var(--success)">฿${fmtNum(totalSales)}</td></tr>`

            </tbody>
          </table>
        </div>
      </div>
      
      <!-- รายการบิลจ่ายแล้ว -->
      <div class="card-flat mb-3">
        <div style="padding:10px 16px;border-bottom:1px solid var(--border)">
          <span class="font-semi text-sm">📋 รายการบิลที่จ่ายแล้ว (${bills.length})</span>
        </div>
        <div class="table-wrap" style="max-height:400px;overflow-y:auto">
          <table>
            <thead>
              <tr>
                <th>วันที่</th>
                <th>เลขบิล</th>
                <th>Station</th>
                <th>ประเภท</th>
                <th style="text-align:right">ยอด</th>
                <th>SP No.</th>
                <th>ธนาคาร</th>
                <th>Ref</th>
              </tr>
            </thead>
            <tbody>
              ${bills.length === 0 ? '<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--text3)">ไม่มีข้อมูล</td></tr>' :
                bills.slice(0, 200).map(b => `
                  <tr>
                    <td class="text-xs">${fmtDate(b.date)}</td>
                    <td class="text-xs" style="font-family:var(--mono)">${b.bill_no||'-'}</td>
                    <td><span class="badge badge-info" style="font-size:.7rem">${b.station||'-'}</span></td>
                    <td class="text-xs">${b.type||'-'}</td>
                    <td style="text-align:right;font-weight:600;color:var(--success)">฿${fmtNum(b.amount)}</td>
                    <td class="text-xs" style="font-family:var(--mono);color:var(--text2)">${b.paid_by_sp||'-'}</td>
                    <td class="text-xs">${b.bank||'-'}</td>
                    <td class="text-xs">${b.matched_stmt_ref||b.confirmation||'-'}</td>
                  </tr>
                `).join('')
              }
            </tbody>
          </table>
          ${bills.length > 200 ? `<div style="padding:10px;text-align:center;color:var(--text3);font-size:.8rem">แสดง 200 แถวแรก — Export เพื่อดูครบ</div>` : ''}
        </div>
      </div>
      
      <!-- Cashflow -->
      <div class="card-flat mb-3">
        <div style="padding:10px 16px;border-bottom:1px solid var(--border)">
          <span class="font-semi text-sm">💸 รายการเงินเข้า-ออก (${cashflow.length})</span>
        </div>
        <div class="table-wrap" style="max-height:250px;overflow-y:auto">
          <table>
            <thead><tr><th>วันที่</th><th>ประเภท</th><th>VAT</th><th style="text-align:right">ยอด</th><th>บัญชี</th><th>คู่ค้า</th><th>อ้างอิง</th></tr></thead>
            <tbody>
              ${cashflow.length === 0 ? '<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text3)">ไม่มีข้อมูล</td></tr>' :
                cashflow.map(c => `
                  <tr>
                    <td class="text-xs">${fmtDate(c.date)}</td>
                    <td class="text-xs">${c.type}</td>
                    <td><span class="badge" style="font-size:.7rem;background:${c.vat==='VAT'?'#4f9cf933':'#8e44ad33'};color:${c.vat==='VAT'?'#4f9cf9':'#8e44ad'}">${c.vat||'-'}</span></td>

        station: b.station || '',
        type: b.type || '',
        amount: Number(b.amount) || 0,

        bank: b.bank || '',
        ref: b.matched_stmt_ref || b.confirmation || '',
        customer: b.remarks1 || '',

      const headers = Object.keys(rows[0]);
      const csv = [headers.join(',')].concat(rows.map(r => headers.map(h => {
        const v = r[h] == null ? '' : String(r[h]);
        return v.includes(',')||v.includes('"')||v.includes('\n') ? `"${v.replace(/"/g,'""')}"` : v;
      }).join(','))).join('\n');
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `Report_${dateFrom}_to_${dateTo}.csv`;
      a.click();
      toast('Export CSV สำเร็จ', 'success');
    });
    
    document.getElementById('btn-rep-excel')?.addEventListener('click', () => {
      if (typeof XLSX === 'undefined') { toast('SheetJS ไม่ได้โหลด', 'error'); return; }
      const wb = XLSX.utils.book_new();
      
      // Sheet 1: สรุป
      const summary = [
        ['รายงานนำส่งสำนักงานบัญชี'],
        ['ช่วงวันที่', fmtDate(dateFrom)+' ถึง '+fmtDate(dateTo)],
        ['Filter:', `ธนาคาร: ${bankFilter}, Station: ${stationFilter}, VAT: ${vatFilter}`],
        [''],
        ['สรุป', 'จำนวน', 'ยอดรวม'],
        ['ยอดขาย (บิลจ่ายแล้ว)', bills.length, totalSales],
        ['นำฝากธนาคาร', cashflow.filter(c=>c.type==='deposit').length, totalDeposit],
        ['จ่าย Supplier', cashflow.filter(c=>c.type==='supplier').length, totalSupplier],
        ['Statement Matched', stmtsMatched, '-'],
        ['Statement Unmatched', stmts.length-stmtsMatched, '-'],
      ];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summary), 'สรุป');
      
      // Sheet 2: Sales by Day
      const salesByDay = [['วันที่','จำนวนบิล','ยอดขาย']];
      dateKeys.forEach(d => salesByDay.push([fmtDate(d), byDate[d].count, byDate[d].sales]));
      salesByDay.push(['รวม', bills.length, totalSales]);
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(salesByDay), 'ขายแยกวัน');
      
      // Sheet 3: Bills detail
      const billsData = bills.map(b => ({
        วันที่: fmtDate(b.date),
        เลขบิล: b.bill_no || '',
        Station: b.station || '',
        ประเภท: b.type || '',
        ยอด: Number(b.amount) || 0,
        SP: b.paid_by_sp || '',
        ธนาคาร: b.bank || '',
        Ref: b.matched_stmt_ref || b.confirmation || '',
        ลูกค้า: b.remarks1 || '',
      }));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(billsData), 'บิลจ่ายแล้ว');
      
      // Sheet 4: Cashflow
      const cfData = cashflow.map(c => ({
        วันที่: fmtDate(c.date),
        ประเภท: c.type,
        VAT: c.vat || '',
        ยอด: c.amount || 0,
        บัญชี: c.bank || '',
        คู่ค้า: c.counterparty || '',
        อ้างอิง: c.reference || '',
        หมายเหตุ: c.note || '',
      }));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(cfData), 'เงินเข้า-ออก');
      
      // Sheet 5: Statement
      const stmtData = stmts.map(s => ({
        ธนาคาร: s.bank,
        วันที่: fmtDate(s.date),
        เวลา: s.time || '',
        Ref: s.ref_no || '',
        รายละเอียด: s.description || '',
        ยอด: s.amount || 0,
        Match: s.match_status || '',
        บิล: s.match_bill || '',
      }));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(stmtData), 'Statement');
      
      XLSX.writeFile(wb, `Report_Accounting_${dateFrom}_to_${dateTo}.xlsx`);
      toast('Export Excel สำเร็จ — พร้อมส่งสำนักงานบัญชี', 'success');
    });
    
    document.getElementById('btn-rep-print')?.addEventListener('click', () => {
      window.print();
    });
  }
  
  render();
}

// Tax Export — สำหรับยื่นสรรพากร (PP ฝั่งเจ้าหนี้ + SP ฝั่งลูกหนี้)
// ══════════════════════════════════════════════════════════════
async function renderTaxExport(el) {
  // Default: เดือนปัจจุบัน
  var now = new Date();
  var defaultMonth = String(now.getFullYear()) + String(now.getMonth() + 1).padStart(2, '0');
  var state = {
    mode: 'PP',          // PP หรือ SP
    month: defaultMonth, // YYYYMM
    data: null,          // ข้อมูลที่ดึงมา
    expanded: {},        // expand state ต่อ row
    loading: false,
  };
  
  async function fetchData() {
    state.loading = true;
    renderInner();
    var action = state.mode === 'PP' ? 'exportPPReportForTax' : 'exportSPReportForTax';
    var res = await api(action, { month: state.month });
    state.loading = false;
    if (res && res.success) {
      state.data = res.data;
    } else {
      toast('ดึงข้อมูลไม่สำเร็จ: ' + (res && res.error || 'unknown'), 'error');
      state.data = null;
    }
    renderInner();
  }
  
  function fmtTH(iso) {
    // YYYY-MM-DD → dd/mm/yyyy (ค.ศ.)
    if (!iso) return '';
    var s = String(iso);
    var m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m) return m[3] + '/' + m[2] + '/' + m[1];
    return s;
  }
  
  function exportCSV() {
    if (!state.data || !state.data.rows || !state.data.rows.length) {
      toast('ไม่มีข้อมูลให้ export', 'warn');
      return;
    }
    var rows = state.data.rows;
    var lines = [];
    // Header
    if (state.mode === 'PP') {
      lines.push(['PP No.', 'วันที่บิลผู้จำหน่าย', 'เลขบิล/ใบกำกับภาษี', 'ชื่อผู้จำหน่าย', 'ยอดเงินรวม', 'PP เดิม'].join(','));
      rows.forEach(function(r) {
        // Parent line

// Storage: แยก SP กับ PP
let spReconData = null; // { payments: [...], types: [...], taxBills: [...], merged: [...] }
let ppReconData = null;

// ── Persist ──
async function saveReconData(kind, data) {
  const key = kind === 'sp' ? 'sf_spRecon' : 'sf_ppRecon';
  try {
    const db = await new Promise((res, rej) => {
      const r = indexedDB.open('SmartFinanceDB', 1);
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
    const tx = db.transaction('data', 'readwrite');
    tx.objectStore('data').put(JSON.stringify(data), key);
  } catch(e) { console.error('Save recon failed:', e); }
}
async function loadReconData(kind) {
  const key = kind === 'sp' ? 'sf_spRecon' : 'sf_ppRecon';
  try {
    const db = await new Promise((res, rej) => {
      const r = indexedDB.open('SmartFinanceDB', 1);
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
    const tx = db.transaction('data', 'readonly');
    const req = tx.objectStore('data').get(key);
    return new Promise(res => {
      req.onsuccess = () => res(req.result ? JSON.parse(req.result) : null);
      req.onerror = () => res(null);
    });
  } catch(e) { return null; }
}

// ── Parser: ตรวจว่าเป็นไฟล์แบบไหน (auto-detect ไม่สนชื่อไฟล์) ──
// Returns: { type: 'payment_main'|'payment_type'|'tax_sales'|'tax_purchase', kind: 'sp'|'pp'|null }
function detectReconFileType(sheet) {
  // สแกนหา indicator ในแถวบน
  const topRows = sheet.slice(0, 10).map(r => (r||[]).map(c => String(c||'')).join('|'));
  const topText = topRows.join('\n');
  
  let type = 'unknown';
  let kind = null;
  
  // ── File type detection ──
  if (topText.includes('ภาษีขาย')) {
    type = 'tax_sales';
    kind = 'sp';
  } else if (topText.includes('ภาษีซื้อ')) {
    type = 'tax_purchase';
    kind = 'pp';
  } else if (topText.includes('ตามประเภท') || topText.includes('ประเภทชำระ')) {
    type = 'payment_type';
  } else if (topText.includes('การชำระเงิน') || topText.includes('การจ่ายเงิน')) {
    type = 'payment_main';
  } else {
    // Fallback: ดูโครงสร้าง
    for (let i = 2; i < Math.min(10, sheet.length); i++) {
      const r = sheet[i];
      if (!r || !r[0]) continue;
      const first = String(r[0]);
      if (/^\(A[A-Z]-|\(B[A-Z]-/.test(first)) { type = 'payment_type'; break; }
      if (/^(SP|PP)\d{5}-/.test(first)) { type = 'payment_main'; break; }
    }
  }
  
  // ── Kind detection (SP vs PP) — หาจาก prefix ของเอกสารใน data ──
  if (!kind && (type === 'payment_main' || type === 'payment_type')) {
    let spCount = 0, ppCount = 0;
    for (let i = 0; i < sheet.length; i++) {
      const r = sheet[i];
      if (!r) continue;
      for (let c = 0; c < Math.min(r.length, 3); c++) {
        const s = String(r[c] || '');
        if (/^SP\d{5}-/.test(s)) spCount++;
        else if (/^PP\d{5}-/.test(s)) ppCount++;
      }
      if (spCount + ppCount > 5) break;
    }
    kind = spCount > ppCount ? 'sp' : (ppCount > 0 ? 'pp' : null);
  }
  
  return { type, kind };
}

// ── Parser File Type 1: การชำระเงิน (SP/PP หลัก + child bills) ──
function parseReconPaymentMain(sheet, kind) {
  // kind: 'sp' (ลูกหนี้) → SP + child: SS/SR/OS/OR/SC/JS/JR
  //       'pp' (เจ้าหนี้) → PP + child: PS/PR/MS/MR/BS/BR/PC/PX
  const HEADER_PREFIX = kind === 'sp' ? 'SP' : 'PP';
  const CHILD_REGEX = kind === 'sp' 
    ? /^(SS|SR|OS|OR|SC|JS|JR)\d{5}-/
    : /^(PS|PR|MS|MR|BS|BR|PC|PX)\d{5}-/;
  const payments = [];
  let current = null;
  
  // ข้ามแถว header (row 0-1)
  for (let i = 2; i < sheet.length; i++) {
    const r = sheet[i];
    if (!r) continue;
    const first = String(r[0] || '').trim();
    if (!first) continue;
    
    // Header row: SP (ลูกหนี้) หรือ PP (เจ้าหนี้)
    if (first.startsWith(HEADER_PREFIX) && /^\w{2}\d{5}-\d+/.test(first)) {
      if (current) payments.push(current);
      current = {
        no: first,
        date: excelDateToISO(r[1]),
        customer: String(r[2] || ''),
        amount_gross: Number(r[3]) || 0,
        amount_deduct: Number(r[4]) || 0,
        amount_net: Number(r[5]) || 0,
        bills: [],
      };
    }
    // Child row: ใช้ regex แยกตาม kind
    else if (current && CHILD_REGEX.test(first)) {
      const prefix = first.substring(0, 2).toUpperCase();
      // Sign logic:
      //   SP: SC/JS/JR = ใบลดหนี้ลูกหนี้ → ยอดติดลบ (คืนเงิน)
      //   PP: BS/BR/PC/PX = ใบลดหนี้/ส่วนลดเจ้าหนี้ → ยอดติดลบ (ได้คืน)
      const isNegative = kind === 'sp' 
        ? ['SC','JS','JR'].includes(prefix)
        : ['BS','BR','PC','PX'].includes(prefix);
      let amount = Number(r[5]) || 0;
      // ถ้า prefix บ่งว่าต้องติดลบ แต่ยอดเป็นบวก → ทำให้ติดลบ
      if (isNegative && amount > 0) amount = -amount;
      
      current.bills.push({
        bill_no: first,
        prefix: prefix,
        ref_no: String(r[1] || ''),
        bill_date: excelDateToISO(r[2]),
        due_date: excelDateToISO(r[3]),
        type_desc: String(r[4] || ''),
        amount: amount,
        wht: Number(r[6]) || 0,
        fee: Number(r[7]) || 0,
        net: Number(r[8]) || 0,
        is_negative: isNegative,
      });
    }
  }
  if (current) payments.push(current);
  return payments;
}

// ── Parser File Type 2: ตามประเภท/ประเภทชำระ ──
function parseReconPaymentType(sheet, kind) {
  const HEADER_PREFIX = kind === 'sp' ? 'SP' : 'PP';
  const result = [];
  let currentCust = null;
  let currentPay = null;
  
  for (let i = 2; i < sheet.length; i++) {
    const r = sheet[i];
    if (!r) continue;
    const first = String(r[0] || '').trim();
    if (!first) continue;
    
    // Customer header: (AP-00001)
    if (/^\(\w{2}-\d+\)/.test(first)) {
      currentCust = first;
    }
    // Payment: SP/PP number
    else if (first.startsWith(HEADER_PREFIX) && /^\w{2}\d{5}-\d+/.test(first)) {
      currentPay = {
        no: first,
        date: excelDateToISO(r[1]),
        amount: Number(r[2]) || 0,
        customer: currentCust,
        methods: [], // [{type: 'เงินสด|โอนเงิน|เช็ค', date, amount, bank}]
      };
      result.push(currentPay);
    }
    // Method row: เงินสด / โอนเงิน / เช็ค
    else if (/^(เงินสด|โอนเงิน|เช็ค|เงินโอน)/.test(first) && currentPay) {
      currentPay.methods.push({
        type: first,
        date: excelDateToISO(r[2]),
        bank: String(r[3] || ''),
        amount: Number(r[5]) || 0,
      });
    }
  }
  return result;
}

// ── Parser File Type 3: ภาษีขาย / ภาษีซื้อ ──
function parseReconTax(sheet) {
  const result = [];
  // Header อยู่ประมาณแถว 7
  for (let i = 7; i < sheet.length; i++) {
    const r = sheet[i];
    if (!r) continue;
    const seq = r[0];
    if (!seq || isNaN(Number(seq))) continue; // ข้าม sub-total row
    
    const isPurchase = (r.length >= 12); // ภาษีซื้อมี col 12 (ref_doc)
    if (isPurchase) {
      result.push({
        seq: Number(seq),
        bill_date: excelDateToISO(r[1]),
        ref_doc: String(r[2] || ''),
        bill_no: String(r[4] || ''),
        supplier: String(r[5] || ''),
        tax_id: String(r[6] || ''),
        branch: String(r[7] || ''),
        amount: Number(r[8]) || 0,
        vat: Number(r[9]) || 0,
        novat: Number(r[10]) || 0,
        total: Number(r[11]) || 0,
      });
    } else {
      result.push({
        seq: Number(seq),
        bill_date: excelDateToISO(r[1]),
        bill_no: String(r[2] || ''),
        customer: String(r[4] || ''),
        tax_id: String(r[5] || ''),
        branch: String(r[6] || ''),
        amount: Number(r[7]) || 0,
        vat: Number(r[8]) || 0,
        novat: Number(r[9]) || 0,
        total: Number(r[10]) || 0,
      });
    }
  }
  return result;
}

// Helper: Excel date → ISO
function excelDateToISO(v) {
  if (!v) return '';
  if (typeof v === 'number' && v > 10000) {
    const epoch = new Date(1899, 11, 30);
    const d = new Date(epoch.getTime() + v * 86400000);
    return d.getFullYear() + '-' + 
           String(d.getMonth()+1).padStart(2,'0') + '-' + 
           String(d.getDate()).padStart(2,'0');
  }
  if (typeof v === 'string' && v.match(/\d{1,2}\/\d{1,2}\/\d{4}/)) {
    const m = v.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    let y = Number(m[3]); if (y > 2400) y -= 543;
    return y + '-' + m[2].padStart(2,'0') + '-' + m[1].padStart(2,'0');
  }
  if (v instanceof Date) {
    return v.getFullYear() + '-' +
           String(v.getMonth()+1).padStart(2,'0') + '-' +
           String(v.getDate()).padStart(2,'0');
  }
  return '';
}

// ── Merge: รวม payment_main + payment_type + tax ──
function mergeReconData(paymentMain, paymentType, taxData, kind) {
  // Key = SP/PP number
  const byNo = {};
  paymentMain.forEach(p => {
    byNo[p.no] = { ...p, methods: [] };
  });
  paymentType.forEach(pt => {
    if (byNo[pt.no]) {
      byNo[pt.no].methods = pt.methods;
      if (!byNo[pt.no].customer && pt.customer) byNo[pt.no].customer = pt.customer;
    } else {
      byNo[pt.no] = { no: pt.no, date: pt.date, customer: pt.customer, amount_net: pt.amount, bills: [], methods: pt.methods };
    }
  });
  
  // Tax bills — map ที่ bill_no ในบิล child
  const taxByBillNo = {};
  taxData.forEach(t => { if (t.bill_no) taxByBillNo[t.bill_no] = t; });
  Object.values(byNo).forEach(p => {
    p.bills.forEach(b => {
      if (taxByBillNo[b.bill_no]) {
        b.is_vat = true;
        b.vat = taxByBillNo[b.bill_no].vat;
        b.novat_amount = taxByBillNo[b.bill_no].amount;
      } else {
        b.is_vat = false;
      }
    });
  });
  
  return Object.values(byNo).sort((a, b) => (a.date||'').localeCompare(b.date||''));
}

// ── Common parser wrapper ──
async function parseReconFiles(files, kind) {
  const parsed = { payment_main: null, payment_type: null, tax: null };
  const issues = [];
  
  for (const file of files) {
    const data = await parseExcelFile(file);
    const sheet = data.sheets ? data.sheets[data.sheetNames[0]] : null;
    if (!sheet) { issues.push(`${file.name}: อ่านไฟล์ไม่ได้`); continue; }
    
    const { type, kind: detectedKind } = detectReconFileType(sheet);
    
    // ตรวจว่าไฟล์ตรงกับหน้า (SP vs PP)
    if (detectedKind && detectedKind !== kind) {
      issues.push(`${file.name}: เป็นไฟล์ ${detectedKind.toUpperCase()} แต่ upload ที่หน้า ${kind.toUpperCase()} — ข้าม`);
      continue;
    }
    
    if (type === 'payment_main') {
      parsed.payment_main = parseReconPaymentMain(sheet, kind);
    } else if (type === 'payment_type') {
      parsed.payment_type = parseReconPaymentType(sheet, kind);
    } else if (type === 'tax_sales' || type === 'tax_purchase') {
      parsed.tax = parseReconTax(sheet);
    } else {
      issues.push(`${file.name}: ไม่รู้จักประเภทไฟล์`);
    }
  }
  
  const merged = mergeReconData(
    parsed.payment_main || [],
    parsed.payment_type || [],
    parsed.tax || [],
    kind
  );
  
  return {
    payments: parsed.payment_main || [],
    types: parsed.payment_type || [],
    taxBills: parsed.tax || [],
    merged: merged,
    issues: issues,
    imported_at: new Date().toISOString(),
  };
}

// Import Daily xlsm

//     B2 = date (datetime)
//     Row 3-11: Summary (label in B, values in C-K)
//       3=นำเงินเข้า 4=ยอดขาย 5=นำเงินออก 6=ยอดคืนสินค้า
//       7=Cash Drawer 8=Transfer 9=Card 10=Cheque 11=Refund
//     Col C-K = station: Front1/2/3/4/Invoice/Order/Payment/InvoiceCredit/OrderCredit
//     Row 15+: bills (A=no, B=date, C=station, D=type, E=amount, F=conf*, G=payDate*, H=r1, I=r2, J=bank)
//       * SKIP F and G per user request
//     M2:O11 = change counting (M=denom, N=count, O=total)
// ════════════════════════════════════════════════════════════════

async function importDailyXlsm(file) {
  const parsed = await parseExcelFile(file);
  const sheets = parsed.sheets || {};
  const mainSheet = sheets['Main'] || sheets[Object.keys(sheets)[0]];
  if (!mainSheet) throw new Error('ไม่พบ Sheet "Main"');
  
  // ── 1. อ่านวันที่ — ใช้ filename เป็นหลัก (reliable), B2 เป็น fallback ──
  // Filename format: YYYYMMDD_*.xlsm (เช่น 20260102_Daily_JKN.xlsm)
  const dateFromName = (() => {
    const m = file.name.match(/(\d{4})(\d{2})(\d{2})/);
    if (!m) return '';
    let y = Number(m[1]); if (y > 2400) y -= 543;
    return `${y}-${m[2]}-${m[3]}`;
  })();
  
  const b2 = mainSheet[1]?.[1];
  const dateFromB2 = toISODate(b2);
  
  // ใช้ filename ก่อน → ถ้าไม่เจอใช้ B2
  const dateISO = dateFromName || dateFromB2;
  
  if (!dateISO) {
    throw new Error(`ไม่สามารถ parse วันที่ได้\n  Filename: ${file.name}\n  B2: ${b2} (type: ${typeof b2})`);
  }
  
  if (dateFromName && dateFromB2 && dateFromName !== dateFromB2) {
    console.warn(`⚠️ ${file.name}: filename=${dateFromName} ≠ B2=${dateFromB2} — ใช้ filename`);
  }
  console.log(`[Import ${file.name}] filename=${dateFromName} · B2=${dateFromB2} · using=${dateISO}`);
  
  // ── 2. อ่าน Summary (rows 3-11, cols C-K) ──
  const LABELS = {
    2: 'นำเงินเข้า',    // row 3 (0-indexed: 2)
    3: 'ยอดขาย',        // row 4
    4: 'นำเงินออก',    // row 5
    5: 'ยอดคืนสินค้า',   // row 6
    6: 'Cash Drawer',   // row 7
    7: 'Transfer',      // row 8
    8: 'Card',          // row 9
    9: 'Cheque',        // row 10
    10: 'Refund',       // row 11
  };
  const STATIONS = ['Front1', 'Front2', 'Front3', 'Front4', 'Invoice', 'Order', 'Payment', 'Invoice Credit', 'Order Credit'];
  
  if (!mainSummary.__byDate) mainSummary.__byDate = {};
  mainSummary.__byDate[dateISO] = mainSummary.__byDate[dateISO] || {};
  
  const LABEL_TO_KEY = {
    'นำเงินเข้า': 'cashIn', 'ยอดขาย': 'sales', 'นำเงินออก': 'cashOut',
    'ยอดคืนสินค้า': 'returns', 'Cash Drawer': 'cashDrawer',
    'Transfer': 'transfer', 'Card': 'card', 'Cheque': 'cheque', 'Refund': 'refund',
  };
  
  for (const [rIdx, label] of Object.entries(LABELS)) {
    const row = mainSheet[Number(rIdx)];
    if (!row) continue;
    if (!mainSummary.__byDate[dateISO][label]) mainSummary.__byDate[dateISO][label] = {};
    
    STATIONS.forEach((st, sIdx) => {
      const colIdx = 2 + sIdx; // C=2, D=3, ..., K=10
      const val = Number(row[colIdx]);
      if (val && !isNaN(val)) {
        mainSummary.__byDate[dateISO][label][st] = val;
        // Also write flat key (backwards compat)
        const keyName = LABEL_TO_KEY[label];
        if (keyName) mainSummary[keyName + '_' + st] = val;
      }
    });
  }
  
  // ── 3. อ่าน Cash counting (M2:O11) และปรับ Invoice drawer ให้เป็น RAW ──
  // xlsm เก็บ G7 = O10 - G3 - G5 (adjusted). เราต้องการ raw (= O10) เพื่อใช้สูตรเดียวกันทุก station
  if (!cashCount.__byDate) cashCount.__byDate = {};
  cashCount.__byDate[dateISO] = cashCount.__byDate[dateISO] || {};
  const dayCash = cashCount.__byDate[dateISO];
  
  let invoiceDrawerRaw = 0;
  for (let r = 1; r < 11; r++) {
    const row = mainSheet[r];
    if (!row) continue;
    const denom = Number(row[12]); // M
    const count = Number(row[13]); // N
    if (denom && count) {
      dayCash[denom + '_Invoice'] = count;
      invoiceDrawerRaw += denom * count;
    }
  }
  
  // Fallback: ถ้าไม่มีข้อมูลนับธนบัตร → คำนวณ raw จาก G7 + G3 + G5
  if (!invoiceDrawerRaw) {
    const g7 = Number(mainSheet[6]?.[6]) || 0;
    const g3 = Number(mainSheet[2]?.[6]) || 0;
    const g5 = Number(mainSheet[4]?.[6]) || 0;
    invoiceDrawerRaw = g7 + g3 + g5;
  }
  
  // Override mainSummary Cash Drawer for Invoice (raw value)
  if (invoiceDrawerRaw > 0) {
    mainSummary.cashDrawer_Invoice = invoiceDrawerRaw;
    if (!mainSummary.__byDate[dateISO]['Cash Drawer']) mainSummary.__byDate[dateISO]['Cash Drawer'] = {};
    mainSummary.__byDate[dateISO]['Cash Drawer']['Invoice'] = invoiceDrawerRaw;
    console.log(`[Import] Invoice drawer RAW = ${invoiceDrawerRaw} (xlsm G7 = ${mainSheet[6]?.[6]}, adjusted)`);
  }
  
  // ── 4. ลบบิลเดิมของวันที่นี้ (ป้องกันซ้ำ) ──
  const beforeCount = billList.length;
  billList = billList.filter(b => toISODate(b.date) !== dateISO);
  const deleted = beforeCount - billList.length;
  
  // ── 5. อ่านบิล (rows 15+) — ใช้ dateISO (จาก filename) เป็นวันที่ทุกบิลในไฟล์เดียวกัน ──
  let billsImported = 0;
  for (let r = 14; r < mainSheet.length; r++) {
    const row = mainSheet[r];
    if (!row) continue;
    
    const billNo = String(row[0] || '').trim();
    // SKIP col 1 (B = Bill Date ในไฟล์) — ใช้ dateISO เดียวกันทั้งไฟล์ (ไม่ trust Excel date parsing)
    const station = String(row[2] || '').trim();
    const type = String(row[3] || '').trim();
    const amount = Number(row[4]);
    // SKIP col 5 (F = Confirmation) และ col 6 (G = Pay Date)
    const remarks1 = String(row[7] || '').trim();
    const remarks2 = String(row[8] || '').trim();
    const bank = String(row[9] || '').trim();
    
    if (!station && !type && !amount) continue;
    if (isNaN(amount) || amount === 0) continue;
    
    billList.push({
      bill_no: billNo || '',
      date: dateISO,  // ★ ใช้ dateISO ตรงๆ (= วันที่จาก filename)
      station: station,
      type: type,
      amount: amount,
      confirmation: '',
      remarks1: remarks1,
      remarks2: remarks2,
      bank: bank,
      match_status: type === 'Cash' ? 'matched' : 'pending',
      pay_date: type === 'Cash' ? dateISO : undefined,
      _imported_from: file.name,
      _imported_at: new Date().toISOString(),
    });
    billsImported++;
  }
  
  return { dateISO, billsImported, summaryRows: 9, deleted };
}

async function renderSpRecon(el) {
  if (!spReconData) spReconData = await loadReconData('sp');
  renderReconPage(el, 'sp', spReconData);
}

async function renderPpRecon(el) {
  if (!ppReconData) ppReconData = await loadReconData('pp');
  renderReconPage(el, 'pp', ppReconData);
}

function renderReconPage(el, kind, data) {
  const TITLE = kind === 'sp' ? '📥 ตรวจการชำระ SP (ลูกหนี้)' : '📤 ตรวจการจ่าย PP (เจ้าหนี้)';
  const HEADER_PREFIX = kind === 'sp' ? 'SP' : 'PP';
  const PARTY_LABEL = kind === 'sp' ? 'ลูกค้า' : 'เจ้าหนี้';
  
  let filterView = 'report'; // report | main | summary | vat
  let filterMethod = 'ALL';
  
  function render() {
    const hasData = data && data.merged && data.merged.length > 0;
    
    el.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div>
          <div class="page-title">${TITLE}</div>
          ${hasData ? `<div class="text-xs text-dim">Import: ${new Date(data.imported_at).toLocaleString('th-TH')} · ${data.merged.length} รายการ</div>` : ''}
        </div>
        <div class="flex gap-2">
          <label class="btn btn-primary btn-sm" style="cursor:pointer">
            ${ICONS.download} Upload 3 ไฟล์
            <input type="file" id="recon-files" accept=".xls,.xlsx" multiple style="display:none">
          </label>
          ${hasData ? `
            <button class="btn btn-outline btn-sm" id="recon-export">📥 Export VAT Report</button>
            <button class="btn btn-ghost btn-sm" id="recon-clear" style="color:var(--danger)">✕ ล้าง</button>
          ` : ''}
        </div>
      </div>
      
      ${!hasData ? `
        <div class="card" style="padding:40px;text-align:center">
          <div style="font-size:3rem;margin-bottom:12px">📂</div>
          <div class="font-semi" style="color:var(--text);margin-bottom:8px">ยังไม่มีข้อมูล</div>
          <p class="text-sm text-muted mb-3">
            Upload 3 ไฟล์ Excel จาก Smart (เรียงไฟล์ไหนก่อนก็ได้ ระบบจะ detect auto)<br><br>
            <strong>${kind==='sp'?'ลูกหนี้':'เจ้าหนี้'}:</strong><br>
            • การชำระเงิน${kind==='pp'?' (การจ่ายเงิน)':''}.xls (${HEADER_PREFIX} หลัก + child bills)<br>
            • การชำระเงิน-ประเภท${kind==='pp'?' (การจ่าย-ประเภท)':''}.xls (วิธีชำระ: เงินสด/โอน/เช็ค)<br>
            • ภาษี${kind==='sp'?'ขาย':'ซื้อ'}.xls (บิล VAT/NOVAT)
          </p>
        </div>
      ` : `
        ${renderReconTabs(filterView)}
        <div id="recon-body">
          ${renderReconContent(filterView, filterMethod, data, kind)}
        </div>
      `}
    `;
    
    // Events
    document.getElementById('recon-files')?.addEventListener('change', async e => {
      const files = Array.from(e.target.files);
      if (files.length === 0) return;
      toast(`กำลัง parse ${files.length} ไฟล์...`, 'info');
      try {
        const parsed = await parseReconFiles(files, kind);
        if (parsed.issues && parsed.issues.length) {
          console.warn('Recon parse issues:', parsed.issues);
          alert('⚠️ คำเตือน:\n\n' + parsed.issues.join('\n'));
        }
        if (parsed.merged.length === 0) {
          toast('❌ ไม่พบข้อมูล — ตรวจว่า upload ไฟล์ถูกหน้าไหม (SP vs PP)', 'error', 8000);
          return;
        }
        if (kind === 'sp') {
          spReconData = parsed;
          data = spReconData;
        } else {
          ppReconData = parsed;
          data = ppReconData;
        }
        await saveReconData(kind, parsed);
        toast(`✅ Import สำเร็จ — ${parsed.merged.length} ${HEADER_PREFIX}`, 'success');
        render();
      } catch(err) {
        console.error(err);
        toast(`❌ Parse ผิดพลาด: ${err.message}`, 'error');
      }
    });
    
    document.getElementById('recon-clear')?.addEventListener('click', () => {
      if (!confirm('ล้างข้อมูล Reconciliation?')) return;
      if (kind === 'sp') spReconData = null;
      else ppReconData = null;
      saveReconData(kind, null);
      data = null;
      render();
    });
    
    document.getElementById('recon-export')?.addEventListener('click', () => {
      exportReconReport(data, kind);
    });
    
    el.querySelectorAll('.recon-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        filterView = btn.dataset.tab;
        const body = document.getElementById('recon-body');
        if (body) body.innerHTML = renderReconContent(filterView, filterMethod, data, kind);
        el.querySelectorAll('.recon-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === filterView));
      });
    });
  }
  
  render();
}

function renderReconTabs(active) {
  const tabs = [
    {id:'report', label:'📑 Report (เอกสาร)'},
    {id:'main', label:'📋 Main (รวมดิบ)'},
    {id:'summary', label:'📊 หน้ารวม (ต่อคู่ค้า)'},
    {id:'vat', label:'🏛️ VAT (ส่งบัญชี)'},
  ];
  return `
    <div class="flex gap-2 mb-3">
      ${tabs.map(t => `<button class="pill recon-tab ${active===t.id?'active':''}" data-tab="${t.id}">${t.label}</button>`).join('')}
    </div>
  `;
}

function renderReconContent(view, filterMethod, data, kind) {
  if (view === 'report') return renderReconReport(data, kind);
  if (view === 'main') return renderReconMain(data, kind);
  if (view === 'summary') return renderReconSummary(data, kind);
  if (view === 'vat') return renderReconVAT(data, kind);
  return '';
}

// ── View: Summary (หน้ารวมต่อคู่ค้า) ──
function renderReconSummary(data, kind) {
  const PARTY_LABEL = kind === 'sp' ? 'ลูกค้า' : 'เจ้าหนี้';
  const byCust = {};
  data.merged.forEach(p => {
    const k = p.customer || '(ไม่ระบุ)';
    if (!byCust[k]) byCust[k] = { customer: k, paymentCount: 0, total: 0, vat: 0, novat: 0, bills: 0 };
    byCust[k].paymentCount++;
    byCust[k].total += Number(p.amount_net || 0);
    p.bills.forEach(b => {
      byCust[k].bills++;
      if (b.is_vat) {
        byCust[k].vat += Number(b.novat_amount || 0);
      } else {
        byCust[k].novat += Number(b.amount || 0);
      }
    });
  });
  const rows = Object.values(byCust).sort((a,b) => b.total - a.total);
  const grandTotal = rows.reduce((s,r) => s+r.total, 0);
  const grandVat = rows.reduce((s,r) => s+r.vat, 0);
  const grandNovat = rows.reduce((s,r) => s+r.novat, 0);
  
  return `
    <div class="flex gap-3 mb-3">
      ${statCard(`${PARTY_LABEL}ทั้งหมด`, rows.length+' ราย', '', 'var(--primary)', ICONS.users)}
      ${statCard('ยอดรวม', '฿'+fmtNum(grandTotal), rows.reduce((s,r)=>s+r.bills,0)+' บิล', 'var(--success)', ICONS.dollar)}
      ${statCard('VAT', '฿'+fmtNum(grandVat), '', 'var(--info)', ICONS.file)}
      ${statCard('NOVAT', '฿'+fmtNum(grandNovat), '', 'var(--purple)', ICONS.file)}
    </div>
    <div class="card-flat">
      <div class="table-wrap" style="max-height:580px;overflow-y:auto">
        <table>
          <thead style="position:sticky;top:0;background:var(--surface2)">
            <tr>
              <th>${PARTY_LABEL}</th>
              <th style="text-align:right">${kind==='sp'?'SP':'PP'} ครั้ง</th>
              <th style="text-align:right">บิลรวม</th>
              <th style="text-align:right">ยอดรวม</th>
              <th style="text-align:right">VAT</th>
              <th style="text-align:right">NOVAT</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td class="truncate" style="max-width:340px" title="${r.customer}">${r.customer}</td>
                <td style="text-align:right">${r.paymentCount}</td>
                <td style="text-align:right">${r.bills}</td>
                <td style="text-align:right;font-weight:600">฿${fmtNum(r.total)}</td>
                <td style="text-align:right;color:var(--info)">฿${fmtNum(r.vat)}</td>
                <td style="text-align:right;color:var(--purple)">฿${fmtNum(r.novat)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}
