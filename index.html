function renderReconVAT(data, kind) {
  const taxRows = data.taxBills || [];
  const totalAmount = taxRows.reduce((s,r) => s+Number(r.amount||0), 0);
  const totalVAT = taxRows.reduce((s,r) => s+Number(r.vat||0), 0);
  const totalTotal = taxRows.reduce((s,r) => s+Number(r.total||0), 0);
  const PARTY_LABEL = kind === 'sp' ? 'ลูกค้า' : 'เจ้าหนี้';
  
  return `
    <div class="flex gap-3 mb-3">
      ${statCard('บิลทั้งหมด', taxRows.length, '', 'var(--primary)', ICONS.file)}
      ${statCard('ยอดก่อน VAT', '฿'+fmtNum(totalAmount), '', 'var(--info)', ICONS.dollar)}
      ${statCard('VAT', '฿'+fmtNum(totalVAT), '', 'var(--purple)', ICONS.bar)}
      ${statCard('รวม', '฿'+fmtNum(totalTotal), '', 'var(--success)', ICONS.check)}
    </div>
    <div class="card-flat">
      <div class="table-wrap" style="max-height:580px;overflow-y:auto">
        <table style="font-size:.8rem">
          <thead style="position:sticky;top:0;background:var(--surface2)">
            <tr>
              <th>#</th><th>วันที่</th><th>เลขที่บิล</th>
              ${kind==='pp'?'<th>ref_doc</th>':''}
              <th>${PARTY_LABEL}</th><th>เลขภาษี</th>
              <th style="text-align:right">ก่อน VAT</th>
              <th style="text-align:right">VAT</th>
              <th style="text-align:right">รวม</th>
            </tr>
          </thead>
          <tbody>
            ${taxRows.map(r => `
              <tr>
                <td>${r.seq}</td>
                <td>${fmtDate(r.bill_date)}</td>
                <td style="font-family:var(--mono);color:var(--text)">${r.bill_no||''}</td>
                ${kind==='pp'?`<td class="text-xs">${r.ref_doc||''}</td>`:''}
                <td class="truncate" style="max-width:220px" title="${r.customer||r.supplier||''}">${r.customer||r.supplier||''}</td>
                <td class="text-xs">${r.tax_id||''}</td>
                <td style="text-align:right">฿${fmtNum(r.amount)}</td>
                <td style="text-align:right;color:var(--purple)">฿${fmtNum(r.vat)}</td>
                <td style="text-align:right;font-weight:600">฿${fmtNum(r.total)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ── Export to XLSX ──
function exportReconReport(data, kind) {
  if (!data || !data.merged) { toast('ไม่มีข้อมูล', 'error'); return; }
  const wb = XLSX.utils.book_new();
  
  // Sheet: VAT
  if (data.taxBills && data.taxBills.length) {
    const vatRows = [];
    vatRows.push(['#','วันที่','เลขที่บิล', kind==='pp'?'ref_doc':'', kind==='sp'?'ลูกค้า':'เจ้าหนี้','เลขภาษี','สาขา','ก่อน VAT','VAT','ยกเว้น','รวม']);
    data.taxBills.forEach(r => {
      vatRows.push([r.seq, r.bill_date, r.bill_no, kind==='pp'?(r.ref_doc||''):'', r.customer||r.supplier||'', r.tax_id, r.branch, r.amount, r.vat, r.novat, r.total]);
    });
    const ws = XLSX.utils.aoa_to_sheet(vatRows);
    XLSX.utils.book_append_sheet(wb, ws, 'VAT');
  }
  
  // Sheet: Main
  const mainRows = [['#','VAT?','เลขเอกสาร','วันที่','คู่ค้า','จำนวนเงิน','หมายเหตุ']];
  let seq = 0;
  data.merged.forEach(p => {
    mainRows.push([++seq, '', p.no, p.date, p.customer||'', p.amount_net, '']);
    p.bills.forEach(b => {
      mainRows.push([++seq, b.is_vat?'Y':'N', b.bill_no, b.bill_date, b.ref_no, b.amount, b.type_desc]);
    });
  });
  const ws2 = XLSX.utils.aoa_to_sheet(mainRows);
  XLSX.utils.book_append_sheet(wb, ws2, 'Main');
  
  const fn = `${kind.toUpperCase()}_Recon_${data.imported_at.substring(0,10)}.xlsx`;
  XLSX.writeFile(wb, fn);
  toast(`✅ Export: ${fn}`, 'success');
}

async function renderUsers(el) {
  const res = await api('getUsers');
  const users = res.data || [];

  el.innerHTML = `
    <div class="flex justify-between items-center mb-4">
      <div class="page-title">จัดการผู้ใช้</div>
      <button class="btn btn-primary btn-sm" id="btn-add-user">${ICONS.plus} เพิ่มผู้ใช้</button>
    </div>
    <div class="card-flat">
      <table>
        <thead><tr><th>Username</th><th>ชื่อ</th><th>บทบาท</th><th>สิทธิ์</th><th>สถานะ</th><th></th></tr></thead>
        <tbody>
          ${users.map(u=>`<tr>
            <td style="font-family:var(--mono);color:var(--text)">${u.username}</td>
            <td class="font-semi" style="color:var(--text)">${u.display_name}</td>
            <td><span class="badge ${u.role==='admin'?'badge-purple':'badge-info'}">${u.role}</span></td>
            <td>${(u.permissions||[]).map(p=>`<span class="badge badge-muted">${p}</span>`).join(' ')}</td>
            <td><span class="badge badge-success">${u.status}</span></td>
            <td><button class="btn btn-ghost btn-icon btn-edit-user" data-user='${JSON.stringify(u).replace(/'/g,"&#39;")}' title="แก้ไข">${ICONS.edit}</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="card mt-3">
      <div class="font-semi text-sm text-dim mb-2">หมายเหตุ</div>
      <p class="text-xs text-muted" style="line-height:1.8">
        • Username ที่ขึ้นต้นด้วย 0 เก็บเป็น Plain Text ป้องกันเลข 0 หาย<br>
        • Admin สามารถจัดการสิทธิ์ได้: read, write, delete, manage_users<br>
        • รหัสผ่านเก็บแบบเข้ารหัส (SHA-256 Hash) ใน Sheet users
      </p>
    </div>
  `;
  
  // ── Helper: เปิด modal เพิ่ม/แก้ไข user ──
  function openUserModal(existingUser) {
    const isEdit = !!existingUser;
    // Default ใหม่: role='staff' + ['read','write'] → match pattern DEMO/ระบบเดิม
    // ถ้าใช้ 'user' + ['read'] อย่างเดียว จะไม่เห็นข้อมูล/บันทึกอะไรไม่ได้
    const u = existingUser || { username: '', display_name: '', role: 'staff', permissions: ['read','write'], status: 'active' };
    const allPerms = ['read', 'write', 'delete', 'manage_users'];
    
    openModal(`${isEdit?'✏️ แก้ไข':ICONS.plus+' เพิ่ม'} ผู้ใช้`, `
      <div class="flex-col gap-3">
        <div class="input-group">
          <label>Username ${isEdit?'<span class="text-xs text-dim">(แก้ไม่ได้)</span>':''}</label>
          <input class="input" id="u-username" value="${u.username||''}" ${isEdit?'readonly style="background:rgba(255,255,255,.02)"':''} placeholder="เช่น jake หรือ 0812345678">
        </div>
        ${isEdit ? '' : `
        <div class="input-group">
          <label>รหัสผ่าน</label>
          <input type="password" class="input" id="u-password" placeholder="กรอกรหัสผ่าน" autocomplete="new-password">
        </div>
        `}
        <div class="input-group">
          <label>ชื่อที่แสดง</label>
          <input class="input" id="u-display-name" value="${u.display_name||''}" placeholder="เช่น Jake Thompson">
        </div>
        <div class="flex gap-2">
          <div class="input-group flex-1">
            <label>บทบาท</label>
            <select class="select" id="u-role">
              <option value="staff" ${u.role==='staff'?'selected':''}>staff</option>
              <option value="admin" ${u.role==='admin'?'selected':''}>admin</option>
              <option value="user" ${u.role==='user'?'selected':''}>user</option>
            </select>
          </div>
          ${isEdit ? `
          <div class="input-group flex-1">
            <label>สถานะ</label>
            <select class="select" id="u-status">
              <option value="active" ${u.status==='active'?'selected':''}>active</option>
              <option value="inactive" ${u.status==='inactive'?'selected':''}>inactive</option>
            </select>
          </div>
          ` : '<div class="flex-1"></div>'}
        </div>
        <div class="input-group">
          <label>สิทธิ์ (เลือกได้หลายอัน)</label>
          <div class="flex gap-2 flex-wrap" id="u-perms">
            ${allPerms.map(p => `
              <label class="flex items-center gap-1 text-sm" style="cursor:pointer;padding:4px 8px;background:rgba(255,255,255,.03);border-radius:5px;border:1px solid var(--border)">
                <input type="checkbox" class="u-perm" value="${p}" ${(u.permissions||[]).includes(p)?'checked':''}>
                ${p}
              </label>
            `).join('')}
          </div>
        </div>
        ${isEdit?'<div class="text-xs text-dim" style="padding:6px 10px;background:rgba(244,180,26,.08);border-radius:5px">💡 รหัสผ่านแก้ไม่ได้จาก UI — หากต้องการ reset ให้ลบ user แล้วสร้างใหม่</div>':''}
        <div class="flex gap-2 mt-2">
          <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
          ${isEdit?'<button class="btn btn-ghost btn-sm" id="u-delete" style="color:var(--danger);border:1px solid var(--danger)">ลบ</button>':''}
          <button class="btn btn-primary btn-sm flex-1" id="u-save">${ICONS.check} ${isEdit?'บันทึก':'เพิ่มผู้ใช้'}</button>
        </div>
      </div>
    `);
    
    document.getElementById('u-save')?.addEventListener('click', async () => {
      const username = document.getElementById('u-username').value.trim();
      const passwordEl = document.getElementById('u-password');
      const password = passwordEl ? passwordEl.value : '';
      const display_name = document.getElementById('u-display-name').value.trim();
      const role = document.getElementById('u-role').value;
      const statusEl = document.getElementById('u-status');
      const status = statusEl ? statusEl.value : 'active';
      const permissions = Array.from(document.querySelectorAll('.u-perm:checked')).map(c => c.value);
      
      if (!username) { toast('กรอก Username', 'error'); return; }
      if (!isEdit && !password) { toast('กรอกรหัสผ่าน', 'error'); return; }
      if (!display_name) { toast('กรอกชื่อที่แสดง', 'error'); return; }
      
      const btn = document.getElementById('u-save');
      btn.disabled = true;
      btn.textContent = 'กำลังบันทึก...';
      
      try {
        let payload, action;
        if (isEdit) {
          // updateUser ใน backend ใช้ user_id เป็น key (ไม่ใช่ username)
          payload = { user_id: u.user_id, display_name, role, status, permissions };
          action = 'updateUser';
        } else {
          // createUser: username + password บังคับ
          payload = { username, password, display_name, role, permissions };
          action = 'createUser';
        }
        const result = await api(action, payload);
        if (result?.success === false || result?.error) {
          throw new Error(result.message || result.error || 'ไม่สำเร็จ');
        }
        closeModal();
        toast(`✓ ${isEdit?'อัปเดต':'เพิ่ม'} ${username} แล้ว`, 'success');
        renderUsers(el); // reload
      } catch(err) {
        toast('ไม่สำเร็จ: ' + (err.message || err), 'error');
        btn.disabled = false;
        btn.textContent = (isEdit?'บันทึก':'เพิ่มผู้ใช้');
      }
    });
    
    // Delete (edit mode only)
    document.getElementById('u-delete')?.addEventListener('click', async () => {
      if (!confirm(`ลบผู้ใช้ "${u.username}"?\nลบแล้วกู้คืนไม่ได้`)) return;
      const btn = document.getElementById('u-delete');
      btn.disabled = true;
      try {
        // deleteUser ใน backend ใช้ user_id เป็น key
        const result = await api('deleteUser', { user_id: u.user_id });
        if (result?.success === false || result?.error) {
          throw new Error(result.message || result.error || 'ไม่สำเร็จ');
        }
        closeModal();
        toast(`ลบ ${u.username} แล้ว`, 'success');
        renderUsers(el);
      } catch(err) {
        toast('ลบไม่สำเร็จ: ' + (err.message || err), 'error');
        btn.disabled = false;
      }
    });
  }
  
  // ── Handlers ──
  document.getElementById('btn-add-user')?.addEventListener('click', () => openUserModal(null));
  el.querySelectorAll('.btn-edit-user').forEach(btn => {
    btn.addEventListener('click', () => {
      try {
        const u = JSON.parse(btn.dataset.user.replace(/&#39;/g, "'"));
        openUserModal(u);
      } catch(err) {
        toast('ข้อมูลผู้ใช้ไม่ถูกต้อง', 'error');
      }
    });
  });
}

  await restoreMainState();
  checkSavedLogin();
})();
