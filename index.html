// Transfer Log Page — 2026_รายการโอนเงิน_JKN.xlsx
// เชื่อมกับ Supplier Payments + Statement + PP Report
// 
// Sheets:
//   Vat:            รายการโอน VAT (313 rows) - โอนจาก KBANK/BBL/SCB/K PLUS SME
//   NoVat:          รายการโอน NOVAT (92 rows) - โอนจาก BBL NW
//   DropdownVat:    Master Supplier VAT
//   DropdownNoVat:  Master Supplier NOVAT
//   ตรวจ YYYY-MM:   Cross-check กับ PP จาก Smart
// ══════════════════════════════════════════════════════════════

// Parse sheet "Vat" หรือ "NoVat" 
function parseTransferSheet(sheet, isVat) {
  const records = [];
  if (!sheet || sheet.length < 3) return records;
  
  // Header row = row index 2 (row 3 in Excel)
  // Columns (1-indexed within parsed array, but we use 0-indexed):
  //   0: ลำดับที่
  //   1: วันที่จ่าย
  //   2: ประเภท (ต้นทุน/ค่าใช้จ่าย)
  //   3: ชื่อเรียก
  //   4: ชื่อบริษัท (Vat) หรือ ชื่อบัญชี (NoVat)
  //   5: บัญชีธนาคาร (Vat: ธนาคาร; NoVat: ชื่อธนาคารที่บัญชีนั้นอยู่)
  //   6: เลขที่บัญชี
  //   7: เลขที่ใบวางบิล
  //   8: เลขที่ใบเสร็จ
  //   9: ยอดตามใบแจ้งยอด
  //   10-12: หัก (ค่าขนส่ง/เคลม/อื่นๆ or โปรโมชั่น)
  //   13: หักรวม
  //   14: ยอดจ่าย
  //   15: โอนจาก
  
  for (let i = 0; i < sheet.length; i++) {
    const r = sheet[i] || [];
    const c0 = r[0]; // ลำดับ column 2 in Excel (B)
    const c1 = r[1]; // วันที่จ่าย
    
    // Skip header rows (look for valid number in col 0)
    if (c0 === null || c0 === undefined || c0 === '') continue;
    if (typeof c0 !== 'number' && !/^\d+$/.test(String(c0).trim())) continue;
    if (!c1) continue; // no date → skip
    
    const amount = Number(r[13]) || Number(r[9]) || 0; // ยอดจ่าย or fallback ยอดแจ้ง
    if (amount <= 0) continue;
    
    records.push({
      id: (isVat ? 'TV-' : 'TN-') + Date.now() + '-' + i,
      seq: Number(c0) || 0,
      transfer_date: fmtDate(c1) || '',
      category: String(r[2] || '').trim(), // ต้นทุน / ค่าใช้จ่าย
      nickname: String(r[3] || '').trim(),
      supplier_name: String(r[4] || '').trim(),
      supplier_bank: String(r[5] || '').trim(),
      supplier_account: String(r[6] || '').trim(),
      invoice_no: String(r[7] || '').trim(),
      receipt_no: String(r[8] || '').trim(),
      amount_billed: Number(r[9]) || 0,
      deduct_shipping: Number(r[10]) || 0,
      deduct_claim: Number(r[11]) || 0,
      deduct_other: Number(r[12]) || 0,
      deduct_total: Number(r[13]) || 0,
      amount: Number(r[14]) || amount, // ยอดจ่ายจริง
      from_bank: String(r[15] || '').trim(), // K PLUS SME JKN / BBL / SCB / BBL NW
      vat: isVat ? 'VAT' : 'NOVAT',
      pp_no: '', // รอ match จาก ตรวจ YYYY-MM
      match_status: 'pending', // pending / matched (กับ PP) / stmt_matched (กับ Statement)
      stmt_ref: '',
    });
  }
  
  return records;
}

// Parse Dropdown sheet → Master Supplier list
function parseDropdownSheet(sheet, isVat) {
  const records = [];
  if (!sheet || sheet.length < 3) return records;
  
  // Header at row index 1: col 1=ลำดับ, 2=ชื่อเรียก, 3=ชื่อบริษัท/ชื่อบัญชี, 4=ธนาคาร, 5=เลขที่บัญชี
  for (let i = 2; i < sheet.length; i++) {
    const r = sheet[i] || [];
    const nickname = String(r[2] || '').trim();
    const company = String(r[3] || '').trim();
    if (!nickname && !company) continue;
    
    records.push({
      id: (isVat ? 'SV-' : 'SN-') + i,
      seq: Number(r[1]) || 0,
      nickname: nickname,
      name: company,
      bank: String(r[4] || '').trim(),
      account_no: String(r[5] || '').trim(),
      note: String(r[6] || '').trim(),
      vat: isVat ? 'VAT' : 'NOVAT',
    });
  }
  return records;
}

// Parse ตรวจ YYYY-MM sheet → cross-reference กับ PP
function parseMonthlyCheck(sheet) {
  const records = [];
  if (!sheet || sheet.length < 4) return records;
  
  // Header at row 2 (index 2):
  //   col 1=วันที่จ่าย, 2=ชื่อเรียก, 3=ชื่อบริษัท, 4=เลขที่ใบวางบิล,
  //   5=ยอดจ่าย, 6=โอนจาก, 7=Diff, 8=เลขที่เอกสาร (PP), 9=วันที่เอกสารขาย, 10=วันที่รับ, 11=ยอด
  
  for (let i = 3; i < sheet.length; i++) {
    const r = sheet[i] || [];
    if (!r[1]) continue; // no date
    
    const ppNo = String(r[7] || '').trim();
    const amount = Number(r[4]) || 0;
    
    records.push({
      transfer_date: fmtDate(r[1]) || '',
      nickname: String(r[2] || '').trim(),
      supplier_name: String(r[3] || '').trim(),
      invoice_no: String(r[4] || '').trim(),
      amount_paid: Number(r[5]) || 0,
      from_bank: String(r[6] || '').trim(),
      diff: Number(r[7]) || 0,
      pp_no: ppNo,
      pp_ref: String(r[9] || '').trim(), // (AP-XXX) name
      receive_date: fmtDate(r[10]) || '',
      amount_pp: Number(r[11]) || 0,
      note: String(r[12] || '').trim(),
    });
  }
  return records;
}

  let dateTo = '';

    if (tab === 'suppliers') return renderSuppliersTab();
    if (tab === 'checks') return renderChecksTab();
    renderTransfersTab();

  function renderTransfersTab() {
    let data = [
      ...transferLog.vatTransfers,
      ...transferLog.novatTransfers,

    if (filterBank !== 'ALL') data = data.filter(t => t.from_bank === filterBank);

    if (dateFrom || dateTo) {
      data = data.filter(t => {
        const d = toISODate(t.transfer_date);

        if (dateTo && d > dateTo) return false;

  function attachCommonHandlers() {
    el.querySelectorAll('.pill[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => { tab = btn.dataset.tab; render(); });
    });
    document.getElementById('btn-tl-import')?.addEventListener('click', () => openImportModal());
    
    // Import JSON (converted offline)
    document.getElementById('btn-tl-import-json')?.addEventListener('change', async e => {
      const f = e.target.files[0];
      if (!f) return;
      try {
        const text = await f.text();
        const data = JSON.parse(text);
        
        // Validate structure
        if (!Array.isArray(data.vatTransfers) || !Array.isArray(data.novatTransfers)) {
          toast('ไฟล์ JSON ไม่ถูก format (ต้องมี vatTransfers, novatTransfers, ...)', 'error');
          return;
        }
        
        if (!confirm(`จะ Import:
• VAT Transfers: ${data.vatTransfers?.length||0}
• NoVAT Transfers: ${data.novatTransfers?.length||0}
• Supplier VAT: ${data.vatSuppliers?.length||0}
• Supplier NoVAT: ${data.novatSuppliers?.length||0}
• ตรวจ: ${Object.keys(data.monthlyChecks||{}).length} เดือน

*ข้อมูลเดิมจะถูกแทนที่*`)) return;
        
        transferLog.vatTransfers = data.vatTransfers || [];
        transferLog.novatTransfers = data.novatTransfers || [];
        transferLog.vatSuppliers = data.vatSuppliers || [];
        transferLog.novatSuppliers = data.novatSuppliers || [];
        transferLog.monthlyChecks = data.monthlyChecks || {};
        
        // Auto-link transfers กับ PP จาก monthlyChecks (invoice_no + amount)
        const checksByKey = {};
        Object.values(transferLog.monthlyChecks).forEach(arr => {
          arr.forEach(c => {
            if (c.pp_no && c.invoice_no) {
              checksByKey[`${c.invoice_no}|${Math.round(Number(c.amount_paid))}`] = c.pp_no;
            }
          });
        });
        [...transferLog.vatTransfers, ...transferLog.novatTransfers].forEach(t => {
          const key = `${t.invoice_no}|${Math.round(Number(t.amount))}`;
          if (checksByKey[key]) {
            t.pp_no = checksByKey[key];
            t.match_status = 'matched';
          }
        });
        
        persistMainState();
        const total = (data.vatTransfers?.length||0) + (data.novatTransfers?.length||0);
        toast(`✓ Import JSON สำเร็จ — ${total} รายการ`, 'success');
        render();
      } catch (err) {
        console.error(err);
        toast('Import ไม่สำเร็จ: ' + err.message, 'error');
      }
      e.target.value = '';
    });
    
    document.getElementById('btn-tl-save')?.addEventListener('click', async () => {
      toast('กำลังบันทึก...', 'info');
      const res = await api('saveTransferLog', { data: transferLog });
      if (res.success) toast(`บันทึกสำเร็จ — ${res.data?.total||0} รายการ`, 'success');
      else toast(res.error || 'บันทึกไม่สำเร็จ', 'error');
    });
    document.getElementById('btn-tl-sync')?.addEventListener('click', () => syncToSupplierPayments());
    document.getElementById('btn-tl-clear')?.addEventListener('click', () => {
      if (!confirm('ล้างข้อมูล Transfer Log ทั้งหมด?')) return;
      transferLog = { vatTransfers:[], novatTransfers:[], vatSuppliers:[], novatSuppliers:[], monthlyChecks:{} };
      persistMainState();
      render();
    });
  }

function toISODate(d) {
  if (!d && d !== 0) return '';

  // Date object
  if (d instanceof Date && !isNaN(d)) {
    let y = d.getFullYear();
    if (y > 2400) y -= 543;
    return `${y}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  // Excel serial number
  if (typeof d === 'number' && d > 10000 && d < 80000) {
    const excelEpoch = new Date(1899, 11, 30);
    const dt = new Date(excelEpoch.getTime() + d * 86400000);
    return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  }

  const s = String(d).trim();
  if (!s || s === 'null' || s === 'undefined') return '';

  // yyyy-mm-dd already
  const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) {
    let y = Number(iso[1]); if (y > 2400) y -= 543;
    return `${y}-${iso[2]}-${iso[3]}`;
  }

  // dd/mm/yyyy
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) {
    let y = Number(m[3]); if (y > 2400) y -= 543;
    return `${y}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
  }
  return '';
}

function handleSalesUpload(result, fileName) {
  // ลองหา Main sheet หรือ sheet แรก
  const sheetName = result.sheetNames.find(n => n.toLowerCase().includes('main')) || result.sheetNames[0];
  const sheet = result.sheets[sheetName] || [];

  const rows = [];
  // หา header row (Bill Number)
  let headerRow = -1;
  for (let i = 0; i < Math.min(20, sheet.length); i++) {
    if (sheet[i] && sheet[i].some(c => String(c).includes('Bill Number') || String(c).includes('Bill Date'))) {
      headerRow = i; break;
    }
  }
  if (headerRow === -1) headerRow = 13; // default Main R14 (index 13)

  for (let i = headerRow + 1; i < sheet.length; i++) {
    const r = sheet[i];
    if (!r[1] && !r[4]) continue; // skip empty
    rows.push({
      bill_no: String(r[0]||''), date: String(r[1]||''), station: String(r[2]||''),
      pay_method: String(r[3]||''), amount: Number(r[4])||0, confirmation: String(r[5]||''),
      pay_date: String(r[6]||''), customer: String(r[7]||''),
    });
  }

  uploadedSales = rows;
  toast(`อ่านยอดขายสำเร็จ — ${rows.length} รายการ`, 'success');
  if (currentPage === 'sales') navigateTo('sales');
}

// ── Storage: IndexedDB สำหรับข้อมูลใหญ่ (ไม่มี 5MB limit) ──
const _mem = {};
const IDB_NAME = 'SmartFinanceDB';
const IDB_STORE = 'data';
const IDB_LARGE_KEYS = ['sf_billList','sf_statementsByBank','sf_mainSummary','sf_cashCount'];

let _idb = null;
function openIDB() {
  return new Promise(function(resolve) {
    if (_idb) { resolve(_idb); return; }
    try {
      var req = indexedDB.open(IDB_NAME, 1);
      req.onupgradeneeded = function(e) { e.target.result.createObjectStore(IDB_STORE); };
      req.onsuccess = function(e) { _idb = e.target.result; resolve(_idb); };
      req.onerror = function() { resolve(null); };
    } catch(e) { resolve(null); }
  });
}
function idbGet(key) {
  return new Promise(function(resolve) {
    openIDB().then(function(db) {
      if (!db) { resolve(null); return; }
      try {
        var tx = db.transaction(IDB_STORE, 'readonly');
        var req = tx.objectStore(IDB_STORE).get(key);
        req.onsuccess = function() { resolve(req.result || null); };
        req.onerror = function() { resolve(null); };
      } catch(e) { resolve(null); }
    });
  });
}
function idbSet(key, value) {
  return new Promise(function(resolve) {
    openIDB().then(function(db) {
      if (!db) { resolve(false); return; }
      try {
        var tx = db.transaction(IDB_STORE, 'readwrite');
        tx.objectStore(IDB_STORE).put(value, key);
        tx.oncomplete = function() { resolve(true); };
        tx.onerror = function() { resolve(false); };
      } catch(e) { resolve(false); }
    });
  });
}

const safeStorage = {
  get(k) { try { return localStorage.getItem(k); } catch { return _mem[k] || null; } },
  set(k,v) { 
    if (IDB_LARGE_KEYS.includes(k)) {
      // เก็บใน IndexedDB (async — fire and forget)
      idbSet(k, v);
      // ลบจาก localStorage (ถ้ามี) เพื่อเพิ่มพื้นที่
      try { localStorage.removeItem(k); } catch(e) {}
      return;
    }
    try { localStorage.setItem(k,v); } catch { _mem[k] = v; } 
  },
  del(k) { try { localStorage.removeItem(k); } catch { delete _mem[k]; } },
};

async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const remember = document.getElementById('login-remember').checked;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  errEl.classList.add('hidden');

  if (!username || !password) {
    errEl.textContent = 'กรุณากรอก username และ password';
    errEl.classList.remove('hidden');
    return;
  }

  // Set loading state
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> กำลังเข้าสู่ระบบ...';

  try {
    const res = await api('login', { username, password });
    if (res.success) {
      currentUser = res.data;
      if (remember) safeStorage.set('sf_user', JSON.stringify(currentUser));
      btn.innerHTML = '<span class="spinner"></span> กำลังโหลดระบบ...';
      showApp();
    } else {
      errEl.textContent = res.error || 'ไม่สามารถเข้าสู่ระบบได้';
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = originalText;
    }
  } catch (err) {
    errEl.textContent = 'เกิดข้อผิดพลาด: ' + err.message;
    errEl.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

function showApp() {
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('sidebar-user').textContent = `${currentUser.display_name} (${currentUser.role})`;
  renderNav();
  navigateTo('main');
  // โหลด meta data จาก backend (กันกรณีล้าง localStorage)
  loadMetaFromBackend().catch(err => console.warn('loadMeta failed:', err));
  
  // Hybrid sync: auto-pull ถ้า local ว่าง (เช่น เครื่องใหม่/browser ใหม่)
  // จะ skip อัตโนมัติถ้ามี local data + lastPull ภายใน 30 นาที
  setTimeout(() => {
    if (!syncManager.enabled) return;
    syncManager.pullFromCloud(2, 'auto')
      .then(async r => {
        if (r?.skipped) {
          console.log('[sync] auto-pull skipped:', r.skipped);
          // ⭐ Even if skipped, force-reload meta ในเครื่องใหม่ที่ local summary ว่าง
          //    (pullFromCloud ไม่ handle meta — มี loadMetaFromBackend แยก)
          const hasLocalMeta = mainSummary.__byDate && Object.keys(mainSummary.__byDate).length > 0;
          if (!hasLocalMeta) {
            console.log('[sync] local meta empty → force loadMetaFromBackend');
            await loadMetaFromBackend();
          }
        } else if (r) {
          const total = (r.bills||0) + (r.stmts||0) + (r.payments||0) + (r.cashflow||0);
          
          // ⭐ Auto-pull ไม่ pull meta (mainSummary.__byDate + cashCount) — ต้อง load แยก
          //    หลัง auto-pull เสร็จ reload meta เสมอ (เพื่อให้หน้าเครื่องใหม่ได้ข้อมูล นำเงินเข้า/ขาย/ออก/คืน)
          await loadMetaFromBackend();
          
          if (total > 0) {
            toast(`☁️ Auto-sync: โหลด ${total} รายการใหม่จาก cloud`, 'success', 4000);
            // Refresh current page to show new data
            if (currentPage) navigateTo(currentPage);
          }
        }
      })
      .catch(err => console.warn('[sync] auto-pull failed:', err));
  }, 1500); // delay 1.5s ให้หน้า Main render เสร็จก่อน
  
  // Wire up sync status badge (refresh ทุก 5s หรือเมื่อ syncManager emit)
  const badge = document.getElementById('sync-status-badge');
  if (badge) {
    badge.style.cursor = 'pointer';
    badge.title = 'คลิกซ้าย: sync ทันที · คลิกขวา: เปิด/ปิด sync';
    const update = () => {
      const s = syncManager.statusText();
      badge.textContent = s.text;
      badge.style.color = s.color;
      // เพิ่ม opacity ลดลง + ข้อความเมื่อปิด sync
      badge.style.opacity = syncManager.enabled ? '1' : '0.6';
    };
    update();
    syncManager.onChange(update);
    setInterval(update, 5000); // refresh "X s ago" text
    // Left click: force push now
    badge.onclick = async () => {
      if (!syncManager.enabled) {
        // Badge ถูกปิดอยู่ → ถามว่าจะเปิดมั้ย
        if (confirm('Sync ถูกปิดอยู่ — ต้องการเปิดใช้งาน Sync ไหม?')) {
          syncManager.setEnabled(true);
          toast('เปิด Sync แล้ว', 'success', 2000);
        }
        return;
      }
      if (syncManager.status !== 'idle' && syncManager.status !== 'error') return;
      syncManager.dirty.add('meta'); // ensure something to push
      await syncManager._flushPush();
      toast('Sync สำเร็จ', 'success', 1500);
    };
    // Right click: toggle on/off
    badge.oncontextmenu = (e) => {
      e.preventDefault();
      const nextState = !syncManager.enabled;
      const msg = nextState 
        ? 'เปิด Sync กลับมา?\n\nข้อมูลจะถูก push ขึ้น cloud และ pull จาก cloud อัตโนมัติ'
        : '⏸ ปิด Sync?\n\n• จะหยุด push/pull ทั้งหมด\n• ข้อมูลจะเก็บเฉพาะใน browser (local)\n• กันข้อมูลบวมใน Sheet ถ้ามีปัญหา\n• คลิกขวาที่ปุ่มนี้อีกครั้งเพื่อเปิด';
      if (!confirm(msg)) return;
      
      if (!nextState) {
        // ปิด: ยกเลิก pending push + clear dirty queue ทันที
        if (syncManager.pushTimer) {
          clearTimeout(syncManager.pushTimer);
          syncManager.pushTimer = null;
        }
        syncManager.dirty.clear();
      }
      
      syncManager.setEnabled(nextState);
      toast(nextState ? '✅ เปิด Sync แล้ว' : '⏸ ปิด Sync แล้ว (ข้อมูลอยู่ใน browser เท่านั้น)', 
            nextState ? 'success' : 'warn', 3000);
    };
  }
}

// ── โหลด summary/cash_count/change ย้อนหลังจาก backend → merge เข้า mainSummary, cashCount ──
// เรียกครั้งเดียวหลัง login (กันกรณี localStorage ถูกล้างแต่ backend ยังเก็บอยู่)
async function loadMetaFromBackend() {
  try {
    // โหลดปีปัจจุบัน + ปีที่แล้ว (กันเวลาใช้ข้ามปี)
    // ⭐ ใช้ new schema (meta_uuid + data_json) เท่านั้น — ลบ fallback getDailyMeta ออกแล้ว
    var now = new Date();
    var years = [String(now.getFullYear()), String(now.getFullYear() - 1)];
    
    for (var y of years) {
      var res = await api('getMetaWithUuid', { year: y });
      if (!res || !res.success || !Array.isArray(res.data?.rows)) continue;
      if (typeof window.parseCompactMetaRows !== 'function') continue;
      
      var parsed = window.parseCompactMetaRows(res.data.rows);
      
      // ── Merge summary (backend มี, local ยังไม่มี → copy) ──
      if (parsed.summary && parsed.summary.__byDate) {
        if (!mainSummary.__byDate) mainSummary.__byDate = {};
        Object.keys(parsed.summary.__byDate).forEach(function(dateISO) {
          if (!mainSummary.__byDate[dateISO]) {
            mainSummary.__byDate[dateISO] = parsed.summary.__byDate[dateISO];
          }
        });
      }
      
      // ── Merge cash_count (per-key: in-memory ชนะถ้ามี) ──
      if (parsed.cashCount && parsed.cashCount.__byDate) {
        if (!cashCount.__byDate) cashCount.__byDate = {};
        Object.keys(parsed.cashCount.__byDate).forEach(function(dateISO) {
          if (!cashCount.__byDate[dateISO]) {
            cashCount.__byDate[dateISO] = parsed.cashCount.__byDate[dateISO];
          } else {
            Object.keys(parsed.cashCount.__byDate[dateISO]).forEach(function(k) {
              if (cashCount.__byDate[dateISO][k] == null) {
                cashCount.__byDate[dateISO][k] = parsed.cashCount.__byDate[dateISO][k];
              }
            });
          }
        });
      }
    }
    
    persistMainState();
    // Re-render ถ้าอยู่หน้า Main
    if (typeof currentPage !== 'undefined' && currentPage === 'main') {
      navigateTo('main');
    }
  } catch (err) {
    console.warn('loadMetaFromBackend error:', err);
  }
}

function renderNav() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = NAV_ITEMS.map(item => `
    <button class="nav-item ${currentPage===item.id?'active':''}" onclick="navigateTo('${item.id}')">
      ${ICONS[item.icon]}
      <span class="nav-label">${item.label}</span>
      ${item.badge ? '<span class="badge badge-danger nav-badge">2</span>' : ''}
    </button>
  `).join('');
}

function navigateTo(page) {
  // Backward compat: billlist → main
  if (page === 'billlist') page = 'main';
  currentPage = page;
  renderNav();
  const main = document.getElementById('main');
  main.scrollTop = 0;
  const renderer = PAGE_RENDERERS[page];
  if (renderer) renderer(main);
  else main.innerHTML = `<div class="card"><p class="text-dim">หน้า "${page}" กำลังพัฒนา</p></div>`;
  // Apply dd/mm/yyyy date picker (flatpickr) after render
  setTimeout(applyFlatpickrAll, 100);
}

function formatDateKey(d) { return d ? d.replace(/-/g,'') : todayKey(); }

// ── Dashboard ───────────────────────────────────────────────
// ⭐ Local-first: render immediately from billList/stmts (no await)
// Period selector: today | yesterday | 7d | 30d | this_month | last_month | this_year | custom
async function renderDashboard(el) {
  // ══════════════════════════════════════════════════════════════
  // PERIOD STATE — persistent across re-renders
  // ══════════════════════════════════════════════════════════════
  const PERIOD_STORAGE_KEY = 'sf_dashboard_period';
  let period = safeStorage.get(PERIOD_STORAGE_KEY) || '30d';
  let customFrom = safeStorage.get('sf_dashboard_custom_from') || '';
  let customTo = safeStorage.get('sf_dashboard_custom_to') || '';
  // ⭐ Single-day mode — เก็บวันที่เลือกจาก calendar popup
  let selectedSingleDate = safeStorage.get('sf_dashboard_single_date') || '';
  
  const today = todayISO();
  
  // ── Helpers ──
  function getPeriodRange(p) {
    const now = new Date();
    const iso = (d) => d.toISOString().substring(0, 10);
    switch (p) {
      case 'today': return { from: today, to: today, label: 'วันนี้' };
      case 'yesterday': {
        const y = new Date(now); y.setDate(y.getDate() - 1);
        return { from: iso(y), to: iso(y), label: 'เมื่อวาน' };
      }
      case '7d': {
        const s = new Date(now); s.setDate(s.getDate() - 6);
        return { from: iso(s), to: today, label: '7 วันล่าสุด' };
      }
      case '30d': {
        const s = new Date(now); s.setDate(s.getDate() - 29);
        return { from: iso(s), to: today, label: '30 วันล่าสุด' };
      }
      case 'this_month': {
        const s = new Date(now.getFullYear(), now.getMonth(), 1);
        return { from: iso(s), to: today, label: 'เดือนนี้' };
      }
      case 'last_month': {
        const s = new Date(now.getFullYear(), now.getMonth() - 1, 1);
        const e = new Date(now.getFullYear(), now.getMonth(), 0);
        return { from: iso(s), to: iso(e), label: 'เดือนที่แล้ว' };
      }
      case 'this_year': {
        const s = new Date(now.getFullYear(), 0, 1);
        return { from: iso(s), to: today, label: 'ปีนี้' };
      }
      case 'single': {
        // ⭐ Single day — label เป็นวันที่ไทยเต็ม
        const d = selectedSingleDate || today;
        let label = 'เลือกวัน';
        const dt = new Date(d);
        if (!isNaN(dt)) {
          const thMonths = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
          label = `${dt.getDate()} ${thMonths[dt.getMonth()]} ${dt.getFullYear()}`;
        }
        return { from: d, to: d, label };
      }
      case 'custom': return { from: customFrom, to: customTo, label: 'ช่วงเอง' };
      default: return { from: today, to: today, label: 'วันนี้' };
    }
  }
  
  // ⭐ Sale detection — case-safe
  const INCOME_PREFIXES = ['SS','OS','SP','S2','BS','PC'];
  const CREDIT_PREFIXES = ['SC','JS','JR']; // credit notes (negative)
  const isSaleBill = (b) => {
    const prefix = String(b.bill_no||'').substring(0,2).toUpperCase();
    const station = String(b.station||'');
    return station.startsWith('Front') || INCOME_PREFIXES.includes(prefix);
  };
  
  // ── Range computation (memoized per render) ──
  function computeSalesInRange(from, to) {
    const filtered = billList.filter(b => {
      const bd = toISODate(b.date);
      if (!bd) return false;
      if (from && bd < from) return false;
      if (to && bd > to) return false;
      return true;
    });
    const saleBills = filtered.filter(isSaleBill);
    const total = saleBills.reduce((s,b)=>s + Math.abs(Number(b.amount)||0), 0);
    const byStation = {};
    saleBills.forEach(b => {
      const st = b.station || 'Other';
      if (!byStation[st]) byStation[st] = { total: 0, count: 0 };
      byStation[st].total += Math.abs(Number(b.amount)||0);
      byStation[st].count++;
    });
    return { total, count: saleBills.length, byStation };
  }
  
  // ⭐ Matching — type-safe filter (handle whitespace/case)
  const normalizeType = (t) => String(t||'').trim();
  const matchableBills = billList.filter(b => {
    const t = normalizeType(b.type);
    return t === 'Transfer' || t === 'Card' || t === 'Cheque';
  });
  const matchedBills = matchableBills.filter(b => 
    b.match_status === 'matched' || b.match_status === 'paid' || !!b.matched_stmt_ref
  );
  
  // ⭐ Debt — กว้างขึ้น: Credit station OR credit note prefix OR unmatched credit sale
  const creditBills = billList.filter(b => {
    if (b.match_status === 'paid' || b.match_status === 'matched' || b.match_status === 'void') return false;
    if (b.paid_by_sp) return false;
    const st = String(b.station||'');
    const prefix = String(b.bill_no||'').substring(0,2).toUpperCase();
    return st === 'Invoice Credit' || st === 'Order Credit' || prefix === 'OR' || prefix === 'SR';
  });
  const debtTotal = creditBills.reduce((s,b)=>s + Math.abs(Number(b.amount)||0), 0);
  const debtorKeys = new Set(creditBills.map(b => b.customer_id || b.cust_id || b.remarks1 || '').filter(Boolean));
  const debtorCount = debtorKeys.size || creditBills.length; // fallback if no customer field
  const overdueBills = creditBills.filter(b => b.due_date && toISODate(b.due_date) < today);
  
  // ⭐ Period-based sales
  const range = getPeriodRange(period);
  const salesRange = computeSalesInRange(range.from, range.to);
  
  const sales = { total: salesRange.total, count: salesRange.count, by_station: salesRange.byStation };
  const matching = { matched: matchedBills.length, total: matchableBills.length };
  const debt = { total: debtTotal, debtors: debtorCount, overdue: overdueBills.length };
  const stationEntries = Object.entries(sales.by_station).sort((a,b) => b[1].total - a[1].total);
  const maxStation = Math.max(...stationEntries.map(([,v])=>v.total), 1);
  
  // ── คำนวณ Unmatched Summary ──
  const unmatchedBillsTransfer = billList.filter(b => {
    const t = normalizeType(b.type);
    return (t === 'Transfer' || t === 'Card') && 
           b.match_status !== 'matched' && b.match_status !== 'paid' &&
           !b.matched_stmt_ref &&
           b.station !== 'Invoice Credit' && b.station !== 'Order Credit';
  });
  const chequesAwaitingClear = billList.filter(b => 
    normalizeType(b.type) === 'Cheque' && 
    b.match_status !== 'matched' && b.match_status !== 'bounced' && b.match_status !== 'paid' &&
    !b.matched_stmt_ref
  );
  const chequesOverdue = chequesAwaitingClear.filter(b => b.expected_clear_date && toISODate(b.expected_clear_date) < today);
  const unmatchedStmts = getAllStatements().filter(s => s.match_status !== 'matched');
  const cashflowPending = (cashflowList||[]).filter(c => c.match_status !== 'matched' && (c.type === 'deposit' || c.type === 'supplier' || c.type === 'transfer'));
  const supplierPendingPay = (supplierPayments||[]).filter(p => p.status === 'pending' || p.status === 'scheduled');
  const supplierUnmatched = (supplierPayments||[]).filter(p => p.status === 'paid' && p.match_status !== 'matched');
  const transferLogTotal = (transferLog.vatTransfers||[]).length + (transferLog.novatTransfers||[]).length;
  const transferLogNoPP = [...(transferLog.vatTransfers||[]), ...(transferLog.novatTransfers||[])].filter(t => !t.pp_no).length;
  
  const totalUnmatched = unmatchedBillsTransfer.length + chequesAwaitingClear.length + unmatchedStmts.length + cashflowPending.length + supplierPendingPay.length + supplierUnmatched.length + transferLogNoPP;
  const alerts = []; // populate after background fetch
  
  // ── Build period selector pills ──
  const PERIODS = [
    { key: 'today', label: 'วันนี้' },
    { key: 'yesterday', label: 'เมื่อวาน' },
    { key: '7d', label: '7 วัน' },
    { key: '30d', label: '30 วัน' },
    { key: 'this_month', label: 'เดือนนี้' },
    { key: 'last_month', label: 'เดือนก่อน' },
    { key: 'this_year', label: 'ปีนี้' },
    { key: 'single', label: period === 'single' ? `📅 ${range.label}` : '📅 เลือกวัน' },
    { key: 'custom', label: 'ช่วงเอง' },
  ];
  const periodPillsHtml = PERIODS.map(p => 
    `<button class="pill dash-period-btn ${period===p.key?'active':''}" data-period="${p.key}">${p.label}</button>`
  ).join('');

  el.innerHTML = `
    <div class="flex justify-between items-center mb-4" style="flex-wrap:wrap;gap:10px">
      <div class="page-title" style="margin:0">แดชบอร์ด</div>
      <div class="text-xs text-dim">อัปเดต ${fmtDate(new Date())}</div>
    </div>
    
    <!-- Quick Actions -->
    <div class="flex gap-2 flex-wrap mb-4">
      <button class="btn btn-success btn-sm" onclick="openQuickPaymentModal()" style="background:var(--success);color:#fff">💰 รับชำระเร็ว</button>
      <button class="btn btn-primary btn-sm" onclick="navigateTo('cashflow');setTimeout(()=>document.getElementById('btn-add-deposit')?.click(),200)">🏦 ฝากเงิน</button>
      <button class="btn btn-outline btn-sm" onclick="navigateTo('supplier');setTimeout(()=>document.getElementById('btn-add-payment')?.click(),200)" style="color:var(--danger);border-color:var(--danger)">🏭 จ่ายเจ้าหนี้</button>
      <button class="btn btn-outline btn-sm" onclick="navigateTo('main')">📊 หน้า Main</button>
      <button class="btn btn-outline btn-sm" onclick="navigateTo('matching')">🔍 Matching</button>
    </div>
    
    <!-- ⭐ Period selector -->
    <div class="card mb-4" style="padding:12px 14px">
      <div class="flex justify-between items-center mb-2" style="flex-wrap:wrap;gap:8px">
        <div class="font-semi">ยอดขาย — <span style="color:var(--info)">${range.label}</span>
          ${range.from === range.to ? `<span class="text-xs text-muted">(${fmtDate(range.from)})</span>` : `<span class="text-xs text-muted">(${fmtDate(range.from)} → ${fmtDate(range.to)})</span>`}
        </div>
        <div class="text-xs text-dim">${sales.count} รายการ · <b style="color:var(--success);font-size:1rem">฿${fmtNum(sales.total)}</b></div>
      </div>
      <div class="flex gap-1 flex-wrap" id="dash-period-pills" style="position:relative">
        ${periodPillsHtml}
        <div id="dash-date-popup" style="display:none"></div>
      </div>
      <div id="dash-custom-range" style="margin-top:8px;${period==='custom'?'':'display:none'}">
        <div class="flex gap-2 items-center flex-wrap">
          <span class="text-xs text-dim">จาก:</span>
          <input type="date" id="dash-custom-from" value="${customFrom}" class="input" style="padding:4px 8px;font-size:.8rem;max-width:150px">
          <span class="text-xs text-dim">ถึง:</span>
          <input type="date" id="dash-custom-to" value="${customTo}" class="input" style="padding:4px 8px;font-size:.8rem;max-width:150px">
          <button class="btn btn-primary btn-xs" id="dash-custom-apply" style="padding:4px 12px;font-size:.75rem">ตกลง</button>
        </div>

    </div>
    
    <div class="flex gap-3 flex-wrap mb-4 stagger">

      ${statCard('ยอดหนี้คงค้าง', '฿'+fmtNum(debt.total||0), debt.debtors+' ราย', 'var(--warn)', ICONS.card)}
      ${statCard('เกินกำหนด', debt.overdue||0, 'ต้องดำเนินการ', 'var(--danger)', ICONS.alert)}
      ${statCard('Matched', (matching.matched||0)+'/'+(matching.total||0), 'Transfer/Card/Cheque', 'var(--info)', ICONS.pulse)}
    </div>
    
    ${totalUnmatched > 0 ? `

        <div class="flex justify-between items-center mb-3">
          <div class="font-semi">⚠️ รายการที่ต้องติดตาม</div>
          <span class="badge badge-warn">${totalUnmatched} รายการ</span>
        </div>
        <div class="flex gap-3 flex-wrap">
          ${unmatchedBillsTransfer.length > 0 ? `
            <div style="padding:12px;background:rgba(245,166,35,.08);border-radius:8px;min-width:200px;flex:1;cursor:pointer" onclick="openPendingBillsModal('transfer')" title="คลิกเพื่อดูรายการ">
              <div class="text-xs text-dim">บิลโอน/บัตรรอ Match</div>
              <div style="font-size:1.4rem;font-weight:700;color:var(--warn)">${unmatchedBillsTransfer.length}</div>
              <div class="text-xs text-muted">฿${fmtNum(unmatchedBillsTransfer.reduce((s,b)=>s+Number(b.amount||0),0))}</div>
            </div>
          ` : ''}
          ${chequesAwaitingClear.length > 0 ? `
            <div style="padding:12px;background:rgba(245,166,35,.08);border-radius:8px;min-width:200px;flex:1;cursor:pointer" onclick="openPendingBillsModal('cheque')" title="คลิกเพื่อดูรายการ">
              <div class="text-xs text-dim">เช็ครอเคลียร์</div>
              <div style="font-size:1.4rem;font-weight:700;color:var(--warn)">${chequesAwaitingClear.length}</div>
              <div class="text-xs text-muted">
                ฿${fmtNum(chequesAwaitingClear.reduce((s,b)=>s+Number(b.amount||0),0))}
                ${chequesOverdue.length > 0 ? ` · <span style="color:var(--danger)">เลยวัน ${chequesOverdue.length}</span>` : ''}
              </div>
            </div>
          ` : ''}
          ${unmatchedStmts.length > 0 ? `
            <div style="padding:12px;background:rgba(239,87,87,.08);border-radius:8px;min-width:200px;flex:1;cursor:pointer" onclick="navigateTo('matching')">

              <div style="font-size:1.4rem;font-weight:700;color:var(--danger)">${unmatchedStmts.length}</div>
              <div class="text-xs text-muted">฿${fmtNum(unmatchedStmts.reduce((s,x)=>s+Number(x.amount||0),0))}</div>
            </div>
          ` : ''}
          ${cashflowPending.length > 0 ? `
            <div style="padding:12px;background:rgba(79,156,249,.08);border-radius:8px;min-width:200px;flex:1;cursor:pointer" onclick="navigateTo('cashflow')">
              <div class="text-xs text-dim">เงินเข้า-ออก รอ Match</div>
              <div style="font-size:1.4rem;font-weight:700;color:var(--info)">${cashflowPending.length}</div>

    for (let i = 0; i < startOffset; i++) cellsHtml += `<div></div>`;

      const iso = `${py}-${String(pm).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const isSelected = iso === baseIso;
      const isToday = iso === today;

      const dow = new Date(py, pm - 1, day).getDay();

      else if (!hasData) { color = 'var(--text2)'; }
      
      const dotColor = isSelected ? '#fff' : (hasData ? 'var(--success)' : 'transparent');
      const todayRing = isToday && !isSelected ? 'box-shadow:inset 0 0 0 1.5px var(--primary);' : '';
      
      cellsHtml += `<button class="dash-dp-day" data-iso="${iso}" style="

        font-size:.9rem;font-weight:${fontWeight};font-variant-numeric:tabular-nums;${todayRing}
        transition:background .12s">

          <span style="display:flex;align-items:center;gap:4px">

    popup.querySelectorAll('.dash-dp-day').forEach(btn => {

  (async () => {
    try {
      const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 6000));
      const res = await Promise.race([api('getDashboard'), timeout]);
      if (!res?.success || !res.data) return;
      const d = res.data;
      
      // Update debt stat card (reserved for future — backend debt may be more accurate)
      // Currently we trust local compute
      
      // Update alerts panel

      if (alertsContainer) {
        const list = Array.isArray(d.recent_alerts) ? d.recent_alerts : [];
        if (list.length === 0) {

              <span class="text-xs text-muted">${a.action_at||''}</span>
            </div>
          `).join('');
        }
      }
    } catch(e) {
      const alertsContainer = document.getElementById('dash-alerts-container');
      if (alertsContainer && alertsContainer.innerHTML.includes('กำลังโหลด')) {
        alertsContainer.innerHTML = `<div class="text-sm text-muted" style="padding:12px 0;text-align:center">ไม่สามารถโหลดแจ้งเตือนได้</div>`;
      }
      console.log('[dashboard] background fetch skipped:', e.message);
    }
  })();
}

// ⭐ Open modal showing pending bills (cheque or transfer/card) with action buttons
// kind = 'cheque' | 'transfer'
// ⭐ Phase A: Auto-link bills (SR/SC/OR/JR) to customers by exact name match
// Scans billList, matches remarks1 → customers.cust_name (exact), sets cust_id
// Updates remarks1 format to "(cust_id) cust_name"
// Returns: { matched, skipped, notFound: [remarks_strings] }
window.autoLinkBillsToCustomers = async function(opts = {}) {
  const { dryRun = false } = opts;
  
  // Ensure customerList loaded
  if (!Array.isArray(customerList) || customerList.length === 0) {
    try {
      const res = await api('getCustomers', {});
      if (res?.success && Array.isArray(res.data)) customerList = res.data;
    } catch(e) {
      return { error: 'โหลดรายชื่อลูกค้าไม่ได้: ' + e.message };
    }
  }
  if (!customerList.length) return { error: 'ไม่มีข้อมูลลูกค้า' };
  
  // Build name → customer lookup (keep first occurrence; dedup by cust_id ก่อนแล้วค่อย map)
  // คำนวณชื่อ normalize (trim + ลบช่องว่างซ้ำ) เพื่อลด false-miss
  const normalize = (s) => String(s||'').replace(/\s+/g, ' ').trim();
  const nameToCust = {};
  customerList.forEach(c => {
    const k = normalize(c.cust_name);
    if (k && !nameToCust[k]) nameToCust[k] = c;
  });
  
  // Target prefixes (user explicit): SR, SC, OR, JR — ไม่รวม SP, SS, OS, JS
  const TARGET_PREFIXES = ['SR','SC','OR','JR'];
  
  let matched = 0, alreadyLinked = 0, noRemarks = 0;
  const notFoundMap = {};  // normalized remarks → count
  const updatedBills = []; // เก็บ reference เพื่อ markDirty
  
  billList.forEach(b => {
    const prefix = String(b.bill_no || '').substring(0, 2).toUpperCase();
    if (!TARGET_PREFIXES.includes(prefix)) return;
    
    // Skip ถ้า linked อยู่แล้ว
    if (b.cust_id) { alreadyLinked++; return; }
    
    const remarks = normalize(b.remarks1);
    if (!remarks) { noRemarks++; return; }
    
    // Extract name ถ้า remarks1 มี format "(CODE) ชื่อ" อยู่แล้ว
    let nameToLookup = remarks;
    const m = remarks.match(/^\(([^)]+)\)\s*(.+)$/);
    if (m) nameToLookup = normalize(m[2]);
    
    const cust = nameToCust[nameToLookup];
    if (cust) {
      if (!dryRun) {
        b.cust_id = cust.cust_id;
        b.customer = cust.cust_name;
        // Update remarks1 to "(cust_id) cust_name" format
        if (!m) b.remarks1 = `(${cust.cust_id}) ${cust.cust_name}`;
        updatedBills.push(b);
      }
      matched++;
    } else {
      notFoundMap[nameToLookup] = (notFoundMap[nameToLookup] || 0) + 1;
    }
  });
  
  const notFound = Object.entries(notFoundMap)
    .sort((a,b) => b[1]-a[1])
    .map(([name, count]) => ({ name, count }));
  
  if (!dryRun && matched > 0) {
    persistMainState();
    syncManager.markDirty('bills');
    invalidateBillsCache?.();
  }
  
  return { matched, alreadyLinked, noRemarks, notFound, totalScanned: updatedBills.length + alreadyLinked + noRemarks + notFound.reduce((s,x)=>s+x.count, 0) };
};

            <div class="text-sm text-muted" style="padding:10px;text-align:center;flex:1">ไม่มีบิลให้ link — ทุกบิลที่ตรงชื่อถูก link หมดแล้ว</div>
          `}
        </div>
      </div>
    `;
    
    document.getElementById('autolink-apply')?.addEventListener('click', async () => {
      const btn = document.getElementById('autolink-apply');
      if (btn) { btn.disabled = true; btn.textContent = '⏳ กำลังอัปเดต...'; }
      const result = await window.autoLinkBillsToCustomers({ dryRun: false });
      toast(`✓ Link สำเร็จ ${result.matched} บิล — กำลัง sync ไป cloud...`, 'success', 4000);
      closeModal();
      // Trigger sync push
      setTimeout(() => syncManager._flushPush?.(), 500);
    });
  }, 100);
};

window.openPendingBillsModal = function(kind) {
  const today = todayISO();
  let bills, title, subtitle;
  
  if (kind === 'cheque') {
    bills = billList.filter(b => 
      b.type === 'Cheque' && 
      b.match_status !== 'matched' && b.match_status !== 'bounced' && b.match_status !== 'paid' &&
      !b.matched_stmt_ref
    );
    title = '📄 เช็ครอเคลียร์';
    subtitle = 'เช็คที่ฝากแล้วรอเข้าบัญชี หรือยังไม่ได้ดำเนินการ';
  } else {
    bills = billList.filter(b => 
      (b.type === 'Transfer' || b.type === 'Card') && 
      b.match_status !== 'matched' && b.match_status !== 'paid' &&
      b.station !== 'Invoice Credit' && b.station !== 'Order Credit' &&
      !b.matched_stmt_ref
    );
    title = '💳 บิลโอน/บัตรรอ Match';
    subtitle = 'บิลที่ลูกค้าโอนเงิน/รูดบัตร แต่ยังไม่ได้ match กับ statement';
  }
  
  // Sort: overdue ก่อน, แล้วเรียงวันที่เก่าก่อน
  bills.sort((a, b) => {
    const aDate = toISODate(a.expected_clear_date || a.date) || '';
    const bDate = toISODate(b.expected_clear_date || b.date) || '';
    return aDate.localeCompare(bDate);
  });
  
  if (bills.length === 0) {
    openModal(title, `<div style="padding:40px;text-align:center;color:var(--text2)">✓ ไม่มีรายการที่ต้องติดตาม</div>`);
    return;
  }
  
  const totalAmt = bills.reduce((s,b)=>s + Math.abs(Number(b.amount)||0), 0);
  
  const rowsHtml = bills.map((b, i) => {
    const amt = Math.abs(Number(b.amount)||0);
    const bDate = toISODate(b.date);
    const clearDate = b.expected_clear_date ? toISODate(b.expected_clear_date) : null;
    const isOverdue = clearDate && clearDate < today;
    const daysOver = isOverdue ? Math.floor((new Date(today) - new Date(clearDate)) / 86400000) : 0;
    
    let statusBadge = '';
    if (kind === 'cheque') {
      if (b.match_status === 'awaiting_clear') {
        statusBadge = isOverdue 
          ? `<span class="badge badge-danger" style="font-size:.65rem">⏰ เลยกำหนด ${daysOver} วัน</span>`
          : `<span class="badge badge-warn" style="font-size:.65rem">⏳ รอเคลียร์</span>`;
      } else {
        statusBadge = `<span class="badge" style="background:var(--surface2);font-size:.65rem">ยังไม่ฝาก</span>`;
      }
    } else {
      statusBadge = `<span class="badge" style="background:var(--surface2);font-size:.65rem">${b.type||''}</span>`;
    }
    
    return `
      <div class="pending-row" data-bill-idx="${i}" style="padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .12s" onmouseenter="this.style.background='var(--bg2)'" onmouseleave="this.style.background=''">
        <div style="flex:1;min-width:0;font-size:.85rem">
          <div class="flex items-center gap-2" style="flex-wrap:wrap;margin-bottom:2px">
            <span style="font-weight:600;font-family:var(--mono)">${b.bill_no || '(ไม่มีเลข)'}</span>
            ${statusBadge}
            ${b.station ? `<span class="badge" style="background:var(--surface2);font-size:.65rem">${b.station}</span>` : ''}
            ${b.bank ? `<span class="badge badge-info" style="font-size:.65rem">${b.bank}</span>` : ''}
          </div>
          <div class="text-xs text-muted">
            ${fmtDate(b.date)}
            ${clearDate ? ` · คาดเข้า ${fmtDate(b.expected_clear_date)}` : ''}
            ${b.remarks1 ? ` · ${String(b.remarks1).substring(0,50)}` : ''}
          </div>
        </div>
        <div style="text-align:right;white-space:nowrap">
          <div style="font-weight:700;color:var(--success);font-size:.95rem">฿${fmtNum(amt)}</div>
          <button class="btn btn-primary btn-xs pending-match-btn" data-bill-idx="${i}" style="margin-top:4px;font-size:.7rem;padding:3px 10px">
            🔗 Match
          </button>
        </div>
      </div>
    `;
  }).join('');
  
  openModal(title, `
    <div style="min-width:600px;max-width:750px">
      <div style="padding:10px 12px;background:var(--bg2);border-radius:6px;margin-bottom:10px;font-size:.85rem">
        <div class="flex justify-between items-center">
          <div style="color:var(--text2)">${subtitle}</div>
          <div><b>${bills.length}</b> รายการ · <b style="color:var(--warn)">฿${fmtNum(totalAmt)}</b></div>
        </div>
      </div>
      <div style="max-height:450px;overflow-y:auto;border:1px solid var(--border);border-radius:6px">
        ${rowsHtml}
      </div>
      <div class="flex gap-2 mt-3">
        <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ปิด</button>
      </div>
    </div>
  `);
  
  // Wire click handlers
  document.querySelectorAll('.pending-match-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = Number(btn.dataset.billIdx);
      const bill = bills[idx];
      if (!bill) return;
      closeModal();
      // จอง selectedDate เป็นวันของบิลนี้ ก่อน navigate
      const bd = toISODate(bill.date);
      if (bd) window.__mainSelectedDate = bd;
      navigateTo('main');
      // เปิด Quick Match modal หลัง main render เสร็จ
      setTimeout(() => {
        if (typeof openQuickMatchModal === 'function') {
          openQuickMatchModal(bill);
        }
      }, 300);
    });
  });
  // Click row = edit bill
  document.querySelectorAll('.pending-row').forEach(row => {
    row.addEventListener('click', (e) => {
      if (e.target.closest('.pending-match-btn')) return;
      const idx = Number(row.dataset.billIdx);
      const bill = bills[idx];
      if (!bill) return;
      closeModal();
      const bd = toISODate(bill.date);
      if (bd) window.__mainSelectedDate = bd;
      navigateTo('main');
    });
  });
};

function statCard(label, value, sub, color, icon) {
  return `<div class="card flex-1" style="min-width:170px">
    <div class="stat">
      <div>
        <div class="stat-label">${label}</div>
        <div class="stat-value" style="color:${color}">${value}</div>
        ${sub ? `<div class="stat-sub">${sub}</div>` : ''}
      </div>
      <div class="stat-icon" style="color:${color}">${icon||''}</div>
    </div>
  </div>`;
}

// ── Debt Tracking ───────────────────────────────────────────
async function renderDebt(el) {
  let filterStatus = 'ALL';
  let searchText = '';
  let expandedCust = new Set(); // ลูกค้าที่ expand (cust_id)
  let expandedMonth = new Set(); // "custid|monthKey"

  // 13 สถานะบิล
  const BILL_STATUS = {
    active:          { label:'ยังไม่ถึงกำหนด',  color:'var(--success)', emoji:'🟢' },
    due_today:       { label:'ครบกำหนดวันนี้',  color:'var(--warn)',    emoji:'🟡' },
    overdue:         { label:'เกินกำหนด',        color:'#ff9945',         emoji:'🟠' },
    overdue_warning: { label:'เกินนาน',          color:'var(--danger)',  emoji:'🔴' },
    credit_break:    { label:'เบรกเครดิต',       color:'#c92a2a',         emoji:'🔴' },
    partial_paid:    { label:'จ่ายบางส่วน',      color:'var(--info)',    emoji:'🔵' },
    paid:            { label:'จ่ายแล้ว',          color:'var(--success)', emoji:'✅' },
    disputed:        { label:'มีข้อพิพาท',        color:'#8e44ad',         emoji:'🟣' },
    cheque_pending:  { label:'รอเช็คเข้า',        color:'var(--warn)',    emoji:'🟡' },
    cheque_bounced:  { label:'เช็คเด้ง',          color:'var(--danger)',  emoji:'🚫' },
    extended:        { label:'ต่ออายุหนี้',       color:'var(--info)',    emoji:'🔵' },
    bad_debt:        { label:'หนี้สูญ',           color:'#333',            emoji:'⚫' },
    disputed_legal:  { label:'ฟ้องร้อง',          color:'#6d28d9',         emoji:'⚖️' },
  };
  
  // Customer-level status priority (เลือกเอาที่แย่ที่สุด)
  const STATUS_PRIORITY = ['bad_debt','disputed_legal','credit_break','cheque_bounced','disputed','overdue_warning','overdue','partial_paid','extended','cheque_pending','due_today','active','paid'];
  
  function computeBillStatus(bill, today) {
    // ถ้ามี manual status ตั้งไว้ → ใช้
    if (bill.manual_status && BILL_STATUS[bill.manual_status]) return bill.manual_status;
    // ถ้าจ่ายแล้ว
    if (bill.paid_by_sp || bill.match_status === 'paid' || Number(bill.remaining||0) <= 0.01) return 'paid';
    if (Number(bill.paid_amount||0) > 0 && Number(bill.remaining||0) > 0.01) return 'partial_paid';
    if (bill.type === 'Cheque') {
      if (bill.match_status === 'bounced') return 'cheque_bounced';
      if (bill.match_status !== 'matched') return 'cheque_pending';
    }
    // ตาม Due Date
    if (!bill.due_date) return 'active';
    const dueIso = toISODate(bill.due_date);
    if (!dueIso) return 'active';
    if (dueIso > today) return 'active';
    if (dueIso === today) return 'due_today';
    // เลยกำหนด
    const daysDiff = Math.floor((new Date(today) - new Date(dueIso)) / 86400000);
    // เบรกเครดิต: วันที่ 25 ของเดือนถัดไปจาก due date
    const [dy, dm] = dueIso.split('-').map(Number);
    const breakDate = new Date(dy, dm, 25); // dm เป็น 1-indexed → มันคือ (month+1)-1 = next month
    if (new Date(today) >= breakDate) return 'credit_break';
    if (daysDiff > 5) return 'overdue_warning';
    return 'overdue';
  }
  
  function computeCustStatus(bills) {
    const statuses = bills.filter(b => b.status !== 'paid').map(b => b.status);
    if (statuses.length === 0) return 'paid';
    for (const s of STATUS_PRIORITY) {
      if (statuses.includes(s)) return s;
    }
    return 'active';
  }
  
  function daysOverdue(bill, today) {
    if (!bill.due_date) return 0;
    const dueIso = toISODate(bill.due_date);
    if (!dueIso || dueIso >= today) return 0;
    return Math.floor((new Date(today) - new Date(dueIso)) / 86400000);
  }
  
  function formatMonthTH(monthKey) {
    // monthKey = "2026-04" → "เมษายน 2569"
    const thMonths = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
    const m = monthKey.match(/^(\d{4})-(\d{1,2})/);
    if (!m) return monthKey;
    const y = Number(m[1]) + 543; // ค.ศ. → พ.ศ.
    const mo = Number(m[2]) - 1;
    return `${thMonths[mo]} ${y}`;
  }

  async function loadAndRender() {
    // โหลด ar_ledger
    const res = await api('getArLedger');
    let debtors = res.data || [];
    const today = todayISO();
    
    // ── Process: สำหรับแต่ละลูกค้า คำนวณสถานะบิล + รวม SP ที่ตัดบิลนั้น ──
    debtors = debtors.map(d => {
      const months = {}; // monthKey → { total, bills: [] }
      let allBills = d.bills || [];
      
      // ถ้า d.months เป็นแบบเก่า (monthKey → amount) ต้องรวมเอาบิลจากที่อื่น
      // ที่นี่สมมติ d.bills มีอยู่แล้ว; ถ้าไม่มี ใช้ d.months เป็น fallback
      
      allBills.forEach(b => {
        // ตรวจว่า SP ตัดบิลนี้ไหม (จาก paymentList)
        let paidBySp = null;
        let paidAmount = 0;
        paymentList.forEach(sp => {
          (sp.bills || []).forEach(childBill => {
            if (childBill.bill_no === b.bill_no) {
              if (!paidBySp) paidBySp = [];
              paidBySp.push({ sp_no: sp.sp_no, date: sp.date, amount: childBill.amount });
              paidAmount += Number(childBill.amount || 0);
            }
          });
        });
        b.paid_by_sp_list = paidBySp || [];
        b.paid_amount = paidAmount;
        b.remaining = Math.max(0, Number(b.amount||0) - paidAmount);
        b.status = computeBillStatus(b, today);
        b.days_overdue = daysOverdue(b, today);
        
        // จัดกลุ่มเดือน
        const billDate = toISODate(b.bill_date || b.date) || '';
        const monthKey = billDate.slice(0, 7) || 'unknown';
        if (!months[monthKey]) months[monthKey] = { total: 0, remaining: 0, bills: [] };
        months[monthKey].total += Number(b.amount||0);
        months[monthKey].remaining += b.remaining;
        months[monthKey].bills.push(b);
      });
      
      const unpaidBills = allBills.filter(b => b.status !== 'paid');
      const totalOutstanding = unpaidBills.reduce((s,b) => s + b.remaining, 0);
      const monthsUnpaid = Object.keys(months).filter(mk => months[mk].remaining > 0.01).length;
      const maxDaysOverdue = unpaidBills.length ? Math.max(...unpaidBills.map(b => b.days_overdue)) : 0;
      const custStatus = computeCustStatus(allBills);
      
      return {
        ...d,
        bills_processed: allBills,
        months_grouped: months,
        total_outstanding: totalOutstanding,
        months_unpaid: monthsUnpaid,
        max_days_overdue: maxDaysOverdue,
        computed_status: custStatus,
      };
    });
    
    // Filter — ไม่แสดง cash_only
    debtors = debtors.filter(d => d.credit_status !== 'cash_only');
    // ไม่แสดงลูกค้าที่จ่ายหมดแล้ว
    debtors = debtors.filter(d => Number(d.total_outstanding) > 0.01);
    
    // Filter status (ใช้ computed_status)
    if (filterStatus !== 'ALL') {
      debtors = debtors.filter(d => d.computed_status === filterStatus);
    }
    // Search
    if (searchText) {
      const s = searchText.toLowerCase();
      debtors = debtors.filter(d => 
        (d.cust_name||'').toLowerCase().includes(s) || 
        (d.cust_id||'').toLowerCase().includes(s) || 
        (d.phone||'').includes(s) ||
        (d.contact_person||'').toLowerCase().includes(s)
      );
    }
    
    // Sort: เลย-กำหนดนานสุดก่อน
    debtors.sort((a,b) => (b.max_days_overdue||0) - (a.max_days_overdue||0));
    
    const totalDebt = debtors.reduce((s,d) => s + (Number(d.total_outstanding)||0), 0);
    const statusCounts = {};
    debtors.forEach(d => {
      statusCounts[d.computed_status] = (statusCounts[d.computed_status]||0) + 1;
    });

    el.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div class="page-title">ติดตามลูกหนี้</div>
        <div class="flex gap-2 flex-wrap">
          <input class="input" placeholder="ค้นหา ชื่อ / cust_id / เบอร์ / ผู้ติดต่อ" id="debt-search" value="${searchText}" style="width:280px">
          <button class="btn btn-primary btn-sm" id="btn-quick-payment" style="background:var(--success);color:#fff">💰 รับชำระเร็ว</button>
          <button class="btn btn-outline btn-sm" id="btn-check-alerts">${ICONS.pulse} ตรวจสอบสถานะ</button>
          <button class="btn btn-outline btn-sm" id="btn-expand-all">📂 เปิดทั้งหมด</button>
          <button class="btn btn-outline btn-sm" id="btn-collapse-all">📁 ปิดทั้งหมด</button>
        </div>
      </div>

      <!-- Summary cards -->
      <div class="flex gap-3 flex-wrap mb-3 stagger">
        ${statCard('ลูกหนี้ค้างชำระ', debtors.length, '', 'var(--info)', ICONS.card)}
        ${statCard('ยอดค้างรวม', '฿'+fmtNum(totalDebt), '', 'var(--warn)', ICONS.dollar)}
        ${statCard('เลยกำหนด', (statusCounts.overdue||0)+(statusCounts.overdue_warning||0), 'รายที่ต้องติดตาม', 'var(--danger)', ICONS.alert)}
        ${statCard('เบรกเครดิต', statusCounts.credit_break||0, 'หยุดขายเครดิต', 'var(--purple)', ICONS.alert)}
      </div>

      <!-- Filter pills (รวม 13 สถานะ) -->
      <div class="flex gap-2 mb-3 flex-wrap" style="font-size:.82rem">
        <button class="pill ${filterStatus==='ALL'?'active':''}" data-fs="ALL">ทั้งหมด (${debtors.length})</button>
        ${Object.keys(BILL_STATUS).filter(k => k !== 'paid' && statusCounts[k]).map(k => {
          const s = BILL_STATUS[k];
          return `<button class="pill ${filterStatus===k?'active':''}" data-fs="${k}" style="--pill-color:${s.color};border-color:${s.color}33">${s.emoji} ${s.label} (${statusCounts[k]||0})</button>`;
        }).join('')}
      </div>

      <!-- Hierarchical Customer List -->
      <div class="card-flat">
        ${debtors.length === 0 ? 
          `<div style="padding:40px;text-align:center;color:var(--text3)">ไม่มีลูกหนี้ในสถานะที่เลือก</div>` :
          debtors.map(d => {
            const st = BILL_STATUS[d.computed_status] || BILL_STATUS.active;
            const isOpenCust = expandedCust.has(d.cust_id);
            const monthsSorted = Object.keys(d.months_grouped).sort((a,b) => b.localeCompare(a)); // ใหม่ก่อน
            const unpaidMonths = monthsSorted.filter(mk => d.months_grouped[mk].remaining > 0.01);
            
            return `
              <!-- LEVEL 1: CUSTOMER -->
              <div class="cust-block" style="border-bottom:1px solid var(--border)">
                <div class="cust-row" data-cust-id="${d.cust_id}" style="padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;${isOpenCust?'background:var(--surface2);border-left:4px solid '+st.color:'border-left:4px solid transparent'}">
                  <div style="font-size:1.1rem;color:var(--text2);width:20px">${isOpenCust?'▼':'▶'}</div>
                  <div style="flex:1;min-width:0">
                    <div class="flex items-center gap-2 flex-wrap">
                      <span class="font-semi" style="color:var(--text);font-size:1rem">${d.cust_name||'-'}</span>
                      <span class="badge" style="background:${st.color}22;color:${st.color};border:1px solid ${st.color}66">${st.emoji} ${st.label}</span>
                      ${d.max_days_overdue > 0 ? `<span class="badge badge-danger" style="font-size:.7rem">เลย ${d.max_days_overdue} วัน</span>` : ''}
                      ${unpaidMonths.length > 0 ? `<span class="text-xs text-muted">ค้าง ${unpaidMonths.length} เดือน</span>` : ''}
                    </div>
                    <div class="text-xs text-muted" style="margin-top:2px">
                      ${d.cust_id||''} 
                      ${d.contact_person?' · '+d.contact_person:''} 
                      ${d.phone?' · 📞 '+d.phone:''}
                    </div>
                  </div>
                  <div style="text-align:right">
                    <div style="font-weight:700;color:var(--warn);font-size:1.15rem">฿${fmtNum(d.total_outstanding)}</div>
                    <div class="text-xs text-muted">${d.bills_processed.filter(b=>b.status!=='paid').length} บิล</div>
                  </div>
                  <button class="btn btn-primary btn-sm btn-pay-cust" data-pay="${d.cust_id}" onclick="event.stopPropagation()" style="background:var(--success);color:#fff">${ICONS.dollar} รับชำระ</button>
                </div>
                
                ${isOpenCust ? `
                  <!-- LEVEL 2: MONTHS -->
                  <div style="padding:0 16px 8px 40px;background:var(--surface2)">
                    ${unpaidMonths.map(mk => {
                      const mData = d.months_grouped[mk];
                      const monthKey = d.cust_id + '|' + mk;
                      const isOpenMonth = expandedMonth.has(monthKey);
                      const monthBills = mData.bills.filter(b => b.status !== 'paid');
                      const monthPaidBills = mData.bills.filter(b => b.status === 'paid');
                      
                      return `
                        <div class="month-block" style="border-left:2px solid var(--border);margin-left:8px">
                          <div class="month-row" data-cust-id="${d.cust_id}" data-month="${mk}" style="padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;${isOpenMonth?'background:var(--surface3)':''}">
                            <div style="font-size:.9rem;color:var(--text2);width:16px">${isOpenMonth?'▼':'▶'}</div>
                            <div style="flex:1">
                              <div class="text-sm font-semi" style="color:var(--text)">📅 ${formatMonthTH(mk)}</div>
                              <div class="text-xs text-muted">
                                ${monthBills.length} บิลค้าง ${monthPaidBills.length > 0 ? '· '+monthPaidBills.length+' บิลจ่ายแล้ว' : ''}
                              </div>
                            </div>
                            <div style="text-align:right">
                              <div style="font-weight:700;color:var(--warn)">฿${fmtNum(mData.remaining)}</div>
                              <div class="text-xs text-muted">จาก ฿${fmtNum(mData.total)}</div>
                            </div>
                          </div>
                          
                          ${isOpenMonth ? `
                            <!-- LEVEL 3: BILLS -->
                            <div style="padding:4px 8px 8px 20px;background:var(--surface1);border-left:2px solid ${st.color}">
                              ${mData.bills.map(b => {
                                const bs = BILL_STATUS[b.status] || BILL_STATUS.active;
                                const isPaid = b.status === 'paid';
                                return `
                                  <div style="padding:10px 12px;margin:4px 0;background:${isPaid?'rgba(45,212,160,.05)':'var(--surface2)'};border-radius:6px;border-left:3px solid ${bs.color}">
                                    <div class="flex items-center gap-2 flex-wrap">
                                      <span class="font-semi" style="font-family:var(--mono);color:var(--text)">${b.bill_no||'-'}</span>
                                      <span class="badge" style="background:${bs.color}22;color:${bs.color};font-size:.7rem">${bs.emoji} ${bs.label}</span>
                                      ${b.days_overdue > 0 && !isPaid ? `<span class="text-xs" style="color:var(--danger)">· เลย ${b.days_overdue} วัน</span>` : ''}
                                    </div>
                                    <div class="flex items-center gap-4 flex-wrap text-xs text-muted" style="margin-top:3px">
                                      <span>ออก: ${fmtDate(b.bill_date||b.date)}</span>
                                      ${b.due_date ? `<span>ครบกำหนด: ${fmtDate(b.due_date)}</span>` : ''}
                                      <span style="color:var(--text)">ยอด: ฿${fmtNum(b.amount||0)}</span>
                                      ${b.paid_amount > 0 ? `<span style="color:var(--info)">· จ่ายแล้ว ฿${fmtNum(b.paid_amount)}</span>` : ''}
                                      ${b.remaining > 0 ? `<span style="color:var(--warn)">· เหลือ ฿${fmtNum(b.remaining)}</span>` : ''}
                                    </div>
                                    ${b.paid_by_sp_list && b.paid_by_sp_list.length ? `
                                      <div class="text-xs" style="margin-top:4px;color:var(--success)">
                                        ✓ ตัดโดย SP: ${b.paid_by_sp_list.map(sp => `${sp.sp_no} (฿${fmtNum(sp.amount)} · ${fmtDate(sp.date)})`).join(', ')}
                                      </div>
                                    ` : ''}
                                    <div style="margin-top:6px">
                                      <button class="btn btn-ghost btn-sm btn-bill-status" data-bill="${b.bill_no}" data-cust="${d.cust_id}" style="font-size:.7rem;padding:3px 8px">🏷️ เปลี่ยนสถานะ</button>
                                    </div>
                                  </div>
                                `;
                              }).join('')}
                            </div>
                          ` : ''}
                        </div>
                      `;
                    }).join('')}
                  </div>
                ` : ''}
              </div>
            `;
          }).join('')
        }
      </div>
    `;

    // ── Event Handlers ──
    document.getElementById('debt-search')?.addEventListener('input', debounce(e => { searchText = e.target.value; loadAndRender(); }, 300));
    el.querySelectorAll('.pill[data-fs]').forEach(btn => {
      btn.addEventListener('click', () => { filterStatus = btn.dataset.fs; loadAndRender(); });
    });
    document.getElementById('btn-check-alerts')?.addEventListener('click', async () => {
      toast('กำลังตรวจสอบสถานะ...', 'info');
      const r = await api('checkAlerts');
      if (r.success) { toast(`เสร็จ — เปลี่ยนสถานะ ${r.data?.status_changed||0} ราย`, 'success'); loadAndRender(); }
      else toast(r.error||'ไม่สำเร็จ', 'error');
    });
    document.getElementById('btn-quick-payment')?.addEventListener('click', () => openQuickPaymentModal());
    
    document.getElementById('btn-expand-all')?.addEventListener('click', () => {
      debtors.forEach(d => {
        expandedCust.add(d.cust_id);
        Object.keys(d.months_grouped).forEach(mk => {
          if (d.months_grouped[mk].remaining > 0.01) expandedMonth.add(d.cust_id + '|' + mk);
        });
      });
      loadAndRender();
    });
    document.getElementById('btn-collapse-all')?.addEventListener('click', () => {
      expandedCust.clear();
      expandedMonth.clear();
      loadAndRender();
    });
    
    // Toggle customer expand
    el.querySelectorAll('.cust-row').forEach(row => {
      row.addEventListener('click', (e) => {
        if (e.target.closest('.btn-pay-cust')) return;
        const cid = row.dataset.custId;
        if (expandedCust.has(cid)) {
          expandedCust.delete(cid);
          // ปิด months ของ cust นี้ด้วย
          Array.from(expandedMonth).forEach(k => { if (k.startsWith(cid+'|')) expandedMonth.delete(k); });
        } else {
          expandedCust.add(cid);
        }
        loadAndRender();
      });
    });
    
    // Toggle month expand
    el.querySelectorAll('.month-row').forEach(row => {
      row.addEventListener('click', (e) => {
        e.stopPropagation();
        const key = row.dataset.custId + '|' + row.dataset.month;
        if (expandedMonth.has(key)) expandedMonth.delete(key);
        else expandedMonth.add(key);
        loadAndRender();
      });
    });
    
    // Pay button
    el.querySelectorAll('.btn-pay-cust').forEach(btn => {
      btn.addEventListener('click', () => openPaymentModal(btn.dataset.pay));
    });
    
    // Bill status change
    el.querySelectorAll('.btn-bill-status').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        openBillStatusModal(btn.dataset.cust, btn.dataset.bill);
      });
    });
  }

  loadAndRender();
}

// ══════════════════════════════════════════════════════════════
// Quick Payment Modal — รับชำระจากลูกค้าแบบเร็ว
// Step 1: ค้นหาลูกค้า → Step 2: เลือกบิลที่จะตัด → Step 3: บันทึก
// ══════════════════════════════════════════════════════════════
async function openQuickPaymentModal() {
  let step = 1;
  let selectedCustomer = null;
  let searchResults = [];
  
  function renderStep1() {
    openModal('💰 รับชำระจากลูกค้า — Step 1: เลือกลูกค้า', `
      <div class="flex-col gap-3">
        <p class="text-sm text-dim">พิมพ์ชื่อ / รหัส / เบอร์โทร ของลูกค้า</p>
        <input class="input" id="qp-search" placeholder="ค้นหาลูกค้า..." autofocus style="font-size:1.05rem;padding:10px">
        <div id="qp-results" style="max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:8px">
          <div style="padding:20px;text-align:center;color:var(--text3)">พิมพ์เพื่อค้นหา...</div>
        </div>
      </div>
    `);
    
    const searchInput = document.getElementById('qp-search');
    searchInput?.focus();
    searchInput?.addEventListener('input', debounce(async (e) => {
      const q = e.target.value.trim();
      if (!q) {
        document.getElementById('qp-results').innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3)">พิมพ์เพื่อค้นหา...</div>';
        return;
      }
      
      const res = await api('getArLedger');
      const allDebtors = res.data || [];
      const matches = allDebtors.filter(d => {
        if (Number(d.total_outstanding||0) <= 0) return false;
        const s = q.toLowerCase();
        return (d.cust_name||'').toLowerCase().includes(s) ||
               (d.cust_id||'').toLowerCase().includes(s) ||
               (d.phone||'').includes(q);
      }).slice(0, 10);
      
      searchResults = matches;
      const container = document.getElementById('qp-results');
      if (!container) return;
      
      container.innerHTML = matches.length === 0 
        ? '<div style="padding:20px;text-align:center;color:var(--text3)">ไม่พบลูกค้าที่มีหนี้</div>'
        : matches.map((d, i) => {
          const status = d.credit_status || 'active';
          const statusColor = {active:'var(--success)', overdue:'var(--danger)', credit_break:'var(--warn)'}[status] || 'var(--text2)';
          return `
            <div class="qp-result" data-cust-id="${d.cust_id}" style="padding:12px;border-bottom:1px solid var(--border);cursor:pointer">
              <div class="flex justify-between items-center">
                <div>
                  <div class="font-semi" style="color:var(--text)">${d.cust_name}</div>
                  <div class="text-xs text-muted">${d.cust_id} · ${d.phone||'ไม่มีเบอร์'}</div>
                  <span class="badge" style="background:${statusColor}22;color:${statusColor};font-size:.7rem">${status}</span>
                </div>
                <div style="text-align:right">
                  <div style="font-weight:700;color:var(--warn)">฿${fmtNum(d.total_outstanding)}</div>
                  <div class="text-xs text-muted">${Object.keys(d.months||{}).length} เดือน</div>
                </div>
              </div>
            </div>
          `;
        }).join('');
      
      container.querySelectorAll('.qp-result').forEach(row => {
        row.addEventListener('click', () => {
          const custId = row.dataset.custId;
          selectedCustomer = matches.find(m => m.cust_id === custId);
          renderStep2();
        });
        row.addEventListener('mouseenter', () => row.style.background = 'rgba(79,156,249,.1)');
        row.addEventListener('mouseleave', () => row.style.background = '');
      });
    }, 300));
  }
  
  async function renderStep2() {
    if (!selectedCustomer) return;
    
    // ดึงบิลที่ค้างของลูกค้า
    const res = await api('getArLedger', { cust_id: selectedCustomer.cust_id });
    const cust = (res.data || [])[0] || selectedCustomer;
    const outstandingBills = [];
    
    // หา bills จาก months structure
    Object.entries(cust.months || {}).forEach(([month, data]) => {
      (data.bills || []).forEach(b => {
        if (Number(b.remaining||b.amount||0) > 0) {
          outstandingBills.push({
            ...b,
            month,
            remaining: Number(b.remaining||b.amount||0),
          });
        }
      });
    });
    
    outstandingBills.sort((a,b) => (a.due_date||'').localeCompare(b.due_date||''));
    const totalOutstanding = outstandingBills.reduce((s,b) => s + b.remaining, 0);
    
    openModal(`💰 ${selectedCustomer.cust_name} — Step 2: เลือกบิลที่ตัดชำระ`, `
      <div class="flex-col gap-3">
        <div style="padding:10px;background:rgba(245,166,35,.08);border-radius:8px;display:flex;justify-content:space-between">
          <div>
            <div class="text-xs text-dim">${selectedCustomer.cust_id}</div>
            <div class="font-semi">${selectedCustomer.cust_name}</div>
          </div>
          <div style="text-align:right">
            <div class="text-xs text-dim">ยอดค้างรวม</div>
            <div style="font-weight:700;color:var(--warn);font-size:1.2rem">฿${fmtNum(totalOutstanding)}</div>
          </div>
        </div>
        
        <div class="flex gap-2">
          <div class="input-group flex-1">
            <label>ยอดที่รับชำระ *</label>
            <input type="number" class="input" id="qp-amount" step="0.01" placeholder="0.00" autofocus style="font-size:1.1rem">
          </div>
          <div class="input-group flex-1">
            <label>วันที่รับ</label>
            <input type="date" class="input" id="qp-paydate" value="${todayISO()}">
          </div>
        </div>
        
        <div class="flex gap-2">
          <div class="input-group flex-1">
            <label>วิธีรับ</label>
            <select class="select" id="qp-method">
              <option value="Cash">เงินสด</option>
              <option value="Transfer">โอน</option>
              <option value="Cheque">เช็ค</option>
              <option value="Other">อื่นๆ</option>
            </select>
          </div>
          <div class="input-group flex-1">
            <label>ธนาคาร (ถ้าโอน)</label>
            <select class="select" id="qp-bank">
              ${['','KTB','KBANK','BBL','SCB','BAY','TMB','Other'].map(b=>`<option value="${b}">${b||'-'}</option>`).join('')}
            </select>
          </div>
        </div>
        
        <div class="input-group">
          <label>เลขที่อ้างอิง / Slip</label>
          <input class="input" id="qp-ref" placeholder="เลข slip, เลขเช็ค, หรืออ้างอิงอื่น">
        </div>
        
        <div>
          <label class="text-sm font-semi">บิลที่จะตัดชำระ <span class="text-xs text-muted">(เลือก FIFO อัตโนมัติ หรือคลิกเลือกเอง)</span></label>
          <div style="max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;margin-top:6px">
            ${outstandingBills.length === 0 ? 
              '<div style="padding:20px;text-align:center;color:var(--text3)">ไม่มีบิลค้างชำระ</div>' :
              outstandingBills.map(b => `
                <div style="padding:8px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
                  <label style="display:flex;align-items:center;gap:8px;flex:1;cursor:pointer">
                    <input type="checkbox" class="qp-bill" data-bill="${b.bill_no}" data-amount="${b.remaining}" checked>
                    <div>
                      <div class="text-sm font-semi">${b.bill_no}</div>
                      <div class="text-xs text-muted">${fmtDate(b.bill_date||b.date)} · ${b.month} ${b.due_date?'· Due '+fmtDate(b.due_date):''}</div>
                    </div>
                  </label>
                  <div style="font-weight:600;color:var(--danger)">฿${fmtNum(b.remaining)}</div>
                </div>
              `).join('')
            }
          </div>
        </div>
        
        <div class="input-group">
          <label>หมายเหตุ</label>
          <input class="input" id="qp-note" placeholder="หมายเหตุเพิ่มเติม">
        </div>
        
        <div class="flex gap-2 mt-2">
          <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
          <button class="btn btn-sm flex-1" id="qp-back" style="background:var(--surface2)">← ย้อนกลับ</button>
          <button class="btn btn-success btn-sm flex-1" id="qp-confirm">${ICONS.check} บันทึกรับชำระ</button>
        </div>
      </div>
    `);
    
    // Auto-set amount = total outstanding  
    document.getElementById('qp-amount').value = totalOutstanding.toFixed(2);
    
    // Back button
    document.getElementById('qp-back')?.addEventListener('click', renderStep1);
    
    // Confirm
    document.getElementById('qp-confirm')?.addEventListener('click', async () => {
      const amount = Number(document.getElementById('qp-amount').value);
      if (!amount || amount <= 0) { toast('กรอกยอดที่รับชำระ', 'error'); return; }
      
      const selectedBills = Array.from(document.querySelectorAll('.qp-bill:checked')).map(cb => ({
        bill_no: cb.dataset.bill,
        amount: Number(cb.dataset.amount),
      }));
      
      if (selectedBills.length === 0) {
        if (!confirm('ไม่ได้เลือกบิล — จะบันทึกเป็นยอดทั่วไป (ไม่ตัดบิลเฉพาะ)?')) return;
      }
      
      toast('กำลังบันทึก...', 'info');
      const res = await api('recordPayment', {
        cust_id: selectedCustomer.cust_id,
        amount: amount,
        payment_date: document.getElementById('qp-paydate').value,
        payment_method: document.getElementById('qp-method').value,
        reference: document.getElementById('qp-ref').value,
        bills_cleared: selectedBills,
        note: document.getElementById('qp-note').value,
        action_by: currentUser?.display_name || 'Admin',
      });
      
      if (res.success) {
        // สร้าง SP ชั่วคราวใน paymentList — รอ SP จริงมาแก้ทีหลัง
        const tempSpNo = 'SP-TEMP-' + String(Date.now()).slice(-6);
        paymentList.push({
          sp_no: tempSpNo,
          date: document.getElementById('qp-paydate').value,
          cust_id: selectedCustomer.cust_id,
          cust_name: selectedCustomer.cust_name,
          amount: amount,
          total: amount,
          cash: document.getElementById('qp-method').value === 'Cash' ? amount : 0,
          transfer: document.getElementById('qp-method').value === 'Transfer' ? amount : 0,
          cheque: document.getElementById('qp-method').value === 'Cheque' ? amount : 0,
          bills: selectedBills.map(b => ({ bill_no: b.bill_no, amount: b.amount, doc_type:'(Quick Payment)' })),
          match_status: 'pending',
          note: 'Quick Payment: ' + (document.getElementById('qp-note').value || ''),
          reference: document.getElementById('qp-ref').value,
          is_temp: true,
        });
        persistMainState();
        
        closeModal();
        toast(`รับชำระสำเร็จ ฿${fmtNum(amount)} จาก ${selectedCustomer.cust_name} · สร้าง ${tempSpNo}`, 'success');
        // re-render debt page
        if (currentPage === 'debt') navigateTo('debt');
      } else {
        toast(res.error || 'บันทึกไม่สำเร็จ', 'error');
      }
    });
  }
  
  renderStep1();
}

          ${bills.length === 0 ? '<p class="text-sm text-muted" style="padding:12px">ไม่มีบิลค้าง (ข้อมูลอาจยังไม่มีใน AR Ledger)</p>' :
            bills.map(b => `
              <label class="flex items-center gap-3" style="padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer">
                <input type="checkbox" class="bill-check" data-bill="${b.bill_no}" data-amt="${b.outstanding}" ${b.paid?'disabled checked':''} style="accent-color:var(--primary)">
                <div class="flex-1">
                  <div class="text-sm font-semi">${b.bill_no||'-'}</div>
                  <div class="text-xs text-muted">${fmtDate(b.bill_date||b.date)} · กำหนด ${fmtDate(b.due_date)}</div>
