                <div class="text-right">
                  <div class="font-semi" style="color:${b.paid?'var(--text3)':'var(--danger)'}">฿${fmtNum(b.outstanding)}</div>
                  ${b.paid?'<div class="text-xs" style="color:var(--success)">ชำระแล้ว</div>':''}
                </div>
              </label>
            `).join('')
          }
        </div>
      </div>

      <div class="flex gap-2 mt-3">
        <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
        <button class="btn btn-primary btn-sm flex-1" id="confirm-pay">${ICONS.check} บันทึกการชำระ</button>
      </div>
    </div>
  `);

  document.getElementById('confirm-pay')?.addEventListener('click', async () => {
    const amount = Number(document.getElementById('pay-amount').value) || 0;
    const bills_to_clear = [...document.querySelectorAll('.bill-check:checked:not([disabled])')].map(c => c.dataset.bill);
    if (amount <= 0) { toast('กรอกยอดที่จ่าย', 'error'); return; }
    if (bills_to_clear.length === 0) { toast('เลือกบิลที่ต้องการตัด', 'error'); return; }

    const r = await api('recordPayment', {
      cust_id: custId,
      amount,
      bills_to_clear,
      payment_date: document.getElementById('pay-date').value,
      payment_method: document.getElementById('pay-method').value,
      reference: document.getElementById('pay-ref').value,
      action_by: currentUser?.display_name || 'Admin',
    });
    if (r.success) {
      toast(`ตัดชำระสำเร็จ — ${r.data.bills_cleared} บิล · ยอดคงเหลือ ฿${fmtNum(r.data.new_outstanding)} · สถานะ: ${r.data.new_status}`, 'success');
      closeModal();
      navigateTo('debt');
    } else {
      toast(r.error||'ไม่สำเร็จ', 'error');
    }
  });
}

// ── Matching ────────────────────────────────────────────────
async function renderMatching(el) {
  let bankFilter = 'ALL', matchFilter = 'ALL';
  let dirFilter = 'ALL'; // 'ALL' | 'in' | 'out'
  let dateFrom = '', dateTo = '';
  let amountSearch = ''; // ค้นหายอดเงิน (partial match)
  const bankColors = { KTB:'#00a4e4', KBANK:'#138f2d', 'BBL NW':'#ff7b00', BBL:'#1e3a7b', TTB:'#ff0066' };

  function render() {
    let data = uploadedStatements.length > 0 ? [...uploadedStatements] : [];
    
    // Filter by bank
    if (bankFilter !== 'ALL') data = data.filter(s => s.bank === bankFilter);
    
    // Filter by match status
    if (matchFilter === 'matched') data = data.filter(s => s.match_status === 'matched');
    else if (matchFilter === 'unmatched') data = data.filter(s => s.match_status !== 'matched');
    
    // Filter by direction (เงินเข้า/ออก)
    if (dirFilter === 'in') data = data.filter(s => Number(s.amount || 0) > 0);
    else if (dirFilter === 'out') data = data.filter(s => Number(s.amount || 0) < 0);
    
    // Filter by date range
    if (dateFrom || dateTo) {
      data = data.filter(s => {
        const d = toISODate(s.date || s.trans_date);
        if (!d) return true;
        if (dateFrom && d < dateFrom) return false;
        if (dateTo && d > dateTo) return false;
        return true;
      });
    }
    
    // Filter by amount search (substring match ทศนิยม flex)
    if (amountSearch.trim()) {
      const needle = amountSearch.trim().replace(/,/g, '');
      data = data.filter(s => {
        const amt = Number(s.amount || 0);
        const abs = Math.abs(amt);
        // ลอง match ทั้งแบบมี/ไม่มีทศนิยม
        const s1 = String(abs);
        const s2 = abs.toFixed(2);
        return s1.includes(needle) || s2.includes(needle);
      });
    }
    
    // Sort by date (default ASC, toggle-able via button)
    // ⭐ ใช้ toISODate → string compare (handle ทั้ง ISO + dd/mm/yyyy + Date obj)
    // ก่อนหน้านี้ใช้ parseThaiDate ซึ่งไม่รองรับ ISO → BBL NW/BBL/TTB sort ไม่ได้
    const _order = getSortOrder('statement');
    data.sort((a, b) => {
      const da = toISODate(a.date) || '';
      const db = toISODate(b.date) || '';
      // tiebreaker: time (HH:MM)
      const ta = String(a.time || '00:00').substring(0, 5);
      const tb = String(b.time || '00:00').substring(0, 5);
      const ka = da + ' ' + ta;
      const kb = db + ' ' + tb;
      return _order === 'asc' ? ka.localeCompare(kb) : kb.localeCompare(ka);
    });
    
    // Truncate for render (หลัง filter แล้ว — ไม่ตัดข้อมูลที่ต้องการ)
    const MAX_ROWS = 1000;
    const visibleData = data.length > MAX_ROWS ? data.slice(0, MAX_ROWS) : data;
    const isTruncated = data.length > MAX_ROWS;

    // Bank counts
    const bankCounts = {
      KTB: (statementsByBank.KTB || []).length,
      KBANK: (statementsByBank.KBANK || []).length,
      'BBL NW': (statementsByBank['BBL NW'] || []).length,
      BBL: (statementsByBank.BBL || []).length,
      TTB: (statementsByBank.TTB || []).length,
    };

    const allStmts = uploadedStatements;
    const totalMatched = allStmts.filter(s=>s.match_status==='matched').length;
    const totalUnmatched = allStmts.length - totalMatched;
    const filteredMatched = data.filter(s=>s.match_status==='matched').length;
    const filteredUnmatched = data.length - filteredMatched;
    
    // Count in/out (ใช้ data ที่ผ่าน bank+match filter แล้ว เพื่อให้ count ตามบริบท)
    const dataBeforeDir = (() => {
      let d = uploadedStatements.length > 0 ? [...uploadedStatements] : [];
      if (bankFilter !== 'ALL') d = d.filter(s => s.bank === bankFilter);
      if (matchFilter === 'matched') d = d.filter(s => s.match_status === 'matched');
      else if (matchFilter === 'unmatched') d = d.filter(s => s.match_status !== 'matched');
      if (dateFrom || dateTo) {
        d = d.filter(s => {
          const dt = toISODate(s.date || s.trans_date);
          if (!dt) return true;
          if (dateFrom && dt < dateFrom) return false;
          if (dateTo && dt > dateTo) return false;
          return true;
        });
      }
      return d;
    })();
    const countIn = dataBeforeDir.filter(s => Number(s.amount||0) > 0).length;
    const countOut = dataBeforeDir.filter(s => Number(s.amount||0) < 0).length;
    const sumIn = dataBeforeDir.filter(s => Number(s.amount||0) > 0).reduce((a,s)=>a+Number(s.amount||0),0);
    const sumOut = dataBeforeDir.filter(s => Number(s.amount||0) < 0).reduce((a,s)=>a+Number(s.amount||0),0);

    el.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div class="page-title">Statement Matching</div>
        <div class="flex gap-2 items-center">
          <button class="btn btn-outline btn-sm" id="btn-stmt-upload" title="วางได้หลายไฟล์พร้อมกัน (Ctrl/Shift+คลิก)">${ICONS.file} วาง Statement</button>
          <button class="btn btn-outline btn-sm" id="btn-dedup-stmts" title="ลบ statement ซ้ำ (date+time HH:MM+amount+ref)">🧹 ลบซ้ำ</button>
          <button class="btn btn-ghost btn-sm" id="btn-unmatch-all" style="color:var(--warn);border:1px solid var(--warn)" title="ยกเลิก match — เลือกช่วงวันที่หรือทั้งหมด">↩ Unmatch...</button>
          <button class="btn btn-primary btn-sm" id="btn-auto-match">${ICONS.pulse} Auto Match</button>
        </div>
      </div>
      <div class="flex justify-between items-center mb-3">
        <div class="flex gap-2 flex-wrap items-center">
          ${['ALL','KTB','KBANK','BBL NW','BBL','TTB'].map(b => {
            const total = bankCounts.KTB+bankCounts.KBANK+(bankCounts['BBL NW']||0)+bankCounts.BBL+(bankCounts.TTB||0);
            const count = b === 'ALL' ? total : bankCounts[b] || 0;
            return `<button class="pill ${bankFilter===b?'active':''}" data-bank="${b}" ${b!=='ALL'?`style="--pill-color:${bankColors[b]}"`:''}>${b}${count?` <span style="opacity:.7">(${count})</span>`:''}</button>`;
          }).join('')}
          ${(bankCounts.KTB+bankCounts.KBANK+(bankCounts['BBL NW']||0)+bankCounts.BBL+(bankCounts.TTB||0)) > 0 ? '<button class="btn btn-ghost btn-sm" id="btn-clear-stmts" style="color:var(--danger)">✕ ล้าง Statement</button>' : ''}
        </div>
      </div>
      <div class="flex gap-2 mb-3 items-center">
        <span class="text-xs text-dim">สถานะ:</span>
        <button class="pill ${matchFilter==='ALL'?'active':''}" data-mf="ALL">ทั้งหมด (${allStmts.length})</button>
        <button class="pill ${matchFilter==='unmatched'?'active':''}" data-mf="unmatched" style="--pill-color:var(--danger)">✗ ยังไม่ Match (${totalUnmatched})</button>
        <button class="pill ${matchFilter==='matched'?'active':''}" data-mf="matched" style="--pill-color:var(--success)">✓ Matched (${totalMatched})</button>
        <span style="margin-left:12px;padding-left:12px;border-left:1px solid var(--border)" class="text-xs text-dim">ทิศทาง:</span>
        <button class="pill ${dirFilter==='ALL'?'active':''}" data-dir="ALL">ทั้งหมด</button>
        <button class="pill ${dirFilter==='in'?'active':''}" data-dir="in" style="--pill-color:var(--success)" title="฿${fmtNum(sumIn)}">💰 เข้า (${countIn})</button>
        <button class="pill ${dirFilter==='out'?'active':''}" data-dir="out" style="--pill-color:var(--danger)" title="฿${fmtNum(Math.abs(sumOut))}">💸 ออก (${countOut})</button>
        <span style="margin-left:16px" class="text-xs text-dim">ช่วงวันที่:</span>
        <button class="btn btn-outline btn-sm" id="match-date-prev" title="เลื่อนย้อนหลัง 1 วัน" style="padding:3px 8px;font-weight:700">◀</button>
        <input type="date" class="input" id="match-date-from" value="${dateFrom}" style="width:135px;padding:3px 6px;font-size:.78rem" title="จาก">
        <span class="text-xs">→</span>
        <input type="date" class="input" id="match-date-to" value="${dateTo}" style="width:135px;padding:3px 6px;font-size:.78rem" title="ถึง">

        ${dateFrom||dateTo?'<button class="btn btn-ghost btn-sm" id="match-date-clear" style="color:var(--danger);padding:2px 6px">✕</button>':''}
        <span style="margin-left:12px;padding-left:12px;border-left:1px solid var(--border);display:inline-flex;align-items:center;gap:6px">
          <span class="text-xs text-dim">🔍 ยอด:</span>
          <input type="text" class="input" id="match-amount-search" value="${amountSearch}" placeholder="เช่น 978.65 หรือ 978" style="width:130px;padding:3px 6px;font-size:.78rem" title="ค้นหาในยอดเงิน (partial match)">

        ${statCard('Matched', totalMatched, '', 'var(--success)', ICONS.check)}
        ${statCard('ยังไม่ Match', totalUnmatched, '', 'var(--danger)', ICONS.alert)}
        ${statCard('แสดง', data.length, isTruncated?'(จำกัด '+MAX_ROWS+')':'', 'var(--info)', ICONS.file)}
      </div>
      <div class="card-flat">
        <div class="table-wrap" style="max-height:500px;overflow-y:auto">
          <table>
            <thead><tr><th>ธนาคาร</th><th>วันที่</th><th>เวลา</th><th>Ref.</th><th style="text-align:right">จำนวนเงิน</th><th>รายละเอียด</th><th>Station</th><th>Bill</th><th>สถานะ</th></tr></thead>
            <tbody>
              ${data.length ? visibleData.map((s,i)=>{
                const isMatched = s.match_status === 'matched';

                  ? 'background:rgba(45,212,160,.06)'

                return `
                <tr style="${rowStyle}" data-stmt-idx="${i}">
                  <td><span class="badge" style="background:${(bankColors[s.bank]||'#555')}22;color:${bankColors[s.bank]||'#aaa'}">${s.bank}</span></td>
                  <td>${fmtDate(s.date)}</td>
                  <td>${fmtStmtTime(s.time)}</td>
                  <td class="text-xs" style="font-family:var(--mono)">${s.ref_no}</td>
                  <td style="text-align:right;font-weight:600;color:${Number(s.amount)>=0?'var(--success)':'var(--danger)'}">${Number(s.amount)>=0?'+':''}${fmtNum(s.amount)}</td>
                  <td class="truncate" style="max-width:170px;color:var(--text)">
                    ${s.description}
                    ${(s.sender_bank_name || s.sender_account || s.sender_name) ? `<br><span class="text-xs" style="color:var(--info);font-family:var(--mono)">
                      ${s.sender_bank_name ? `🏦 ${s.sender_bank_name}` : ''}
                      ${s.sender_account ? ` · ${s.sender_account}` : ''}
                      ${s.sender_name ? ` · 👤 ${s.sender_name}` : ''}
                    </span>` : ''}
                  </td>
                  <td>${s.match_station?`<span class="badge badge-info">${s.match_station}</span>`:'-'}</td>
                  <td class="text-xs">
                    ${s.match_bill||'-'}
                    ${s.overpay_amount ? `<br><span class="badge" style="background:rgba(244,180,26,.15);color:var(--warn);font-size:.65rem;margin-top:2px" title="${(s.match_reason||'').replace(/"/g,'&quot;')}">⚠️ ${Number(s.overpay_amount) > 0 ? '+' : ''}${fmtNum(Number(s.overpay_amount))} ${Number(s.overpay_amount) > 0 ? 'โอนเกิน' : 'โอนขาด'}</span>` : ''}
                  </td>
                  <td>${isMatched
                    ? `<span class="badge badge-success">✓ ${isManual?'Manual':'Auto'}${s.match_method === 'manual_diff' ? ' · diff' : ''}</span> <button class="btn btn-ghost btn-sm btn-unmatch" data-stmt-idx="${i}" title="ยกเลิก match">${ICONS.edit}</button>`
                    : `<span class="badge badge-danger">✗ ไม่พบ</span> <button class="btn btn-primary btn-sm btn-manual-match" data-stmt-idx="${i}">${ICONS.search} Match เอง</button>`
                  }</td>

              `}).join('') : '<tr><td colspan="9" style="text-align:center;padding:30px;color:var(--text3)">ไม่มีข้อมูล Statement — กรองวันที่หรือเลือกธนาคาร</td></tr>'}
            </tbody>

    el.querySelectorAll('.pill[data-bank]').forEach(btn => {
      btn.addEventListener('click', () => { bankFilter = btn.dataset.bank; render(); });
    });
    el.querySelectorAll('.pill[data-mf]').forEach(btn => {
      btn.addEventListener('click', () => { matchFilter = btn.dataset.mf; render(); });
    });
    el.querySelectorAll('.pill[data-dir]').forEach(btn => {
      btn.addEventListener('click', () => { dirFilter = btn.dataset.dir; render(); });
    });
    document.getElementById('match-date-from')?.addEventListener('change', e => { dateFrom = e.target.value; render(); });
    document.getElementById('match-date-to')?.addEventListener('change', e => { dateTo = e.target.value; render(); });
    document.getElementById('match-date-clear')?.addEventListener('click', () => { dateFrom = ''; dateTo = ''; render(); });
    
    // Date nav arrows: shift ทั้ง from+to พร้อมกัน (ถ้าเท่ากัน = single day)
    // ถ้ายังไม่ตั้ง — เริ่มที่วันนี้
    const _shiftMatchDate = (days) => {
      const today = todayISO();
      let from = dateFrom || today;
      let to = dateTo || from;
      const shift = (iso) => {
        const d = new Date(iso + 'T00:00:00');
        if (isNaN(d)) return iso;
        d.setDate(d.getDate() + days);
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      };
      dateFrom = shift(from);
      dateTo = shift(to);
      render();
    };
    document.getElementById('match-date-prev')?.addEventListener('click', () => _shiftMatchDate(-1));
    document.getElementById('match-date-next')?.addEventListener('click', () => _shiftMatchDate(+1));
    
    // Amount search: debounce 200ms + preserve focus/cursor
    let _amtSearchTimer = null;
    const amtInput = document.getElementById('match-amount-search');
    if (amtInput) {
      amtInput.addEventListener('input', e => {
        const val = e.target.value;
        clearTimeout(_amtSearchTimer);
        _amtSearchTimer = setTimeout(() => {
          amountSearch = val;
          render();
          const fresh = document.getElementById('match-amount-search');
          if (fresh) {
            fresh.focus();
            const pos = fresh.value.length;
            try { fresh.setSelectionRange(pos, pos); } catch(_) {}
          }
        }, 200);
      });
      amtInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') { clearTimeout(_amtSearchTimer); amountSearch = e.target.value; render(); }
        else if (e.key === 'Escape') { clearTimeout(_amtSearchTimer); amountSearch = ''; render(); }
      });
    }
    document.getElementById('match-amount-clear')?.addEventListener('click', () => { amountSearch = ''; render(); });
    // Sort toggle button (reusable — ใช้ใน el scope)
    el.querySelectorAll('.sort-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        toggleSortOrder(btn.dataset.pageKey);
        render();
      });
    });
    document.getElementById('btn-stmt-upload')?.addEventListener('click', () => {
      // ── Multi-file statement upload ──
      // Accumulate stats ระหว่างไฟล์ → final toast/persist/render เมื่อ isLast
      let batch = null;
      triggerMultiFileUpload('file-stmt', async (result, name, meta) => {
        // Init batch accumulator ที่ไฟล์แรก
        if (meta.index === 0) {
          batch = { ok: 0, fail: 0, added: 0, skipped: 0, buddhist: 0, byBank: {}, errors: [] };
        }
        
        // Error ตอน parse → accumulate fail แล้วไปต่อ
        if (meta.error) {
          batch.fail++;
          batch.errors.push(`${name}: ${meta.error}`);
        } else if (result) {
          // Silent mode → ได้ stats กลับมา
          const r = handleStmtUpload(result, name, { silent: true });
          if (r) {
            batch.ok++;
            batch.added += r.added;
            batch.skipped += r.skipped;
            batch.buddhist += r.buddhistCount;
            batch.byBank[r.bank] = (batch.byBank[r.bank] || 0) + r.added;
          }
        }
        
        // ไฟล์สุดท้าย → finalize
        if (meta.isLast) {
          // Persist ครั้งเดียว
          try { safeStorage.set('sf_statementsByBank', JSON.stringify(statementsByBank)); } catch(e) {}
          
          // Single summary toast
          if (meta.total === 1 && batch.ok === 1) {
            // ไฟล์เดียว — toast แบบเดิม
            const firstBank = Object.keys(batch.byBank)[0] || '?';
            const bhMsg = batch.buddhist > 0 ? ` · แปลง พ.ศ.→ค.ศ. ${batch.buddhist} รายการ` : '';
            const dupMsg = batch.skipped > 0 ? ` · ข้าม ${batch.skipped} ซ้ำ` : '';
            toast(`อ่าน Statement ${firstBank} สำเร็จ — เพิ่ม ${batch.added} รายการ${dupMsg}${bhMsg}`, 'success');
          } else {
            // หลายไฟล์ — สรุปรวม
            const bankList = Object.entries(batch.byBank).map(([b, n]) => `${b} +${n}`).join(' · ');
            let msg = `📥 อ่าน ${batch.ok}/${meta.total} ไฟล์สำเร็จ — เพิ่ม ${batch.added} รายการ`;
            if (bankList) msg += `\n${bankList}`;
            if (batch.skipped > 0) msg += ` · ข้าม ${batch.skipped} ซ้ำ`;
            if (batch.buddhist > 0) msg += ` · แปลง พ.ศ. ${batch.buddhist}`;
            if (batch.fail > 0) msg += ` · ❌ ล้มเหลว ${batch.fail}`;
            toast(msg, batch.fail > 0 ? 'warn' : 'success', 8000);
          }
          
          // Navigate + render ครั้งเดียว
          if (currentPage === 'matching') navigateTo('matching');
          render();
          batch = null;
        }
      });
    });
    
    // ── Dedup Statement (manual, safe — preview before delete) ──
    document.getElementById('btn-dedup-stmts')?.addEventListener('click', () => {
      // Count potential duplicates first (dry-run) — clone
      function normTime(t) {
        const m = String(t||'').match(/^(\d{1,2}):(\d{2})/);
        return m ? (m[1].padStart(2,'0') + ':' + m[2]) : '';
      }
      const preview = { byBank: {}, total: 0 };
      Object.keys(statementsByBank).forEach(bank => {
        const arr = statementsByBank[bank] || [];
        const seen = new Map();
        let dup = 0;
        arr.forEach(r => {
          const key = `${r.date||''}|${normTime(r.time)}|${Math.round(Number(r.amount)||0)}|${r.ref_no||''}`;
          if (seen.has(key)) { dup++; } else { seen.set(key, 1); }
        });
        if (arr.length > 0) preview.byBank[bank] = { total: arr.length, dup: dup };
        preview.total += dup;
      });
      
      if (preview.total === 0) {
        toast('ไม่พบ Statement ซ้ำ', 'info');
        return;
      }
      
      let msg = `พบ Statement ซ้ำ ${preview.total} รายการ\n\n`;
      Object.keys(preview.byBank).forEach(bank => {
        const r = preview.byBank[bank];
        if (r.dup > 0) msg += `  ${bank}: ${r.total} → เหลือ ${r.total - r.dup} (ลบ ${r.dup})\n`;
      });
      msg += `\n⚠️ ลบแล้วกู้คืนไม่ได้\nยืนยันลบ?`;
      
      if (!confirm(msg)) return;
      
      // Actually dedup now
      const removed = dedupAllStatements();
      uploadedStatements = getAllStatements();
      
      // Save
      const req = indexedDB.open('SmartFinanceDB', 1);
      req.onsuccess = (e) => {
        const tx = e.target.result.transaction('data', 'readwrite');
        tx.objectStore('data').put(JSON.stringify(statementsByBank), 'sf_statementsByBank');
        tx.oncomplete = () => {
          toast(`✅ ลบ ${removed} รายการซ้ำแล้ว · เหลือ ${uploadedStatements.length}`, 'success', 6000);
          render();
        };
      };
    });
    
    document.getElementById('btn-clear-stmts')?.addEventListener('click', () => {
      const target = bankFilter === 'ALL' ? 'ทุกธนาคาร' : bankFilter;
      if (confirm(`ล้าง Statement ${target}?`)) {
        clearStatementsByBank(bankFilter);
        uploadedStatements = getAllStatements();
        try { safeStorage.set('sf_statementsByBank', JSON.stringify(statementsByBank)); } catch(e) {}
        toast(`ล้าง Statement ${target} แล้ว`, 'success');
        render();
      }
    });

    // ── Manual Match: เลือก Statement → เลือก Bill → ผูก ──
    el.querySelectorAll('.btn-manual-match').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const stmtIdx = Number(btn.dataset.stmtIdx);
        const stmt = data[stmtIdx];
        if (!stmt) return;
        
        const stmtDate = toISODate(stmt.date);
        const stmtAmt = Number(stmt.amount) || 0;
        
        // หาบิล candidate: ยอดตรง/ใกล้เคียง + ยังไม่ match
        const cashflowCandidates = (cashflowList||[])
          .filter(c => c.match_status !== 'matched')
          .map(c => ({
            bill_no: c.id,
            amount: c.type === 'supplier' ? -Math.abs(c.amount) : c.amount,
            date: c.date,
            station: 'Cashflow (' + c.type + ')',
            type: c.type === 'deposit' ? 'ฝากเงิน' : c.type === 'supplier' ? 'จ่าย Supplier' : c.type === 'transfer' ? 'โอน' : 'อื่นๆ',
            remarks1: c.counterparty || c.from_account || c.to_account || '',
            _cashflow: c,
          }));
        
        // ── Supplier Payments as candidates (especially cheques on KTB) ──
        const spCandidates = (supplierPayments||[])
          .filter(sp => {
            if (sp.status !== 'paid') return false;
            if (sp.match_status === 'matched') return false;
            // เช็คบน KTB: withdraw direction only
            if (sp.payment_method === 'เช็ค' && stmt.bank === 'KTB' && stmtAmt > 0) return false; // เงินเข้า KTB ไม่ใช่เช็ค
            return true;
          })
          .map(sp => {
            const isCheque = sp.payment_method === 'เช็ค';
            return {
              bill_no: sp.id,
              amount: -Math.abs(Number(sp.amount)||0),
              date: sp.transfer_date || sp.cheque_date,
              station: isCheque ? '📝 เช็ค' : '🏭 จ่ายเจ้าหนี้',
              type: isCheque ? `เช็ค ${sp.cheque_no||''}` : `โอน ${sp.bank||''}`,
              remarks1: sp.supplier_name + (sp.pp_no ? ' · PP:' + sp.pp_no : ''),
              _supplierPayment: sp,
            };
          });
        
        // ── SP-TEMP partials as candidates (income only — ลูกค้าจ่ายเข้า) ──
        // แสดง partial ที่ยังไม่ผูก stmt (stmt_ref ว่าง) เท่านั้น
        const spTempCandidates = [];
        (spTempList || []).forEach(t => {
          if (t.status === 'graduated' || t.status === 'cancelled') return;
          (t.partials || []).forEach((pr, idx) => {
            if (pr.stmt_ref) return; // ผูกแล้ว — ข้าม
            spTempCandidates.push({
              bill_no: `${t.no}#${idx + 1}`,
              amount: Math.abs(Number(pr.amount) || 0), // income (+)
              date: pr.date,
              station: '⚡ SP-TEMP',
              type: `จ่ายลด ${t.customer || '-'}`,
              remarks1: `${pr.bank || ''} · งวด ${idx + 1}/${t.partials.length}`,
              _spTempPartial: { temp: t, partial: pr, partialIdx: idx },
            });
          });
        });
        
        // ยอดตรง ±5% หรือ ±1 บาท (ใช้ absolute รองรับเงินเข้า/ออก)
        const absStmt = Math.abs(stmtAmt);
        
        // ── Filter กฎใหม่: ──
        //   Match เฉพาะ Type = Transfer, Card, Cheque, Refund
        //   + ทิศทาง (เงินเข้า/ออก) ตาม prefix และ station
        const MATCHABLE_TYPES = ['Transfer', 'Card', 'Cheque', 'Refund'];
        // ── Direction prefixes (fixed per business rules) ──
        //   เงินเข้า (stmt > 0):
        //     ลูกหนี้:    SS, OS, SP, S2 (ขายสด + ตัดชำระ + Front POS อนาคต)
        //     เจ้าหนี้:   BS, PC (supplier คืนเงินเราสด)
        //     Front station: ทุกบิล (บิล Front ปัจจุบันที่ bill_no ว่าง)
        //   เงินออก (stmt < 0):
        //     ลูกหนี้:    SC, JS, JR (ใบลดหนี้ลูกหนี้ — คืนเงินลูกค้า)
        //     เจ้าหนี้:   PP, PS, MS, PX (ตัดชำระ + ซื้อสด + ค่าขนส่ง)
        //   ไม่ขึ้นเลย: SR, OR, PR, MR, BR (เชื่อ — รอ SP/PP)
        const INCOME_PREFIXES = ['SS','OS','SP','S2','BS','PC'];
        const EXPENSE_PREFIXES = ['PP','PS','MS','PX','SC','JS','JR'];
        
        const canMatchBill = (b) => {
          if (!MATCHABLE_TYPES.includes(b.type || '')) return false;
          const prefix = String(b.bill_no||'').substring(0,2).toUpperCase();
          const isFrontStation = String(b.station||'').startsWith('Front');
          if (stmtAmt < 0) {
            // เงินออก → เจ้าหนี้
            return EXPENSE_PREFIXES.includes(prefix);
          } else {
            // เงินเข้า → ลูกหนี้ หรือ Front
            return INCOME_PREFIXES.includes(prefix) || isFrontStation;
          }
        };
        
        // ── Helper: ยอดที่ใช้ match สำหรับบิลทั่วไป ──
        //   มี fee → ยอดสุทธิ (amount − WHT − TF − CF)
        //   ไม่มี fee → baht (amount)
        // (cashflow/SP ไม่มี fee field → ใช้ amount ตรงๆ)
        const mmBillMatchAmt = (b) => {
          const amt = Math.abs(Number(b.amount) || 0);
          // SP / cashflow ไม่มี fee field — ใช้ amount ตรงๆ
          if (b._cashflow || b._supplierPayment) return amt;
          const wht = Number(b.wht_amount) || 0;
          const tf = Number(b.transfer_fee) || 0;
          const cf = Number(b.card_fee) || 0;
          const fees = wht + tf + cf;
          return fees > 0 ? (amt - fees) : amt;
        };
        
        const candidates = [
          ...billList.filter(b => {
            if (b.match_status === 'matched' || b.match_status === 'paid') return false;
            if (!canMatchBill(b)) return false;
            const amtDiff = Math.abs(mmBillMatchAmt(b) - absStmt);
            return amtDiff < 1 || amtDiff < absStmt * 0.05;
          }),
          // Cashflow: deposit/supplier/transfer - filter by direction
          ...cashflowCandidates.filter(c => {
            const cfDir = c._cashflow?.type;
            if (stmtAmt < 0 && !['supplier','transfer','misc'].includes(cfDir)) return false;
            if (stmtAmt > 0 && !['deposit','transfer','misc'].includes(cfDir)) return false;
            const amtDiff = Math.abs(Math.abs(Number(c.amount)) - absStmt);
            return amtDiff < 1 || amtDiff < absStmt * 0.05;
          }),
          // Supplier Payments → always expense (out)
          ...spCandidates.filter(sp => {
            if (stmtAmt > 0) return false;
            const amtDiff = Math.abs(Math.abs(Number(sp.amount)) - absStmt);
            return amtDiff < 1 || amtDiff < absStmt * 0.05;
          }),
          // SP-TEMP partials → always income (in) — ลูกค้าจ่ายลด
          ...spTempCandidates.filter(c => {
            if (stmtAmt < 0) return false;
            const amtDiff = Math.abs(Math.abs(Number(c.amount)) - absStmt);
            return amtDiff < 1 || amtDiff < absStmt * 0.05;
          }),
        ];
        // Sort: ยอดตรง + วันที่ใกล้ที่สุด (ใช้ net สำหรับบิลที่มี fee)
        candidates.sort((a, b) => {
          const aExact = Math.abs(mmBillMatchAmt(a) - absStmt) < 0.01 ? 0 : 1;
          const bExact = Math.abs(mmBillMatchAmt(b) - absStmt) < 0.01 ? 0 : 1;
          if (aExact !== bExact) return aExact - bExact;
          const aDate = toISODate(a.date), bDate = toISODate(b.date);
          return Math.abs(new Date(aDate) - new Date(stmtDate)) - Math.abs(new Date(bDate) - new Date(stmtDate));
        });
        
        openModal(`🔍 Match Statement → Bill`, `
          <div class="flex-col gap-3">
            <div style="padding:10px;background:var(--surface2);border-radius:8px">
              <div class="flex justify-between items-center">
                <div>
                  <div class="text-sm font-semi">${stmt.bank} · ${fmtDate(stmt.date)} · ${fmtStmtTime(stmt.time)||''}</div>
                  <div class="text-xs text-muted">${stmt.description||stmt.ref_no||''}</div>
                </div>
                <div style="font-size:1.2rem;font-weight:700;color:var(--success)">฿${fmtNum(stmtAmt)}</div>
              </div>
            </div>
            
            <div class="input-group">
              <label>ค้นหาบิล</label>
              <input class="input" id="mm-search" placeholder="เลขบิล / ชื่อลูกค้า / ยอดเงิน" autofocus>
            </div>
            
            <div class="text-xs text-dim">
              ${candidates.length?`🎯 เจอบิลที่ยอดใกล้เคียง ${candidates.length} รายการ · <span style="color:var(--info)">💡 ติ๊กได้หลายบิล — รวมกันให้ตรงยอด stmt</span>`:'⚠️ ไม่เจอบิลยอดตรง — ค้นหาด้วยตนเอง'}
            </div>
            
            <div id="mm-bill-list" style="max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:8px"></div>
            
            <div id="mm-sum-bar" style="display:none;padding:10px;background:rgba(79,156,249,.08);border:1px solid rgba(79,156,249,.3);border-radius:6px;font-size:.88rem">
              <div class="flex justify-between items-center">
                <span>เลือก <span id="mm-sum-count">0</span> บิล · รวม</span>
                <span id="mm-sum-amount" style="font-weight:700">฿0.00</span>
              </div>
              <div class="flex justify-between items-center" style="margin-top:4px">
                <span class="text-xs text-dim">เทียบ stmt ฿${fmtNum(Math.abs(stmtAmt))}</span>
                <span id="mm-sum-diff" class="text-xs">—</span>
              </div>
            </div>
            
            <div style="padding:10px;background:var(--surface2);border-radius:8px;margin-top:8px">
              <div class="text-xs font-semi" style="margin-bottom:6px">✏️ หรือกรอกเลขบิลเอง (กรณีบิลยังไม่อยู่ในระบบ)</div>
              <div class="flex gap-2">
                <input class="input" id="mm-manual-bill" placeholder="เลขบิล เช่น SS00126-001234" style="flex:1">
                <input class="input" id="mm-manual-station" placeholder="Station" style="width:100px">
              </div>
            </div>
            
            <div class="input-group">
              <label>หมายเหตุ (ทำไมถึง match ด้วยตัวเอง)</label>
              <input class="input" id="mm-reason" placeholder="เช่น ลูกค้าโอนผิดยอด, รวมยอด 2 บิล">
            </div>
            
            <div class="flex gap-2 mt-2">
              <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
              <button class="btn btn-primary btn-sm flex-1" id="mm-confirm" disabled>${ICONS.check} ยืนยัน Match</button>
            </div>
          </div>
        `);
        
        // ใช้ Set ของ bill reference (ไม่ใช่ index) — persist ได้ข้าม search/filter
        // เพราะ reference ของ bill object ยังเดิมเสมอ (อ้างอิง billList/cashflowCandidates/spCandidates)
        const selectedBills = new Set();
        let displayList = [];
        
        // Update sum bar + enable/disable confirm based on selection
        function updateSumBar() {
          const bar = document.getElementById('mm-sum-bar');
          const cnt = selectedBills.size;
          if (cnt === 0) {
            if (bar) bar.style.display = 'none';
            // ให้ confirm เปิดได้ถ้ากรอก manual bill
            const manualBill = (document.getElementById('mm-manual-bill')?.value || '').trim();
            document.getElementById('mm-confirm').disabled = !manualBill;
            return;
          }
          if (bar) bar.style.display = 'block';
          // รวมยอด (ใช้ mmBillMatchAmt เหมือนตอน match)
          let sum = 0;
          selectedBills.forEach(b => {
            if (!b) return;
            // SC/JS/JR (ลดหนี้) → offset เป็นลบ
            const isSC = ['SC','JS','JR'].includes(String(b.bill_no||'').substring(0,2).toUpperCase());
            const val = mmBillMatchAmt(b);
            sum += isSC ? -val : val;
          });
          const stmtAbs = Math.abs(stmtAmt);
          const signedDiff = sum - stmtAbs;  // + = bills เกิน stmt, − = bills ขาด stmt
          const diff = Math.abs(signedDiff);
          const isMatch = diff < 0.01;
          document.getElementById('mm-sum-count').textContent = cnt;
          document.getElementById('mm-sum-amount').textContent = '฿' + fmtNum(sum);
          const diffEl = document.getElementById('mm-sum-diff');
          if (isMatch) {
            diffEl.innerHTML = '<span style="color:var(--success);font-weight:600">✓ ตรงเป๊ะ</span>';
          } else {
            // overpay_amount เป็น "stmt - bills sum" → positive = ลูกค้าโอนเกิน
            const overpay = stmtAbs - sum;
            diffEl.innerHTML = `<span style="color:var(--warn)">ต่าง ${fmtNum(signedDiff)} — ${overpay > 0 ? 'ลูกค้าโอนเกิน' : 'ลูกค้าโอนขาด'} ${fmtNum(Math.abs(overpay))}</span>`;
          }
          
          // ⭐ Enable diff-match: ถ้ายอดต่าง → ต้องกรอก reason
          const reasonEl = document.getElementById('mm-reason');
          const reasonFilled = (reasonEl?.value || '').trim().length > 0;
          const confirmBtn = document.getElementById('mm-confirm');
          if (confirmBtn) {
            if (isMatch) {
              confirmBtn.disabled = false;
              confirmBtn.innerHTML = ICONS.check + ' ยืนยัน Match';
              confirmBtn.style.background = '';
              if (reasonEl) reasonEl.style.borderColor = '';
            } else {
              confirmBtn.disabled = !reasonFilled;
              const overpay = stmtAbs - sum;
              confirmBtn.innerHTML = `⚠️ Match ยอดต่าง ${overpay > 0 ? '+' : ''}฿${fmtNum(Math.abs(overpay))}`;
              confirmBtn.style.background = 'var(--warn)';
              // Red border ถ้ายังไม่กรอก reason
              if (reasonEl) reasonEl.style.borderColor = reasonFilled ? '' : 'var(--danger)';
            }
          }
        }
        
        function renderBillList(searchText) {
          let list;
          if (searchText) {
            const s = searchText.toLowerCase();
            // รวม 3 แหล่ง
            const fromBills = billList
              .filter(b => b.match_status !== 'matched' && b.match_status !== 'paid')
              .filter(b => (b.bill_no||'').toLowerCase().includes(s) ||
                           (b.remarks1||'').toLowerCase().includes(s) ||
                           String(b.amount).includes(s));
            const fromCashflow = cashflowCandidates.filter(c =>
              (c.bill_no||'').toLowerCase().includes(s) ||
              (c.remarks1||'').toLowerCase().includes(s) ||
              String(c.amount).includes(s));
            const fromSp = spCandidates.filter(sp =>
              (sp.bill_no||'').toLowerCase().includes(s) ||
              (sp.remarks1||'').toLowerCase().includes(s) ||
              String(Math.abs(sp.amount)).includes(s) ||
              (sp._supplierPayment?.cheque_no||'').toLowerCase().includes(s) ||
              (sp._supplierPayment?.pp_no||'').toLowerCase().includes(s));
            const fromSpTemp = spTempCandidates.filter(c =>
              (c.bill_no||'').toLowerCase().includes(s) ||
              (c.remarks1||'').toLowerCase().includes(s) ||
              (c.type||'').toLowerCase().includes(s) ||
              String(Math.abs(c.amount)).includes(s));
            list = [...fromBills, ...fromCashflow, ...fromSp, ...fromSpTemp];
          } else {
            list = candidates.slice(0, 30);
          }
          
          displayList = list;
          const bc = document.getElementById('mm-bill-list');
          if (!bc) return;
          
          bc.innerHTML = list.length ? list.map((b, i) => {
            const matchAmt = mmBillMatchAmt(b);
            const amtDiff = Math.abs(matchAmt - Math.abs(stmtAmt));
            const isExact = amtDiff < 0.01;
            // ถ้าบิลมี fee → แสดงทั้งสุทธิและ baht เพื่อเห็นภาพ
            const hasFee = !b._cashflow && !b._supplierPayment && 
                           matchAmt !== Math.abs(Number(b.amount) || 0);
            const sourceTag = b._supplierPayment 
              ? (b._supplierPayment.payment_method === 'เช็ค' 
                ? `<span class="badge" style="background:rgba(244,180,26,.15);color:var(--warn);font-size:.65rem">📝 เช็ค ${b._supplierPayment.cheque_no||''}</span>` 
                : `<span class="badge" style="background:rgba(138,92,246,.15);color:#8a5cf6;font-size:.65rem">🏭 SP</span>`)
              : b._cashflow 
                ? `<span class="badge" style="background:var(--info-bg);color:var(--info);font-size:.65rem">💰 CF</span>`
                : b._spTempPartial
                  ? `<span class="badge" style="background:rgba(244,180,26,.15);color:var(--warn);font-size:.65rem">⚡ SP-TEMP</span>`
                  : `<span class="badge badge-muted" style="font-size:.65rem">📄 Bill</span>`;
            return `
              <div class="mm-item" data-di="${i}" style="padding:10px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px">
                <input type="checkbox" class="mm-chk" data-di="${i}" style="width:18px;height:18px;cursor:pointer;accent-color:var(--info)">
                <div style="flex:1">
                  <div class="flex items-center gap-2">
                    <span class="font-semi">${b.bill_no||'(ไม่มีเลข)'}</span>
                    ${sourceTag}
                  </div>
                  <div class="text-xs text-muted">${fmtDate(b.date)} · ${b.station||''} · ${b.type||''} · ${b.remarks1||''}</div>
                </div>
                <div style="text-align:right">
                  <div style="font-weight:700;color:${isExact?'var(--success)':'var(--warn)'}">฿${fmtNum(matchAmt)}</div>
                  ${hasFee?`<div class="text-xs" style="color:var(--text3)">baht ฿${fmtNum(Math.abs(Number(b.amount)||0))} − หัก</div>`:''}
                  ${isExact?'<div class="text-xs" style="color:var(--success)">✓ ตรงเป๊ะ</div>':`<div class="text-xs text-muted">ต่าง ${fmtNum(amtDiff)}</div>`}
                </div>
              </div>
            `;
          }).join('') : '<div style="padding:20px;text-align:center;color:var(--text3)">ไม่พบบิล / รายการ / เช็ค</div>';
          
          // Toggle ด้วย bill reference (ไม่ใช่ index) — persist ข้าม search
          const toggleSelect = (bill, item) => {
            if (selectedBills.has(bill)) {
              selectedBills.delete(bill);
              item.style.background = '';
              const chk = item.querySelector('.mm-chk');
              if (chk) chk.checked = false;
            } else {
              selectedBills.add(bill);
              item.style.background = 'rgba(79,156,249,.15)';
              const chk = item.querySelector('.mm-chk');
              if (chk) chk.checked = true;
            }
            updateSumBar();
          };
          bc.querySelectorAll('.mm-item').forEach(item => {
            const bill = displayList[Number(item.dataset.di)];
            if (!bill) return;
            item.addEventListener('click', (e) => {
              if (e.target.classList.contains('mm-chk')) return; // checkbox ดูแลเอง
              toggleSelect(bill, item);
            });
            const chk = item.querySelector('.mm-chk');
            if (chk) {
              chk.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleSelect(bill, item);
              });
            }
          });
          // restore visual state เมื่อ re-render (ติ๊กบิลที่เคยเลือก แม้ search เปลี่ยน)
          bc.querySelectorAll('.mm-item').forEach(item => {
            const bill = displayList[Number(item.dataset.di)];
            if (bill && selectedBills.has(bill)) {
              item.style.background = 'rgba(79,156,249,.15)';
              const chk = item.querySelector('.mm-chk');
              if (chk) chk.checked = true;
            }
          });
          updateSumBar();
        }
        
        renderBillList('');
        document.getElementById('mm-search')?.addEventListener('input', debounce(e => renderBillList(e.target.value), 200));
        
        // ⭐ Wire mm-reason → trigger updateSumBar so Confirm button re-evaluates (บังคับ reason เมื่อ diff)
        document.getElementById('mm-reason')?.addEventListener('input', () => updateSumBar());
        
        // ── Enable confirm เมื่อกรอกเลขบิลเอง (เฉพาะกรณีไม่มี bill ที่เลือก) ──
        document.getElementById('mm-manual-bill')?.addEventListener('input', (e) => {
          if (e.target.value.trim() && selectedBills.size === 0) {
            document.getElementById('mm-confirm').disabled = false;
          } else if (selectedBills.size === 0) {
            document.getElementById('mm-confirm').disabled = true;
          }
          // ถ้ามี bill selected อยู่แล้ว → ให้ updateSumBar เป็นคนตัดสิน
          if (selectedBills.size > 0) updateSumBar();
        });
        
        document.getElementById('mm-confirm')?.addEventListener('click', () => {
          const manualBill = (document.getElementById('mm-manual-bill')?.value || '').trim();
          const manualStation = (document.getElementById('mm-manual-station')?.value || '').trim();
          const reason = document.getElementById('mm-reason').value || '';
          
          // ── กรณี 1: เลือกบิลจาก list (1 หรือหลายบิล) ──
          // ── กรณี 2: กรอกเลขบิลเอง ──
          let matchBillNo = '';
          let matchStation = '';
          let targetLabel = '';
          const matchedBills = []; // สำหรับ multi: เก็บเลขบิลทั้งหมด
          
          if (selectedBills.size > 0) {
            // อัปเดตทุกบิลที่ติ๊ก — iterate bill objects ตรงๆ
            const billArr = Array.from(selectedBills);
            billArr.forEach(match => {
              if (!match) return;
              matchedBills.push(match.bill_no || '(no#)');
              if (match._supplierPayment) {
                const sp = match._supplierPayment;
                sp.match_status = 'matched';
                sp.match_stmt_ref = stmt.ref_no || '';
                sp.matched_at = new Date().toISOString();
                if (sp.payment_method === 'เช็ค') {
                  sp.cheque_cleared_date = toISODate(stmt.date);
                  sp.cleared_statement_ref = stmt.ref_no || '';
                }
              } else if (match._cashflow) {
                match._cashflow.match_status = 'matched';
                match._cashflow.match_stmt_ref = stmt.ref_no || '';
              } else if (match._spTempPartial) {
                const { temp: t, partial: pr } = match._spTempPartial;
                pr.stmt_ref = stmt.ref_no || '';
                if (!pr.bank && stmt.bank) pr.bank = stmt.bank;
                t.updated_at = new Date().toISOString();
                recomputeSpTempStatus(t);
                markDirtySpTemps();
              } else {
                match.match_status = 'matched';
                match.confirmation = stmt.bank || '';
                match.pay_date = match.date;
                match.matched_stmt_ref = stmt.ref_no || '';
                match.matched_at = new Date().toISOString();
              }
            });
            // ใช้บิลแรกเป็น primary reference
            const first = billArr[0];
            matchBillNo = matchedBills.length > 1 
              ? matchedBills.join(' + ') 
              : (first?.bill_no || '');
            matchStation = first?.station || '';
            targetLabel = matchedBills.length > 1 
              ? `📎 ${matchedBills.length} บิล: ${matchedBills.join(' + ')}` 
              : `📄 ${matchedBills[0]}`;
          } else if (manualBill) {
            // กรอกเลขบิลเอง
            matchBillNo = manualBill;
            matchStation = manualStation;
            targetLabel = `✏️ ${manualBill} (กรอกเอง)`;
          } else {
            toast('กรุณาเลือกบิลหรือกรอกเลขบิล', 'warn');
            return;
          }
          
          // อัปเดต Statement
          // ── คำนวณ diff: stmt vs ยอดรวมบิลที่เลือก ──
          let selectedBillSum = 0;
          if (selectedBills.size > 0) {
            selectedBills.forEach(bi => {
              if (!bi) return;
              const isSC = ['SC','JS','JR'].includes(String(bi.bill_no||'').substring(0,2).toUpperCase());
              const val = mmBillMatchAmt(bi);
              selectedBillSum += isSC ? -val : val;
            });
          }
          const stmtAbsForDiff = Math.abs(Number(stmt.amount)||0);
          const diff = stmtAbsForDiff - selectedBillSum;  // + = ลูกค้าโอนเกิน
          const hasDiff = selectedBills.size > 0 && Math.abs(diff) >= 0.01;
          
          // ⭐ ถ้ายอดต่าง → reason บังคับ
          if (hasDiff && !reason.trim()) {
            toast('ยอดต่าง ' + (diff > 0 ? '+' : '') + fmtNum(diff) + ' — ต้องกรอกหมายเหตุ', 'warn');
            return;
          }
          
          stmt.match_status = 'matched';
          stmt.match_method = hasDiff ? 'manual_diff' 
                            : (matchedBills.length > 1 ? 'manual_multi' : 'manual');
          stmt.match_station = matchStation;
          stmt.match_bill = matchBillNo;
          // ⭐ Always set matched_bills — ใช้เป็น source of truth ตอน unmatch (ไม่ว่า single หรือ multi)
          if (matchedBills.length > 0) stmt.matched_bills = matchedBills;
          else delete stmt.matched_bills;
          stmt.matched_at = new Date().toISOString();
          stmt.matched_by = currentUser?.display_name || 'Admin';
          // ⭐ Overpay amount
          if (hasDiff) stmt.overpay_amount = diff;
          else delete stmt.overpay_amount;
          stmt.match_reason = reason || (manualBill ? 'กรอกเลขบิลเอง' : (matchedBills.length > 1 ? `รวม ${matchedBills.length} บิล` : ''));
          
          // Persist
          try { safeStorage.set('sf_statementsByBank', JSON.stringify(statementsByBank)); } catch(e) {}
          persistMainState();
          
          // ⭐ Delta push: push เฉพาะ records ที่เพิ่ง match (fire-and-forget)
          if (selectedBills.size > 0) {
            Array.from(selectedBills).forEach(bx => {
              if (bx && !bx._cashflow && !bx._supplierPayment) {
                pushMatchDelta(bx, null);
              }
            });
          }
          pushMatchDelta(null, stmt);
          
          closeModal();
          toast(`Match สำเร็จ: ${stmt.bank} ↔ ${targetLabel}`, 'success');
          render();
        });
      });
    });
    
    // ── Unmatch: ยกเลิก match ──
    el.querySelectorAll('.btn-unmatch').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const stmtIdx = Number(btn.dataset.stmtIdx);
        const stmt = data[stmtIdx];
        if (!stmt) return;
        
        if (!confirm(`ยกเลิกการ match กับ ${stmt.match_bill}?`)) return;
        
        // รองรับ multi-bill match: ใช้ matched_bills ถ้ามี ไม่งั้น fallback เป็น match_bill
        // ⭐ Backward compat: stmt เก่า (match จาก Main ก่อน fix) มี match_bill แบบ "SS00126-000114 (฿16,343.00) + OS00126-000123 (฿5,000.00)"
        //    → ต้อง split " + " แล้ว strip " (฿..." ออก ไม่งั้น billList.find(b => b.bill_no === bn) หาไม่เจอ
        const billNumbersToUnmatch = Array.isArray(stmt.matched_bills) && stmt.matched_bills.length 
          ? stmt.matched_bills 
          : (stmt.match_bill 
              ? String(stmt.match_bill).split(' + ').map(s => s.split(' (')[0].trim()).filter(Boolean)
              : []);
        
        billNumbersToUnmatch.forEach(bn => {
          // ⚡ SP-TEMP partial pattern: SP-TEMP-XXXX#N → clear partial.stmt_ref
          const spTempMatch = String(bn).match(/^(SP-TEMP-\d+)#(\d+)$/);
          if (spTempMatch) {
            const [, no, idxStr] = spTempMatch;
            const t = spTempList.find(x => x.no === no);
            const pr = t?.partials?.[Number(idxStr) - 1];
            if (t && pr) {
              delete pr.stmt_ref;
              t.updated_at = new Date().toISOString();
              recomputeSpTempStatus(t);
              markDirtySpTemps();
            }
            return;
          }
          const bill = billList.find(b => b.bill_no === bn);
          if (bill && !bill.paid_by_sp) {
            bill.match_status = 'pending';
            delete bill.confirmation;
            delete bill.pay_date;
            delete bill.matched_stmt_ref;
            delete bill.matched_at;
          }
        });
        
        stmt.match_status = 'unmatched';
        delete stmt.match_bill;
        delete stmt.matched_bills;
        delete stmt.match_station;
        delete stmt.match_method;
        delete stmt.matched_at;
        delete stmt.matched_by;
        delete stmt.match_reason;
        delete stmt.overpay_amount;
        
        try { safeStorage.set('sf_statementsByBank', JSON.stringify(statementsByBank)); } catch(e) {}
        persistMainState();
        
        // ⭐ Delta push: push bills ที่เพิ่ง unmatch + stmt
        billNumbersToUnmatch.forEach(bn => {
          const bill = billList.find(b => b.bill_no === bn);
          if (bill) pushMatchDelta(bill, null);
        });
        pushMatchDelta(null, stmt);
        
        toast('ยกเลิก match แล้ว', 'success');
        render();
      });
    });
    document.getElementById('btn-unmatch-all')?.addEventListener('click', async () => {
      // ── เปิด modal เลือกช่วงวันที่ (เหมือน Auto Match) ──
      const today = new Date().toISOString().substring(0, 10);
      const stmtDates = [];
      uploadedStatements.forEach(s => {
        if (s.match_status !== 'matched') return; // เอาเฉพาะที่ matched
        const d = toISODate(s.date || s.trans_date);
        if (d) stmtDates.push(d);
      });
      stmtDates.sort();
      const minDate = stmtDates[0] || today;
      const maxDate = stmtDates[stmtDates.length - 1] || today;
      
      // นับรวมก่อน preview
      const totalMatchedBills = billList.filter(b => b.match_status === 'matched' && b.type !== 'Cash').length;
      const totalMatchedStmts = uploadedStatements.filter(s => s.match_status === 'matched').length;
      
      if (totalMatchedBills === 0 && totalMatchedStmts === 0) {
        toast('ไม่มีรายการที่ match อยู่', 'info');
        return;
      }
      
      openModal('↩ Unmatch — เลือกช่วงวันที่', `
        <div class="flex-col gap-3">
          <div style="padding:10px;background:rgba(245,166,35,.08);border-radius:6px;border-left:3px solid var(--warn)" class="text-xs">
            <strong>⚠️ Unmatch จะ:</strong><br>
            • เปลี่ยน match_status → pending (ทั้งบิล + statement)<br>
            • ล้าง confirmation, pay_date, matched_stmt_ref<br>
            • ไม่ลบข้อมูลบิล/statement<br>
            • ไม่แตะบิล Cash/Refund (auto-matched)
          </div>
          <div style="padding:10px;background:rgba(79,156,249,.08);border-radius:6px" class="text-xs">
            <strong>📅 Statement matched ในระบบ:</strong><br>
            ช่วง ${fmtDate(minDate)} → ${fmtDate(maxDate)} (${stmtDates.length} รายการ)<br>
            รวม: บิล ${totalMatchedBills} · Stmt ${totalMatchedStmts}
          </div>
          <div class="input-group">
            <label>จากวันที่</label>
            <input type="date" id="um-from" class="input" value="${minDate}">
          </div>
          <div class="input-group">
            <label>ถึงวันที่</label>
            <input type="date" id="um-to" class="input" value="${maxDate}">
          </div>
          <div class="flex gap-2 mt-2">
            <button class="btn btn-outline btn-sm flex-1" id="um-all" title="Unmatch ทั้งหมดทุกวัน (ไม่ filter ช่วงวันที่)">↩ Unmatch ทั้งหมด</button>
            <button class="btn btn-ghost btn-sm" onclick="closeModal()">ยกเลิก</button>
            <button class="btn btn-warn btn-sm flex-1" id="um-go" style="background:var(--warn);color:#fff">↩ Unmatch ในช่วงนี้</button>
          </div>
        </div>
      `);
      
      // ── Helper: ทำ unmatch จริง ──
      const doUnmatch = async (dateFrom, dateTo) => {
        const useRange = !!(dateFrom && dateTo);
        const inRange = (d) => {
          if (!useRange) return true;
          const iso = toISODate(d);
          if (!iso) return false;
          return iso >= dateFrom && iso <= dateTo;
        };
        
        let unmatchedBills = 0, stmtsCleared = 0;
        
        // 1. Unmatch bills
        billList.forEach(b => {
          if (b.type === 'Cash') return; // skip cash-auto
          if (b.match_status === 'void' || b.match_status === 'paid') return;
          if (b.match_status !== 'matched') return;
          if (!inRange(b.date)) return;
          
          b.match_status = 'pending';
          delete b.confirmation;
          delete b.pay_date;
          delete b.matched_stmt_ref;
          delete b.matched_at;
          unmatchedBills++;
        });
        
        // 2. Unmatch statements
        Object.values(statementsByBank).forEach(arr => {
          if (!Array.isArray(arr)) return;
          arr.forEach(s => {
            if (s.match_status !== 'matched') return;
            if (!inRange(s.date || s.trans_date)) return;
            
            s.match_status = 'pending';
            delete s.match_station;
            delete s.match_bill;
            delete s.matched_bills;
            delete s.matched_at;
            delete s.match_method;
            delete s.match_reason;
            delete s.overpay_amount;
            stmtsCleared++;
          });
        });
        
        uploadedStatements = getAllStatements();
        try { safeStorage.set('sf_statementsByBank', JSON.stringify(statementsByBank)); } catch(e) {}
        persistMainState();
        
        const rangeMsg = useRange ? ` ช่วง ${fmtDate(dateFrom)} → ${fmtDate(dateTo)}` : ' ทั้งหมด';
        toast(`↩ Unmatch${rangeMsg} — บิล: ${unmatchedBills} · Stmt: ${stmtsCleared}`, 'success', 6000);
        closeModal();
        render();
      };
      
      // Wire ปุ่ม
      setTimeout(() => {
        document.getElementById('um-go')?.addEventListener('click', () => {
          const f = document.getElementById('um-from')?.value;
          const t = document.getElementById('um-to')?.value;
          if (!f || !t) { toast('กรุณาเลือกช่วงวันที่', 'error'); return; }
          if (f > t) { toast('"จาก" ต้องน้อยกว่าหรือเท่ากับ "ถึง"', 'error'); return; }
          if (!confirm(`ยืนยัน unmatch ในช่วง ${fmtDate(f)} → ${fmtDate(t)}?`)) return;
          doUnmatch(f, t);
        });
        document.getElementById('um-all')?.addEventListener('click', () => {
          if (!confirm(`ยืนยัน unmatch ทั้งหมด?\n\nบิล: ${totalMatchedBills} · Stmt: ${totalMatchedStmts}`)) return;
          doUnmatch(null, null);
        });
      }, 100);
    });
    
    document.getElementById('btn-auto-match')?.addEventListener('click', async () => {
      // ── เปิด modal เลือกช่วงวันที่ ──
      const today = new Date().toISOString().substring(0, 10);
      const stmtDates = [];
      uploadedStatements.forEach(s => {
        const d = toISODate(s.date || s.trans_date);
        if (d) stmtDates.push(d);
      });
      stmtDates.sort();
      const minDate = stmtDates[0] || today;
      const maxDate = stmtDates[stmtDates.length - 1] || today;
      
      openModal('🔍 Auto Match — เลือกช่วงวันที่', `
        <div class="flex-col gap-3">
          <div style="padding:10px;background:rgba(79,156,249,.08);border-radius:6px" class="text-xs">
            <strong>📅 Statement ในระบบ:</strong> ${fmtDate(minDate)} → ${fmtDate(maxDate)} (${stmtDates.length} รายการ)
          </div>
          <div class="input-group">
            <label>จากวันที่</label>
            <input type="date" id="am-from" class="input" value="${minDate}" min="${minDate}" max="${maxDate}">
          </div>
          <div class="input-group">
            <label>ถึงวันที่</label>
            <input type="date" id="am-to" class="input" value="${maxDate}" min="${minDate}" max="${maxDate}">
          </div>
          <div class="flex gap-2">
            <button class="btn btn-outline btn-sm" id="am-today">วันนี้</button>
            <button class="btn btn-outline btn-sm" id="am-week">7 วันล่าสุด</button>
            <button class="btn btn-outline btn-sm" id="am-month">30 วันล่าสุด</button>
            <button class="btn btn-outline btn-sm" id="am-all">ทั้งหมด</button>
          </div>
          <div class="flex gap-2 mt-2">
            <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
            <button class="btn btn-primary btn-sm flex-1" id="am-start">${ICONS.pulse} เริ่ม Auto Match</button>
          </div>
        </div>
      `);
      
      // Quick presets
      document.getElementById('am-today')?.addEventListener('click', () => {
        document.getElementById('am-from').value = today;
        document.getElementById('am-to').value = today;
      });
      document.getElementById('am-week')?.addEventListener('click', () => {
        const d = new Date(); d.setDate(d.getDate() - 7);
        document.getElementById('am-from').value = d.toISOString().substring(0, 10);
        document.getElementById('am-to').value = today;
      });
      document.getElementById('am-month')?.addEventListener('click', () => {
        const d = new Date(); d.setDate(d.getDate() - 30);
        document.getElementById('am-from').value = d.toISOString().substring(0, 10);
        document.getElementById('am-to').value = today;
      });
      document.getElementById('am-all')?.addEventListener('click', () => {
        document.getElementById('am-from').value = minDate;
        document.getElementById('am-to').value = maxDate;
      });
      
      document.getElementById('am-start')?.addEventListener('click', () => {
        const dateFrom = document.getElementById('am-from').value;
        const dateTo = document.getElementById('am-to').value;
        if (!dateFrom || !dateTo) { toast('กรุณาเลือกวันที่', 'warn'); return; }
        if (dateFrom > dateTo) { toast('วันเริ่มต้นต้องน้อยกว่าวันสุดท้าย', 'warn'); return; }
        closeModal();
        runAutoMatchRange(dateFrom, dateTo);
      });
    });
    
    // ══════════════════════════════════════════════════════════
    // Auto Match — ช่วงวันที่ที่ระบุ
    // ══════════════════════════════════════════════════════════
    async function runAutoMatchRange(dateFrom, dateTo) {
      toast(`กำลัง Auto Match: ${fmtDate(dateFrom)} → ${fmtDate(dateTo)}...`, 'info');

      // ── ยอดที่ใช้ match ตามกฎง่ายๆ: ──
      //   ถ้ามียอดสุทธิ (fee ใดๆ > 0) → match สุทธิ = amount − fees
      //   ถ้าไม่มี → match baht = amount
      function billMatchAmount(b) {
        const amt = Math.abs(Number(b.amount) || 0);
        const wht = Number(b.wht_amount) || 0;
        const tf = Number(b.transfer_fee) || 0;
        const cf = Number(b.card_fee) || 0;
        const totalFees = wht + tf + cf;
        return totalFees > 0 ? (amt - totalFees) : amt;
      }
      // Alias เดิมสำหรับ backward-compat (กรณีที่มีโค้ดอื่นเรียก)
      function netAmount(b) { return billMatchAmount(b); }
      
      // ── Key สำหรับ index match — 2 ทศนิยม เพื่อเจอตรงเป๊ะ ──
      const k2 = (n) => Math.round(Math.abs(n) * 100);
      
      // ── กฎ match ใหม่ (ง่ายกว่าเดิม): ── 
      //   Match เฉพาะ Type = Transfer, Card, Cheque (ไม่สนใจ prefix)
      //   เงินเข้า (stmt > 0) → บิลทิศทางรับ (Front* station + prefix SS/OS/SP)
      //   เงินออก (stmt < 0) → บิลทิศทางจ่าย (prefix PP/PS + supplier cashflow)
      //   Type=Cash, Refund, Unknown → ไม่ match
      const MATCHABLE_TYPES = ['Transfer', 'Card', 'Cheque'];
      
      function canMatch(b) {
        if (!MATCHABLE_TYPES.includes(b.type || '')) return false;
        if (b.match_status === 'matched' || b.match_status === 'paid' || b.match_status === 'void') return false;
        return true;
      }
      
      function isIncomeBill(b) {
        if (!canMatch(b)) return false;
        // เงินเข้า:
        //   ลูกหนี้: SS, OS, SP, S2 (ขายสด + ตัดชำระ + Front POS อนาคต)
        //   เจ้าหนี้: BS, PC (supplier คืนเงินสด)
        //   Front station: รับเงินสด/โอน (บิลว่างหรือมี prefix)
        //   ไม่รวม: SR/OR (เชื่อ รอ SP), SC/JS/JR (ใบลดหนี้ = เงินออก)
        const prefix = String(b.bill_no || '').substring(0, 2).toUpperCase();
        const isFrontStation = String(b.station || '').startsWith('Front');
        const isIncomePrefix = ['SS','OS','SP','S2','BS','PC'].includes(prefix);
        return isFrontStation || isIncomePrefix;
      }
      
      function isExpenseBill(b) {
        if (!canMatch(b)) return false;
        // เงินออก:
        //   เจ้าหนี้ (จ่าย supplier): PP, PS, MS, PX
        //   ลูกหนี้ (คืนเงินลูกค้า): SC, JS, JR
        //   ไม่รวม: PR/MR (เชื่อ รอ PP), BR (เชื่อ รอ PP)
        const prefix = String(b.bill_no || '').substring(0, 2).toUpperCase();
        return ['PP','PS','MS','PX','SC','JS','JR'].includes(prefix);
      }
      
      // ══════════════════════════════════════════════════════════
      // SINGLE UNIFIED PASS — กฎ match ง่ายที่สุด
      //   1. บิล Type ∈ [Transfer, Card, Cheque] + ยังไม่ match
      //   2. วันที่ตรงกัน
      //   3. ยอดตรงกัน 2 ทศนิยม (ใช้ billMatchAmount: baht หรือ สุทธิ)
      //   4. ทิศทาง:
      //      - บิลที่ชัดเจน (Front station + prefix income/expense) → ต้องตรงทิศ
      //      - บิล MANUAL/ไม่ชัดเจน → allow ทั้ง 2 ทิศ
      // ══════════════════════════════════════════════════════════
      
      function billDirection(b) {
        const prefix = String(b.bill_no || '').substring(0, 2).toUpperCase();
        const isFront = String(b.station || '').startsWith('Front');
        const incomePrefixes = ['SS','OS','SP','S2','BS','PC'];
        const expensePrefixes = ['PP','PS','MS','PX','SC','JS','JR'];
        if (isFront || incomePrefixes.includes(prefix)) return 'income';
        if (expensePrefixes.includes(prefix)) return 'expense';
        return 'unknown';  // MANUAL, no prefix, Invoice/Order/Payment station ไม่มี prefix ชัด
      }
      function isCompatible(bill, stmt) {
        const stmtAmount = Number(stmt.amount || 0);
        const stmtBank = String(stmt.bank || '').toUpperCase().replace(/\s+/g, ' ').trim();
        const station = String(bill.station || '');
        
        // ── Bank ↔ Station pairing rules ──
        // BBL NW ไม่ match กับบิล Front* (คนละบัญชี/คนละเครื่องรับเงิน)
        if (stmtBank === 'BBL NW' && station.startsWith('Front')) return false;
        
        // ── Direction check ──
        const dir = billDirection(bill);
        if (dir === 'unknown') return true;
        return (dir === 'income' && stmtAmount > 0) || (dir === 'expense' && stmtAmount < 0);
      }
      
      const idx = {};
      const used = new Set();
      let billsInRange = 0, expBillsInRange = 0;
      
      for (let bi = 0; bi < billList.length; bi++) {
        const b = billList[bi];
        if (!canMatch(b)) continue;
        
        const d = toISODate(b.date);
        if (!d || d < dateFrom || d > dateTo) continue;
        
        const mAmt = billMatchAmount(b);
        if (!mAmt) continue;
        
        const k = d + '|' + k2(mAmt);
        if (!idx[k]) idx[k] = [];
        idx[k].push({ bi });
        
        const dir = billDirection(b);
        if (dir === 'expense') expBillsInRange++;
        else billsInRange++; // income + unknown
      }
      
      let matched = 0, matchedExp = 0;
      let skippedNeg = 0, skippedRange = 0, noMatch = 0, stmtsInRange = 0;
      
      uploadedStatements.forEach(stmt => {
        if (stmt.match_status === 'matched') return;
        
        const sd = toISODate(stmt.date || stmt.trans_date);
        if (!sd) return;
        if (sd < dateFrom || sd > dateTo) { skippedRange++; return; }
        
        stmtsInRange++;
        
        const sa = Number(stmt.amount || 0);
        if (!sa) return;
        
        const k = sd + '|' + k2(sa);
        const candidates = idx[k] || [];
        
        let foundIdx = -1;
        for (let c = 0; c < candidates.length; c++) {
          const bi = candidates[c].bi;
          if (used.has(bi)) continue;
          const bill = billList[bi];
          if (!isCompatible(bill, stmt)) continue;
          foundIdx = bi;
          break;
        }
        
        if (foundIdx >= 0) {
          used.add(foundIdx);
          const bill = billList[foundIdx];
          
          bill.match_status = 'matched';
          bill.confirmation = stmt.bank || '';
          bill.pay_date = bill.date;
          bill.matched_stmt_ref = stmt.ref_no || '';
          bill.matched_at = new Date().toISOString();
          
          stmt.match_status = 'matched';
          stmt.match_station = bill.station || '';
          stmt.match_bill = bill.bill_no || `${bill.station}|${bill.type}|฿${bill.amount}`;
          stmt.matched_at = new Date().toISOString();
          stmt.match_method = sa > 0 ? 'auto_sameday' : 'auto_expense';
          
          if (sa > 0) matched++;
          else matchedExp++;
        } else {
          if (sa > 0) noMatch++;
          else skippedNeg++;
        }
      });

      // ── Save แบบ proper sync (persistMainState + push delta) ──
      // ⭐ FIX: ก่อนนี้ save IndexedDB ตรงๆ ไม่ผ่าน persistMainState → markDirty ไม่ทำ
      //         → ของเก่าใน localStorage ถูก push ทับ cloud → pull รอบถัดไปเอาของเก่ามาทับ
      //         → "match แล้ว unmatch เองในหน้า matching" bug
      uploadedStatements = getAllStatements();
      
      // Sync to localStorage (immediate)
      try { safeStorage.set('sf_statementsByBank', JSON.stringify(statementsByBank)); } catch(e) {}
      
      // Trigger normal persist flow → markDirty('bills')+markDirty('stmts')
      persistMainState();
      
      // Force flush ทันที (ไม่รอ debounce 1.5s)
      if (typeof flushPersistState === 'function') flushPersistState();
      
      // ── Batch push delta — รวม bills + stmts ทุกตัวที่เพิ่ง match ──
      // ใช้ uuid ตรวจ → ใช้ upsert API (สอดคล้องกับ pushMatchDelta)
      const matchedBills = [];
      const matchedStmts = [];
      // Re-scan: หา bills/stmts ที่ match_method=auto_* ใน range
      billList.forEach(b => {
        if (!b.bill_uuid) return;
        if (b.match_status !== 'matched') return;
        const d = toISODate(b.date);
        if (!d || d < dateFrom || d > dateTo) return;
        // เก็บเฉพาะที่เพิ่ง match จาก auto run นี้ (matched_at ภายใน 30 วินาที)
        const matchedAt = b.matched_at;
        if (matchedAt && (Date.now() - new Date(matchedAt).getTime()) < 30000) {
          matchedBills.push({ ...b, date: toISODate(b.date) || b.date });
        }
      });
      uploadedStatements.forEach(s => {
        if (!s.stmt_uuid) return;
        if (s.match_status !== 'matched') return;
        const sd = toISODate(s.date || s.trans_date);
        if (!sd || sd < dateFrom || sd > dateTo) return;
        const matchedAt = s.matched_at;
        if (matchedAt && (Date.now() - new Date(matchedAt).getTime()) < 30000) {
          matchedStmts.push({ ...s, date: toISODate(s.date) || s.date });
        }
      });
      
      // Group by year and push
      const pushPromises = [];
      if (matchedBills.length > 0) {
        const byYear = {};
        matchedBills.forEach(b => {
          const y = String(new Date(b.date).getFullYear());
          if (!byYear[y]) byYear[y] = [];
          byYear[y].push(b);
        });
        Object.keys(byYear).forEach(year => {
          pushPromises.push(
            api('upsertBills', { year, records: byYear[year], deletes: [] })
              .then(r => ({ type: 'bills', year, count: byYear[year].length, ok: r?.success !== false }))
              .catch(e => ({ type: 'bills', year, ok: false, err: e.message }))
          );
        });
      }
      if (matchedStmts.length > 0) {
        const byYear = {};
        matchedStmts.forEach(s => {
          const y = String(new Date(s.date).getFullYear());
          if (!byYear[y]) byYear[y] = [];
          byYear[y].push(s);
        });
        Object.keys(byYear).forEach(year => {
          pushPromises.push(
            api('upsertStatements', { year, records: byYear[year], deletes: [] })
              .then(r => ({ type: 'stmts', year, count: byYear[year].length, ok: r?.success !== false }))
              .catch(e => ({ type: 'stmts', year, ok: false, err: e.message }))
          );
        });
      }
      
      // ⭐ Wait for push to complete BEFORE allowing background pull to overwrite
      let pushSummary = '';
      if (pushPromises.length > 0) {
        try {
          const results = await Promise.all(pushPromises);
          const allOk = results.every(r => r.ok);
          if (allOk) {
            console.log('[auto-match] cloud push OK:', results);
            // Mark clean → fp will recompute and skip full push (ของเหมือน cloud แล้ว)
            if (window.syncManager?.markClean) {
              window.syncManager.markClean('bills');
              window.syncManager.markClean('stmts');
            }
            pushSummary = `\n☁️ Synced ${results.reduce((s,r)=>s+(r.count||0),0)} records to cloud`;
          } else {
            const fails = results.filter(r => !r.ok);
            console.warn('[auto-match] cloud push partial fail:', fails);
            // Mark dirty → syncManager retry full sync
            if (window.syncManager?.markDirty) {
              window.syncManager.markDirty('bills');
              window.syncManager.markDirty('stmts');
            }
            pushSummary = `\n⚠️ Cloud sync บางส่วนล้มเหลว — จะ retry อัตโนมัติ`;
          }
        } catch (err) {
          console.error('[auto-match] cloud push error:', err);
          pushSummary = `\n⚠️ Cloud sync error — จะ retry อัตโนมัติ`;
          // Fallback: markDirty
          if (window.syncManager?.markDirty) {
            window.syncManager.markDirty('bills');
            window.syncManager.markDirty('stmts');
          }
        }
      }
      
      // Final UI update
      let msg = `✅ Auto Match ${fmtDate(dateFrom)} → ${fmtDate(dateTo)}\n\n`;
      msg += `💰 เงินเข้า match: ${matched}\n`;
      msg += `💸 เงินออก match: ${matchedExp}\n`;
      const totalNoMatch = noMatch + skippedNeg;
      msg += `✗ ไม่เจอคู่: ${totalNoMatch}\n\n`;
      msg += `(Stmt ในช่วง: ${stmtsInRange} · Bills: ${billsInRange} รับ + ${expBillsInRange} จ่าย)`;
      msg += pushSummary;
      
      // ── Diagnostic: ถ้ามี stmt ไม่ match → แสดง 3 ตัวอย่าง + เหตุผล ──
      if (totalNoMatch > 0) {
        const unmatchedStmts = uploadedStatements.filter(s => {
          if (s.match_status === 'matched') return false;
          const sd = toISODate(s.date || s.trans_date);
          return sd && sd >= dateFrom && sd <= dateTo && Number(s.amount);
        });
        
        if (unmatchedStmts.length > 0) {
          msg += `\n\n━━ ตัวอย่าง Stmt ที่ match ไม่เจอ ━━`;
          const samples = unmatchedStmts.slice(0, 3);
          samples.forEach(stmt => {
            const sd = toISODate(stmt.date || stmt.trans_date);
            const sa = Number(stmt.amount || 0);
            msg += `\n\n📌 ${fmtDate(sd)} · ${sa > 0 ? '+' : ''}${fmtNum(sa)} (${stmt.bank||'?'})`;
            
            // หาเหตุผลที่ไม่ match
            // 1. หา bill วันเดียวกัน + ยอดเดียวกัน (ผ่าน filter หรือไม่)
            const sameAmtSameDate = billList.filter(b => {
              const bd = toISODate(b.date);
              return bd === sd && k2(billMatchAmount(b)) === k2(sa);
            });
            
            if (sameAmtSameDate.length > 0) {
                  msg += `\n  เจอบิล ${sameAmtSameDate.length} รายการวันเดียวยอดเดียวกัน แต่:`;
                  sameAmtSameDate.slice(0, 2).forEach(b => {
                    const reasons = [];
                    if (!MATCHABLE_TYPES.includes(b.type || '')) reasons.push(`Type="${b.type}" ไม่อยู่ใน [Transfer/Card/Cheque]`);
                    if (b.match_status === 'matched') reasons.push('match แล้ว');
                    if (b.match_status === 'paid') reasons.push('paid');
                    if (b.match_status === 'void') reasons.push('void');
                    // Bank ↔ station pairing
                    const stmtBankUp = String(stmt.bank||'').toUpperCase().replace(/\s+/g,' ').trim();
                    if (stmtBankUp === 'BBL NW' && String(b.station||'').startsWith('Front')) {
                      reasons.push(`BBL NW ไม่ match กับ Front* (กฎ bank pairing)`);
                    } else if (!isCompatible(b, stmt)) {
                      reasons.push(`ทิศทางไม่ตรง (บิล=${billDirection(b)}, stmt=${sa>0?'เข้า':'ออก'})`);
                    }
                    msg += `\n    • ${b.bill_no||'(no#)'} ${b.station||'?'}/${b.type||'?'}: ${reasons.join(', ') || 'บิลน่าจะ match ได้'}`;
                  });
                } else {
                  // ลองหายอดเดียวกันแต่วันต่าง (ใกล้เคียง)
                  const sameAmtOtherDate = billList.filter(b => k2(billMatchAmount(b)) === k2(sa)).slice(0, 2);
                  if (sameAmtOtherDate.length > 0) {
                    msg += `\n  ไม่เจอบิลวันเดียวกัน · พบยอดเดียวกันวันอื่น:`;
                    sameAmtOtherDate.forEach(b => {
                      msg += `\n    • ${b.bill_no||'(no#)'} วันที่ ${fmtDate(b.date)}`;
                    });
                  } else {
                    msg += `\n  ไม่เจอบิลที่ยอดตรงเลย (ทั้งวันเดียวกันและวันอื่น)`;
                  }
                }
              });
              
              if (unmatchedStmts.length > 3) {
                msg += `\n\n(…อีก ${unmatchedStmts.length - 3} รายการ — ดูในหน้า Statement Matching)`;
              }
            }
          }
          
          alert(msg);
          uploadedStatements = getAllStatements();
          render();
        }
      }
      render();
    }

      try {
        // ── Step 1: Pull to TEMP variables (ไม่แตะ local) ──

        const now = new Date();
        const years = [];
        for (let i = 0; i < 3; i++) years.push(String(now.getFullYear() - i));
        
        const tempBills = [];
        const tempStmts = {};
        const tempPayments = [];
        const tempSpTemps = [];
        const tempCashflow = [];
        const tempSuppliers = [];
        const tempSupplierPayments = [];
        let pullErrors = [];
        
        // Pull bills per year
        for (const y of years) {
          try {
            const r = await api('getBillsWithUuid', { year: y });
            if (r?.success && Array.isArray(r.data?.rows)) {
              r.data.rows.forEach(b => tempBills.push(b));
              tsLog(`   ✓ Bills ${y}: ${r.data.rows.length} rows`);
            } else if (r?.success === false) {
              tsLog(`   ⚠️ Bills ${y}: ${r.error}`);
              pullErrors.push(`Bills ${y}`);
            }
          } catch(err) {
            tsLog(`   ❌ Bills ${y}: ${err.message}`);
            pullErrors.push(`Bills ${y}: ${err.message}`);
          }
        }
        
        // Pull stmts per year
        for (const y of years) {
          try {
            const r = await api('getStatementsWithUuid', { year: y });
            if (r?.success && Array.isArray(r.data?.rows)) {
              r.data.rows.forEach(s => {
                if (!tempStmts[s.bank]) tempStmts[s.bank] = [];
                tempStmts[s.bank].push(s);
              });
              tsLog(`   ✓ Stmts ${y}: ${r.data.rows.length} rows`);
            }
          } catch(err) {
            tsLog(`   ❌ Stmts ${y}: ${err.message}`);
            pullErrors.push(`Stmts ${y}`);
          }
        }
        
        // Pull SP
        try {
          const r = await api('getPayments');
          const items = (r?.data?.data) || (Array.isArray(r?.data) ? r.data : []) || [];
          if (Array.isArray(items)) {
            items.forEach(p => tempPayments.push(p));
            tsLog(`   ✓ SP: ${items.length} rows`);
          }
        } catch(err) { tsLog(`   ⚠️ SP: ${err.message}`); }
        
        // Pull SP-TEMP
        try {
          const r = await api('getSpTemps');
          const items = (r?.data?.data) || (Array.isArray(r?.data) ? r.data : []) || [];
          if (Array.isArray(items)) {
            items.forEach(t => tempSpTemps.push(t));
            tsLog(`   ✓ SP-TEMP: ${items.length} rows`);
          }
        } catch(err) { tsLog(`   ⚠️ SP-TEMP: ${err.message}`); }
        
        // Pull Cashflow
        try {
          const r = await api('getCashflow');
          const items = (r?.data?.data) || (Array.isArray(r?.data) ? r.data : []) || [];
          if (Array.isArray(items)) {
            items.forEach(c => tempCashflow.push(c));
            tsLog(`   ✓ Cashflow: ${items.length} rows`);
          }
        } catch(err) { tsLog(`   ⚠️ Cashflow: ${err.message}`); }
        
        // Pull Suppliers
        try {
          const r = await api('getSuppliers');
          const items = (r?.data?.data) || (Array.isArray(r?.data) ? r.data : []) || [];
          if (Array.isArray(items)) {
            items.forEach(s => tempSuppliers.push(s));
            tsLog(`   ✓ Suppliers: ${items.length} rows`);
          }
        } catch(err) { tsLog(`   ⚠️ Suppliers: ${err.message}`); }
        
        try {
          const r = await api('getSupplierPayments');
          const items = (r?.data?.data) || (Array.isArray(r?.data) ? r.data : []) || [];
          if (Array.isArray(items)) {
            items.forEach(p => tempSupplierPayments.push(p));
            tsLog(`   ✓ Supplier Payments: ${items.length} rows`);
          }
        } catch(err) { tsLog(`   ⚠️ Supplier Payments: ${err.message}`); }
        
        // ⭐ Pull Meta (mainSummary + cashCount) — user input รายวัน: นำเงินเข้า/ขาย/ออก/คืนสินค้า
        // ใช้ new schema (getMetaWithUuid + parseCompactMetaRows) เท่านั้น — ไม่มี fallback
        const tempSummary = { __byDate: {} };
        const tempCashCount = { __byDate: {} };
        for (const y of years) {
          try {
            let handled = false;
            // Try new schema first
            try {
              const r = await api('getMetaWithUuid', { year: y });
              if (r?.success && Array.isArray(r.data?.rows) && r.data.rows.length > 0) {
                if (typeof window.parseCompactMetaRows === 'function') {
                  const parsed = window.parseCompactMetaRows(r.data.rows);
                  if (parsed.summary?.__byDate) {
                    Object.entries(parsed.summary.__byDate).forEach(([d, v]) => {
                      tempSummary.__byDate[d] = v;
                    });
                  }
                  if (parsed.cashCount?.__byDate) {
                    Object.entries(parsed.cashCount.__byDate).forEach(([d, v]) => {
                      tempCashCount.__byDate[d] = v;
                    });
                  }
                  handled = true;
                  tsLog(`   ✓ Meta ${y}: ${r.data.rows.length} rows via getMetaWithUuid (new schema)`);
                }
              }
            } catch(err) {
              tsLog(`   ⚠️ getMetaWithUuid ${y}: ${err.message}`);
            }
