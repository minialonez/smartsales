// ── Generate Bill List จาก Smart Excel ──
function generateBillList(result, fileName) {
  const newBills = [];
  let smartCount = 0, posCount = 0, mainCount = 0;

  // ── 1. อ่าน Smart bills (SS/OS/SR/OR/SC/SP) — รองรับทุกชื่อ Sheet ──
  // ขั้นที่ 1: ลองหา sheet ที่มีชื่อตรงเป๊ะก่อน
  let smartSheetName = result.sheetNames.find(n => /^(ss|or|sr|os).*(or|sr|os|ss)/i.test(n.replace(/\s+/g,'')));
  
  // ขั้นที่ 2: ถ้าไม่เจอ → scan ทุก sheet หาที่มี bill pattern SS/OS/SR/OR ใน col แรก
  if (!smartSheetName) {
    for (const name of result.sheetNames) {
      const sh = result.sheets[name] || [];
      // ตรวจ 20 แถวแรกว่ามีเลขบิลไหม
      const hasBills = sh.slice(0, 30).some(row => {
        const c0 = String((row||[])[0] || '').trim().toUpperCase();
        return /^(SS|OS|SR|OR|SC|SP|JS|JR)\d+-\d+/.test(c0);
      });
      if (hasBills) { smartSheetName = name; break; }
    }
  }
  
  const smartSheet = smartSheetName ? (result.sheets[smartSheetName] || []) : [];
  
  if (!smartSheetName) {
    toast('ไม่พบข้อมูลบิลในไฟล์ (ต้องมี SS/OS/SR/OR/SC/SP)', 'error');
    return;
  }

  // หา header row (ที่มีคอลัมน์ Amount/Bill) — ถ้าไม่เจอก็ไม่เป็นไร จะ skip แถวที่ไม่ใช่บิลเอง
  let smartHdr = -1;
  for (let i = 0; i < Math.min(10, smartSheet.length); i++) {
    const row = smartSheet[i] || [];
    if (row.some(c => String(c).toLowerCase().includes('amount')) || row.some(c => String(c).toLowerCase().includes('bill'))) {
      smartHdr = i; break;
    }
  }
  const startRow = smartHdr >= 0 ? smartHdr + 1 : 0;

  for (let i = startRow; i < smartSheet.length; i++) {
    const r = smartSheet[i] || [];
    const billNo = String(r[0] || '').trim();
    if (!billNo) continue;
    
    // Skip non-bill rows (เช่น "พนักงานขาย : ไม่ได้กำหนด")
    if (!/^(SS|OS|SR|OR|SC|SP|JS|JR)\d+-\d+/i.test(billNo)) continue;

    // Amount Incl VAT (col 8) หรือ col สุดท้าย
    const amount = Number(r[8]) || Number(r[6]) || 0;
    const customer = String(r[2] || '').replace(/^\[[^\]]+\]/, '').replace(/\n/g,' ').trim();
    const date = fmtDate(r[3]) || todayISO();

    const bill = transformBill(billNo, amount, customer, date);
    if (bill) {
      newBills.push(bill);
      smartCount++;
    }
  }

  // ── 2. อ่าน "Main" sheet — POS Front1-4 transactions ──
  const mainSheetName = result.sheetNames.find(n => n.toLowerCase().includes('main')) || 'Main';
  const mainSheet = result.sheets[mainSheetName] || [];

  // หา header row "Bill Number"
  let mainHdr = -1;
  for (let i = 0; i < Math.min(20, mainSheet.length); i++) {
    const row = mainSheet[i] || [];
    if (row.some(c => String(c).includes('Bill Number'))) {
      mainHdr = i; break;
    }
  }
  if (mainHdr >= 0) {
    for (let i = mainHdr + 1; i < mainSheet.length; i++) {
      const r = mainSheet[i] || [];
      const billNo = String(r[0] || '').trim();
      const date = r[1];
      const station = String(r[2] || '').trim();
      const type = String(r[3] || '').trim();
      const amount = Number(r[4]) || 0;
      const remarks1 = String(r[7] || '').trim();
      const remarks2 = String(r[8] || '').trim();

      if (!amount && !billNo) continue;
      if (!station && !billNo) continue;

      // ถ้ามีเลขบิล Smart → transform ตาม rule
      if (billNo && /^(SS|SC|SR|OS|OR|SP)/i.test(billNo)) {
        const bill = transformBill(billNo, amount, remarks1, fmtDate(date));
        if (bill) {
          bill.remarks1 = remarks1;
          bill.remarks2 = remarks2;
          if (type) bill.type = type; // ใช้ type จาก Main ถ้ามี
          bill.source_date = bill.date; // stamp for multi-day matching
          newBills.push(bill);
          posCount++;
        }
      } else {
        // POS transaction (Front1-4) — ไม่มีเลขบิล
        newBills.push({
          bill_no: billNo || '',
          date: fmtDate(date) || todayISO(),
          source_date: fmtDate(date) || todayISO(),
          station: station,
          type: type || '',
          amount: amount,
          confirmation: String(r[5] || ''),
          pay_date: fmtDate(r[6]) || '',
          remarks1: remarks1,
          remarks2: remarks2,
          bank: '',
          due_date: '',
          match_status: 'pending',
          source: 'pos',
        });
        mainCount++;
      }
    }
  }

  // ── 3. (ยกเลิก) ไม่ import summary rows แล้ว — ผู้ใช้จะกรอกเองในตาราง Summary ด้านบน ──

  // รวมกับของเดิม (ไม่ทับ) — รองรับดึงหลายวัน
  // ⭐ Composite key: bill_no มีเกือบทั้งหมด แต่เพิ่ม safety นิดหน่อย
  const compKey = (b) => `${b.bill_no||''}|${toISODate(b.date)||''}|${Number(b.amount)||0}|${b.station||''}|${b.type||''}`;
  const existingKeys = new Set(billList.map(compKey));
  const uniqueNewBills = newBills.filter(b => !existingKeys.has(compKey(b)));
  // Generate uuid for any imported bills missing one
  uniqueNewBills.forEach(b => {
    if (!b.bill_uuid) {
      b.bill_uuid = (typeof crypto !== 'undefined' && crypto.randomUUID) 
        ? crypto.randomUUID() 
        : 'b-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
    }
  });
  const duplicateCount = newBills.length - uniqueNewBills.length;
  billList = billList.concat(uniqueNewBills);
  persistMainState();
  
  // ── ตรวจสอบบิลซ้ำหลัง import ──
  const dupes = findDuplicateBills();
  
  let msg = `Generate สำเร็จ — ${uniqueNewBills.length} รายการใหม่`;
  if (duplicateCount > 0) msg += ` (ข้าม ${duplicateCount} ที่ซ้ำ)`;
  toast(msg, 'success');
  
  if (dupes.length > 0) {
    setTimeout(() => toast(`⚠️ พบบิลซ้ำ ${dupes.length} กลุ่ม — กด "🔍 ตรวจสอบ" เพื่อดูรายละเอียด`, 'warn'), 800);
  }

  if (currentPage === 'main' || currentPage === 'billlist') navigateTo('main');
}

// ── Transform เลขบิล → Station + Type ──
function transformBill(billNo, amount, customer, date) {
  const no = String(billNo).toUpperCase().trim();
  if (!no) return null;

  let station = '', type = '', stationOptions = null;
  let dueDate = '';

  if (no.startsWith('SC')) {
    station = 'Invoice Credit';
    type = 'Refund';
    stationOptions = ['Invoice', 'Invoice Credit']; // SC เลือกได้ 2 อย่าง
  } else if (no.startsWith('SR')) {
    station = 'Invoice Credit';
    type = 'Unknown';
    // Auto Due Date = วันที่ 20 เดือนถัดไป
    dueDate = calcNextMonth20(date);
  } else if (no.startsWith('OR')) {
    station = 'Order Credit';
    type = 'Unknown';
    dueDate = calcNextMonth20(date);
  } else if (no.startsWith('SS')) {
    station = 'Invoice';
    type = ''; // ให้กรอกเอง
  } else if (no.startsWith('OS')) {
    station = 'Order';
    type = '';
  } else if (no.startsWith('SP')) {
    station = 'Payment';
    type = '';
  } else {
    return null;
  }

  return {
    bill_no: billNo,
    date: date || todayISO(),
    source_date: date || todayISO(),
    station: station,
    type: type,
    amount: amount,
    confirmation: '',
    pay_date: '',
    remarks1: customer || '',
    remarks2: '',
    bank: '',
    due_date: dueDate,
    match_status: 'pending',
    source: 'smart',
    station_options: stationOptions, // SC → dropdown
  };
}

// คำนวณวันที่ 20 เดือนถัดไปจาก bill_date (สำหรับ Auto Due Date)
function calcNextMonth20(dateStr) {
  if (!dateStr) return '';
  const iso = toISODate(dateStr);
  if (!iso) return '';
  // Parse yyyy-mm-dd เป็น local date ตรงๆ (ไม่ผ่าน new Date(isoString) เพราะจะโดน UTC shift)
  const parts = iso.split('-');
  if (parts.length !== 3) return '';
  const y = Number(parts[0]);
  const m = Number(parts[1]) - 1;
  // วันที่ 20 เดือนถัดไป
  const next = new Date(y, m + 1, 20);
  if (isNaN(next)) return '';
  return `${next.getFullYear()}-${String(next.getMonth()+1).padStart(2,'0')}-${String(next.getDate()).padStart(2,'0')}`;
}

// Unmatch bill + statement ที่ผูกกันอยู่ (2-way)
function quickUnmatchBill(b) {
  if (!b) return;
  if (b.match_status !== 'matched') { toast('บิลนี้ไม่ได้อยู่ในสถานะ matched', 'info'); return; }
  
  const stmtRef = b.matched_stmt_ref;
  const bank = b.confirmation || b.bank || '?';
  
  if (!confirm(`ยกเลิก match บิล ${b.bill_no||'(ไม่มีเลข)'}?\n\n• Bill → pending, ล้าง confirmation/pay_date\n${stmtRef?`• Statement (${bank} · ref ${stmtRef}) → unmatched`:''}`)) return;
  
  // 1) หา statement ที่ผูกอยู่ → unmatch
  let stmtCleared = false;
  let unmatchedStmt = null;  // ⭐ hoist out for delta push
  if (stmtRef) {
    const allStmts = getAllStatements();
    const stmt = allStmts.find(s => s.ref_no === stmtRef);
    if (stmt) {
      stmt.match_status = 'unmatched';
      delete stmt.match_bill;
      delete stmt.matched_bills;
      delete stmt.match_station;
      delete stmt.match_method;
      delete stmt.matched_at;
      delete stmt.matched_by;
      delete stmt.match_reason;
      delete stmt.overpay_amount;
      stmtCleared = true;
      unmatchedStmt = stmt;
    }
  }
  
  // 2) Unmatch bill
  b.match_status = 'pending';
  delete b.confirmation;
  delete b.pay_date;
  delete b.matched_stmt_ref;
  delete b.matched_at;
  
  try { safeStorage.set('sf_statementsByBank', JSON.stringify(statementsByBank)); } catch(_){}
  persistMainState();
  invalidateBillsCache();
  
  // ⭐ Delta push: push bill + stmt ที่เพิ่ง unmatch (fire-and-forget)
  pushMatchDelta(b, unmatchedStmt);
  
  toast(`ยกเลิก match สำเร็จ${stmtCleared?' — statement กลับเป็น pending แล้ว':' (ไม่เจอ statement ผูกอยู่)'}`, 'success');
  
  // Re-render หน้า Main
  const mainEl = document.getElementById('main');
  if (mainEl && typeof currentPage !== 'undefined' && currentPage === 'main') navigateTo('main');
}

// Open Quick Match modal: เลือก statement วันเดียวกัน + ธนาคารเดียวกัน
// รองรับ multi-bill selection (ผูกหลายบิล → statement เดียวที่ยอดรวมตรงกัน)
function openQuickMatchModal(b) {
  if (!b) return;
  const billDate = toISODate(b.date);
  const billBank = String(b.bank||'').trim().toUpperCase();
  
  // State ของ modal
  let selectedBank = billBank || 'ALL';
  let selectedStmtRef = '';
  let dateWindow = 'day';           // day | day3 | day7 (เดิม = day, ขยายได้ถ้าไม่เจอ)
  let billSearchQuery = '';          // ← NEW: ค้นหาบิล (bypass date+bank filter)
  // Multi-bill: Set ของ bill references (ใช้ object ref แทน bill_no เพื่อกัน bill_no ว่างหรือซ้ำ)
  const selectedBills = new Set();
  selectedBills.add(b); // บิลที่เปิด modal มา = ติ๊กอัตโนมัติ
  
  // หาบิลอื่นที่ใกล้เคียงเพื่อเสนอให้ผูกร่วม:
  //   - วันเดียวกัน (หรือ ±window)
  //   - Type Transfer/Cheque/Card เหมือนกัน
  //   - ยังไม่ matched / paid / void
  //   - ยังไม่ถูก SP ตัด (ไม่มี paid_by_sp)
  function getEligibleBills() {
    const dayMs = 24*60*60*1000;
    const winDays = dateWindow === 'day' ? 0 : dateWindow === 'day3' ? 1 : 3;
    const refDate = new Date(billDate);
    
    return billList.filter(x => {
      if (!x) return false;
      // อย่าซ้ำตัวเอง
      if (x === b) return false;
      // Status: เอาเฉพาะที่ match ได้
      if (['matched','paid','void','bounced'].includes(x.match_status)) return false;
      if (x.paid_by_sp) return false;
      // Type ต้อง match ได้ (Transfer/Cheque/Card)
      if (!['Transfer','Cheque','Card'].includes(x.type)) return false;
      // Date window
      const xDate = toISODate(x.date);
      if (!xDate) return false;
      const diff = Math.abs((new Date(xDate) - refDate) / dayMs);
      if (diff > winDays) return false;
      // ถ้า bank ระบุไว้ → ต้องตรงกับ bank ของบิลแรก หรือว่างก็ได้ (user จะกรอกทีหลัง)
      return true;
    });
  }
  
  // ⭐ NEW: search across ALL billList (bypass date+bank window)
  // ใช้เมื่อ user พิมพ์ค้นหา — เจอบิลที่อยู่นอก window ได้
  // Filter: bill_no / remarks1 / amount / customer_code / station
  function searchAllBills(query) {
    if (!query || !query.trim()) return [];
    const q = query.trim().toLowerCase();
    return billList.filter(x => {
      if (!x || x === b) return false;
      // Status guard: ไม่เอา matched/paid/void แต่ยังโชว์ pending/awaiting_clear/bounced
      if (['matched','paid','void'].includes(x.match_status)) return false;
      if (x.paid_by_sp) return false;
      // Type ต้อง match ได้
      if (!['Transfer','Cheque','Card'].includes(x.type)) return false;
      // Match query: bill_no / remarks / amount / customer / station
      return (x.bill_no || '').toLowerCase().includes(q) ||
             (x.remarks1 || '').toLowerCase().includes(q) ||
             (x.remarks2 || '').toLowerCase().includes(q) ||
             (x.customer_code || '').toLowerCase().includes(q) ||
             (x.station || '').toLowerCase().includes(q) ||
             String(Math.abs(Number(x.amount)||0)).includes(q);
    }).slice(0, 50); // cap 50 ผลลัพธ์ — กันหน้ารก
  }
  
  // Sum ของบิลที่เลือก — port logic จาก Matching page (mmBillMatchAmt + isSC)
  // ═══════════════════════════════════════════════════════════════════════
  // Formula (ตรงกับ renderMatching L12719, L13058-13065):
  //   แต่ละบิล: net = มี fee (wht/transfer_fee/card_fee) ? amount − fees : amount
  //   SC/JS/JR (credit note) → นับ −net (ลบ)
  //   อื่นๆ → นับ +net
  // ─ ของเดิม: sum += Math.abs(amount) — bug: ไม่หัก fee + ไม่ handle credit note
  // ─ User's self-fix เดิม: สูตรผิดทำให้ target double/inflated
  // ═══════════════════════════════════════════════════════════════════════
  function getSelectedSum() {
    let sum = 0;
    selectedBills.forEach(x => {
      if (!x) return;
      const amt = Math.abs(Number(x.amount) || 0);
      // Net amount (หัก fee ถ้ามี)
      let net = amt;
      if (!x._cashflow && !x._supplierPayment) {
        const wht = Number(x.wht_amount) || 0;
        const tf = Number(x.transfer_fee) || 0;
        const cf = Number(x.card_fee) || 0;
        const fees = wht + tf + cf;
        if (fees > 0) net = amt - fees;
      }
      // Credit note prefix = SC / JS / JR → contribute เป็นลบ
      const prefix = String(x.bill_no || '').substring(0, 2).toUpperCase();
      const isCredit = ['SC', 'JS', 'JR'].includes(prefix);
      sum += isCredit ? -net : net;
    });
    return sum;
  }
  
  function computeCandidates() {
    const targetSum = getSelectedSum();
    const all = getAllStatements();
    const dayMs = 24*60*60*1000;
    const winDays = dateWindow === 'day' ? 0 : dateWindow === 'day3' ? 1 : 3;
    const refDate = new Date(billDate);
    
    // ── Direction filter (เหมือนใน Matching page / runAutoMatchRange) ──
    // บิลที่จะผูก (selectedBills + opener b) ทั้งหมดเป็น income หรือ expense?
    // ถ้ามีบิลแรก b เป็นตัวตัดสิน direction (บิลหลักของ modal นี้)
    const INCOME_PREFIXES = ['SS','OS','SP','S2','BS','PC'];
    const EXPENSE_PREFIXES = ['PP','PS','MS','PX','SC','JS','JR'];
    const prefix = String(b.bill_no || '').substring(0, 2).toUpperCase();
    const isFront = String(b.station || '').startsWith('Front');
    let billDir = 'unknown';
    if (isFront || INCOME_PREFIXES.includes(prefix)) billDir = 'income';
    else if (EXPENSE_PREFIXES.includes(prefix)) billDir = 'expense';
    
    return all.filter(s => {
      // Match status: check both explicit 'matched' AND presence of match_bill
      if (s.match_status === 'matched' || s.match_bill) return false;
      
      // Date window
      const sDate = toISODate(s.date || s.trans_date);
      if (!sDate) return false;
      const diff = Math.abs((new Date(sDate) - refDate) / dayMs);
      if (diff > winDays) return false;
      
      // Bank filter
      if (selectedBank !== 'ALL' && String(s.bank||'').toUpperCase() !== selectedBank) return false;
      
      // Direction filter: income bill → +stmt, expense bill → −stmt (unknown = ทั้ง 2)
      const stmtAmt = Number(s.amount) || 0;
      if (billDir === 'income' && stmtAmt < 0) return false;
      if (billDir === 'expense' && stmtAmt > 0) return false;
      
      // Amount tolerance: ยอดใกล้ ±20% หรือ ≤1 บาท 
      // (เดิม 5% — แคบไปสำหรับ case ลูกค้าโอนเกิน, แต่ 20% ยังกรอง junk ออกได้)
      const absStmt = Math.abs(stmtAmt);
      const amtDiff = Math.abs(absStmt - targetSum);
      if (amtDiff >= 1 && amtDiff >= targetSum * 0.20) return false;
      
      return true;
    }).sort((x, y) => {
      // ยอดตรงเป๊ะ (<0.01) ขึ้นก่อน, รองคือ วันที่ใกล้
      const dx = Math.abs(Math.abs(Number(x.amount)||0) - targetSum);
      const dy = Math.abs(Math.abs(Number(y.amount)||0) - targetSum);
      const xExact = dx < 0.01 ? 0 : 1;
      const yExact = dy < 0.01 ? 0 : 1;
      if (xExact !== yExact) return xExact - yExact;
      // รองลงไปเรียงตาม diff น้อยก่อน
      return dx - dy;
    });
  }
  
  function computeBankCounts() {
    const counts = {};
    const dayMs = 24*60*60*1000;
    const winDays = dateWindow === 'day' ? 0 : dateWindow === 'day3' ? 1 : 3;
    const refDate = new Date(billDate);
    
    getAllStatements().forEach(s => {
      if (s.match_status === 'matched' || s.match_bill) return;
      const sDate = toISODate(s.date || s.trans_date);
      if (!sDate) return;
      const diff = Math.abs((new Date(sDate) - refDate) / dayMs);
      if (diff > winDays) return;
      const bk = String(s.bank||'UNKNOWN').toUpperCase();
      counts[bk] = (counts[bk]||0) + 1;
    });
    return counts;
  }
  
  // Re-render sum bar + candidate list based on current selection
  function updateUI() {
    const targetSum = getSelectedSum();
    // Update header sum
    const sumEl = document.getElementById('qm-target-sum');
    if (sumEl) sumEl.textContent = `฿${fmtNum(targetSum)}`;
    const countEl = document.getElementById('qm-bill-count');
    if (countEl) countEl.textContent = selectedBills.size;
    
    renderBillChecklist();
    renderStatementList();
    
    // ── Confirm enable logic ──
    // เงื่อนไข: (1) เลือกบิลอย่างน้อย 1 (2) เลือก stmt (3) ถ้ามี diff → reason ต้องไม่ว่าง
    const confirmBtn = document.getElementById('qm-confirm');
    if (confirmBtn) {
      const hasBasics = selectedStmtRef && selectedBills.size > 0;
      let diff = 0;
      let stmtAbs = 0;
      if (hasBasics) {
        const stmt = getAllStatements().find(s => s.ref_no === selectedStmtRef);
        if (stmt) {
          stmtAbs = Math.abs(Number(stmt.amount)||0);
          diff = stmtAbs - targetSum;  // + = ลูกค้าโอนเกิน (stmt > bills)
        }
      }
      const hasDiff = Math.abs(diff) >= 0.01;
      const reasonEl = document.getElementById('qm-reason');
      const reasonFilled = (reasonEl?.value || '').trim().length > 0;
      
      // ⭐ Diagnostic: ถ้ามี diff ให้ console log รายละเอียด
      // User จะเห็น breakdown ว่า target มาจากไหน → หา root cause ได้
      if (hasDiff) {
        const billBreakdown = [...selectedBills].map(x => {
          const amt = Math.abs(Number(x.amount)||0);
          const wht = Number(x.wht_amount)||0;
          const tf = Number(x.transfer_fee)||0;
          const cf = Number(x.card_fee)||0;
          const fees = wht + tf + cf;
          const prefix = String(x.bill_no||'').substring(0,2).toUpperCase();
          const isCredit = ['SC','JS','JR'].includes(prefix);
          const net = fees > 0 ? amt - fees : amt;
          const contrib = isCredit ? -net : net;
          return { bill: x.bill_no||'(no#)', gross: amt, wht, tf, cf, net, isCredit, contrib };
        });
        console.group(`⚠️ Match diff: stmt ฿${stmtAbs.toFixed(2)} − target ฿${targetSum.toFixed(2)} = ${diff > 0 ? '+' : ''}${diff.toFixed(2)}`);
        console.table(billBreakdown);
        console.log('Selected bills sum:', billBreakdown.reduce((s,b)=>s+b.contrib, 0).toFixed(2));
        console.groupEnd();
      }
      
      // Update reason label + border — ให้ user เห็นชัดว่าต้องกรอก
      const reasonLabel = document.getElementById('qm-reason-label');
      const reasonGroup = document.getElementById('qm-reason-group');
      if (hasDiff) {
        if (reasonLabel) reasonLabel.innerHTML = `<span style="color:var(--danger)">* หมายเหตุ (บังคับเมื่อยอดต่าง)</span> — <span style="color:var(--warn)">stmt ฿${fmtNum(stmtAbs)} − รวม ฿${fmtNum(targetSum)} = ${diff > 0 ? '+' : ''}${fmtNum(diff)}</span> <span class="text-xs" style="color:var(--text3)">(ดู console สำหรับ breakdown)</span>`;
        if (reasonEl && !reasonFilled) reasonEl.style.borderColor = 'var(--danger)';
        else if (reasonEl) reasonEl.style.borderColor = '';
        if (reasonGroup) reasonGroup.style.background = 'rgba(244,180,26,.05)';
      } else {
        if (reasonLabel) reasonLabel.innerHTML = `หมายเหตุ (optional) — เหตุผลการ match`;
        if (reasonEl) reasonEl.style.borderColor = '';
        if (reasonGroup) reasonGroup.style.background = '';
      }
      
      confirmBtn.disabled = !hasBasics || (hasDiff && !reasonFilled);
      
      // Update label ของปุ่ม
      if (hasDiff) {
        confirmBtn.innerHTML = `⚠️ Match ยอดต่าง ${diff > 0 ? '+' : ''}฿${fmtNum(Math.abs(diff))}`;
        confirmBtn.style.background = 'var(--warn)';
        confirmBtn.style.borderColor = 'var(--warn)';
      } else {
        confirmBtn.innerHTML = `${ICONS.check} ผูกเข้ากัน`;
        confirmBtn.style.background = '';
        confirmBtn.style.borderColor = '';
      }
    }
  }
  
  function renderBillChecklist() {
    const container = document.getElementById('qm-bill-list');
    if (!container) return;
    const targetSum = getSelectedSum();
    const stmtAbs = selectedStmtRef ? (() => {
      const s = getAllStatements().find(x => x.ref_no === selectedStmtRef);
      return s ? Math.abs(Number(s.amount)||0) : 0;
    })() : 0;
    
    // ⭐ Mode switch: search vs eligible
    // - ถ้า user พิมพ์ค้นหา → แสดงผล search (bypass filter)
    // - ถ้าว่าง → แสดง bills ใน date+bank window + selected bills ที่มาจาก search ก่อนหน้า
    let others;
    if (billSearchQuery.trim()) {
      others = searchAllBills(billSearchQuery);
    } else {
      others = getEligibleBills();
      // บวก bills ที่ user เคย select จาก search แต่ไม่อยู่ใน window → keep แสดง ป้องกันหาย
      const othersSet = new Set(others);
      selectedBills.forEach(x => {
        if (x !== b && !othersSet.has(x)) others.push(x);
      });
    }
    const allBills = [b, ...others];
    
    container.innerHTML = allBills.length === 0 ? `
      <div style="padding:16px;text-align:center;color:var(--text3);font-size:.82rem">
        ${billSearchQuery.trim() ? '🔍 ไม่เจอบิลที่ตรงกับคำค้น' : 'ไม่มีบิลอื่นในช่วงนี้'}
      </div>
    ` : allBills.map((x, i) => {
      const isSelected = selectedBills.has(x);
      const xAmt = Math.abs(Number(x.amount)||0);
      const isOpener = x === b;
      // ⭐ Compute net amount for this bill (match logic เทียบ net ไม่ใช่ gross)
      const xWht = Number(x.wht_amount)||0;
      const xTf  = Number(x.transfer_fee)||0;
      const xCf  = Number(x.card_fee)||0;
      const xFees = (!x._cashflow && !x._supplierPayment) ? (xWht + xTf + xCf) : 0;
      const xNet = xFees > 0 ? xAmt - xFees : xAmt;
      // ⭐ Highlight: เทียบ NET กับ stmt (ไม่ใช่ gross) — ให้ badge ตรงกับ target
      const isExactWithStmt = stmtAbs > 0 && Math.abs(xNet - stmtAbs) < 0.01;
      // Source tag (ถ้ามาจาก SP หรือ cashflow เพิ่มทีหลังได้ — ตอนนี้เป็น bill ทั้งหมด)
      const bg = isSelected ? 'background:rgba(79,156,249,.18);border-color:var(--info)' 
               : isExactWithStmt ? 'background:rgba(63,196,143,.08);border-color:rgba(63,196,143,.4)'
               : 'background:transparent;border-color:var(--border)';
      // แสดงสถานะของบิลถ้าไม่ใช่ pending
      const statusBadge = x.match_status && x.match_status !== 'pending' 
        ? `<span class="badge" style="background:var(--surface2);font-size:.65rem;color:var(--warn)">${x.match_status}</span>` 
        : '';
      return `
        <label class="qm-bill-item" data-idx="${i}" 
               style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--border);cursor:pointer;${bg};border-left:3px solid ${isSelected?'var(--info)':isExactWithStmt?'rgba(63,196,143,.5)':'transparent'};transition:all .15s">
          <input type="checkbox" class="qm-bill-check" ${isSelected?'checked':''} ${isOpener?'disabled':''} style="cursor:pointer;accent-color:var(--info);width:18px;height:18px;flex-shrink:0">
          <div style="flex:1;min-width:0;font-size:.82rem">
            <div class="flex items-center gap-2" style="flex-wrap:wrap">
              <span style="font-weight:600">${x.bill_no || '(ไม่มีเลข)'}</span>
              <span class="badge" style="background:var(--surface2);font-size:.65rem">${x.type||'-'}</span>
              ${isOpener ? '<span class="badge badge-info" style="font-size:.65rem">⭐ บิลแรก</span>' : ''}
              ${isExactWithStmt && !isOpener ? '<span class="badge badge-success" style="font-size:.65rem">✓ ยอดตรง stmt</span>' : ''}
              ${statusBadge}
            </div>
            <div class="text-xs text-muted">${fmtDate(x.date)} · ${x.station||'-'}${x.bank?` · ${x.bank}`:''}${x.remarks1?` · ${String(x.remarks1).substring(0,40)}`:''}</div>
          </div>
          <div style="text-align:right;font-size:.88rem;white-space:nowrap">
            <div style="font-weight:700;color:var(--success)">฿${fmtNum(xNet)}</div>
            ${xFees > 0 ? `<div class="text-xs" style="color:var(--text3);font-size:.68rem">เต็ม ฿${fmtNum(xAmt)} − fee ฿${fmtNum(xFees)}</div>` : ''}
          </div>
        </label>
      `;
    }).join('');
    
    // Store refs for click handling
    container._bills = allBills;
    
    container.querySelectorAll('.qm-bill-item').forEach((item, idx) => {
      const bill = allBills[idx];
      const chk = item.querySelector('.qm-bill-check');
      if (!chk || chk.disabled) return;
      item.addEventListener('click', (e) => {
        if (e.target.tagName === 'INPUT') return; // checkbox ดูแลเอง
        chk.checked = !chk.checked;
        if (chk.checked) selectedBills.add(bill);
        else selectedBills.delete(bill);
        updateUI();
      });
      chk.addEventListener('change', () => {
        if (chk.checked) selectedBills.add(bill);
        else selectedBills.delete(bill);
        updateUI();
      });
    });
  }
  
  function renderStatementList() {
    const list = computeCandidates();
    const container = document.getElementById('qm-stmt-list');
    if (!container) return;
    const targetSum = getSelectedSum();
    
    if (list.length === 0) {
      const targetLabel = fmtNum(targetSum);
      container.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text3);font-size:.85rem">
        ไม่พบ statement ยอด <b style="color:var(--warn)">฿${targetLabel}</b> ${selectedBank!=='ALL'?`ใน ${selectedBank} `:''}${dateWindow==='day'?`วันที่ ${fmtDate(billDate)}`:`ใน ±${dateWindow==='day3'?1:3} วันจาก ${fmtDate(billDate)}`} ที่ยังไม่ถูก match
        <div style="margin-top:8px">💡 ลองขยายช่วงวันที่ด้านบน หรือเปลี่ยนธนาคารเป็น "ทั้งหมด"</div>
        <div style="margin-top:4px;color:var(--text2);font-size:.78rem">กรอง: ยอดตรง ±5% · ทิศทาง (รับ/จ่าย) · วันที่</div>
      </div>`;
      return;
    }
    
    container.innerHTML = list.map(s => {
      const absAmt = Math.abs(Number(s.amount)||0);
      const diff = Math.abs(absAmt - targetSum);
      const isExact = diff < 0.01;
      const isSelected = s.ref_no === selectedStmtRef;
      const dir = Number(s.amount) >= 0 ? '+' : '−';
      const dirColor = Number(s.amount) >= 0 ? 'var(--success)' : 'var(--danger)';
      
      // ── Clear visual hierarchy: selection > exact match > normal ──
      let bg, border, extraStyle = '';
      if (isSelected) {
        // เลือกอยู่: พื้นฟ้าเข้ม + border ฟ้าหนา + outline เรืองแสง
        bg = 'background:rgba(79,156,249,.28)';
        border = 'border:2px solid var(--info)';
        extraStyle = 'box-shadow:0 0 0 3px rgba(79,156,249,.35), inset 0 0 0 1px rgba(255,255,255,.1);transform:scale(1.01)';
      } else if (isExact) {
        // ยอดตรงแต่ยังไม่เลือก: แค่ border เขียวบางๆ — ให้ user รู้ว่าตรง
        bg = 'background:rgba(63,196,143,.05)';
        border = 'border:1px solid rgba(63,196,143,.5)';
      } else {
        bg = '';
        border = 'border:1px solid var(--border)';
      }
      
      return `
        <div class="qm-item" data-ref="${s.ref_no||''}" 
             style="padding:10px 12px;cursor:pointer;transition:all .15s;${bg};${border};${extraStyle};border-radius:6px;margin-bottom:4px;position:relative">
          ${isSelected ? '<div style="position:absolute;top:-8px;right:8px;background:var(--info);color:#fff;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:700">✓ เลือกแล้ว</div>' : ''}
          <div class="flex justify-between items-center">
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;color:${dirColor};font-size:.95rem">
                ${dir}฿${fmtNum(absAmt)}
              </div>
              <div class="text-xs text-muted" style="margin-top:2px">
                ${fmtDate(s.date)} · ${s.bank||'?'} · ref: <span style="font-family:monospace">${s.ref_no||'-'}</span>
              </div>
              ${s.description?`<div class="text-xs" style="color:var(--text2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${String(s.description).substring(0,80)}</div>`:''}
            </div>
            <div style="text-align:right;white-space:nowrap">
              ${isExact
                ? '<span class="badge badge-success" style="font-size:.7rem">ยอดตรง</span>'
                : `<span class="text-xs" style="color:var(--text3)">ต่าง ฿${fmtNum(diff)}</span>`}
            </div>
          </div>
        </div>
      `;
    }).join('');
    
    container.querySelectorAll('.qm-item').forEach(el => {
      el.addEventListener('click', () => {
        // Toggle: คลิกซ้ำ → ยกเลิก
        const newRef = el.dataset.ref;
        selectedStmtRef = (selectedStmtRef === newRef) ? '' : newRef;
        updateUI();
      });
    });
  }
  
  const bankCounts = computeBankCounts();
  // สร้าง list ของ banks แบบ dynamic จากข้อมูลจริงใน statements (ไม่ hardcode)
  // + ลำดับ priority: banks ที่รู้จัก (KTB, KBANK, BBL, BBL NW, TTB, SCB, ...) ขึ้นก่อน, 
  //   ที่เหลือเรียง alphabetical — ป้องกันตกธนาคารในอนาคต
  const BANK_ORDER = ['KTB','KBANK','BBL','BBL NW','TTB','SCB','KKP','UOB','CIMB','LH'];
  const bankSet = new Set();
  getAllStatements().forEach(s => {
    const bk = String(s.bank || '').trim().toUpperCase();
    if (bk) bankSet.add(bk);
  });
  // Also include known priority banks even if 0 stmts (so user sees them if data arrives)
  BANK_ORDER.forEach(bk => bankSet.add(bk));
  const allBanks = [...bankSet].sort((a, b) => {
    const ia = BANK_ORDER.indexOf(a);
    const ib = BANK_ORDER.indexOf(b);
    if (ia !== -1 && ib !== -1) return ia - ib;
    if (ia !== -1) return -1;
    if (ib !== -1) return 1;
    return a.localeCompare(b);
  });
  const billAmt0 = Math.abs(Number(b.amount)||0);
  // ⭐ Compute fees for opener (ถ้ามี WHT/transfer_fee/card_fee → แสดง gross→net)
  const b_wht = Number(b.wht_amount)||0;
  const b_tf  = Number(b.transfer_fee)||0;
  const b_cf  = Number(b.card_fee)||0;
  const b_fees = b_wht + b_tf + b_cf;
  const b_net  = b_fees > 0 ? billAmt0 - b_fees : billAmt0;
  const feeParts = [];
  if (b_wht > 0) feeParts.push(`WHT ฿${fmtNum(b_wht)}`);
  if (b_tf  > 0) feeParts.push(`ค่าโอน ฿${fmtNum(b_tf)}`);
  if (b_cf  > 0) feeParts.push(`ค่าบัตร ฿${fmtNum(b_cf)}`);
  const feeText = feeParts.length ? feeParts.join(' + ') : '';
  
  openModal(`🔗 Match Bill → Statement`, `
    <div class="flex-col gap-3" style="min-width:600px;max-width:700px">
      <div style="padding:10px;background:var(--bg2);border-radius:6px;font-size:.85rem">
        <div>
          <b>บิลแรก:</b> ${b.bill_no||'(ไม่มีเลข)'} · ${b.type||'-'} · 
          ${b_fees > 0 
            ? `<span style="text-decoration:line-through;color:var(--text3)">฿${fmtNum(billAmt0)}</span> − ${feeText} → <b style="color:var(--success)">฿${fmtNum(b_net)} สุทธิ</b>`
            : `<b style="color:var(--success)">฿${fmtNum(billAmt0)}</b>`
          } · ${fmtDate(billDate)}
        </div>
        ${b.station?`<div class="text-xs text-muted" style="margin-top:2px">Station: ${b.station}${b.bank?` · Bank: ${b.bank}`:''}${b_fees > 0 ? ` · <span style="color:var(--info)">💡 match เทียบยอดสุทธิหลังหัก fee</span>`:''}</div>`:''}
      </div>
      
      <!-- Bills selector -->
      <div>
        <div class="flex justify-between items-center" style="margin-bottom:6px">
          <div class="text-xs text-dim">เลือกบิลที่จะผูกพร้อมกัน (ยอดรวมสุทธิ → statement):</div>
          <div class="text-xs" style="color:var(--info)">
            เลือก <b id="qm-bill-count">1</b> บิล · รวม: <b id="qm-target-sum" style="color:var(--success)">฿${fmtNum(b_net)}</b>
          </div>
        </div>
        <!-- ⭐ Search bills — bypass date+bank filter เมื่อมี query -->
        <div class="flex gap-2 items-center" style="margin-bottom:6px">
          <input type="text" id="qm-bill-search" placeholder="🔍 ค้นหาบิล: เลขบิล / remarks / ยอดเงิน / station"
                 class="input" style="flex:1;font-size:.8rem;padding:6px 10px">
          <button class="btn btn-ghost btn-sm" id="qm-bill-search-clear" style="padding:4px 10px;display:none" title="ล้างคำค้น">✕</button>
        </div>
        <div id="qm-bill-list" style="max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;background:var(--card)"></div>
      </div>
      
      <!-- Bank + Date window filter -->
      <div class="flex gap-2 flex-wrap items-center">
        <div class="text-xs text-dim">ธนาคาร:</div>
        <div class="flex gap-1 flex-wrap" id="qm-bank-pills" style="flex:1">
          ${allBanks.map(bk => {
            const c = bankCounts[bk]||0;
            const active = selectedBank === bk;
            return `<button class="pill ${active?'active':''}" data-bank="${bk}" ${c===0?'style="opacity:.4"':''}>${bk} (${c})</button>`;
          }).join('')}
          <button class="pill ${selectedBank==='ALL'?'active':''}" data-bank="ALL">ทั้งหมด</button>
        </div>
      </div>
      
      <div class="flex gap-2 flex-wrap items-center">
        <div class="text-xs text-dim">ช่วงวันที่:</div>
        <div class="flex gap-1" id="qm-date-pills">
          <button class="pill ${dateWindow==='day'?'active':''}" data-dw="day">วันนี้ (${fmtDate(billDate)})</button>
          <button class="pill ${dateWindow==='day3'?'active':''}" data-dw="day3">±1 วัน</button>
          <button class="pill ${dateWindow==='day7'?'active':''}" data-dw="day7">±3 วัน</button>
        </div>
        <div style="flex:1"></div>
        <div class="text-xs text-muted">💡 ขยายช่วงถ้าไม่เจอ statement</div>
      </div>
      
      <!-- Statement list -->
      <div>
        <div class="text-xs text-dim" style="margin-bottom:6px">Statement ที่ยังไม่ match (เรียงยอดใกล้รวมที่สุดก่อน):</div>
        <div id="qm-stmt-list" style="max-height:260px;overflow-y:auto;padding:4px;border:1px solid var(--border);border-radius:6px;background:var(--card)"></div>
      </div>
      
      <!-- ⭐ Reason field — บังคับเมื่อยอดต่าง, แสดง diff ด้วย -->
      <div class="input-group" id="qm-reason-group" style="margin-top:4px;padding:6px 8px;border-radius:6px;transition:background .15s">
        <label id="qm-reason-label" style="font-size:.78rem;color:var(--text2)">หมายเหตุ (optional) — เหตุผลการ match</label>
        <input class="input" id="qm-reason" placeholder="เช่น ลูกค้าโอนเกิน 575 คืนเงินสด / ปัดเศษ / หัก WHT..." style="font-size:.8rem;padding:6px 10px;transition:border-color .15s">
      </div>
      
      <div class="flex gap-2 mt-2">
        <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
        <button class="btn btn-primary btn-sm flex-1" id="qm-confirm" disabled>${ICONS.check} ผูกเข้ากัน</button>
      </div>
    </div>
  `);
  
  // Wire bank pills
  document.querySelectorAll('#qm-bank-pills [data-bank]').forEach(p => {
    p.addEventListener('click', () => {
      selectedBank = p.dataset.bank;
      document.querySelectorAll('#qm-bank-pills .pill').forEach(x => x.classList.toggle('active', x.dataset.bank === selectedBank));
      selectedStmtRef = '';
      updateUI();
    });
  });
  
  // Wire date window pills
  document.querySelectorAll('#qm-date-pills [data-dw]').forEach(p => {
    p.addEventListener('click', () => {
      dateWindow = p.dataset.dw;
      document.querySelectorAll('#qm-date-pills .pill').forEach(x => x.classList.toggle('active', x.dataset.dw === dateWindow));
      selectedStmtRef = '';
      updateUI();
    });
  });
  
  // ⭐ Wire bill search input (debounce 200ms)
  const $searchInput = document.getElementById('qm-bill-search');
  const $searchClear = document.getElementById('qm-bill-search-clear');
  let _searchTimer = null;
  if ($searchInput) {
    $searchInput.addEventListener('input', () => {
      clearTimeout(_searchTimer);
      _searchTimer = setTimeout(() => {
        billSearchQuery = $searchInput.value;
        if ($searchClear) $searchClear.style.display = billSearchQuery.trim() ? 'inline-block' : 'none';
        renderBillChecklist();
      }, 200);
    });
  }
  if ($searchClear) {
    $searchClear.addEventListener('click', () => {
      if ($searchInput) $searchInput.value = '';
      billSearchQuery = '';
      $searchClear.style.display = 'none';
      renderBillChecklist();
      if ($searchInput) $searchInput.focus();
    });
  }
  
  // ⭐ Wire reason input — trigger updateUI so confirm button re-evaluates enable state
  document.getElementById('qm-reason')?.addEventListener('input', () => updateUI());
  
  // Initial render
  updateUI();
  
  // Confirm: ผูก statement เดียว ↔ หลาย bills
  document.getElementById('qm-confirm')?.addEventListener('click', () => {
    if (selectedBills.size === 0) { toast('ต้องเลือกอย่างน้อย 1 บิล', 'warn'); return; }
    if (!selectedStmtRef) { toast('ต้องเลือก statement', 'warn'); return; }
    
    const allStmts = getAllStatements();
    const stmt = allStmts.find(s => s.ref_no === selectedStmtRef);
    if (!stmt) { toast('ไม่พบ statement', 'error'); return; }
    
    const billArr = Array.from(selectedBills);
    // Format: "OS00126-002795 (฿10,654.00)" per bill
    const billLabels = billArr.map(x => {
      const no = x.bill_no || '(ไม่มีเลข)';
      const amt = fmtNum(Math.abs(Number(x.amount)||0));
      return `${no} (฿${amt})`;
    });
    const billNos = billArr.map(x => x.bill_no || '(no#)'); // เลขบิลเท่านั้น (สำหรับ traceability)
    const now = new Date().toISOString();
    const stmtDateISO = toISODate(stmt.date) || toISODate(b.date);
    
    // Update bills (ทุกตัวที่ติ๊ก)
    // pay_date = วันที่โอนจริงตาม statement (ไม่ใช่วันออกบิล) — match event คือ payment event
    billArr.forEach(x => {
      x.match_status = 'matched';
      x.confirmation = stmt.bank || '';
      x.pay_date = stmtDateISO;  // overwrite always (เดิม: if (!x.pay_date) ทำให้บิลที่มี pay_date เดิมอยู่แล้วไม่อัปเดตเป็นวันโอน)
      x.matched_stmt_ref = stmt.ref_no || '';
      x.matched_at = now;
    });
    
    // Update statement — match_bill แสดงเลขบิล+ยอด ให้ user อ่านง่าย
    // ── คำนวณ diff: stmt เทียบกับยอดรวมบิล ──
    const stmtAbs = Math.abs(Number(stmt.amount)||0);
    const selectedSum = getSelectedSum();
    const diff = stmtAbs - selectedSum;  // + = ลูกค้าโอนเกิน (stmt > bills)
    const hasDiff = Math.abs(diff) >= 0.01;
    
    stmt.match_status = 'matched';
    // match_method: ถ้ายอดต่าง → 'manual_diff', ไม่ต่าง → multi/manual ตามปกติ
    stmt.match_method = hasDiff ? 'manual_diff' 
                      : (billArr.length > 1 ? 'quick_multi' : 'quick_manual');
    stmt.match_station = billArr[0].station || '';
    stmt.match_bill = billArr.length > 1 ? billLabels.join(' + ') : billLabels[0];
    // ⭐ Always set matched_bills (เลขบิลล้วน ไม่มี "(฿amount)" suffix) — ใช้เป็น source of truth ตอน unmatch
    // แก้บั๊ก: Main page ใส่ "(฿amount)" ใน match_bill ทำให้ Matching page หาบิลไม่เจอตอน unmatch
    stmt.matched_bills = billNos;
    stmt.matched_at = now;
    stmt.matched_by = currentUser?.display_name || 'Admin';
    // ⭐ Overpay amount: + = โอนเกิน (ลูกค้าจ่ายเกินยอดบิล), − = โอนขาด
    if (hasDiff) stmt.overpay_amount = diff;
    else delete stmt.overpay_amount;
    // ⭐ User reason — บังคับเมื่อ diff, optional เมื่อไม่ต่าง
    const userReason = (document.getElementById('qm-reason')?.value || '').trim();
    if (hasDiff && !userReason) {
      toast('ยอดต่าง ' + (diff > 0 ? '+' : '') + fmtNum(diff) + ' — ต้องกรอกหมายเหตุ', 'warn');
      return;
    }
    stmt.match_reason = userReason || (billArr.length > 1 
      ? `Quick match ${billArr.length} บิล รวม ฿${fmtNum(selectedSum)}` 
      : 'Quick match จากหน้า Main');
    
    try { safeStorage.set('sf_statementsByBank', JSON.stringify(statementsByBank)); } catch(_){}
    persistMainState();
    invalidateBillsCache();
    
    // ⭐ Delta push: push เฉพาะ 2 records ที่เพิ่ง match (fire-and-forget)
    // กัน GAS body-loss บน full push 9K+ rows — ถ้า fail → fallback เป็น full sync
    // Multi-bill: push แต่ละบิลทีละตัว (ยัง payload เล็ก)
    billArr.forEach(bx => pushMatchDelta(bx, null));
    pushMatchDelta(null, stmt);
    
    closeModal();
    toast(
      billArr.length > 1
        ? `Match ${billArr.length} บิลสำเร็จ: ${billLabels.join(' + ')} ↔ ${stmt.bank} ฿${fmtNum(Math.abs(Number(stmt.amount)||0))}`
        : `Match สำเร็จ: ${billLabels[0]} ↔ ${stmt.bank} ฿${fmtNum(Math.abs(Number(stmt.amount)||0))}`,
      'success', 4000
    );
    
    // Re-render
    if (typeof currentPage !== 'undefined' && currentPage === 'main') navigateTo('main');
  });
}

// ── Render Main Page (Summary + Bill List + Change Counting) ──
async function renderMain(el) {
  // ⭐ Consume filter hint จาก dashboard card click (ถ้ามี)
  const hint = window.__mainFilterHint;
  if (hint) delete window.__mainFilterHint;  // one-shot
  
  let filterStation = 'ALL';
  let filterType = hint?.filterType || 'ALL';
  let filterMatch = hint?.filterMatch || 'ALL';  // ALL | unmatched | matched | pending
  let filterBillSearch = ''; // ค้นหาเลขบิล/confirmation/remarks
  // ⭐ ถ้า hint.showAll → เปิด date range ครอบทั้งหมด เพื่อเห็นบิลจากทุกวัน
  let filterDateFrom = hint?.showAll ? '2000-01-01' : '';
  let filterDateTo = hint?.showAll ? '2099-12-31' : '';
  let hidePaid = false;
  let showChange = false;
  // Preserve selectedDate across re-entries to main (เช่น หลัง quick match/unmatch ที่เรียก navigateTo('main'))
  // ถ้าไม่เก็บ → selectedDate reset เป็น todayISO() ทุกครั้ง → หน้าจอเด้งไปวันปัจจุบัน
  let selectedDate = window.__mainSelectedDate || todayISO();
  window.__mainSelectedDate = selectedDate;
  // SP section (merged from Payments page) — preserve expand state across re-renders
  const expandedSpMain = new Set();
  const expandedTempMain = new Set();

  const TYPE_OPTIONS = ['', 'Cash', 'Transfer', 'Card', 'Cheque', 'Other', 'Unknown', 'Refund'];
  const STATION_OPTIONS = ['', 'Front1', 'Front2', 'Front3', 'Front4', 'Invoice', 'Invoice Credit', 'Order', 'Order Credit', 'Payment'];
  const SUMMARY_STATIONS = ['Front1', 'Front2', 'Front3', 'Front4', 'Invoice', 'Order', 'Payment', 'Invoice Credit', 'Order Credit'];

  // ══════════════════════════════════════════════════════════════
  // PERFORMANCE FIX: Cache bills filtered by selectedDate
  // Previously calcSales/calcCashFromBills filtered entire billList (8000+ rows)
  // every time — causing Sum calculation to use all dates (negative Sum) and
  // making the page extremely slow.
  // ══════════════════════════════════════════════════════════════
  let _billsForSelectedDateCache = null;
  let _billsForSelectedDateCacheKey = null;
  
  function getBillsForSelectedDate() {
    const cacheKey = selectedDate + '|' + billList.length;
    if (_billsForSelectedDateCacheKey === cacheKey && _billsForSelectedDateCache) {
      return _billsForSelectedDateCache;
    }
    _billsForSelectedDateCacheKey = cacheKey;
    _billsForSelectedDateCache = billList.filter(b => toISODate(b.date) === selectedDate);
    return _billsForSelectedDateCache;
  }
  
  function invalidateBillsCache() {
    _billsForSelectedDateCache = null;
    _billsForSelectedDateCacheKey = null;
    // ⭐ Invalidate date strip cache เมื่อ bills/stmts เปลี่ยน
    window._datesWithDataCache = null;
    window._datesWithDataCacheKey = null;
  }
  // Expose เป็น global เพื่อให้ syncManager + other handlers นอก renderMain scope เรียกได้
  window.invalidateBillsCache = invalidateBillsCache;

  // ══════════════════════════════════════════════════════════════
  // Business Rule: บิลที่ "ใช้ลิ้นชักเงินสดร่วมกัน" (ชำระเป็นเงินสด แล้วเงินเข้าลิ้นชัก)
  // ══════════════════════════════════════════════════════════════
  // SS = Invoice (ขายเงินสด มี VAT)
  // OS = Order (ขายเงินสด ไม่มี VAT)
  // SP = Payment (ตัดชำระลูกหนี้)
  // SC = Invoice + Credit CN (เครดิตโน้ต + ใบกำกับ)
  // JS = Order CN
  // บิลเหล่านี้ถ้า type=Cash → นับรวมเป็น Cash Drawer ของ station นั้น
  const CASH_DRAWER_BILL_TYPES = ['SS', 'OS', 'SP', 'SC', 'JS'];
  const isCashDrawerBill = (billNo) => {
    if (!billNo) return false;
    const up = String(billNo).toUpperCase();
    return CASH_DRAWER_BILL_TYPES.some(t => up.startsWith(t));
  };

  // ── คำนวณเงินสดในลิ้นชัก ต่อ station ──
  // รวมบิลที่ (station ตรง, type=Cash, bill_no เริ่มด้วย SS/OS/SP/SC/JS หรือไม่มี bill_no)
  // fallback → mainSummary['cashDrawer_*'] (กรณีข้อมูล import ที่ไม่มีบิล Cash แยก)
  function calcCashFromBills(station) {
    // Priority 1: user นับธนบัตรแล้ว → ใช้ยอดนั้น (เป็น ground truth)
    const countedCash = calcCashDrawer(station);
    if (countedCash > 0) return countedCash;
    
    // Priority 2: รวมจากบิล Cash
    var fromBills = getBillsForSelectedDate().filter(b => {
      const st = (b.station || '').trim();
      const ty = (b.type || '').trim();
      const no = b.bill_no || '';
      return st === station && ty === 'Cash' && (isCashDrawerBill(no) || !no);
    }).reduce((s, b) => s + (Number(b.amount) || 0), 0);
    
    if (fromBills !== 0) return fromBills;
    
    // Priority 3: mainSummary fallback (import จาก JSON)
    return Number(mainSummary['cashDrawer_' + station]) || 0;
  }
  function calcAutoValue(type, station) {
    // Transfer/Card/Cheque/Refund row: รวมเฉพาะบิลที่ matched แล้ว
    // → Sum row จะโชว์ diff ทันทีถ้ามีบิลยังไม่ match
    return getBillsForSelectedDate().filter(b => {
      const st = (b.station || '').trim();
      const ty = (b.type || '').trim();
      if (st !== station || ty !== type) return false;
      // Filter: เฉพาะบิลที่ match แล้ว (matched, paid, paid_by_sp)
      const isMatched = b.match_status === 'matched' || b.match_status === 'paid' || b.paid_by_sp;
      return isMatched;
    }).reduce((s, b) => s + (Number(b.amount) || 0), 0);
  }

  // คำนวณ ยอดขาย (Sales) row
  // Invoice/Order/Payment/Credit → SUMIFS จาก bills เสมอ
  // Front1-4 → 
  //   1) ใช้ mainSummary['sales_Front*'] ถ้า user กรอก หรือ import มาได้
  //   2) Fallback: รวมจาก bills ที่ station=Front* (ยกเว้นบิล type=Transfer ที่เป็น Invoice cross-station)
  //      เพราะ mainSummary อาจ import มาไม่ครบทุกวัน
  function calcSales(station) {
    if (['Invoice', 'Invoice Credit', 'Order', 'Order Credit', 'Payment'].includes(station)) {
      return getBillsForSelectedDate().filter(b => (b.station || '').trim() === station)
        .reduce((s, b) => s + (Number(b.amount) || 0), 0);
    }
    // Front1-4: ใช้ mainSummary ถ้ามี → ไม่งั้น sum จาก bills
    var fromSummary = Number(mainSummary['sales_' + station]) || 0;
    if (fromSummary !== 0) return fromSummary;
    // Fallback: sum bills ของ station นี้
    return getBillsForSelectedDate().filter(b => (b.station || '').trim() === station)
      .reduce((s, b) => s + (Number(b.amount) || 0), 0);
  }

  // คำนวณยอดรวมธนบัตรใน Cash Drawer
  function calcCashDrawer(station) {
    const dayCash = getCashForDate(selectedDate);
    return DENOMINATIONS.reduce((s, d) => s + d * (Number(dayCash[d + '_' + station]) || 0), 0);
  }

  // ── Sum check: เงินเข้า vs เงินออก ──
  // Formula ตาม Excel template (row 12):
  //
  //   Front1-4:   diff = SUM(Cx7:Cx11) - SUM(Cx3:Cx6)  (per station)
  //               = outflow - inflow ของ station นั้น
  //
  //   Invoice:    diff = SUM(G7, G8:I11) - SUM(G4:I4)
  //               = รวม outflow ของ Invoice+Order+Payment (G+H+I cols, row 7-11)
  //                 - รวม sales ของ Invoice+Order+Payment (G+H+I cols, row 4)
  //               ← รวม 3 stations เพราะเงินไหลถึงกัน (Order + Payment = child ของ Invoice)
  //
  //   Invoice Credit, Order Credit: diff = SUM(J5:J11) - J4
  //                                 = outflow - sales ของ credit นั้น
  //
  // ── อ่านข้อมูล summary จาก __byDate ก่อน → flat key → 0 ──
  function _getSummaryValue(field, station) {
    // field: 'cashIn' | 'sales' | 'cashOut' | 'returns' | ...
    // station: 'Front1' | ...
    
    // ⭐ Guard: cashIn มีเฉพาะ station ที่มี input UI
    //    — Order/Payment ไม่มี (Invoice cell merged รวม 3 stations แล้ว)
    //    — Invoice Credit/Order Credit ไม่มี cashIn input
    //    ค่า stored ที่ค้างที่ station เหล่านี้ → ignore
    if (field === 'cashIn') {
      const CASH_IN_INPUT_STATIONS = ['Front1','Front2','Front3','Front4','Invoice'];
      if (!CASH_IN_INPUT_STATIONS.includes(station)) return 0;
    }
    
    // 1) ลอง flat key ก่อน (ถูก set ตอน date change)
    const flat = Number(mainSummary[field + '_' + station]);
    if (!isNaN(flat) && flat !== 0) return flat;
    // 2) Fallback: __byDate[selectedDate][thLabel][station]
    const labelMap = { cashIn: 'นำเงินเข้า', sales: 'ยอดขาย', cashOut: 'นำเงินออก', 
                       returns: 'ยอดคืนสินค้า', cashDrawer: 'Cash Drawer',
                       transfer: 'Transfer', card: 'Card', cheque: 'Cheque', refund: 'Refund' };
    const thLabel = labelMap[field];
    if (thLabel && mainSummary.__byDate && mainSummary.__byDate[selectedDate]) {
      const dayData = mainSummary.__byDate[selectedDate][thLabel];
      if (dayData && dayData[station] != null) return Number(dayData[station]) || 0;
    }
    return 0;
  }
  
  function calcSumCheck(station) {
    // ═══════════════════════════════════════════════════════════
    // Sum Check — ตาม Excel formula row 12
    //
    // Source-of-truth: summary data (patched จาก Excel row 3-11 ตรงๆ)
    // ใช้ bills-based calc เป็น fallback เมื่อ summary ว่างเท่านั้น
    // ═══════════════════════════════════════════════════════════
    
    // ── Helper: ดึงค่า outflow rows จาก summary ก่อน → fallback bills ──
    const summaryRow = (label, st) => {
      // ดูจาก __byDate ก่อน (ถ้ามี)
      if (mainSummary.__byDate && mainSummary.__byDate[selectedDate]) {
        const labelObj = mainSummary.__byDate[selectedDate][label];
        if (labelObj && typeof labelObj === 'object') {
          // dict มีอยู่ = แปลว่า วันนี้มีข้อมูล
          // ถ้า station ไม่อยู่ใน dict = 0 (ไม่ใช่ null/ไม่มีข้อมูล)
          return Number(labelObj[st]) || 0;
        }
        // dict ไม่มี (เช่น ไม่มี key 'Refund' เลย)
        return null;
      }
      return null; // ไม่มี summary วันนี้เลย
    };
    
    const summaryOrBills = (label, billType, st) => {
      const s = summaryRow(label, st);
      if (s !== null && s !== 0) return s; // summary มีค่า (ไม่ใช่ 0) → ใช้เลย
      // summary = 0 หรือ null → ลอง bills ก่อน
      if (billType === 'Cash') {
        const bv = calcCashFromBills(st);
        if (bv) return bv;
      } else {
        const bv = calcAutoValue(billType, st);
        if (bv) return bv;
      }
      // bills ก็ไม่มี → ใช้ summary (0) หรือ 0
      return s !== null ? s : 0;
    };
    
    const summaryOrZero = (label, st) => {
      const s = summaryRow(label, st);
      return s !== null ? s : 0;
    };
    
    // ══════════════════════════════════════════════════════════════
    // สูตรเดียวสำหรับทุก Station (ตามที่ user กำหนด):
    //   Cash Drawer ที่แสดง = raw − นำเงินเข้า  (ปรับในช่อง display แล้ว)
    //   
    //   incomeSide    = ยอดขาย + ยอดคืนสินค้า
    //   accountedSide = Cash Drawer (adjusted) + Transfer + Card + Cheque + Refund + นำเงินออก
    //   diff = accountedSide − incomeSide
    //     < 0 → เงินขาด 🔴 (รอโอน/card/cheque มาเติมให้ถึง 0)
    //     > 0 → เงินเกิน 🟡 (ลิ้นชัก/ยอด match มากกว่าที่ควร)
    //     = 0 → OK ✅
    //
    // ก่อน auto matching: Transfer/Card/Cheque/Refund = 0 → diff = ลบ (เงินขาด)
    // หลัง matching ครบ: diff → 0
    //
    // Note: Transfer/Card/Cheque/Refund ใช้เฉพาะ matched bills (xlsm SUMIFS with F<>"")
    // ══════════════════════════════════════════════════════════════
    
    // Helper: รวมค่าจาก 3 stations (Invoice+Order+Payment) ถ้า station='Invoice', ไม่งั้น 1 station
    const stationsFor = (st) => (st === 'Invoice') ? ['Invoice', 'Order', 'Payment'] : [st];
    
    const sumStations = (fn) => stationsFor(station).reduce((s, st) => s + fn(st), 0);
    
    // Drawer RAW (รวม cashIn)
    let drawerRaw = 0;
    if (station === 'Invoice') {
      const countedCash = calcCashDrawer('Invoice');
      drawerRaw = countedCash > 0 
        ? countedCash 
        : (summaryOrZero('Cash Drawer', 'Invoice') || ['Invoice','Order','Payment'].reduce((s,st)=>s+calcCashFromBills(st), 0));
    } else {
      drawerRaw = summaryOrBills('Cash Drawer', 'Cash', station);
    }
    
    // cashIn, cashOut, returns, sales
    const cashIn = sumStations(st => _getSummaryValue('cashIn', st));
    const cashOut = sumStations(st => _getSummaryValue('cashOut', st));
    const returns = sumStations(st => _getSummaryValue('returns', st));
    // sales: ใช้ calcSales() ตรงๆ (รู้วิธีเลือก summary/bills ตาม station แล้ว)
    //   - Front1-4: flat summary ก่อน → fallback bills
    //   - Invoice/Order/Payment/IC/OC: bills ของวันนั้นเสมอ
    // ก่อนหน้านี้ใช้ summaryRow() → bug: labelObj['Invoice']=undefined → return 0 → ไม่ fallback
    let sales = 0;
    stationsFor(station).forEach(st => {
      sales += calcSales(st);
    });
    
    // Drawer adjusted = raw − cashIn (ใช้ค่าเดียวกับ display)
    const drawer = drawerRaw - cashIn;
    
    // Transfer/Card/Cheque/Refund: ใช้เฉพาะ matched bills
    const transfer = sumStations(st => calcAutoValue('Transfer', st));
    const card = sumStations(st => calcAutoValue('Card', st));
    const cheque = sumStations(st => calcAutoValue('Cheque', st));
    const refund = sumStations(st => calcAutoValue('Refund', st));
    
    // สูตร
    const incomeSide = sales + returns;
    const accountedSide = drawer + transfer + card + cheque + refund + cashOut;
    
    if (!incomeSide && !accountedSide && !drawerRaw && !sales) return { diff: 0, isOk: null, empty: true };
    
    // diff = accountedSide − incomeSide
    //   ก่อน match → ลบ (เงินขาด)
    //   หลัง match ครบ → 0
    //   เกิน → บวก
    // สูตรเดียวใช้ได้หมดรวม Invoice Credit / Order Credit
    // (IC = หนี้ที่เราต้องจ่าย: ก่อนจ่าย sales>0, accounted=0 → diff ลบ = ยังค้างจ่าย ✓)
    // (OC = ลูกค้าค้างจ่าย: ก่อนรับ sales>0, accounted=0 → diff ลบ = ยังรอรับเงิน ✓)
    const diff = accountedSide - incomeSide;
    
    // Threshold 0.01 = 2-decimal precision (ตรงกับ fmtNum/fmtDiff)
    // ของเดิม 1.0 บังข้อมูล diff ที่มีนัยสำคัญ เช่น +0.50, −0.75
    return { diff, isOk: Math.abs(diff) < 0.01, empty: false };
  }

  function render() {
    // ── FIX: Sync summary flat keys กับ selectedDate ก่อนเสมอ ──
    // ไม่งั้น flat keys จากวันเก่าจะค้างแสดง
    (function syncSummaryToSelectedDate() {
      // 1. Clear all flat keys (เก็บแค่ __byDate)
      Object.keys(mainSummary).forEach(k => {
        if (k === '__byDate') return;
        if (k.includes('_')) delete mainSummary[k];
      });
      // 2. Load from __byDate[selectedDate] ถ้ามี
      if (mainSummary.__byDate && mainSummary.__byDate[selectedDate]) {
        const LABEL_MAP = {
          'นำเงินเข้า': 'cashIn', 'ยอดขาย': 'sales', 'นำเงินออก': 'cashOut',
          'ยอดคืนสินค้า': 'returns', 'Cash Drawer': 'cashDrawer',
          'Transfer': 'transfer', 'Card': 'card', 'Cheque': 'cheque', 'Refund': 'refund',
        };
        const sum = mainSummary.__byDate[selectedDate];
        Object.entries(sum).forEach(([thLabel, stations]) => {
          const prefix = LABEL_MAP[thLabel];
          if (!prefix || !stations || typeof stations !== 'object') return;
          ['Front1', 'Front2', 'Front3', 'Front4', 'Invoice', 'Order', 'Payment', 'Invoice Credit', 'Order Credit'].forEach(st => {
            const val = stations[st];
            if (val != null && val !== 0) mainSummary[prefix + '_' + st] = val;
          });
        });
      }
    })();
    
    // ── Filter bill list ──
    let data = billList;
    
    // ── PERF: If > 200 bills and no explicit date range → default to selectedDate only ──
    // ป้องกันค้างเมื่อมีข้อมูลย้อนหลังหลายพันบิล
    // (เมื่อค้นหา → ค้นทั้ง billList ไม่จำกัดเฉพาะวันที่เลือก)
    if (billList.length > 200 && !filterDateFrom && !filterDateTo && !filterBillSearch) {
      data = getBillsForSelectedDate();
    }
    
    if (filterStation !== 'ALL') data = data.filter(b => b.station === filterStation);
    if (filterType !== 'ALL') data = data.filter(b => b.type === filterType);
    if (hidePaid) data = data.filter(b => b.match_status !== 'paid');
    
    // ── Filter by match status ──
    //   "ยังไม่ match" = Type ใน [Transfer, Card, Cheque, Refund] หรือ Type ว่าง
    //   (Type=Cash ไม่ต้อง match — ไม่แสดงในกลุ่มนี้ เพราะ auto matched แล้ว)
    const MATCHABLE_TYPES_FILTER = ['Transfer', 'Card', 'Cheque', 'Refund', '', null, undefined];
    const isUnmatchedCandidate = (b) => {
      const isMatched = b.match_status === 'matched' || b.match_status === 'paid';
      const isVoid = b.match_status === 'void';
      const isBounced = b.match_status === 'bounced';
      if (isMatched || isVoid || isBounced) return false;
      // ⭐ ถ้ามี matched_stmt_ref = ผูก stmt แล้ว → ถือว่า match
      if (b.matched_stmt_ref) return false;
      // ⭐ ถ้ามี paid_by_sp = SP ตัดบิลแล้ว → ถือว่า paid
      if (b.paid_by_sp) return false;
      return MATCHABLE_TYPES_FILTER.includes(b.type || '');
    };
    
    if (filterMatch === 'unmatched') {
      data = data.filter(isUnmatchedCandidate);
    } else if (filterMatch === 'matched') {
      data = data.filter(b => b.match_status === 'matched' || b.match_status === 'paid');
    } else if (filterMatch === 'pending') {
      data = data.filter(b => !b.match_status || b.match_status === 'pending');
    }
    
    // Filter by date range (overrides default filter)
    if (filterDateFrom || filterDateTo) {
      data = billList;
      if (filterStation !== 'ALL') data = data.filter(b => b.station === filterStation);
      if (filterType !== 'ALL') data = data.filter(b => b.type === filterType);
      if (hidePaid) data = data.filter(b => b.match_status !== 'paid');
      // ⭐ Bug fix: apply filterMatch ใน date range branch ด้วย (เดิมลืม → แสดง matched ปน)
      if (filterMatch === 'unmatched') data = data.filter(isUnmatchedCandidate);
      else if (filterMatch === 'matched') data = data.filter(b => b.match_status === 'matched' || b.match_status === 'paid');
      else if (filterMatch === 'pending') data = data.filter(b => !b.match_status || b.match_status === 'pending');
      data = data.filter(b => {
        const bd = toISODate(b.date);
        if (!bd) return true;
        if (filterDateFrom && bd < filterDateFrom) return false;
        if (filterDateTo && bd > filterDateTo) return false;
        return true;
      });
    }
    
    // ── Filter by bill search (ค้นหาเลขบิล/confirmation/remarks/amount) ──
    // ค้นได้ทั้งบิลทั้งหมด ไม่จำกัดวันที่ (ถ้า user ไม่ได้ set date range)
    if (filterBillSearch) {

        if (filterMatch === 'unmatched') data = data.filter(isUnmatchedCandidate);
        else if (filterMatch === 'matched') data = data.filter(b => b.match_status === 'matched' || b.match_status === 'paid');
        else if (filterMatch === 'pending') data = data.filter(b => !b.match_status || b.match_status === 'pending');
      }

        return fields.some(f => String(f||'').toLowerCase().includes(q));
      });
    }

    const totalAmount = data.reduce((s, b) => b.match_status === 'void' ? s : s + (Number(b.amount) || 0), 0);
    const paidCount = billList.filter(b => b.match_status === 'paid').length;
    
    // นับบิลที่ยังไม่ match — ใช้กฎเดียวกับ filter
    const unmatchedCount = (billList.length > 200 && !filterDateFrom && !filterDateTo 
      ? getBillsForSelectedDate() 
      : billList).filter(isUnmatchedCandidate).length;
    
    // ── Sort bill list ──
    // Default: วันที่ ASC → Station canonical → Bill No
    // Toggle DESC: วันที่ DESC → Station canonical → Bill No (DESC)
    const BILL_STATION_ORDER = ['Front1','Front2','Front3','Front4','Invoice','Invoice Credit','Order','Order Credit','Payment','Cancel',''];
    const stationRank = (st) => {
      const i = BILL_STATION_ORDER.indexOf(st || '');
      return i === -1 ? 999 : i;
    };
    const _billOrder = getSortOrder('billList');
    data = [...data].sort((a, b) => {
      // 1) วันที่ก่อน (ASC หรือ DESC)
      const da = parseThaiDate(a.date) || 0;
      const db = parseThaiDate(b.date) || 0;
      if (da !== db) {
        return _billOrder === 'asc' ? da - db : db - da;
      }
      // 2) วันเดียวกัน → Station canonical order (คงที่ไม่ว่า asc/desc)
      const sa = stationRank(a.station);
      const sb = stationRank(b.station);
      if (sa !== sb) return sa - sb;
      // 3) station เดียวกัน → บิลที่มี created_at (เพิ่งเพิ่มใหม่) อยู่บนสุด
      //    - บิลใหม่มี created_at (ISO timestamp), บิลเก่ามักไม่มี → ใหม่ก่อนเก่าเสมอ
      //    - บิลใหม่หลายใบ → newer-first (descending timestamp)
      const ca = a.created_at || '';
      const cb = b.created_at || '';
      if (ca && cb) return cb.localeCompare(ca);   // ใหม่ทั้งคู่ → ใหม่กว่าขึ้นก่อน
      if (ca) return -1;                            // a ใหม่, b เก่า → a ขึ้นก่อน
      if (cb) return 1;                             // b ใหม่, a เก่า → b ขึ้นก่อน
      // 4) ทั้งคู่ไม่มี created_at → เรียงตาม bill_no
      const cmp = String(a.bill_no || '').localeCompare(String(b.bill_no || ''));
      return _billOrder === 'asc' ? cmp : -cmp;
    });
    
    // ── PERF: Cap table rendering to first 500 rows to prevent lag on massive datasets ──
    const MAX_VISIBLE_ROWS = 500;

    const truncated = data.length > MAX_VISIBLE_ROWS;
    const visibleData = truncated ? data.slice(0, MAX_VISIBLE_ROWS) : data;

    const STATION_ORDER = ['Front1','Front2','Front3','Front4','Invoice','Invoice Credit','Order','Order Credit','Payment','Cancel'];
    const TYPE_ORDER = ['Transfer','Cash','Card','Cheque','Refund','Unknown',''];
    const sortByOrder = (arr, order) => {
      const rank = (v) => { const i = order.indexOf(v); return i === -1 ? 999 : i; };
      return [...arr].sort((a, b) => rank(a) - rank(b));
    };
    const stations = billList.length < 10000 
      ? sortByOrder([...new Set(billList.map(b => b.station).filter(Boolean))], STATION_ORDER)
      : STATION_ORDER.slice(0, 9);
    const types = billList.length < 10000

      : TYPE_ORDER;

    el.innerHTML = `

                const lockIcon = isDateLocked(selectedDate) ? '🔒 ' : '📅 ';
                return `${lockIcon}${dow} ${d.getDate()} ${thMonths[d.getMonth()]} ${d.getFullYear()}`;

            </button>

            <div id="main-date-popup" style="display:none"></div>

              if (b.match_status === 'void') return;
              const t = b.type || '(ว่าง)';
              byType[t] = (byType[t] || 0) + (Number(b.amount) || 0);
            });
            return Object.entries(byType).map(([t,v]) => `${t}: ฿${fmtNum(v)}`).join(' · ');
          })()}">รวม (${data.length} บิล): ฿${fmtNum(totalAmount)}</span>
        </div>
      </div>

      <!-- ═══════ SECTION 4: SP Payments (merged from Payments page) ═══════ -->
      <div id="main-sp-section" style="margin-top:16px"></div>
    `;

    bindMainEvents();

    // Mount SP section (SP-TEMP + SP table filtered by selectedDate)
    renderSpSectionsForDate({
      container: document.getElementById('main-sp-section'),
      dateFilter: selectedDate,
      expandedTempSet: expandedTempMain,
      expandedSpSet: expandedSpMain,
      onChange: () => { renderKeepScroll(); },
    });
  }
  
  // ── renderKeepScroll: re-render หน้าโดย preserve scroll position ──
  // ใช้แทน render() หลังแก้ไขบิล/Add Bill/Bulk ops เพื่อไม่ให้ scroll เด้งขึ้นบน
  function renderKeepScroll() {
    // Defensive: ให้แน่ใจว่า Sum/calcs ใช้ข้อมูล bills ล่าสุด ไม่ใช่ cache
    invalidateBillsCache();
    
    // 1. Capture scroll positions จากทุก container ที่เป็นไปได้
    const scrollTargets = [
      { el: window, x: window.scrollX, y: window.scrollY },
      { el: document.documentElement, x: 0, y: document.documentElement.scrollTop },
      { el: document.body, x: 0, y: document.body.scrollTop },
    ];
    // Also capture any scrollable ancestor of el
    let node = el?.parentElement;
    while (node && node !== document.body) {
      const s = getComputedStyle(node);
      if ((s.overflowY === 'auto' || s.overflowY === 'scroll') && node.scrollHeight > node.clientHeight) {
        scrollTargets.push({ el: node, x: node.scrollLeft, y: node.scrollTop });
      }
      node = node.parentElement;
    }
    // Capture activeElement info (to restore focus)
    const activeId = document.activeElement?.id;
    const activeField = document.activeElement?.dataset?.field;
    const activeIdx = document.activeElement?.closest?.('tr')?.dataset?.idx;
    const activeSelStart = document.activeElement?.selectionStart;
    const activeSelEnd = document.activeElement?.selectionEnd;
    
    // 2. Render
    render();
    
    // 3. Restore in rAF (หลัง DOM อัปเดตแล้ว) — ใช้ 2x rAF เผื่อ browser paint
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        scrollTargets.forEach(t => {
          try {
            if (t.el === window) window.scrollTo(t.x, t.y);
            else { t.el.scrollLeft = t.x; t.el.scrollTop = t.y; }
          } catch(_) {}
        });
        // Restore focus
        try {
          let target = null;
          if (activeId) target = document.getElementById(activeId);
          else if (activeIdx != null && activeField) {
            target = document.querySelector(`tr[data-idx="${activeIdx}"] [data-field="${activeField}"]`);
          }
          if (target && typeof target.focus === 'function') {
            target.focus();
            if (activeSelStart != null && target.setSelectionRange) {
              try { target.setSelectionRange(activeSelStart, activeSelEnd); } catch(_) {}
            }
          }
        } catch(_) {}
      });
    });
  }

  // ── Helper: สร้าง row ที่กรอกเอง (cashIn, cashOut, returns) ──
  function buildSumRow(key, label, color, editable) {
    const _getVal = (s) => {
      const stored = mainSummary[key+'_'+s];
      return (stored !== undefined && stored !== null && stored !== '') ? stored : '';
    };
    const vals = SUMMARY_STATIONS.map(s => Number(_getVal(s)) || 0);
    const allSum = vals.reduce((a,b)=>a+b,0);
    // cashIn: Front1-4 + Invoice (Merged with Order/Payment), cashOut: Front1 + Invoice (Merged), returns: Front1-3 + Invoice (Merged)
    const allowedStations = {
      cashIn: ['Front1','Front2','Front3','Front4','Invoice','Order','Payment'],
      cashOut: ['Front1','Front2','Front3','Front4','Invoice','Order','Payment'],
      returns: ['Front1','Front2','Front3','Front4','Invoice','Order','Payment'],
    };
    const allowed = allowedStations[key] || [];
    
    const cellParts = [];
    SUMMARY_STATIONS.forEach((s, i) => {
      // Skip Order/Payment — merged into Invoice cell
      if (s === 'Order' || s === 'Payment') return;
      if (s === 'Invoice') {
        // รวม 3 stations (Invoice+Order+Payment) เป็น cell เดียว colspan=3 
        // เฉพาะถ้า Invoice allowed
        if (allowed.includes('Invoice')) {
          // Editable input โผล่ที่ Invoice (ใช้ key 'Invoice')
          cellParts.push(`<td colspan="3" style="background:rgba(91,124,250,.04);border-left:1px dashed var(--border);border-right:1px dashed var(--border)"><input class="input sum-cell" data-k="${key}_Invoice" type="number" value="${_getVal('Invoice')}" step="0.01" placeholder="0" style="width:95%;padding:3px 6px;font-size:.78rem;text-align:center;border-color:${color}" title="รวม Invoice + Order + Payment"></td>`);
        } else {
          cellParts.push(`<td colspan="3"></td>`);
        }
        return;
      }
      // Other stations
      if (!allowed.includes(s)) {
        cellParts.push(`<td></td>`);
        return;
      }
      cellParts.push(`<td><input class="input sum-cell" data-k="${key}_${s}" type="number" value="${_getVal(s)}" step="0.01" placeholder="0" style="width:95%;padding:3px 6px;font-size:.78rem;text-align:right;border-color:${color}"></td>`);
    });
    
    return `<tr>
      <td style="text-align:right;font-weight:700">${allSum?fmtNum(allSum):'-'}</td>
      <td style="font-weight:600;color:${color}">${label}</td>
      ${cellParts.join('')}
    </tr>`;
  }

  // ── Helper: Cash Drawer row ──
  //   Front1-4: EDITABLE input (แสดงค่า raw — ไม่หัก cashIn)
  //   Invoice + Order + Payment = merge cell เดียว (colspan=3, raw จากการนับธนบัตร)
  //   Invoice Credit / Order Credit: empty
  //   สูตร Sum จะหัก cashIn ภายในเอง (ไม่ยุ่งกับ display)
  function buildCashDrawerRow() {
    // Invoice merged: ถ้า user นับธนบัตร = ยอดรวม 3 stations, ไม่งั้น sum จาก bills
    const invoiceCountedCash = calcCashDrawer('Invoice');
    const mergedInvoiceTotal = invoiceCountedCash > 0 
      ? invoiceCountedCash 
      : ['Invoice','Order','Payment'].reduce((s, st) => s + calcCashFromBills(st), 0);
    
    // Per-station values (Front1-4) — raw
    const frontVals = ['Front1','Front2','Front3','Front4'].map(s => calcCashFromBills(s));
    const frontTotal = frontVals.reduce((a,b)=>a+b, 0);
    const allSum = frontTotal + mergedInvoiceTotal;
    
    const cells = [];
    SUMMARY_STATIONS.forEach(s => {
      if (s === 'Order' || s === 'Payment') return; // skip - handled by Invoice colspan
      if (s === 'Invoice') {
        // Merged cell colspan=3 (read-only — จากการนับธนบัตร)
        const v = mergedInvoiceTotal;
        cells.push(`<td colspan="3" data-drawer-station="Invoice" style="text-align:center;color:${v?'var(--purple)':'var(--text3)'};font-weight:${v?'700':'400'};border-left:1px dashed var(--border);border-right:1px dashed var(--border);background:rgba(91,124,250,.04)" title="รวม Invoice + Order + Payment (จากการนับธนบัตร)">${v?fmtNum(v):'-'}</td>`);
        return;
      }
      if (['Invoice Credit','Order Credit'].includes(s)) {
        cells.push('<td></td>');
        return;
      }
      // Front1-4 — EDITABLE input (เหมือนช่องนำเงินเข้า)
      const idx = ['Front1','Front2','Front3','Front4'].indexOf(s);
      const v = idx >= 0 ? frontVals[idx] : 0;
      cells.push(`<td><input class="input sum-cell" data-k="cashDrawer_${s}" type="number" value="${v||''}" step="0.01" placeholder="0" style="width:95%;padding:3px 6px;font-size:.78rem;text-align:right;border-color:var(--purple)"></td>`);
    });
    
    return `<tr>
      <td style="text-align:right;font-weight:700" data-drawer-total>${allSum?fmtNum(allSum):'-'}</td>
      <td style="font-weight:600;color:var(--purple)">🗃️ Cash Drawer</td>
      ${cells.join('')}
    </tr>`;
  }

  // ── Helper: Auto row (Transfer/Card/Cheque/Refund) ──
  function buildAutoRow(type, label, color) {
    const vals = SUMMARY_STATIONS.map(s => calcAutoValue(type, s));
    const allSum = vals.reduce((a,b)=>a+b,0);
    return `<tr>
      <td style="text-align:right;font-weight:700">${allSum?fmtNum(allSum):'-'}</td>
      <td style="font-weight:600;color:${color}">${label}</td>
      ${SUMMARY_STATIONS.map((s,i)=>{
        if (['Invoice Credit', 'Order Credit'].includes(s)) return `<td></td>`;
        return `<td style="text-align:right;color:${vals[i]?color:'var(--text3)'};font-weight:${vals[i]?'600':'400'}">${vals[i]?fmtNum(vals[i]):'-'}</td>`;
      }).join('')}
    </tr>`;
  }

        return ym + '-' + String(last).padStart(2,'0');
      };

        if (m === 1) return (y-1) + '-12';
        return y + '-' + String(m-1).padStart(2,'0');
      })();
      const minus30 = (() => {
        const d = new Date(today + 'T00:00:00');
        d.setDate(d.getDate() - 30);
        return d.toISOString().substring(0, 10);
      })();
      
      openModal('📅🔒 Bulk Lock — Lock/Unlock หลายวัน', `
        <div class="flex-col gap-3" style="min-width:420px">
          <div style="padding:10px 12px;background:rgba(239,87,87,.08);border-radius:6px;border-left:3px solid var(--danger);font-size:.85rem">
            <b>ตอนนี้มีวันที่ lock อยู่:</b> ${lockedCount} วัน
            ${lockedCount > 0 ? `<div class="text-xs text-muted" style="margin-top:4px;max-height:60px;overflow-y:auto">${lockedNow.slice(0,20).map(d=>fmtDate(d)).join(', ')}${lockedCount>20?` +${lockedCount-20} อื่นๆ`:''}</div>` : ''}
          </div>

            <span class="text-xs text-dim">Preset:</span>
            <button class="btn btn-outline btn-xs bl-preset" data-from="${_firstOfMonth(thisMonth)}" data-to="${_lastOfMonth(thisMonth)}">เดือนนี้</button>
            <button class="btn btn-outline btn-xs bl-preset" data-from="${_firstOfMonth(lastMonthYM)}" data-to="${_lastOfMonth(lastMonthYM)}">เดือนก่อน</button>
            <button class="btn btn-outline btn-xs bl-preset" data-from="${minus30}" data-to="${today}">30 วันที่ผ่านมา</button>
          </div>
          
          <div class="flex gap-2">
            <div class="input-group flex-1">
              <label>จากวันที่</label>
              <input type="date" class="input" id="bl-from" value="${_firstOfMonth(thisMonth)}">
            </div>
            <div class="input-group flex-1">
              <label>ถึงวันที่</label>
              <input type="date" class="input" id="bl-to" value="${today}">
            </div>
          </div>
          
          <div id="bl-preview" style="padding:10px;background:var(--bg2);border-radius:6px;font-size:.82rem;color:var(--text2)"></div>
          
          <div class="flex gap-2 mt-2">
            <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
            <button class="btn btn-sm flex-1" id="bl-unlock" style="background:transparent;border:1px solid var(--success);color:var(--success);font-weight:600">🔓 Unlock ในช่วงนี้</button>
            <button class="btn btn-sm flex-1" id="bl-lock" style="background:var(--danger);color:#fff;font-weight:700">🔒 Lock ในช่วงนี้</button>
          </div>
        </div>
      `);
      
      const $from = document.getElementById('bl-from');
      const $to = document.getElementById('bl-to');
      const $preview = document.getElementById('bl-preview');
      
      function _datesBetween(from, to) {
        const out = [];
        if (!from || !to || from > to) return out;
        const start = new Date(from + 'T00:00:00');
        const end = new Date(to + 'T00:00:00');
        for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
          out.push(d.toISOString().substring(0, 10));
        }
        return out;
      }
      
      function updatePreview() {
        const dates = _datesBetween($from.value, $to.value);
        const willLock = dates.filter(d => !isDateLocked(d)).length;
        const willUnlock = dates.filter(d => isDateLocked(d)).length;
        $preview.innerHTML = `
          ช่วง <b>${fmtDate($from.value)} → ${fmtDate($to.value)}</b> = <b>${dates.length} วัน</b><br>
          <span style="color:var(--text3);font-size:.78rem">
            • <span style="color:var(--danger)">ยังไม่ lock: ${willLock} วัน</span>
            · <span style="color:var(--success)">lock อยู่: ${willUnlock} วัน</span>
          </span>
        `;
      }
      updatePreview();
      $from.addEventListener('change', updatePreview);
      $to.addEventListener('change', updatePreview);
      
      // Preset buttons
      document.querySelectorAll('.bl-preset').forEach(btn => {
        btn.addEventListener('click', () => {
          $from.value = btn.dataset.from;
          $to.value = btn.dataset.to;
          updatePreview();
        });

      document.getElementById('bl-lock')?.addEventListener('click', () => {
