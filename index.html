// Transfer Log Page — 2026_รายการโอนเงิน_JKN.xlsx
// เชื่อมกับ Supplier Payments + Statement + PP Report
// 
// Sheets:
//   Vat:            รายการโอน VAT (313 rows) - โอนจาก KBANK/BBL/SCB/K PLUS SME
//   NoVat:          รายการโอน NOVAT (92 rows) - โอนจาก BBL NW
//   DropdownVat:    Master Supplier VAT
//   DropdownNoVat:  Master Supplier NOVAT
//   ตรวจ YYYY-MM:   Cross-check กับ PP จาก Smart
// ══════════════════════════════════════════════════════════════

// Parse sheet "Vat" หรือ "NoVat" 
function parseTransferSheet(sheet, isVat) {
  const records = [];
  if (!sheet || sheet.length < 3) return records;
  
  // Header row = row index 2 (row 3 in Excel)
  // Columns (1-indexed within parsed array, but we use 0-indexed):
  //   0: ลำดับที่
  //   1: วันที่จ่าย
  //   2: ประเภท (ต้นทุน/ค่าใช้จ่าย)
  //   3: ชื่อเรียก
  //   4: ชื่อบริษัท (Vat) หรือ ชื่อบัญชี (NoVat)
  //   5: บัญชีธนาคาร (Vat: ธนาคาร; NoVat: ชื่อธนาคารที่บัญชีนั้นอยู่)
  //   6: เลขที่บัญชี
  //   7: เลขที่ใบวางบิล
  //   8: เลขที่ใบเสร็จ
  //   9: ยอดตามใบแจ้งยอด
  //   10-12: หัก (ค่าขนส่ง/เคลม/อื่นๆ or โปรโมชั่น)
  //   13: หักรวม
  //   14: ยอดจ่าย
  //   15: โอนจาก
  
  for (let i = 0; i < sheet.length; i++) {
    const r = sheet[i] || [];
    const c0 = r[0]; // ลำดับ column 2 in Excel (B)
    const c1 = r[1]; // วันที่จ่าย
    
    // Skip header rows (look for valid number in col 0)
    if (c0 === null || c0 === undefined || c0 === '') continue;
    if (typeof c0 !== 'number' && !/^\d+$/.test(String(c0).trim())) continue;
    if (!c1) continue; // no date → skip
    
    const amount = Number(r[13]) || Number(r[9]) || 0; // ยอดจ่าย or fallback ยอดแจ้ง
    if (amount <= 0) continue;
    
    records.push({
      id: (isVat ? 'TV-' : 'TN-') + Date.now() + '-' + i,
      seq: Number(c0) || 0,
      transfer_date: fmtDate(c1) || '',
      category: String(r[2] || '').trim(), // ต้นทุน / ค่าใช้จ่าย
      nickname: String(r[3] || '').trim(),
      supplier_name: String(r[4] || '').trim(),
      supplier_bank: String(r[5] || '').trim(),
      supplier_account: String(r[6] || '').trim(),
      invoice_no: String(r[7] || '').trim(),
      receipt_no: String(r[8] || '').trim(),
      amount_billed: Number(r[9]) || 0,
      deduct_shipping: Number(r[10]) || 0,
      deduct_claim: Number(r[11]) || 0,
      deduct_other: Number(r[12]) || 0,
      deduct_total: Number(r[13]) || 0,
      amount: Number(r[14]) || amount, // ยอดจ่ายจริง
      from_bank: String(r[15] || '').trim(), // K PLUS SME JKN / BBL / SCB / BBL NW
      vat: isVat ? 'VAT' : 'NOVAT',
      pp_no: '', // รอ match จาก ตรวจ YYYY-MM
      match_status: 'pending', // pending / matched (กับ PP) / stmt_matched (กับ Statement)
      stmt_ref: '',
    });
  }
  
  return records;
}

// Parse Dropdown sheet → Master Supplier list
function parseDropdownSheet(sheet, isVat) {
  const records = [];
  if (!sheet || sheet.length < 3) return records;
  
  // Header at row index 1: col 1=ลำดับ, 2=ชื่อเรียก, 3=ชื่อบริษัท/ชื่อบัญชี, 4=ธนาคาร, 5=เลขที่บัญชี
  for (let i = 2; i < sheet.length; i++) {
    const r = sheet[i] || [];
    const nickname = String(r[2] || '').trim();
    const company = String(r[3] || '').trim();
    if (!nickname && !company) continue;
    
    records.push({
      id: (isVat ? 'SV-' : 'SN-') + i,
      seq: Number(r[1]) || 0,
      nickname: nickname,
      name: company,
      bank: String(r[4] || '').trim(),
      account_no: String(r[5] || '').trim(),
      note: String(r[6] || '').trim(),
      vat: isVat ? 'VAT' : 'NOVAT',
    });
  }
  return records;
}

// Parse ตรวจ YYYY-MM sheet → cross-reference กับ PP
function parseMonthlyCheck(sheet) {
  const records = [];
  if (!sheet || sheet.length < 4) return records;
  
  // Header at row 2 (index 2):
  //   col 1=วันที่จ่าย, 2=ชื่อเรียก, 3=ชื่อบริษัท, 4=เลขที่ใบวางบิล,
  //   5=ยอดจ่าย, 6=โอนจาก, 7=Diff, 8=เลขที่เอกสาร (PP), 9=วันที่เอกสารขาย, 10=วันที่รับ, 11=ยอด
  
  for (let i = 3; i < sheet.length; i++) {
    const r = sheet[i] || [];
    if (!r[1]) continue; // no date
    
    const ppNo = String(r[7] || '').trim();
    const amount = Number(r[4]) || 0;
    
    records.push({
      transfer_date: fmtDate(r[1]) || '',
      nickname: String(r[2] || '').trim(),
      supplier_name: String(r[3] || '').trim(),
      invoice_no: String(r[4] || '').trim(),
      amount_paid: Number(r[5]) || 0,
      from_bank: String(r[6] || '').trim(),
      diff: Number(r[7]) || 0,
      pp_no: ppNo,
      pp_ref: String(r[9] || '').trim(), // (AP-XXX) name
      receive_date: fmtDate(r[10]) || '',
      amount_pp: Number(r[11]) || 0,
      note: String(r[12] || '').trim(),
    });
  }
  return records;
}

          const vatType = vatRec ? 'VAT' : (novatRec ? 'NOVAT' : 'VAT');
          
          const sup = supplierList.find(s => s.code && c.nickname && s.code.toUpperCase() === c.nickname.toUpperCase());
          
          let bank = vatType === 'NOVAT' ? 'BBL NW' : 'KBANK';
          const fromLC = (c.from_bank||'').toLowerCase();
          if (fromLC.includes('bbl') || fromLC.includes('กรุงเทพ')) bank = vatType === 'NOVAT' ? 'BBL NW' : 'BBL';

function toISODate(d) {
  if (!d && d !== 0) return '';

  // Date object
  if (d instanceof Date && !isNaN(d)) {
    let y = d.getFullYear();
    if (y > 2400) y -= 543;
    return `${y}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  // Excel serial number
  if (typeof d === 'number' && d > 10000 && d < 80000) {
    const excelEpoch = new Date(1899, 11, 30);
    const dt = new Date(excelEpoch.getTime() + d * 86400000);
    return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  }

  const s = String(d).trim();
  if (!s || s === 'null' || s === 'undefined') return '';

  // yyyy-mm-dd already
  const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) {
    let y = Number(iso[1]); if (y > 2400) y -= 543;
    return `${y}-${iso[2]}-${iso[3]}`;
  }

  // dd/mm/yyyy
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) {
    let y = Number(m[3]); if (y > 2400) y -= 543;
    return `${y}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
  }
  return '';
}

function handleSalesUpload(result, fileName) {
  // ลองหา Main sheet หรือ sheet แรก
  const sheetName = result.sheetNames.find(n => n.toLowerCase().includes('main')) || result.sheetNames[0];
  const sheet = result.sheets[sheetName] || [];

  const rows = [];
  // หา header row (Bill Number)
  let headerRow = -1;
  for (let i = 0; i < Math.min(20, sheet.length); i++) {
    if (sheet[i] && sheet[i].some(c => String(c).includes('Bill Number') || String(c).includes('Bill Date'))) {
      headerRow = i; break;
    }
  }
  if (headerRow === -1) headerRow = 13; // default Main R14 (index 13)

  for (let i = headerRow + 1; i < sheet.length; i++) {
    const r = sheet[i];
    if (!r[1] && !r[4]) continue; // skip empty
    rows.push({
      bill_no: String(r[0]||''), date: String(r[1]||''), station: String(r[2]||''),
      pay_method: String(r[3]||''), amount: Number(r[4])||0, confirmation: String(r[5]||''),
      pay_date: String(r[6]||''), customer: String(r[7]||''),
    });
  }

  uploadedSales = rows;
  toast(`อ่านยอดขายสำเร็จ — ${rows.length} รายการ`, 'success');
  if (currentPage === 'sales') navigateTo('sales');
}

// ── Storage: IndexedDB สำหรับข้อมูลใหญ่ (ไม่มี 5MB limit) ──
const _mem = {};
const IDB_NAME = 'SmartFinanceDB';
const IDB_STORE = 'data';
const IDB_LARGE_KEYS = ['sf_billList','sf_statementsByBank','sf_mainSummary','sf_cashCount'];

let _idb = null;
function openIDB() {
  return new Promise(function(resolve) {
    if (_idb) { resolve(_idb); return; }
    try {
      var req = indexedDB.open(IDB_NAME, 1);
      req.onupgradeneeded = function(e) { e.target.result.createObjectStore(IDB_STORE); };
      req.onsuccess = function(e) { _idb = e.target.result; resolve(_idb); };
      req.onerror = function() { resolve(null); };
    } catch(e) { resolve(null); }
  });
}
function idbGet(key) {
  return new Promise(function(resolve) {
    openIDB().then(function(db) {
      if (!db) { resolve(null); return; }
      try {
        var tx = db.transaction(IDB_STORE, 'readonly');
        var req = tx.objectStore(IDB_STORE).get(key);
        req.onsuccess = function() { resolve(req.result || null); };
        req.onerror = function() { resolve(null); };
      } catch(e) { resolve(null); }
    });
  });
}
function idbSet(key, value) {
  return new Promise(function(resolve) {
    openIDB().then(function(db) {
      if (!db) { resolve(false); return; }
      try {
        var tx = db.transaction(IDB_STORE, 'readwrite');
        tx.objectStore(IDB_STORE).put(value, key);
        tx.oncomplete = function() { resolve(true); };
        tx.onerror = function() { resolve(false); };
      } catch(e) { resolve(false); }
    });
  });
}

const safeStorage = {
  get(k) { try { return localStorage.getItem(k); } catch { return _mem[k] || null; } },
  set(k,v) { 
    if (IDB_LARGE_KEYS.includes(k)) {
      // เก็บใน IndexedDB (async — fire and forget)
      idbSet(k, v);
      // ลบจาก localStorage (ถ้ามี) เพื่อเพิ่มพื้นที่
      try { localStorage.removeItem(k); } catch(e) {}
      return;
    }
    try { localStorage.setItem(k,v); } catch { _mem[k] = v; } 
  },
  del(k) { try { localStorage.removeItem(k); } catch { delete _mem[k]; } },
};

async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const remember = document.getElementById('login-remember').checked;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  errEl.classList.add('hidden');

  if (!username || !password) {
    errEl.textContent = 'กรุณากรอก username และ password';
    errEl.classList.remove('hidden');
    return;
  }

  // Set loading state
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> กำลังเข้าสู่ระบบ...';

  try {
    const res = await api('login', { username, password });
    if (res.success) {
      currentUser = res.data;
      if (remember) safeStorage.set('sf_user', JSON.stringify(currentUser));
      btn.innerHTML = '<span class="spinner"></span> กำลังโหลดระบบ...';
      showApp();
    } else {
      errEl.textContent = res.error || 'ไม่สามารถเข้าสู่ระบบได้';
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = originalText;
    }
  } catch (err) {
    errEl.textContent = 'เกิดข้อผิดพลาด: ' + err.message;
    errEl.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

function showApp() {
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('sidebar-user').textContent = `${currentUser.display_name} (${currentUser.role})`;
  renderNav();
  navigateTo('main');
  // โหลด meta data จาก backend (กันกรณีล้าง localStorage)
  loadMetaFromBackend().catch(err => console.warn('loadMeta failed:', err));
  
  // Hybrid sync: auto-pull ถ้า local ว่าง (เช่น เครื่องใหม่/browser ใหม่)
  // จะ skip อัตโนมัติถ้ามี local data + lastPull ภายใน 30 นาที
  setTimeout(() => {
    if (!syncManager.enabled) return;
    syncManager.pullFromCloud(2, 'auto')
      .then(r => {
        if (r?.skipped) {
          console.log('[sync] auto-pull skipped:', r.skipped);
        } else if (r) {
          const total = (r.bills||0) + (r.stmts||0) + (r.payments||0) + (r.cashflow||0);
          if (total > 0) {
            toast(`☁️ Auto-sync: โหลด ${total} รายการใหม่จาก cloud`, 'success', 4000);
            // Refresh current page to show new data
            if (currentPage) navigateTo(currentPage);
          }
        }
      })
      .catch(err => console.warn('[sync] auto-pull failed:', err));
  }, 1500); // delay 1.5s ให้หน้า Main render เสร็จก่อน
  
  // Wire up sync status badge (refresh ทุก 5s หรือเมื่อ syncManager emit)
  const badge = document.getElementById('sync-status-badge');
  if (badge) {
    const update = () => {
      const s = syncManager.statusText();
      badge.textContent = s.text;
      badge.style.color = s.color;
    };
    update();
    syncManager.onChange(update);
    setInterval(update, 5000); // refresh "X s ago" text
    // Click to force push now
    badge.onclick = async () => {
      if (syncManager.status !== 'idle' && syncManager.status !== 'error') return;
      syncManager.dirty.add('meta'); // ensure something to push
      await syncManager._flushPush();
      toast('Sync สำเร็จ', 'success', 1500);
    };
  }
}

// ── โหลด summary/cash_count/change ย้อนหลังจาก backend → merge เข้า mainSummary, cashCount ──
// เรียกครั้งเดียวหลัง login (กันกรณี localStorage ถูกล้างแต่ backend ยังเก็บอยู่)
async function loadMetaFromBackend() {
  try {
    // โหลดปีปัจจุบัน + ปีที่แล้ว (กันเวลาใช้ข้ามปี)
    var now = new Date();
    var years = [String(now.getFullYear()), String(now.getFullYear() - 1)];
    
    for (var y of years) {
      var res = await api('getDailyMeta', { year: y });
      if (!res || !res.success) continue;
      var d = res.data || {};
      
      // ── Merge summary.__byDate (ไม่ override ของใน memory ถ้าไม่ว่าง) ──
      if (d.summary && d.summary.__byDate) {
        if (!mainSummary.__byDate) mainSummary.__byDate = {};
        Object.keys(d.summary.__byDate).forEach(function(dateISO) {
          // backend มี, local ยังไม่มี → copy
          if (!mainSummary.__byDate[dateISO]) {
            mainSummary.__byDate[dateISO] = d.summary.__byDate[dateISO];
          }
        });
      }
      
      // ── Merge cash_count.__byDate ──
      if (d.cash_count && d.cash_count.__byDate) {
        if (!cashCount.__byDate) cashCount.__byDate = {};
        Object.keys(d.cash_count.__byDate).forEach(function(dateISO) {
          if (!cashCount.__byDate[dateISO]) {
            cashCount.__byDate[dateISO] = d.cash_count.__byDate[dateISO];
          } else {
            // merge per-key (ของใน memory ชนะถ้ามี)
            Object.keys(d.cash_count.__byDate[dateISO]).forEach(function(k) {
              if (cashCount.__byDate[dateISO][k] == null) {
                cashCount.__byDate[dateISO][k] = d.cash_count.__byDate[dateISO][k];
              }
            });
          }
        });
      }
      
      // ── Merge change_data → cashCount (change data เก็บรวมกับ cash_count ได้) ──
      if (d.change_data && typeof d.change_data === 'object') {
        if (!cashCount.__byDate) cashCount.__byDate = {};
        Object.entries(d.change_data).forEach(function([dateISO, stationData]) {
          if (!cashCount.__byDate[dateISO]) cashCount.__byDate[dateISO] = {};
          Object.entries(stationData || {}).forEach(function([station, denoms]) {
            Object.entries(denoms || {}).forEach(function([denom, count]) {
              var key = denom + '_' + station;
              // Change data เป็นข้อมูลเตรียมทอน → ใส่ถ้ายังไม่มี
              if (cashCount.__byDate[dateISO][key] == null) {
                cashCount.__byDate[dateISO][key] = Number(count) || 0;
              }
            });
          });
        });
      }
    }
    
    persistMainState();
    // Re-render ถ้าอยู่หน้า Main
    if (typeof currentPage !== 'undefined' && currentPage === 'main') {
      navigateTo('main');
    }
  } catch (err) {
    console.warn('loadMetaFromBackend error:', err);
  }
}

function renderNav() {

}

function navigateTo(page) {
  // Backward compat: billlist → main
  if (page === 'billlist') page = 'main';
  currentPage = page;
  renderNav();
  const main = document.getElementById('main');
  main.scrollTop = 0;
  const renderer = PAGE_RENDERERS[page];
  if (renderer) renderer(main);
  else main.innerHTML = `<div class="card"><p class="text-dim">หน้า "${page}" กำลังพัฒนา</p></div>`;
  // Apply dd/mm/yyyy date picker (flatpickr) after render
  setTimeout(applyFlatpickrAll, 100);
}

              <div style="font-size:1.4rem;font-weight:700;color:var(--danger)">${unmatchedStmts.length}</div>

          ${cashflowPending.length > 0 ? `

              <div class="text-xs text-dim">เงินเข้า-ออก รอ Match</div>

          ` : ''}
          ${supplierPendingPay.length > 0 ? `
            <div style="padding:12px;background:rgba(239,87,87,.08);border-radius:8px;min-width:200px;flex:1;cursor:pointer" onclick="navigateTo('supplier')">
              <div class="text-xs text-dim">Supplier รอโอน</div>
              <div style="font-size:1.4rem;font-weight:700;color:var(--danger)">${supplierPendingPay.length}</div>
              <div class="text-xs text-muted">฿${fmtNum(supplierPendingPay.reduce((s,p)=>s+Number(p.amount||0),0))}</div>
            </div>
          ` : ''}
          ${supplierUnmatched.length > 0 ? `
            <div style="padding:12px;background:rgba(245,166,35,.08);border-radius:8px;min-width:200px;flex:1;cursor:pointer" onclick="navigateTo('supplier')">
              <div class="text-xs text-dim">PP โอนแล้ว รอ Match</div>
              <div style="font-size:1.4rem;font-weight:700;color:var(--warn)">${supplierUnmatched.length}</div>
              <div class="text-xs text-muted">฿${fmtNum(supplierUnmatched.reduce((s,p)=>s+Number(p.amount||0),0))}</div>
            </div>
          ` : ''}
        </div>
        ${chequesOverdue.length > 0 ? `
          <div style="margin-top:12px;padding:10px;background:rgba(239,87,87,.08);border-radius:8px">
            <div class="text-sm" style="color:var(--danger);font-weight:600">🚨 เช็คเลยกำหนดรอเคลียร์ ${chequesOverdue.length} ฉบับ:</div>
            <div class="text-xs text-muted mt-1">
              ${chequesOverdue.slice(0,3).map(b => `${b.bill_no||'(ไม่มีเลข)'} (฿${fmtNum(b.amount)} ${fmtDate(b.expected_clear_date)})`).join(', ')}
              ${chequesOverdue.length>3?` และอีก ${chequesOverdue.length-3} ฉบับ`:''}
            </div>
          </div>
        ` : ''}
      </div>
    ` : ''}
    
    <div class="flex gap-3" style="display:grid;grid-template-columns:1fr 1fr">
      <div class="card">
        <div class="font-semi mb-3">ยอดขายตาม Station วันนี้</div>
        ${Object.entries(stations).map(([st, val]) => `
          <div class="flex items-center gap-3 mb-2">
            <span class="text-xs text-dim" style="width:55px">${st}</span>
            <div class="progress flex-1"><div class="progress-fill" style="width:${(val/maxStation*100)}%;background:linear-gradient(90deg,var(--primary),var(--info))"></div></div>
            <span class="text-sm font-semi" style="width:85px;text-align:right">฿${fmtNum(val)}</span>
          </div>
        `).join('')}
      </div>
      <div class="card">
        <div class="font-semi mb-3">แจ้งเตือนล่าสุด</div>
        ${alerts.map((a,i) => `
          <div class="flex items-center gap-3" style="padding:10px 0;${i<alerts.length-1?'border-bottom:1px solid var(--border)':''}">
            <div style="width:8px;height:8px;border-radius:50%;background:${a.alert_type==='overdue'?'var(--danger)':a.alert_type==='credit_break'?'var(--warn)':'var(--info)'};flex-shrink:0"></div>
            <div class="flex-1">
              <div class="text-sm">${a.cust_name} — ${a.notes||a.alert_type}</div>
            </div>
            <span class="text-xs text-muted">${a.action_at||''}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function statCard(label, value, sub, color, icon) {
  return `<div class="card flex-1" style="min-width:170px">
    <div class="stat">
      <div>
        <div class="stat-label">${label}</div>
        <div class="stat-value" style="color:${color}">${value}</div>
        ${sub ? `<div class="stat-sub">${sub}</div>` : ''}
      </div>
      <div class="stat-icon" style="color:${color}">${icon||''}</div>
    </div>
  </div>`;
}

// ── Debt Tracking ───────────────────────────────────────────
async function renderDebt(el) {
  let filterStatus = 'ALL';
  let searchText = '';
  let expandedCust = new Set(); // ลูกค้าที่ expand (cust_id)
  let expandedMonth = new Set(); // "custid|monthKey"

  // 13 สถานะบิล
  const BILL_STATUS = {
    active:          { label:'ยังไม่ถึงกำหนด',  color:'var(--success)', emoji:'🟢' },
    due_today:       { label:'ครบกำหนดวันนี้',  color:'var(--warn)',    emoji:'🟡' },
    overdue:         { label:'เกินกำหนด',        color:'#ff9945',         emoji:'🟠' },
    overdue_warning: { label:'เกินนาน',          color:'var(--danger)',  emoji:'🔴' },
    credit_break:    { label:'เบรกเครดิต',       color:'#c92a2a',         emoji:'🔴' },
    partial_paid:    { label:'จ่ายบางส่วน',      color:'var(--info)',    emoji:'🔵' },
    paid:            { label:'จ่ายแล้ว',          color:'var(--success)', emoji:'✅' },
    disputed:        { label:'มีข้อพิพาท',        color:'#8e44ad',         emoji:'🟣' },
    cheque_pending:  { label:'รอเช็คเข้า',        color:'var(--warn)',    emoji:'🟡' },
    cheque_bounced:  { label:'เช็คเด้ง',          color:'var(--danger)',  emoji:'🚫' },
    extended:        { label:'ต่ออายุหนี้',       color:'var(--info)',    emoji:'🔵' },
    bad_debt:        { label:'หนี้สูญ',           color:'#333',            emoji:'⚫' },
    disputed_legal:  { label:'ฟ้องร้อง',          color:'#6d28d9',         emoji:'⚖️' },
  };
  
  // Customer-level status priority (เลือกเอาที่แย่ที่สุด)
  const STATUS_PRIORITY = ['bad_debt','disputed_legal','credit_break','cheque_bounced','disputed','overdue_warning','overdue','partial_paid','extended','cheque_pending','due_today','active','paid'];
  
  function computeBillStatus(bill, today) {
    // ถ้ามี manual status ตั้งไว้ → ใช้
    if (bill.manual_status && BILL_STATUS[bill.manual_status]) return bill.manual_status;
    // ถ้าจ่ายแล้ว
    if (bill.paid_by_sp || bill.match_status === 'paid' || Number(bill.remaining||0) <= 0.01) return 'paid';
    if (Number(bill.paid_amount||0) > 0 && Number(bill.remaining||0) > 0.01) return 'partial_paid';
    if (bill.type === 'Cheque') {
      if (bill.match_status === 'bounced') return 'cheque_bounced';
      if (bill.match_status !== 'matched') return 'cheque_pending';
    }
    // ตาม Due Date
    if (!bill.due_date) return 'active';
    const dueIso = toISODate(bill.due_date);
    if (!dueIso) return 'active';
    if (dueIso > today) return 'active';
    if (dueIso === today) return 'due_today';
    // เลยกำหนด
    const daysDiff = Math.floor((new Date(today) - new Date(dueIso)) / 86400000);
    // เบรกเครดิต: วันที่ 25 ของเดือนถัดไปจาก due date
    const [dy, dm] = dueIso.split('-').map(Number);
    const breakDate = new Date(dy, dm, 25); // dm เป็น 1-indexed → มันคือ (month+1)-1 = next month
    if (new Date(today) >= breakDate) return 'credit_break';
    if (daysDiff > 5) return 'overdue_warning';
    return 'overdue';
  }
  
  function computeCustStatus(bills) {
    const statuses = bills.filter(b => b.status !== 'paid').map(b => b.status);
    if (statuses.length === 0) return 'paid';
    for (const s of STATUS_PRIORITY) {
      if (statuses.includes(s)) return s;
    }
    return 'active';
  }
  
  function daysOverdue(bill, today) {
    if (!bill.due_date) return 0;
    const dueIso = toISODate(bill.due_date);
    if (!dueIso || dueIso >= today) return 0;
    return Math.floor((new Date(today) - new Date(dueIso)) / 86400000);
  }
  
  function formatMonthTH(monthKey) {
    // monthKey = "2026-04" → "เมษายน 2569"
    const thMonths = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
    const m = monthKey.match(/^(\d{4})-(\d{1,2})/);
    if (!m) return monthKey;
    const y = Number(m[1]) + 543; // ค.ศ. → พ.ศ.
    const mo = Number(m[2]) - 1;
    return `${thMonths[mo]} ${y}`;
  }

  async function loadAndRender() {
    // โหลด ar_ledger
    const res = await api('getArLedger');
    let debtors = res.data || [];
    const today = todayISO();
    
    // ── Process: สำหรับแต่ละลูกค้า คำนวณสถานะบิล + รวม SP ที่ตัดบิลนั้น ──
    debtors = debtors.map(d => {
      const months = {}; // monthKey → { total, bills: [] }
      let allBills = d.bills || [];
      
      // ถ้า d.months เป็นแบบเก่า (monthKey → amount) ต้องรวมเอาบิลจากที่อื่น
      // ที่นี่สมมติ d.bills มีอยู่แล้ว; ถ้าไม่มี ใช้ d.months เป็น fallback
      
      allBills.forEach(b => {
        // ตรวจว่า SP ตัดบิลนี้ไหม (จาก paymentList)
        let paidBySp = null;
        let paidAmount = 0;
        paymentList.forEach(sp => {
          (sp.bills || []).forEach(childBill => {
            if (childBill.bill_no === b.bill_no) {
              if (!paidBySp) paidBySp = [];
              paidBySp.push({ sp_no: sp.sp_no, date: sp.date, amount: childBill.amount });
              paidAmount += Number(childBill.amount || 0);
            }
          });
        });
        b.paid_by_sp_list = paidBySp || [];
        b.paid_amount = paidAmount;
        b.remaining = Math.max(0, Number(b.amount||0) - paidAmount);
        b.status = computeBillStatus(b, today);
        b.days_overdue = daysOverdue(b, today);
        
        // จัดกลุ่มเดือน
        const billDate = toISODate(b.bill_date || b.date) || '';
        const monthKey = billDate.slice(0, 7) || 'unknown';
        if (!months[monthKey]) months[monthKey] = { total: 0, remaining: 0, bills: [] };
        months[monthKey].total += Number(b.amount||0);
        months[monthKey].remaining += b.remaining;
        months[monthKey].bills.push(b);
      });
      
      const unpaidBills = allBills.filter(b => b.status !== 'paid');
      const totalOutstanding = unpaidBills.reduce((s,b) => s + b.remaining, 0);
      const monthsUnpaid = Object.keys(months).filter(mk => months[mk].remaining > 0.01).length;
      const maxDaysOverdue = unpaidBills.length ? Math.max(...unpaidBills.map(b => b.days_overdue)) : 0;
      const custStatus = computeCustStatus(allBills);
      
      return {
        ...d,
        bills_processed: allBills,
        months_grouped: months,
        total_outstanding: totalOutstanding,
        months_unpaid: monthsUnpaid,
        max_days_overdue: maxDaysOverdue,
        computed_status: custStatus,
      };
    });
    
    // Filter — ไม่แสดง cash_only
    debtors = debtors.filter(d => d.credit_status !== 'cash_only');
    // ไม่แสดงลูกค้าที่จ่ายหมดแล้ว
    debtors = debtors.filter(d => Number(d.total_outstanding) > 0.01);
    
    // Filter status (ใช้ computed_status)
    if (filterStatus !== 'ALL') {
      debtors = debtors.filter(d => d.computed_status === filterStatus);
    }
    // Search
    if (searchText) {
      const s = searchText.toLowerCase();
      debtors = debtors.filter(d => 
        (d.cust_name||'').toLowerCase().includes(s) || 
        (d.cust_id||'').toLowerCase().includes(s) || 
        (d.phone||'').includes(s) ||
        (d.contact_person||'').toLowerCase().includes(s)
      );
    }
    
    // Sort: เลย-กำหนดนานสุดก่อน
    debtors.sort((a,b) => (b.max_days_overdue||0) - (a.max_days_overdue||0));
    
    const totalDebt = debtors.reduce((s,d) => s + (Number(d.total_outstanding)||0), 0);
    const statusCounts = {};
    debtors.forEach(d => {
      statusCounts[d.computed_status] = (statusCounts[d.computed_status]||0) + 1;
    });

    el.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div class="page-title">ติดตามลูกหนี้</div>
        <div class="flex gap-2 flex-wrap">
          <input class="input" placeholder="ค้นหา ชื่อ / cust_id / เบอร์ / ผู้ติดต่อ" id="debt-search" value="${searchText}" style="width:280px">
          <button class="btn btn-primary btn-sm" id="btn-quick-payment" style="background:var(--success);color:#fff">💰 รับชำระเร็ว</button>
          <button class="btn btn-outline btn-sm" id="btn-check-alerts">${ICONS.pulse} ตรวจสอบสถานะ</button>
          <button class="btn btn-outline btn-sm" id="btn-expand-all">📂 เปิดทั้งหมด</button>
          <button class="btn btn-outline btn-sm" id="btn-collapse-all">📁 ปิดทั้งหมด</button>
        </div>
      </div>

      <!-- Summary cards -->
      <div class="flex gap-3 flex-wrap mb-3 stagger">
        ${statCard('ลูกหนี้ค้างชำระ', debtors.length, '', 'var(--info)', ICONS.card)}
        ${statCard('ยอดค้างรวม', '฿'+fmtNum(totalDebt), '', 'var(--warn)', ICONS.dollar)}
        ${statCard('เลยกำหนด', (statusCounts.overdue||0)+(statusCounts.overdue_warning||0), 'รายที่ต้องติดตาม', 'var(--danger)', ICONS.alert)}
        ${statCard('เบรกเครดิต', statusCounts.credit_break||0, 'หยุดขายเครดิต', 'var(--purple)', ICONS.alert)}
      </div>

      <!-- Filter pills (รวม 13 สถานะ) -->
      <div class="flex gap-2 mb-3 flex-wrap" style="font-size:.82rem">
        <button class="pill ${filterStatus==='ALL'?'active':''}" data-fs="ALL">ทั้งหมด (${debtors.length})</button>
        ${Object.keys(BILL_STATUS).filter(k => k !== 'paid' && statusCounts[k]).map(k => {
          const s = BILL_STATUS[k];
          return `<button class="pill ${filterStatus===k?'active':''}" data-fs="${k}" style="--pill-color:${s.color};border-color:${s.color}33">${s.emoji} ${s.label} (${statusCounts[k]||0})</button>`;
        }).join('')}
      </div>

      <!-- Hierarchical Customer List -->
      <div class="card-flat">
        ${debtors.length === 0 ? 
          `<div style="padding:40px;text-align:center;color:var(--text3)">ไม่มีลูกหนี้ในสถานะที่เลือก</div>` :
          debtors.map(d => {
            const st = BILL_STATUS[d.computed_status] || BILL_STATUS.active;
            const isOpenCust = expandedCust.has(d.cust_id);
            const monthsSorted = Object.keys(d.months_grouped).sort((a,b) => b.localeCompare(a)); // ใหม่ก่อน
            const unpaidMonths = monthsSorted.filter(mk => d.months_grouped[mk].remaining > 0.01);
            
            return `
              <!-- LEVEL 1: CUSTOMER -->
              <div class="cust-block" style="border-bottom:1px solid var(--border)">
                <div class="cust-row" data-cust-id="${d.cust_id}" style="padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;${isOpenCust?'background:var(--surface2);border-left:4px solid '+st.color:'border-left:4px solid transparent'}">
                  <div style="font-size:1.1rem;color:var(--text2);width:20px">${isOpenCust?'▼':'▶'}</div>
                  <div style="flex:1;min-width:0">
                    <div class="flex items-center gap-2 flex-wrap">
                      <span class="font-semi" style="color:var(--text);font-size:1rem">${d.cust_name||'-'}</span>
                      <span class="badge" style="background:${st.color}22;color:${st.color};border:1px solid ${st.color}66">${st.emoji} ${st.label}</span>
                      ${d.max_days_overdue > 0 ? `<span class="badge badge-danger" style="font-size:.7rem">เลย ${d.max_days_overdue} วัน</span>` : ''}
                      ${unpaidMonths.length > 0 ? `<span class="text-xs text-muted">ค้าง ${unpaidMonths.length} เดือน</span>` : ''}
                    </div>
                    <div class="text-xs text-muted" style="margin-top:2px">
                      ${d.cust_id||''} 
                      ${d.contact_person?' · '+d.contact_person:''} 
                      ${d.phone?' · 📞 '+d.phone:''}
                    </div>
                  </div>
                  <div style="text-align:right">
                    <div style="font-weight:700;color:var(--warn);font-size:1.15rem">฿${fmtNum(d.total_outstanding)}</div>
                    <div class="text-xs text-muted">${d.bills_processed.filter(b=>b.status!=='paid').length} บิล</div>
                  </div>
                  <button class="btn btn-primary btn-sm btn-pay-cust" data-pay="${d.cust_id}" onclick="event.stopPropagation()" style="background:var(--success);color:#fff">${ICONS.dollar} รับชำระ</button>
                </div>
                
                ${isOpenCust ? `
                  <!-- LEVEL 2: MONTHS -->
                  <div style="padding:0 16px 8px 40px;background:var(--surface2)">
                    ${unpaidMonths.map(mk => {
                      const mData = d.months_grouped[mk];
                      const monthKey = d.cust_id + '|' + mk;
                      const isOpenMonth = expandedMonth.has(monthKey);
                      const monthBills = mData.bills.filter(b => b.status !== 'paid');
                      const monthPaidBills = mData.bills.filter(b => b.status === 'paid');
                      
                      return `
                        <div class="month-block" style="border-left:2px solid var(--border);margin-left:8px">
                          <div class="month-row" data-cust-id="${d.cust_id}" data-month="${mk}" style="padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;${isOpenMonth?'background:var(--surface3)':''}">
                            <div style="font-size:.9rem;color:var(--text2);width:16px">${isOpenMonth?'▼':'▶'}</div>
                            <div style="flex:1">
                              <div class="text-sm font-semi" style="color:var(--text)">📅 ${formatMonthTH(mk)}</div>
                              <div class="text-xs text-muted">
                                ${monthBills.length} บิลค้าง ${monthPaidBills.length > 0 ? '· '+monthPaidBills.length+' บิลจ่ายแล้ว' : ''}
                              </div>
                            </div>
                            <div style="text-align:right">
                              <div style="font-weight:700;color:var(--warn)">฿${fmtNum(mData.remaining)}</div>
                              <div class="text-xs text-muted">จาก ฿${fmtNum(mData.total)}</div>
                            </div>
                          </div>
                          
                          ${isOpenMonth ? `
                            <!-- LEVEL 3: BILLS -->
                            <div style="padding:4px 8px 8px 20px;background:var(--surface1);border-left:2px solid ${st.color}">
                              ${mData.bills.map(b => {
                                const bs = BILL_STATUS[b.status] || BILL_STATUS.active;
                                const isPaid = b.status === 'paid';
                                return `
                                  <div style="padding:10px 12px;margin:4px 0;background:${isPaid?'rgba(45,212,160,.05)':'var(--surface2)'};border-radius:6px;border-left:3px solid ${bs.color}">
                                    <div class="flex items-center gap-2 flex-wrap">
                                      <span class="font-semi" style="font-family:var(--mono);color:var(--text)">${b.bill_no||'-'}</span>
                                      <span class="badge" style="background:${bs.color}22;color:${bs.color};font-size:.7rem">${bs.emoji} ${bs.label}</span>
                                      ${b.days_overdue > 0 && !isPaid ? `<span class="text-xs" style="color:var(--danger)">· เลย ${b.days_overdue} วัน</span>` : ''}
                                    </div>
                                    <div class="flex items-center gap-4 flex-wrap text-xs text-muted" style="margin-top:3px">
                                      <span>ออก: ${fmtDate(b.bill_date||b.date)}</span>
                                      ${b.due_date ? `<span>ครบกำหนด: ${fmtDate(b.due_date)}</span>` : ''}
                                      <span style="color:var(--text)">ยอด: ฿${fmtNum(b.amount||0)}</span>
                                      ${b.paid_amount > 0 ? `<span style="color:var(--info)">· จ่ายแล้ว ฿${fmtNum(b.paid_amount)}</span>` : ''}
                                      ${b.remaining > 0 ? `<span style="color:var(--warn)">· เหลือ ฿${fmtNum(b.remaining)}</span>` : ''}
                                    </div>
                                    ${b.paid_by_sp_list && b.paid_by_sp_list.length ? `
                                      <div class="text-xs" style="margin-top:4px;color:var(--success)">
                                        ✓ ตัดโดย SP: ${b.paid_by_sp_list.map(sp => `${sp.sp_no} (฿${fmtNum(sp.amount)} · ${fmtDate(sp.date)})`).join(', ')}
                                      </div>
                                    ` : ''}
                                    <div style="margin-top:6px">
                                      <button class="btn btn-ghost btn-sm btn-bill-status" data-bill="${b.bill_no}" data-cust="${d.cust_id}" style="font-size:.7rem;padding:3px 8px">🏷️ เปลี่ยนสถานะ</button>
                                    </div>
                                  </div>
                                `;
                              }).join('')}
                            </div>
                          ` : ''}
                        </div>
                      `;
                    }).join('')}
                  </div>
                ` : ''}
              </div>
            `;
          }).join('')
        }
      </div>
    `;

    // ── Event Handlers ──
    document.getElementById('debt-search')?.addEventListener('input', debounce(e => { searchText = e.target.value; loadAndRender(); }, 300));
    el.querySelectorAll('.pill[data-fs]').forEach(btn => {
      btn.addEventListener('click', () => { filterStatus = btn.dataset.fs; loadAndRender(); });
    });
    document.getElementById('btn-check-alerts')?.addEventListener('click', async () => {
      toast('กำลังตรวจสอบสถานะ...', 'info');
      const r = await api('checkAlerts');
      if (r.success) { toast(`เสร็จ — เปลี่ยนสถานะ ${r.data?.status_changed||0} ราย`, 'success'); loadAndRender(); }
      else toast(r.error||'ไม่สำเร็จ', 'error');
    });
    document.getElementById('btn-quick-payment')?.addEventListener('click', () => openQuickPaymentModal());
    
    document.getElementById('btn-expand-all')?.addEventListener('click', () => {
      debtors.forEach(d => {
        expandedCust.add(d.cust_id);
        Object.keys(d.months_grouped).forEach(mk => {
          if (d.months_grouped[mk].remaining > 0.01) expandedMonth.add(d.cust_id + '|' + mk);
        });
      });
      loadAndRender();
    });
    document.getElementById('btn-collapse-all')?.addEventListener('click', () => {
      expandedCust.clear();
      expandedMonth.clear();
      loadAndRender();
    });
    
    // Toggle customer expand
    el.querySelectorAll('.cust-row').forEach(row => {
      row.addEventListener('click', (e) => {
        if (e.target.closest('.btn-pay-cust')) return;
        const cid = row.dataset.custId;
        if (expandedCust.has(cid)) {
          expandedCust.delete(cid);
          // ปิด months ของ cust นี้ด้วย
          Array.from(expandedMonth).forEach(k => { if (k.startsWith(cid+'|')) expandedMonth.delete(k); });
        } else {
          expandedCust.add(cid);
        }
        loadAndRender();
      });
    });
    
    // Toggle month expand
    el.querySelectorAll('.month-row').forEach(row => {
      row.addEventListener('click', (e) => {
        e.stopPropagation();
        const key = row.dataset.custId + '|' + row.dataset.month;
        if (expandedMonth.has(key)) expandedMonth.delete(key);
        else expandedMonth.add(key);
        loadAndRender();
      });
    });
    
    // Pay button
    el.querySelectorAll('.btn-pay-cust').forEach(btn => {
      btn.addEventListener('click', () => openPaymentModal(btn.dataset.pay));
    });
    
    // Bill status change
    el.querySelectorAll('.btn-bill-status').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        openBillStatusModal(btn.dataset.cust, btn.dataset.bill);
      });
    });
  }

  loadAndRender();
}

// ══════════════════════════════════════════════════════════════
// Quick Payment Modal — รับชำระจากลูกค้าแบบเร็ว
// Step 1: ค้นหาลูกค้า → Step 2: เลือกบิลที่จะตัด → Step 3: บันทึก
// ══════════════════════════════════════════════════════════════
async function openQuickPaymentModal() {
  let step = 1;
  let selectedCustomer = null;
  let searchResults = [];
  
  function renderStep1() {
    openModal('💰 รับชำระจากลูกค้า — Step 1: เลือกลูกค้า', `
      <div class="flex-col gap-3">
        <p class="text-sm text-dim">พิมพ์ชื่อ / รหัส / เบอร์โทร ของลูกค้า</p>
        <input class="input" id="qp-search" placeholder="ค้นหาลูกค้า..." autofocus style="font-size:1.05rem;padding:10px">
        <div id="qp-results" style="max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:8px">
          <div style="padding:20px;text-align:center;color:var(--text3)">พิมพ์เพื่อค้นหา...</div>
        </div>
      </div>
    `);
    
    const searchInput = document.getElementById('qp-search');
    searchInput?.focus();
    searchInput?.addEventListener('input', debounce(async (e) => {
      const q = e.target.value.trim();
      if (!q) {
        document.getElementById('qp-results').innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3)">พิมพ์เพื่อค้นหา...</div>';
        return;
      }
      
      const res = await api('getArLedger');
      const allDebtors = res.data || [];
      const matches = allDebtors.filter(d => {
        if (Number(d.total_outstanding||0) <= 0) return false;
        const s = q.toLowerCase();
        return (d.cust_name||'').toLowerCase().includes(s) ||
               (d.cust_id||'').toLowerCase().includes(s) ||
               (d.phone||'').includes(q);
      }).slice(0, 10);
      
      searchResults = matches;
      const container = document.getElementById('qp-results');
      if (!container) return;
      
      container.innerHTML = matches.length === 0 
        ? '<div style="padding:20px;text-align:center;color:var(--text3)">ไม่พบลูกค้าที่มีหนี้</div>'
        : matches.map((d, i) => {
          const status = d.credit_status || 'active';
          const statusColor = {active:'var(--success)', overdue:'var(--danger)', credit_break:'var(--warn)'}[status] || 'var(--text2)';
          return `
            <div class="qp-result" data-cust-id="${d.cust_id}" style="padding:12px;border-bottom:1px solid var(--border);cursor:pointer">
              <div class="flex justify-between items-center">
                <div>
                  <div class="font-semi" style="color:var(--text)">${d.cust_name}</div>
                  <div class="text-xs text-muted">${d.cust_id} · ${d.phone||'ไม่มีเบอร์'}</div>
                  <span class="badge" style="background:${statusColor}22;color:${statusColor};font-size:.7rem">${status}</span>
                </div>
                <div style="text-align:right">
                  <div style="font-weight:700;color:var(--warn)">฿${fmtNum(d.total_outstanding)}</div>
                  <div class="text-xs text-muted">${Object.keys(d.months||{}).length} เดือน</div>
                </div>
              </div>
            </div>
          `;
        }).join('');
      
      container.querySelectorAll('.qp-result').forEach(row => {
        row.addEventListener('click', () => {
          const custId = row.dataset.custId;
          selectedCustomer = matches.find(m => m.cust_id === custId);
          renderStep2();
        });
        row.addEventListener('mouseenter', () => row.style.background = 'rgba(79,156,249,.1)');
        row.addEventListener('mouseleave', () => row.style.background = '');
      });
    }, 300));
  }
  
  async function renderStep2() {
    if (!selectedCustomer) return;
    
    // ดึงบิลที่ค้างของลูกค้า
    const res = await api('getArLedger', { cust_id: selectedCustomer.cust_id });
    const cust = (res.data || [])[0] || selectedCustomer;
    const outstandingBills = [];
    
    // หา bills จาก months structure
    Object.entries(cust.months || {}).forEach(([month, data]) => {
      (data.bills || []).forEach(b => {
        if (Number(b.remaining||b.amount||0) > 0) {
          outstandingBills.push({
            ...b,
            month,
            remaining: Number(b.remaining||b.amount||0),
          });
        }
      });
    });
    
    outstandingBills.sort((a,b) => (a.due_date||'').localeCompare(b.due_date||''));
    const totalOutstanding = outstandingBills.reduce((s,b) => s + b.remaining, 0);
    
    openModal(`💰 ${selectedCustomer.cust_name} — Step 2: เลือกบิลที่ตัดชำระ`, `
      <div class="flex-col gap-3">
        <div style="padding:10px;background:rgba(245,166,35,.08);border-radius:8px;display:flex;justify-content:space-between">
          <div>
            <div class="text-xs text-dim">${selectedCustomer.cust_id}</div>
            <div class="font-semi">${selectedCustomer.cust_name}</div>
          </div>
          <div style="text-align:right">
            <div class="text-xs text-dim">ยอดค้างรวม</div>
            <div style="font-weight:700;color:var(--warn);font-size:1.2rem">฿${fmtNum(totalOutstanding)}</div>
          </div>
        </div>
        
        <div class="flex gap-2">
          <div class="input-group flex-1">
            <label>ยอดที่รับชำระ *</label>
            <input type="number" class="input" id="qp-amount" step="0.01" placeholder="0.00" autofocus style="font-size:1.1rem">
          </div>
          <div class="input-group flex-1">
            <label>วันที่รับ</label>
            <input type="date" class="input" id="qp-paydate" value="${todayISO()}">
          </div>
        </div>
        
        <div class="flex gap-2">
          <div class="input-group flex-1">
            <label>วิธีรับ</label>
            <select class="select" id="qp-method">
              <option value="Cash">เงินสด</option>
              <option value="Transfer">โอน</option>
              <option value="Cheque">เช็ค</option>
              <option value="Other">อื่นๆ</option>
            </select>
          </div>
          <div class="input-group flex-1">
            <label>ธนาคาร (ถ้าโอน)</label>
            <select class="select" id="qp-bank">
              ${['','KTB','KBANK','BBL','SCB','BAY','TMB','Other'].map(b=>`<option value="${b}">${b||'-'}</option>`).join('')}
            </select>
          </div>
        </div>
        
        <div class="input-group">
          <label>เลขที่อ้างอิง / Slip</label>
          <input class="input" id="qp-ref" placeholder="เลข slip, เลขเช็ค, หรืออ้างอิงอื่น">
        </div>
        
        <div>
          <label class="text-sm font-semi">บิลที่จะตัดชำระ <span class="text-xs text-muted">(เลือก FIFO อัตโนมัติ หรือคลิกเลือกเอง)</span></label>
          <div style="max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;margin-top:6px">
            ${outstandingBills.length === 0 ? 
              '<div style="padding:20px;text-align:center;color:var(--text3)">ไม่มีบิลค้างชำระ</div>' :
              outstandingBills.map(b => `
                <div style="padding:8px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
                  <label style="display:flex;align-items:center;gap:8px;flex:1;cursor:pointer">
                    <input type="checkbox" class="qp-bill" data-bill="${b.bill_no}" data-amount="${b.remaining}" checked>
                    <div>
                      <div class="text-sm font-semi">${b.bill_no}</div>
                      <div class="text-xs text-muted">${fmtDate(b.bill_date||b.date)} · ${b.month} ${b.due_date?'· Due '+fmtDate(b.due_date):''}</div>
                    </div>
                  </label>
                  <div style="font-weight:600;color:var(--danger)">฿${fmtNum(b.remaining)}</div>
                </div>
              `).join('')
            }
          </div>
        </div>
        
        <div class="input-group">
          <label>หมายเหตุ</label>
          <input class="input" id="qp-note" placeholder="หมายเหตุเพิ่มเติม">
        </div>
        
        <div class="flex gap-2 mt-2">
          <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
          <button class="btn btn-sm flex-1" id="qp-back" style="background:var(--surface2)">← ย้อนกลับ</button>
          <button class="btn btn-success btn-sm flex-1" id="qp-confirm">${ICONS.check} บันทึกรับชำระ</button>
        </div>
      </div>
    `);
    
    // Auto-set amount = total outstanding  
    document.getElementById('qp-amount').value = totalOutstanding.toFixed(2);
    
    // Back button
    document.getElementById('qp-back')?.addEventListener('click', renderStep1);
    
    // Confirm
    document.getElementById('qp-confirm')?.addEventListener('click', async () => {
      const amount = Number(document.getElementById('qp-amount').value);
      if (!amount || amount <= 0) { toast('กรอกยอดที่รับชำระ', 'error'); return; }
      
      const selectedBills = Array.from(document.querySelectorAll('.qp-bill:checked')).map(cb => ({
        bill_no: cb.dataset.bill,
        amount: Number(cb.dataset.amount),
      }));
      
      if (selectedBills.length === 0) {
        if (!confirm('ไม่ได้เลือกบิล — จะบันทึกเป็นยอดทั่วไป (ไม่ตัดบิลเฉพาะ)?')) return;
      }
      
      toast('กำลังบันทึก...', 'info');
      const res = await api('recordPayment', {
        cust_id: selectedCustomer.cust_id,
        amount: amount,
        payment_date: document.getElementById('qp-paydate').value,
        payment_method: document.getElementById('qp-method').value,
        reference: document.getElementById('qp-ref').value,
        bills_cleared: selectedBills,
        note: document.getElementById('qp-note').value,
        action_by: currentUser?.display_name || 'Admin',
      });
      
      if (res.success) {
        // สร้าง SP ชั่วคราวใน paymentList — รอ SP จริงมาแก้ทีหลัง
        const tempSpNo = 'SP-TEMP-' + String(Date.now()).slice(-6);
        paymentList.push({
          sp_no: tempSpNo,
          date: document.getElementById('qp-paydate').value,
          cust_id: selectedCustomer.cust_id,
          cust_name: selectedCustomer.cust_name,
          amount: amount,
          total: amount,
          cash: document.getElementById('qp-method').value === 'Cash' ? amount : 0,
          transfer: document.getElementById('qp-method').value === 'Transfer' ? amount : 0,
          cheque: document.getElementById('qp-method').value === 'Cheque' ? amount : 0,
          bills: selectedBills.map(b => ({ bill_no: b.bill_no, amount: b.amount, doc_type:'(Quick Payment)' })),
          match_status: 'pending',
          note: 'Quick Payment: ' + (document.getElementById('qp-note').value || ''),
          reference: document.getElementById('qp-ref').value,
          is_temp: true,
        });
        persistMainState();
        
        closeModal();
        toast(`รับชำระสำเร็จ ฿${fmtNum(amount)} จาก ${selectedCustomer.cust_name} · สร้าง ${tempSpNo}`, 'success');
        // re-render debt page
        if (currentPage === 'debt') navigateTo('debt');
      } else {
        toast(res.error || 'บันทึกไม่สำเร็จ', 'error');
      }
    });
  }
  
  renderStep1();
}

    const bills_to_clear = [...document.querySelectorAll('.bill-check:checked:not([disabled])')].map(c => c.dataset.bill);
    if (amount <= 0) { toast('กรอกยอดที่จ่าย', 'error'); return; }
    if (bills_to_clear.length === 0) { toast('เลือกบิลที่ต้องการตัด', 'error'); return; }

    const r = await api('recordPayment', {
      cust_id: custId,
      amount,
      bills_to_clear,
      payment_date: document.getElementById('pay-date').value,
      payment_method: document.getElementById('pay-method').value,
      reference: document.getElementById('pay-ref').value,
      action_by: currentUser?.display_name || 'Admin',
    });
    if (r.success) {
      toast(`ตัดชำระสำเร็จ — ${r.data.bills_cleared} บิล · ยอดคงเหลือ ฿${fmtNum(r.data.new_outstanding)} · สถานะ: ${r.data.new_status}`, 'success');
      closeModal();
      navigateTo('debt');
    } else {
      toast(r.error||'ไม่สำเร็จ', 'error');
    }
  });
}

// ── Matching ────────────────────────────────────────────────
async function renderMatching(el) {
  let bankFilter = 'ALL', matchFilter = 'ALL';
  let dirFilter = 'ALL'; // 'ALL' | 'in' | 'out'
  let dateFrom = '', dateTo = '';
  let amountSearch = ''; // ค้นหายอดเงิน (partial match)
  const bankColors = { KTB:'#00a4e4', KBANK:'#138f2d', 'BBL NW':'#ff7b00', BBL:'#1e3a7b', TTB:'#ff0066' };

  function render() {
    let data = uploadedStatements.length > 0 ? [...uploadedStatements] : [];
    
    // Filter by bank
    if (bankFilter !== 'ALL') data = data.filter(s => s.bank === bankFilter);
    
    // Filter by match status
    if (matchFilter === 'matched') data = data.filter(s => s.match_status === 'matched');
    else if (matchFilter === 'unmatched') data = data.filter(s => s.match_status !== 'matched');
    
    // Filter by direction (เงินเข้า/ออก)
    if (dirFilter === 'in') data = data.filter(s => Number(s.amount || 0) > 0);
    else if (dirFilter === 'out') data = data.filter(s => Number(s.amount || 0) < 0);
    
    // Filter by date range
    if (dateFrom || dateTo) {
      data = data.filter(s => {
        const d = toISODate(s.date || s.trans_date);
        if (!d) return true;
        if (dateFrom && d < dateFrom) return false;
        if (dateTo && d > dateTo) return false;
        return true;
      });
    }
    
    // Filter by amount search (substring match ทศนิยม flex)
    if (amountSearch.trim()) {
      const needle = amountSearch.trim().replace(/,/g, '');
      data = data.filter(s => {
        const amt = Number(s.amount || 0);
        const abs = Math.abs(amt);
        // ลอง match ทั้งแบบมี/ไม่มีทศนิยม
        const s1 = String(abs);
        const s2 = abs.toFixed(2);
        return s1.includes(needle) || s2.includes(needle);
      });
    }
    
    // Sort by date (default ASC, toggle-able via button)
    const _order = getSortOrder('statement');
    data.sort((a, b) => {
      const da = parseThaiDate(a.date) || 0;
      const db = parseThaiDate(b.date) || 0;
      return _order === 'asc' ? da - db : db - da;
    });
    
    // Truncate for render (หลัง filter แล้ว — ไม่ตัดข้อมูลที่ต้องการ)
    const MAX_ROWS = 1000;
    const visibleData = data.length > MAX_ROWS ? data.slice(0, MAX_ROWS) : data;
    const isTruncated = data.length > MAX_ROWS;

    // Bank counts
    const bankCounts = {
      KTB: (statementsByBank.KTB || []).length,
      KBANK: (statementsByBank.KBANK || []).length,
      'BBL NW': (statementsByBank['BBL NW'] || []).length,
      BBL: (statementsByBank.BBL || []).length,
      TTB: (statementsByBank.TTB || []).length,
    };

    const allStmts = uploadedStatements;
    const totalMatched = allStmts.filter(s=>s.match_status==='matched').length;
    const totalUnmatched = allStmts.length - totalMatched;
    const filteredMatched = data.filter(s=>s.match_status==='matched').length;
    const filteredUnmatched = data.length - filteredMatched;
    
    // Count in/out (ใช้ data ที่ผ่าน bank+match filter แล้ว เพื่อให้ count ตามบริบท)
    const dataBeforeDir = (() => {
      let d = uploadedStatements.length > 0 ? [...uploadedStatements] : [];

          if (dateTo && dt > dateTo) return false;
          return true;
        });
      }
      return d;
    })();
    const countIn = dataBeforeDir.filter(s => Number(s.amount||0) > 0).length;
    const countOut = dataBeforeDir.filter(s => Number(s.amount||0) < 0).length;
    const sumIn = dataBeforeDir.filter(s => Number(s.amount||0) > 0).reduce((a,s)=>a+Number(s.amount||0),0);

          }).join('')}

        </div>

        <button class="pill ${dirFilter==='out'?'active':''}" data-dir="out" style="--pill-color:var(--danger)" title="฿${fmtNum(Math.abs(sumOut))}">💸 ออก (${countOut})</button>

    const _shiftMatchDate = (days) => {
      const today = todayISO();
      let from = dateFrom || today;
      let to = dateTo || from;
      const shift = (iso) => {
        const d = new Date(iso + 'T00:00:00');
        if (isNaN(d)) return iso;
        d.setDate(d.getDate() + days);
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      };
      dateFrom = shift(from);
      dateTo = shift(to);
      render();
    };

    document.getElementById('match-date-next')?.addEventListener('click', () => _shiftMatchDate(+1));

    document.getElementById('btn-dedup-stmts')?.addEventListener('click', () => {
      // Count potential duplicates first (dry-run) — clone
      function normTime(t) {
        const m = String(t||'').match(/^(\d{1,2}):(\d{2})/);
        return m ? (m[1].padStart(2,'0') + ':' + m[2]) : '';
      }
      const preview = { byBank: {}, total: 0 };
      Object.keys(statementsByBank).forEach(bank => {
        const arr = statementsByBank[bank] || [];
        const seen = new Map();
        let dup = 0;
        arr.forEach(r => {
          const key = `${r.date||''}|${normTime(r.time)}|${Math.round(Number(r.amount)||0)}|${r.ref_no||''}`;
          if (seen.has(key)) { dup++; } else { seen.set(key, 1); }
        });
        if (arr.length > 0) preview.byBank[bank] = { total: arr.length, dup: dup };
        preview.total += dup;
      });
      
      if (preview.total === 0) {
        toast('ไม่พบ Statement ซ้ำ', 'info');
        return;

      let msg = `พบ Statement ซ้ำ ${preview.total} รายการ\n\n`;
      Object.keys(preview.byBank).forEach(bank => {
        const r = preview.byBank[bank];

      });
      msg += `\n⚠️ ลบแล้วกู้คืนไม่ได้\nยืนยันลบ?`;

    // ── Manual Match: เลือก Statement → เลือก Bill → ผูก ──
    el.querySelectorAll('.btn-manual-match').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const stmtIdx = Number(btn.dataset.stmtIdx);
        const stmt = data[stmtIdx];
        if (!stmt) return;
        
        const stmtDate = toISODate(stmt.date);
        const stmtAmt = Number(stmt.amount) || 0;
        
        // หาบิล candidate: ยอดตรง/ใกล้เคียง + ยังไม่ match
        const cashflowCandidates = (cashflowList||[])
          .filter(c => c.match_status !== 'matched')
          .map(c => ({
            bill_no: c.id,
            amount: c.type === 'supplier' ? -Math.abs(c.amount) : c.amount,
            date: c.date,
            station: 'Cashflow (' + c.type + ')',
            type: c.type === 'deposit' ? 'ฝากเงิน' : c.type === 'supplier' ? 'จ่าย Supplier' : c.type === 'transfer' ? 'โอน' : 'อื่นๆ',
            remarks1: c.counterparty || c.from_account || c.to_account || '',
            _cashflow: c,
          }));
        
        // ── Supplier Payments as candidates (especially cheques on KTB) ──
        const spCandidates = (supplierPayments||[])
          .filter(sp => {
            if (sp.status !== 'paid') return false;
            if (sp.match_status === 'matched') return false;
            // เช็คบน KTB: withdraw direction only
            if (sp.payment_method === 'เช็ค' && stmt.bank === 'KTB' && stmtAmt > 0) return false; // เงินเข้า KTB ไม่ใช่เช็ค
            return true;
          })
          .map(sp => {
            const isCheque = sp.payment_method === 'เช็ค';
            return {
              bill_no: sp.id,
              amount: -Math.abs(Number(sp.amount)||0),
              date: sp.transfer_date || sp.cheque_date,
              station: isCheque ? '📝 เช็ค' : '🏭 จ่ายเจ้าหนี้',
              type: isCheque ? `เช็ค ${sp.cheque_no||''}` : `โอน ${sp.bank||''}`,
              remarks1: sp.supplier_name + (sp.pp_no ? ' · PP:' + sp.pp_no : ''),
              _supplierPayment: sp,
            };
          });
        
        // ยอดตรง ±5% หรือ ±1 บาท (ใช้ absolute รองรับเงินเข้า/ออก)
        const absStmt = Math.abs(stmtAmt);
        
        // ── Filter กฎใหม่: ──
        //   Match เฉพาะ Type = Transfer, Card, Cheque, Refund
        //   + ทิศทาง (เงินเข้า/ออก) ตาม prefix และ station
        const MATCHABLE_TYPES = ['Transfer', 'Card', 'Cheque', 'Refund'];
        // ── Direction prefixes (fixed per business rules) ──
        //   เงินเข้า (stmt > 0):
        //     ลูกหนี้:    SS, OS, SP, S2 (ขายสด + ตัดชำระ + Front POS อนาคต)
        //     เจ้าหนี้:   BS, PC (supplier คืนเงินเราสด)
        //     Front station: ทุกบิล (บิล Front ปัจจุบันที่ bill_no ว่าง)
        //   เงินออก (stmt < 0):
        //     ลูกหนี้:    SC, JS, JR (ใบลดหนี้ลูกหนี้ — คืนเงินลูกค้า)
        //     เจ้าหนี้:   PP, PS, MS, PX (ตัดชำระ + ซื้อสด + ค่าขนส่ง)
        //   ไม่ขึ้นเลย: SR, OR, PR, MR, BR (เชื่อ — รอ SP/PP)
        const INCOME_PREFIXES = ['SS','OS','SP','S2','BS','PC'];
        const EXPENSE_PREFIXES = ['PP','PS','MS','PX','SC','JS','JR'];
        
        const canMatchBill = (b) => {
          if (!MATCHABLE_TYPES.includes(b.type || '')) return false;
          const prefix = String(b.bill_no||'').substring(0,2).toUpperCase();
          const isFrontStation = String(b.station||'').startsWith('Front');
          if (stmtAmt < 0) {
            // เงินออก → เจ้าหนี้
            return EXPENSE_PREFIXES.includes(prefix);
          } else {
            // เงินเข้า → ลูกหนี้ หรือ Front
            return INCOME_PREFIXES.includes(prefix) || isFrontStation;
          }
        };
        
        // ── Helper: ยอดที่ใช้ match สำหรับบิลทั่วไป ──
        //   มี fee → ยอดสุทธิ (amount − WHT − TF − CF)
        //   ไม่มี fee → baht (amount)
        // (cashflow/SP ไม่มี fee field → ใช้ amount ตรงๆ)
        const mmBillMatchAmt = (b) => {
          const amt = Math.abs(Number(b.amount) || 0);
          // SP / cashflow ไม่มี fee field — ใช้ amount ตรงๆ
          if (b._cashflow || b._supplierPayment) return amt;
          const wht = Number(b.wht_amount) || 0;
          const tf = Number(b.transfer_fee) || 0;
          const cf = Number(b.card_fee) || 0;
          const fees = wht + tf + cf;
          return fees > 0 ? (amt - fees) : amt;
        };
        
        const candidates = [
          ...billList.filter(b => {
            if (b.match_status === 'matched' || b.match_status === 'paid') return false;
            if (!canMatchBill(b)) return false;
            const amtDiff = Math.abs(mmBillMatchAmt(b) - absStmt);
            return amtDiff < 1 || amtDiff < absStmt * 0.05;
          }),
          // Cashflow: deposit/supplier/transfer - filter by direction
          ...cashflowCandidates.filter(c => {
            const cfDir = c._cashflow?.type;
            if (stmtAmt < 0 && !['supplier','transfer','misc'].includes(cfDir)) return false;
            if (stmtAmt > 0 && !['deposit','transfer','misc'].includes(cfDir)) return false;
            const amtDiff = Math.abs(Math.abs(Number(c.amount)) - absStmt);
            return amtDiff < 1 || amtDiff < absStmt * 0.05;
          }),
          // Supplier Payments → always expense (out)
          ...spCandidates.filter(sp => {
            if (stmtAmt > 0) return false;
            const amtDiff = Math.abs(Math.abs(Number(sp.amount)) - absStmt);
            return amtDiff < 1 || amtDiff < absStmt * 0.05;
          }),
        ];
        // Sort: ยอดตรง + วันที่ใกล้ที่สุด (ใช้ net สำหรับบิลที่มี fee)
        candidates.sort((a, b) => {
          const aExact = Math.abs(mmBillMatchAmt(a) - absStmt) < 0.01 ? 0 : 1;
          const bExact = Math.abs(mmBillMatchAmt(b) - absStmt) < 0.01 ? 0 : 1;
          if (aExact !== bExact) return aExact - bExact;
          const aDate = toISODate(a.date), bDate = toISODate(b.date);
          return Math.abs(new Date(aDate) - new Date(stmtDate)) - Math.abs(new Date(bDate) - new Date(stmtDate));
        });
        
        openModal(`🔍 Match Statement → Bill`, `

              </div>
            </div>
            
            <div class="input-group">
              <label>ค้นหาบิล</label>
              <input class="input" id="mm-search" placeholder="เลขบิล / ชื่อลูกค้า / ยอดเงิน" autofocus>
            </div>
            
            <div class="text-xs text-dim">
              ${candidates.length?`🎯 เจอบิลที่ยอดใกล้เคียง ${candidates.length} รายการ · <span style="color:var(--info)">💡 ติ๊กได้หลายบิล — รวมกันให้ตรงยอด stmt</span>`:'⚠️ ไม่เจอบิลยอดตรง — ค้นหาด้วยตนเอง'}
            </div>
            
            <div id="mm-bill-list" style="max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:8px"></div>
            
            <div id="mm-sum-bar" style="display:none;padding:10px;background:rgba(79,156,249,.08);border:1px solid rgba(79,156,249,.3);border-radius:6px;font-size:.88rem">
              <div class="flex justify-between items-center">
                <span>เลือก <span id="mm-sum-count">0</span> บิล · รวม</span>
                <span id="mm-sum-amount" style="font-weight:700">฿0.00</span>
              </div>
              <div class="flex justify-between items-center" style="margin-top:4px">
                <span class="text-xs text-dim">เทียบ stmt ฿${fmtNum(Math.abs(stmtAmt))}</span>
                <span id="mm-sum-diff" class="text-xs">—</span>
              </div>
            </div>
            
            <div style="padding:10px;background:var(--surface2);border-radius:8px;margin-top:8px">
              <div class="text-xs font-semi" style="margin-bottom:6px">✏️ หรือกรอกเลขบิลเอง (กรณีบิลยังไม่อยู่ในระบบ)</div>
              <div class="flex gap-2">
                <input class="input" id="mm-manual-bill" placeholder="เลขบิล เช่น SS00126-001234" style="flex:1">
                <input class="input" id="mm-manual-station" placeholder="Station" style="width:100px">
              </div>
            </div>
            
            <div class="input-group">
              <label>หมายเหตุ (ทำไมถึง match ด้วยตัวเอง)</label>
              <input class="input" id="mm-reason" placeholder="เช่น ลูกค้าโอนผิดยอด, รวมยอด 2 บิล">
            </div>
            
            <div class="flex gap-2 mt-2">
              <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
              <button class="btn btn-primary btn-sm flex-1" id="mm-confirm" disabled>${ICONS.check} ยืนยัน Match</button>
            </div>
          </div>
        `);
        
        // ใช้ Set ของ bill reference (ไม่ใช่ index) — persist ได้ข้าม search/filter
        // เพราะ reference ของ bill object ยังเดิมเสมอ (อ้างอิง billList/cashflowCandidates/spCandidates)
        const selectedBills = new Set();
        let displayList = [];
        
        // Update sum bar + enable/disable confirm based on selection
        function updateSumBar() {
          const bar = document.getElementById('mm-sum-bar');
          const cnt = selectedBills.size;
          if (cnt === 0) {
            if (bar) bar.style.display = 'none';
            // ให้ confirm เปิดได้ถ้ากรอก manual bill

            // SC/JS/JR (ลดหนี้) → offset เป็นลบ
            const isSC = ['SC','JS','JR'].includes(String(b.bill_no||'').substring(0,2).toUpperCase());
            const val = mmBillMatchAmt(b);

          const isMatch = diff < 0.01;

          }

        function renderBillList(searchText) {
          let list;
          if (searchText) {
            const s = searchText.toLowerCase();
            // รวม 3 แหล่ง
            const fromBills = billList
              .filter(b => b.match_status !== 'matched' && b.match_status !== 'paid')
              .filter(b => (b.bill_no||'').toLowerCase().includes(s) ||
                           (b.remarks1||'').toLowerCase().includes(s) ||
                           String(b.amount).includes(s));
            const fromCashflow = cashflowCandidates.filter(c =>
              (c.bill_no||'').toLowerCase().includes(s) ||
              (c.remarks1||'').toLowerCase().includes(s) ||
              String(c.amount).includes(s));
            const fromSp = spCandidates.filter(sp =>
              (sp.bill_no||'').toLowerCase().includes(s) ||
              (sp.remarks1||'').toLowerCase().includes(s) ||
              String(Math.abs(sp.amount)).includes(s) ||
              (sp._supplierPayment?.cheque_no||'').toLowerCase().includes(s) ||
              (sp._supplierPayment?.pp_no||'').toLowerCase().includes(s));
            list = [...fromBills, ...fromCashflow, ...fromSp];
          } else {
            list = candidates.slice(0, 30);
          }
          
          displayList = list;
          const bc = document.getElementById('mm-bill-list');
          if (!bc) return;
          
          bc.innerHTML = list.length ? list.map((b, i) => {
            const matchAmt = mmBillMatchAmt(b);
            const amtDiff = Math.abs(matchAmt - Math.abs(stmtAmt));
            const isExact = amtDiff < 0.01;
            // ถ้าบิลมี fee → แสดงทั้งสุทธิและ baht เพื่อเห็นภาพ
            const hasFee = !b._cashflow && !b._supplierPayment && 
                           matchAmt !== Math.abs(Number(b.amount) || 0);

              ? (b._supplierPayment.payment_method === 'เช็ค'

              : b._cashflow 
                ? `<span class="badge" style="background:var(--info-bg);color:var(--info);font-size:.65rem">💰 CF</span>`
                : `<span class="badge badge-muted" style="font-size:.65rem">📄 Bill</span>`;
            return `
              <div class="mm-item" data-di="${i}" style="padding:10px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px">

                  <div style="font-weight:700;color:${isExact?'var(--success)':'var(--warn)'}">฿${fmtNum(matchAmt)}</div>

                  ${isExact?'<div class="text-xs" style="color:var(--success)">✓ ตรงเป๊ะ</div>':`<div class="text-xs text-muted">ต่าง ${fmtNum(amtDiff)}</div>`}
                </div>
              </div>

        renderBillList('');

        // ── Enable confirm เมื่อกรอกเลขบิลเอง (เฉพาะกรณีไม่มี bill ที่เลือก) ──
        document.getElementById('mm-manual-bill')?.addEventListener('input', (e) => {

          if (selectedBills.size > 0) {

          stmt.match_reason = reason || (manualBill ? 'กรอกเลขบิลเอง' : (matchedBills.length > 1 ? `รวม ${matchedBills.length} บิล` : ''));

    // ── Unmatch: ยกเลิก match ──

    document.getElementById('btn-unmatch-all')?.addEventListener('click', async () => {

                  `✗ ไม่แตะ Type, Station, Amount, Bank (manual input)\n\n` +

    document.getElementById('btn-auto-match')?.addEventListener('click', async () => {

        if (dateFrom > dateTo) { toast('วันเริ่มต้นต้องน้อยกว่าวันสุดท้าย', 'warn'); return; }
