        if (dates.length === 0) { toast('เลือกช่วงวันที่ไม่ถูกต้อง', 'warn'); return; }
        if (!confirm(`Lock ${dates.length} วัน ตั้งแต่ ${fmtDate($from.value)} → ${fmtDate($to.value)}?\n\nวันเหล่านี้จะแก้ไขไม่ได้`)) return;
        if (!mainSummary.__lockedDates) mainSummary.__lockedDates = {};
        let added = 0;
        dates.forEach(d => {
          if (!mainSummary.__lockedDates[d]) { mainSummary.__lockedDates[d] = true; added++; }
        });
        persistMainState();
        if (window.syncManager?.markDirty) syncManager.markDirty('meta');
        closeModal();
        toast(`🔒 Lock เพิ่ม ${added} วัน (รวมทั้งหมด ${Object.keys(mainSummary.__lockedDates).length} วัน)`, 'success', 4000);
        render();
      });
      
      document.getElementById('bl-unlock')?.addEventListener('click', () => {
        const dates = _datesBetween($from.value, $to.value);
        if (dates.length === 0) { toast('เลือกช่วงวันที่ไม่ถูกต้อง', 'warn'); return; }
        const willUnlock = dates.filter(d => isDateLocked(d)).length;
        if (willUnlock === 0) { toast('ไม่มีวันที่ lock ในช่วงนี้', 'info'); return; }
        if (!confirm(`Unlock ${willUnlock} วัน ในช่วง ${fmtDate($from.value)} → ${fmtDate($to.value)}?`)) return;
        let removed = 0;
        dates.forEach(d => {
          if (mainSummary.__lockedDates?.[d]) { delete mainSummary.__lockedDates[d]; removed++; }
        });
        persistMainState();
        if (window.syncManager?.markDirty) syncManager.markDirty('meta');
        closeModal();
        toast(`🔓 Unlock ${removed} วัน — แก้ไขได้แล้ว`, 'info', 4000);
        render();
      });
    });
    
    // ── Unmatch บิล + statement ทั้งหมดในวันที่เลือก ──
    document.getElementById('btn-unmatch-day')?.addEventListener('click', async () => {
      if (blockIfLocked(selectedDate, 'Unmatch')) return;
      const dayBills = getBillsForSelectedDate();
      
      // นับเฉพาะที่ matched (ไม่นับ Cash/void/paid)
      const billsToUnmatch = dayBills.filter(b => 
        b.match_status === 'matched' && b.type !== 'Cash'
      );
      
      // หา stmt ที่ผูกอยู่กับบิลของวันนี้
      const stmtRefsOfDay = new Set();
      billsToUnmatch.forEach(b => {
        if (b.matched_stmt_ref) stmtRefsOfDay.add(b.matched_stmt_ref);
      });
      
      // หา stmt ของวันนี้ที่ matched (ครอบคลุมกรณีที่ stmt match กับบิลวันอื่น)
      const dayISO = toISODate(selectedDate);
      const allStmts = getAllStatements();
      const stmtsToUnmatch = allStmts.filter(s => {
        if (s.match_status !== 'matched') return false;
        const sDate = toISODate(s.date || s.trans_date);
        if (sDate === dayISO) return true; // stmt ของวันนี้
        if (stmtRefsOfDay.has(s.ref_no)) return true; // stmt ที่บิลวันนี้ผูกอยู่
        return false;
      });
      
      if (billsToUnmatch.length === 0 && stmtsToUnmatch.length === 0) {
        toast('ไม่มีรายการที่ match อยู่ในวันนี้', 'info');
        return;
      }
      
      const dateStr = fmtDate(dayISO);
      if (!confirm(
        `Unmatch ทั้งหมดของวันที่ ${dateStr}?\n\n` +
        `• บิลที่จะ unmatch: ${billsToUnmatch.length} รายการ\n` +
        `• Statement ที่จะ unmatch: ${stmtsToUnmatch.length} รายการ\n\n` +
        `จะเปลี่ยน match_status → pending\n` +
        `ล้าง confirmation, pay_date, matched_stmt_ref\n` +
        `ไม่ลบข้อมูลบิล/statement\n` +
        `ไม่แตะบิล Cash (auto-matched)`
      )) return;
      
      // Unmatch bills
      let billCount = 0;
      billsToUnmatch.forEach(b => {
        b.match_status = 'pending';
        delete b.confirmation;
        delete b.pay_date;
        delete b.matched_stmt_ref;
        delete b.matched_at;
        billCount++;
      });
      
      // Unmatch statements
      let stmtCount = 0;
      stmtsToUnmatch.forEach(s => {
        // ⚡ ถ้า stmt ผูกกับ SP-TEMP partial → clear stmt_ref ใน spTempList ด้วย
        const stmtRef = s.ref_no;
        if (stmtRef) {
          spTempList.forEach(t => {
            let touched = false;
            (t.partials || []).forEach(pr => {
              if (pr.stmt_ref === stmtRef) {
                delete pr.stmt_ref;
                touched = true;
              }
            });
            if (touched) {
              t.updated_at = new Date().toISOString();
              recomputeSpTempStatus(t);
              markDirtySpTemps();
            }
          });
        }
        s.match_status = 'unmatched';
        delete s.match_station;
        delete s.match_bill;
        delete s.matched_bills;
        delete s.matched_at;
        delete s.matched_by;
        delete s.match_method;
        delete s.match_reason;
        delete s.overpay_amount;
        stmtCount++;
      });
      
      try { safeStorage.set('sf_statementsByBank', JSON.stringify(statementsByBank)); } catch(_){}
      persistMainState();
      
      // Mark dirty
      if (window.syncManager?.markDirty) {
        if (billCount > 0) window.syncManager.markDirty('bills');
        if (stmtCount > 0) window.syncManager.markDirty('stmts');
      }
      
      toast(`↩ Unmatch ${dateStr} — บิล ${billCount} · Stmt ${stmtCount}`, 'success', 5000);
      render();
    });

      // ── Fee calculation logic ──
      const $type = document.getElementById('ab-type');

      const $tf = document.getElementById('ab-transfer-fee');
      const $cf = document.getElementById('ab-card-fee');
      const $feeBox = document.getElementById('ab-fee-box');
      const $feeTransfer = document.getElementById('ab-fee-transfer');
      const $feeExtra = document.getElementById('ab-fee-extra');
      const $cardLabel = document.getElementById('ab-card-label');
      const $summary = document.getElementById('ab-summary');
      const $sumCfLabel = document.getElementById('ab-sum-cf-label');
      
      // Track ว่า user แก้ WHT เองหรือยัง (ถ้าแก้แล้ว = ห้าม auto-overwrite)

      function feeApplies() {
        // แสดงช่อง fee เมื่อ Type = Transfer, Cheque, หรือ Card
        const type = $type.value || '';
        return type === 'Transfer' || type === 'Cheque' || type === 'Card';
      }
      
      // สูตรตาม Excel: C = ROUND((B/1.07) * 1%, 2)
      function calcWHT(amount) {
        if (!amount || amount <= 0) return 0;
        return Math.round((amount / 1.07) * 0.01 * 100) / 100;
      }
      function calcBase(amount) {
        if (!amount || amount <= 0) return 0;
        return Math.round((amount / 1.07) * 100) / 100;
      }
      
      function updateFeeUI() {
        const type = $type.value || '';
        const applies = feeApplies();
        const $whtToggleLabel = document.getElementById('ab-wht-toggle-label');
        const $whtGroup = document.getElementById('ab-wht-group');
        const $whtEnable = document.getElementById('ab-wht-enable');
        
        if (!applies) {
          $feeBox.style.display = 'none';
          return;
        }
        $feeBox.style.display = 'block';
        
        // แสดงแถวตาม Type:
        //   Transfer: ฐาน + (WHT ถ้าเปิด) + ค่าโอน
        //   Cheque:   ฐาน + (WHT ถ้าเปิด) + ค่าโอน + extra (label: ค่าธรรมเนียม)
        //   Card:     extra (label: ค่าธรรมเนียมบัตร)
        if (type === 'Card') {
          $feeTransfer.style.display = 'none';
          $feeExtra.style.display = 'flex';
          $cardLabel.textContent = 'ค่าธรรมเนียมบัตร';
          $sumCfLabel.textContent = '− ค่าธรรมเนียมบัตร';
          // Card ไม่มี WHT
          if ($whtToggleLabel) $whtToggleLabel.style.display = 'none';
          if ($whtGroup) $whtGroup.style.display = 'none';
        } else if (type === 'Cheque') {
          $feeTransfer.style.display = 'flex';
          $feeExtra.style.display = 'flex';
          $cardLabel.textContent = 'ค่าธรรมเนียม';
          $sumCfLabel.textContent = '− ค่าธรรมเนียม';
          // แสดง toggle WHT
          if ($whtToggleLabel) $whtToggleLabel.style.display = 'inline-flex';
          if ($whtGroup) $whtGroup.style.display = $whtEnable?.checked ? 'block' : 'none';
        } else if (type === 'Transfer') {
          $feeTransfer.style.display = 'flex';
          $feeExtra.style.display = 'none';
          // แสดง toggle WHT
          if ($whtToggleLabel) $whtToggleLabel.style.display = 'inline-flex';
          if ($whtGroup) $whtGroup.style.display = $whtEnable?.checked ? 'block' : 'none';
        }
        updateSummary();
      }
      
      function updateSummary() {
        const amount = Number($amount.value) || 0;
        const type = $type.value || '';
        const applies = feeApplies();
        const $whtEnable = document.getElementById('ab-wht-enable');
        const whtOn = $whtEnable?.checked || false;
        
        let wht = 0, tf = 0, cf = 0;
        
        if (applies && (type === 'Transfer' || type === 'Cheque')) {
          $base.value = calcBase(amount).toFixed(2);
          // ⭐ Auto-fill WHT เฉพาะเมื่อ checkbox เปิด — เว้นแต่ user แก้เอง
          if (whtOn) {
            if (!whtManuallyEdited) {
              $whtOut.value = calcWHT(amount).toFixed(2);
            }
            wht = Number($whtOut.value) || 0;
          } else {
            // ปิด WHT — เคลียร์ค่า
            $whtOut.value = '';
            wht = 0;

          tf = Number($tf.value) || 0;
          if (type === 'Cheque') cf = Number($cf.value) || 0;

          $summary.style.display = 'none';

          whtAmount = Number($whtOut.value) || 0;
          transferFee = Number($tf.value) || 0;

          cardFee = Number($cf.value) || 0;

        const newBill = {
          bill_uuid: (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : 'b-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10),

          date: document.getElementById('ab-date').value,

          type: type,
          amount: amount,
          created_at: new Date().toISOString(),  // ใช้ sort บิลใหม่อยู่บนสุดของ station
          // Fee fields

          wht_amount: whtAmount,
          transfer_fee: transferFee,
          card_fee: cardFee,
          // Confirmation & status
          confirmation: confirmation,
          pay_date: confirmation ? document.getElementById('ab-date').value : '',
          remarks1: document.getElementById('ab-remarks').value,
          remarks2: '',
          bank: '', // ช่อง manual ปล่อยว่าง
          due_date: document.getElementById('ab-due').value,
          match_status: confirmation ? 'matched' : 'pending',
          source: 'manual',
        };
        billList.push(newBill);
        persistMainState();
        invalidateBillsCache();
        closeModal();
        const netNote = (whtAmount || transferFee || cardFee) 
          ? ` (สุทธิ ฿${(amount - whtAmount - transferFee - cardFee).toFixed(2)})` 
          : '';
        toast(`เพิ่มบิล฿${amount.toFixed(2)}${netNote}`, 'success');
        renderKeepScroll();
      });

          <p class="text-sm text-dim">จะแก้ไข ${visible.length} รายการ (ตาม filter ปัจจุบัน)</p>

            <label>ช่องที่ต้องการแก้</label>
            <select class="select" id="bulk-field">
              <option value="date">Bill Date</option>
              <option value="pay_date">Pay Date</option>
              <option value="due_date">Due Date</option>

          <div class="input-group">
            <label>วันที่</label>

            <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
            <button class="btn btn-primary btn-sm flex-1" id="bulk-confirm">${ICONS.check} ตั้งค่าทั้งหมด</button>
          </div>

      `);

      document.getElementById('bulk-confirm')?.addEventListener('click', () => {
        const field = document.getElementById('bulk-field').value;
        const value = document.getElementById('bulk-value').value;
        if (!value) { toast('กรอกวันที่', 'error'); return; }
        let count = 0;
        billList.forEach(b => {
          if ((filterStation === 'ALL' || b.station === filterStation) && (filterType === 'ALL' || b.type === filterType)) {
            b[field] = value;

          }

    // ── Auto Due Date (วันที่ 20 เดือนถัดไปของ bill_date) ──
    document.getElementById('btn-auto-duedate')?.addEventListener('click', () => {
      let count = 0, skippedLocked = 0;
      billList.forEach(b => {
        // เฉพาะบิลเครดิต (Invoice Credit / Order Credit) ที่ยังไม่มี Due Date
        if ((b.station === 'Invoice Credit' || b.station === 'Order Credit') && !b.due_date && b.date) {
          // 🔒 Lock guard: ข้าม bills ในวัน lock
          if (isDateLocked(toISODate(b.date))) { skippedLocked++; return; }
          const next = calcNextMonth20(b.date);
          if (next) {
            b.due_date = next;
            count++;
          }
        }
      });
      persistMainState();
      const lockMsg = skippedLocked > 0 ? ` (ข้าม ${skippedLocked} ในวัน lock)` : '';
      toast(`ตั้ง Due Date อัตโนมัติ ${count} รายการ (วันที่ 20 ของเดือนถัดไป)${lockMsg}`, 'success');

    // ── Check issues button (เปิด modal validation) ──
    document.getElementById('btn-check-issues')?.addEventListener('click', () => {
      const v = validateAll();
      if (v.errors.length === 0 && v.warnings.length === 0) {
        toast('✓ ไม่พบปัญหาใดๆ ข้อมูลสมบูรณ์', 'success');

        showValidationModal(v, null);
      }

    document.getElementById('val-status-bar')?.addEventListener('click', () => {
      document.getElementById('btn-check-issues')?.click();
    });
    
    document.getElementById('btn-save-main')?.addEventListener('click', async () => {
      // ── Pre-save validation ──
      const v = validateAll();
      
      if (v.errors.length > 0) {
        // มี error → แสดง modal แต่ให้ user force-save ได้ถ้ายืนยัน
        showValidationModal(v, async () => {
          await actuallySaveMain();
        });
        return;
      }
      
      if (v.warnings.length > 0) {
        // มีคำเตือน → ถามก่อน
        showValidationModal(v, async () => {
          await actuallySaveMain();
        });
        return;
      }
      
      // ไม่มีปัญหา → save เลย
      await actuallySaveMain();
    });
    
    async function actuallySaveMain() {
      // ⭐ NEW: ใช้ syncManager push (UUID-based upsert) แทน legacy save API
      // เดิม: saveDailySales + saveDailyMeta + saveStatements = append only = sheet บวม
      // ตอนนี้: markDirty → push ผ่าน upsertBills + upsertMeta + upsertStatements
      
      // Flush pending localStorage writes ก่อน save
      if (typeof flushPersistState === 'function') flushPersistState();
      
      const bills = Array.isArray(billList) ? billList : [];
      if (bills.length === 0) {
        toast('ไม่มีบิลให้บันทึก', 'warn');
        return;
      }
      
      // Ensure every bill has bill_uuid (สำคัญ: ถ้าไม่มี backend จะ skip ลูกเลย)
      let assigned = 0;
      bills.forEach(b => {
        if (!b.bill_uuid) {
          b.bill_uuid = (typeof crypto !== 'undefined' && crypto.randomUUID) 
            ? crypto.randomUUID() 
            : 'b-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
          assigned++;
        }
      });
      if (assigned > 0) console.log(`[save] Auto-assigned ${assigned} bill_uuids`);
      
      // Ensure every stmt has stmt_uuid
      let stmtAssigned = 0;
      Object.values(statementsByBank).forEach(arr => {
        (arr || []).forEach(s => {
          if (!s.stmt_uuid) {
            s.stmt_uuid = (typeof crypto !== 'undefined' && crypto.randomUUID) 
              ? crypto.randomUUID() 
              : 's-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
            stmtAssigned++;
          }
        });
      });
      if (stmtAssigned > 0) console.log(`[save] Auto-assigned ${stmtAssigned} stmt_uuids`);
      
      // Persist เพื่อเก็บ uuid ใหม่
      persistMainState();
      
      // Mark everything dirty + force flush (push ทันที ไม่รอ debounce 5s)
      try {
        syncManager.markDirty('bills');
        syncManager.markDirty('stmts');
        syncManager.markDirty('meta');
        syncManager.markDirty('payments');
        syncManager.markDirty('cashflow');
        syncManager.markDirty('suppliers');
        syncManager.markDirty('sp_temps');
        
        toast('กำลังบันทึก...', 'info');
        const result = await syncManager._flushPush();
        
        const stats = result || {};
        const pushed = stats.pushed || 0;
        const errors = stats.errors || 0;
        
        if (errors > 0) {
          toast(`⚠️ บันทึก ${pushed} ประเภท แต่มี error ${errors} (ดู console)`, 'warn', 6000);
        } else {
          toast(`✅ บันทึกสำเร็จ — ${bills.length} บิล + ${Object.values(statementsByBank).reduce((s,a)=>s+(a?.length||0),0)} statements`, 'success', 4000);
        }
      } catch (err) {
        console.error('Save error:', err);
        toast('บันทึกล้มเหลว: ' + err.message, 'error', 6000);
      }
    }
    // ── Helper: เปลี่ยนวันที่ + reload summary + render ──
    // ใช้ทั้งจาก date input change และปุ่ม ◀ ▶
    function _changeDateTo(newISO) {
      if (!newISO || newISO === selectedDate) return;
      selectedDate = newISO;
      window.__mainSelectedDate = newISO;  // persist สำหรับกรณี re-navigate เข้าหน้า main
      invalidateBillsCache();
      
      // Clear flat summary keys (ค่าจากวันก่อนจะค้างถ้าไม่ล้าง)
      Object.keys(mainSummary).forEach(k => {
        if (k === '__byDate') return;
        if (k.includes('_')) delete mainSummary[k];
      });
      
      // Load summary for this date if available
      if (mainSummary.__byDate && mainSummary.__byDate[selectedDate]) {
        const LABEL_MAP = {
          'นำเงินเข้า': 'cashIn', 'ยอดขาย': 'sales', 'นำเงินออก': 'cashOut',
          'ยอดคืนสินค้า': 'returns', 'Cash Drawer': 'cashDrawer',
          'Transfer': 'transfer', 'Card': 'card', 'Cheque': 'cheque', 'Refund': 'refund',
        };
        const sum = mainSummary.__byDate[selectedDate];
        Object.entries(sum).forEach(([thLabel, stations]) => {
          const prefix = LABEL_MAP[thLabel];
          if (!prefix) return;
          ['Front1', 'Front2', 'Front3', 'Front4', 'Invoice', 'Order', 'Payment', 'Invoice Credit', 'Order Credit'].forEach(st => {
            const val = stations[st];
            if (val != null && val !== 0) mainSummary[prefix + '_' + st] = val;
          });
        });
      }
      render();
    }
    
    // Shift selectedDate by ±N days
    function _shiftDate(days) {
      const d = new Date(selectedDate + 'T00:00:00');
      if (isNaN(d)) return;
      d.setDate(d.getDate() + days);
      const iso = d.getFullYear() + '-'
                + String(d.getMonth()+1).padStart(2,'0') + '-'
                + String(d.getDate()).padStart(2,'0');
      _changeDateTo(iso);
    }
    
    document.getElementById('main-date-prev')?.addEventListener('click', () => _shiftDate(-1));
    document.getElementById('main-date-next')?.addEventListener('click', () => _shiftDate(+1));
    
    // ═══════════════════════════════════════════════════════════════════════
    // ⭐ iPhone-style date picker popup with data dots
    // ═══════════════════════════════════════════════════════════════════════
    let _popupMonth = null;  // ISO year-month of the currently-displayed calendar page
    
    function _getDatesWithData() {
      // Build Set of ISO dates ที่ user บันทึกเสร็จแล้ว
      // ⭐ "มีข้อมูล" = มี meta summary บันทึกไว้แล้ว **หรือ** มีบิล/stmt ของวันนั้น
      //    Bug ที่เคยเจอ: user import bills 27/03 ครบ 147 ใบ แต่ยังไม่กรอก meta summary
      //                  → Calendar dot ไม่ขึ้น → user เห็นปฏิทินว่าง → คิดว่า "ข้อมูลไม่มา"
      //    Fix: นับวันที่มี bills/stmts ด้วย — meaningful enough
      const cacheKey = `${Object.keys(mainSummary?.__byDate || {}).length}|${billList.length}|${(typeof _stateVersion !== 'undefined' ? _stateVersion : 0)}`;
      if (!window._datesWithDataCache || window._datesWithDataCacheKey !== cacheKey) {
        const dates = new Set();
        
        // 1. Meta: ต้องมี label ที่ meaningful + value > 0
        // ไม่นับ cashIn ซึ่งมักเป็น default 5155 ทุกวัน
        const MEANINGFUL_LABELS = ['ยอดขาย', 'Cash Drawer', 'Transfer', 'Card', 'Cheque', 'นำเงินออก', 'ยอดคืนสินค้า'];
        if (mainSummary.__byDate) {
          Object.keys(mainSummary.__byDate).forEach(d => {
            const v = mainSummary.__byDate[d];
            if (!v || typeof v !== 'object') return;
            for (const label of MEANINGFUL_LABELS) {
              const stations = v[label];
              if (!stations || typeof stations !== 'object') continue;
              const hasReal = Object.values(stations).some(val => {
                const n = Number(val);
                return !isNaN(n) && Math.abs(n) > 0;
              });
              if (hasReal) { dates.add(d); return; }
            }
          });
        }
        
        // 2. ⭐ Bills: ถ้ามีบิลของวันใด → ถือว่ามีข้อมูล (แม้ summary ยังไม่กรอก)
        billList.forEach(b => {
          const iso = toISODate(b.date);
          if (iso) dates.add(iso);
        });
        
        window._datesWithDataCache = dates;
        window._datesWithDataCacheKey = cacheKey;
      }
      return window._datesWithDataCache;
    }
    
    function _renderDatePopup() {
      const popup = document.getElementById('main-date-popup');
      if (!popup) return;
      
      // Default: show month of selectedDate
      if (!_popupMonth) {
        const [y, m] = selectedDate.split('-');
        _popupMonth = `${y}-${m}`;
      }
      
      const [py, pm] = _popupMonth.split('-').map(Number);
      const datesSet = _getDatesWithData();
      const todayIso = todayISO();
      
      // Month grid — จันทร์ first (Thai convention, Mon=0..Sun=6)
      const firstDay = new Date(py, pm - 1, 1);
      const lastDay = new Date(py, pm, 0);
      // JS getDay: 0=Sun..6=Sat → shift: Mon=0, Tue=1, ..., Sun=6
      const jsDow = firstDay.getDay();
      const startOffset = (jsDow + 6) % 7;  // Sun→6, Mon→0, Tue→1...
      const totalDays = lastDay.getDate();
      
      const thMonths = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
      const dowNames = ['จ','อ','พ','พฤ','ศ','ส','อา'];
      
      let cellsHtml = '';
      // Empty cells before day 1
      for (let i = 0; i < startOffset; i++) {
        cellsHtml += `<div></div>`;
      }
      // Day cells
      for (let day = 1; day <= totalDays; day++) {
        const iso = `${py}-${String(pm).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const isSelected = iso === selectedDate;
        const isToday = iso === todayIso;
        const hasData = datesSet.has(iso);
        const dow = new Date(py, pm - 1, day).getDay();
        const isSunday = dow === 0;
        
        let bg = 'transparent';
        let color = 'var(--text)';
        let fontWeight = '500';
        
        if (isSelected) {
          bg = 'var(--primary)';
          color = '#fff';
          fontWeight = '700';
        } else if (isSunday && !hasData) {
          color = 'var(--text3)';  // วันอาทิตย์ไม่มีข้อมูล = เทา
        } else if (!hasData) {
          color = 'var(--text2)';
        }
        
        const dotColor = isSelected ? '#fff' : (hasData ? 'var(--success)' : 'transparent');
        const todayRing = isToday && !isSelected ? 'box-shadow:inset 0 0 0 1.5px var(--primary);' : '';
        
        cellsHtml += `<button class="dp-day" data-iso="${iso}" style="
          aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
          gap:2px;background:${bg};color:${color};border:none;border-radius:50%;cursor:pointer;
          font-size:.9rem;font-weight:${fontWeight};font-variant-numeric:tabular-nums;${todayRing}
          transition:background .12s">
          <span>${day}</span>
          <span style="width:4px;height:4px;border-radius:50%;background:${dotColor}"></span>
        </button>`;
      }
      
      popup.innerHTML = `
        <div id="dp-backdrop" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9998"></div>
        <div style="position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);
                    background:#141721;border:1px solid var(--border);border-radius:14px;
                    padding:14px;width:320px;z-index:9999;
                    box-shadow:0 12px 32px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.05)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <div style="color:var(--info);font-size:1rem;font-weight:600">
              ${thMonths[pm - 1]} ${py}
            </div>
            <div style="display:flex;gap:14px">
              <button id="dp-prev" style="background:none;border:none;color:var(--info);font-size:1.3rem;cursor:pointer;padding:0 4px;line-height:1">‹</button>
              <button id="dp-today" style="background:none;border:none;color:var(--info);font-size:.8rem;cursor:pointer;padding:0 6px;font-weight:600">วันนี้</button>
              <button id="dp-next" style="background:none;border:none;color:var(--info);font-size:1.3rem;cursor:pointer;padding:0 4px;line-height:1">›</button>
            </div>
          </div>
          
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px">
            ${dowNames.map(n => `<div style="font-size:.72rem;color:var(--text3);text-align:center;padding:4px 0">${n}</div>`).join('')}
          </div>
          
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">
            ${cellsHtml}
          </div>
          
          <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);
                      display:flex;justify-content:space-between;align-items:center;font-size:.7rem;color:var(--text3)">
            <span style="display:flex;align-items:center;gap:4px">
              <span style="width:5px;height:5px;border-radius:50%;background:var(--success)"></span>
              มีข้อมูล
            </span>
            <button id="dp-close" style="background:none;border:none;color:var(--info);font-size:.8rem;cursor:pointer;font-weight:600">ปิด</button>
          </div>
        </div>
      `;
      popup.style.display = 'block';
      
      // Wire up popup handlers
      popup.querySelectorAll('.dp-day').forEach(btn => {
        btn.addEventListener('click', () => {
          const iso = btn.dataset.iso;
          _hideDatePopup();
          _changeDateTo(iso);
        });
        // Hover effect
        btn.addEventListener('mouseenter', () => {
          if (btn.dataset.iso !== selectedDate) btn.style.background = 'var(--surface2)';
        });
        btn.addEventListener('mouseleave', () => {
          if (btn.dataset.iso !== selectedDate) btn.style.background = 'transparent';
        });
      });
      document.getElementById('dp-prev')?.addEventListener('click', () => {
        const nm = pm === 1 ? 12 : pm - 1;
        const ny = pm === 1 ? py - 1 : py;
        _popupMonth = `${ny}-${String(nm).padStart(2,'0')}`;
        _renderDatePopup();
      });
      document.getElementById('dp-next')?.addEventListener('click', () => {
        const nm = pm === 12 ? 1 : pm + 1;
        const ny = pm === 12 ? py + 1 : py;
        _popupMonth = `${ny}-${String(nm).padStart(2,'0')}`;
        _renderDatePopup();
      });
      document.getElementById('dp-today')?.addEventListener('click', () => {
        const t = todayISO();
        _hideDatePopup();
        _changeDateTo(t);
      });
      document.getElementById('dp-close')?.addEventListener('click', _hideDatePopup);
      document.getElementById('dp-backdrop')?.addEventListener('click', _hideDatePopup);
    }
    
    function _hideDatePopup() {
      const popup = document.getElementById('main-date-popup');
      if (popup) {
        popup.style.display = 'none';
        popup.innerHTML = '';
      }
      _popupMonth = null;
    }
    
    document.getElementById('main-date-btn')?.addEventListener('click', (e) => {
      e.stopPropagation();
      const popup = document.getElementById('main-date-popup');
      if (popup && popup.style.display === 'block') {
        _hideDatePopup();
      } else {
        // Reset to month of selectedDate when opening
        const [y, m] = selectedDate.split('-');
        _popupMonth = `${y}-${m}`;
        _renderDatePopup();
      }
    });

    el.querySelectorAll('.pill[data-ft]').forEach(btn => {

        render();

    el.querySelectorAll('.btn-edit-bill').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = Number(btn.dataset.idx);
        const b = billList[idx];
        if (!b) return;
        if (blockIfLocked(toISODate(b.date), 'แก้ไขบิล')) return;
        
        openModal(`✏️ แก้ไขบิล — ${b.bill_no || '(ไม่มีเลข)'}`, `

              <div class="input-group flex-1">

                <input class="input" id="eb-bill" value="${b.bill_no || ''}">

            <div class="flex gap-2">
              <div class="input-group flex-1">

                  ${STATION_OPTIONS.map(o=>`<option value="${o}" ${b.station===o?'selected':''}>${o||'(ว่าง)'}</option>`).join('')}
                </select>
              </div>
              <div class="input-group flex-1">

            <!-- Fee section: เหมือน Add Bill — Transfer/Cheque → WHT+ค่าโอน, Card → ค่าธรรมเนียมบัตร -->

              <div style="font-size:.85rem;color:var(--info);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
                <span>⚡ การหัก / ค่าธรรมเนียม</span>
                <label id="eb-wht-toggle-label" style="display:none;align-items:center;gap:6px;cursor:pointer;font-weight:400;color:var(--purple);background:rgba(167,139,250,.1);padding:3px 10px;border-radius:4px;border:1px solid rgba(167,139,250,.3)">
                  <input type="checkbox" id="eb-wht-enable" ${(Number(b.wht_amount)||0) > 0 ? 'checked' : ''} style="margin:0">
                  <span>หัก ณ ที่จ่าย 1%</span>
                </label>
              </div>
              <div class="flex gap-2" id="eb-fee-transfer" style="display:none">
                <div class="input-group flex-1">
                  <label>ฐานก่อน VAT</label>
                  <input type="number" class="input" id="eb-base" readonly style="background:rgba(255,255,255,.02)">
                </div>
                <div class="input-group flex-1" id="eb-wht-group" style="display:none">
                  <label style="color:var(--purple)">หัก ณ ที่จ่าย 1%</label>
                  <input type="number" class="input" id="eb-wht" value="${Number(b.wht_amount)||0}" step="0.01" style="color:var(--purple)" title="auto-calc = ROUND(ยอด/1.07 × 1%, 2)">
                </div>
                <div class="input-group flex-1">
                  <label style="color:var(--warn)">ค่าโอน / ค่าธรรมเนียม</label>
                  <input type="number" class="input" id="eb-transfer-fee" value="${Number(b.transfer_fee)||''}" placeholder="0.00" step="0.01" style="color:var(--warn)">
                </div>
              </div>
              <div class="flex gap-2" id="eb-fee-card" style="display:none">
                <div class="input-group flex-1">
                  <label style="color:var(--warn)">ค่าธรรมเนียมบัตร</label>
                  <input type="number" class="input" id="eb-card-fee" value="${Number(b.card_fee)||0}" step="0.01" style="color:var(--warn)">
                </div>
              </div>
              <div id="eb-summary" style="margin-top:10px;padding:10px;background:rgba(0,0,0,.2);border-radius:5px;font-size:.9rem">
                <div style="display:flex;justify-content:space-between;padding:3px 0"><span>ยอดเต็ม</span><span id="eb-sum-full">฿0.00</span></div>
                <div id="eb-sum-wht-row" style="display:none;justify-content:space-between;padding:3px 0;color:var(--purple)"><span>− หัก ณ ที่จ่าย 1%</span><span id="eb-sum-wht">฿0.00</span></div>
                <div id="eb-sum-tf-row" style="display:none;justify-content:space-between;padding:3px 0;color:var(--warn)"><span>− ค่าโอน / ค่าธรรมเนียม</span><span id="eb-sum-tf">฿0.00</span></div>
                <div id="eb-sum-cf-row" style="display:none;justify-content:space-between;padding:3px 0;color:var(--warn)"><span>− ค่าธรรมเนียมบัตร</span><span id="eb-sum-cf">฿0.00</span></div>
                <div style="display:flex;justify-content:space-between;padding:8px 0 0;border-top:1px solid var(--border);margin-top:4px;font-weight:600;color:var(--success);font-size:1.05rem"><span>สุทธิ (ยอดโอนจริงที่คาดหวัง)</span><span id="eb-sum-net">฿0.00</span></div>
              </div>
            </div>
            
            <div class="flex gap-2">
              <div class="input-group flex-1">
                <label>Confirmation (ธนาคาร/Cash)</label>
                <input class="input" id="eb-confirmation" value="${b.confirmation||''}" placeholder="KTB / KBANK / BBL / BBL NW / Cash">
              </div>
              <div class="input-group flex-1">
                <label>Pay Date</label>
                <input type="date" class="input" id="eb-pay-date" value="${toISODate(b.pay_date)}">
              </div>
            </div>
            <div class="flex gap-2">
              <div class="input-group flex-1">
                <label>Bank (user manual)</label>
                <input class="input" id="eb-bank" value="${b.bank||''}">
              </div>
              <div class="input-group flex-1">
                <label>Due Date</label>
                <input type="date" class="input" id="eb-due-date" value="${toISODate(b.due_date)}">
              </div>
            </div>
            <div class="input-group">
              <label>Remarks 1</label>
              <input class="input" id="eb-remarks1" value="${b.remarks1||''}">
            </div>
            <div class="input-group">
              <label>Remarks 2</label>
              <input class="input" id="eb-remarks2" value="${b.remarks2||''}">
            </div>
            <div class="input-group">
              <label>Match Status</label>
              <select class="select" id="eb-status">
                ${['pending','matched','paid','void','awaiting_clear','bounced'].map(s=>`<option value="${s}" ${b.match_status===s?'selected':''}>${s}</option>`).join('')}
              </select>
            </div>
            <div class="flex gap-2 mt-3">
              <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
              <button class="btn btn-sm" id="eb-delete" style="background:var(--danger);color:#fff;padding:6px 14px">🗑 ลบ</button>
              <button class="btn btn-primary btn-sm flex-1" id="eb-save">✓ บันทึก</button>
            </div>
          </div>
        `);
        
        // ── Fee UI: show/hide + live net + auto-WHT on amount change ──
        // เหมือน Add Bill: Transfer/Cheque → WHT+ค่าโอน, Card → ค่าธรรมเนียมบัตร
        const $ebType = document.getElementById('eb-type');
        const $ebAmount = document.getElementById('eb-amount');
        const $ebBase = document.getElementById('eb-base');
        const $ebWht = document.getElementById('eb-wht');
        const $ebTf = document.getElementById('eb-transfer-fee');
        const $ebCf = document.getElementById('eb-card-fee');
        const $ebFeeBox = document.getElementById('eb-fee-box');
        const $ebFeeTransfer = document.getElementById('eb-fee-transfer');
        const $ebFeeCard = document.getElementById('eb-fee-card');
        const $ebSummary = document.getElementById('eb-summary');
        
        // Track ว่า user แก้ WHT เองหรือยัง (ถ้าแก้แล้ว → ไม่ overwrite อัตโนมัติ)
        let ebWhtManuallyEdited = false;
        $ebWht?.addEventListener('input', () => { ebWhtManuallyEdited = true; });
        
        function ebCalcWHT(amount) {
          if (!amount || amount <= 0) return 0;
          return Math.round((amount / 1.07) * 0.01 * 100) / 100;
        }
        function ebCalcBase(amount) {
          if (!amount || amount <= 0) return 0;
          return Math.round((amount / 1.07) * 100) / 100;
        }
        function ebFeeApplies() {
          const t = $ebType.value || '';
          return t === 'Transfer' || t === 'Cheque' || t === 'Card';
        }
        
        function ebUpdateFeeUI() {
          const t = $ebType.value || '';
          const applies = ebFeeApplies();
          const $ebWhtToggleLabel = document.getElementById('eb-wht-toggle-label');
          const $ebWhtGroup = document.getElementById('eb-wht-group');
          const $ebWhtEnable = document.getElementById('eb-wht-enable');
          
          if (!applies) {
            $ebFeeBox.style.display = 'none';
            return;
          }
          $ebFeeBox.style.display = 'block';
          if (t === 'Card') {
            $ebFeeTransfer.style.display = 'none';
            $ebFeeCard.style.display = 'flex';
            // Card ไม่มี WHT
            if ($ebWhtToggleLabel) $ebWhtToggleLabel.style.display = 'none';
            if ($ebWhtGroup) $ebWhtGroup.style.display = 'none';
          } else {
            // Transfer หรือ Cheque
            $ebFeeTransfer.style.display = 'flex';
            $ebFeeCard.style.display = 'none';
            // แสดง toggle WHT
            if ($ebWhtToggleLabel) $ebWhtToggleLabel.style.display = 'inline-flex';
            if ($ebWhtGroup) $ebWhtGroup.style.display = $ebWhtEnable?.checked ? 'block' : 'none';
          }
          ebUpdateSummary();
        }
        
        function ebUpdateSummary() {
          const amount = Number($ebAmount.value) || 0;
          const t = $ebType.value || '';
          const applies = ebFeeApplies();
          const $ebWhtEnable = document.getElementById('eb-wht-enable');
          const whtOn = $ebWhtEnable?.checked || false;
          let wht = 0, tf = 0, cf = 0;
          
          if (applies && (t === 'Transfer' || t === 'Cheque')) {
            $ebBase.value = ebCalcBase(amount).toFixed(2);
            // ⭐ WHT: นับเฉพาะเมื่อ checkbox เปิด
            if (whtOn) {
              wht = Number($ebWht.value) || 0;
            } else {
              $ebWht.value = '';
              wht = 0;
            }
            tf = Number($ebTf.value) || 0;
          } else if (applies && t === 'Card') {
            cf = Number($ebCf.value) || 0;
          }
          
          const net = Math.round((amount - wht - tf - cf) * 100) / 100;
          
          if (applies) {
            document.getElementById('eb-sum-full').textContent = '฿' + amount.toFixed(2);
            document.getElementById('eb-sum-wht-row').style.display = wht > 0 ? 'flex' : 'none';
            document.getElementById('eb-sum-wht').textContent = '−฿' + wht.toFixed(2);
            document.getElementById('eb-sum-tf-row').style.display = tf > 0 ? 'flex' : 'none';
            document.getElementById('eb-sum-tf').textContent = '−฿' + tf.toFixed(2);
            document.getElementById('eb-sum-cf-row').style.display = cf > 0 ? 'flex' : 'none';
            document.getElementById('eb-sum-cf').textContent = '−฿' + cf.toFixed(2);
            document.getElementById('eb-sum-net').textContent = '฿' + net.toFixed(2);
          }
        }
        
        // เมื่อ amount เปลี่ยน + type=Transfer/Cheque + WHT toggle เปิด + ยังไม่ได้แก้ WHT เอง → auto-recalc
        function ebOnAmountChange() {
          const t = $ebType.value || '';
          const $ebWhtEnable = document.getElementById('eb-wht-enable');
          const whtOn = $ebWhtEnable?.checked || false;
          if ((t === 'Transfer' || t === 'Cheque') && whtOn && !ebWhtManuallyEdited) {
            $ebWht.value = ebCalcWHT(Number($ebAmount.value) || 0).toFixed(2);
          }
          ebUpdateSummary();
        }
        
        // เมื่อเปลี่ยน Type → reset flag
        $ebType?.addEventListener('change', () => {
          ebWhtManuallyEdited = false;
          ebUpdateFeeUI();
        });
        // ⭐ WHT toggle — เปิดแล้ว auto-fill (ถ้ายังว่างหรือยังไม่ได้แก้เอง)
        document.getElementById('eb-wht-enable')?.addEventListener('change', (e) => {
          ebWhtManuallyEdited = false;
          if (e.target.checked) {
            // เปิด → auto-fill
            $ebWht.value = ebCalcWHT(Number($ebAmount.value) || 0).toFixed(2);
          }
          ebUpdateFeeUI();
        });
        $ebAmount?.addEventListener('input', ebOnAmountChange);
        $ebTf?.addEventListener('input', ebUpdateSummary);
        $ebCf?.addEventListener('input', ebUpdateSummary);
        
        ebUpdateFeeUI(); // init
        
        // ⭐ Wire customer autocomplete ใน Remarks 1
        const $ebRemarks1 = document.getElementById('eb-remarks1');
        if ($ebRemarks1) wireRemarks1Autocomplete($ebRemarks1);
        
        document.getElementById('eb-save')?.addEventListener('click', () => {
          b.bill_no = document.getElementById('eb-bill').value.trim();
          b.date = document.getElementById('eb-date').value;
          b.station = document.getElementById('eb-station').value;
          b.type = document.getElementById('eb-type').value;
          b.amount = Number(document.getElementById('eb-amount').value) || 0;
          b.confirmation = document.getElementById('eb-confirmation').value.trim();
          b.pay_date = document.getElementById('eb-pay-date').value;
          b.bank = document.getElementById('eb-bank').value.trim();
          b.due_date = document.getElementById('eb-due-date').value;
          b.remarks1 = document.getElementById('eb-remarks1').value;
          b.remarks2 = document.getElementById('eb-remarks2').value;
          b.match_status = document.getElementById('eb-status').value;
          
          // Fee fields: บันทึกเฉพาะ Type = Transfer/Cheque/Card
          // ถ้า Type อื่น → เคลียร์ค่าทิ้ง (ให้ consistency กับ logic แสดงผล)
          if (b.type === 'Transfer' || b.type === 'Cheque' || b.type === 'Card') {
            b.wht_amount = Number(document.getElementById('eb-wht').value) || 0;
            b.transfer_fee = Number(document.getElementById('eb-transfer-fee').value) || 0;
            b.card_fee = Number(document.getElementById('eb-card-fee').value) || 0;
            b.wht_enabled = b.wht_amount > 0;
          } else {
            b.wht_amount = 0;
            b.transfer_fee = 0;
            b.card_fee = 0;
            b.wht_enabled = false;
          }
          
          // Auto-matched rule: Cash type without confirmation → still matched
          if (b.type === 'Cash' && b.match_status === 'pending') {
            b.match_status = 'matched';
            if (!b.pay_date) b.pay_date = b.date;
          }
          
          // ⭐ Auto-set paid: ถ้ากรอก pay_date + status ยังไม่ใช่ paid/matched → set เป็น paid
          // (user confirmed: กรอก pay_date = ถือว่าจ่ายแล้ว)
          if (b.pay_date && b.match_status !== 'paid' && b.match_status !== 'matched' && b.match_status !== 'void' && b.match_status !== 'bounced') {
            b.match_status = 'paid';
          }
          
          persistMainState();
          invalidateBillsCache();    // ให้ Sum/Cash Drawer รีคำนวณจาก bills ล่าสุด
          closeModal();
          toast(`✓ บันทึกแล้ว — ${b.bill_no||'(ไม่มีเลข)'}`, 'success');
          renderKeepScroll();
        });
        
        document.getElementById('eb-delete')?.addEventListener('click', () => {
          if (!confirm(`ลบบิล ${b.bill_no||'(ไม่มีเลข)'}?\n${b.type} · ฿${fmtNum(b.amount)} · ${fmtDate(b.date)}\n\nลบแล้วกู้คืนไม่ได้`)) return;
          // ใช้ reference (b) แทน idx — กัน idx shift ถ้ามี mutation อื่น
          const realIdx = billList.indexOf(b);
          if (realIdx < 0) { toast('บิลไม่อยู่ในระบบแล้ว', 'warn'); closeModal(); return; }
          // ⭐ Track uuid เพื่อ push delete ไป cloud
          if (b.bill_uuid && typeof syncManager !== 'undefined') {
            syncManager.markDeleted('bills', b.bill_uuid);
          }
          billList.splice(realIdx, 1);
          persistMainState();
          invalidateBillsCache();    // สำคัญ: ล้าง cache ให้ Sum refresh
          closeModal();
          toast('ลบบิลแล้ว', 'success');
          renderKeepScroll();
        });
      });
    });

    // Summary cells (cashIn/cashOut/returns/sales/drawer)
    el.querySelectorAll('.sum-cell').forEach(inp => {
      inp.addEventListener('input', debounce(() => {
        // ⭐ ตรวจ lock — ถ้า locked ห้ามแก้
        if (isDateLocked(selectedDate)) {
          toast(`🔒 ${fmtDate(selectedDate)} ถูก lock — ปลด lock ก่อน`, 'warn', 3000);
          // Reset value กลับเป็นเดิม
          const key = inp.dataset.k;
          inp.value = mainSummary[key] !== undefined ? mainSummary[key] : '';
          return;
        }
        // ⭐ ตรวจวันอาทิตย์ — ร้านปิด ไม่ควรกรอกข้อมูล
        try {
          const dt = new Date(selectedDate);
          if (!isNaN(dt) && dt.getUTCDay() === 0) {
            toast('⚠️ วันอาทิตย์ — ร้านปิด ไม่สามารถบันทึกข้อมูลได้', 'warn', 4000);
            inp.value = '';
            return;
          }
        } catch(_){}
        
        const key = inp.dataset.k;
        const value = parseFloat(inp.value) || 0;
        mainSummary[key] = value;
        
        // Sync to __byDate[selectedDate] ด้วย (ป้องกันข้อมูลหายเมื่อเปลี่ยนวัน)
        const [field, station] = key.split('_').reduce((acc, part, i, arr) => {
          if (i === 0) return [part, ''];
          return [acc[0], acc[1] ? acc[1] + '_' + part : part];
        }, ['', '']);
        if (field && station) {
          const LABEL_MAP = {
            cashIn: 'นำเงินเข้า', sales: 'ยอดขาย', cashOut: 'นำเงินออก',
            returns: 'ยอดคืนสินค้า', cashDrawer: 'Cash Drawer',
            transfer: 'Transfer', card: 'Card', cheque: 'Cheque', refund: 'Refund',
          };
          const thLabel = LABEL_MAP[field];
          if (thLabel) {
            if (!mainSummary.__byDate) mainSummary.__byDate = {};
            if (!mainSummary.__byDate[selectedDate]) mainSummary.__byDate[selectedDate] = {};
            if (!mainSummary.__byDate[selectedDate][thLabel]) mainSummary.__byDate[selectedDate][thLabel] = {};
            mainSummary.__byDate[selectedDate][thLabel][station] = value;
          }
        }
        
        persistMainState();
        // ⭐ Explicit markDirty('meta') — ป้องกัน race ที่ persistMainState skip ตอน pulling
        if (window.syncManager?.markDirty) syncManager.markDirty('meta');
        updateSumCheckRow();
        updateAllStationColumn();
      }, 200));
    });

    // Cash counting cells — บันทึกลง cashCount ของวันที่เลือก
    el.querySelectorAll('.cash-cell').forEach(inp => {
      inp.addEventListener('input', debounce(() => {
        // ⭐ ตรวจ lock
        if (isDateLocked(selectedDate)) {
          toast(`🔒 ${fmtDate(selectedDate)} ถูก lock — ปลด lock ก่อน`, 'warn', 3000);
          const dayCash = getCashForDate(selectedDate);
          const k = inp.dataset.denom + '_' + inp.dataset.station;
          inp.value = dayCash[k] || '';
          return;
        }
        // ⭐ ตรวจวันอาทิตย์
        try {
          const dt = new Date(selectedDate);
          if (!isNaN(dt) && dt.getUTCDay() === 0) {
            toast('⚠️ วันอาทิตย์ — ร้านปิด ไม่สามารถบันทึกข้อมูลได้', 'warn', 4000);
            inp.value = '';
            return;
          }
        } catch(_){}
        
        const dayCash = getCashForDate(selectedDate);
        const k = inp.dataset.denom + '_' + inp.dataset.station;
        dayCash[k] = parseInt(inp.value) || 0;
        persistMainState();
        // ⭐ Explicit markDirty('meta') — cashCount เป็นส่วนของ meta
        if (window.syncManager?.markDirty) syncManager.markDirty('meta');
        // Update totals ในตารางธนบัตรด้านล่าง
        const denom = Number(inp.dataset.denom);
        const rowTotal = ['Front1','Front2','Front3','Front4','Invoice']
          .reduce((s, st) => s + denom * (Number(dayCash[denom+'_'+st]) || 0), 0);
        const totalEl = el.querySelector(`[data-denom-total="${denom}"]`);
        if (totalEl) totalEl.textContent = fmtNum(rowTotal);
        
        const stationTotal = calcCashDrawer(inp.dataset.station);
        const stEl = el.querySelector(`[data-station-total="${inp.dataset.station}"]`);
        if (stEl) stEl.textContent = '฿' + fmtNum(stationTotal);
        
        const grand = ['Front1','Front2','Front3','Front4','Invoice'].reduce((s,st)=>s+calcCashDrawer(st),0);
        const gEl = document.getElementById('grand-total');
        if (gEl) gEl.textContent = '฿' + fmtNum(grand);
        
        // ── Update Cash Drawer row ในสรุปด้านบน ──
        // Front1-4: คำนวณแยกต่อ station
        ['Front1','Front2','Front3','Front4'].forEach(s => {
          const v = calcCashFromBills(s);
          const cell = el.querySelector(`[data-drawer-station="${s}"]`);
          if (cell) {
            cell.textContent = v ? fmtNum(v) : '-';
            cell.style.color = v ? 'var(--purple)' : 'var(--text3)';
            cell.style.fontWeight = v ? '600' : '400';
          }
        });
        // Invoice merged = รวม 3 stations
        const mergedInvoice = ['Invoice','Order','Payment']
          .reduce((s,st) => s + calcCashFromBills(st), 0);
        const mergedCell = el.querySelector('[data-drawer-station="Invoice"]');
        if (mergedCell) {
          mergedCell.textContent = mergedInvoice ? fmtNum(mergedInvoice) : '-';
          mergedCell.style.color = mergedInvoice ? 'var(--purple)' : 'var(--text3)';
          mergedCell.style.fontWeight = mergedInvoice ? '700' : '400';
        }
        // Drawer total column (ซ้ายสุด)
        const drawerTotalEl = el.querySelector('[data-drawer-total]');
        if (drawerTotalEl) {
          const frontSum = ['Front1','Front2','Front3','Front4']
            .reduce((s,st) => s + calcCashFromBills(st), 0);
          const total = frontSum + mergedInvoice;
          drawerTotalEl.textContent = total ? fmtNum(total) : '-';
        }
        
        // Recalc Sum row (✓OK / ตัวเลขต่าง)
        updateSumCheckRow();
      }, 200));
    });

    // Bill list cells — in-place edit (NO full render → ไม่มี scroll เด้ง)
    el.querySelectorAll('.bl-cell').forEach(inp => {
      // ⭐ Wire customer autocomplete สำหรับ remarks1 cell
      if (inp.dataset.field === 'remarks1') {
        wireRemarks1Autocomplete(inp);
      }
      inp.addEventListener('change', () => {
        const tr = inp.closest('tr');
        const idx = Number(tr.dataset.idx);
        const field = inp.dataset.field;
        const b = billList[idx];
        // ⭐ ตรวจ lock — ถ้าวันที่บิลถูก lock → block
        //    ⚠️ ยกเว้น 'confirmation' — เพราะเป็น matching action (อนุญาตแม้ locked)
        if (b && field !== 'confirmation' && isDateLocked(toISODate(b.date))) {
          toast(`🔒 ${fmtDate(b.date)} ถูก lock — แก้ไขไม่ได้ (ยกเว้น confirmation)`, 'warn', 3000);
          // Reset value
          inp.value = b[field] || '';
          return;
        }
        billList[idx][field] = inp.value;
        
        // ── Surgical update: อัปเดตแค่ pay_date cell + status badge ใน row นี้ ──
        // ไม่ re-render ทั้งหน้า → ไม่มี scroll bounce
        const updateRowStatus = (b) => {
          // อัปเดต pay_date input ในแถวเดียวกัน
          const payDateInp = tr.querySelector('input[data-field="pay_date"]');
          if (payDateInp) payDateInp.value = b.pay_date ? toISODate(b.pay_date) : '';
          
          // อัปเดต confirmation input (เผื่อ code เปลี่ยน)
          const confInp = tr.querySelector('input[data-field="confirmation"]');
          if (confInp && confInp !== inp) confInp.value = b.confirmation || '';
        };
        
        // กฎ matched ใหม่:
        //   Type = Cash                             → auto matched (ไม่ต้องใส่ confirmation)
        //   Type = Transfer/Card/Cheque/Refund     → matched ก็ต่อเมื่อมี confirmation
        //   Type = Unknown / ว่าง                  → pending เสมอ
        const MATCHABLE_TYPES_INLINE = ['Transfer', 'Card', 'Cheque', 'Refund'];
        
        // ── Auto status change เมื่อกรอก confirmation ──
        if (field === 'confirmation') {
          const b = billList[idx];
          const hasConf = b.confirmation && b.confirmation.trim();
          const canMatchByType = MATCHABLE_TYPES_INLINE.includes(b.type || '');
          const oldStatus = b.match_status;
          
          if (hasConf && canMatchByType) {
            // Type = Transfer/Card/Cheque + มี confirmation → matched
            if (b.match_status !== 'matched' && b.match_status !== 'paid' && b.match_status !== 'void') {
              b.match_status = 'matched';
              if (!b.pay_date) b.pay_date = b.date;
              toast(`✓ บันทึกเป็นชำระแล้ว — ${b.bill_no||'(ไม่มีเลข)'}`, 'success');
            }
          } else if (hasConf && !canMatchByType) {
            // มี confirmation แต่ Type ไม่ match → แจ้งเตือน ไม่เปลี่ยนสถานะ
            if (b.type && b.type !== 'Cash') {
              toast(`⚠️ Type = "${b.type}" ไม่ match กับ statement (ใช้ได้เฉพาะ Transfer/Card/Cheque)`, 'warn');
            }
          } else if (!hasConf) {
            // ล้าง confirmation → กลับเป็น pending (ถ้าไม่ใช่ Cash/paid_by_sp/void)
            if (b.match_status === 'matched' && !b.paid_by_sp && b.type !== 'Cash') {
              b.match_status = 'pending';
              delete b.pay_date;
              delete b.matched_stmt_ref;
              delete b.matched_at;
              toast(`↩ ยกเลิก matched — ${b.bill_no||'(ไม่มีเลข)'}`, 'info');
            }
          }
          persistMainState();
          // ⭐ ถ้า match_status เปลี่ยน → re-render เพื่อ update status badge (ไม่ใช่แค่ cell)
          if (b.match_status !== oldStatus) {
            renderKeepScroll();
          } else {
            updateRowStatus(b);
            updateSumCheckRow();
          }
          return;
        }
        
        // ── Auto-match Type=Cash / revert when Type changes ──
        if (field === 'type') {
          const b = billList[idx];
          const hasConf = b.confirmation && b.confirmation.trim();
          const oldStatus = b.match_status;
          
          if (b.type === 'Cash') {
            // Cash → auto matched
            if (b.match_status !== 'matched' && b.match_status !== 'paid' && b.match_status !== 'void') {
              b.match_status = 'matched';
              if (!b.pay_date) b.pay_date = b.date;
              toast(`✓ Cash → auto matched`, 'success');
            }
          } else if (MATCHABLE_TYPES_INLINE.includes(b.type)) {
            // Transfer/Card/Cheque → matched ต่อเมื่อมี confirmation
            if (hasConf && b.match_status !== 'matched' && b.match_status !== 'paid' && b.match_status !== 'void') {
              b.match_status = 'matched';
              if (!b.pay_date) b.pay_date = b.date;
              toast(`✓ มี confirmation อยู่แล้ว → matched`, 'success');
            } else if (!hasConf && b.match_status === 'matched' && !b.paid_by_sp) {
              b.match_status = 'pending';
              delete b.pay_date;
              delete b.matched_stmt_ref;
              toast(`↩ ต้องใส่ confirmation ก่อนจึงจะ matched`, 'info');
            }
          } else {
            // Type = Refund / Unknown / ว่าง → pending (ถ้าไม่ได้ถูก paid_by_sp)
            if (b.match_status === 'matched' && !b.paid_by_sp) {
              b.match_status = 'pending';
              delete b.pay_date;
              delete b.matched_stmt_ref;
              toast(`↩ Type "${b.type||'(ว่าง)'}" ไม่ต้อง match → pending`, 'info');
            }
          }
          persistMainState();
          // ⭐ ถ้า match_status เปลี่ยน → ต้อง re-render เพื่อ update status badge + row style
          //    (updateRowStatus ไม่ touch badge cell) ใช้ renderKeepScroll เพื่อไม่ให้ scroll เด้ง
          if (b.match_status !== oldStatus) {
            renderKeepScroll();
          } else {
            updateRowStatus(b);
            updateSumCheckRow();
          }
          return;
        }
        
        // ช่องอื่นๆ (date, station, amount, remarks, bank, due_date, pay_date)
        // → แค่ save ไม่ render เลย
        persistMainState();
        // ถ้าเปลี่ยน amount หรือ station → sum อาจเปลี่ยน
        if (field === 'amount' || field === 'station') updateSumCheckRow();
      });
    });

    // ── Copy-Down buttons ──
    el.querySelectorAll('.btn-copy-down').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = Number(btn.dataset.idx);
        const field = btn.dataset.field;
        const value = billList[idx][field];
        if (!value && value !== 0) { toast('ช่องนี้ว่าง ไม่มีอะไรให้คัดลอก', 'info'); return; }
        
        // คัดลอกลงทุกแถวที่อยู่ด้านล่าง (หลัง idx นี้) + อยู่ใน filter ปัจจุบัน
        let count = 0;
        billList.forEach((b, i) => {
          if (i <= idx) return;
          // ต้องอยู่ใน filter
          if (filterStation !== 'ALL' && b.station !== filterStation) return;
          if (filterType !== 'ALL' && b.type !== filterType) return;
          b[field] = value;
          count++;
        });
        persistMainState();
        toast(`คัดลอกลง ${count} แถว`, 'success');
        render();
      });
    });
    
    // ── Cheque bounce button ──
    el.querySelectorAll('.btn-bounce-cheque').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = Number(btn.dataset.idx);

        b.match_status = 'bounced';

    el.querySelectorAll('.btn-void-bill').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();

          <div class="flex-col gap-3">
            <div style="padding:10px;background:rgba(239,87,87,.08);border-radius:8px">
              <div class="text-sm">${b.bill_no || '(ไม่มีเลข)'} · ฿${fmtNum(b.amount)} · ${fmtDate(b.date)}</div>
              <div class="text-xs text-muted">${b.station||''} · ${b.type||''}</div>
            </div>
            <p class="text-sm">บิลนี้จะถูก mark ว่ายกเลิก — ไม่ถูกคิดในยอดรวม แต่จะเก็บประวัติไว้ กดยกเลิกได้ภายหลัง</p>
            <div class="input-group">
              <label>เหตุผลการยกเลิก *</label>
              <textarea class="input" id="void-reason" rows="3" placeholder="เช่น ลูกค้าขอยกเลิก, ออกใบแจ้งหนี้ผิด, สินค้าคืน, ..." autofocus></textarea>
            </div>
            <div class="flex gap-2 mt-2">
              <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ไม่ยกเลิก</button>
              <button class="btn btn-primary btn-sm flex-1" id="void-confirm" style="background:#777;color:#fff">❌ ยืนยันยกเลิกบิล</button>
            </div>

        `);
        
        document.getElementById('void-confirm')?.addEventListener('click', () => {
          const reason = document.getElementById('void-reason').value.trim();
          if (!reason) { toast('ต้องระบุเหตุผล', 'error'); return; }
          b.match_status = 'void';
          b.voided_at = new Date().toISOString();

    // ── Un-void bill (ยกเลิกการยกเลิก) ──
    el.querySelectorAll('.btn-unvoid-bill').forEach(btn => {
      btn.addEventListener('click', (e) => {

        persistMainState();

  }

// SP-TEMP — Partial Payment Tracking
// Schema: { no, created_at, cust_code, cust_name, expected_total,
//           partials: [{date, amount, method, bank, stmt_ref, notes}],
//           status: 'open'|'complete'|'graduated'|'cancelled',
//           linked_sp, parent_temp, graduated_at, updated_at }
// ════════════════════════════════════════════════════════════════

function spTempCounter() {
  // Rolling global counter — derive from existing list + localStorage
  let max = 0;
  spTempList.forEach(t => {
    const m = String(t.no||'').match(/SP-TEMP-(\d+)/);
    if (m) max = Math.max(max, Number(m[1]));
  });
  const saved = Number(localStorage.getItem('sf_spTempCounter') || 0);
  return Math.max(max, saved) + 1;
}

function genSpTempNo() {
  // ⭐ Pure function — no side effects. Counter persist moved to markDirtySpTemps()
  // Fix bug: previously localStorage.setItem here → counter advanced แม้ user cancel modal
  const n = spTempCounter();
  return 'SP-TEMP-' + String(n).padStart(4, '0');
}

function spTempPaidTotal(t) {
  const opening = Number(t.opening_balance) || 0;
  return opening + (t.partials || []).reduce((s,p) => s + (Number(p.amount)||0), 0);
}

function spTempProgress(t) {
  const paid = spTempPaidTotal(t);
  const exp = Number(t.expected_total) || 0;
  return { paid, expected: exp, pct: exp > 0 ? Math.round(paid / exp * 100) : 0, remaining: Math.max(0, exp - paid) };
}

function recomputeSpTempStatus(t) {
  if (t.linked_sp) { t.status = 'graduated'; return; }
  const p = spTempProgress(t);
  if (p.expected > 0 && p.paid >= p.expected) t.status = 'complete';
  else if (p.paid === 0) t.status = 'open';
  else t.status = 'open'; // partial — open จนกว่าครบ
}

function markDirtySpTemps() {
  // ⭐ Persist counter to localStorage (moved from genSpTempNo)
  // Only fires on commit path → counter ไม่เขยิบถ้า user cancel modal
  let max = 0;
  spTempList.forEach(t => {
    const m = String(t.no||'').match(/SP-TEMP-(\d+)/);
    if (m) max = Math.max(max, Number(m[1]));
  });
  if (max > 0) localStorage.setItem('sf_spTempCounter', String(max));
  
  persistMainState();
  if (window.syncManager) syncManager.markDirty('sp_temps');
}

// Check for overpayment and auto-rollover
function spTempCheckRollover(t, newPartial) {
  const exp = Number(t.expected_total) || 0;
  if (exp <= 0) return { split: false }; // ไม่รู้ expected → ไม่ rollover
  
  const currentPaid = spTempPaidTotal(t); // ก่อน add newPartial
  const newAmount = Number(newPartial.amount) || 0;
  const totalAfter = currentPaid + newAmount;
  
  if (totalAfter <= exp) return { split: false }; // ไม่เกิน
  
  // Split
  const fitsInThis = exp - currentPaid; // เหลือที่ต้องเติมเพื่อให้ครบ
  const overflow = newAmount - fitsInThis; // ส่วนที่เกิน
  
  return {
    split: true,
    fitsInThis, overflow,
    partialThis: { ...newPartial, amount: fitsInThis, _auto_split: true },
    partialNext: { ...newPartial, amount: overflow, _auto_split: true },
  };
}

// ── General customer autocomplete: wire ให้ input ใดๆ ──
//   ใช้ใน Add Bill / Edit Bill / inline edit remarks1
//   user พิมพ์ → search customerList → dropdown ทึบ (พื้นหลังเต็ม)
//   เลือก → fill value = "(CUST_CODE) ชื่อลูกค้า"
function wireRemarks1Autocomplete(input) {
  if (!input || input._remarks1Wired) return;
  input._remarks1Wired = true;
  
  // สร้าง dropdown ที่ position absolute เกาะ input
  const drop = document.createElement('div');
  drop.style.cssText = 'position:absolute;display:none;z-index:9999;background:var(--surface,#1a1f2e);' +
                       'border:1px solid var(--border);border-radius:6px;max-height:240px;overflow-y:auto;' +
                       'box-shadow:0 4px 12px rgba(0,0,0,.35);min-width:240px';
  document.body.appendChild(drop);
  
  function positionDrop() {
    const r = input.getBoundingClientRect();
    drop.style.left = (r.left + window.scrollX) + 'px';
    drop.style.top = (r.bottom + window.scrollY + 2) + 'px';
    drop.style.width = Math.max(r.width, 240) + 'px';
  }
  
  function doSearch(q) {
    q = String(q||'').toLowerCase().trim();
    if (!q || q.length < 1) { drop.style.display = 'none'; return; }
    
    if (!Array.isArray(customerList) || customerList.length === 0) {
      drop.style.display = 'none';
      return;
    }
    
    const matches = customerList.filter(c => {
      const code = String(c.cust_code||c.cust_id||'').toLowerCase();
      const name = String(c.cust_name||'').toLowerCase();
      return code.includes(q) || name.includes(q);
    }).slice(0, 15);
    
    if (matches.length === 0) {
      drop.innerHTML = '<div style="padding:10px 12px;color:var(--text3);font-size:.85rem;background:var(--surface,#1a1f2e)">ไม่พบลูกค้า — กรอกเองได้</div>';
      positionDrop();
      drop.style.display = 'block';
      return;
    }
    
    drop.innerHTML = matches.map((c, i) => {
      const code = c.cust_code || c.cust_id || '';
      const name = c.cust_name || '';
      return `<div class="r1-cust-opt" data-i="${i}" 
              style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:.85rem;background:var(--surface,#1a1f2e);color:var(--text)">
              <span style="font-family:monospace;color:var(--info)">${code}</span> · ${name}
              </div>`;
    }).join('');
    positionDrop();
    drop.style.display = 'block';
    
    drop.querySelectorAll('.r1-cust-opt').forEach((opt, i) => {
      opt.addEventListener('mouseenter', () => opt.style.background = 'var(--bg2,#2a3142)');
      opt.addEventListener('mouseleave', () => opt.style.background = 'var(--surface,#1a1f2e)');
      opt.addEventListener('mousedown', (e) => {
        e.preventDefault(); // กัน blur ก่อน fill
        const c = matches[i];
        const code = c.cust_code || c.cust_id || '';
        const name = c.cust_name || '';
        input.value = code ? `(${code}) ${name}` : name;
        // Trigger change event เพื่อให้ inline edit handler save value
        input.dispatchEvent(new Event('change', { bubbles: true }));
        input.dispatchEvent(new Event('input', { bubbles: true }));
        drop.style.display = 'none';
      });
    });
  }
  
  let searchTimer = null;
  input.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => doSearch(input.value), 100);
  });
  input.addEventListener('focus', () => { if (input.value) doSearch(input.value); });
  input.addEventListener('blur', () => setTimeout(() => { drop.style.display = 'none'; }, 200));
  // Cleanup on remove
  const observer = new MutationObserver(() => {
    if (!document.body.contains(input)) {
      drop.remove();
      observer.disconnect();
    }
  });
  observer.observe(document.body, { childList: true, subtree: true });
}

  });
}

// ⭐ Modal: Match partial with statement (picker)
function openSpTempPartialMatchModal(no, idx, onChange) {
  const t = spTempList.find(x => x.no === no);
  if (!t || !t.partials || !t.partials[idx]) return;
  const pr = t.partials[idx];
  
  const prAmt = Math.abs(Number(pr.amount)||0);
  const prDateISO = toISODate(pr.date);
  const prBank = (pr.bank||'').toUpperCase();
  
  // Filter candidates: unmatched stmts, amount close, date ±3 days
  const allStmts = getAllStatements();
  const candidates = allStmts.filter(s => {
    if (s.match_status === 'matched') return false;
    const sAmt = Math.abs(Number(s.amount)||0);
    // Amount must match (±0.01)
    if (Math.abs(sAmt - prAmt) > 0.01) return false;
    // Direction: partial = income → stmt should be +
    if (Number(s.amount) < 0) return false;
    // Date ±3 days
    if (prDateISO) {
      const sDateISO = toISODate(s.date);
      if (sDateISO) {
        const diff = Math.abs((new Date(prDateISO) - new Date(sDateISO)) / 86400000);
        if (diff > 3) return false;
      }
    }
    return true;
  });
  
  // Score + sort: bank match first, then date closest
  candidates.forEach(s => {
    let score = 0;
    if (prBank && String(s.bank||'').toUpperCase().includes(prBank)) score += 100;
    if (prBank && String(s.bank||'').toUpperCase() === prBank) score += 200;
    const sDateISO = toISODate(s.date);
    if (sDateISO === prDateISO) score += 50;
    s._matchScore = score;
  });
  candidates.sort((a, b) => (b._matchScore||0) - (a._matchScore||0));
  
  // Also allow showing ALL unmatched (fallback) — toggle
  let showAll = false;
  
  function renderList() {
    const list = showAll 
      ? allStmts.filter(s => s.match_status !== 'matched' && Number(s.amount) > 0)
                .sort((a,b) => Math.abs(Math.abs(Number(a.amount)||0) - prAmt) - Math.abs(Math.abs(Number(b.amount)||0) - prAmt))
                .slice(0, 50)
      : candidates;
    
    const listHtml = list.length === 0 ? `
      <div style="padding:20px;text-align:center;color:var(--text2)">
        ไม่เจอ statement ที่ตรงยอด ${fmtNum(prAmt)} ± 3 วัน<br>
        <button class="btn btn-outline btn-xs mt-2" id="epr-show-all">ดู statement ทั้งหมดที่ยังไม่ match</button>
      </div>
    ` : list.map(s => {
      const sAmt = Math.abs(Number(s.amount)||0);
      const diff = sAmt - prAmt;
      const diffClass = Math.abs(diff) < 0.01 ? 'success' : 'warn';
      return `
        <div class="epr-stmt-row" data-ref="${s.ref_no||''}" style="padding:10px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;gap:10px;align-items:center;transition:background .12s" onmouseenter="this.style.background='var(--bg2)'" onmouseleave="this.style.background=''">
          <div style="flex:1;font-size:.82rem">
            <div class="flex gap-2 items-center" style="flex-wrap:wrap">
              <span class="badge badge-info" style="font-size:.65rem">${s.bank||'-'}</span>
              <span style="color:var(--text)">${fmtDate(s.date)} ${s.time||''}</span>
              ${toISODate(s.date) === prDateISO ? '<span class="badge badge-success" style="font-size:.6rem">วันเดียวกัน</span>' : ''}
            </div>
            <div class="text-xs" style="font-family:monospace;margin-top:2px;color:var(--text2)">${(s.ref_no||'').substring(0,50)}</div>
            ${s.description ? `<div class="text-xs text-muted">${String(s.description).substring(0,60)}</div>` : ''}
          </div>
          <div style="text-align:right;white-space:nowrap">
            <div style="font-weight:700;color:var(--success);font-size:.9rem">฿${fmtNum(sAmt)}</div>
            ${Math.abs(diff) > 0.01 ? `<div class="text-xs" style="color:var(--${diffClass})">${diff > 0 ? '+' : ''}${fmtNum(diff)}</div>` : '<div class="text-xs" style="color:var(--success)">ตรง</div>'}
          </div>
        </div>
      `;
    }).join('');
    
    const container = document.getElementById('epr-stmt-list');
    if (container) container.innerHTML = listHtml;
    
    // Wire rows
    document.querySelectorAll('.epr-stmt-row').forEach(row => {
      row.addEventListener('click', () => {
        const ref = row.dataset.ref;
        const stmt = allStmts.find(s => s.ref_no === ref);
        if (!stmt) return;
        // Apply match
        pr.stmt_ref = stmt.ref_no;
        // Auto-fill bank ถ้า partial ยังว่าง
        if (!pr.bank && stmt.bank) pr.bank = stmt.bank;
        // Update stmt side
        stmt.match_status = 'matched';
        stmt.match_station = 'SP-TEMP';
        stmt.match_bill = `${no}#${idx + 1}`;
        stmt.matched_bills = [`${no}#${idx + 1}`];
        stmt.match_method = 'manual_sp_temp';
        stmt.matched_at = new Date().toISOString();
        
        t.updated_at = new Date().toISOString();
        recomputeSpTempStatus(t);
        markDirtySpTemps();
        syncManager.markDirty('stmts');
        closeModal();
        toast(`✓ ผูก ${no}#${idx + 1} กับ ${stmt.bank} ${fmtDate(stmt.date)}`, 'success');
        if (onChange) onChange();
      });
    });
    
    document.getElementById('epr-show-all')?.addEventListener('click', () => {
      showAll = true;
      renderList();
    });
  }
  
  openModal(`🔍 หา Statement สำหรับ Partial #${idx + 1}`, `
    <div style="min-width:560px;max-width:700px">
      <div style="padding:10px;background:var(--bg2);border-radius:6px;font-size:.83rem;margin-bottom:10px">
        <div class="flex justify-between">
          <div><b>${no}</b> · ${t.cust_name || '-'}</div>
          <div><b style="color:var(--success)">฿${fmtNum(prAmt)}</b> · ${fmtDate(pr.date)} · ${pr.bank||'ไม่ระบุ bank'}</div>
        </div>
      </div>
      <div class="flex justify-between items-center mb-2">
        <div class="text-xs text-dim">
          Statements ที่ยอดตรง ${fmtNum(prAmt)} ± 3 วัน
        </div>
        <button class="btn btn-ghost btn-xs" id="epr-show-all-top" style="font-size:.7rem">ดูทั้งหมดที่ยอดตรง</button>
      </div>
      <div id="epr-stmt-list" style="max-height:400px;overflow-y:auto;border:1px solid var(--border);border-radius:6px">
        <div style="padding:20px;text-align:center;color:var(--text2)">กำลังโหลด...</div>
      </div>
      <div class="flex gap-2 mt-3">
        <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
      </div>
    </div>
  `);
  
  document.getElementById('epr-show-all-top')?.addEventListener('click', () => {
    showAll = !showAll;
    document.getElementById('epr-show-all-top').textContent = showAll ? '← ดูเฉพาะที่ใกล้เคียง' : 'ดูทั้งหมดที่ยอดตรง';
    renderList();
  });
  
  setTimeout(renderList, 50);
}

    const hasPartial = !skipPartial && pAmt > 0;
    
    const partial = hasPartial ? {
      date: document.getElementById('tsp-p-date').value,
      amount: pAmt,
      method: document.getElementById('tsp-p-method').value,
      bank: document.getElementById('tsp-p-bank').value,
      stmt_ref: '',
      notes: document.getElementById('tsp-p-notes').value,
    } : null;
    if (partial && partial.method === 'Cheque') {
      partial.cheque_no = document.getElementById('tsp-p-cheque-no')?.value.trim() || '';
      partial.cheque_due_date = document.getElementById('tsp-p-cheque-due')?.value || '';
    }
    
    const now = new Date().toISOString();
    const opening = Number(document.getElementById('tsp-opening')?.value) || 0;
    const newTemp = {
      no: tempNo, created_at: now, updated_at: now,
      cust_code: code, cust_name: name,
      expected_total: expected,
      opening_balance: opening,
      partials: [],
      status: 'open', linked_sp: '', parent_temp: '', graduated_at: '',
    };
    
    if (!hasPartial) {
      // ⭐ No partial — just create empty SP-TEMP
      recomputeSpTempStatus(newTemp);
      spTempList.push(newTemp);
    } else {
      // Check rollover
      const check = spTempCheckRollover(newTemp, partial);
      if (check.split) {
        newTemp.partials.push(check.partialThis);
        recomputeSpTempStatus(newTemp);
        spTempList.push(newTemp);
        
        // Rollover
        const nextNo = genSpTempNo();
        const nextTemp = {
          no: nextNo, created_at: now, updated_at: now,
          cust_code: code, cust_name: name,
          expected_total: 0, // ยังไม่รู้ → user แก้ทีหลัง
          partials: [check.partialNext],
          status: 'open', linked_sp: '', parent_temp: tempNo, graduated_at: '',
        };
        spTempList.push(nextTemp);
        toast(`⚠️ เกิน ${check.overflow.toLocaleString()} → สร้าง ${nextNo} อัตโนมัติ`, 'info');
      } else {
        newTemp.partials.push(partial);
        recomputeSpTempStatus(newTemp);
        spTempList.push(newTemp);
      }
    }
    
    markDirtySpTemps();
    closeModal();
    toast(`สร้าง ${tempNo} สำเร็จ${hasPartial ? '' : ' (ยังไม่มียอดจ่าย)'}`, 'success');
    // Re-render caller
    const mainEl = document.getElementById('main');
    if (mainEl && typeof currentPage !== 'undefined' && currentPage === 'payments') navigateTo('payments');
  });
}

// Graduate: match SP-TEMP → real SP
function spTempFindGraduationCandidates(realSp) {
  // realSp: {sp_no, cust_id/cust_code, total, ...}
  const code = String(realSp.cust_code || realSp.cust_id || '').trim();
  const amount = Number(realSp.total || realSp.amount) || 0;
  
  // Extract code from customer string "(BB-00015)บริษัท..." if needed
  let effectiveCode = code;
  if (!effectiveCode && realSp.cust_name) {
    const m = String(realSp.cust_name).match(/^\(([A-Z]{2}-\d+)\)/);
    if (m) effectiveCode = m[1];
  }
  
  return spTempList.filter(t => {
    if (t.status === 'graduated' || t.status === 'cancelled') return false;
    if (t.cust_code !== effectiveCode) return false;
    const paid = spTempPaidTotal(t);
    return Math.abs(paid - amount) < 1; // ±1 บาท
  });
}

function spTempGraduate(tempNo, realSpNo, realSpDate) {
  const t = spTempList.find(x => x.no === tempNo);
  if (!t) return false;
  t.linked_sp = realSpNo;
  t.status = 'graduated';
  t.graduated_at = realSpDate || new Date().toISOString();
  t.updated_at = new Date().toISOString();
  markDirtySpTemps();
  return true;
}
