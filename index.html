          <div class="font-semi" style="color:var(--warn);margin-bottom:8px">⚠️ คำเตือน ${warnings.length} รายการ</div>
          <div style="max-height:200px;overflow-y:auto">
            ${warnings.map(w => `<div class="text-sm" style="padding:4px 0;border-bottom:1px solid var(--border)">• ${w.msg}</div>`).join('')}
          </div>
        </div>
      ` : ''}
      <div class="flex gap-2 mt-2">
        <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">${errors.length?'ปิด':'ยกเลิก'}</button>
        ${errors.length === 0 && onContinue ? `<button class="btn btn-warn btn-sm flex-1" id="val-continue" style="background:var(--warn);color:#fff">${ICONS.check} ยืนยันบันทึก (ยังมีคำเตือน)</button>` : ''}
        ${errors.length > 0 ? '<div class="text-xs text-muted" style="align-self:center;flex:1;text-align:center">แก้ไข error ก่อนจะบันทึกได้</div>' : ''}
      </div>
    </div>
  `;
  
  const title = errors.length > 0 
    ? '❌ พบปัญหาที่ต้องแก้ไข' 
    : '⚠️ ตรวจสอบก่อนบันทึก';
  openModal(title, html);
  
  if (errors.length === 0 && onContinue) {
    document.getElementById('val-continue')?.addEventListener('click', () => {
      closeModal();
      onContinue();
    });
  }
}

async function restoreMainState() {
  try {
    // ── ข้อมูลใหญ่: ลอง IndexedDB ก่อน → fallback localStorage ──
    for (const key of IDB_LARGE_KEYS) {
      const idbVal = await idbGet(key);
      if (idbVal) {
        const parsed = JSON.parse(idbVal);
        if (key === 'sf_billList') billList = parsed;
        else if (key === 'sf_mainSummary') Object.assign(mainSummary, parsed);
        else if (key === 'sf_cashCount') Object.assign(cashCount, parsed);
        else if (key === 'sf_statementsByBank') { statementsByBank = parsed; uploadedStatements = getAllStatements(); }
      } else {
        // Fallback: localStorage (ข้อมูลเก่าก่อนย้าย IndexedDB)
        const lsVal = safeStorage.get(key);
        if (lsVal) {
          const parsed = JSON.parse(lsVal);
          if (key === 'sf_billList') billList = parsed;
          else if (key === 'sf_mainSummary') Object.assign(mainSummary, parsed);
          else if (key === 'sf_cashCount') Object.assign(cashCount, parsed);
          else if (key === 'sf_statementsByBank') { statementsByBank = parsed; uploadedStatements = getAllStatements(); }
          // Migrate ไป IndexedDB + ลบจาก localStorage
          idbSet(key, lsVal);
          try { localStorage.removeItem(key); } catch(e) {}
        }
      }
    }
    
    // ── ข้อมูลเล็ก: localStorage เหมือนเดิม ──
    const savedPay = safeStorage.get('sf_paymentList');
    if (savedPay) paymentList = JSON.parse(savedPay);
    const savedCashflow = safeStorage.get('sf_cashflowList');
    if (savedCashflow) cashflowList = JSON.parse(savedCashflow);
    const savedSuppliers = safeStorage.get('sf_supplierList');
    if (savedSuppliers) supplierList = JSON.parse(savedSuppliers);
    const savedSupPay = safeStorage.get('sf_supplierPayments');
    if (savedSupPay) supplierPayments = JSON.parse(savedSupPay);
    const savedPPRpt = safeStorage.get('sf_ppReport');
    if (savedPPRpt) ppReport = JSON.parse(savedPPRpt);
    const savedTransferLog = safeStorage.get('sf_transferLog');
    if (savedTransferLog) transferLog = JSON.parse(savedTransferLog);
    
    // Statements จาก localStorage (ถ้า IndexedDB ไม่มี)
    if (uploadedStatements.length === 0) {
      const savedStmts = safeStorage.get('sf_statementsByBank');
      if (savedStmts) {
        statementsByBank = JSON.parse(savedStmts);
        uploadedStatements = getAllStatements();
      }
    }
  } catch (e) { console.warn('Could not restore state:', e); }
  
  // ── Bank field = USER MANUAL ENTRY ──
  // ไม่แตะข้อมูล user อัตโนมัติ (เคย clear สำหรับ SP/SC/JS/JR แต่ทำให้ข้อมูลหาย)
  
  // ── Auto dedup: ⚠️ DISABLED - เสี่ยงลบข้อมูลจริง ──
  // ใช้ manual dedup เท่านั้น (ใน addStatementRows ตอน import จะ dedup อัตโนมัติ)
  // ถ้าจำเป็นต้อง dedup ทั้งหมด → เรียก dedupAllStatements() เอง
  
  // ── Auto-sync: บิล matched ที่ขาด confirmation → เติมจาก statement ที่ match ──
  // ── ALSO: บิลที่ statement บอกว่า matched แต่ bill ยัง pending → sync ให้ ──
  if (billList.length > 0 && uploadedStatements.length > 0) {
    let confSynced = 0;
    let statusSynced = 0;
    
    // สร้าง index statements ที่ matched → lookup ด้วย bill_no และ station+type+amount+date
    const stmtByBillNo = {};
    const stmtByKey = {};
    uploadedStatements.forEach(s => {
      if (s.match_status !== 'matched' || !s.match_bill) return;
      const mb = s.match_bill;
      // index 1: bill_no
      if (!mb.includes('|')) {
        stmtByBillNo[mb] = s;
      } else {
        // index 2: generated key → parse เป็น components
        const parts = mb.split('|');
        const station = parts[0];
        const type = parts[1];
        const amtRaw = String(parts[2] || '').replace('฿', '').replace(/,/g, '');
        const amt = Math.round(Number(amtRaw));
        const sDate = toISODate(s.date || s.trans_date);
        if (station && type && amt && sDate) {
          const k = `${sDate}|${station}|${type}|${amt}`;
          stmtByKey[k] = s;
        }
      }
    });
    
    billList.forEach(b => {
      // หา statement คู่
      let stmt = null;
      if (b.bill_no && stmtByBillNo[b.bill_no]) {
        stmt = stmtByBillNo[b.bill_no];
      } else {
        // ใช้ station+type+amount+date หา
        const bDate = toISODate(b.date);
        const amt = Math.round(Number(b.amount || 0));
        if (bDate && b.station && b.type && amt) {
          const k = `${bDate}|${b.station}|${b.type}|${amt}`;
          stmt = stmtByKey[k];
        }
      }
      
      if (!stmt) return;
      
      // ⚠️ Skip Cash/Refund — ไม่ auto เติม confirmation
      //   - Cash: ไม่ผ่านธนาคาร (เข้าลิ้นชัก)
      //   - Refund: user ต้องกรอกเองเพื่อบอกวิธีคืน (Cash/KTB/KBANK/etc.)
      if (b.type === 'Cash' || b.type === 'Refund') return;
      
      // ถ้าบิลยัง pending แต่ statement บอก matched → sync
      if (b.match_status !== 'matched' && b.match_status !== 'paid' && b.match_status !== 'void') {
        b.match_status = 'matched';
        b.confirmation = stmt.bank || '';
        b.pay_date = b.date;
        b.matched_stmt_ref = stmt.ref_no || '';
        statusSynced++;
      }
      // ถ้าบิล matched อยู่แล้วแต่ขาด confirmation → เติม
      else if (b.match_status === 'matched' && !b.confirmation && stmt.bank) {
        b.confirmation = stmt.bank;
        if (!b.pay_date) b.pay_date = b.date;
        confSynced++;
      }
    });
    
    if (confSynced > 0 || statusSynced > 0) {
      console.log(`Auto-sync: status=${statusSynced} confirmation=${confSynced} bills`);
    }
  }
  
  // ── Auto-mark Cash bills as matched (เงินสด = เข้าลิ้นชักแล้ว) ──
  let cashSynced = 0;
  let cashConfCleared = 0;
  billList.forEach(b => {
    if (b.type === 'Cash') {
      // Cash: auto matched + ล้าง confirmation ที่ auto เติมผิด
      if (b.match_status !== 'matched' && 
          b.match_status !== 'paid' && 
          b.match_status !== 'void') {
        b.match_status = 'matched';
        if (!b.pay_date) b.pay_date = b.date;
        cashSynced++;
      }
      // ล้าง confirmation ถ้ามีค่าจาก auto-sync เก่าที่ผิด
      if (b.confirmation) {
        delete b.confirmation;
        cashConfCleared++;
      }
    }
  });
  if (cashSynced > 0) {
    console.log(`Cash auto-matched: ${cashSynced} bills`);
  }
  if (cashConfCleared > 0) {
    console.log(`Cleared wrong confirmation on Cash bills: ${cashConfCleared}`);
  }
  
  // ── Auto-mark: confirmation มีค่าแล้ว → matched ──
  // (รองรับข้อมูลเก่าที่ user กรอก confirmation ก่อนหน้ามี auto-match feature)
  let confMatched = 0;
  billList.forEach(b => {
    if (b.confirmation && String(b.confirmation).trim() &&
        b.match_status !== 'matched' && 
        b.match_status !== 'paid' && 
        b.match_status !== 'void') {
      b.match_status = 'matched';
      if (!b.pay_date) b.pay_date = b.date;
      confMatched++;
    }
  });
  if (confMatched > 0) {
    console.log(`Confirmation-filled auto-matched: ${confMatched} bills`);
  }
}

// ══════════════════════════════════════════════════════════════
// Parse Front POS Report (rpt_sql_pssdailybycshbypaytype.xls) - NEW FORMAT
// โครงสร้าง: แยกตาม Cashier แล้วมี เงินสด / บัตรเครดิต / เงินโอน (แยกทีละบิล)
// Station = ดูจาก bill prefix (001/002/003/004) — ชัวร์ 100%
// Cashier-Station mapping = สร้างจากข้อมูลในไฟล์ (ไม่ hardcode เพราะอาจสลับได้)
// ══════════════════════════════════════════════════════════════
function parseFrontPosReport(result, fileName) {
  const newBills = [];
  let count = 0, transferCount = 0;
  
  // summary ต่อ station (สำหรับใส่ในตาราง Summary ด้านบน)
  const stationSummary = {
    Front1: { cash: 0, card: 0, transfer: 0, sales: 0, refund: 0, cashier: '' },
    Front2: { cash: 0, card: 0, transfer: 0, sales: 0, refund: 0, cashier: '' },
    Front3: { cash: 0, card: 0, transfer: 0, sales: 0, refund: 0, cashier: '' },
    Front4: { cash: 0, card: 0, transfer: 0, sales: 0, refund: 0, cashier: '' },
  };

  // Dynamic mapping: cashier → station (จาก bill prefix ในไฟล์นี้)
  const cashierToStation = {}; // key: "CAS008" → value: "Front1"

  const sheetName = result.sheetNames[0];
  const sheet = result.sheets[sheetName] || [];

  // Helper: ดึง Station จาก bill prefix
  function getStationFromBill(billNo) {
    const match = String(billNo).match(/^[SR]\d{7}(\d{3})-/);
    if (!match) return '';
    const code = match[1];
    return { '001':'Front1', '002':'Front2', '003':'Front3', '004':'Front4' }[code] || '';
  }

  // Helper: ดึง cashier code (เช่น CAS008)
  function getCashierCode(cashierStr) {
    const m = String(cashierStr).match(/\((CAS\d+)\)/);
    return m ? m[1] : '';
  }

  // ── PASS 1: สแกนเลขบิล → สร้าง cashier↔station mapping ──
  let scanCashier = '';
  for (let i = 0; i < sheet.length; i++) {
    const r = sheet[i] || [];
    const c1 = String(r[0] || '').trim();
    const c2 = String(r[1] || '').trim();
    
    // จับ cashier header
    const cashMatch = c1.match(/^\((CAS\d+)\)/);
    if (cashMatch) { scanCashier = cashMatch[1]; continue; }
    
    // จับ bill ของ cashier นี้ → ดู station จาก bill
    if (c2.startsWith('หมายเลข') && scanCashier) {
      const billNo = String(r[2] || '').trim();
      const st = getStationFromBill(billNo);
      if (st && !cashierToStation[scanCashier]) {
        cashierToStation[scanCashier] = st;
      }
    }
  }

  // ── PASS 2: อ่านข้อมูลจริง ──
  let currentStation = '';
  let currentCashier = '';
  let currentCashierName = '';

  for (let i = 0; i < sheet.length; i++) {
    const r = sheet[i] || [];
    const c1 = String(r[0] || '').trim();
    const c2 = String(r[1] || '').trim();

    // หยุดที่แถวท้ายไฟล์
    if (c1.includes('**คูปอง') || c1.includes('.rpt') || c2.includes('Page')) break;

    // แถว Cashier header
    const cashierMatch = c1.match(/^\((CAS\d+)\)\s*(.+?)$/);
    if (cashierMatch) {
      currentCashier = cashierMatch[1];
      currentCashierName = cashierMatch[2].trim();
      currentStation = cashierToStation[currentCashier] || '';
      
      if (currentStation && stationSummary[currentStation]) {
        stationSummary[currentStation].cashier = currentCashierName;
        stationSummary[currentStation].sales = Number(r[1]) || 0;
        stationSummary[currentStation].refund = Math.abs(Number(r[2]) || 0);
      }
      continue;
    }

    // แถว "เงินสด"
    if (c2 === 'เงินสด') {
      const amt = Number(r[7]) || Number(r[2]) || 0;
      if (currentStation && stationSummary[currentStation]) {
        stationSummary[currentStation].cash = amt;
      }
      continue;
    }
    
    // แถว "บัตรเครดิต"
    if (c2 === 'บัตรเครดิต') {
      const amt = Number(r[7]) || Number(r[2]) || 0;
      if (currentStation && stationSummary[currentStation]) {
        stationSummary[currentStation].card = amt;
      }
      continue;
    }

    // แถวเงินโอน (มีเลขบิลจริง)
    if (c2.startsWith('หมายเลข')) {
      const billNo = String(r[2] || '').trim();
      if (!/^[SR]\d+-\d+$/.test(billNo)) continue;
      
      const date = r[4] || '';
      const amount = Number(r[6]) || 0;
      if (!amount) continue;

      const refMatch = c2.match(/เงินโอน\s+(.+?)$/);
      const transferRef = refMatch ? refMatch[1].trim() : '';

      // Station จากเลขบิล (ชัวร์กว่า cashier mapping)
      const station = getStationFromBill(billNo) || currentStation || 'Front1';
      
      const isOther = c2.includes('OTHER');
      const type = isOther ? 'Other' : 'Transfer';
      
      const isReturn = billNo.startsWith('R');
      const finalAmount = isReturn ? -Math.abs(amount) : amount;

      newBills.push({
        bill_no: billNo,
        date: fmtDate(date) || todayISO(),
        source_date: fmtDate(date) || todayISO(),
        station: station,
        type: isReturn ? 'Refund' : type,
        amount: finalAmount,
        confirmation: '',
        pay_date: '',
        remarks1: currentCashierName ? `${currentCashier} ${currentCashierName}` : currentCashier,
        remarks2: transferRef,
        bank: '',
        due_date: '',
        match_status: 'pending',
        source: 'pos',
      });
      count++;
      transferCount++;
      
      if (station && stationSummary[station] && !isReturn) {
        stationSummary[station].transfer += amount;
      }
    }
  }

  // เก็บ summary + cashier-station mapping
  Object.keys(stationSummary).forEach(st => {
    const s = stationSummary[st];
    if (s.sales > 0) {
      mainSummary['sales_' + st] = s.sales;
      // เก็บชื่อ cashier ประจำ station วันนี้
      mainSummary['cashier_' + st] = s.cashier;
    }
  });

  // รวมเข้า billList
  const existingKeys = new Set(billList.map(b => b.bill_no).filter(Boolean));
  const uniqueNewBills = newBills.filter(b => !b.bill_no || !existingKeys.has(b.bill_no));
  const dup = newBills.length - uniqueNewBills.length;
  billList = billList.concat(uniqueNewBills);
  persistMainState();
  
  // แสดง Cashier-Station ของวันนี้
  const mappingStr = Object.entries(cashierToStation)
    .map(([cas, st]) => `${st}=${cas}`)
    .join(', ');
  
  toast(`นำเข้า Front POS สำเร็จ — ${uniqueNewBills.length} บิลเงินโอน${dup?` (ข้าม ${dup} ซ้ำ)`:''}`, 'success');
  if (mappingStr) setTimeout(() => toast('Cashier วันนี้: ' + mappingStr, 'info'), 600);
  
  if (currentPage === 'main') navigateTo('main');
}

// ══════════════════════════════════════════════════════════════
// Parse SP Payment Report (rpt_sql_smspayment.xls)
// Format: Parent-Child structure
//   Parent row: SP number | date | customer | | amount | 0 | amount
//   Child rows: Bill ref | ... | ... | ... | doc_type | amount
// Col: 1=Ref | 2=Original/Date | 3=Date/Customer | 4=DueDate | 5=DocType/Amount | 6=Amt1 | 7=Amt2 | 8=Amt3 | 9=Amt4
// ══════════════════════════════════════════════════════════════
function parseSPReport(result, fileName) {
  const newPayments = [];
  const sheetName = result.sheetNames[0];
  const sheet = result.sheets[sheetName] || [];

  let currentSP = null; // SP ที่กำลังอ่าน
  let count = 0, childCount = 0;

  for (let i = 0; i < sheet.length; i++) {
    const r = sheet[i] || [];
    const c1 = String(r[0] || '').trim();
    if (!c1) continue;

    // หยุดที่ "รวม" หรือ ".rpt" หรือ "Page"
    if (c1 === 'รวม' || c1.includes('.rpt') || c1.includes('Page')) break;

    // ── SP row (Parent) ──
    if (/^SP\d+-\d+$/i.test(c1)) {
      // Customer format: "(AD-00583) ร้าน อุสมานโกตาบารู"
      const custRaw = String(r[2] || '').trim();
      const custMatch = custRaw.match(/^\(([^)]+)\)\s*(.*)/);
      const custId = custMatch ? custMatch[1] : '';
      const custName = custMatch ? custMatch[2] : custRaw;

      currentSP = {
        sp_no: c1,
        date: fmtDate(r[1]) || '',
        cust_id: custId,
        cust_name: custName,
        amount: Number(r[4]) || 0,
        cash: Number(r[4]) || 0,       // col 5 = เงินสด
        transfer: Number(r[5]) || 0,   // col 6 = โอน
        cheque: Number(r[6]) || 0,     // col 7 = เช็ค
        total: Number(r[6]) || 0,      // col 7 rightmost
        bills: [],                      // child bills ที่ตัด
        match_status: 'pending',
      };
      // บาง SP มี total ที่ col 5 แทน col 7
      if (!currentSP.total) currentSP.total = currentSP.amount;
      newPayments.push(currentSP);
      count++;
      continue;
    }

    // ── Child row (บิลที่ตัด) ──
    // Format: SS/OS/SR/OR/JR/SC/JS number in col 1, doc type in col 5, amount in col 6
    if (/^(SS|OS|SR|OR|JR|SC|JS)\d+-\d+$/i.test(c1) && currentSP) {
      const billNo = c1;
      // อาจมี original SO reference ที่ col 2
      const origRef = String(r[1] || '').trim();
      const hasOrigRef = /^(SO|SI)\d+-\d+$/i.test(origRef);

      const billDate = fmtDate(hasOrigRef ? r[2] : r[2]) || '';
      const dueDate = fmtDate(r[3]) || '';
      const docType = String(r[4] || '').trim();
      const amount = Number(r[5]) || 0;

      currentSP.bills.push({
        bill_no: billNo,
        orig_ref: hasOrigRef ? origRef : '',
        bill_date: billDate,
        due_date: dueDate,
        doc_type: docType,
        amount: amount,
      });
      childCount++;
    }
  }

  paymentList = paymentList.concat(newPayments);
  
  // ── Link SP กับ Bill List — mark บิลที่ถูกตัดว่า 'paid' ──
  let linkedCount = 0;
  newPayments.forEach(sp => {
    (sp.bills || []).forEach(childBill => {
      const billIdx = billList.findIndex(b => b.bill_no === childBill.bill_no);
      if (billIdx >= 0) {
        billList[billIdx].match_status = 'paid';
        billList[billIdx].paid_by_sp = sp.sp_no;
        billList[billIdx].pay_date = sp.date;
        linkedCount++;
      }
    });
  });
  
  // ── Auto-detect SP-TEMP ที่น่าจะเป็นตัวเดียวกันกับ SP ที่เพิ่ง import ──
  // ถ้า TEMP มี cust_id + amount เหมือน SP จริงที่เพิ่งมา → propose merge
  const tempsToMerge = [];
  const realSPs = newPayments.filter(p => !p.is_temp);
  paymentList.filter(p => p.is_temp || /^SP-TEMP-/.test(p.sp_no)).forEach(tempSp => {
    const match = realSPs.find(realSp => 
      realSp.cust_id === tempSp.cust_id &&
      Math.abs(Number(realSp.total) - Number(tempSp.total)) < 1 &&
      Math.abs((parseThaiDate(realSp.date)||0) - (parseThaiDate(tempSp.date)||0)) < 3 * 86400000 // ต่างไม่เกิน 3 วัน
    );
    if (match) {
      tempsToMerge.push({ temp: tempSp, real: match });
    }
  });
  
  persistMainState();
  toast(`นำเข้า SP สำเร็จ — ${count} SP, ${childCount} บิลที่ตัด${linkedCount?`, เชื่อมกับ Bill List ${linkedCount} บิล`:''}`, 'success');
  
  // แจ้งเตือน merge candidates
  if (tempsToMerge.length > 0) {
    setTimeout(() => showSpMergeDialog(tempsToMerge), 600);
  }
  
  if (currentPage === 'payments') navigateTo('payments');
}

// ── Dialog เสนอ merge SP-TEMP กับ SP จริง ──
function showSpMergeDialog(candidates) {
  openModal(`🔗 พบ SP ชั่วคราวที่ตรงกับ SP ที่เพิ่ง import`, `
    <div class="flex-col gap-3">
      <p class="text-sm text-dim">ระบบพบว่า SP-TEMP ต่อไปนี้ น่าจะเป็นตัวเดียวกับ SP จริงที่เพิ่ง import มา (ลูกค้าเดียวกัน ยอดใกล้เคียง วันที่ใกล้กัน) — ต้องการรวมหรือไม่?</p>
      <div style="max-height:350px;overflow-y:auto;border:1px solid var(--border);border-radius:8px">
        ${candidates.map((c, i) => `
          <div class="flex justify-between items-center" style="padding:12px;border-bottom:1px solid var(--border)">
            <div style="flex:1">
              <div class="text-sm">
                <span class="badge badge-warn">${c.temp.sp_no}</span>
                → <span class="badge badge-success">${c.real.sp_no}</span>
              </div>
              <div class="text-xs text-muted" style="margin-top:4px">
                ${c.temp.cust_name} · ฿${fmtNum(c.real.total)} · ${fmtDate(c.real.date)}
              </div>
            </div>
            <label class="flex items-center gap-2">
              <input type="checkbox" class="sp-merge-cb" data-idx="${i}" checked>
              <span class="text-xs">รวม</span>
            </label>
          </div>
        `).join('')}
      </div>
      <div class="flex gap-2 mt-2">
        <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ข้าม</button>
        <button class="btn btn-primary btn-sm flex-1" id="sp-merge-confirm">${ICONS.check} รวม SP ที่เลือก</button>
      </div>
    </div>
  `);
  
  document.getElementById('sp-merge-confirm')?.addEventListener('click', () => {
    const checkedIdxs = Array.from(document.querySelectorAll('.sp-merge-cb:checked')).map(cb => Number(cb.dataset.idx));
    let merged = 0;
    checkedIdxs.forEach(i => {
      const { temp, real } = candidates[i];
      // ลบ temp SP + อัปเดต billList ที่ผูก temp → real
      billList.forEach(b => {
        if (b.paid_by_sp === temp.sp_no) { b.paid_by_sp = real.sp_no; }
      });
      const tempIdx = paymentList.indexOf(temp);
      if (tempIdx >= 0) paymentList.splice(tempIdx, 1);
      merged++;
    });
    persistMainState();
    closeModal();
    toast(`รวม SP-TEMP ${merged} รายการเข้ากับ SP จริงสำเร็จ`, 'success');
    if (currentPage === 'payments') navigateTo('payments');
  });
}

// ── Generate Bill List จาก Smart Excel ──
function generateBillList(result, fileName) {
  const newBills = [];
  let smartCount = 0, posCount = 0, mainCount = 0;

  // ── 1. อ่าน Smart bills (SS/OS/SR/OR/SC/SP) — รองรับทุกชื่อ Sheet ──
  // ขั้นที่ 1: ลองหา sheet ที่มีชื่อตรงเป๊ะก่อน
  let smartSheetName = result.sheetNames.find(n => /^(ss|or|sr|os).*(or|sr|os|ss)/i.test(n.replace(/\s+/g,'')));
  
  // ขั้นที่ 2: ถ้าไม่เจอ → scan ทุก sheet หาที่มี bill pattern SS/OS/SR/OR ใน col แรก
  if (!smartSheetName) {
    for (const name of result.sheetNames) {
      const sh = result.sheets[name] || [];
      // ตรวจ 20 แถวแรกว่ามีเลขบิลไหม
      const hasBills = sh.slice(0, 30).some(row => {
        const c0 = String((row||[])[0] || '').trim().toUpperCase();
        return /^(SS|OS|SR|OR|SC|SP|JS|JR)\d+-\d+/.test(c0);
      });
      if (hasBills) { smartSheetName = name; break; }
    }
  }
  
  const smartSheet = smartSheetName ? (result.sheets[smartSheetName] || []) : [];
  
  if (!smartSheetName) {
    toast('ไม่พบข้อมูลบิลในไฟล์ (ต้องมี SS/OS/SR/OR/SC/SP)', 'error');
    return;
  }

  // หา header row (ที่มีคอลัมน์ Amount/Bill) — ถ้าไม่เจอก็ไม่เป็นไร จะ skip แถวที่ไม่ใช่บิลเอง
  let smartHdr = -1;
  for (let i = 0; i < Math.min(10, smartSheet.length); i++) {
    const row = smartSheet[i] || [];
    if (row.some(c => String(c).toLowerCase().includes('amount')) || row.some(c => String(c).toLowerCase().includes('bill'))) {
      smartHdr = i; break;
    }
  }
  const startRow = smartHdr >= 0 ? smartHdr + 1 : 0;

  for (let i = startRow; i < smartSheet.length; i++) {
    const r = smartSheet[i] || [];
    const billNo = String(r[0] || '').trim();
    if (!billNo) continue;
    
    // Skip non-bill rows (เช่น "พนักงานขาย : ไม่ได้กำหนด")
    if (!/^(SS|OS|SR|OR|SC|SP|JS|JR)\d+-\d+/i.test(billNo)) continue;

    // Amount Incl VAT (col 8) หรือ col สุดท้าย
    const amount = Number(r[8]) || Number(r[6]) || 0;
    const customer = String(r[2] || '').replace(/^\[[^\]]+\]/, '').replace(/\n/g,' ').trim();
    const date = fmtDate(r[3]) || todayISO();

    const bill = transformBill(billNo, amount, customer, date);
    if (bill) {
      newBills.push(bill);
      smartCount++;
    }
  }

  // ── 2. อ่าน "Main" sheet — POS Front1-4 transactions ──
  const mainSheetName = result.sheetNames.find(n => n.toLowerCase().includes('main')) || 'Main';
  const mainSheet = result.sheets[mainSheetName] || [];

  // หา header row "Bill Number"
  let mainHdr = -1;
  for (let i = 0; i < Math.min(20, mainSheet.length); i++) {
    const row = mainSheet[i] || [];
    if (row.some(c => String(c).includes('Bill Number'))) {
      mainHdr = i; break;
    }
  }
  if (mainHdr >= 0) {
    for (let i = mainHdr + 1; i < mainSheet.length; i++) {
      const r = mainSheet[i] || [];
      const billNo = String(r[0] || '').trim();
      const date = r[1];
      const station = String(r[2] || '').trim();
      const type = String(r[3] || '').trim();
      const amount = Number(r[4]) || 0;
      const remarks1 = String(r[7] || '').trim();
      const remarks2 = String(r[8] || '').trim();

      if (!amount && !billNo) continue;
      if (!station && !billNo) continue;

      // ถ้ามีเลขบิล Smart → transform ตาม rule
      if (billNo && /^(SS|SC|SR|OS|OR|SP)/i.test(billNo)) {
        const bill = transformBill(billNo, amount, remarks1, fmtDate(date));
        if (bill) {
          bill.remarks1 = remarks1;
          bill.remarks2 = remarks2;
          if (type) bill.type = type; // ใช้ type จาก Main ถ้ามี
          bill.source_date = bill.date; // stamp for multi-day matching
          newBills.push(bill);
          posCount++;
        }
      } else {
        // POS transaction (Front1-4) — ไม่มีเลขบิล
        newBills.push({
          bill_no: billNo || '',
          date: fmtDate(date) || todayISO(),
          source_date: fmtDate(date) || todayISO(),
          station: station,
          type: type || '',
          amount: amount,
          confirmation: String(r[5] || ''),
          pay_date: fmtDate(r[6]) || '',
          remarks1: remarks1,
          remarks2: remarks2,
          bank: '',
          due_date: '',
          match_status: 'pending',
          source: 'pos',
        });
        mainCount++;
      }
    }
  }

  // ── 3. (ยกเลิก) ไม่ import summary rows แล้ว — ผู้ใช้จะกรอกเองในตาราง Summary ด้านบน ──

  // รวมกับของเดิม (ไม่ทับ) — รองรับดึงหลายวัน
  const existingKeys = new Set(billList.map(b => b.bill_no).filter(Boolean));
  const uniqueNewBills = newBills.filter(b => !b.bill_no || !existingKeys.has(b.bill_no));
  const duplicateCount = newBills.length - uniqueNewBills.length;
  billList = billList.concat(uniqueNewBills);
  persistMainState();
  
  // ── ตรวจสอบบิลซ้ำหลัง import ──
  const dupes = findDuplicateBills();
  
  let msg = `Generate สำเร็จ — ${uniqueNewBills.length} รายการใหม่`;
  if (duplicateCount > 0) msg += ` (ข้าม ${duplicateCount} ที่ซ้ำ)`;
  toast(msg, 'success');
  
  if (dupes.length > 0) {
    setTimeout(() => toast(`⚠️ พบบิลซ้ำ ${dupes.length} กลุ่ม — กด "🔍 ตรวจสอบ" เพื่อดูรายละเอียด`, 'warn'), 800);
  }

  if (currentPage === 'main' || currentPage === 'billlist') navigateTo('main');
}

// ── Transform เลขบิล → Station + Type ──
function transformBill(billNo, amount, customer, date) {
  const no = String(billNo).toUpperCase().trim();
  if (!no) return null;

  let station = '', type = '', stationOptions = null;
  let dueDate = '';

  if (no.startsWith('SC')) {
    station = 'Invoice Credit';
    type = 'Refund';
    stationOptions = ['Invoice', 'Invoice Credit']; // SC เลือกได้ 2 อย่าง
  } else if (no.startsWith('SR')) {
    station = 'Invoice Credit';
    type = 'Unknown';
    // Auto Due Date = วันที่ 20 เดือนถัดไป
    dueDate = calcNextMonth20(date);
  } else if (no.startsWith('OR')) {
    station = 'Order Credit';
    type = 'Unknown';
    dueDate = calcNextMonth20(date);
  } else if (no.startsWith('SS')) {
    station = 'Invoice';
    type = ''; // ให้กรอกเอง
  } else if (no.startsWith('OS')) {
    station = 'Order';
    type = '';
  } else if (no.startsWith('SP')) {
    station = 'Payment';
    type = '';
  } else {
    return null;
  }

  return {
    bill_no: billNo,
    date: date || todayISO(),
    source_date: date || todayISO(),
    station: station,
    type: type,
    amount: amount,
    confirmation: '',
    pay_date: '',
    remarks1: customer || '',
    remarks2: '',
    bank: '',
    due_date: dueDate,
    match_status: 'pending',
    source: 'smart',
    station_options: stationOptions, // SC → dropdown
  };
}

// คำนวณวันที่ 20 เดือนถัดไปจาก bill_date (สำหรับ Auto Due Date)
function calcNextMonth20(dateStr) {
  if (!dateStr) return '';
  const iso = toISODate(dateStr);
  if (!iso) return '';
  // Parse yyyy-mm-dd เป็น local date ตรงๆ (ไม่ผ่าน new Date(isoString) เพราะจะโดน UTC shift)
  const parts = iso.split('-');
  if (parts.length !== 3) return '';
  const y = Number(parts[0]);
  const m = Number(parts[1]) - 1;
  // วันที่ 20 เดือนถัดไป
  const next = new Date(y, m + 1, 20);
  if (isNaN(next)) return '';
  return `${next.getFullYear()}-${String(next.getMonth()+1).padStart(2,'0')}-${String(next.getDate()).padStart(2,'0')}`;
}

// ── Main Page State (persistent across renders) ──
let mainSummary = {
  // Summary rows values (กรอกเอง — POS Front1-4)
  // Key format: "row_station" e.g. "cashIn_Front1"
};
let cashCount = {
  // NEW: เก็บต่อวันที่ — __byDate[dateISO] = { denomination_Station: count }
  // เดิม: flat { denomination_Station: count } ทั่วไป (ทุกวันใช้ร่วมกัน)
  __byDate: {},
};
const DENOMINATIONS = [1000, 500, 100, 50, 20, 10, 5, 1];

// ── Helper: ดึง/สร้าง cash count dict ของวันที่ระบุ ──
function getCashForDate(dateISO) {
  if (!cashCount.__byDate) cashCount.__byDate = {};
  if (!cashCount.__byDate[dateISO]) cashCount.__byDate[dateISO] = {};
  return cashCount.__byDate[dateISO];
}

// ── Migrate: ถ้ามีข้อมูลเก่า (flat structure) ย้ายไปเป็นของวันนี้ ──
(function migrateCashCount() {
  if (!cashCount.__byDate) cashCount.__byDate = {};
  var flatKeys = Object.keys(cashCount).filter(function(k) {
    return k !== '__byDate' && /^\d+_/.test(k);  // pattern: "1000_Front1"
  });
  if (flatKeys.length > 0) {
    var todayKey = new Date().toISOString().slice(0, 10);
    if (!cashCount.__byDate[todayKey]) cashCount.__byDate[todayKey] = {};
    flatKeys.forEach(function(k) {
      cashCount.__byDate[todayKey][k] = cashCount[k];
      delete cashCount[k];
    });
  }
})();

// ── Render Main Page (Summary + Bill List + Change Counting) ──
async function renderMain(el) {
  let filterStation = 'ALL';
  let filterType = 'ALL';
  let filterMatch = 'ALL';  // ALL | unmatched | matched | pending
  let filterBillSearch = ''; // ค้นหาเลขบิล/confirmation/remarks
  let filterDateFrom = '';
  let filterDateTo = '';
  let hidePaid = false;
  let showChange = false;
  let selectedDate = todayISO();

  const TYPE_OPTIONS = ['', 'Cash', 'Transfer', 'Card', 'Cheque', 'Other', 'Unknown', 'Refund'];
  const STATION_OPTIONS = ['', 'Front1', 'Front2', 'Front3', 'Front4', 'Invoice', 'Invoice Credit', 'Order', 'Order Credit', 'Payment'];
  const SUMMARY_STATIONS = ['Front1', 'Front2', 'Front3', 'Front4', 'Invoice', 'Order', 'Payment', 'Invoice Credit', 'Order Credit'];

  // ══════════════════════════════════════════════════════════════
  // PERFORMANCE FIX: Cache bills filtered by selectedDate
  // Previously calcSales/calcCashFromBills filtered entire billList (8000+ rows)
  // every time — causing Sum calculation to use all dates (negative Sum) and
  // making the page extremely slow.
  // ══════════════════════════════════════════════════════════════
  let _billsForSelectedDateCache = null;
  let _billsForSelectedDateCacheKey = null;
  
  function getBillsForSelectedDate() {
    const cacheKey = selectedDate + '|' + billList.length;
    if (_billsForSelectedDateCacheKey === cacheKey && _billsForSelectedDateCache) {
      return _billsForSelectedDateCache;
    }
    _billsForSelectedDateCacheKey = cacheKey;
    _billsForSelectedDateCache = billList.filter(b => toISODate(b.date) === selectedDate);
    return _billsForSelectedDateCache;
  }
  
  function invalidateBillsCache() {
    _billsForSelectedDateCache = null;
    _billsForSelectedDateCacheKey = null;
  }

  // ══════════════════════════════════════════════════════════════
  // Business Rule: บิลที่ "ใช้ลิ้นชักเงินสดร่วมกัน" (ชำระเป็นเงินสด แล้วเงินเข้าลิ้นชัก)
  // ══════════════════════════════════════════════════════════════
  // SS = Invoice (ขายเงินสด มี VAT)
  // OS = Order (ขายเงินสด ไม่มี VAT)
  // SP = Payment (ตัดชำระลูกหนี้)
  // SC = Invoice + Credit CN (เครดิตโน้ต + ใบกำกับ)
  // JS = Order CN
  // บิลเหล่านี้ถ้า type=Cash → นับรวมเป็น Cash Drawer ของ station นั้น
  const CASH_DRAWER_BILL_TYPES = ['SS', 'OS', 'SP', 'SC', 'JS'];
  const isCashDrawerBill = (billNo) => {
    if (!billNo) return false;
    const up = String(billNo).toUpperCase();
    return CASH_DRAWER_BILL_TYPES.some(t => up.startsWith(t));
  };

  // ── คำนวณเงินสดในลิ้นชัก ต่อ station ──
  // รวมบิลที่ (station ตรง, type=Cash, bill_no เริ่มด้วย SS/OS/SP/SC/JS หรือไม่มี bill_no)
  // fallback → mainSummary['cashDrawer_*'] (กรณีข้อมูล import ที่ไม่มีบิล Cash แยก)
  function calcCashFromBills(station) {
    // Priority 1: user นับธนบัตรแล้ว → ใช้ยอดนั้น (เป็น ground truth)
    const countedCash = calcCashDrawer(station);
    if (countedCash > 0) return countedCash;
    
    // Priority 2: รวมจากบิล Cash
    var fromBills = getBillsForSelectedDate().filter(b => {
      const st = (b.station || '').trim();
      const ty = (b.type || '').trim();
      const no = b.bill_no || '';
      return st === station && ty === 'Cash' && (isCashDrawerBill(no) || !no);
    }).reduce((s, b) => s + (Number(b.amount) || 0), 0);
    
    if (fromBills !== 0) return fromBills;
    
    // Priority 3: mainSummary fallback (import จาก JSON)
    return Number(mainSummary['cashDrawer_' + station]) || 0;
  }
  function calcAutoValue(type, station) {
    // Transfer/Card/Cheque/Refund row: รวมเฉพาะบิลที่ matched แล้ว
    // → Sum row จะโชว์ diff ทันทีถ้ามีบิลยังไม่ match
    return getBillsForSelectedDate().filter(b => {
      const st = (b.station || '').trim();
      const ty = (b.type || '').trim();
      if (st !== station || ty !== type) return false;
      // Filter: เฉพาะบิลที่ match แล้ว (matched, paid, paid_by_sp)
      const isMatched = b.match_status === 'matched' || b.match_status === 'paid' || b.paid_by_sp;
      return isMatched;
    }).reduce((s, b) => s + (Number(b.amount) || 0), 0);
  }

  // คำนวณ ยอดขาย (Sales) row
  // Invoice/Order/Payment/Credit → SUMIFS จาก bills เสมอ
  // Front1-4 → 
  //   1) ใช้ mainSummary['sales_Front*'] ถ้า user กรอก หรือ import มาได้
  //   2) Fallback: รวมจาก bills ที่ station=Front* (ยกเว้นบิล type=Transfer ที่เป็น Invoice cross-station)
  //      เพราะ mainSummary อาจ import มาไม่ครบทุกวัน
  function calcSales(station) {
    if (['Invoice', 'Invoice Credit', 'Order', 'Order Credit', 'Payment'].includes(station)) {
      return getBillsForSelectedDate().filter(b => (b.station || '').trim() === station)
        .reduce((s, b) => s + (Number(b.amount) || 0), 0);
    }
    // Front1-4: ใช้ mainSummary ถ้ามี → ไม่งั้น sum จาก bills
    var fromSummary = Number(mainSummary['sales_' + station]) || 0;
    if (fromSummary !== 0) return fromSummary;
    // Fallback: sum bills ของ station นี้
    return getBillsForSelectedDate().filter(b => (b.station || '').trim() === station)
      .reduce((s, b) => s + (Number(b.amount) || 0), 0);
  }

  // คำนวณยอดรวมธนบัตรใน Cash Drawer
  function calcCashDrawer(station) {
    const dayCash = getCashForDate(selectedDate);
    return DENOMINATIONS.reduce((s, d) => s + d * (Number(dayCash[d + '_' + station]) || 0), 0);
  }

  // ── Sum check: เงินเข้า vs เงินออก ──
  // Formula ตาม Excel template (row 12):
  //
  //   Front1-4:   diff = SUM(Cx7:Cx11) - SUM(Cx3:Cx6)  (per station)
  //               = outflow - inflow ของ station นั้น
  //
  //   Invoice:    diff = SUM(G7, G8:I11) - SUM(G4:I4)
  //               = รวม outflow ของ Invoice+Order+Payment (G+H+I cols, row 7-11)
  //                 - รวม sales ของ Invoice+Order+Payment (G+H+I cols, row 4)
  //               ← รวม 3 stations เพราะเงินไหลถึงกัน (Order + Payment = child ของ Invoice)
  //
  //   Invoice Credit, Order Credit: diff = SUM(J5:J11) - J4
  //                                 = outflow - sales ของ credit นั้น
  //
  // ── อ่านข้อมูล summary จาก __byDate ก่อน → flat key → 0 ──
  function _getSummaryValue(field, station) {
    // field: 'cashIn' | 'sales' | 'cashOut' | 'returns' | ...
    // station: 'Front1' | ...
    // 1) ลอง flat key ก่อน (ถูก set ตอน date change)
    const flat = Number(mainSummary[field + '_' + station]);
    if (!isNaN(flat) && flat !== 0) return flat;
    // 2) Fallback: __byDate[selectedDate][thLabel][station]
    const labelMap = { cashIn: 'นำเงินเข้า', sales: 'ยอดขาย', cashOut: 'นำเงินออก', 
                       returns: 'ยอดคืนสินค้า', cashDrawer: 'Cash Drawer',
                       transfer: 'Transfer', card: 'Card', cheque: 'Cheque', refund: 'Refund' };
    const thLabel = labelMap[field];
    if (thLabel && mainSummary.__byDate && mainSummary.__byDate[selectedDate]) {
      const dayData = mainSummary.__byDate[selectedDate][thLabel];
      if (dayData && dayData[station] != null) return Number(dayData[station]) || 0;
    }
    return 0;
  }
  
  function calcSumCheck(station) {
    // ═══════════════════════════════════════════════════════════
    // Sum Check — ตาม Excel formula row 12
    //
    // Source-of-truth: summary data (patched จาก Excel row 3-11 ตรงๆ)
    // ใช้ bills-based calc เป็น fallback เมื่อ summary ว่างเท่านั้น
    // ═══════════════════════════════════════════════════════════
    
    // ── Helper: ดึงค่า outflow rows จาก summary ก่อน → fallback bills ──
    const summaryRow = (label, st) => {
      // ดูจาก __byDate ก่อน (ถ้ามี)
      if (mainSummary.__byDate && mainSummary.__byDate[selectedDate]) {
        const labelObj = mainSummary.__byDate[selectedDate][label];
        if (labelObj && typeof labelObj === 'object') {
          // dict มีอยู่ = แปลว่า วันนี้มีข้อมูล
          // ถ้า station ไม่อยู่ใน dict = 0 (ไม่ใช่ null/ไม่มีข้อมูล)
          return Number(labelObj[st]) || 0;
        }
        // dict ไม่มี (เช่น ไม่มี key 'Refund' เลย)
        return null;
      }
      return null; // ไม่มี summary วันนี้เลย
    };
    
    const summaryOrBills = (label, billType, st) => {
      const s = summaryRow(label, st);
      if (s !== null && s !== 0) return s; // summary มีค่า (ไม่ใช่ 0) → ใช้เลย
      // summary = 0 หรือ null → ลอง bills ก่อน
      if (billType === 'Cash') {
        const bv = calcCashFromBills(st);
        if (bv) return bv;
      } else {
        const bv = calcAutoValue(billType, st);
        if (bv) return bv;
      }
      // bills ก็ไม่มี → ใช้ summary (0) หรือ 0
      return s !== null ? s : 0;
    };
    
    const summaryOrZero = (label, st) => {
      const s = summaryRow(label, st);
      return s !== null ? s : 0;
    };
    
    // ══════════════════════════════════════════════════════════════
    // สูตรเดียวสำหรับทุก Station (ตามที่ user กำหนด):
    //   Cash Drawer ที่แสดง = raw − นำเงินเข้า  (ปรับในช่อง display แล้ว)
    //   
    //   incomeSide    = ยอดขาย + ยอดคืนสินค้า
    //   accountedSide = Cash Drawer (adjusted) + Transfer + Card + Cheque + Refund + นำเงินออก
    //   diff = accountedSide − incomeSide
    //     < 0 → เงินขาด 🔴 (รอโอน/card/cheque มาเติมให้ถึง 0)
    //     > 0 → เงินเกิน 🟡 (ลิ้นชัก/ยอด match มากกว่าที่ควร)
    //     = 0 → OK ✅
    //
    // ก่อน auto matching: Transfer/Card/Cheque/Refund = 0 → diff = ลบ (เงินขาด)
    // หลัง matching ครบ: diff → 0
    //
    // Note: Transfer/Card/Cheque/Refund ใช้เฉพาะ matched bills (xlsm SUMIFS with F<>"")
    // ══════════════════════════════════════════════════════════════
    
    // Helper: รวมค่าจาก 3 stations (Invoice+Order+Payment) ถ้า station='Invoice', ไม่งั้น 1 station
    const stationsFor = (st) => (st === 'Invoice') ? ['Invoice', 'Order', 'Payment'] : [st];
    
    const sumStations = (fn) => stationsFor(station).reduce((s, st) => s + fn(st), 0);
    
    // Drawer RAW (รวม cashIn)
    let drawerRaw = 0;
    if (station === 'Invoice') {
      const countedCash = calcCashDrawer('Invoice');
      drawerRaw = countedCash > 0 
        ? countedCash 
        : (summaryOrZero('Cash Drawer', 'Invoice') || ['Invoice','Order','Payment'].reduce((s,st)=>s+calcCashFromBills(st), 0));
    } else {
      drawerRaw = summaryOrBills('Cash Drawer', 'Cash', station);
    }
    
    // cashIn, cashOut, returns, sales
    const cashIn = sumStations(st => _getSummaryValue('cashIn', st));
    const cashOut = sumStations(st => _getSummaryValue('cashOut', st));
    const returns = sumStations(st => _getSummaryValue('returns', st));
    // sales: ใช้ calcSales() ตรงๆ (รู้วิธีเลือก summary/bills ตาม station แล้ว)
    //   - Front1-4: flat summary ก่อน → fallback bills
    //   - Invoice/Order/Payment/IC/OC: bills ของวันนั้นเสมอ
    // ก่อนหน้านี้ใช้ summaryRow() → bug: labelObj['Invoice']=undefined → return 0 → ไม่ fallback
    let sales = 0;
    stationsFor(station).forEach(st => {
      sales += calcSales(st);
    });
    
    // Drawer adjusted = raw − cashIn (ใช้ค่าเดียวกับ display)
    const drawer = drawerRaw - cashIn;
    
    // Transfer/Card/Cheque/Refund: ใช้เฉพาะ matched bills
    const transfer = sumStations(st => calcAutoValue('Transfer', st));
    const card = sumStations(st => calcAutoValue('Card', st));
    const cheque = sumStations(st => calcAutoValue('Cheque', st));
    const refund = sumStations(st => calcAutoValue('Refund', st));
    
    // สูตร
    const incomeSide = sales + returns;
    const accountedSide = drawer + transfer + card + cheque + refund + cashOut;
    
    if (!incomeSide && !accountedSide && !drawerRaw && !sales) return { diff: 0, isOk: null, empty: true };
    
    // diff = accountedSide − incomeSide
    //   ก่อน match → ลบ (เงินขาด)
    //   หลัง match ครบ → 0
    //   เกิน → บวก
    // สูตรเดียวใช้ได้หมดรวม Invoice Credit / Order Credit
    // (IC = หนี้ที่เราต้องจ่าย: ก่อนจ่าย sales>0, accounted=0 → diff ลบ = ยังค้างจ่าย ✓)
    // (OC = ลูกค้าค้างจ่าย: ก่อนรับ sales>0, accounted=0 → diff ลบ = ยังรอรับเงิน ✓)
    const diff = accountedSide - incomeSide;
    
    return { diff, isOk: Math.abs(diff) < 1.0, empty: false };
  }

  function render() {
    // ── FIX: Sync summary flat keys กับ selectedDate ก่อนเสมอ ──
    // ไม่งั้น flat keys จากวันเก่าจะค้างแสดง
    (function syncSummaryToSelectedDate() {
      // 1. Clear all flat keys (เก็บแค่ __byDate)
      Object.keys(mainSummary).forEach(k => {
        if (k === '__byDate') return;
        if (k.includes('_')) delete mainSummary[k];
      });
      // 2. Load from __byDate[selectedDate] ถ้ามี
      if (mainSummary.__byDate && mainSummary.__byDate[selectedDate]) {
        const LABEL_MAP = {
          'นำเงินเข้า': 'cashIn', 'ยอดขาย': 'sales', 'นำเงินออก': 'cashOut',
          'ยอดคืนสินค้า': 'returns', 'Cash Drawer': 'cashDrawer',
          'Transfer': 'transfer', 'Card': 'card', 'Cheque': 'cheque', 'Refund': 'refund',
        };
        const sum = mainSummary.__byDate[selectedDate];
        Object.entries(sum).forEach(([thLabel, stations]) => {
          const prefix = LABEL_MAP[thLabel];
          if (!prefix || !stations || typeof stations !== 'object') return;
          ['Front1', 'Front2', 'Front3', 'Front4', 'Invoice', 'Order', 'Payment', 'Invoice Credit', 'Order Credit'].forEach(st => {
            const val = stations[st];
            if (val != null && val !== 0) mainSummary[prefix + '_' + st] = val;
          });
        });
      }
    })();
    
    // ── Filter bill list ──
    let data = billList;
    
    // ── PERF: If > 200 bills and no explicit date range → default to selectedDate only ──
    // ป้องกันค้างเมื่อมีข้อมูลย้อนหลังหลายพันบิล
    // (เมื่อค้นหา → ค้นทั้ง billList ไม่จำกัดเฉพาะวันที่เลือก)
    if (billList.length > 200 && !filterDateFrom && !filterDateTo && !filterBillSearch) {
      data = getBillsForSelectedDate();
    }
    
    if (filterStation !== 'ALL') data = data.filter(b => b.station === filterStation);
    if (filterType !== 'ALL') data = data.filter(b => b.type === filterType);
    if (hidePaid) data = data.filter(b => b.match_status !== 'paid');
    
    // ── Filter by match status ──
    //   "ยังไม่ match" = Type ใน [Transfer, Card, Cheque, Refund] หรือ Type ว่าง
    //   (Type=Cash ไม่ต้อง match — ไม่แสดงในกลุ่มนี้ เพราะ auto matched แล้ว)
    const MATCHABLE_TYPES_FILTER = ['Transfer', 'Card', 'Cheque', 'Refund', '', null, undefined];
    const isUnmatchedCandidate = (b) => {
      const isMatched = b.match_status === 'matched' || b.match_status === 'paid';
      const isVoid = b.match_status === 'void';
      if (isMatched || isVoid) return false;
      return MATCHABLE_TYPES_FILTER.includes(b.type || '');
    };
    
    if (filterMatch === 'unmatched') {
      data = data.filter(isUnmatchedCandidate);
    } else if (filterMatch === 'matched') {
      data = data.filter(b => b.match_status === 'matched' || b.match_status === 'paid');
    } else if (filterMatch === 'pending') {
      data = data.filter(b => !b.match_status || b.match_status === 'pending');
    }
    
    // Filter by date range (overrides default filter)
    if (filterDateFrom || filterDateTo) {
      data = billList;
      if (filterStation !== 'ALL') data = data.filter(b => b.station === filterStation);
      if (filterType !== 'ALL') data = data.filter(b => b.type === filterType);
      if (hidePaid) data = data.filter(b => b.match_status !== 'paid');
      data = data.filter(b => {
        const bd = toISODate(b.date);
        if (!bd) return true;
        if (filterDateFrom && bd < filterDateFrom) return false;
        if (filterDateTo && bd > filterDateTo) return false;
        return true;
      });
    }
    
    // ── Filter by bill search (ค้นหาเลขบิล/confirmation/remarks/amount) ──
    // ค้นได้ทั้งบิลทั้งหมด ไม่จำกัดวันที่ (ถ้า user ไม่ได้ set date range)
    if (filterBillSearch) {
      // ถ้าไม่มี date range → ใช้ billList ทั้งหมดเป็น source (ไม่จำกัด selectedDate)
      if (!filterDateFrom && !filterDateTo) {
        data = billList;
        if (filterStation !== 'ALL') data = data.filter(b => b.station === filterStation);
        if (filterType !== 'ALL') data = data.filter(b => b.type === filterType);
        if (hidePaid) data = data.filter(b => b.match_status !== 'paid');
        // Match status filter
        if (filterMatch === 'unmatched') data = data.filter(isUnmatchedCandidate);
        else if (filterMatch === 'matched') data = data.filter(b => b.match_status === 'matched' || b.match_status === 'paid');
        else if (filterMatch === 'pending') data = data.filter(b => !b.match_status || b.match_status === 'pending');
      }
      const q = filterBillSearch.toLowerCase().trim();
      data = data.filter(b => {
        const fields = [b.bill_no, b.confirmation, b.remarks1, b.remarks2, b.amount];
        return fields.some(f => String(f||'').toLowerCase().includes(q));
      });
    }

    const totalAmount = data.reduce((s, b) => b.match_status === 'void' ? s : s + (Number(b.amount) || 0), 0);
    const paidCount = billList.filter(b => b.match_status === 'paid').length;
    
    // นับบิลที่ยังไม่ match — ใช้กฎเดียวกับ filter
    const unmatchedCount = (billList.length > 200 && !filterDateFrom && !filterDateTo 
      ? getBillsForSelectedDate() 
      : billList).filter(isUnmatchedCandidate).length;
    
    // ── Sort bill list ──
    // Default: วันที่ ASC → Station canonical → Bill No
    // Toggle DESC: วันที่ DESC → Station canonical → Bill No (DESC)
    const BILL_STATION_ORDER = ['Front1','Front2','Front3','Front4','Invoice','Invoice Credit','Order','Order Credit','Payment','Cancel',''];
    const stationRank = (st) => {
      const i = BILL_STATION_ORDER.indexOf(st || '');
      return i === -1 ? 999 : i;
    };
    const _billOrder = getSortOrder('billList');
    data = [...data].sort((a, b) => {
      // 1) วันที่ก่อน (ASC หรือ DESC)
      const da = parseThaiDate(a.date) || 0;
      const db = parseThaiDate(b.date) || 0;
      if (da !== db) {
        return _billOrder === 'asc' ? da - db : db - da;
      }
      // 2) วันเดียวกัน → Station canonical order (คงที่ไม่ว่า asc/desc)
      const sa = stationRank(a.station);
      const sb = stationRank(b.station);
      if (sa !== sb) return sa - sb;
      // 3) station เดียวกัน → เรียงตาม bill_no
      const cmp = String(a.bill_no || '').localeCompare(String(b.bill_no || ''));
      return _billOrder === 'asc' ? cmp : -cmp;
    });
    
    // ── PERF: Cap table rendering to first 500 rows to prevent lag on massive datasets ──
    const MAX_VISIBLE_ROWS = 500;
    const totalDataCount = data.length;
    const truncated = data.length > MAX_VISIBLE_ROWS;
    const visibleData = truncated ? data.slice(0, MAX_VISIBLE_ROWS) : data;
    
    // Stations/types — เรียงตาม canonical order เสมอ (ไม่งั้น Front1 อาจกระโดดไปท้ายเพราะ Set ตาม first-seen)
    const STATION_ORDER = ['Front1','Front2','Front3','Front4','Invoice','Invoice Credit','Order','Order Credit','Payment','Cancel'];
    const TYPE_ORDER = ['Transfer','Cash','Card','Cheque','Refund','Unknown',''];
    const sortByOrder = (arr, order) => {
      const rank = (v) => { const i = order.indexOf(v); return i === -1 ? 999 : i; };
      return [...arr].sort((a, b) => rank(a) - rank(b));
    };
    const stations = billList.length < 10000 
      ? sortByOrder([...new Set(billList.map(b => b.station).filter(Boolean))], STATION_ORDER)
      : STATION_ORDER.slice(0, 9);
    const types = billList.length < 10000
      ? sortByOrder([...new Set(billList.map(b => b.type))], TYPE_ORDER)
      : TYPE_ORDER;

    el.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div class="page-title">Main — สรุปยอดรายวัน</div>
        <div class="flex gap-2 items-center flex-wrap">
          <div class="flex items-center" style="gap:4px">
            <button class="btn btn-outline btn-sm" id="main-date-prev" title="วันก่อนหน้า" style="padding:4px 10px;font-weight:700">◀</button>
            <input type="date" class="input" value="${selectedDate}" id="main-date" style="width:160px">
            <button class="btn btn-outline btn-sm" id="main-date-next" title="วันถัดไป" style="padding:4px 10px;font-weight:700">▶</button>
          </div>
          <button class="btn btn-primary btn-sm" id="btn-gen-smart">${ICONS.download} Smart (SS/OS/OR/SR)</button>
          <button class="btn btn-info btn-sm" id="btn-import-pos" style="background:var(--info);color:#fff">${ICONS.download} Front POS</button>
          <label class="btn btn-outline btn-sm" style="cursor:pointer" title="Import Daily JSON ที่ convert ไว้แล้ว (หลายวันรวด)">
            📅 Batch Import (JSON)
            <input type="file" id="btn-import-daily-json" accept=".json" style="display:none">
          </label>
          <button class="btn ${showChange?'btn-primary':'btn-outline'} btn-sm" id="btn-toggle-change">🪙 นับธนบัตร</button>
          <button class="btn btn-outline btn-sm" id="btn-check-issues">🔍 ตรวจสอบ</button>
          <button class="btn btn-success btn-sm" id="btn-save-main">${ICONS.check} บันทึก</button>
        </div>
      </div>
      
      ${(() => {
        const v = validateAll();
        if (v.errors.length === 0 && v.warnings.length === 0) {
          return `<div class="text-xs" style="padding:8px 12px;background:rgba(45,212,160,.08);border-radius:6px;color:var(--success);margin-bottom:12px">✓ ข้อมูลสมบูรณ์ พร้อมบันทึก</div>`;
        }
        return `<div class="text-xs" style="padding:8px 12px;background:${v.errors.length?'rgba(239,87,87,.08)':'rgba(245,166,35,.08)'};border-radius:6px;color:${v.errors.length?'var(--danger)':'var(--warn)'};margin-bottom:12px;cursor:pointer" id="val-status-bar">
          ${v.errors.length > 0 ? `🚨 ${v.errors.length} ข้อผิดพลาด` : ''}
          ${v.warnings.length > 0 ? `${v.errors.length?' · ':''}⚠️ ${v.warnings.length} คำเตือน` : ''}
          · <span style="text-decoration:underline">คลิกเพื่อดูรายละเอียด</span>
        </div>`;
      })()}

      <!-- ═══════ SECTION 1: Summary Table (ส่วนบน) ═══════ -->
      <div class="card-flat mb-3">
        <div class="table-wrap" style="overflow-x:auto">
          <table style="font-size:.82rem;min-width:1100px">
            <thead>
              <tr>
                <th style="min-width:110px;text-align:center;background:var(--surface3)">All Station</th>
                <th style="min-width:90px;text-align:center;background:var(--surface3)">รายการ</th>
                ${SUMMARY_STATIONS.map(s=>{
                  const cashier = mainSummary['cashier_'+s];
                  return `<th style="min-width:95px;text-align:center;background:var(--surface3)">
                    ${s}
                    ${cashier?`<div class="text-xs" style="font-weight:400;color:var(--text2);margin-top:2px">${cashier}</div>`:''}
                  </th>`;
                }).join('')}
              </tr>
            </thead>

  // ── renderKeepScroll: re-render หน้าโดย preserve scroll position ──
  // ใช้แทน render() หลังแก้ไขบิล/Add Bill/Bulk ops เพื่อไม่ให้ scroll เด้งขึ้นบน
  function renderKeepScroll() {
    // Defensive: ให้แน่ใจว่า Sum/calcs ใช้ข้อมูล bills ล่าสุด ไม่ใช่ cache
    invalidateBillsCache();
    
    // 1. Capture scroll positions จากทุก container ที่เป็นไปได้
    const scrollTargets = [
      { el: window, x: window.scrollX, y: window.scrollY },
      { el: document.documentElement, x: 0, y: document.documentElement.scrollTop },
      { el: document.body, x: 0, y: document.body.scrollTop },
    ];
    // Also capture any scrollable ancestor of el
    let node = el?.parentElement;
    while (node && node !== document.body) {
      const s = getComputedStyle(node);
      if ((s.overflowY === 'auto' || s.overflowY === 'scroll') && node.scrollHeight > node.clientHeight) {
        scrollTargets.push({ el: node, x: node.scrollLeft, y: node.scrollTop });
      }
      node = node.parentElement;
    }
    // Capture activeElement info (to restore focus)
    const activeId = document.activeElement?.id;
    const activeField = document.activeElement?.dataset?.field;
    const activeIdx = document.activeElement?.closest?.('tr')?.dataset?.idx;
    const activeSelStart = document.activeElement?.selectionStart;
    const activeSelEnd = document.activeElement?.selectionEnd;
    
    // 2. Render
    render();
    
    // 3. Restore in rAF (หลัง DOM อัปเดตแล้ว) — ใช้ 2x rAF เผื่อ browser paint
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        scrollTargets.forEach(t => {
          try {
            if (t.el === window) window.scrollTo(t.x, t.y);
            else { t.el.scrollLeft = t.x; t.el.scrollTop = t.y; }
          } catch(_) {}
        });
        // Restore focus
        try {
          let target = null;
          if (activeId) target = document.getElementById(activeId);
          else if (activeIdx != null && activeField) {
            target = document.querySelector(`tr[data-idx="${activeIdx}"] [data-field="${activeField}"]`);
          }
          if (target && typeof target.focus === 'function') {
            target.focus();
            if (activeSelStart != null && target.setSelectionRange) {
              try { target.setSelectionRange(activeSelStart, activeSelEnd); } catch(_) {}
            }
          }
        } catch(_) {}
      });
    });
  }

  // ── Helper: สร้าง row ที่กรอกเอง (cashIn, cashOut, returns) ──
  function buildSumRow(key, label, color, editable) {
    const vals = SUMMARY_STATIONS.map(s => Number(mainSummary[key+'_'+s]) || 0);
    const allSum = vals.reduce((a,b)=>a+b,0);
    // cashIn: Front1-4 + Invoice (Merged with Order/Payment), cashOut: Front1 + Invoice (Merged), returns: Front1-3 + Invoice (Merged)
    const allowedStations = {
      cashIn: ['Front1','Front2','Front3','Front4','Invoice','Order','Payment'],
      cashOut: ['Front1','Front2','Front3','Front4','Invoice','Order','Payment'],
      returns: ['Front1','Front2','Front3','Front4','Invoice','Order','Payment'],
    };
    const allowed = allowedStations[key] || [];
    
    const cellParts = [];
    SUMMARY_STATIONS.forEach((s, i) => {
      // Skip Order/Payment — merged into Invoice cell
      if (s === 'Order' || s === 'Payment') return;
      if (s === 'Invoice') {
        // รวม 3 stations (Invoice+Order+Payment) เป็น cell เดียว colspan=3 
        // เฉพาะถ้า Invoice allowed
        if (allowed.includes('Invoice')) {
          // Editable input โผล่ที่ Invoice (ใช้ key 'Invoice')
          cellParts.push(`<td colspan="3" style="background:rgba(91,124,250,.04);border-left:1px dashed var(--border);border-right:1px dashed var(--border)"><input class="input sum-cell" data-k="${key}_Invoice" type="number" value="${mainSummary[key+'_Invoice']||''}" step="0.01" placeholder="0" style="width:95%;padding:3px 6px;font-size:.78rem;text-align:center;border-color:${color}" title="รวม Invoice + Order + Payment"></td>`);
        } else {
          cellParts.push(`<td colspan="3"></td>`);
        }
        return;
      }
      // Other stations
      if (!allowed.includes(s)) {
        cellParts.push(`<td></td>`);
        return;
      }
      cellParts.push(`<td><input class="input sum-cell" data-k="${key}_${s}" type="number" value="${mainSummary[key+'_'+s]||''}" step="0.01" placeholder="0" style="width:95%;padding:3px 6px;font-size:.78rem;text-align:right;border-color:${color}"></td>`);
    });
    
    return `<tr>
      <td style="text-align:right;font-weight:700">${allSum?fmtNum(allSum):'-'}</td>
      <td style="font-weight:600;color:${color}">${label}</td>
      ${cellParts.join('')}
    </tr>`;
  }

  // ── Helper: Cash Drawer row ──
  //   Front1-4: EDITABLE input (แสดงค่า raw — ไม่หัก cashIn)
  //   Invoice + Order + Payment = merge cell เดียว (colspan=3, raw จากการนับธนบัตร)
  //   Invoice Credit / Order Credit: empty
  //   สูตร Sum จะหัก cashIn ภายในเอง (ไม่ยุ่งกับ display)
  function buildCashDrawerRow() {
    // Invoice merged: ถ้า user นับธนบัตร = ยอดรวม 3 stations, ไม่งั้น sum จาก bills
    const invoiceCountedCash = calcCashDrawer('Invoice');
    const mergedInvoiceTotal = invoiceCountedCash > 0 
      ? invoiceCountedCash 
      : ['Invoice','Order','Payment'].reduce((s, st) => s + calcCashFromBills(st), 0);
    
    // Per-station values (Front1-4) — raw
    const frontVals = ['Front1','Front2','Front3','Front4'].map(s => calcCashFromBills(s));
    const frontTotal = frontVals.reduce((a,b)=>a+b, 0);
    const allSum = frontTotal + mergedInvoiceTotal;
    
    const cells = [];
    SUMMARY_STATIONS.forEach(s => {
      if (s === 'Order' || s === 'Payment') return; // skip - handled by Invoice colspan
      if (s === 'Invoice') {
        // Merged cell colspan=3 (read-only — จากการนับธนบัตร)
        const v = mergedInvoiceTotal;
        cells.push(`<td colspan="3" data-drawer-station="Invoice" style="text-align:center;color:${v?'var(--purple)':'var(--text3)'};font-weight:${v?'700':'400'};border-left:1px dashed var(--border);border-right:1px dashed var(--border);background:rgba(91,124,250,.04)" title="รวม Invoice + Order + Payment (จากการนับธนบัตร)">${v?fmtNum(v):'-'}</td>`);
        return;
      }
      if (['Invoice Credit','Order Credit'].includes(s)) {
        cells.push('<td></td>');
        return;
      }
      // Front1-4 — EDITABLE input (เหมือนช่องนำเงินเข้า)
      const idx = ['Front1','Front2','Front3','Front4'].indexOf(s);
      const v = idx >= 0 ? frontVals[idx] : 0;
      cells.push(`<td><input class="input sum-cell" data-k="cashDrawer_${s}" type="number" value="${v||''}" step="0.01" placeholder="0" style="width:95%;padding:3px 6px;font-size:.78rem;text-align:right;border-color:var(--purple)"></td>`);
    });
    
    return `<tr>
      <td style="text-align:right;font-weight:700" data-drawer-total>${allSum?fmtNum(allSum):'-'}</td>
      <td style="font-weight:600;color:var(--purple)">🗃️ Cash Drawer</td>
      ${cells.join('')}
    </tr>`;
  }

  // ── Helper: Auto row (Transfer/Card/Cheque/Refund) ──
  function buildAutoRow(type, label, color) {
    const vals = SUMMARY_STATIONS.map(s => calcAutoValue(type, s));
    const allSum = vals.reduce((a,b)=>a+b,0);
    return `<tr>
      <td style="text-align:right;font-weight:700">${allSum?fmtNum(allSum):'-'}</td>
      <td style="font-weight:600;color:${color}">${label}</td>
      ${SUMMARY_STATIONS.map((s,i)=>{
        if (['Invoice Credit', 'Order Credit'].includes(s)) return `<td></td>`;
        return `<td style="text-align:right;color:${vals[i]?color:'var(--text3)'};font-weight:${vals[i]?'600':'400'}">${vals[i]?fmtNum(vals[i]):'-'}</td>`;
      }).join('')}
    </tr>`;
  }

                • 🏦 BBL NW Statement: <strong>${nBblNw}</strong> ธุรกรรม<br>
                • 📊 Daily Summary: <strong>${nSummary}</strong> วัน
              </div>
            </div>
            
            <div class="input-group">
              <label>โหมดการ import</label>
              <div class="flex gap-2" id="di-mode-pills">
                <button type="button" class="pill active" data-mode="merge">🔀 Merge (เพิ่มเข้าของเดิม)</button>
                <button type="button" class="pill" data-mode="replace">🗑 Replace (แทนที่ทั้งหมด)</button>
              </div>
              <input type="hidden" id="di-mode" value="merge">
              <div class="text-xs text-muted mt-1">Merge: เก็บบิลเดิมทั้งหมด + เพิ่มบิลใหม่ · Replace: ลบของเดิมทิ้ง</div>
            </div>
            
            <div class="input-group">
              <label><input type="checkbox" id="di-skip-dup" checked> ข้ามบิลซ้ำ (bill_no + type + ยอด ตรงกัน)</label>
              <label><input type="checkbox" id="di-skip-stmt-dup" checked> ข้าม statement ซ้ำ (ref + date + amount)</label>

            <div class="flex gap-2 mt-2">
              <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>

        document.querySelectorAll('#di-mode-pills [data-mode]').forEach(btn => {
          btn.addEventListener('click', () => {
            const m = btn.dataset.mode;
            document.querySelectorAll('#di-mode-pills .pill').forEach(p => p.classList.toggle('active', p.dataset.mode === m));
            document.getElementById('di-mode').value = m;
          });
        });
        
        document.getElementById('di-confirm')?.addEventListener('click', () => {
          const mode = document.getElementById('di-mode').value;
          const skipDup = document.getElementById('di-skip-dup').checked;
          const skipStmtDup = document.getElementById('di-skip-stmt-dup').checked;
          
          let billsAdded = 0, billsSkipped = 0;
          let stmtAdded = 0, stmtSkipped = 0;
          
          // ── Bills ──
          if (mode === 'replace') {
            billList = [];
          }
          // Composite dedup key: bill_no + type + amount (เก็บ split payment ได้)
          // เลขบิลเดียวกันที่จ่ายคนละ method/ยอดจะไม่ถูกมองว่าซ้ำ
          const makeDupKey = (b) => `${b.bill_no||''}|${b.type||b.pay_method||''}|${Number(b.amount)||0}`;
          const existingBillSet = skipDup ? new Set(billList.filter(b => b.bill_no).map(makeDupKey)) : null;
          
          data.billList.forEach(b => {
            // Skip dup by composite key (bill_no เปล่าจะผ่านเสมอ เพราะไม่มี bill_no ให้ dedup)
            const dupKey = makeDupKey(b);
            if (skipDup && b.bill_no && existingBillSet.has(dupKey)) {
              billsSkipped++;
              return;
            }
            // Normalize bill format ให้ตรงกับระบบ
            // SP/SC/JS/JR ไม่ auto-fill bank จาก confirmation
            const _bp = String(b.bill_no || '').toUpperCase();
            const _noBank = _bp.startsWith('SP') || _bp.startsWith('SC') || _bp.startsWith('JS') || _bp.startsWith('JR');
            const newBill = {
              bill_no: b.bill_no || '',
              date: b.date_th || b.date || '',
              station: b.station || '',
              type: b.type || '',
              amount: Number(b.amount) || 0,
              confirmation: b.confirmation || '',
              pay_date: b.pay_date || '',
              remarks1: b.remarks1 || '',
              remarks2: b.remarks2 || '',
              bank: _noBank ? '' : (b.confirmation || ''),
              match_status: 'pending',
              source: 'daily_import',
              source_file: b.source_file || '',
            };
            billList.push(newBill);
            if (b.bill_no && existingBillSet) existingBillSet.add(dupKey);
            billsAdded++;
          });
          
          // ── Main Summary — Store per-date + flatten for currently selected date ──
          // Legacy keys: sales_Front1, cashIn_Front2 etc. (flat)
          // New keys: dailySummaries[date] = full nested summary
          if (!mainSummary || typeof mainSummary !== 'object') mainSummary = {};
          if (!mainSummary.__byDate) mainSummary.__byDate = {};
          
          // Map Thai labels → legacy key prefix
          const LABEL_MAP = {
            'นำเงินเข้า': 'cashIn',
            'ยอดขาย': 'sales',
            'นำเงินออก': 'cashOut',
            'ยอดคืนสินค้า': 'returns',
            'Cash Drawer': 'cashDrawer',
            'Transfer': 'transfer',
            'Card': 'card',
            'Cheque': 'cheque',
            'Refund': 'refund',
          };
          
          let summaryDates = [];
          Object.entries(data.mainSummary || {}).forEach(([date, summary]) => {
            // Store full summary by date (for later switching)
            mainSummary.__byDate[date] = summary;
            summaryDates.push(date);
          });
          
          // Apply summary of most recent date as "active" (flat keys)
          // so that Main page summary table shows numbers
          if (summaryDates.length > 0) {
            summaryDates.sort();
            const activeDate = summaryDates[summaryDates.length - 1];
            const activeSummary = mainSummary.__byDate[activeDate];
            if (activeSummary) {
              Object.entries(activeSummary).forEach(([thLabel, stations]) => {
                const prefix = LABEL_MAP[thLabel];
                if (!prefix) return;
                ['Front1', 'Front2', 'Front3', 'Front4', 'Invoice', 'Order', 'Payment', 'Invoice Credit', 'Order Credit'].forEach(st => {
                  const val = stations[st];
                  if (val != null && val !== 0) {
                    mainSummary[prefix + '_' + st] = val;
                  }
                });
              });
            }
          }
          
          // ── Change Data (นับธนบัตรทอน) — import ไปเก็บใน cashCount.__byDate ──
          if (data.changeData && typeof data.changeData === 'object') {
            if (!cashCount.__byDate) cashCount.__byDate = {};
            Object.entries(data.changeData).forEach(([dateISO, stationData]) => {
              if (!cashCount.__byDate[dateISO]) cashCount.__byDate[dateISO] = {};
              Object.entries(stationData || {}).forEach(([station, denoms]) => {
                Object.entries(denoms || {}).forEach(([denom, count]) => {
                  const key = denom + '_' + station;
                  cashCount.__byDate[dateISO][key] = Number(count) || 0;
                });
              });
            });
          }
          
          // ── Statements ──
          if (mode === 'replace') {
            statementsByBank = { KTB: [], KBANK: [], 'BBL NW': [], BBL: [], TTB: [], UNKNOWN: [] };
          } else {
            if (!statementsByBank) statementsByBank = { KTB: [], KBANK: [], 'BBL NW': [], BBL: [], TTB: [], UNKNOWN: [] };
            ['KTB', 'KBANK', 'BBL NW', 'BBL', 'TTB', 'UNKNOWN'].forEach(k => {
              if (!Array.isArray(statementsByBank[k])) statementsByBank[k] = [];
            });
          }
          
          ['KTB', 'KBANK', 'BBL NW', 'BBL', 'TTB'].forEach(bankKey => {
            const incoming = data.statementsByBank[bankKey] || [];
            const existing = statementsByBank[bankKey] || [];
            const dupSet = skipStmtDup ? new Set(existing.map(s => `${s.ref_no||''}|${s.date}|${s.amount}`)) : null;
            
            incoming.forEach(s => {
              const key = `${s.ref_no||''}|${s.date}|${s.amount}`;
              if (skipStmtDup && dupSet.has(key)) {
                stmtSkipped++;
                return;
              }
              existing.push(s);
              if (dupSet) dupSet.add(key);
              stmtAdded++;
            });
            statementsByBank[bankKey] = existing;
          });
          
          // Persist + refresh uploadedStatements (ให้ Matching page เห็นข้อมูล)
          uploadedStatements = getAllStatements();
          try { safeStorage.set('sf_statementsByBank', JSON.stringify(statementsByBank)); } catch(e) {}
          persistMainState();
          
          closeModal();
          toast(
            `✅ Import สำเร็จ — บิล ${billsAdded}${billsSkipped?' ('+billsSkipped+' ซ้ำ)':''} · Statement ${stmtAdded}${stmtSkipped?' ('+stmtSkipped+' ซ้ำ)':''}`,
            'success',
            5000
          );
          render();
        });
      } catch (err) {
        console.error(err);
        toast('Import ไม่สำเร็จ: ' + err.message, 'error');
      }
      e.target.value = '';
    });
    document.getElementById('btn-toggle-change')?.addEventListener('click', () => {
      showChange = !showChange; render();
    });

    function updateDeleteButton() {

      // ── Fee calculation logic ──
      const $type = document.getElementById('ab-type');
      const $station = document.getElementById('ab-station');
      const $amount = document.getElementById('ab-amount');
      const $bill = document.getElementById('ab-bill');
      const $whtOut = document.getElementById('ab-wht');
      const $base = document.getElementById('ab-base');
      const $tf = document.getElementById('ab-transfer-fee');
      const $cf = document.getElementById('ab-card-fee');
      const $feeBox = document.getElementById('ab-fee-box');
      const $feeTransfer = document.getElementById('ab-fee-transfer');

      const $cardLabel = document.getElementById('ab-card-label');

      function feeApplies() {
        // แสดงช่อง fee เมื่อ Type = Transfer, Cheque, หรือ Card
        const type = $type.value || '';
        return type === 'Transfer' || type === 'Cheque' || type === 'Card';

      // สูตรตาม Excel: C = ROUND((B/1.07) * 1%, 2)
      function calcWHT(amount) {
        if (!amount || amount <= 0) return 0;
        return Math.round((amount / 1.07) * 0.01 * 100) / 100;
      }
      function calcBase(amount) {
        if (!amount || amount <= 0) return 0;
        return Math.round((amount / 1.07) * 100) / 100;
      }
      
      function updateFeeUI() {
        const type = $type.value || '';
        const applies = feeApplies();
        
        if (!applies) {
          $feeBox.style.display = 'none';
          return;
        }
        $feeBox.style.display = 'block';
        
        // แสดงแถวตาม Type:
        //   Transfer: ฐาน + WHT + ค่าโอน (ไม่มี extra)
        //   Cheque:   ฐาน + WHT + ค่าโอน + extra (label: ค่าธรรมเนียม)
        //   Card:     extra (label: ค่าธรรมเนียมบัตร)
        if (type === 'Card') {
          $feeTransfer.style.display = 'none';
          $feeExtra.style.display = 'flex';
          $cardLabel.textContent = 'ค่าธรรมเนียมบัตร';
          $sumCfLabel.textContent = '− ค่าธรรมเนียมบัตร';

          $cardLabel.textContent = 'ค่าธรรมเนียม';
          $sumCfLabel.textContent = '− ค่าธรรมเนียม';

          $feeTransfer.style.display = 'flex';
          $feeExtra.style.display = 'none';
        }
        updateSummary();
      }
      
      function updateSummary() {
        const amount = Number($amount.value) || 0;
        const type = $type.value || '';
        const applies = feeApplies();
        
        let wht = 0, tf = 0, cf = 0;
        
        if (applies && (type === 'Transfer' || type === 'Cheque')) {
          $base.value = calcBase(amount).toFixed(2);
          // Auto-fill WHT — เว้นแต่ user แก้เอง
          if (!whtManuallyEdited) {
            $whtOut.value = calcWHT(amount).toFixed(2);
          }
          wht = Number($whtOut.value) || 0;
          tf = Number($tf.value) || 0;
          if (type === 'Cheque') cf = Number($cf.value) || 0;
        } else if (applies && type === 'Card') {
          cf = Number($cf.value) || 0;
        }

          document.getElementById('ab-sum-net').textContent = '฿' + net.toFixed(2);
        } else {
          $summary.style.display = 'none';
        }
      }

      $type?.addEventListener('change', updateFeeUI);

      $tf?.addEventListener('input', updateSummary);

      document.getElementById('ab-confirm')?.addEventListener('click', () => {

      const v = validateAll();
