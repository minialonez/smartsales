<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/themes/dark.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
<style>
/* ── Reset & Variables ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0e14;--surface:#141721;--surface2:#1b1f2e;--surface3:#232839;
  --border:#282d40;--border2:#353b52;
  --primary:#5b7cfa;--primary-dim:#3d56c4;--primary-bg:rgba(91,124,250,.1);
  --success:#2dd4a0;--success-bg:rgba(45,212,160,.1);
  --warn:#f5a623;--warn-bg:rgba(245,166,35,.1);
  --danger:#ef5757;--danger-bg:rgba(239,87,87,.1);
  --info:#3db9f5;--info-bg:rgba(61,185,245,.1);
  --purple:#a07cf5;
  --text:#dfe2ec;--text2:#8a90a8;--text3:#5a6080;
  --font:'Sarabun',sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:10px;--radius-sm:6px;--radius-lg:14px;
  --shadow:0 2px 12px rgba(0,0,0,.25);
  --transition:.18s ease;
}
html{font-size:14px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}
input,select,button,textarea{font-family:inherit}
a{color:var(--primary);text-decoration:none}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:9px}

/* ── Utilities ── */
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}
.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.flex-1{flex:1}.flex-wrap{flex-wrap:wrap}.text-right{text-align:right}
.font-bold{font-weight:700}.font-semi{font-weight:600}.text-sm{font-size:.85rem}
.text-xs{font-size:.75rem}.text-dim{color:var(--text2)}.text-muted{color:var(--text3)}
.w-full{width:100%}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.hidden{display:none!important}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Components ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.card-flat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border:none;border-radius:var(--radius);
  font-weight:600;font-size:.85rem;cursor:pointer;transition:var(--transition);white-space:nowrap}
.btn:hover{filter:brightness(1.15)}.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(239,87,87,.25)}
.btn-success{background:var(--success-bg);color:var(--success);border:1px solid rgba(45,212,160,.25)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost{background:transparent;color:var(--text2);border:none;padding:6px 8px}
.btn-sm{padding:5px 10px;font-size:.78rem}
.btn-icon{padding:6px;border-radius:var(--radius-sm)}
.btn[disabled]{opacity:.4;cursor:not-allowed;pointer-events:none}

.input-group{display:flex;flex-direction:column;gap:4px}
.input-group label{font-size:.78rem;color:var(--text2);font-weight:500}
.input,.select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  padding:8px 12px;color:var(--text);font-size:.88rem;outline:none;transition:var(--transition)}
.input:focus,.select:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(91,124,250,.15)}
.input::placeholder{color:var(--text3)}

.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:600;letter-spacing:.3px}
.badge-primary{background:var(--primary-bg);color:var(--primary)}
.badge-success{background:var(--success-bg);color:var(--success)}
.badge-danger{background:var(--danger-bg);color:var(--danger)}
.badge-warn{background:var(--warn-bg);color:var(--warn)}
.badge-info{background:var(--info-bg);color:var(--info)}
.badge-muted{background:rgba(90,96,128,.15);color:var(--text3)}
.badge-purple{background:rgba(160,124,245,.12);color:var(--purple)}

.pill{display:inline-flex;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;
  color:var(--text2);font-size:.8rem;font-weight:500;cursor:pointer;transition:var(--transition)}
.pill:hover{border-color:var(--primary);color:var(--primary)}
.pill.active{background:var(--primary-bg);border-color:var(--primary);color:var(--primary)}

.tab-bar{display:flex;gap:2px;background:var(--surface2);border-radius:var(--radius);padding:3px}
.tab-btn{padding:6px 14px;border-radius:var(--radius-sm);border:none;background:transparent;
  color:var(--text2);font-size:.8rem;font-weight:600;cursor:pointer;transition:var(--transition)}
.tab-btn.active{background:var(--primary);color:#fff}

/* ── Table ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:10px 12px;text-align:left;font-size:.72rem;font-weight:600;color:var(--text2);
  text-transform:uppercase;letter-spacing:.5px;background:var(--surface2);white-space:nowrap;position:sticky;top:0;z-index:1}
td{padding:10px 12px;font-size:.88rem;white-space:nowrap;border-bottom:1px solid var(--border);color:var(--text2)}
tr:hover td{background:rgba(91,124,250,.03)}
tr.row-danger td{background:rgba(239,87,87,.06);border-left:3px solid var(--danger)}

/* ── Stat Card ── */
.stat{display:flex;justify-content:space-between;align-items:flex-start}
.stat-label{font-size:.72rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:1.4rem;font-weight:800;margin-top:2px}
.stat-sub{font-size:.72rem;color:var(--text3);margin-top:4px}
.stat-icon{opacity:.4}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:500px;max-width:90vw;max-height:80vh;overflow:auto;transform:scale(.95);transition:transform .2s}
.modal-overlay.open .modal{transform:scale(1)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:1.05rem;font-weight:700}

/* ── Toast ── */
.toast-container{position:fixed;top:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:var(--radius);font-size:.85rem;font-weight:500;animation:toastIn .3s ease;min-width:280px}
.toast-success{background:#1a3d2e;border:1px solid var(--success);color:var(--success)}
.toast-error{background:#3d1a1a;border:1px solid var(--danger);color:var(--danger)}
.toast-info{background:#1a2d3d;border:1px solid var(--info);color:var(--info)}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

/* ── Login ── */
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,var(--bg) 0%,#10132a 50%,#150f28 100%)}
.login-card{width:380px;padding:40px;background:rgba(20,23,33,.85);backdrop-filter:blur(24px);
  border-radius:20px;border:1px solid var(--border)}
.login-logo{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--primary),var(--purple));margin:0 auto 16px;font-size:22px;font-weight:800;color:#fff}
.login-title{text-align:center;font-size:1.4rem;font-weight:800}
.login-sub{text-align:center;font-size:.88rem;color:var(--text2);margin-top:4px}
.login-error{font-size:.82rem;color:var(--danger);background:var(--danger-bg);padding:8px 12px;border-radius:var(--radius)}

/* ── Layout ── */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s}
#sidebar.collapsed{width:62px}
.sidebar-logo{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-logo-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--primary),var(--purple));font-weight:800;color:#fff;font-size:.9rem;flex-shrink:0}
.sidebar-logo-text{font-size:1rem;font-weight:700;white-space:nowrap;overflow:hidden}
.sidebar-nav{flex:1;padding:10px 6px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--radius);border:none;
  background:transparent;color:var(--text2);font-size:.88rem;cursor:pointer;transition:var(--transition);text-align:left;width:100%;font-weight:400}
.nav-item:hover{color:var(--text);background:rgba(91,124,250,.05)}
.nav-item.active{color:var(--primary);background:var(--primary-bg);font-weight:600}
.nav-item svg{flex-shrink:0}
.nav-item .nav-badge{margin-left:auto}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border)}
.sidebar-user{font-size:.78rem;color:var(--text2);margin-bottom:8px}
.sidebar-logout{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:.8rem;padding:4px 0}
.sidebar-logout:hover{color:var(--danger)}
#main{flex:1;overflow-y:auto;padding:28px;max-height:100vh}
.page-title{font-size:1.3rem;font-weight:800;margin-bottom:4px}

/* ── Progress Bar (for matching) ── */
.progress{height:8px;background:var(--surface2);border-radius:9px;overflow:hidden}
.progress-fill{height:100%;border-radius:9px;transition:width .5s ease}

/* ── Animations ── */
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.stagger > *{opacity:0;animation:fadeIn .35s ease forwards}
.stagger > *:nth-child(1){animation-delay:.05s}
.stagger > *:nth-child(2){animation-delay:.1s}
.stagger > *:nth-child(3){animation-delay:.15s}
.stagger > *:nth-child(4){animation-delay:.2s}
.stagger > *:nth-child(5){animation-delay:.25s}

/* ── Spinner ── */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Responsive ── */
@media(max-width:768px){
  #sidebar{position:fixed;z-index:100;left:-230px;transition:left .2s}
  #sidebar.mobile-open{left:0}
  #main{padding:16px}
}
</style>
</head>
<body>

<!-- Toast Container -->
<div class="toast-container" id="toasts"></div>

<!-- Hidden file inputs -->
<input type="file" id="file-sales" accept=".xlsx,.xlsm,.xls,.csv" style="display:none">
<input type="file" id="file-stmt" accept=".xlsx,.xlsm,.xls,.csv" multiple style="display:none">

<!-- Login Page -->
<div id="login-page">
  <div class="login-card fade-in">
    <div class="login-logo">S</div>
    <div class="login-title">Smart Finance</div>
    <div class="login-sub">ระบบจัดการการเงินและติดตามหนี้</div>
    <div style="margin-top:28px" class="flex-col gap-3">
      <div class="input-group">
        <label>ชื่อผู้ใช้</label>
        <input class="input" id="login-user" placeholder="กรอกชื่อผู้ใช้" autocomplete="username">
      </div>
      <div class="input-group">
        <label>รหัสผ่าน</label>
        <input class="input" id="login-pass" type="password" placeholder="กรอกรหัสผ่าน" autocomplete="current-password">

      <label class="flex items-center gap-2 text-sm text-dim" style="cursor:pointer">
        <input type="checkbox" id="login-remember" style="accent-color:var(--primary)"> จดจำการเข้าสู่ระบบ
      </label>
      <div id="login-error" class="login-error hidden"></div>
      <button id="login-btn" class="btn btn-primary w-full" style="justify-content:center;padding:11px 0;font-size:.95rem;border-radius:var(--radius-lg);margin-top:4px" onclick="doLogin()">เข้าสู่ระบบ</button>
    </div>
  </div>
</div>

<!-- App Layout -->
<div id="app" class="hidden">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">S</div>
      <span class="sidebar-logo-text">Smart Finance</span>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebar-user"></div>
      <div id="sync-status-badge" style="font-size:.72rem;padding:4px 8px;background:rgba(255,255,255,.03);border-radius:5px;margin-bottom:8px;cursor:pointer;user-select:none" title="คลิกเพื่อ sync ทันที">☁ Ready</div>
      <button class="sidebar-logout" onclick="doLogout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        ออกจากระบบ
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main id="main"></main>
</div>

<!-- Modal Container -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="btn-ghost btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIG & API
// ══════════════════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbxKFt7Dcq1PPyYEy_zEwTuuNS2MkHywy7s3Wz3KTuSrIqBE9k5GUP3b8IOT8oGXkMWR/exec';

let currentUser = null;
let currentPage = 'dashboard';

// ── API Helper — auto GET/POST: GET สำหรับ read, POST สำหรับ write ใหญ่ๆ ──
// Apps Script handleRequest() parse e.postData.contents เป็น JSON อยู่แล้ว
// Content-Type: text/plain เลี่ยง CORS preflight (simple request)
async function api(action, params = {}) {
  try {
    if (!API_URL) return demoResponse(action, params);

    // สร้าง URL query string (ใช้สำหรับ GET หรือเช็คขนาด)
    const qs = new URLSearchParams({ action });
    Object.keys(params).forEach(k => {
      const v = params[k];
      if (v !== undefined && v !== null && v !== '') {
        qs.set(k, typeof v === 'object' ? JSON.stringify(v) : String(v));
      }
    });

    const url = API_URL + '?' + qs.toString();
    let res;
    
    // ── DEBUG: Log request สำหรับ action สำคัญ ──
    const DEBUG_ACTIONS = ['saveDailySales', 'saveDailyMeta', 'savePayments'];
    const shouldLog = DEBUG_ACTIONS.includes(action) || window.__apiDebug;
    if (shouldLog) {
      console.group(`📤 API: ${action}`);
      console.log('Params:', Object.keys(params).reduce((acc, k) => {
        const v = params[k];
        acc[k] = Array.isArray(v) ? `[Array ${v.length} items]` : v;
        return acc;
      }, {}));
      if (params.rows && Array.isArray(params.rows)) {
        console.log('First row sample:', params.rows[0]);
        console.log('Last row sample:', params.rows[params.rows.length - 1]);
      }
      console.log('URL length:', url.length);
      console.log('Method:', url.length < 4000 ? 'GET' : 'POST');
      console.groupEnd();
    }

    // URL < 4000 chars → GET (Apps Script limit ~8KB, ใช้ 4K เพื่อความปลอดภัย)
    // URL ≥ 4000 chars → POST with text/plain (ไม่เกิด CORS preflight)
    if (url.length < 4000) {
      res = await fetch(url, { redirect: 'follow' });
    } else {
      res = await fetch(API_URL, {
        method: 'POST',
        redirect: 'follow',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(Object.assign({ action }, params)),
      });
    }

    const text = await res.text();
    
    if (shouldLog) {
      console.group(`📥 Response: ${action}`);
      console.log('Status:', res.status);
      console.log('Text (first 500):', text.substring(0, 500));
      console.groupEnd();
    }
    
    try {
      return JSON.parse(text);
    } catch {
      console.error('API response not JSON:', text.substring(0, 300));
      return demoResponse(action, params);
    }
  } catch (err) {
    console.error('API Error:', err);
    toast('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ — ใช้ Demo Mode', 'error');
    return demoResponse(action, params);
  }
}

// ── Date Helpers (dd/mm/yyyy เสมอ) ──
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayKey() { return todayISO().replace(/-/g, ''); }

// แปลงทุก input → dd/mm/yyyy (ค.ศ.) ไม่มี timezone shift
function fmtDate(d) {
  if (!d && d !== 0) return '';

  // 1) Date object → ใช้ local getters ตรงๆ (ไม่ผ่าน ISO)
  if (d instanceof Date && !isNaN(d)) {
    let y = d.getFullYear();
    if (y > 2400) y -= 543; // พ.ศ.→ค.ศ.
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${y}`;
  }

  // 2) Excel serial number (เช่น 45748) → แปลงเป็น Date
  if (typeof d === 'number' && d > 10000 && d < 80000) {
    // Excel epoch: 1899-12-30 (มี leap year bug)
    const excelEpoch = new Date(1899, 11, 30);
    const ms = d * 86400000;
    const dt = new Date(excelEpoch.getTime() + ms);
    return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`;
  }

  var str = String(d).trim();
  if (!str || str === 'null' || str === 'undefined') return '';

  // 3) dd/mm/yyyy อยู่แล้ว
  var m1 = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m1) {
    let y = Number(m1[3]); if (y > 2400) y -= 543;
    return `${String(m1[1]).padStart(2,'0')}/${String(m1[2]).padStart(2,'0')}/${y}`;
  }

  // 4) ISO date yyyy-mm-dd (ไม่ใช้ Date constructor เพื่อเลี่ยง timezone shift)
  var m2 = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m2) {
    let y = Number(m2[1]); if (y > 2400) y -= 543;
    return `${m2[3]}/${m2[2]}/${y}`;
  }

  // 5) Fallback: ลอง parse เป็น Date แล้วใช้ local
  var dt = new Date(d);
  if (!isNaN(dt)) {
    let y = dt.getFullYear();
    if (y > 2400) y -= 543;
    return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${y}`;
  }

  return str.split(' ')[0];
}
function fmtNum(n) { return new Intl.NumberFormat('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n); }
// Sum diff formatter: แสดง 2 ทศนิยมเสมอ (เช่น +1.00, -18.50, +0.50)
// สอดคล้องกับแถวอื่นที่ใช้ fmtNum (2 ทศนิยม)
function fmtDiff(n) {
  const abs = Math.abs(n);
  const formatted = new Intl.NumberFormat('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}).format(abs);
  return (n >= 0 ? '+' : '-') + formatted;
}
// Sum color: OK=green, เงินเกิน(+)=orange, เงินขาด(-)=red
function sumColor(isOk, diff) {
  if (isOk) return 'var(--success)';
  return diff > 0 ? 'var(--warn)' : 'var(--danger)';
}
function fmtInt(n) { return new Intl.NumberFormat('th-TH').format(n); }

function extractTimeStr(val) {
  if (!val) return '';
  const match = String(val).match(/\d{2}:\d{2}(:\d{2})?/);
  return match ? match[0] : '';
}

// ── Toast ──
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ── Debounce (ลด re-render) ──
function debounce(fn, ms = 300) {
  let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

// 🚀 PERF HELPERS — ป้องกัน page ค้างเมื่อข้อมูลเยอะ
// ══════════════════════════════════════════════════════════════
const PERF_MAX_VISIBLE_ROWS = 500;
const PERF_THRESHOLD = 200; // ถ้ามากกว่านี้ จะ auto-truncate

function truncateForRender(arr) {
  if (!Array.isArray(arr)) return { visible: [], total: 0, truncated: false };
  if (arr.length <= PERF_MAX_VISIBLE_ROWS) {
    return { visible: arr, total: arr.length, truncated: false };
  }
  return {
    visible: arr.slice(0, PERF_MAX_VISIBLE_ROWS),
    total: arr.length,
    truncated: true,
  };
}

function truncationFooter(totalCount, origTotal) {
  if (totalCount <= PERF_MAX_VISIBLE_ROWS) return '';
  return `<span style="color:var(--warn);margin-left:8px">⚠️ แสดง ${PERF_MAX_VISIBLE_ROWS} จาก ${totalCount} — กรองเพื่อเห็นเฉพาะที่ต้องการ</span>`;
}

// ══════════════════════════════════════════════════════════
// Global Sort Order System
//   - Default: ASC (เก่า → ใหม่)
//   - ใช้กับทุกหน้าที่มี list — toggle ได้ด้วยปุ่ม
// ══════════════════════════════════════════════════════════
const sortOrders = (() => {
  try { return JSON.parse(localStorage.getItem('sf_sortOrders') || '{}'); }
  catch (e) { return {}; }
})();

function getSortOrder(pageKey) {
  return sortOrders[pageKey] || 'asc'; // default ASC
}

function toggleSortOrder(pageKey) {
  sortOrders[pageKey] = getSortOrder(pageKey) === 'asc' ? 'desc' : 'asc';
  try { localStorage.setItem('sf_sortOrders', JSON.stringify(sortOrders)); } catch(e) {}
  return sortOrders[pageKey];
}

// Reusable toggle button HTML
function sortToggleBtn(pageKey) {
  const isAsc = getSortOrder(pageKey) === 'asc';
  return `<button class="btn btn-outline btn-sm sort-toggle" data-page-key="${pageKey}" title="${isAsc?'เก่า → ใหม่ (กดเพื่อกลับ)':'ใหม่ → เก่า (กดเพื่อกลับ)'}" style="padding:4px 10px;font-size:.78rem">
    ${isAsc ? '↑ เก่า→ใหม่' : '↓ ใหม่→เก่า'}
  </button>`;
}

// Generic date sorter (ASC)
function sortByDateAsc(arr, getDate) {
  return arr.sort((a, b) => (parseThaiDate(getDate(a)) || 0) - (parseThaiDate(getDate(b)) || 0));
}
function sortByDateDesc(arr, getDate) {
  return arr.sort((a, b) => (parseThaiDate(getDate(b)) || 0) - (parseThaiDate(getDate(a)) || 0));
}

// ══════════════════════════════════════════════════════════
// Flatpickr — บังคับ dd/mm/yyyy ทุกเบราว์เซอร์
//   - value = yyyy-mm-dd (เหมือนเดิม, logic ไม่ต้องแก้)
//   - แสดง = dd/mm/yyyy (altInput ของ flatpickr)
//   เรียกหลัง render() เพื่อ apply ให้ทุก <input type="date">
// ══════════════════════════════════════════════════════════
function applyFlatpickrAll() {
  if (typeof flatpickr === 'undefined') return;
  document.querySelectorAll('input[type="date"]').forEach(inp => {
    if (inp._flatpickr) return; // already applied
    try {
      flatpickr(inp, {
        dateFormat: 'Y-m-d',        // value ที่ส่งออก = yyyy-mm-dd (เหมือนเดิม)
        altFormat: 'd/m/Y',         // ที่แสดงในช่อง = 17/04/2026
        altInput: true,             // สร้างช่องแสดงใหม่ซ้อนทับ
        allowInput: true,
      });
    } catch(e) {}
  });
}

// Auto-apply flatpickr เมื่อมี date input ใหม่เพิ่มใน DOM (modal, re-render)
if (typeof window !== 'undefined') {
  const _fpObserver = new MutationObserver(() => {
    // debounce: รอ 50ms หลังเปลี่ยนแปลง
    clearTimeout(window._fpTimer);
    window._fpTimer = setTimeout(applyFlatpickrAll, 50);
  });
  // เริ่มสังเกตหลัง DOM พร้อม
  if (document.body) {
    _fpObserver.observe(document.body, { childList: true, subtree: true });
  } else {
    document.addEventListener('DOMContentLoaded', () => {
      _fpObserver.observe(document.body, { childList: true, subtree: true });
    });
  }
}


// ── Excel / CSV File Parser ──
function parseExcelFile(file) {
  const name = (file.name || '').toLowerCase();
  const isCsv = name.endsWith('.csv');
  
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    
    reader.onload = (e) => {
      try {
        if (isCsv) {
          // CSV → auto-detect encoding: UTF-8 strict → Windows-874 (TIS-620) fallback
          // วิธีนี้แก้ปัญหา KBANK/ธนาคารไทยแสดงภาษาประหลาด เพราะอ่าน encoding ผิด
          const bytes = new Uint8Array(e.target.result);
          let text = '';
          try {
            // ลอง UTF-8 แบบ strict ก่อน — ถ้า valid ใช้เลย (ครอบคลุม UTF-8 with/without BOM)
            text = new TextDecoder('utf-8', { fatal: true }).decode(bytes);
          } catch {
            // UTF-8 fail → ใช้ Windows-874 (Thai) — ไฟล์ bank ไทยส่วนใหญ่ใช้ตัวนี้
            try {
              text = new TextDecoder('windows-874').decode(bytes);
            } catch {
              // หมดทาง → UTF-8 replaceable
              text = new TextDecoder('utf-8').decode(bytes);
            }
          }
          // ตัด BOM ถ้ามี
          if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
          // Parse CSV
          const workbook = XLSX.read(text, { type: 'string', cellDates: false, raw: true });
          const result = {};
          workbook.SheetNames.forEach(nm => {
            result[nm] = XLSX.utils.sheet_to_json(workbook.Sheets[nm], { header: 1, defval: '', raw: true });
          });
          resolve({ sheets: result, sheetNames: workbook.SheetNames, isCsv: true, rawText: text });
          return;
        }
        
        // Excel (.xls/.xlsx/.xlsm)
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array', cellDates: true, cellNF: false, cellText: false });
        const result = {};
        workbook.SheetNames.forEach(nm => {
          result[nm] = XLSX.utils.sheet_to_json(workbook.Sheets[nm], { header: 1, defval: '', raw: true });
        });
        resolve({ sheets: result, sheetNames: workbook.SheetNames });
      } catch (err) {
        reject(err);
      }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

function triggerFileUpload(inputId, callback) {
  const inp = document.getElementById(inputId);
  inp.value = '';
  inp.onchange = async () => {
    if (!inp.files[0]) return;
    try {
      toast('กำลังอ่านไฟล์...', 'info');
      const result = await parseExcelFile(inp.files[0]);
      callback(result, inp.files[0].name);
    } catch (err) {
      toast('อ่านไฟล์ไม่สำเร็จ: ' + err.message, 'error');
    }
  };
  inp.click();
}

// ── Multi-file upload (สำหรับ statement หลายไฟล์พร้อมกัน) ──
// callback(result, fileName, meta) โดย meta = { index, total, isLast }
// Caller รับผิดชอบ accumulate + final toast/persist/render เองผ่าน meta.isLast
function triggerMultiFileUpload(inputId, callback) {
  const inp = document.getElementById(inputId);
  inp.value = '';
  inp.onchange = async () => {
    const files = Array.from(inp.files || []);
    if (files.length === 0) return;
    if (files.length > 1) toast(`กำลังอ่าน ${files.length} ไฟล์...`, 'info');
    else toast('กำลังอ่านไฟล์...', 'info');
    
    for (let i = 0; i < files.length; i++) {
      const meta = { index: i, total: files.length, isLast: i === files.length - 1 };
      try {
        const result = await parseExcelFile(files[i]);
        await callback(result, files[i].name, meta);
      } catch (err) {
        toast(`❌ ${files[i].name}: ${err.message}`, 'error', 5000);
        // ยังคง callback เพื่อให้ caller ได้รู้ว่าไฟล์นี้ล้มเหลว → accumulate ถูก
        await callback(null, files[i].name, { ...meta, error: err.message });
      }
    }
  };
  inp.click();
}

// Parse ข้อมูลผู้โอน/ผู้รับจาก description ของ statement
// Returns: { bank_code, bank_name, account_no, sender_name, direction } หรือ null
function parseStatementSender(bank, description, action) {
  if (!description) return null;
  const desc = String(description).trim();
  
  if (bank === 'KTB') {
    // Pattern 1: "002-4800371025" (3-digit bank code + account)
    let m = desc.match(/^(\d{3})-(\d{6,15})/);
    if (m) {
      const info = THAI_BANK_CODES[m[1]];
      return {
        bank_code: m[1],
        bank_name: info ? info.code : ('?'+m[1]),
        bank_full: info ? info.name : '',
        account_no: m[2],
        sender_name: '',
        direction: 'in',
      };
    }
    // Pattern 2: "TR fr 9091964758" (same-bank KTB transfer in)
    m = desc.match(/^TR\s+fr\s+(\d{6,15})/i);
    if (m) {
      return {
        bank_code: '006',
        bank_name: 'KTB',
        bank_full: 'กรุงไทย',
        account_no: m[1],
        sender_name: '',
        direction: 'in',
      };
    }
    // Pattern 3: "TR to ..." (outgoing transfer)
    m = desc.match(/^TR\s+to\s+(\d{6,15})?/i);
    if (m) {
      return {
        bank_code: '006',
        bank_name: 'KTB',
        bank_full: 'กรุงไทย',
        account_no: m[1] || '',
        sender_name: '',
        direction: 'out',
      };
    }
    // Pattern 4: QR/PromptPay — ไม่มีข้อมูลผู้โอน
    if (/^010753/.test(desc) || desc.includes('-EB')) {
      return { bank_code: '', bank_name: 'QR', bank_full: 'QR/PromptPay', account_no: '', sender_name: '', direction: 'in' };
    }
    return null;
  }
  
  if (bank === 'KBANK') {
    // Pattern: "โอนไป BBL X0892 บจ.ซี-ทีแอล คอร์ปอ++"
    //      or "โอนไป X0204 บจก กรีนครอสเซฟตี้++"
    let m = desc.match(/โอนไป\s+([A-Z]+)?\s*X(\d{4,6})\s+(.+?)(\+\+|$)/);
    if (m) {
      return {
        bank_code: '',
        bank_name: m[1] || 'KBANK', // if no bank name → same bank KBANK
        bank_full: '',
        account_no: 'X' + m[2],
        sender_name: m[3].trim(),
        direction: 'out',
      };
    }
    // Pattern: "Internet/Mobile KTB" — โอนเข้าจาก KTB (ไม่ระบุ account)
    m = desc.match(/Internet\/Mobile\s+(\w+)/);
    if (m) {
      const bankKey = m[1].toUpperCase();
      return {
        bank_code: '',
        bank_name: bankKey,
        bank_full: '',
        account_no: '',
        sender_name: '',
        direction: 'in',
      };
    }
    return null;
  }
  
  // BBL / BBL NW — ไม่มีข้อมูลผู้โอนใน description
  return null;
}

function handleStmtUpload(result, fileName, opts = {}) {
  const silent = !!opts.silent;
  const rows = [];
  const nameLC = fileName.toLowerCase();

  // ══════════════════════════════════════════════════════════
  // Auto-detect ธนาคารจากชื่อไฟล์ + เนื้อหา
  // 
  // KTB:    ไฟล์ .xls ชื่อเป็นตัวเลข (เช่น 20260418083243968.xls)
  //         หรือมี "Account No." + "909-" / "Teller Id"
  // KBANK:  ชื่อไฟล์ resultFile_* หรือมี "K-DEPOSIT" / "กสิกร"
  // BBL NW: ชื่อไฟล์ MyDownLoad* หรือเลขบัญชี 266-4-414113
  // BBL:    ชื่อไฟล์ Activity-* หรือเลขบัญชี 266-4-448384
  // TTB:    ชื่อไฟล์ ACCHIST_*.xlsx หรือมี "Debit/Credit" + "Transaction type"
  // ══════════════════════════════════════════════════════════
  let bank = 'UNKNOWN';
  
  // 1) ตรวจจากชื่อไฟล์
  if (/^\d+\.xls/i.test(fileName)) bank = 'KTB';
  else if (nameLC.startsWith('resultfile')) bank = 'KBANK';
  else if (nameLC.startsWith('mydownload')) bank = 'BBL NW';
  else if (nameLC.startsWith('activity')) bank = 'BBL';
  else if (nameLC.startsWith('acchist')) bank = 'TTB';
  else if (nameLC.includes('ktb') || nameLC.includes('กรุงไทย')) bank = 'KTB';
  else if (nameLC.includes('kbank') || nameLC.includes('kasikorn') || nameLC.includes('กสิกร')) bank = 'KBANK';
  else if (nameLC.includes('bbl nw') || nameLC.includes('bblnw')) bank = 'BBL NW';
  else if (nameLC.includes('bbl') || nameLC.includes('กรุงเทพ')) bank = 'BBL';
  else if (nameLC.includes('ttb') || nameLC.includes('ทหารไทย')) bank = 'TTB';

  // 2) ตรวจจากเนื้อหา (override ถ้าชัดเจนกว่า)
  const firstSheet = result.sheets[result.sheetNames[0]] || [];
  const contentJoin = firstSheet.slice(0, 15).map(r => (r||[]).join(' ')).join(' ');
  const contentLC = contentJoin.toLowerCase();
  
  if (contentJoin.includes('266-4-448384')) bank = 'BBL';
  else if (contentJoin.includes('266-4-414113')) bank = 'BBL NW';
  else if (contentJoin.includes('909-0-77302') || contentLC.includes('teller id')) bank = 'KTB';
  else if (contentLC.includes('k-deposit') || contentJoin.includes('กสิกร')) bank = 'KBANK';
  else if (contentLC.includes('debit/credit') && contentLC.includes('transaction type')) bank = 'TTB';
  else if (contentJoin.includes('ttb YALA') || contentLC.includes('at ttb ')) bank = 'TTB';
  else if (contentJoin.includes('วันที่ทำรายการ') && contentJoin.includes('หักบัญชี')) bank = 'BBL';
  else if (contentJoin.includes('วันที่') && contentJoin.includes('หักบัญชี') && bank === 'UNKNOWN') bank = 'BBL NW';

  // helper: แปลง date โดยตรวจจับ พ.ศ. พิเศษ
  let buddhistCount = 0;
  function convertDate(val) {
    if (!val) return '';
    // ถ้าเป็น Date object แล้วปี > 2400 = พ.ศ.
    if (val instanceof Date && val.getFullYear() > 2400) {
      buddhistCount++;
      const converted = new Date(val.getFullYear() - 543, val.getMonth(), val.getDate());
      return fmtDate(converted);
    }
    const result = fmtDate(val);
    // ตรวจซ้ำในผลลัพธ์
    if (/\/25\d\d$/.test(result)) {
      buddhistCount++;
    }
    return result;
  }

  // ── Thai date parser: "17 เม.ย. 2569 17:13" → { date: "2026-04-17", time: "17:13" } ──
  const thMonths = {'ม.ค.':'01','ก.พ.':'02','มี.ค.':'03','เม.ย.':'04','พ.ค.':'05','มิ.ย.':'06','ก.ค.':'07','ส.ค.':'08','ก.ย.':'09','ต.ค.':'10','พ.ย.':'11','ธ.ค.':'12'};
  function parseThaiDateFull(val) {
    if (!val) return { date: '', time: '' };
    const s = String(val).trim();
    const m = s.match(/^(\d{1,2})\s+(\S+)\s+(\d{4})(?:\s+(\d{1,2}:\d{2}))?/);
    if (m) {
      const mo = thMonths[m[2]] || '01';
      let y = Number(m[3]); if (y > 2400) { y -= 543; buddhistCount++; }
      return { date: `${y}-${mo}-${String(m[1]).padStart(2,'0')}`, time: m[4] || '' };
    }
    return { date: convertDate(s), time: extractTimeStr(s) };
  }

  // Parse ตาม format ธนาคาร
  if (bank === 'KTB') {
    // KTB มี 2 formats:
    // A) ปัจจุบัน (20260418...xls): Date | Teller Id | Trans Code | Description | Cheque | Amount | Tax | Balance
    // B) ย้อนหลัง (Statement_KTB...xls): Date/Time | Trans Code | Description | Cheque | W/D Amount | Tax | Balance | Channel
    const sheet = firstSheet;
    let hRow = -1;
    let isHistorical = false;
    for (let i = 0; i < Math.min(15, sheet.length); i++) {
      const joined = (sheet[i]||[]).join('|');
      if (joined.includes('Date')) { 
        hRow = i; 
        // ตรวจว่าเป็น format ไหน
        if (joined.includes('Withdrawal') || joined.includes('Channel') || joined.includes('Date/ Time')) {
          isHistorical = true;
        }
        break; 
      }
    }
    if (hRow < 0) hRow = 10;
    
    for (let i = hRow + 1; i < sheet.length; i++) {
      const r = sheet[i];
      if (!r || !r[0]) continue;
      const dateStr = String(r[0] || '');
      if (!dateStr.match(/\d{2}\/\d{2}\/\d{4}/)) continue; // ข้าม BEGINNING BALANCE / junk
      
      let amt, desc, ref;
      if (isHistorical) {
        // Format B: col 2=Description, col 4=Amount (text "1,638.00")
        amt = Number(String(r[4]||'').replace(/,/g,'')) || 0;
        desc = String(r[2] || '');
        ref = String(r[2] || '').substring(0, 30);
      } else {
        // Format A: col 3=Description, col 5=Amount (number)
        amt = Number(String(r[5]||'').replace(/,/g,'')) || 0;
        desc = String(r[3] || '');
        ref = String(r[3] || '').substring(0, 30);
      }
      
      if (!amt) continue;
      const senderInfo = parseStatementSender('KTB', desc);
      rows.push({ 
        bank, 
        date: convertDate(dateStr), 
        time: extractTimeStr(dateStr), 
        ref_no: ref,
        description: desc, 
        amount: amt, 
        match_status: 'unmatched',
        sender_bank_code: senderInfo?.bank_code || '',
        sender_bank_name: senderInfo?.bank_name || '',
        sender_account: senderInfo?.account_no || '',
        sender_name: senderInfo?.sender_name || '',
      });
    }
  } else if (bank === 'KBANK') {
    // KBANK CSV: resultFile_*.csv
    // Header row 11: ,วันที่,เวลา,รายการ,ถอนเงิน,,ฝากเงิน,,ยอดคงเหลือ,,ช่องทาง,,รายละเอียด
    // Data: ,01-04-26,10:56,รับโอนเงิน,,,"19,029.00",,...
    // Date format: DD-MM-YY (2-digit year!)
    const sheet = firstSheet;
    let hRow = -1;
    for (let i = 0; i < Math.min(15, sheet.length); i++) {
      if (sheet[i] && sheet[i].some(c => String(c).includes('วันที่'))) { hRow = i; break; }
    }
    if (hRow < 0) hRow = 11;
    
    function parseKbankDate(val) {
      if (!val) return '';
      const s = String(val).trim();
      // DD-MM-YY format (e.g. "01-04-26")
      const m = s.match(/^(\d{1,2})-(\d{1,2})-(\d{2,4})$/);
      if (m) {
        let y = Number(m[3]);
        if (y < 100) y += 2000; // 26 → 2026
        if (y > 2400) y -= 543; // พ.ศ.
        return `${String(m[1]).padStart(2,'0')}/${String(m[2]).padStart(2,'0')}/${y}`;
      }
      return s;
    }
    function parseAmt(val) {
      if (!val && val !== 0) return 0;
      return Number(String(val).replace(/,/g, '')) || 0;
    }
    
    for (let i = hRow + 1; i < sheet.length; i++) {
      const r = sheet[i];
      if (!r) continue;
      const dateRaw = r[1] || r[0]; // col 1 = วันที่
      if (!dateRaw) continue;
      const dateStr = parseKbankDate(dateRaw);
      if (!dateStr || dateStr.includes('ยอดยกมา') || dateStr.includes('ยอดยกไป')) continue;
      
      const deposit = parseAmt(r[6]); // col 6 = ฝากเงิน
      const withdraw = parseAmt(r[4]); // col 4 = ถอนเงิน
      if (!deposit && !withdraw) continue;
      
      const kbDesc = String(r[3] || '').trim() + (r[12] ? ' · ' + String(r[12]).trim() : '');
      const kbSender = parseStatementSender('KBANK', kbDesc);
      rows.push({ 
        bank, 
        date: convertDate(dateStr),
        time: String(r[2] || '').trim(),
        ref_no: String(r[12] || '').trim(),
        description: kbDesc,
        amount: deposit || -withdraw, 
        match_status: 'unmatched',
        sender_bank_code: kbSender?.bank_code || '',
        sender_bank_name: kbSender?.bank_name || '',
        sender_account: kbSender?.account_no || '',
        sender_name: kbSender?.sender_name || '',
      });
    }
  } else if (bank === 'BBL NW') {
    // BBL NW: MyDownLoad*.csv
    // Row 0: ชื่อย่อบัญชี, ...
    // Row 1: เลขที่บัญชี, "266-4-414113", ...
    // Row 3: (empty), วันที่, รายละเอียด, หักบัญชี, เข้าบัญชี, ยอดคงเหลือ, ช่องทาง
    // Row 4+: data — col[1]=date(Thai), col[2]=desc, col[3]=debit, col[4]=credit
    const sheet = firstSheet;
    let hRow = -1;
    for (let i = 0; i < Math.min(10, sheet.length); i++) {
      const joined = (sheet[i] || []).join('|');
      if (joined.includes('วันที่') && joined.includes('หักบัญชี')) { hRow = i; break; }
    }
    if (hRow < 0) hRow = 3;
    for (let i = hRow + 1; i < sheet.length; i++) {
      const r = sheet[i];
      if (!r) continue;
      const dateRaw = String(r[1] || r[0] || '').trim();
      if (!dateRaw || dateRaw.length < 5) continue;
      const parsed = parseThaiDateFull(dateRaw);
      if (!parsed.date) continue;
      const debit = Number(String(r[3] || '').replace(/,/g, '')) || 0;
      const credit = Number(String(r[4] || '').replace(/,/g, '')) || 0;
      if (!credit && !debit) continue;
      rows.push({
        bank,
        date: parsed.date,
        time: parsed.time,
        ref_no: String(r[6] || ''),
        description: String(r[2] || ''),
        amount: credit || -debit,
        match_status: 'unmatched'
      });
    }
  } else if (bank === 'BBL') {
    const sheet = firstSheet;
    
    // ── Detect BBL format: "Activity" CSV vs Excel ──
    // CSV Activity: วันที่ทำรายการ | วันที่มีผล | คำอธิบาย | หักบัญชี | เข้าบัญชี | ยอดคงเหลือ | ช่องทาง
    // Excel: (ของเดิม - header row 4, cols different)
    
    let isCsvActivity = false;
    let hRow = -1;
    for (let i = 0; i < Math.min(10, sheet.length); i++) {
      const joined = (sheet[i]||[]).join('|');
      if (joined.includes('วันที่ทำรายการ') && joined.includes('หักบัญชี') && joined.includes('เข้าบัญชี')) {
        hRow = i; isCsvActivity = true; break;
      }
    }
    
    if (isCsvActivity) {
      // BBL CSV Activity export
      for (let i = hRow + 1; i < sheet.length; i++) {
        const r = sheet[i];
        if (!r || !r[0]) continue;
        const dateStr = String(r[0]||'').trim();
        if (!dateStr) continue;
        // Parse date: "17 เม.ย. 2569 03:20"
        const dateMatch = dateStr.match(/^(\d{1,2})\s+(\S+)\s+(\d{4})(?:\s+(\d{1,2}:\d{2}))?/);
        let isoDate = '';
        let timeStr = '';
        if (dateMatch) {
          const [, day, monthTh, year, time] = dateMatch;
          const thMonths = {'ม.ค.':'01','ก.พ.':'02','มี.ค.':'03','เม.ย.':'04','พ.ค.':'05','มิ.ย.':'06','ก.ค.':'07','ส.ค.':'08','ก.ย.':'09','ต.ค.':'10','พ.ย.':'11','ธ.ค.':'12'};
          const mo = thMonths[monthTh] || '01';
          let y = Number(year);
          if (y > 2400) y -= 543; // พ.ศ. → ค.ศ.
          isoDate = `${y}-${mo}-${String(day).padStart(2,'0')}`;
          timeStr = time || '';
        } else {
          isoDate = convertDate(dateStr);
        }
        
        const description = String(r[2]||'').trim();
        const debit = Number(String(r[3]||'').replace(/,/g,'')) || 0;  // หักบัญชี (ออก)
        const credit = Number(String(r[4]||'').replace(/,/g,'')) || 0; // เข้าบัญชี
        const balance = String(r[5]||'');
        const channel = String(r[6]||'');
        
        if (!credit && !debit) continue;
        // ข้ามหัวข้อพวก "ยอดเงินคงเหลือ" ที่อยู่ด้านบน
        if (description.includes('คงเหลือ') || description.includes('เลขที่บัญชี')) continue;
        
        rows.push({
          bank,
          date: isoDate,
          time: timeStr,
          ref_no: channel, // BBL CSV ไม่มี ref ตรงๆ ใช้ช่องทางแทน
          description: description,
          amount: credit || -debit, // บวก = รับ, ลบ = จ่าย
          balance: balance,
          match_status: 'unmatched',
          match_station: '',
          match_bill: '',
        });
      }
    } else {
      // BBL Excel format (ของเดิม)
      hRow = 3;
      for (let i = 0; i < Math.min(8, sheet.length); i++) {
        if (sheet[i] && sheet[i].some(c => String(c).includes('วันที่') || String(c).includes('รายละเอียด'))) { hRow = i; break; }
      }
      for (let i = hRow + 1; i < sheet.length; i++) {
        const r = sheet[i];
        const dateVal = r[1];
        const credit = Number(r[4]) || 0;
        const debit = Number(r[3]) || 0;
        if (!dateVal || (!credit && !debit)) continue;
        if (String(r[2]||'').includes('ยอดรวม') || String(r[0]||'').includes('หมายเหตุ')) continue;
        rows.push({ bank, date: convertDate(dateVal), time: extractTimeStr(dateVal), ref_no: String(r[7]||''), description: String(r[2]||''), amount: credit || -debit, match_status: 'unmatched', match_station: '', match_bill: '' });
      }
    }
  } else if (bank === 'TTB') {
    // TTB XLSX: ACCHIST_*.xlsx
    // Header R1: Date | Time | Debit/Credit | Transaction type | Transaction description | Company name | Company account | Currency | Amount
    // Data: "13/01/2026" | "09:17" | "Credit"/"Debit" | "Withdraw by Cheque" | "Deposit by cheque at ttb YALA" | "บจก. ..." | "3991079207" | "THB" | "20,975.00" / "-500.00"
    const sheet = firstSheet;
    // หา header row (อาจไม่ใช่ R0 เสมอ)
    let hRow = 0;
    for (let i = 0; i < Math.min(5, sheet.length); i++) {
      const joined = (sheet[i]||[]).map(x => String(x||'').toLowerCase()).join('|');
      if (joined.includes('date') && joined.includes('debit') && joined.includes('amount')) {
        hRow = i; break;
      }
    }
    
    function parseTTBAmt(val) {
      if (val == null || val === '') return 0;
      // รองรับทั้ง string "20,975.00" และ number ตรงๆ
      return Number(String(val).replace(/,/g, '').trim()) || 0;
    }
    
    for (let i = hRow + 1; i < sheet.length; i++) {
      const r = sheet[i];
      if (!r || !r[0]) continue;
      const dateRaw = r[0];
      // Date format DD/MM/YYYY (Gregorian)
      const dateStr = convertDate(dateRaw); // convertDate handles DD/MM/YYYY
      if (!dateStr) continue;
      
      const dirCol = String(r[2]||'').trim().toLowerCase(); // Credit/Debit
      const txType = String(r[3]||'').trim();
      const txDesc = String(r[4]||'').trim();
      const coName = String(r[5]||'').trim(); // Company name (ชื่อลูกค้า/ผู้รับ)
      const coAcc = String(r[6]||'').trim();  // Company account
      const rawAmt = parseTTBAmt(r[8]);       // อาจเป็นบวกหรือลบอยู่แล้ว
      if (!rawAmt) continue;
      
      // TTB: บางครั้ง amount เป็นบวกเสมอ + dir บอกทิศ
      // ถ้า amount ไม่มี sign → ใช้ dir กำหนด
      let signedAmt;
      if (rawAmt < 0) {
        signedAmt = rawAmt; // มี sign อยู่แล้ว
      } else {
        signedAmt = dirCol.startsWith('debit') ? -rawAmt : rawAmt;
      }
      
      rows.push({
        bank,
        date: dateStr,
        time: String(r[1]||'').trim(),
        ref_no: coAcc, // ใช้เลขบัญชีเป็น ref (TTB ไม่มี ref แยก)
        description: [txType, txDesc].filter(Boolean).join(' · '),
        amount: signedAmt,
        sender_name: coName,
        sender_account: coAcc,
        sender_bank_name: '', // TTB ไม่ให้ชื่อธนาคารต้นทาง
        match_status: 'unmatched',
      });
    }
  } else {
    const sheet = firstSheet;
    for (let i = 1; i < sheet.length; i++) {
      const r = sheet[i];
      rows.push({ bank, date: convertDate(r[0]), time: String(r[1]||''), ref_no: String(r[2]||''), description: String(r[3]||''), amount: Number(r[4])||0, match_status: 'unmatched', match_station: '', match_bill: '' });
    }
  }

  // เก็บแยกธนาคาร + เรียงตามวันที่
  const { added, skipped } = addStatementRows(bank, rows);
  
  // Backward compat: uploadedStatements = รวมทุกธนาคารที่ sort แล้ว
  uploadedStatements = getAllStatements();
  
  // Silent mode: ไม่ persist/toast/navigate — caller เป็นผู้รับผิดชอบ (batch upload)
  if (silent) {
    return { bank, added, skipped, buddhistCount };
  }
  
  // Persist
  try { safeStorage.set('sf_statementsByBank', JSON.stringify(statementsByBank)); } catch(e) {}
  
  const bhMsg = buddhistCount > 0 ? ` · แปลง พ.ศ.→ค.ศ. ${buddhistCount} รายการ` : '';
  const dupMsg = skipped > 0 ? ` · ข้าม ${skipped} ซ้ำ` : '';
  toast(`อ่าน Statement ${bank} สำเร็จ — เพิ่ม ${added} รายการ${dupMsg}${bhMsg}`, 'success');

  // Re-render matching page with uploaded data
  if (currentPage === 'matching') navigateTo('matching');
  
  return { bank, added, skipped, buddhistCount };
}

// ── Statement Storage by Bank (สะสมได้ + แยกธนาคาร) ──
let statementsByBank = { KTB: [], KBANK: [], 'BBL NW': [], BBL: [], TTB: [], UNKNOWN: [] };

function addStatementRows(bank, rows) {
  if (!statementsByBank[bank]) statementsByBank[bank] = [];
  
  // Dedup key = date + time(HH:MM only) + amount + ref_no
  // ใช้ HH:MM เท่านั้น (ไม่สน seconds) เพื่อให้ดักซ้ำได้แม้ format ต่าง
  function normTime(t) {
    const m = String(t||'').match(/^(\d{1,2}):(\d{2})/);
    return m ? (m[1].padStart(2,'0') + ':' + m[2]) : '';
  }
  function makeKey(r) {
    return `${r.date||''}|${normTime(r.time)}|${Math.round(Number(r.amount)||0)}|${r.ref_no||''}`;
  }
  const existingKeys = new Set(statementsByBank[bank].map(makeKey));
  const uniqueRows = rows.filter(r => !existingKeys.has(makeKey(r)));
  
  statementsByBank[bank] = statementsByBank[bank].concat(uniqueRows);
  
  statementsByBank[bank].sort((a, b) => {
    const da = parseThaiDate(a.date);
    const db = parseThaiDate(b.date);
    return (da || 0) - (db || 0);
  });
  
  return { added: uniqueRows.length, skipped: rows.length - uniqueRows.length };
}

// ── ลบ statement ซ้ำทั้งหมดใน statementsByBank (manual trigger ผ่าน UI) ──
function dedupAllStatements() {
  function normTime(t) {
    const m = String(t||'').match(/^(\d{1,2}):(\d{2})/);
    return m ? (m[1].padStart(2,'0') + ':' + m[2]) : '';
  }
  let totalRemoved = 0;
  Object.keys(statementsByBank).forEach(bank => {
    const arr = statementsByBank[bank] || [];
    if (arr.length === 0) return;
    const seen = new Map();
    const unique = [];
    arr.forEach(r => {
      const key = `${r.date||''}|${normTime(r.time)}|${Math.round(Number(r.amount)||0)}|${r.ref_no||''}`;
      if (seen.has(key)) {
        // ถ้าซ้ำ — เก็บตัวที่ matched ไว้ (ถ้ามี)
        const existing = seen.get(key);
        if (r.match_status === 'matched' && existing.match_status !== 'matched') {
          const i = unique.indexOf(existing);
          if (i >= 0) unique[i] = r;
          seen.set(key, r);
        }
        totalRemoved++;
      } else {
        seen.set(key, r);
        unique.push(r);
      }
    });
    statementsByBank[bank] = unique;
  });
  return totalRemoved;
}

function parseThaiDate(s) {
  if (!s) return 0;
  if (s instanceof Date) return s.getTime();
  const m = String(s).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (!m) return 0;
  let y = Number(m[3]); if (y > 2400) y -= 543;
  return new Date(y, Number(m[2])-1, Number(m[1])).getTime();
}

function getAllStatements() {
  // รวมทุกธนาคาร + เรียงตามวันที่
  const all = [];
  Object.keys(statementsByBank).forEach(bank => {
    all.push(...statementsByBank[bank]);
  });
  all.sort((a, b) => (parseThaiDate(a.date) || 0) - (parseThaiDate(b.date) || 0));
  return all;
}

function clearStatementsByBank(bank) {
  if (bank === 'ALL') {
    statementsByBank = { KTB: [], KBANK: [], 'BBL NW': [], BBL: [], TTB: [], UNKNOWN: [] };
  } else {
    statementsByBank[bank] = [];
  }
}

// ── Persist state to localStorage — function only, restore happens after mainSummary/cashCount declared ──
// แก้ปัญหา lag กับ billList 8,000+ records: cache invalidate ทันที, localStorage I/O debounce
var _persistTimer = null;
var _stateVersion = 0;  // ← bump ทุกครั้งที่ state เปลี่ยน (สำหรับ cache invalidation)
// ══════════════════════════════════════════════════════════════
// HYBRID SYNC MANAGER
//   - Local-first: persistMainState() เขียน local ทันที (ไม่เปลี่ยน)
//   - Background push: queue dirty flags → debounced batch save to backend
//   - Auto pull on login: ถ้า local ว่าง → ดึงจาก cloud
//   - Visible status: "Synced Xs ago" หรือ "⚠ offline"
// ══════════════════════════════════════════════════════════════
const syncManager = {
  enabled: true,            // toggle ผ่าน localStorage['sf_sync_enabled']
  pushDelayMs: 5000,        // debounce 5s หลัง mutation สุดท้าย
  dirty: new Set(),         // types ที่ต้อง push: 'bills','stmts','payments','cashflow','suppliers','meta'
  lastPushAt: 0,
  lastPullAt: 0,
  pushTimer: null,
  status: 'idle',           // idle | pushing | pulling | error | offline
  lastError: null,
  listeners: [],            // callbacks สำหรับ UI
  stats: { pushed: 0, pulled: 0, errors: 0 },
  
  init() {
    const saved = localStorage.getItem('sf_sync_enabled');
    if (saved === '0' || saved === 'false') this.enabled = false;
    const lp = Number(localStorage.getItem('sf_sync_last_pull') || 0);
    if (lp) this.lastPullAt = lp;
  },
  
  setEnabled(on) {
    this.enabled = !!on;
    localStorage.setItem('sf_sync_enabled', on ? '1' : '0');
    this._emit();
  },
  
  onChange(fn) { this.listeners.push(fn); },
  _emit() { this.listeners.forEach(fn => { try { fn(this); } catch(_){} }); },
  
  // Called จาก persistMainState → mark type ว่า dirty แล้ว schedule push
  //
  // ⚠️ สำคัญ: auto-push เฉพาะ type ที่ backend REPLACE (ไม่ append)
  //   - payments (savePayments): replace by sp_no ✓
  //   - cashflow (saveCashflow): replace by id ✓
  //   - suppliers (saveSuppliers): replace ✓
  //   - meta (saveDailyMeta): replace by (date|meta_type) ✓
  //
  // ❌ ห้าม auto-push:
  //   - bills (saveDailySales): APPEND ล้วน → sheet บวม 2x 3x
  //   - stmts (saveStatements): APPEND ล้วน → เหมือนกัน
  // → Bills/Stmts ใช้ pullFromCloud ดึงจาก cloud ได้ + push ผ่าน
  //   ปุ่ม "save daily" manual (หน้า Main) ที่มี logic replace-safe
  markDirty(type) {
    if (!this.enabled) return;
    const SAFE_AUTO_TYPES = ['payments', 'cashflow', 'suppliers', 'meta'];
    if (type) {
      // Only auto-push if type is in safe list
      if (SAFE_AUTO_TYPES.includes(type)) this.dirty.add(type);
    } else {
      // no arg → dirty ALL safe types (ข้าม bills, stmts)
      SAFE_AUTO_TYPES.forEach(t => this.dirty.add(t));
    }
    this._schedulePush();
  },
  
  _schedulePush() {
    if (this.pushTimer) clearTimeout(this.pushTimer);
    this.pushTimer = setTimeout(() => this._flushPush(), this.pushDelayMs);
  },
  
  // Push dirty data to backend (ส่งเป็น batch)
  // ใช้ fingerprint กัน push ซ้ำของที่ไม่เปลี่ยน (ข้อมูลเดิม → sheet บวม ไม่ต้อง roundtrip)
  _fp(obj) {
    const s = JSON.stringify(obj || {});
    let h = 0;
    for (let i = 0; i < s.length; i++) { h = ((h << 5) - h + s.charCodeAt(i)) | 0; }
    return s.length + ':' + h;
  },
  
  async _flushPush() {
    if (!this.enabled || this.dirty.size === 0) return;
    if (this.status === 'pushing') return; // อย่า concurrent push
    
    const types = Array.from(this.dirty);
    this.dirty.clear();
    this.status = 'pushing';
    this._emit();
    
    const results = { ok: 0, fail: 0, errors: [], skipped: 0 };
    const by = window.currentUser?.display_name || 'Admin';
    
    // last fingerprints per type — persist ใน memory (ถ้า refresh หน้า จะ push ครั้งแรกเต็ม)
    this._fpCache = this._fpCache || {};
    
    for (const type of types) {
      try {
        if (type === 'bills') {
          if (billList.length === 0) continue;
          const fp = this._fp({n: billList.length, first: billList[0]?.bill_no, last: billList[billList.length-1]?.bill_no, total: billList.reduce((s,b)=>s+Number(b.amount||0),0)});
          if (fp === this._fpCache.bills) { results.skipped++; continue; }
          const r = await api('saveDailySales', { rows: billList, created_by: by });
          if (r?.success === false) throw new Error(r.error || 'API error');
          this._fpCache.bills = fp;
        } else if (type === 'stmts') {
          const allStmts = getAllStatements();
          if (allStmts.length === 0) continue;
          const fp = this._fp({n: allStmts.length, first: allStmts[0]?.ref_no, last: allStmts[allStmts.length-1]?.ref_no});
          if (fp === this._fpCache.stmts) { results.skipped++; continue; }
          const r = await api('saveStatements', { rows: allStmts, created_by: by });
          if (r?.success === false) throw new Error(r.error || 'API error');
          this._fpCache.stmts = fp;
        } else if (type === 'payments') {
          if (paymentList.length === 0) continue;
          const fp = this._fp({n: paymentList.length, first: paymentList[0]?.sp_no, last: paymentList[paymentList.length-1]?.sp_no});
          if (fp === this._fpCache.payments) { results.skipped++; continue; }
          const r = await api('savePayments', { payments: paymentList, created_by: by });
          if (r?.success === false) throw new Error(r.error || 'API error');
          this._fpCache.payments = fp;
        } else if (type === 'cashflow') {
          if (cashflowList.length === 0) continue;
          const fp = this._fp({n: cashflowList.length, first: cashflowList[0]?.id, last: cashflowList[cashflowList.length-1]?.id});
          if (fp === this._fpCache.cashflow) { results.skipped++; continue; }
          const r = await api('saveCashflow', { records: cashflowList, created_by: by });
          if (r?.success === false) throw new Error(r.error || 'API error');
          this._fpCache.cashflow = fp;
        } else if (type === 'suppliers') {
          const fp = this._fp({sup: supplierList.length, pay: supplierPayments.length});
          if (fp === this._fpCache.suppliers) { results.skipped++; continue; }
          if (supplierList.length > 0) {
            const r = await api('saveSuppliers', { records: supplierList, created_by: by });
            if (r?.success === false) throw new Error(r.error || 'API error');
          }
          if (supplierPayments.length > 0) {
            const r2 = await api('saveSupplierPayments', { records: supplierPayments, created_by: by });
            if (r2?.success === false) throw new Error(r2.error || 'API error');
          }
          this._fpCache.suppliers = fp;
        } else if (type === 'meta') {
          // Meta สำคัญมาก — ใช้ full JSON fingerprint (หนักแต่คุ้ม กันบวม sheet)
          const fp = this._fp({summary: mainSummary, cash_count: cashCount});
          if (fp === this._fpCache.meta) { results.skipped++; continue; }
          const r = await api('saveDailyMeta', { summary: mainSummary, cash_count: cashCount });
          if (r?.success === false) throw new Error(r.error || 'API error');
          this._fpCache.meta = fp;
        }
        results.ok++;
      } catch(err) {
        results.fail++;
        results.errors.push(`${type}: ${err.message}`);
        this.dirty.add(type); // re-queue for next cycle
        console.warn('[sync] push fail', type, err);
      }
    }
    
    if (results.skipped > 0) console.log(`[sync] skipped ${results.skipped} unchanged types`);
    
    this.lastPushAt = Date.now();
    this.stats.pushed += results.ok;
    this.stats.errors += results.fail;
    this.status = results.fail ? 'error' : 'idle';
    this.lastError = results.errors[0] || null;
    this._emit();
  },
  
  // Auto-pull: เรียกจาก showApp หลัง login
  //   mode='auto': pull เฉพาะเมื่อ local ว่าง (หรือ lastPull เก่ามาก)
  //   mode='force': pull เสมอ
  async pullFromCloud(yearsCount = 2, mode = 'auto') {
    if (!this.enabled) return { skipped: 'disabled' };
    
    // Guard: ถ้าไม่มี API_URL → ระบุชัดเจน ไม่ให้ fallback demo เงียบๆ
    if (!API_URL || API_URL.length < 20) {
      const err = 'API_URL ไม่ได้ตั้งค่า — ไม่สามารถ sync ได้ (โปรแกรมจะทำงานแบบ offline/local เท่านั้น)';
      this.status = 'error';
      this.lastError = err;
      this._emit();
      return { skipped: 'no_api_url', bills:0, stmts:0, payments:0, cashflow:0, suppliers:0, meta:0, errors: [err] };
    }
    
    if (mode === 'auto') {
      // "มี local data พอแล้ว" = มีบิลพอสมควร + มี stmts อย่างน้อย 1
      // ถ้า billList น้อยมาก (<10) → treat as empty แม้จะไม่ว่าง 100%
      // เพราะอาจเป็นกรณี: summary โหลดจาก backend แต่ bills ยังว่าง
      const hasEnoughBills = billList.length >= 10;
      const hasStmts = getAllStatements().length > 0;
      const hasLocalData = hasEnoughBills && hasStmts;
      const lastPullRecent = Date.now() - this.lastPullAt < 30 * 60 * 1000; // 30 min
      if (hasLocalData && lastPullRecent) {
        return { skipped: 'has_local_and_recent' };
      }
    }
    
    this.status = 'pulling';
    this._emit();
    
    const stats = { bills: 0, stmts: 0, payments: 0, cashflow: 0, suppliers: 0, meta: 0, errors: [] };
    const now = new Date();
    const years = [];
    for (let i = 0; i < yearsCount; i++) years.push(String(now.getFullYear() - i));
    
    // Helper: ตรวจว่า response เป็น demo fallback หรือไม่
    // demo response ปกติมี exactly 10 bills with IDs like 'SS26040001', 'OS26040001'
    const isDemoResponse = (items) => {
      if (!Array.isArray(items) || items.length === 0) return false;
      const demoMarkers = ['SS26040001','SS26040002','OS26040003','SR26040005'];
      return items.some(b => demoMarkers.includes(b.bill_no));
    };
    
    try {
      // Bills
      const seenBillKeys = new Set(billList.map(b => `${b.bill_no||''}|${b.date||''}|${b.amount||0}|${b.station||''}`));
      for (const y of years) {
        try {
          const r = await api('getDailySales', { year: y });
          if (r?.success === false) throw new Error(r.error || 'API returned error');
          const items = (r?.data?.data) || (Array.isArray(r?.data) ? r.data : []) || [];
          if (!Array.isArray(items)) throw new Error(`Bills ${y}: unexpected response format`);
          if (isDemoResponse(items)) throw new Error(`Bills ${y}: Backend offline (ได้ demo data) — ตรวจ deployment`);
          items.forEach(b => {
            const key = `${b.bill_no||''}|${b.date||''}|${b.amount||0}|${b.station||''}`;
            if (!seenBillKeys.has(key)) {
              billList.push(b);
              seenBillKeys.add(key);
              stats.bills++;
            }
          });
        } catch(err) { stats.errors.push(`Bills ${y}: ${err.message}`); console.warn('[sync] Bills', y, err); }
      }
      
      // Stmts
      const seenStmtKeys = new Set();
      Object.values(statementsByBank).forEach(arr => {
        (arr||[]).forEach(s => seenStmtKeys.add(`${s.bank}|${s.date}|${s.time}|${s.amount}|${s.ref_no||''}`));
      });
      for (const y of years) {
        try {
          const r = await api('getStatements', { year: y });
          if (r?.success === false) throw new Error(r.error || 'API error');
          const items = (r?.data?.data) || (Array.isArray(r?.data) ? r.data : []) || [];
          if (!Array.isArray(items)) throw new Error(`Stmts ${y}: unexpected format`);
          items.forEach(s => {
            const key = `${s.bank}|${s.date}|${s.time}|${s.amount}|${s.ref_no||''}`;
            if (!seenStmtKeys.has(key)) {
              if (!statementsByBank[s.bank]) statementsByBank[s.bank] = [];
              statementsByBank[s.bank].push(s);
              seenStmtKeys.add(key);
              stats.stmts++;
            }
          });
        } catch(err) { stats.errors.push(`Stmts ${y}: ${err.message}`); console.warn('[sync] Stmts', y, err); }
      }
      uploadedStatements = getAllStatements();
      
      // Payments / Cashflow / Suppliers (รวม)
      try {
        const r = await api('getPayments');
        if (r?.success === false) throw new Error(r.error || 'API error');
        const items = (r?.data?.data) || (Array.isArray(r?.data) ? r.data : []) || [];
        if (!Array.isArray(items)) throw new Error('SP: unexpected format');
        const seen = new Set(paymentList.map(p => p.sp_no || p.id));
        items.forEach(p => {
          const k = p.sp_no || p.id;
          if (k && !seen.has(k)) { paymentList.push(p); seen.add(k); stats.payments++; }
        });
      } catch(err) { stats.errors.push(`SP: ${err.message}`); console.warn('[sync] SP', err); }
      
      try {
        const r = await api('getCashflow');
        if (r?.success === false) throw new Error(r.error || 'API error');
        const items = (r?.data?.data) || (Array.isArray(r?.data) ? r.data : []) || [];
        if (!Array.isArray(items)) throw new Error('Cashflow: unexpected format');
        const seen = new Set(cashflowList.map(c => c.id));
        items.forEach(c => {
          if (c.id && !seen.has(c.id)) { cashflowList.push(c); seen.add(c.id); stats.cashflow++; }
        });
      } catch(err) { stats.errors.push(`CF: ${err.message}`); console.warn('[sync] CF', err); }
      
      try {
        const r = await api('getSuppliers');
        if (r?.success === false) throw new Error(r.error || 'API error');
        const items = (r?.data?.data) || (Array.isArray(r?.data) ? r.data : []) || [];
        if (!Array.isArray(items)) throw new Error('Suppliers: unexpected format');
        const seen = new Set(supplierList.map(s => s.supplier_id || s.id || s.name));
        items.forEach(s => {
          const k = s.supplier_id || s.id || s.name;
          if (k && !seen.has(k)) { supplierList.push(s); seen.add(k); stats.suppliers++; }
        });
      } catch(err) { stats.errors.push(`Suppliers: ${err.message}`); console.warn('[sync] Suppliers', err); }
      
      // Meta
      for (const y of years) {
        try {
          const r = await api('getDailyMeta', { year: y });
          if (r?.data?.summary?.__byDate) {
            if (!mainSummary.__byDate) mainSummary.__byDate = {};
            Object.entries(r.data.summary.__byDate).forEach(([d, v]) => {
              if (!mainSummary.__byDate[d]) { mainSummary.__byDate[d] = v; stats.meta++; }
            });
          }
          if (r?.data?.cash_count?.__byDate) {
            if (!cashCount.__byDate) cashCount.__byDate = {};
            Object.entries(r.data.cash_count.__byDate).forEach(([d, v]) => {
              if (!cashCount.__byDate[d]) cashCount.__byDate[d] = v;
            });
          }
        } catch(err) { stats.errors.push(`Meta ${y}: ${err.message}`); }
      }
      
      // Persist locally (หลัง merge แล้ว)
      if (typeof persistMainState === 'function') persistMainState();
      if (typeof invalidateBillsCache === 'function') invalidateBillsCache();
      
      this.lastPullAt = Date.now();
      localStorage.setItem('sf_sync_last_pull', String(this.lastPullAt));
      this.stats.pulled += Object.values(stats).filter(v => typeof v === 'number').reduce((a,b)=>a+b,0);
      this.status = stats.errors.length ? 'error' : 'idle';
      this.lastError = stats.errors[0] || null;
      this._emit();
      return stats;
    } catch(err) {
      this.status = 'error';
      this.lastError = err.message;
      this._emit();
      throw err;
    }
  },
  
  // คืน text สำหรับ status badge
  statusText() {
    if (!this.enabled) return { text: 'Sync ปิด', color: 'var(--text3)' };
    if (this.status === 'pushing') return { text: '☁ กำลังบันทึก…', color: 'var(--info)' };
    if (this.status === 'pulling') return { text: '☁ กำลังดึงข้อมูล…', color: 'var(--info)' };
    if (this.status === 'error') return { text: '⚠ Sync ผิดพลาด', color: 'var(--warn)' };
    if (this.dirty.size > 0) return { text: `⏳ รอบันทึก (${this.dirty.size})`, color: 'var(--warn)' };
    if (this.lastPushAt > 0) {
      const ago = Math.round((Date.now() - this.lastPushAt) / 1000);
      const agoStr = ago < 60 ? `${ago}s` : ago < 3600 ? `${Math.round(ago/60)}m` : `${Math.round(ago/3600)}h`;
      return { text: `☁ Synced ${agoStr} ที่แล้ว`, color: 'var(--success)' };
    }
    return { text: '☁ Ready', color: 'var(--text3)' };
  },
};
syncManager.init();
window.syncManager = syncManager;

function persistMainState() {
  // Bump version → invalidate ทุก cache ที่ check _stateVersion
  _stateVersion++;
  // Invalidate validation cache ทันที (sync) — เพื่อให้ validateAll() re-run ถูกต้อง
  if (typeof validateAll !== 'undefined') {
    validateAll._cache = null;
    validateAll._version = -1;
  }
  // ── Debounce localStorage writes 500ms — เดิมเขียน 1-2 MB ทุก keystroke = lag หนัก ──
  if (_persistTimer) clearTimeout(_persistTimer);
  _persistTimer = setTimeout(function() {
    _persistTimer = null;
    try {
      safeStorage.set('sf_billList', JSON.stringify(billList));
      safeStorage.set('sf_mainSummary', JSON.stringify(mainSummary));
      safeStorage.set('sf_cashCount', JSON.stringify(cashCount));
      safeStorage.set('sf_paymentList', JSON.stringify(paymentList));
      safeStorage.set('sf_cashflowList', JSON.stringify(cashflowList));
      safeStorage.set('sf_supplierList', JSON.stringify(supplierList));
      safeStorage.set('sf_supplierPayments', JSON.stringify(supplierPayments));
      safeStorage.set('sf_ppReport', JSON.stringify(ppReport));
      safeStorage.set('sf_transferLog', JSON.stringify(transferLog));
    } catch (e) { console.warn('Could not persist:', e); }
  }, 500);
  
  // Hybrid: mark ทุกอย่าง dirty → syncManager จะ debounce push backend
  // (ไม่ block UI — เป็น fire-and-forget)
  try { syncManager.markDirty(); } catch(_) {}
}

// Flush pending writes ทันที (เรียกก่อน save หรือปิดหน้า)
function flushPersistState() {
  if (_persistTimer) {
    clearTimeout(_persistTimer);
    _persistTimer = null;
    try {
      safeStorage.set('sf_billList', JSON.stringify(billList));
      safeStorage.set('sf_mainSummary', JSON.stringify(mainSummary));
      safeStorage.set('sf_cashCount', JSON.stringify(cashCount));
      safeStorage.set('sf_paymentList', JSON.stringify(paymentList));
      safeStorage.set('sf_cashflowList', JSON.stringify(cashflowList));
      safeStorage.set('sf_supplierList', JSON.stringify(supplierList));
      safeStorage.set('sf_supplierPayments', JSON.stringify(supplierPayments));
      safeStorage.set('sf_ppReport', JSON.stringify(ppReport));
      safeStorage.set('sf_transferLog', JSON.stringify(transferLog));
    } catch (e) { console.warn('Could not persist:', e); }
  }
}
// ป้องกันข้อมูลหายเมื่อปิด tab ระหว่าง debounce timer
window.addEventListener('beforeunload', flushPersistState);

// ══════════════════════════════════════════════════════════════
// VALIDATION SYSTEM — ตรวจสอบความสมบูรณ์ของข้อมูล
// Levels:
//   'error'   → ห้ามบันทึก (bug ข้อมูล)
//   'warn'    → เตือน แต่บันทึกได้ (ต้องยืนยัน)
//   'info'    → แค่แจ้ง
// ══════════════════════════════════════════════════════════════
function validateBill(b, idx, allBills) {
  const issues = [];
  const dateTag = b.date ? `[${fmtDate(b.date)}] ` : '';
  const billNo = dateTag + (b.bill_no || `(แถว ${idx+1})`);
  
  // ── Voided bills: ไม่ต้อง validate ──
  if (b.match_status === 'void') return issues;
  
  // ── ERRORS (ห้ามบันทึก) ──
  if (!b.date) {
    issues.push({ level:'error', billIdx:idx, field:'date', msg:`${billNo}: ไม่มีวันที่` });
  }
  if (!b.amount || Number(b.amount) === 0) {
    issues.push({ level:'error', billIdx:idx, field:'amount', msg:`${billNo}: ยอดเงินเป็น 0` });
  }
  
  // ── WARNINGS ──
  if (b.type === '' || b.type === undefined || b.type === null) {
    // POS บิลขายสดไม่ต้องเตือน Type (auto-fill ไว้แล้ว)
    if (b.source !== 'pos' && !['Invoice Credit', 'Order Credit'].includes(b.station)) {
      issues.push({ level:'warn', billIdx:idx, field:'type', msg:`${billNo}: ยังไม่ได้เลือก Type` });
    }
  }
  if (b.type === 'Transfer' && !b.bank) {
    // ข้ามสำหรับบิลที่ import มา (JSON/Smart/Summary ไม่มี bank field — ปกติ)
    if (b.source === 'manual') {
      issues.push({ level:'warn', billIdx:idx, field:'bank', msg:`${billNo}: Type=Transfer แต่ยังไม่ได้เลือก Bank` });
    }
  }
  if ((b.station === 'Invoice Credit' || b.station === 'Order Credit') && !b.due_date) {
    // ข้ามสำหรับบิลที่ import มา (ไม่มี due_date — กรอกทีหลังได้)
    if (b.source === 'manual') {
      issues.push({ level:'warn', billIdx:idx, field:'due_date', msg:`${billNo}: บิลเครดิตแต่ยังไม่มี Due Date` });
    }
  }
  
  return issues;
}

function findDuplicateBills() {
  // หาบิลที่ซ้ำกันจริงๆ (ไม่ใช่ split payment)
  // Composite key: bill_no + type + amount (ตรงกับ dedup logic ตอน import)
  // เหตุผล: บิลเดียวกันอาจชำระหลายวิธี เช่น
  //   SS00126-000002 | Cash     | 3      ← ✓ เก็บได้
  //   SS00126-000002 | Transfer | 5515   ← ✓ เก็บได้ (ไม่ถือว่าซ้ำ)
  // แต่ถ้า bill_no + type + amount ตรงกัน = ซ้ำจริง
  const byKey = {};
  billList.forEach((b, i) => {
    if (b.match_status === 'void') return;
    const no = (b.bill_no || '').trim();
    if (!no || no.startsWith('MANUAL-')) return;
    // Composite key
    const key = `${no}|${(b.type || '').trim()}|${Number(b.amount) || 0}`;
    if (!byKey[key]) byKey[key] = [];
    byKey[key].push(i);
  });
  
  const dupes = [];
  Object.keys(byKey).forEach(key => {
    if (byKey[key].length > 1) {
      // แยก bill_no กลับ (เพื่อแสดงข้อความ)
      const firstIdx = byKey[key][0];
      dupes.push({
        bill_no: billList[firstIdx].bill_no,
        indices: byKey[key],
        count: byKey[key].length,
      });
    }
  });
  return dupes;
}

function findSimilarBills() {
  // หาบิลที่น่าสงสัย: วันเดียวกัน + ยอดเดียวกัน + station เดียวกัน (เลขบิลต่าง)
  const groups = {};
  billList.forEach((b, i) => {
    const key = `${toISODate(b.date)}|${Number(b.amount)}|${b.station}|${b.type}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(i);
  });
  
  const suspicious = [];
  Object.keys(groups).forEach(key => {
    if (groups[key].length > 1) {
      const bills = groups[key].map(i => billList[i]);
      const bn = bills.map(b => b.bill_no).filter(Boolean);
      // ถ้าเลขบิลต่างกัน = น่าสงสัย
      if (new Set(bn).size > 1) {
        suspicious.push({ key, indices: groups[key], bills });
      }
    }
  });
  return suspicious;
}

function validateAll() {
  // ── PERF: Cache result — invalidated ทุกครั้งที่ persistMainState ถูกเรียก ──
  // ใช้ version counter แทน length (ไม่จับถ้าแก้เนื้อบิลโดยไม่เปลี่ยนจำนวน)
  if (validateAll._version === _stateVersion && validateAll._cache) {
    return validateAll._cache;
  }
  
  const issues = [];
  const errors = [];
  const warnings = [];
  
  // ── ตรวจทีละบิล ──
  billList.forEach((b, i) => {
    const billIssues = validateBill(b, i, billList);
    billIssues.forEach(iss => {
      if (iss.level === 'error') errors.push(iss);
      else warnings.push(iss);
    });
  });
  
  // ── บิลซ้ำ ──
  const dupes = findDuplicateBills();
  dupes.forEach(d => {
    const firstBill = billList[d.indices[0]];
    const dateTag = firstBill?.date ? `[${fmtDate(firstBill.date)}] ` : '';
    errors.push({
      level: 'error',
      category: 'duplicate',
      msg: `${dateTag}เลขบิลซ้ำ: ${d.bill_no} (${d.count} รายการ)`,
      billIdx: d.indices[0],
    });
  });
  
  // ── บิลน่าสงสัย (วัน+ยอด+station ตรง) ──
  const similar = findSimilarBills();
  similar.forEach(s => {
    const firstBill = billList[s.indices[0]];
    const dateTag = firstBill?.date ? `[${fmtDate(firstBill.date)}] ` : '';
    warnings.push({
      level: 'warn',
      category: 'similar',
      msg: `${dateTag}น่าสงสัย — ${s.bills.length} บิล ยอดเดียวกัน station เดียวกัน: ${s.bills.map(b=>b.bill_no||'(ว่าง)').join(', ')}`,
      billIdx: s.indices[0],
    });
  });
  
  // ── SP ชั่วคราวที่ยังไม่แก้ ──
  const tempSPs = paymentList.filter(p => /^SP-TEMP-/.test(p.sp_no));
  if (tempSPs.length > 0) {
    warnings.push({
      level: 'warn',
      category: 'temp_sp',
      msg: `มี SP ชั่วคราว ${tempSPs.length} รายการ ที่ยังไม่แก้เป็นเลข SP จริง (${tempSPs.map(p=>p.sp_no).slice(0,3).join(', ')}${tempSPs.length>3?'...':''})`,
    });
  }
  
  // ── SP ยอดไม่ตรงกับบิลที่ตัด ──
  paymentList.forEach(p => {
    if (p.is_temp || !p.bills || p.bills.length === 0) return;
    const childSum = p.bills.reduce((s, b) => s + Number(b.amount || 0), 0);
    if (Math.abs(childSum - Number(p.total||0)) > 1) {
      errors.push({
        level: 'error',
        category: 'sp_mismatch',
        msg: `${p.sp_no}: ยอดรวมบิลที่ตัด (฿${fmtNum(childSum)}) ≠ ยอด SP (฿${fmtNum(p.total)})`,
      });
    }
  });
  
  // ── แจ้งเตือน Due Date / เช็ครอเคลียร์ ──
  // เตือนวัน due date เลย (today >= due_date) สำหรับ:
  // 1. บิลเช็ค (Type=Cheque) ที่มี expected_clear_date หรือ due_date
  // 2. ทุกบิลที่มี due_date (เช่น SR/OR เครดิต)
  const today = todayISO();
  
  // 1) เช็ครอเคลียร์: expected_clear_date ถึงหรือเลยแล้ว
  const chequesOverdue = billList.filter(b => 
    b.type === 'Cheque' && b.expected_clear_date && toISODate(b.expected_clear_date) <= today &&
    b.match_status !== 'matched' && b.match_status !== 'bounced' && b.match_status !== 'paid'
  );
  chequesOverdue.forEach(b => {
    const dateTag = b.date ? `[${fmtDate(b.date)}] ` : '';
    const clearDate = fmtDate(b.expected_clear_date);
    const isPast = toISODate(b.expected_clear_date) < today;
    warnings.push({
      level: 'warn',
      category: 'cheque_due',
      msg: `${dateTag}${b.bill_no||'เช็ค'}: ${isPast ? '⏰ เลยกำหนดเคลียร์' : '📅 ถึงกำหนดเคลียร์วันนี้'} (${clearDate}) ยอด ฿${fmtNum(b.amount)} — ตรวจสอบว่าเข้าหรือเด้ง`,
      billIdx: billList.indexOf(b),
    });
  });
  
  // 2) บิลที่มี due_date ถึงหรือเลยแล้ว (SR/OR เครดิต ฯลฯ)
  const dueDateBills = billList.filter(b => 
    b.due_date && toISODate(b.due_date) <= today &&
    b.type !== 'Cheque' && // เช็คจัดการข้างบนแล้ว
    b.match_status !== 'matched' && b.match_status !== 'paid' && b.match_status !== 'void'
  );
  if (dueDateBills.length > 0) {
    // Group ตามวัน due_date เพื่อไม่ให้เตือนทีละบิล (เยอะเกินไป)
    const byDueDate = {};
    dueDateBills.forEach(b => {
      const dd = toISODate(b.due_date);
      if (!byDueDate[dd]) byDueDate[dd] = [];
      byDueDate[dd].push(b);
    });
    Object.keys(byDueDate).sort().forEach(dd => {
      const bills = byDueDate[dd];
      const totalAmt = bills.reduce((s, b) => s + (Number(b.amount) || 0), 0);
      const isPast = dd < today;
      const sample = bills.slice(0, 3).map(b => b.bill_no || '(ไม่มีเลข)').join(', ');
      warnings.push({
        level: 'warn',
        category: 'due_date',
        msg: `${isPast ? '⏰ เลยกำหนด' : '📅 ครบกำหนดวันนี้'} ${fmtDate(dd)}: ${bills.length} บิล รวม ฿${fmtNum(totalAmt)} (${sample}${bills.length > 3 ? '...' : ''})`,
      });
    });
  }
  
  // ── Cashflow ที่ยังไม่ match (Transfer/Supplier) ──
  const unmatchedCashflow = cashflowList.filter(c => 
    c.match_status !== 'matched' && (c.type === 'deposit' || c.type === 'supplier' || c.type === 'transfer')
  );
  if (unmatchedCashflow.length > 3) {
    warnings.push({
      level: 'warn',
      category: 'cashflow_unmatched',
      msg: `มีรายการเงินเข้า-ออก ${unmatchedCashflow.length} รายการยังไม่ match กับ Statement`,
    });
  }
  
  // ── Supplier ที่ไม่มีชื่อคู่ค้า ──
  const supplierNoName = cashflowList.filter(c => c.type === 'supplier' && !c.counterparty);
  if (supplierNoName.length > 0) {
    warnings.push({
      level: 'warn',
      category: 'supplier_no_name',
      msg: `มีรายการจ่าย Supplier ${supplierNoName.length} รายการที่ยังไม่ได้ระบุชื่อ Supplier`,
    });
  }
  
  // ── Business Rules Violations ──
  cashflowList.forEach((c, i) => {
    if (!c.bank || !c.vat) return;
    const bankDef = BANK_ACCOUNTS[c.bank];
    if (!bankDef) return;
    
    // บัญชีไม่ตรง VAT ↔ NOVAT
    if (bankDef.vat !== c.vat) {
      errors.push({
        level: 'error',
        category: 'rule_violation',
        msg: `รายการ #${i+1} (฿${fmtNum(c.amount)}) — ${c.vat} แต่ใช้บัญชี ${c.bank} (${bankDef.vat})`,
      });
    }
    
    // Rule: Supplier VAT → ปกติจาก KBANK (หรือ BBL ถ้าจำเป็น)
    if (c.type === 'supplier' && c.vat === 'VAT' && c.bank === 'KTB') {
      errors.push({
        level: 'error',
        category: 'rule_violation',
        msg: `Supplier VAT #${i+1} (฿${fmtNum(c.amount)}) ใช้ KTB — KTB เป็นบัญชีรับโอนลูกหนี้เท่านั้น`,
      });
    }
    // Rule: Supplier NOVAT → BBL NW
    if (c.type === 'supplier' && c.vat === 'NOVAT' && c.bank !== 'BBL NW') {
      errors.push({
        level: 'error',
        category: 'rule_violation',
        msg: `Supplier NOVAT #${i+1} (฿${fmtNum(c.amount)}) ใช้บัญชี ${c.bank} — กฎกำหนดให้ใช้ BBL NW`,
      });
    }
    // Rule: Deposit VAT → KTB (or BBL) 
    if (c.type === 'deposit' && c.vat === 'VAT' && c.bank === 'KBANK') {
      warnings.push({
        level: 'warn',
        category: 'rule_violation',
        msg: `รายการ Deposit VAT ฝาก KBANK — KBANK เป็นบัญชีจ่ายเจ้าหนี้ ปกติรับลูกหนี้ไปที่ KTB หรือ BBL`,
      });
    }
    // Rule: Deposit NOVAT → BBL NW
    if (c.type === 'deposit' && c.vat === 'NOVAT' && c.bank !== 'BBL NW') {
      warnings.push({
        level: 'warn',
        category: 'rule_violation',
        msg: `รายการ Deposit NOVAT ฝาก ${c.bank} — ปกติควรเข้า BBL NW`,
      });
    }
  });
  
  const result = { errors, warnings, hasIssues: errors.length > 0 || warnings.length > 0 };
  validateAll._version = _stateVersion;
  validateAll._cache = result;
  return result;
}

function showValidationModal(validation, onContinue) {
  const { errors, warnings } = validation;
  
  if (errors.length === 0 && warnings.length === 0) {
    // สมบูรณ์ทั้งหมด
    if (onContinue) onContinue();
    return;
  }
  
  const html = `
    <div class="flex-col gap-3">
      ${errors.length > 0 ? `
        <div style="padding:12px;background:rgba(239,87,87,.12);border-radius:8px;border-left:3px solid var(--danger)">
          <div class="font-semi" style="color:var(--danger);margin-bottom:8px">🚨 ข้อผิดพลาด ${errors.length} รายการ (ต้องแก้ไขก่อนบันทึก)</div>
          <div style="max-height:200px;overflow-y:auto">
            ${errors.map(e => `<div class="text-sm" style="padding:4px 0;border-bottom:1px solid var(--border)">• ${e.msg}</div>`).join('')}
          </div>
        </div>
      ` : ''}
      ${warnings.length > 0 ? `
        <div style="padding:12px;background:rgba(245,166,35,.10);border-radius:8px;border-left:3px solid var(--warn)">
