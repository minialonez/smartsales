  //
  // ⚠️ CRITICAL: ต้อง preserve dirty types ที่มี pre-pull edits ของ user
  //    เก่า: dirty.delete ทุก type → user's edits ก่อน pull หาย (race: edit→pull→push skip)
  //    ใหม่: ถ้า dirty.has(type) → skip update fp + keep dirty → push cycle ถัดไปจะ sync
  _recomputeFpCache() {
    this._fpCache = this._fpCache || {};
    const TYPES = ['bills','stmts','meta','payments','sp_temps','cashflow','suppliers'];
    TYPES.forEach(t => {
      if (this.dirty.has(t)) return; // skip — local has pending edit ที่ยังไม่ push
      const fp = this._computeFp(t);
      if (fp) this._fpCache[t] = fp;
    });
    // ⭐ DO NOT clear dirty — pre-pull edits ต้อง trigger push ครั้งถัดไป
  },
  
  async _flushPush() {
    if (!this.enabled || this.dirty.size === 0) return;
    if (this.status === 'pushing') return; // อย่า concurrent push
    
    const types = Array.from(this.dirty);
    this.dirty.clear();
    this.status = 'pushing';
    this._emit();
    
    const results = { ok: 0, fail: 0, errors: [], skipped: 0 };
    const by = window.currentUser?.display_name || 'Admin';
    
    // last fingerprints per type — persist ใน memory (ถ้า refresh หน้า จะ push ครั้งแรกเต็ม)
    this._fpCache = this._fpCache || {};
    
    for (const type of types) {
      try {
        if (type === 'bills') {
          if (billList.length === 0) continue;
          // Deep fingerprint — include ทุก mutable field per bill (uuid + key edit fields)
          // เพื่อ detect user edit: remarks, match_status, confirmation, pay_date, amount
          // ถ้าฟิลด์ที่ user แก้บ่อยเปลี่ยน → fp ต่าง → push ไป cloud
          const fpParts = new Array(billList.length);
          for (let i = 0; i < billList.length; i++) {
            const b = billList[i];
            // ลำดับสำคัญ — ถ้าเพิ่ม field ใหม่ต้องเพิ่มที่นี่ด้วย
            fpParts[i] = (b.bill_uuid || b.bill_no || i) + '|' +
                        (b.amount || 0) + '|' +
                        (b.type || '') + '|' +
                        (b.station || '') + '|' +
                        (b.match_status || '') + '|' +
                        (b.confirmation || '') + '|' +
                        (b.pay_date || '') + '|' +
                        (b.remarks1 || '') + '|' +
                        (b.remarks2 || '') + '|' +
                        (b.matched_stmt_ref || '') + '|' +
                        (b.paid_by_sp || '') + '|' +
                        (b.due_date || '');
          }
          const fp = this._fp(billList.length + ':' + fpParts.join(';'));
          if (fp === this._fpCache.bills) { results.skipped++; continue; }
          
          // ── UUID-based upsert (ไม่ทำให้ sheet บวม) ──
          // Gen uuid ให้บิลที่ยังไม่มี (บิลใหม่ที่เพิ่งเพิ่ม)
          billList.forEach(b => {
            if (!b.bill_uuid) {
              b.bill_uuid = (typeof crypto !== 'undefined' && crypto.randomUUID) 
                ? crypto.randomUUID() 
                : 'b-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
            }
          });
          // Group by year (bills ของปีไหนไปปีนั้น)
          const billsByYr = {};
          billList.forEach(b => {
            const d = String(b.date || '').trim();
            let m = d.match(/^\d{1,2}\/\d{1,2}\/(\d{4})/) || d.match(/^(\d{4})-\d{2}-\d{2}/);
            let y = m ? m[1] : String(new Date().getFullYear());
            if (Number(y) > 2400) y = String(Number(y) - 543);
            if (!billsByYr[y]) billsByYr[y] = [];
            // Normalize date to ISO for consistent upsert
            const isoDate = typeof toISODate === 'function' ? (toISODate(b.date) || b.date) : b.date;
            billsByYr[y].push({ ...b, date: isoDate });
          });
          // Push ต่อปี
          // ⭐ Pass deleted uuids ด้วย — backend จะลบ row ที่ uuid ตรงกัน
          const delUuids = [...this.deletedBillUuids];
          let deleteSent = false;
          let totalDeleted = 0; // ⭐ ติดตามจำนวนที่ backend ลบจริง
          for (const yr of Object.keys(billsByYr)) {
            // Chunk 500 ต่อ request
            const chunks = billsByYr[yr];
            for (let i = 0; i < chunks.length; i += 500) {
              const isFirstChunk = !deleteSent && i === 0;
              const r = await api('upsertBills', {
                year: yr,
                records: chunks.slice(i, i + 500),
                // ส่ง deletes พร้อม chunk แรกเท่านั้น (กันลบซ้ำ)
                deletes: isFirstChunk ? delUuids : [],
              });
              if (r?.success === false) throw new Error(r.error || 'upsertBills API error');
              if (isFirstChunk) {
                deleteSent = true;
                // ⭐ track จำนวนที่ลบจริง (จาก backend response)
                totalDeleted = Number(r?.data?.deleted) || 0;
              }
            }
          }
          // ถ้าไม่มี bill เหลือ (ลบหมดทั้ง year) → push delete-only ไปเลย
          if (Object.keys(billsByYr).length === 0 && delUuids.length > 0) {
            const curYr = String(new Date().getFullYear());
            const r = await api('upsertBills', { year: curYr, records: [], deletes: delUuids });
            totalDeleted = Number(r?.data?.deleted) || 0;
          }
          // ⭐ Clear tracked deletes เฉพาะถ้าลบสำเร็จครบ
          //    ถ้า partial (e.g., uuid ไม่อยู่ใน cloud sheet) → keep tracked → retry next push
          //    ป้องกัน "ลบแล้วกลับมา" จาก partial delete failure
          if (delUuids.length > 0) {
            if (totalDeleted >= delUuids.length) {
              // ลบครบ → clear tracked
              this.deletedBillUuids.clear();
              try { localStorage.removeItem('sf_deleted_bill_uuids'); } catch(_){}
              console.log(`[sync] Deleted ${totalDeleted}/${delUuids.length} bills from cloud ✓`);
            } else {
              // ⚠️ ลบไม่ครบ — keep uuids ที่ยัง track ไว้ → retry next push
              // (อาจเกิดจาก uuid mismatch ระหว่าง local กับ cloud, race condition, partial backend fail)
              console.warn(`[sync] Bills delete partial: ${totalDeleted}/${delUuids.length} → keep tracked uuids for retry`);
              // schedule push อีก 10s ลอง delete ที่ค้าง
              setTimeout(() => {
                if (this.deletedBillUuids.size > 0) {
                  this.dirty.add('bills');
                  this._schedulePush();
                }
              }, 10000);
            }
          }
          this._fpCache.bills = fp;
        } else if (type === 'stmts') {
          const allStmts = getAllStatements();
          if (allStmts.length === 0) continue;
          // Deep fingerprint — detect match_status / match_bill / confirmation changes
          const fpParts = new Array(allStmts.length);
          for (let i = 0; i < allStmts.length; i++) {
            const s = allStmts[i];
            // Safe matched_bills: may be Array, String, or missing
            let mb = s.matched_bills;
            if (Array.isArray(mb)) mb = mb.join(',');
            else if (typeof mb === 'string') mb = mb;
            else mb = '';
            fpParts[i] = (s.stmt_uuid || s.ref_no || i) + '|' +
                        (s.amount || 0) + '|' +
                        (s.match_status || '') + '|' +
                        (s.match_bill || '') + '|' +
                        (s.match_station || '') + '|' +
                        (s.match_sp || '') + '|' +
                        mb + '|' +
                        (s.match_method || '');
          }
          const fp = this._fp(allStmts.length + ':' + fpParts.join(';'));
          if (fp === this._fpCache.stmts) { results.skipped++; continue; }
          
          // ── UUID-based upsert ──
          allStmts.forEach(s => {
            if (!s.stmt_uuid) {
              s.stmt_uuid = (typeof crypto !== 'undefined' && crypto.randomUUID) 
                ? crypto.randomUUID() 
                : 's-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
            }
          });
          const stmtsByYr = {};
          allStmts.forEach(s => {
            const d = String(s.date || s.trans_date || '').trim();
            let m = d.match(/^\d{1,2}\/\d{1,2}\/(\d{4})/) || d.match(/^(\d{4})-\d{2}-\d{2}/);
            let y = m ? m[1] : String(new Date().getFullYear());
            if (Number(y) > 2400) y = String(Number(y) - 543);
            if (!stmtsByYr[y]) stmtsByYr[y] = [];
            const isoDate = typeof toISODate === 'function' ? (toISODate(s.date || s.trans_date) || s.date) : s.date;
            stmtsByYr[y].push({ ...s, date: isoDate });
          });
          // ⭐ Pass deleted stmt uuids
          const delStmtUuids = [...this.deletedStmtUuids];
          let stmtDeleteSent = false;
          let totalDeletedStmts = 0;
          for (const yr of Object.keys(stmtsByYr)) {
            const chunks = stmtsByYr[yr];
            for (let i = 0; i < chunks.length; i += 500) {
              const isFirstChunk = !stmtDeleteSent && i === 0;
              const r = await api('upsertStatements', {
                year: yr,
                records: chunks.slice(i, i + 500),
                deletes: isFirstChunk ? delStmtUuids : [],
              });
              if (r?.success === false) throw new Error(r.error || 'upsertStatements API error');
              if (isFirstChunk) {
                stmtDeleteSent = true;
                totalDeletedStmts = Number(r?.data?.deleted) || 0;
              }
            }
          }
          if (Object.keys(stmtsByYr).length === 0 && delStmtUuids.length > 0) {
            const curYr = String(new Date().getFullYear());
            const r = await api('upsertStatements', { year: curYr, records: [], deletes: delStmtUuids });
            totalDeletedStmts = Number(r?.data?.deleted) || 0;
          }
          // ⭐ Verify before clear (เหมือน bills)
          if (delStmtUuids.length > 0) {
            if (totalDeletedStmts >= delStmtUuids.length) {
              this.deletedStmtUuids.clear();
              try { localStorage.removeItem('sf_deleted_stmt_uuids'); } catch(_){}
              console.log(`[sync] Deleted ${totalDeletedStmts}/${delStmtUuids.length} stmts from cloud ✓`);
            } else {
              console.warn(`[sync] Stmts delete partial: ${totalDeletedStmts}/${delStmtUuids.length} → keep tracked uuids for retry`);
              setTimeout(() => {
                if (this.deletedStmtUuids.size > 0) {
                  this.dirty.add('stmts');
                  this._schedulePush();
                }
              }, 10000);
            }
          }
          this._fpCache.stmts = fp;
        } else if (type === 'payments') {
          if (paymentList.length === 0) continue;
          const fp = this._fp({n: paymentList.length, first: paymentList[0]?.sp_no, last: paymentList[paymentList.length-1]?.sp_no});
          if (fp === this._fpCache.payments) { results.skipped++; continue; }
          const r = await api('savePayments', { payments: paymentList, created_by: by });
          if (r?.success === false) throw new Error(r.error || 'API error');
          this._fpCache.payments = fp;
        } else if (type === 'sp_temps') {
          // spTempList เล็ก (ชั่วคราว) — push เสมอเมื่อ dirty + fingerprint skip
          const fp = this._fp({n: spTempList.length, paids: spTempList.map(t => (t.partials||[]).length), links: spTempList.map(t => t.linked_sp||'')});
          if (fp === this._fpCache.sp_temps) { results.skipped++; continue; }
          const r = await api('saveSpTemps', { records: spTempList, created_by: by });
          if (r?.success === false) throw new Error(r.error || 'API error');
          this._fpCache.sp_temps = fp;
        } else if (type === 'cashflow') {
          if (cashflowList.length === 0) continue;
          const fp = this._fp({n: cashflowList.length, first: cashflowList[0]?.id, last: cashflowList[cashflowList.length-1]?.id});
          if (fp === this._fpCache.cashflow) { results.skipped++; continue; }
          const r = await api('saveCashflow', { records: cashflowList, created_by: by });
          if (r?.success === false) throw new Error(r.error || 'API error');
          this._fpCache.cashflow = fp;
        } else if (type === 'suppliers') {
          const fp = this._fp({sup: supplierList.length, pay: supplierPayments.length});
          if (fp === this._fpCache.suppliers) { results.skipped++; continue; }
          if (supplierList.length > 0) {
            const r = await api('saveSuppliers', { records: supplierList, created_by: by });
            if (r?.success === false) throw new Error(r.error || 'API error');
          }
          if (supplierPayments.length > 0) {
            const r2 = await api('saveSupplierPayments', { records: supplierPayments, created_by: by });

        } else if (type === 'meta') {

          if (fp === this._fpCache.meta) { results.skipped++; continue; }

          // meta_uuid = dateISO + '|' + meta_type → stable key → upsert แทน append
          // ⭐ buildCompactMetaRows เป็น window-global guaranteed (define ตั้งแต่ parse time)
          const metaRows = window.buildCompactMetaRows();
          const byYear = {};
          metaRows.forEach(function(row) {
            const parts = String(row.date).split('/');
            let y = parts.length === 3 ? parts[2] : String(new Date().getFullYear());
            if (Number(y) > 2400) y = String(Number(y) - 543);
            if (!byYear[y]) byYear[y] = [];
            byYear[y].push(row);
          });
          for (const y of Object.keys(byYear)) {
            const r = await api('upsertMeta', { year: y, records: byYear[y], deletes: [] });

          }
          this._fpCache.meta = fp;
        }
        results.ok++;
      } catch(err) {
        results.fail++;
        const errMsg = err?.message || String(err);
        results.errors.push(`${type}: ${errMsg}`);
        // Smart re-queue: ถ้า error บอกว่า backend ไม่รู้จัก action → อย่า re-queue (ไร้ประโยชน์)
        // Patterns: "unknown action", "not found", "ไม่พบ", "action not supported"
        const isBackendMissing = /unknown action|not found|not supported|ไม่พบ|ไม่รู้จัก|action.*invalid/i.test(errMsg);
        if (!isBackendMissing) {
          this.dirty.add(type); // re-queue for next cycle
        } else {
          console.warn(`[sync] ${type} — backend not ready, skip re-queue:`, errMsg);
        }
        console.warn('[sync] push fail', type, err);
      }
    }
    
    if (results.skipped > 0) console.log(`[sync] skipped ${results.skipped} unchanged types`);
    
    this.lastPushAt = Date.now();
    this.stats.pushed += results.ok;
    this.stats.errors += results.fail;
    this.status = results.fail ? 'error' : 'idle';
    this.lastError = results.errors[0] || null;
    this._emit();
  },
  
  // Auto-pull: เรียกจาก showApp หลัง login
  //   mode='auto': pull เฉพาะเมื่อ local ว่าง (หรือ lastPull เก่ามาก)
  //   mode='force': pull เสมอ
  async pullFromCloud(yearsCount = 2, mode = 'auto') {
    if (!this.enabled) return { skipped: 'disabled' };
    
    // Guard: ถ้าไม่มี API_URL → ระบุชัดเจน ไม่ให้ fallback demo เงียบๆ
    if (!API_URL || API_URL.length < 20) {
      const err = 'API_URL ไม่ได้ตั้งค่า — ไม่สามารถ sync ได้ (โปรแกรมจะทำงานแบบ offline/local เท่านั้น)';
      this.status = 'error';
      this.lastError = err;
      this._emit();
      return { skipped: 'no_api_url', bills:0, stmts:0, payments:0, cashflow:0, suppliers:0, meta:0, errors: [err] };
    }
    
    if (mode === 'auto') {
      // "มี local data พอแล้ว" = มีบิล + stmts + meta อย่างน้อย 1 date
      // ถ้า billList น้อยมาก (<10) → treat as empty
      // ถ้า meta ว่างแต่ bills/stmts ครบ → ต้อง pull meta (ไม่ skip)
      const hasEnoughBills = billList.length >= 10;
      const hasStmts = getAllStatements().length > 0;
      const hasMeta = Object.keys(mainSummary?.__byDate || {}).length > 0;
      const hasLocalData = hasEnoughBills && hasStmts && hasMeta;
      const lastPullRecent = Date.now() - this.lastPullAt < 30 * 60 * 1000; // 30 min
      if (hasLocalData && lastPullRecent) {
        return { skipped: 'has_local_and_recent' };
      }
    }
    
    this.status = 'pulling';
    this._inPull = true;  // ⭐ Gate: persistMainState() จะ skip markDirty ระหว่าง flag นี้
    this._emit();
    
    const stats = { bills: 0, stmts: 0, payments: 0, cashflow: 0, suppliers: 0, meta: 0, errors: [] };
    const now = new Date();
    const years = [];
    for (let i = 0; i < yearsCount; i++) years.push(String(now.getFullYear() - i));
    
    // Helper: ตรวจว่า response เป็น demo fallback หรือไม่
    // demo response ปกติมี exactly 10 bills with IDs like 'SS26040001', 'OS26040001'
    const isDemoResponse = (items) => {
      if (!Array.isArray(items) || items.length === 0) return false;
      const demoMarkers = ['SS26040001','SS26040002','OS26040003','SR26040005'];
      return items.some(b => demoMarkers.includes(b.bill_no));
    };
    
    try {
      // ── Bills: UUID-based pull (stable key = bill_uuid) ──
      // Fallback: ถ้า cloud ยังไม่มี uuid column → ใช้ composite key
      const seenBillUuids = new Set(billList.map(b => b.bill_uuid).filter(Boolean));
      const billCompositeKey = (b) => {
        const d = toISODate(b.date) || '';
        return `${b.bill_no||''}|${d}|${Number(b.amount)||0}|${b.station||''}|${b.type||''}`;
      };
      const seenBillCompositeKeys = new Set(billList.map(billCompositeKey));
      
      for (const y of years) {
        try {
          // Try UUID-based first (post-migrate)
          const r = await api('getBillsWithUuid', { year: y });
          if (r?.success && Array.isArray(r.data?.rows) && r.data.rows.length > 0) {
            r.data.rows.forEach(b => {
              const uuid = b.bill_uuid;
              // ⭐ Skip uuids ที่ local ลบไปแล้ว แต่ cloud ยังไม่ได้ลบตาม (push ค้าง)
              if (uuid && this.deletedBillUuids.has(uuid)) return;
              if (uuid) {
                // UUID-based dedup (stable)
                if (!seenBillUuids.has(uuid)) {
                  billList.push(b);
                  seenBillUuids.add(uuid);
                  stats.bills++;
                } else {
                  // ⭐ UPDATE existing — multi-device sync
                  // เครื่องอื่นอาจแก้ record นี้ → merge cloud data เข้า local
                  // ยกเว้นถ้า local อยู่ใน dirty state (กำลังจะ push) → trust local
                  if (!this.dirty.has('bills')) {
                    const idx = billList.findIndex(x => x.bill_uuid === uuid);
                    if (idx >= 0) {
                      // ⭐ Match-state guard: ถ้า local matched + matched_at ใหม่กว่า cloud updated_at → skip
                      //    ป้องกัน race delta push ค้าง → poll pull มาก่อน → revert
                      const localBill = billList[idx];
                      // 🔒 Lock guard: ถ้าวันที่บิลถูก lock → ไม่ให้ cloud ทับ local (ยกเว้น matching fields)
                      if (typeof isDateLocked === 'function' && isDateLocked(toISODate(localBill.date))) {
                        // Allow merge เฉพาะ matching fields (เพราะ matching ทำได้ใน lock day)
                        const MATCH_FIELDS = ['match_status','confirmation','matched_stmt_ref','matched_at','pay_date','paid_by_sp'];
                        MATCH_FIELDS.forEach(f => {
                          if (b[f] !== undefined) localBill[f] = b[f];
                        });
                        return; // skip full merge
                      }
                      const localMatched = localBill.match_status === 'matched' || localBill.match_status === 'paid';
                      const cloudMatched = b.match_status === 'matched' || b.match_status === 'paid';
                      if (localMatched && !cloudMatched) {
                        const localMatchedAt = localBill.matched_at ? new Date(localBill.matched_at).getTime() : 0;
                        const cloudUpdatedAt = b.updated_at ? new Date(b.updated_at).getTime() : 0;
                        if (localMatchedAt > cloudUpdatedAt - 60000) {
                          return; // skip — local is fresher
                        }
                      }
                      Object.assign(localBill, b); // cloud-wins merge (default)
                    }
                  }
                }
              } else {
                // Fallback: row ไม่มี uuid → ใช้ composite
                const key = billCompositeKey(b);
                if (!seenBillCompositeKeys.has(key)) {
                  billList.push(b);
                  seenBillCompositeKeys.add(key);
                  stats.bills++;
                }
              }
            });
          } else if (r?.success === false && !r._networkError) {
            // UUID endpoint มีอยู่แต่ไม่มีข้อมูล → OK, ไม่ต้อง fallback
            // (สมัยก่อน fallback ไป getDailySales — ลบทิ้งเพราะ schema เก่าไม่ใช้แล้ว)
          }
        } catch(err) { stats.errors.push(`Bills ${y}: ${err.message}`); console.warn('[sync] Bills', y, err); }
      }
      
      // ── Stmts: UUID-based pull ──
      const seenStmtUuids = new Set();
      Object.values(statementsByBank).forEach(arr => {
        (arr||[]).forEach(s => { if (s.stmt_uuid) seenStmtUuids.add(s.stmt_uuid); });
      });
      const stmtCompositeKey = (s) => {
        const d = toISODate(s.date || s.trans_date) || '';
        return `${s.bank||''}|${d}|${s.time||''}|${Number(s.amount)||0}|${s.ref_no||''}`;
      };
      const seenStmtCompositeKeys = new Set();
      Object.values(statementsByBank).forEach(arr => {
        (arr||[]).forEach(s => seenStmtCompositeKeys.add(stmtCompositeKey(s)));
      });
      
      // ⭐ Normalize stmt fields ที่อาจกลับมาเป็น string แทน array
      //   matched_bills: ถ้า backend เก็บเป็น JSON string หรือ comma-separated → parse เป็น array
      const normalizeStmt = (s) => {
        if (s.matched_bills != null && !Array.isArray(s.matched_bills)) {
          const str = String(s.matched_bills).trim();
          if (str === '' || str === '[]') {
            delete s.matched_bills;
          } else if (str.startsWith('[')) {
            try { s.matched_bills = JSON.parse(str); }
            catch { s.matched_bills = str.split(',').map(x => x.trim()).filter(Boolean); }
          } else {
            s.matched_bills = str.split(',').map(x => x.trim()).filter(Boolean);
          }
          // Final guard: ensure Array
          if (!Array.isArray(s.matched_bills)) delete s.matched_bills;
        }
        // ⭐ Clean junk time: "30/12/1899", "30/12/1899 HH:MM" → "HH:MM" or ""
        if (s.time != null && typeof fmtStmtTime === 'function') {
          s.time = fmtStmtTime(s.time);
        }
        return s;
      };
      
      for (const y of years) {
        try {
          const r = await api('getStatementsWithUuid', { year: y });
          if (r?.success && Array.isArray(r.data?.rows) && r.data.rows.length > 0) {
            r.data.rows.forEach(s => {
              normalizeStmt(s);
              const uuid = s.stmt_uuid;
              // ⭐ Skip uuids ที่ local ลบไปแล้ว
              if (uuid && this.deletedStmtUuids.has(uuid)) return;
              if (!statementsByBank[s.bank]) statementsByBank[s.bank] = [];
              if (uuid) {
                if (!seenStmtUuids.has(uuid)) {
                  statementsByBank[s.bank].push(s);
                  seenStmtUuids.add(uuid);
                  stats.stmts++;
                } else {
                  // ⭐ UPDATE existing — multi-device sync
                  if (!this.dirty.has('stmts')) {
                    // หา stmt เดิม (search ทุก bank เพราะอาจย้าย bank ได้)
                    let found = null;
                    for (const bk of Object.keys(statementsByBank)) {
                      const idx = statementsByBank[bk].findIndex(x => x.stmt_uuid === uuid);
                      if (idx >= 0) { found = { bk, idx }; break; }
                    }
                    if (found) {
                      // ⭐ Match-state guard: ถ้า local matched แต่ cloud unmatched + matched_at ของ local ใหม่กว่า → skip merge
                      //    ป้องกัน race: delta push ส่ง stmt matched ขึ้น cloud → poll pull มาก่อน push เสร็จ → cloud มี state เก่า (unmatched) → revert
                      const localStmt = statementsByBank[found.bk][found.idx];
                      const localMatched = localStmt.match_status === 'matched';
                      const cloudMatched = s.match_status === 'matched';
                      if (localMatched && !cloudMatched) {
                        const localMatchedAt = localStmt.matched_at ? new Date(localStmt.matched_at).getTime() : 0;
                        const cloudUpdatedAt = s.updated_at ? new Date(s.updated_at).getTime() : 0;
                        // local ใหม่กว่า cloud (within 60s window) → keep local
                        if (localMatchedAt > cloudUpdatedAt - 60000) {
                          // skip merge — local is fresher
                          return;
                        }
                      }
                      Object.assign(localStmt, s);
                    }
                  }
                }
              } else {
                const key = stmtCompositeKey(s);
                if (!seenStmtCompositeKeys.has(key)) {
                  statementsByBank[s.bank].push(s);
                  seenStmtCompositeKeys.add(key);
                  stats.stmts++;
                }
              }
            });
          } else if (r?.success === false && !r._networkError) {
            // UUID endpoint มีอยู่แต่ไม่มีข้อมูล → OK, ไม่ fallback
          }
        } catch(err) { stats.errors.push(`Stmts ${y}: ${err.message}`); console.warn('[sync] Stmts', y, err); }
      }
      
      // ⭐ Normalize existing stmts in state (one-time fix for bad data already loaded)
      Object.values(statementsByBank).forEach(arr => {
        (arr || []).forEach(normalizeStmt);
      });
      uploadedStatements = getAllStatements();
      
      // Payments / Cashflow / Suppliers (รวม)
      try {
        const r = await api('getPayments');
        if (r?.success === false) throw new Error(r.error || 'API error');
        const items = (r?.data?.data) || (Array.isArray(r?.data) ? r.data : []) || [];
        if (!Array.isArray(items)) throw new Error('SP: unexpected format');
        const seen = new Set(paymentList.map(p => p.sp_no || p.id));
        items.forEach(p => {
          const k = p.sp_no || p.id;
          if (k && !seen.has(k)) { paymentList.push(p); seen.add(k); stats.payments++; }
        });
      } catch(err) { stats.errors.push(`SP: ${err.message}`); console.warn('[sync] SP', err); }
      
      // SP-TEMPs (replace-merge by no — backend is source of truth)
      try {
        const r = await api('getSpTemps');
        if (r?.success === false) throw new Error(r.error || 'API error');
        const items = (r?.data?.data) || (Array.isArray(r?.data) ? r.data : []) || [];
        if (Array.isArray(items)) {
          const byNo = {};
          spTempList.forEach(t => { if (t.no) byNo[t.no] = t; });
          items.forEach(t => {
            if (!t.no) return;
            if (!byNo[t.no]) { spTempList.push(t); }
            else { Object.assign(byNo[t.no], t); } // เอา cloud ทับ (ถือเป็น source of truth)
          });
        }
      } catch(err) { /* API อาจยังไม่มี — ไม่ critical */ console.warn('[sync] SpTemps', err?.message); }
      
      try {
        const r = await api('getCashflow');
        if (r?.success === false) throw new Error(r.error || 'API error');
        const items = (r?.data?.data) || (Array.isArray(r?.data) ? r.data : []) || [];
        if (!Array.isArray(items)) throw new Error('Cashflow: unexpected format');
        const seen = new Set(cashflowList.map(c => c.id));
        items.forEach(c => {
          if (c.id && !seen.has(c.id)) { cashflowList.push(c); seen.add(c.id); stats.cashflow++; }
        });
      } catch(err) { stats.errors.push(`CF: ${err.message}`); console.warn('[sync] CF', err); }
      
      try {
        const r = await api('getSuppliers');
        if (r?.success === false) throw new Error(r.error || 'API error');
        const items = (r?.data?.data) || (Array.isArray(r?.data) ? r.data : []) || [];
        if (!Array.isArray(items)) throw new Error('Suppliers: unexpected format');
        const seen = new Set(supplierList.map(s => s.supplier_id || s.id || s.name));
        items.forEach(s => {
          const k = s.supplier_id || s.id || s.name;
          if (k && !seen.has(k)) { supplierList.push(s); seen.add(k); stats.suppliers++; }
        });
      } catch(err) { stats.errors.push(`Suppliers: ${err.message}`); console.warn('[sync] Suppliers', err); }
      
      // ⭐ Supplier Payments — ก่อนหน้านี้ไม่ถูก auto-pull (missing)
      try {
        const r = await api('getSupplierPayments');
        if (r?.success === false) throw new Error(r.error || 'API error');
        const items = (r?.data?.data) || (Array.isArray(r?.data) ? r.data : []) || [];
        if (!Array.isArray(items)) throw new Error('SupplierPayments: unexpected format');
        const seen = new Set(supplierPayments.map(p => p.payment_id || p.id));
        items.forEach(p => {
          const k = p.payment_id || p.id;
          if (k && !seen.has(k)) { supplierPayments.push(p); seen.add(k); stats.suppliers++; }
        });
      } catch(err) { stats.errors.push(`SupplierPayments: ${err.message}`); console.warn('[sync] SupplierPayments', err); }
      
      // Meta — field-level merge (prev bug: date-level skip ทำให้ cloud ไม่มาถ้า local มี {} แล้ว)
      // ─────────────────────────────────────────────────────────────
      // ── Meta pull merge strategy ──
      // Problem: เดิมใช้ "local-wins for non-empty" — ถ้า local มีค่าเก่า 1000, cloud มีค่าใหม่ 1500
      //          → pull จะไม่ทับ → local ยังเห็น 1000 → data corruption ข้ามเครื่อง
      // Fix: "cloud-wins" ยกเว้นถ้า local กำลัง dirty (กำลังจะ push เอง)
      //      ถ้า local ไม่ dirty → ข้อมูล cloud = source of truth
      const localDirty = this.dirty.has('meta');
      const isEmpty = (v) => v === null || v === undefined || v === '';
      const mergeFields = (target, source) => {
        let added = 0;
        if (!source || typeof source !== 'object') return 0;
        Object.keys(source).forEach(key => {
          const srcVal = source[key];
          // Skip undefined/null source (ไม่มีใน cloud = ไม่เขียนทับ)
          if (srcVal === undefined || srcVal === null) return;
          
          // Nested object (stations, denominations)
          if (srcVal && typeof srcVal === 'object' && !Array.isArray(srcVal)) {
            if (!target[key] || typeof target[key] !== 'object') {
              target[key] = {};
            }
            added += mergeFields(target[key], srcVal);
            return;
          }
          
          // Primitive: 
          //   - local dirty → keep local (user กำลังจะ push)
          //   - local empty → take cloud
          //   - local has value & cloud has value → cloud-wins (multi-device correctness)
          if (localDirty && !isEmpty(target[key])) return;
          if (isEmpty(target[key]) || target[key] !== srcVal) {
            target[key] = srcVal;
            added++;
          }
        });
        return added;
      };
      
      for (const y of years) {
        try {
          // ⭐ Try new schema first (meta_uuid + data_json) via getMetaWithUuid
          // Sheet ใหม่ใช้ schema: [meta_uuid, date, meta_type, data_json, updated_at]
          // Old getDailyMeta อ่าน schema เก่า [date, meta_type, station, key, value] → ไม่เจอ
          let handled = false;
          try {
            const r = await api('getMetaWithUuid', { year: y });
            if (r?.success && Array.isArray(r.data?.rows) && r.data.rows.length > 0) {
              // Parse via parseCompactMetaRows (decodes data_json per row)
              if (typeof window.parseCompactMetaRows === 'function') {
                const parsed = window.parseCompactMetaRows(r.data.rows);
                // Merge summary
                if (parsed.summary?.__byDate) {
                  if (!mainSummary.__byDate) mainSummary.__byDate = {};
                  Object.entries(parsed.summary.__byDate).forEach(([d, v]) => {
                    // 🔒 Lock guard: ถ้าวันที่ lock → ไม่ให้ cloud ทับ local (freeze ตัวเลข)
                    if (typeof isDateLocked === 'function' && isDateLocked(d)) return;
                    if (!mainSummary.__byDate[d]) mainSummary.__byDate[d] = {};
                    stats.meta += mergeFields(mainSummary.__byDate[d], v);
                  });
                }
                // Merge cash_count
                if (parsed.cashCount?.__byDate) {
                  if (!cashCount.__byDate) cashCount.__byDate = {};
                  Object.entries(parsed.cashCount.__byDate).forEach(([d, v]) => {
                    // 🔒 Lock guard
                    if (typeof isDateLocked === 'function' && isDateLocked(d)) return;
                    if (!cashCount.__byDate[d]) cashCount.__byDate[d] = {};
                    mergeFields(cashCount.__byDate[d], v);
                  });
                }
                handled = true;
                console.log(`[sync] Meta ${y}: ${r.data.rows.length} rows via getMetaWithUuid (new schema)`);
              }
            }
          } catch(err) {
            console.warn(`[sync] getMetaWithUuid ${y} failed, trying fallback:`, err.message);
          }
          
          // ⭐ ไม่มี fallback ไป getDailyMeta แล้ว — sheet ใช้ new schema (meta_uuid) เท่านั้น
          if (!handled) {
            console.log(`[sync] Meta ${y}: no rows in cloud (new schema)`);
          }
        } catch(err) { stats.errors.push(`Meta ${y}: ${err.message}`); }
      }
      
      // Persist locally (หลัง merge แล้ว)
      // ⭐ _inPull flag ยังเป็น true → persistMainState จะไม่ markDirty
      if (typeof persistMainState === 'function') persistMainState();
      if (typeof invalidateBillsCache === 'function') invalidateBillsCache();
      
      this.lastPullAt = Date.now();
      localStorage.setItem('sf_sync_last_pull', String(this.lastPullAt));
      this.stats.pulled += Object.values(stats).filter(v => typeof v === 'number').reduce((a,b)=>a+b,0);
      this.status = stats.errors.length ? 'error' : 'idle';
      this.lastError = stats.errors[0] || null;
      this._inPull = false;  // ⭐ Clear flag
      // ⭐ Update fingerprint cache ให้ตรงกับ state ปัจจุบัน
      // (ถ้าไม่ทำ → ครั้งหน้าที่ user แก้ → fp ต่างจาก cache เก่า → อาจ push ข้อมูลที่มาจาก pull)
      this._recomputeFpCache();
      this._emit();
      return stats;
    } catch(err) {
      this.status = 'error';
      this.lastError = err.message;
      this._inPull = false;  // ⭐ Clear flag แม้ error
      this._emit();
      throw err;
    }
  },
  
  // คืน text สำหรับ status badge
  statusText() {
    if (!this.enabled) return { text: 'Sync ปิด', color: 'var(--text3)' };
    if (this.status === 'pushing') return { text: '☁ กำลังบันทึก…', color: 'var(--info)' };
    if (this.status === 'pulling') return { text: '☁ กำลังดึงข้อมูล…', color: 'var(--info)' };
    if (this.status === 'error') return { text: '⚠ Sync ผิดพลาด', color: 'var(--warn)' };
    if (this.dirty.size > 0) return { text: `⏳ รอบันทึก (${this.dirty.size})`, color: 'var(--warn)' };
    if (this.lastPushAt > 0) {
      const ago = Math.round((Date.now() - this.lastPushAt) / 1000);
      const agoStr = ago < 60 ? `${ago}s` : ago < 3600 ? `${Math.round(ago/60)}m` : `${Math.round(ago/3600)}h`;
      return { text: `☁ Synced ${agoStr} ที่แล้ว`, color: 'var(--success)' };
    }
    return { text: '☁ Ready', color: 'var(--text3)' };
  },
};
syncManager.init();
window.syncManager = syncManager;

function persistMainState() {
  // ⭐ Normalize date formats เป็น ISO ทั้งหมด — กัน 2 formats ปนกัน
  //    Bug ที่เคยเจอ: bills 617/9632 = dd/mm/yyyy, ที่เหลือ ISO → match/dedup/sort พัง
  //                 stmts 7088/8096 = dd/mm/yyyy, ที่เหลือ ISO
  //    Fix: ก่อน save → toISODate() ทุกตัว → consistent
  try {
    if (typeof toISODate === 'function') {
      let normBills = 0, normStmts = 0;
      billList.forEach(b => {
        if (b.date) {
          const iso = toISODate(b.date);
          if (iso && iso !== b.date) { b.date = iso; normBills++; }
        }
        // pay_date, due_date ก็ normalize ด้วย
        if (b.pay_date) {
          const iso = toISODate(b.pay_date);
          if (iso && iso !== b.pay_date) b.pay_date = iso;
        }
        if (b.due_date) {
          const iso = toISODate(b.due_date);
          if (iso && iso !== b.due_date) b.due_date = iso;
        }
      });
      Object.values(statementsByBank || {}).forEach(arr => {
        if (!Array.isArray(arr)) return;
        arr.forEach(s => {
          if (s.date) {
            const iso = toISODate(s.date);
            if (iso && iso !== s.date) { s.date = iso; normStmts++; }
          }
          if (s.trans_date) {
            const iso = toISODate(s.trans_date);
            if (iso && iso !== s.trans_date) s.trans_date = iso;
          }
        });
      });
      if (normBills > 0 || normStmts > 0) {
        console.log(`[normalize] bills:${normBills} stmts:${normStmts} → ISO`);
      }
    }
  } catch(e) { console.warn('[normalize] error:', e.message); }
  
  // Bump version → invalidate ทุก cache ที่ check _stateVersion
  _stateVersion++;
  // Invalidate validation cache ทันที (sync) — เพื่อให้ validateAll() re-run ถูกต้อง
  if (typeof validateAll !== 'undefined') {
    validateAll._cache = null;
    validateAll._version = -1;
  }
  // ── Debounce localStorage writes 500ms — เดิมเขียน 1-2 MB ทุก keystroke = lag หนัก ──
  if (_persistTimer) clearTimeout(_persistTimer);
  _persistTimer = setTimeout(function() {
    _persistTimer = null;
    try {
      safeStorage.set('sf_billList', JSON.stringify(billList));
      safeStorage.set('sf_mainSummary', JSON.stringify(mainSummary));
      safeStorage.set('sf_cashCount', JSON.stringify(cashCount));
      safeStorage.set('sf_paymentList', JSON.stringify(paymentList));
      safeStorage.set('sf_spTempList', JSON.stringify(spTempList));
      safeStorage.set('sf_cashflowList', JSON.stringify(cashflowList));
      safeStorage.set('sf_supplierList', JSON.stringify(supplierList));
      safeStorage.set('sf_supplierPayments', JSON.stringify(supplierPayments));
      safeStorage.set('sf_ppReport', JSON.stringify(ppReport));
      safeStorage.set('sf_transferLog', JSON.stringify(transferLog));
    } catch (e) { console.warn('Could not persist:', e); }
  }, 500);
  
  // Hybrid: mark ทุกอย่าง dirty → syncManager จะ debounce push backend
  // (ไม่ block UI — เป็น fire-and-forget)
  // ─ no-arg: mark NO_ARG_TYPES (payments, sp_temps, cashflow, suppliers, meta)
  // ─ explicit 'bills' + 'stmts' เสมอ — persistMainState ถูกเรียกหลังแก้ข้อมูล
  //   ถ้าไม่มีการเปลี่ยนจริง → fingerprint detect → push skip อยู่แล้ว
  // ⭐ CRITICAL: ถ้ากำลัง pull อยู่ (หรือเพิ่ง pull เสร็จ) → ห้าม markDirty
  //   เหตุผล: pullFromCloud → persistMainState (L2302) ต้องไม่ trigger push
  //   เพราะข้อมูลมาจาก cloud อยู่แล้ว — push กลับ = sheet บวม + race condition ข้ามเครื่อง
  try {
    const isPulling = syncManager.status === 'pulling' || syncManager._inPull === true;
    if (!isPulling) {
      syncManager.markDirty();           // NO_ARG_TYPES
      syncManager.markDirty('bills');    // bills explicit
      syncManager.markDirty('stmts');    // stmts explicit
    }
  } catch(_) {}
}

// Flush pending writes ทันที (เรียกก่อน save หรือปิดหน้า)
function flushPersistState() {
  if (_persistTimer) {
    clearTimeout(_persistTimer);
    _persistTimer = null;
    try {
      safeStorage.set('sf_billList', JSON.stringify(billList));
      safeStorage.set('sf_mainSummary', JSON.stringify(mainSummary));
      safeStorage.set('sf_cashCount', JSON.stringify(cashCount));
      safeStorage.set('sf_paymentList', JSON.stringify(paymentList));
      safeStorage.set('sf_spTempList', JSON.stringify(spTempList));
      safeStorage.set('sf_cashflowList', JSON.stringify(cashflowList));
      safeStorage.set('sf_supplierList', JSON.stringify(supplierList));
      safeStorage.set('sf_supplierPayments', JSON.stringify(supplierPayments));
      safeStorage.set('sf_ppReport', JSON.stringify(ppReport));
      safeStorage.set('sf_transferLog', JSON.stringify(transferLog));
    } catch (e) { console.warn('Could not persist:', e); }
  }
}
// ป้องกันข้อมูลหายเมื่อปิด tab ระหว่าง debounce timer
window.addEventListener('beforeunload', flushPersistState);

// ══════════════════════════════════════════════════════════════
// VALIDATION SYSTEM — ตรวจสอบความสมบูรณ์ของข้อมูล
// Levels:
//   'error'   → ห้ามบันทึก (bug ข้อมูล)
//   'warn'    → เตือน แต่บันทึกได้ (ต้องยืนยัน)
//   'info'    → แค่แจ้ง
// ══════════════════════════════════════════════════════════════
function validateBill(b, idx, allBills) {
  const issues = [];
  const dateTag = b.date ? `[${fmtDate(b.date)}] ` : '';
  const billNo = dateTag + (b.bill_no || `(แถว ${idx+1})`);
  
  // ── Voided bills: ไม่ต้อง validate ──
  if (b.match_status === 'void') return issues;
  
  // ── ERRORS (ห้ามบันทึก) ──
  if (!b.date) {
    issues.push({ level:'error', billIdx:idx, field:'date', msg:`${billNo}: ไม่มีวันที่` });
  }
  if (!b.amount || Number(b.amount) === 0) {
    issues.push({ level:'error', billIdx:idx, field:'amount', msg:`${billNo}: ยอดเงินเป็น 0` });
  }
  
  // ── WARNINGS ──
  if (b.type === '' || b.type === undefined || b.type === null) {
    // POS บิลขายสดไม่ต้องเตือน Type (auto-fill ไว้แล้ว)
    if (b.source !== 'pos' && !['Invoice Credit', 'Order Credit'].includes(b.station)) {
      issues.push({ level:'warn', billIdx:idx, field:'type', msg:`${billNo}: ยังไม่ได้เลือก Type` });
    }
  }
  if (b.type === 'Transfer' && !b.bank) {
    // ข้ามสำหรับบิลที่ import มา (JSON/Smart/Summary ไม่มี bank field — ปกติ)
    if (b.source === 'manual') {
      issues.push({ level:'warn', billIdx:idx, field:'bank', msg:`${billNo}: Type=Transfer แต่ยังไม่ได้เลือก Bank` });
    }
  }
  if ((b.station === 'Invoice Credit' || b.station === 'Order Credit') && !b.due_date) {
    // ข้ามสำหรับบิลที่ import มา (ไม่มี due_date — กรอกทีหลังได้)
    if (b.source === 'manual') {
      issues.push({ level:'warn', billIdx:idx, field:'due_date', msg:`${billNo}: บิลเครดิตแต่ยังไม่มี Due Date` });
    }
  }
  
  return issues;
}

function findDuplicateBills() {
  // หาบิลที่ซ้ำกันจริงๆ (ไม่ใช่ split payment)
  // Composite key: bill_no + type + amount (ตรงกับ dedup logic ตอน import)
  // เหตุผล: บิลเดียวกันอาจชำระหลายวิธี เช่น
  //   SS00126-000002 | Cash     | 3      ← ✓ เก็บได้
  //   SS00126-000002 | Transfer | 5515   ← ✓ เก็บได้ (ไม่ถือว่าซ้ำ)
  // แต่ถ้า bill_no + type + amount ตรงกัน = ซ้ำจริง
  const byKey = {};
  billList.forEach((b, i) => {
    if (b.match_status === 'void') return;
    const no = (b.bill_no || '').trim();
    if (!no || no.startsWith('MANUAL-')) return;
    // Composite key
    const key = `${no}|${(b.type || '').trim()}|${Number(b.amount) || 0}`;
    if (!byKey[key]) byKey[key] = [];
    byKey[key].push(i);
  });
  
  const dupes = [];
  Object.keys(byKey).forEach(key => {
    if (byKey[key].length > 1) {
      // แยก bill_no กลับ (เพื่อแสดงข้อความ)
      const firstIdx = byKey[key][0];
      dupes.push({
        bill_no: billList[firstIdx].bill_no,
        indices: byKey[key],
        count: byKey[key].length,
      });
    }
  });
  return dupes;
}

function findSimilarBills() {
  // หาบิลที่น่าสงสัย: วันเดียวกัน + ยอดเดียวกัน + station เดียวกัน (เลขบิลต่าง)
  const groups = {};
  billList.forEach((b, i) => {
    const key = `${toISODate(b.date)}|${Number(b.amount)}|${b.station}|${b.type}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(i);
  });
  
  const suspicious = [];
  Object.keys(groups).forEach(key => {
    if (groups[key].length > 1) {
      const bills = groups[key].map(i => billList[i]);
      const bn = bills.map(b => b.bill_no).filter(Boolean);
      // ถ้าเลขบิลต่างกัน = น่าสงสัย
      if (new Set(bn).size > 1) {
        suspicious.push({ key, indices: groups[key], bills });
      }
    }
  });
  return suspicious;
}

function validateAll() {
  // ── PERF: Cache result — invalidated ทุกครั้งที่ persistMainState ถูกเรียก ──
  // ใช้ version counter แทน length (ไม่จับถ้าแก้เนื้อบิลโดยไม่เปลี่ยนจำนวน)
  if (validateAll._version === _stateVersion && validateAll._cache) {
    return validateAll._cache;
  }
  
  const issues = [];
  const errors = [];
  const warnings = [];
  
  // ── ตรวจทีละบิล ──
  billList.forEach((b, i) => {
    const billIssues = validateBill(b, i, billList);
    billIssues.forEach(iss => {
      if (iss.level === 'error') errors.push(iss);
      else warnings.push(iss);
    });
  });
  
  // ── บิลซ้ำ ──
  const dupes = findDuplicateBills();
  dupes.forEach(d => {
    const firstBill = billList[d.indices[0]];
    const dateTag = firstBill?.date ? `[${fmtDate(firstBill.date)}] ` : '';
    errors.push({
      level: 'error',
      category: 'duplicate',
      msg: `${dateTag}เลขบิลซ้ำ: ${d.bill_no} (${d.count} รายการ)`,
      billIdx: d.indices[0],
    });
  });
  
  // ── บิลน่าสงสัย (วัน+ยอด+station ตรง) ──
  const similar = findSimilarBills();
  similar.forEach(s => {
    const firstBill = billList[s.indices[0]];
    const dateTag = firstBill?.date ? `[${fmtDate(firstBill.date)}] ` : '';
    warnings.push({
      level: 'warn',
      category: 'similar',
      msg: `${dateTag}น่าสงสัย — ${s.bills.length} บิล ยอดเดียวกัน station เดียวกัน: ${s.bills.map(b=>b.bill_no||'(ว่าง)').join(', ')}`,
      billIdx: s.indices[0],
    });
  });
  
  // ── SP ชั่วคราวที่ยังไม่แก้ ──
  const tempSPs = paymentList.filter(p => /^SP-TEMP-/.test(p.sp_no));
  if (tempSPs.length > 0) {
    warnings.push({
      level: 'warn',
      category: 'temp_sp',
      msg: `มี SP ชั่วคราว ${tempSPs.length} รายการ ที่ยังไม่แก้เป็นเลข SP จริง (${tempSPs.map(p=>p.sp_no).slice(0,3).join(', ')}${tempSPs.length>3?'...':''})`,
    });
  }
  
  // ── SP ยอดไม่ตรงกับบิลที่ตัด ──
  paymentList.forEach(p => {
    if (p.is_temp || !p.bills || p.bills.length === 0) return;
    const childSum = p.bills.reduce((s, b) => s + Number(b.amount || 0), 0);
    if (Math.abs(childSum - Number(p.total||0)) > 1) {
      errors.push({
        level: 'error',
        category: 'sp_mismatch',
        msg: `${p.sp_no}: ยอดรวมบิลที่ตัด (฿${fmtNum(childSum)}) ≠ ยอด SP (฿${fmtNum(p.total)})`,
      });
    }
  });
  
  // ── แจ้งเตือน Due Date / เช็ครอเคลียร์ ──
  // เตือนวัน due date เลย (today >= due_date) สำหรับ:
  // 1. บิลเช็ค (Type=Cheque) ที่มี expected_clear_date หรือ due_date
  // 2. ทุกบิลที่มี due_date (เช่น SR/OR เครดิต)
  const today = todayISO();
  
  // 1) เช็ครอเคลียร์: expected_clear_date ถึงหรือเลยแล้ว
  const chequesOverdue = billList.filter(b => 
    b.type === 'Cheque' && b.expected_clear_date && toISODate(b.expected_clear_date) <= today &&
    b.match_status !== 'matched' && b.match_status !== 'bounced' && b.match_status !== 'paid'
  );
  chequesOverdue.forEach(b => {
    const dateTag = b.date ? `[${fmtDate(b.date)}] ` : '';
    const clearDate = fmtDate(b.expected_clear_date);
    const isPast = toISODate(b.expected_clear_date) < today;
    warnings.push({
      level: 'warn',
      category: 'cheque_due',
      msg: `${dateTag}${b.bill_no||'เช็ค'}: ${isPast ? '⏰ เลยกำหนดเคลียร์' : '📅 ถึงกำหนดเคลียร์วันนี้'} (${clearDate}) ยอด ฿${fmtNum(b.amount)} — ตรวจสอบว่าเข้าหรือเด้ง`,
      billIdx: billList.indexOf(b),
    });
  });
  
  // 2) บิลที่มี due_date ถึงหรือเลยแล้ว (SR/OR เครดิต ฯลฯ)
  const dueDateBills = billList.filter(b => 
    b.due_date && toISODate(b.due_date) <= today &&
    b.type !== 'Cheque' && // เช็คจัดการข้างบนแล้ว
    b.match_status !== 'matched' && b.match_status !== 'paid' && b.match_status !== 'void'
  );
  if (dueDateBills.length > 0) {
    // Group ตามวัน due_date เพื่อไม่ให้เตือนทีละบิล (เยอะเกินไป)
    const byDueDate = {};
    dueDateBills.forEach(b => {
      const dd = toISODate(b.due_date);
      if (!byDueDate[dd]) byDueDate[dd] = [];
      byDueDate[dd].push(b);
    });
    Object.keys(byDueDate).sort().forEach(dd => {
      const bills = byDueDate[dd];
      const totalAmt = bills.reduce((s, b) => s + (Number(b.amount) || 0), 0);
      const isPast = dd < today;
      const sample = bills.slice(0, 3).map(b => b.bill_no || '(ไม่มีเลข)').join(', ');
      warnings.push({
        level: 'warn',
        category: 'due_date',
        msg: `${isPast ? '⏰ เลยกำหนด' : '📅 ครบกำหนดวันนี้'} ${fmtDate(dd)}: ${bills.length} บิล รวม ฿${fmtNum(totalAmt)} (${sample}${bills.length > 3 ? '...' : ''})`,
      });
    });
  }
  
  // ── Cashflow ที่ยังไม่ match (Transfer/Supplier) ──
  const unmatchedCashflow = cashflowList.filter(c => 
    c.match_status !== 'matched' && (c.type === 'deposit' || c.type === 'supplier' || c.type === 'transfer')
  );
  if (unmatchedCashflow.length > 3) {
    warnings.push({
      level: 'warn',
      category: 'cashflow_unmatched',
      msg: `มีรายการเงินเข้า-ออก ${unmatchedCashflow.length} รายการยังไม่ match กับ Statement`,
    });
  }
  
  // ── Supplier ที่ไม่มีชื่อคู่ค้า ──
  const supplierNoName = cashflowList.filter(c => c.type === 'supplier' && !c.counterparty);
  if (supplierNoName.length > 0) {
    warnings.push({
      level: 'warn',
      category: 'supplier_no_name',
      msg: `มีรายการจ่าย Supplier ${supplierNoName.length} รายการที่ยังไม่ได้ระบุชื่อ Supplier`,
    });
  }
  
  // ── Business Rules Violations ──
  cashflowList.forEach((c, i) => {
    if (!c.bank || !c.vat) return;
    const bankDef = BANK_ACCOUNTS[c.bank];
    if (!bankDef) return;
    
    // บัญชีไม่ตรง VAT ↔ NOVAT
    if (bankDef.vat !== c.vat) {
      errors.push({
        level: 'error',
        category: 'rule_violation',
        msg: `รายการ #${i+1} (฿${fmtNum(c.amount)}) — ${c.vat} แต่ใช้บัญชี ${c.bank} (${bankDef.vat})`,
      });
    }
    
    // Rule: Supplier VAT → ปกติจาก KBANK (หรือ BBL ถ้าจำเป็น)
    if (c.type === 'supplier' && c.vat === 'VAT' && c.bank === 'KTB') {
      errors.push({
        level: 'error',
        category: 'rule_violation',
        msg: `Supplier VAT #${i+1} (฿${fmtNum(c.amount)}) ใช้ KTB — KTB เป็นบัญชีรับโอนลูกหนี้เท่านั้น`,
      });
    }
    // Rule: Supplier NOVAT → BBL NW
    if (c.type === 'supplier' && c.vat === 'NOVAT' && c.bank !== 'BBL NW') {
      errors.push({
        level: 'error',
        category: 'rule_violation',
        msg: `Supplier NOVAT #${i+1} (฿${fmtNum(c.amount)}) ใช้บัญชี ${c.bank} — กฎกำหนดให้ใช้ BBL NW`,
      });
    }
    // Rule: Deposit VAT → KTB (or BBL) 
    if (c.type === 'deposit' && c.vat === 'VAT' && c.bank === 'KBANK') {
      warnings.push({
        level: 'warn',
        category: 'rule_violation',
        msg: `รายการ Deposit VAT ฝาก KBANK — KBANK เป็นบัญชีจ่ายเจ้าหนี้ ปกติรับลูกหนี้ไปที่ KTB หรือ BBL`,
      });
    }
    // Rule: Deposit NOVAT → BBL NW
    if (c.type === 'deposit' && c.vat === 'NOVAT' && c.bank !== 'BBL NW') {
      warnings.push({
        level: 'warn',
        category: 'rule_violation',
        msg: `รายการ Deposit NOVAT ฝาก ${c.bank} — ปกติควรเข้า BBL NW`,
      });
    }
  });
  
  const result = { errors, warnings, hasIssues: errors.length > 0 || warnings.length > 0 };
  validateAll._version = _stateVersion;
  validateAll._cache = result;
  return result;
}

function showValidationModal(validation, onContinue) {
  const { errors, warnings } = validation;
  
  if (errors.length === 0 && warnings.length === 0) {
    // สมบูรณ์ทั้งหมด
    if (onContinue) onContinue();
    return;
  }
  
  const html = `
    <div class="flex-col gap-3">
      ${errors.length > 0 ? `
        <div style="padding:12px;background:rgba(239,87,87,.12);border-radius:8px;border-left:3px solid var(--danger)">
          <div class="font-semi" style="color:var(--danger);margin-bottom:8px">🚨 ข้อผิดพลาด ${errors.length} รายการ (ต้องแก้ไขก่อนบันทึก)</div>
          <div style="max-height:200px;overflow-y:auto">
            ${errors.map(e => `<div class="text-sm" style="padding:4px 0;border-bottom:1px solid var(--border)">• ${e.msg}</div>`).join('')}
          </div>
        </div>
      ` : ''}
      ${warnings.length > 0 ? `
        <div style="padding:12px;background:rgba(245,166,35,.10);border-radius:8px;border-left:3px solid var(--warn)">
          <div class="font-semi" style="color:var(--warn);margin-bottom:8px">⚠️ คำเตือน ${warnings.length} รายการ</div>
          <div style="max-height:200px;overflow-y:auto">
            ${warnings.map(w => `<div class="text-sm" style="padding:4px 0;border-bottom:1px solid var(--border)">• ${w.msg}</div>`).join('')}
          </div>
        </div>
      ` : ''}
      <div class="flex gap-2 mt-2">
        <button class="btn btn-outline btn-sm flex-1" onclick="closeModal()">ยกเลิก</button>
        ${errors.length > 0 && onContinue ? `<button class="btn btn-sm flex-1" id="val-force-save" style="background:var(--danger);color:#fff;border:1px solid var(--danger)">⚠️ บันทึกทั้งๆ ที่มี error (${errors.length})</button>` : ''}
        ${errors.length === 0 && onContinue ? `<button class="btn btn-warn btn-sm flex-1" id="val-continue" style="background:var(--warn);color:#fff">${ICONS.check} ยืนยันบันทึก (มีคำเตือน)</button>` : ''}
      </div>
    </div>
  `;
  
  const title = errors.length > 0 
    ? `⚠️ พบ ${errors.length} error (ยืนยันได้ว่าจะบันทึกต่อ)` 
    : '⚠️ ตรวจสอบก่อนบันทึก';
  openModal(title, html);
  
  // ปุ่ม "บันทึกทั้งๆ ที่มี error" (force save)
  if (errors.length > 0 && onContinue) {
    document.getElementById('val-force-save')?.addEventListener('click', () => {
      if (!confirm(`⚠️ ยืนยันว่าจะบันทึกทั้งๆ ที่มี error ${errors.length} รายการ?\n\nข้อมูลอาจไม่สมบูรณ์ — แต่ยัง push ขึ้น Sheet ได้`)) return;
      closeModal();
      onContinue();
    });
  }
  
  if (errors.length === 0 && onContinue) {
    document.getElementById('val-continue')?.addEventListener('click', () => {
      closeModal();
      onContinue();
    });
  }
}

async function restoreMainState() {
  try {
    // ── ข้อมูลใหญ่: ลอง IndexedDB ก่อน → fallback localStorage ──
    for (const key of IDB_LARGE_KEYS) {
      const idbVal = await idbGet(key);
      if (idbVal) {
        const parsed = JSON.parse(idbVal);
        if (key === 'sf_billList') billList = parsed;
        else if (key === 'sf_mainSummary') Object.assign(mainSummary, parsed);
        else if (key === 'sf_cashCount') Object.assign(cashCount, parsed);
        else if (key === 'sf_statementsByBank') { statementsByBank = parsed; uploadedStatements = getAllStatements(); }
      } else {
        // Fallback: localStorage (ข้อมูลเก่าก่อนย้าย IndexedDB)
        const lsVal = safeStorage.get(key);
        if (lsVal) {
          const parsed = JSON.parse(lsVal);
          if (key === 'sf_billList') billList = parsed;
          else if (key === 'sf_mainSummary') Object.assign(mainSummary, parsed);
          else if (key === 'sf_cashCount') Object.assign(cashCount, parsed);
          else if (key === 'sf_statementsByBank') { statementsByBank = parsed; uploadedStatements = getAllStatements(); }
          // Migrate ไป IndexedDB + ลบจาก localStorage
          idbSet(key, lsVal);
          try { localStorage.removeItem(key); } catch(e) {}
        }
      }
    }
    
    // ── ข้อมูลเล็ก: localStorage เหมือนเดิม ──
    const savedPay = safeStorage.get('sf_paymentList');
    if (savedPay) paymentList = JSON.parse(savedPay);
    const savedSpTemps = safeStorage.get('sf_spTempList');
    if (savedSpTemps) { try { spTempList = JSON.parse(savedSpTemps); } catch(_) { spTempList = []; } }
    const savedCashflow = safeStorage.get('sf_cashflowList');
    if (savedCashflow) cashflowList = JSON.parse(savedCashflow);
    const savedSuppliers = safeStorage.get('sf_supplierList');
    if (savedSuppliers) supplierList = JSON.parse(savedSuppliers);
    const savedSupPay = safeStorage.get('sf_supplierPayments');
    if (savedSupPay) supplierPayments = JSON.parse(savedSupPay);
    const savedPPRpt = safeStorage.get('sf_ppReport');
    if (savedPPRpt) ppReport = JSON.parse(savedPPRpt);
    const savedTransferLog = safeStorage.get('sf_transferLog');
    if (savedTransferLog) transferLog = JSON.parse(savedTransferLog);
    
    // Statements จาก localStorage (ถ้า IndexedDB ไม่มี)
    if (uploadedStatements.length === 0) {
      const savedStmts = safeStorage.get('sf_statementsByBank');
      if (savedStmts) {
        statementsByBank = JSON.parse(savedStmts);
        uploadedStatements = getAllStatements();
      }
    }
    
    // ⭐ One-shot date normalize: เปลี่ยนทุก date field เป็น ISO format (yyyy-mm-dd)
    //    Bug: bills/stmts มี dd/mm/yyyy ปนกับ ISO → match/sort/dedup พัง
    //    ตัวอย่าง: bills 617/9632 = dd/mm/yyyy, ที่เหลือ ISO
    //    Fix: pass through toISODate() ครั้งเดียวตอน load → consistent
    let normDateBills = 0, normDateStmts = 0;
    if (typeof toISODate === 'function') {
      billList.forEach(b => {
        if (b.date) {
          const iso = toISODate(b.date);
          if (iso && iso !== b.date) { b.date = iso; normDateBills++; }
        }
        if (b.pay_date) {
          const iso = toISODate(b.pay_date);
          if (iso && iso !== b.pay_date) b.pay_date = iso;
        }
        if (b.due_date) {
          const iso = toISODate(b.due_date);
          if (iso && iso !== b.due_date) b.due_date = iso;
        }
      });
      Object.values(statementsByBank || {}).forEach(arr => {
        if (!Array.isArray(arr)) return;
        arr.forEach(s => {
          if (s.date) {
            const iso = toISODate(s.date);
            if (iso && iso !== s.date) { s.date = iso; normDateStmts++; }
          }
          if (s.trans_date) {
            const iso = toISODate(s.trans_date);
            if (iso && iso !== s.trans_date) s.trans_date = iso;
          }
        });
      });
    }
    if (normDateBills > 0) console.log(`[restore] Normalized ${normDateBills} bill dates → ISO`);
    if (normDateStmts > 0) console.log(`[restore] Normalized ${normDateStmts} stmt dates → ISO`);
    
    // ⭐ One-shot normalize: matched_bills ที่เคยเก็บเป็น string → convert เป็น array
    // กัน bug: `s.matched_bills.join is not a function` ตอน fingerprint compute
    let normalizedCount = 0;
    let timeFixedCount = 0;
    Object.values(statementsByBank).forEach(arr => {
      (arr || []).forEach(s => {
        if (s.matched_bills != null && !Array.isArray(s.matched_bills)) {
          const str = String(s.matched_bills).trim();
          if (str === '' || str === '[]') {
            delete s.matched_bills;
          } else if (str.startsWith('[')) {
            try { s.matched_bills = JSON.parse(str); }
            catch { s.matched_bills = str.split(',').map(x => x.trim()).filter(Boolean); }
          } else {
            s.matched_bills = str.split(',').map(x => x.trim()).filter(Boolean);
          }
          if (!Array.isArray(s.matched_bills)) delete s.matched_bills;
          else normalizedCount++;
        }
        
        // ⭐ Clean junk time: "30/12/1899", "30/12/1899 HH:MM" → "HH:MM" or ""
        if (s.time && typeof fmtStmtTime === 'function') {
          const cleaned = fmtStmtTime(s.time);
          if (cleaned !== String(s.time).trim()) {
            s.time = cleaned;
            timeFixedCount++;
          }
        }
      });
    });
    if (normalizedCount > 0) {
      console.log(`[restore] Normalized ${normalizedCount} stmts with string matched_bills → array`);
      uploadedStatements = getAllStatements();
    }
    if (timeFixedCount > 0) {
      console.log(`[restore] Cleaned ${timeFixedCount} stmts with junk time (e.g. "30/12/1899" → "HH:MM")`);
    }
    
    // ⭐ One-shot fix: KBANK description ที่เคย mojibake (UTF-8 อ่านเป็น Windows-874)
    //    Pattern: chars ที่ขึ้นต้นด้วย "เธ", "เน" repeat — มาจาก double-encoding bug
    //    Fix: แปลงกลับโดย encode เป็น Latin-1 → decode เป็น UTF-8
    //    เกิดเฉพาะตอน import — code ใหม่ detect encoding ฉลาดขึ้นแล้ว
    let descFixedCount = 0;
    const isMojibake = (s) => {
      if (!s) return false;
      const str = String(s);
      // Pattern: contains "เธ" + "เน" + chars ที่ไม่ใช่ภาษาไทยจริง
      const mojiPattern = /(เธ[เน][เธ]|เน[เธ][เธ])/;
      return mojiPattern.test(str);
    };
    const fixMojibake = (s) => {
      if (!s) return s;
      try {
        const str = String(s);
        // mojibake = UTF-8 bytes ของ Thai → ถูก decode เป็น Latin-1/cp1252 → re-encode UTF-8
        // Reverse: chars → cp1252 byte → bytes → decode UTF-8
        const bytes = new Uint8Array(str.length);
        for (let i = 0; i < str.length; i++) {
          const c = str.charCodeAt(i);
          if (c > 0xFF) return s; // not single-byte char → not mojibake → skip
          bytes[i] = c;
        }
        const fixed = new TextDecoder('utf-8', { fatal: true }).decode(bytes);
        return fixed;
      } catch(_) { return s; }
    };
    Object.values(statementsByBank).forEach(arr => {
      if (!Array.isArray(arr)) return;
      arr.forEach(s => {
        ['description', 'sender_name', 'sender_bank_name'].forEach(f => {
          if (s[f] && isMojibake(s[f])) {
            const fixed = fixMojibake(s[f]);
            if (fixed && fixed !== s[f] && !isMojibake(fixed)) {
              s[f] = fixed;
              descFixedCount++;
            }
          }
        });
      });
    });
    if (descFixedCount > 0) {
      console.log(`[restore] Fixed ${descFixedCount} mojibake fields in stmts (KBANK encoding bug)`);
      uploadedStatements = getAllStatements();
    }
  } catch (e) { console.warn('Could not restore state:', e); }
  
  // ── Bank field = USER MANUAL ENTRY ──
  // ไม่แตะข้อมูล user อัตโนมัติ (เคย clear สำหรับ SP/SC/JS/JR แต่ทำให้ข้อมูลหาย)
  
  // ⭐ Self-heal stmts: match_station+match_bill มี แต่ match_status ไม่ใช่ 'matched'
  //    สาเหตุ: partial sync push / pull cloud-wins overwrite match_status field
  //    → กลับสถานะให้ตรงกับข้อมูลจริง
  {
    let healedMatched = 0, healedUnmatched = 0;
    uploadedStatements.forEach(s => {
      const hasStation = !!(s.match_station && String(s.match_station).trim());
      const hasBill = !!(s.match_bill && String(s.match_bill).trim());
      const hasMatchedBills = Array.isArray(s.matched_bills) && s.matched_bills.length > 0;
      const hasMatchData = (hasStation && hasBill) || hasMatchedBills;
      
      if (hasMatchData && s.match_status !== 'matched') {
        s.match_status = 'matched';
        healedMatched++;
      } else if (!hasMatchData && s.match_status === 'matched') {
        s.match_status = 'unmatched';
        healedUnmatched++;
      }
    });
    if (healedMatched + healedUnmatched > 0) {
      console.log(`[heal stmts] matched:+${healedMatched} unmatched:+${healedUnmatched}`);
    }
  }
  
  // ⭐ Cleanup: ลบ cashIn ค้างที่ station ที่ไม่ควรมี (Order/Payment/IC/OC)
  //    เกิดจาก default 5155 ที่ใส่ทุก station ใน version ก่อนหน้า
  {
    const ORPHAN_STATIONS = ['Order','Payment','Invoice Credit','Order Credit'];
    let cleaned = 0;
    ORPHAN_STATIONS.forEach(st => {
      const k = 'cashIn_' + st;
      if (mainSummary[k] !== undefined) {
        delete mainSummary[k];
        cleaned++;
      }
      // cleanup __byDate too
      if (mainSummary.__byDate) {
        Object.values(mainSummary.__byDate).forEach(day => {
          if (day && day['นำเงินเข้า'] && day['นำเงินเข้า'][st] !== undefined) {
            delete day['นำเงินเข้า'][st];
            cleaned++;
          }
        });
      }
    });
    if (cleaned > 0) {
      console.log(`[cleanup] orphan cashIn keys: ${cleaned}`);
    }
  }
  
  // ── Auto dedup: ⚠️ DISABLED - เสี่ยงลบข้อมูลจริง ──
  // ใช้ manual dedup เท่านั้น (ใน addStatementRows ตอน import จะ dedup อัตโนมัติ)
  // ถ้าจำเป็นต้อง dedup ทั้งหมด → เรียก dedupAllStatements() เอง
  
  // ── Auto-sync: บิล matched ที่ขาด confirmation → เติมจาก statement ที่ match ──
  // ── ALSO: บิลที่ statement บอกว่า matched แต่ bill ยัง pending → sync ให้ ──
  if (billList.length > 0 && uploadedStatements.length > 0) {
    let confSynced = 0;
    let statusSynced = 0;
    
    // สร้าง index statements ที่ matched → lookup ด้วย bill_no และ station+type+amount+date
    const stmtByBillNo = {};
    const stmtByKey = {};
    uploadedStatements.forEach(s => {
      if (s.match_status !== 'matched' || !s.match_bill) return;
      const mb = s.match_bill;
      // index 1: bill_no
      if (!mb.includes('|')) {
        stmtByBillNo[mb] = s;
      } else {
        // index 2: generated key → parse เป็น components
        const parts = mb.split('|');
        const station = parts[0];
        const type = parts[1];
        const amtRaw = String(parts[2] || '').replace('฿', '').replace(/,/g, '');
        const amt = Math.round(Number(amtRaw));
        const sDate = toISODate(s.date || s.trans_date);
        if (station && type && amt && sDate) {
          const k = `${sDate}|${station}|${type}|${amt}`;
          stmtByKey[k] = s;
        }
      }
    });
    
    billList.forEach(b => {
      // หา statement คู่
      let stmt = null;
      if (b.bill_no && stmtByBillNo[b.bill_no]) {
        stmt = stmtByBillNo[b.bill_no];
      } else {
        // ใช้ station+type+amount+date หา
        const bDate = toISODate(b.date);
        const amt = Math.round(Number(b.amount || 0));
        if (bDate && b.station && b.type && amt) {
          const k = `${bDate}|${b.station}|${b.type}|${amt}`;
          stmt = stmtByKey[k];
        }
      }
      
      if (!stmt) return;
      
      // ⚠️ Skip Cash/Refund — ไม่ auto เติม confirmation
      //   - Cash: ไม่ผ่านธนาคาร (เข้าลิ้นชัก)
      //   - Refund: user ต้องกรอกเองเพื่อบอกวิธีคืน (Cash/KTB/KBANK/etc.)
      if (b.type === 'Cash' || b.type === 'Refund') return;
      
      // ถ้าบิลยัง pending แต่ statement บอก matched → sync
      if (b.match_status !== 'matched' && b.match_status !== 'paid' && b.match_status !== 'void') {
        b.match_status = 'matched';
        b.confirmation = stmt.bank || '';
        b.pay_date = b.date;
        b.matched_stmt_ref = stmt.ref_no || '';
        statusSynced++;
      }
      // ถ้าบิล matched อยู่แล้วแต่ขาด confirmation → เติม
      else if (b.match_status === 'matched' && !b.confirmation && stmt.bank) {
        b.confirmation = stmt.bank;
        if (!b.pay_date) b.pay_date = b.date;
        confSynced++;
      }
    });
    
    if (confSynced > 0 || statusSynced > 0) {
      console.log(`Auto-sync: status=${statusSynced} confirmation=${confSynced} bills`);
    }
  }
  
  // ── Auto-mark Cash bills as matched (เงินสด = เข้าลิ้นชักแล้ว) ──
  let cashSynced = 0;
  let cashConfCleared = 0;
  billList.forEach(b => {
    if (b.type === 'Cash') {
      // Cash: auto matched + ล้าง confirmation ที่ auto เติมผิด
      if (b.match_status !== 'matched' && 
          b.match_status !== 'paid' && 
          b.match_status !== 'void') {
        b.match_status = 'matched';
        if (!b.pay_date) b.pay_date = b.date;
        cashSynced++;
      }
      // ล้าง confirmation ถ้ามีค่าจาก auto-sync เก่าที่ผิด
      if (b.confirmation) {
        delete b.confirmation;
        cashConfCleared++;
      }
    }
  });
  if (cashSynced > 0) {
    console.log(`Cash auto-matched: ${cashSynced} bills`);
  }
  if (cashConfCleared > 0) {
    console.log(`Cleared wrong confirmation on Cash bills: ${cashConfCleared}`);
  }
  
  // ── Auto-mark: confirmation มีค่าแล้ว → matched ──
  // (รองรับข้อมูลเก่าที่ user กรอก confirmation ก่อนหน้ามี auto-match feature)
  let confMatched = 0;
  billList.forEach(b => {
    if (b.confirmation && String(b.confirmation).trim() &&
        b.match_status !== 'matched' && 
        b.match_status !== 'paid' && 
        b.match_status !== 'void') {
      b.match_status = 'matched';
      if (!b.pay_date) b.pay_date = b.date;
      confMatched++;
    }
  });
  if (confMatched > 0) {
    console.log(`Confirmation-filled auto-matched: ${confMatched} bills`);
  }
}

// ══════════════════════════════════════════════════════════════
// Parse Front POS Report (rpt_sql_pssdailybycshbypaytype.xls) - NEW FORMAT
// โครงสร้าง: แยกตาม Cashier แล้วมี เงินสด / บัตรเครดิต / เงินโอน (แยกทีละบิล)
// Station = ดูจาก bill prefix (001/002/003/004) — ชัวร์ 100%
// Cashier-Station mapping = สร้างจากข้อมูลในไฟล์ (ไม่ hardcode เพราะอาจสลับได้)
// ══════════════════════════════════════════════════════════════
function parseFrontPosReport(result, fileName) {
  const newBills = [];
  let count = 0, transferCount = 0;
  
  // ⭐ NOTE: User กรอก ยอดขาย/นำเงินเข้า/นำเงินออก/ยอดคืนสินค้า/Cash Drawer เองทั้งหมด
  //         Front POS import ไม่แตะ summary section ใดๆ — เฉพาะ push billList รายตัวเท่านั้น
  //         ไม่เขียน mainSummary (sales_*, transfer_*, card_*, cashDrawer_*, returns_*)
  //         ไม่เขียน mainSummary.__byDate[*] section ของ summary
  
  // Dynamic mapping: cashier → station (จาก bill prefix ในไฟล์นี้)
  const cashierToStation = {}; // key: "CAS008" → value: "Front1"

  const sheetName = result.sheetNames[0];
  const sheet = result.sheets[sheetName] || [];

  // Helper: ดึง Station จาก bill prefix
  // Format: S2604001003-... = month YYMM + station(001-004) + seq
  function getStationFromBill(billNo) {
    const match = String(billNo).match(/^[SR]\d{7}(\d{3})-/);
    if (!match) return '';
    const code = match[1];
    return { '001':'Front1', '002':'Front2', '003':'Front3', '004':'Front4' }[code] || '';
  }

  // ── PASS 1: สแกนเลขบิล → สร้าง cashier↔station mapping ──
  let scanCashier = '';
  for (let i = 0; i < sheet.length; i++) {
    const r = sheet[i] || [];
    const c1 = String(r[0] || '').trim();
    const c2 = String(r[1] || '').trim();
    
    const cashMatch = c1.match(/^\((CAS\d+)\)/);
    if (cashMatch) { scanCashier = cashMatch[1]; continue; }
    
    if (c2.startsWith('หมายเลข') && scanCashier) {
      const billNo = String(r[2] || '').trim();
      const st = getStationFromBill(billNo);
      if (st && !cashierToStation[scanCashier]) {
        cashierToStation[scanCashier] = st;
      }
    }
  }

  // ── PASS 2: อ่าน bills รายตัว ──
  // เก็บเฉพาะ: เงินโอน (Type=Transfer) + Card (Type=Card อันเดียวต่อ cashier ถ้ามี)
  let currentStation = '';
  let currentCashier = '';
  let currentCashierName = '';
  let currentCashierDateMode = ''; // วันของบิลส่วนใหญ่ใน cashier นี้ (สำหรับ Card aggregate row)

  for (let i = 0; i < sheet.length; i++) {
    const r = sheet[i] || [];
    const c1 = String(r[0] || '').trim();
    const c2 = String(r[1] || '').trim();

    // หยุดที่แถวท้ายไฟล์
    if (c1.includes('**คูปอง') || c1.includes('.rpt') || c2.includes('Page')) break;

    // แถว Cashier header
    const cashierMatch = c1.match(/^\((CAS\d+)\)\s*(.+?)$/);
    if (cashierMatch) {
      currentCashier = cashierMatch[1];
      currentCashierName = cashierMatch[2].trim();
      currentStation = cashierToStation[currentCashier] || '';
      // ⭐ ไม่แตะ summary เลย (user กรอกเอง)
      continue;
    }

    // แถว "เงินสด" — skip (user ใส่เอง)
    if (c2 === 'เงินสด') continue;
    
    // แถว "บัตรเครดิต" (ไม่มีเลขบิล แค่สรุปต่อ cashier) — SKIP
    // ⭐ POS อาจมี 2 รูปแบบ:
    //    รูปแบบ 1: row "บัตรเครดิต" (สรุป) + rows "หมายเลข : เงินโอน ..." (รายตัว)
    //    รูปแบบ 2: row "บัตรเครดิต" (สรุป) + rows "หมายเลข : บัตรเครดิต ..." (รายตัว) + "หมายเลข : เงินโอน ..." (รายตัว)
    //    ทั้ง 2 รูปแบบ: "บัตรเครดิต" สรุปคือ duplicate ของรายตัว → ข้าม (กันซ้ำ)
    if (c2 === 'บัตรเครดิต') continue;

    // แถวรายการ (มีเลขบิลจริง) — รองรับทั้ง "หมายเลข : เงินโอน ..." + "หมายเลข : บัตรเครดิต ..."
    if (c2.startsWith('หมายเลข')) {
      const billNo = String(r[2] || '').trim();
      if (!/^[SR]\d+-\d+$/.test(billNo)) continue;
      
      const date = r[4] || '';
      const amount = Number(r[6]) || 0;
      if (!amount) continue;

      // ⭐ แยกประเภทตาม keyword ใน c2:
      //    "หมายเลข : บัตรเครดิต ..."  → Type = Card
      //    "หมายเลข : เงินโอน OTHER ..." → Type = Other
      //    "หมายเลข : เงินโอน ..."       → Type = Transfer
      const isCard = c2.includes('บัตรเครดิต');
      const isOther = c2.includes('OTHER');
      let type = 'Transfer';
      if (isCard) type = 'Card';
      else if (isOther) type = 'Other';
      
      // Reference: หลัง "เงินโอน" หรือ "บัตรเครดิต"
      const refMatch = c2.match(/(?:เงินโอน|บัตรเครดิต)\s+(.+?)$/);
      const transferRef = refMatch ? refMatch[1].trim() : '';

      // Station จากเลขบิล (ชัวร์กว่า cashier mapping)
      const station = getStationFromBill(billNo) || currentStation || 'Front1';
      
      const isReturn = billNo.startsWith('R');
      const finalAmount = isReturn ? -Math.abs(amount) : amount;
      
      // ⭐ Date = ISO (yyyy-mm-dd)
      const billDateISO = toISODate(date) || todayISO();

      newBills.push({
        bill_no: billNo,
        date: billDateISO,
        source_date: billDateISO,
        station: station,
        type: isReturn ? 'Refund' : type,
        amount: finalAmount,
        confirmation: '',
        pay_date: '',
        remarks1: currentCashierName ? `${currentCashier} ${currentCashierName}` : currentCashier,
        remarks2: transferRef,
        bank: '',
        due_date: '',
        match_status: 'pending',
        source: 'pos',
      });
      count++;
      if (type === 'Card') { /* counted as card */ }
      else transferCount++;
    }
  }

  // Cleanup: ลบ markers (ถ้ามี — legacy)
  newBills.forEach(b => { delete b._pos_cashier; delete b._pos_card_cashier; });

  // รวมเข้า billList — ใช้ composite key เพราะ Front POS ส่วนใหญ่ไม่มี bill_no
  const compKey = (b) => `${b.bill_no||''}|${toISODate(b.date)||''}|${Number(b.amount)||0}|${b.station||''}|${b.type||''}`;
  const existingKeys = new Set(billList.map(compKey));
  const uniqueNewBills = newBills.filter(b => !existingKeys.has(compKey(b)));
  uniqueNewBills.forEach(b => {
    if (!b.bill_uuid) {
      b.bill_uuid = (typeof crypto !== 'undefined' && crypto.randomUUID) 
        ? crypto.randomUUID() 
        : 'b-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
    }
  });
  const dup = newBills.length - uniqueNewBills.length;
  billList = billList.concat(uniqueNewBills);
  persistMainState();
  
  // แสดง Cashier-Station ของวันนี้
  const mappingStr = Object.entries(cashierToStation)
    .map(([cas, st]) => `${st}=${cas}`)
    .join(', ');
  
  // Breakdown ใน toast
  const tCount = uniqueNewBills.filter(b => b.type === 'Transfer' || b.type === 'Other').length;
  const cCount = uniqueNewBills.filter(b => b.type === 'Card').length;
  const rCount = uniqueNewBills.filter(b => b.type === 'Refund').length;
  const breakdownStr = [
    tCount && `${tCount} โอน`,
    cCount && `${cCount} บัตร`,
    rCount && `${rCount} คืน`,
  ].filter(Boolean).join(' · ');
  
  toast(`นำเข้า Front POS สำเร็จ — ${uniqueNewBills.length} บิล (${breakdownStr})${dup?` · ข้าม ${dup} ซ้ำ`:''}`, 'success');
  if (mappingStr) setTimeout(() => toast('Cashier วันนี้: ' + mappingStr, 'info'), 600);
  console.log(`[Front POS] cashierToStation:`, cashierToStation);
  console.log(`[Front POS] Imported: Transfer=${tCount} · Card=${cCount} · Refund=${rCount} · Skipped dup=${dup}`);
  
  if (currentPage === 'main') navigateTo('main');
}

// ══════════════════════════════════════════════════════════════
// Parse SP Payment Report (rpt_sql_smspayment.xls)
// Format: Parent-Child structure
//   Parent row: SP number | date | customer | | amount | 0 | amount
//   Child rows: Bill ref | ... | ... | ... | doc_type | amount
// Col: 1=Ref | 2=Original/Date | 3=Date/Customer | 4=DueDate | 5=DocType/Amount | 6=Amt1 | 7=Amt2 | 8=Amt3 | 9=Amt4
// ══════════════════════════════════════════════════════════════
function parseSPReport(result, fileName) {
  const newPayments = [];
  const sheetName = result.sheetNames[0];
  const sheet = result.sheets[sheetName] || [];

  let currentSP = null; // SP ที่กำลังอ่าน
  let count = 0, childCount = 0;

  for (let i = 0; i < sheet.length; i++) {
    const r = sheet[i] || [];
    const c1 = String(r[0] || '').trim();
    if (!c1) continue;

    // หยุดที่ "รวม" หรือ ".rpt" หรือ "Page"
    if (c1 === 'รวม' || c1.includes('.rpt') || c1.includes('Page')) break;

    // ── SP row (Parent) ──
    if (/^SP\d+-\d+$/i.test(c1)) {
      // Customer format: "(AD-00583) ร้าน อุสมานโกตาบารู"
      const custRaw = String(r[2] || '').trim();
      const custMatch = custRaw.match(/^\(([^)]+)\)\s*(.*)/);
      const custId = custMatch ? custMatch[1] : '';
      const custName = custMatch ? custMatch[2] : custRaw;

      currentSP = {
        sp_no: c1,
        date: fmtDate(r[1]) || '',
        cust_id: custId,
        cust_name: custName,
        amount: Number(r[4]) || 0,
        cash: Number(r[4]) || 0,       // col 5 = เงินสด
        transfer: Number(r[5]) || 0,   // col 6 = โอน
        cheque: Number(r[6]) || 0,     // col 7 = เช็ค
        total: Number(r[6]) || 0,      // col 7 rightmost
        bills: [],                      // child bills ที่ตัด
        match_status: 'pending',
      };
      // บาง SP มี total ที่ col 5 แทน col 7
      if (!currentSP.total) currentSP.total = currentSP.amount;
      newPayments.push(currentSP);
      count++;
      continue;
    }

    // ── Child row (บิลที่ตัด) ──
    // Format: SS/OS/SR/OR/JR/SC/JS number in col 1, doc type in col 5, amount in col 6
    if (/^(SS|OS|SR|OR|JR|SC|JS)\d+-\d+$/i.test(c1) && currentSP) {
      const billNo = c1;
      // อาจมี original SO reference ที่ col 2
      const origRef = String(r[1] || '').trim();
      const hasOrigRef = /^(SO|SI)\d+-\d+$/i.test(origRef);

      const billDate = fmtDate(hasOrigRef ? r[2] : r[2]) || '';
      const dueDate = fmtDate(r[3]) || '';
      const docType = String(r[4] || '').trim();
      const amount = Number(r[5]) || 0;

      currentSP.bills.push({
        bill_no: billNo,
        orig_ref: hasOrigRef ? origRef : '',
        bill_date: billDate,
        due_date: dueDate,
        doc_type: docType,
        amount: amount,
      });
      childCount++;
    }
  }

  paymentList = paymentList.concat(newPayments);
  
  // ── Link SP กับ Bill List — mark บิลที่ถูกตัดว่า 'paid' ──
  let linkedCount = 0;
  newPayments.forEach(sp => {
    (sp.bills || []).forEach(childBill => {
      const billIdx = billList.findIndex(b => b.bill_no === childBill.bill_no);
      if (billIdx >= 0) {
        billList[billIdx].match_status = 'paid';
        billList[billIdx].paid_by_sp = sp.sp_no;
        billList[billIdx].pay_date = sp.date;
        linkedCount++;
      }
    });
  });
  
  // ── Auto-detect SP-TEMP ที่น่าจะเป็นตัวเดียวกันกับ SP ที่เพิ่ง import ──
  // ถ้า TEMP มี cust_id + amount เหมือน SP จริงที่เพิ่งมา → propose merge
  const tempsToMerge = [];
  const realSPs = newPayments.filter(p => !p.is_temp);
  paymentList.filter(p => p.is_temp || /^SP-TEMP-/.test(p.sp_no)).forEach(tempSp => {
    const match = realSPs.find(realSp => 
      realSp.cust_id === tempSp.cust_id &&
      Math.abs(Number(realSp.total) - Number(tempSp.total)) < 1 &&
      Math.abs((parseThaiDate(realSp.date)||0) - (parseThaiDate(tempSp.date)||0)) < 3 * 86400000 // ต่างไม่เกิน 3 วัน
    );
    if (match) {
      tempsToMerge.push({ temp: tempSp, real: match });
    }
  });
  
  persistMainState();
  toast(`นำเข้า SP สำเร็จ — ${count} SP, ${childCount} บิลที่ตัด${linkedCount?`, เชื่อมกับ Bill List ${linkedCount} บิล`:''}`, 'success');
  
  // แจ้งเตือน merge candidates (OLD SP-TEMP in paymentList)
  if (tempsToMerge.length > 0) {
    setTimeout(() => showSpMergeDialog(tempsToMerge), 600);
  }
  
  // แจ้งเตือน graduate candidates (NEW spTempList)
  // เลื่อนให้หลัง showSpMergeDialog — ถ้ามีทั้งคู่ ไม่ซ้อนกัน
  const gradDelay = tempsToMerge.length > 0 ? 2000 : 600;
  setTimeout(() => spTempAutoGraduateDialog(realSPs), gradDelay);
  
  if (currentPage === 'payments') navigateTo('payments');
}
